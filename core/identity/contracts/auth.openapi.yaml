openapi: 3.1.0
info:
  title: BThwani Core Identity API
  version: 0.2.0
  description: Authentication, rotating sessions, actor identity, roles, and permissions.
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-owner: core/identity
servers:
  - url: http://localhost:58082
    description: Local identity runtime
paths:
  /identity/health:
    get:
      operationId: getIdentityHealth
      responses:
        "200":
          description: Identity runtime is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeStatus"
  /identity/readiness:
    get:
      operationId: getIdentityReadiness
      responses:
        "200":
          description: Identity database is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeStatus"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /auth/login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated session and rotating token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
  /auth/logout:
    post:
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session revoked.
        "401":
          $ref: "#/components/responses/Unauthenticated"
  /auth/refresh:
    post:
      operationId: refreshSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Previous refresh session revoked and replaced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
  /auth/session:
    get:
      operationId: getAuthSession
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated actor session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActorIdentity"
        "401":
          $ref: "#/components/responses/Unauthenticated"
  /auth/introspect:
    post:
      operationId: introspectToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntrospectRequest"
      responses:
        "200":
          description: Token is active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActorIdentity"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  responses:
    InvalidRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthenticated:
      description: Authentication failed or the session expired.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ServiceUnavailable:
      description: Identity runtime is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    RuntimeStatus:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
        service:
          type: string
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 6
        deviceFingerprint:
          type: string
          maxLength: 200
    RefreshRequest:
      type: object
      additionalProperties: false
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 20
    IntrospectRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          minLength: 20
    TokenResponse:
      type: object
      required: [accessToken, refreshToken, tokenType, expiresIn, identity]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          const: Bearer
        expiresIn:
          type: integer
          minimum: 1
        identity:
          $ref: "#/components/schemas/ActorIdentity"
    ActorIdentity:
      type: object
      required:
        - subject
        - tenantId
        - roles
        - permissions
        - authState
        - surfaceAccess
        - serviceAccess
        - sessionId
        - expiresAt
      properties:
        subject:
          type: string
          minLength: 1
        tenantId:
          type: string
          minLength: 1
        roles:
          type: array
          minItems: 1
          items:
            type: string
            enum: [client, partner, captain, field, operator, system]
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        authState:
          const: authenticated
        surfaceAccess:
          type: object
          additionalProperties:
            type: boolean
        serviceAccess:
          type: object
          additionalProperties:
            type: boolean
        sessionId:
          type: string
        expiresAt:
          type: string
          format: date-time
    Permission:
      type: object
      additionalProperties: false
      required: [service, surface, action, scope]
      properties:
        service:
          type: string
          enum: [dsh, wlt, knz, arb, amn, esf, mrf, snd, kwd, core]
        surface:
          type: string
          enum: [app-client, app-partner, app-captain, app-field, control-panel, webapp, website, system]
        action:
          type: string
          minLength: 1
        scope:
          type: string
          enum: [own, assigned, store, zone, all, none]
    ApiError:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
