openapi: 3.1.0
info:
  title: BThwani Core Identity API
  version: 0.1.0
  description: Authentication, session verification, actor identity, roles, and permissions.
x-bthwani-contract-state: CONTRACT_DRAFT
x-bthwani-owner: core/identity
paths:
  /auth/login:
    post:
      operationId: login
      summary: Authenticate with credentials.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successfully authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials.

  /auth/logout:
    post:
      operationId: logout
      summary: Invalidate the current session.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Successfully logged out.
        "401":
          description: Unauthorized.

  /auth/refresh:
    post:
      operationId: refreshSession
      summary: Refresh access token using refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Successfully refreshed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Invalid or expired refresh token.

  /auth/session:
    get:
      operationId: getAuthSession
      summary: Resolve current actor session.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated actor session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Missing or invalid session.

  /auth/introspect:
    post:
      operationId: introspectToken
      summary: Introspect token validity and resolve identity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntrospectRequest"
      responses:
        "200":
          description: Token is valid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectionResponse"
        "401":
          description: Invalid token.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - identity
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
        refreshToken:
          type: string
        identity:
          $ref: "#/components/schemas/ActorIdentity"

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    RefreshResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - identity
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
        refreshToken:
          type: string
        identity:
          $ref: "#/components/schemas/ActorIdentity"

    IntrospectRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string

    ActorIdentity:
      type: object
      required:
        - subject
        - roles
        - permissions
        - authState
        - surfaceAccess
        - serviceAccess
      properties:
        subject:
          type: string
          minLength: 1
        roles:
          type: array
          items:
            type: string
            enum: [client, partner, captain, field, operator, system]
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        authState:
          type: string
          enum: [authenticated, unauthenticated]
        surfaceAccess:
          type: object
          additionalProperties:
            type: boolean
        serviceAccess:
          type: object
          additionalProperties:
            type: boolean

    Permission:
      type: object
      required:
        - service
        - surface
        - action
        - scope
      properties:
        service:
          type: string
          enum: [dsh, wlt, knz, arb, amn, esf, mrf, snd, kwd, core]
        surface:
          type: string
          enum: [app-client, app-partner, app-captain, app-field, control-panel, webapp, website, system]
        action:
          type: string
        scope:
          type: string
          enum: [own, assigned, store, zone, all, none]

    SessionResponse:
      $ref: "#/components/schemas/ActorIdentity"

    IntrospectionResponse:
      $ref: "#/components/schemas/ActorIdentity"