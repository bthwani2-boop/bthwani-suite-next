openapi: 3.1.0
info:
  title: BThwani Core External Provider API
  version: 0.5.0
  description: External provider registry, governed health and database-backed readiness, secret-safe configuration, atomic audit, idempotent mutation, and provider invocation API.

x-bthwani-owner: core/providers
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-scope: external-provider-management

paths:
  /providers/health:
    get:
      operationId: getExternalProviderHealth
      summary: Return the governed external-provider health snapshot.
      description: A provider is healthy only after an allowlisted live health probe succeeds. Active configuration alone is never reported as healthy.
      tags: [ExternalProviderHealth]
      responses:
        "200":
          description: External provider health snapshot without credentials or probe URLs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalProviderHealthResponse"
        "500":
          description: Provider registry could not be read.

  /providers/readiness:
    get:
      operationId: getExternalProviderReadiness
      summary: Return database-backed runtime readiness for the Providers service.
      description: Readiness is reported only when the service can reach its sovereign PostgreSQL database. External provider configuration does not affect process readiness.
      tags: [ExternalProviderHealth]
      responses:
        "200":
          description: Providers runtime is ready to serve database-backed requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeReadinessResponse"
        "503":
          description: Providers runtime is not ready because its sovereign database is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeReadinessResponse"

  /providers:
    get:
      operationId: listProviders
      summary: List external providers without returning secret material.
      tags: [ExternalProviderManagement]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Secret-safe list of external providers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExternalProvider"
        "401":
          description: Authentication is required.
        "403":
          description: Provider read permission is required.

  /providers/{providerId}:
    parameters:
      - name: providerId
        in: path
        required: true
        schema:
          type: string
          minLength: 1
    get:
      operationId: getProvider
      summary: Get secret-safe details of one provider.
      tags: [ExternalProviderManagement]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Provider configuration without credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalProvider"
        "401":
          description: Authentication is required.
        "403":
          description: Provider read permission is required.
        "404":
          description: Provider not found.
    patch:
      operationId: updateProvider
      summary: Atomically update provider state, parameters, or write-only credentials with audit and idempotency.
      tags: [ExternalProviderManagement]
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Caller-generated identifier. Reuse with the same request returns the original response; reuse with a different request returns 409.
          schema:
            type: string
            minLength: 1
            maxLength: 200
        - name: X-Correlation-ID
          in: header
          required: true
          description: Trace identifier persisted with the provider audit record.
          schema:
            type: string
            minLength: 1
            maxLength: 200
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderRequest"
      responses:
        "200":
          description: Updated secret-safe provider configuration or the original idempotent response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalProvider"
        "400":
          description: Invalid provider update or missing governance headers.
        "401":
          description: Authentication is required.
        "403":
          description: Provider update permission is required.
        "404":
          description: Provider not found.
        "409":
          description: The idempotency key was already used with a different request.

  /providers/maps/search:
    post:
      operationId: searchMapLocations
      summary: Search locations through the governed active map-provider chain.
      tags: [ExternalMapProvider]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MapSearchRequest"
      responses:
        "200":
          description: Normalized map search results without provider credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapSearchResponse"
        "400":
          description: Invalid map request.
        "401":
          description: Authentication is required.
        "403":
          description: Actor is outside the map invocation scope.
        "502":
          description: All configured map providers failed.
        "503":
          description: No governed map provider is configured.

  /providers/maps/reverse:
    post:
      operationId: reverseMapLocation
      summary: Resolve coordinates through the governed active map-provider chain.
      tags: [ExternalMapProvider]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MapReverseRequest"
      responses:
        "200":
          description: Normalized reverse-geocoding result without provider credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapReverseResponse"
        "400":
          description: Invalid coordinates.
        "401":
          description: Authentication is required.
        "403":
          description: Actor is outside the map invocation scope.
        "502":
          description: All configured map providers failed.
        "503":
          description: No governed map provider is configured.

  /providers/maps/route:
    post:
      operationId: routeMapLocations
      summary: Calculate a governed route through the active map-provider chain.
      tags: [ExternalMapProvider]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MapRouteRequest"
      responses:
        "200":
          description: Normalized route metrics without provider credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapRouteResponse"
        "400":
          description: Invalid route coordinates.
        "401":
          description: Authentication is required.
        "403":
          description: Actor is outside the map invocation scope.
        "502":
          description: All configured map providers failed.
        "503":
          description: No governed map provider is configured.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RuntimeReadinessResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        reason:
          type: string
          enum: [database_unavailable]

    ExternalProviderKind:
      type: string
      enum: [sms, maps, payment, push, email, storage, search, fraud]

    ExternalProviderStatus:
      type: string
      enum: [healthy, degraded, down, not_configured]

    ExternalProviderHealthItem:
      type: object
      additionalProperties: false
      required: [kind, status, checkedAt]
      properties:
        kind:
          $ref: "#/components/schemas/ExternalProviderKind"
        status:
          $ref: "#/components/schemas/ExternalProviderStatus"
        checkedAt:
          type: string
          format: date-time
        message:
          type: string
          description: Secret-safe operational summary. Probe URLs and credentials are never returned.

    ExternalProviderHealthResponse:
      type: object
      additionalProperties: false
      required: [providers]
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/ExternalProviderHealthItem"

    ExternalProvider:
      type: object
      additionalProperties: false
      required: [providerId, kind, code, active, credentialConfigured, updatedAt]
      properties:
        providerId:
          type: string
        kind:
          $ref: "#/components/schemas/ExternalProviderKind"
        code:
          type: string
        active:
          type: boolean
        credentialConfigured:
          type: boolean
          description: Indicates whether secret credentials exist without exposing their names or values.
        parameters:
          type: object
          additionalProperties: true
          description: Non-secret provider parameters. Sensitive material belongs only in credentials.
        updatedAt:
          type: string
          format: date-time

    UpdateProviderRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        active:
          type: boolean
        credentials:
          type: object
          writeOnly: true
          additionalProperties: true
          description: Write-only secret material. It is never echoed in any response or audit payload.
        parameters:
          type: object
          additionalProperties: true
          description: May include healthUrl, which is probed only when its hostname is explicitly allowlisted at runtime.

    MapSearchRequest:
      type: object
      additionalProperties: false
      required: [query]
      properties:
        query:
          type: string
          minLength: 2
          maxLength: 240
        limit:
          type: integer
          minimum: 1
          maximum: 10
          default: 6
        language:
          type: string
          maxLength: 32
        countryCodes:
          type: array
          maxItems: 8
          items:
            type: string
            minLength: 2
            maxLength: 2

    MapReverseRequest:
      type: object
      additionalProperties: false
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        language:
          type: string
          maxLength: 32

    MapRouteRequest:
      type: object
      additionalProperties: false
      required: [originLatitude, originLongitude, destinationLatitude, destinationLongitude]
      properties:
        originLatitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        originLongitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        destinationLatitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        destinationLongitude:
          type: number
          format: double
          minimum: -180
          maximum: 180

    MapLocation:
      type: object
      required: [providerCode, providerPlaceId, displayName, latitude, longitude]
      properties:
        providerCode:
          type: string
        providerPlaceId:
          type: string
        displayName:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        countryCode:
          type: string
        administrativeArea:
          type: string
        locality:
          type: string
        postalCode:
          type: string
        confidence:
          type: number
          format: double

    MapSearchResponse:
      type: object
      additionalProperties: false
      required: [locations]
      properties:
        locations:
          type: array
          items:
            $ref: "#/components/schemas/MapLocation"

    MapReverseResponse:
      type: object
      additionalProperties: false
      required: [location]
      properties:
        location:
          $ref: "#/components/schemas/MapLocation"

    MapRouteResponse:
      type: object
      additionalProperties: false
      required: [providerCode, distanceMeters, durationSeconds]
      properties:
        providerCode:
          type: string
        distanceMeters:
          type: number
          format: double
          minimum: 0
        durationSeconds:
          type: number
          format: double
          minimum: 0
