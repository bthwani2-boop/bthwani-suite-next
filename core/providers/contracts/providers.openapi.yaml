openapi: 3.1.0
info:
  title: BThwani Core External Provider Health API
  version: 0.1.0
  description: External provider health contract baseline only. This file does not define provider runtime, registry implementation, adapters, audit, database, or mutation behavior.

x-bthwani-owner: core/providers
x-bthwani-contract-state: CONTRACT_DRAFT
x-bthwani-scope: external-provider-health-only
x-bthwani-not-merchant-provider: true

paths:
  /providers/health:
    get:
      operationId: getExternalProviderHealth
      summary: Return external provider health state.
      description: Reports health for external technical providers such as SMS, maps, payment, push, email, storage, search, and fraud providers.
      tags:
        - ExternalProviderHealth
      responses:
        "200":
          description: External provider health snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalProviderHealthResponse"

components:
  schemas:
    ExternalProviderKind:
      type: string
      enum:
        - sms
        - maps
        - payment
        - push
        - email
        - storage
        - search
        - fraud

    ExternalProviderStatus:
      type: string
      enum:
        - healthy
        - degraded
        - down
        - not_configured

    ExternalProviderHealthItem:
      type: object
      required:
        - kind
        - status
        - checkedAt
      properties:
        kind:
          $ref: "#/components/schemas/ExternalProviderKind"
        status:
          $ref: "#/components/schemas/ExternalProviderStatus"
        checkedAt:
          type: string
          format: date-time
        message:
          type: string

    ExternalProviderHealthResponse:
      type: object
      required:
        - providers
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/ExternalProviderHealthItem"
