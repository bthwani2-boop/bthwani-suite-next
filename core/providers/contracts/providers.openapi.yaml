openapi: 3.1.0
info:
  title: BThwani Core External Provider API
  version: 0.2.0
  description: External provider registry, health, configuration, and governed invocation API.

x-bthwani-owner: core/providers
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-scope: external-provider-management

paths:
  /providers/health:
    get:
      operationId: getExternalProviderHealth
      summary: Return external provider health state.
      description: Reports health for external technical providers such as SMS, maps, payment, push, email, storage, search, and fraud providers.
      tags:
        - ExternalProviderHealth
      responses:
        "200":
          description: External provider health snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalProviderHealthResponse"

  /providers:
    get:
      operationId: listProviders
      summary: List all external providers and their configurations.
      tags:
        - ExternalProviderManagement
      responses:
        "200":
          description: List of external providers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExternalProvider"

  /providers/{providerId}:
    get:
      operationId: getProvider
      summary: Get details of a single provider.
      tags:
        - ExternalProviderManagement
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalProvider"
        "404":
          description: Provider not found.
    patch:
      operationId: updateProvider
      summary: Update configuration/credentials for a provider.
      tags:
        - ExternalProviderManagement
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderRequest"
      responses:
        "200":
          description: Updated provider configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalProvider"
        "404":
          description: Provider not found.

  /providers/maps/search:
    post:
      operationId: searchMapLocations
      summary: Search locations through the governed active map-provider chain.
      tags:
        - ExternalMapProvider
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MapSearchRequest"
      responses:
        "200":
          description: Normalized map search results without provider credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapSearchResponse"
        "400":
          description: Invalid map request.
        "401":
          description: Authentication is required.
        "403":
          description: Actor is outside the map invocation scope.
        "502":
          description: All configured map providers failed.
        "503":
          description: No governed map provider is configured.

  /providers/maps/reverse:
    post:
      operationId: reverseMapLocation
      summary: Resolve coordinates through the governed active map-provider chain.
      tags:
        - ExternalMapProvider
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MapReverseRequest"
      responses:
        "200":
          description: Normalized reverse-geocoding result without provider credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapReverseResponse"
        "400":
          description: Invalid coordinates.
        "401":
          description: Authentication is required.
        "403":
          description: Actor is outside the map invocation scope.
        "502":
          description: All configured map providers failed.
        "503":
          description: No governed map provider is configured.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ExternalProviderKind:
      type: string
      enum:
        - sms
        - maps
        - payment
        - push
        - email
        - storage
        - search
        - fraud

    ExternalProviderStatus:
      type: string
      enum:
        - healthy
        - degraded
        - down
        - not_configured

    ExternalProviderHealthItem:
      type: object
      required:
        - kind
        - status
        - checkedAt
      properties:
        kind:
          $ref: "#/components/schemas/ExternalProviderKind"
        status:
          $ref: "#/components/schemas/ExternalProviderStatus"
        checkedAt:
          type: string
          format: date-time
        message:
          type: string

    ExternalProviderHealthResponse:
      type: object
      required:
        - providers
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/ExternalProviderHealthItem"

    ExternalProvider:
      type: object
      required:
        - providerId
        - kind
        - code
        - active
      properties:
        providerId:
          type: string
        kind:
          $ref: "#/components/schemas/ExternalProviderKind"
        code:
          type: string
        active:
          type: boolean
        credentials:
          type: object
          additionalProperties: true
        parameters:
          type: object
          additionalProperties: true
        updatedAt:
          type: string
          format: date-time

    UpdateProviderRequest:
      type: object
      properties:
        active:
          type: boolean
        credentials:
          type: object
          additionalProperties: true
        parameters:
          type: object
          additionalProperties: true

    MapSearchRequest:
      type: object
      required:
        - query
      additionalProperties: false
      properties:
        query:
          type: string
          minLength: 2
          maxLength: 240
        limit:
          type: integer
          minimum: 1
          maximum: 10
          default: 6
        language:
          type: string
          maxLength: 32
        countryCodes:
          type: array
          maxItems: 8
          items:
            type: string
            minLength: 2
            maxLength: 2

    MapReverseRequest:
      type: object
      required:
        - latitude
        - longitude
      additionalProperties: false
      properties:
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        language:
          type: string
          maxLength: 32

    MapLocation:
      type: object
      required:
        - providerCode
        - providerPlaceId
        - displayName
        - latitude
        - longitude
      properties:
        providerCode:
          type: string
        providerPlaceId:
          type: string
        displayName:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        countryCode:
          type: string
        administrativeArea:
          type: string
        locality:
          type: string
        postalCode:
          type: string
        confidence:
          type: number
          format: double

    MapSearchResponse:
      type: object
      required:
        - locations
      properties:
        locations:
          type: array
          items:
            $ref: "#/components/schemas/MapLocation"

    MapReverseResponse:
      type: object
      required:
        - location
      properties:
        location:
          $ref: "#/components/schemas/MapLocation"
