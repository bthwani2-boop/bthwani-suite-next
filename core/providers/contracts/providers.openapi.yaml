openapi: 3.1.0
info:
  title: BThwani Core External Provider API
  version: 0.1.0
  description: External provider registry, health, and configuration API.

x-bthwani-owner: core/providers
x-bthwani-contract-state: CONTRACT_DRAFT
x-bthwani-scope: external-provider-management

paths:
  /providers/health:
    get:
      operationId: getExternalProviderHealth
      summary: Return external provider health state.
      description: Reports health for external technical providers such as SMS, maps, payment, push, email, storage, search, and fraud providers.
      tags:
        - ExternalProviderHealth
      responses:
        "200":
          description: External provider health snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalProviderHealthResponse"

  /providers:
    get:
      operationId: listProviders
      summary: List all external providers and their configurations.
      tags:
        - ExternalProviderManagement
      responses:
        "200":
          description: List of external providers.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExternalProvider"

  /providers/{providerId}:
    get:
      operationId: getProvider
      summary: Get details of a single provider.
      tags:
        - ExternalProviderManagement
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalProvider"
        "404":
          description: Provider not found.
    patch:
      operationId: updateProvider
      summary: Update configuration/credentials for a provider.
      tags:
        - ExternalProviderManagement
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderRequest"
      responses:
        "200":
          description: Updated provider configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalProvider"
        "404":
          description: Provider not found.

components:
  schemas:
    ExternalProviderKind:
      type: string
      enum:
        - sms
        - maps
        - payment
        - push
        - email
        - storage
        - search
        - fraud

    ExternalProviderStatus:
      type: string
      enum:
        - healthy
        - degraded
        - down
        - not_configured

    ExternalProviderHealthItem:
      type: object
      required:
        - kind
        - status
        - checkedAt
      properties:
        kind:
          $ref: "#/components/schemas/ExternalProviderKind"
        status:
          $ref: "#/components/schemas/ExternalProviderStatus"
        checkedAt:
          type: string
          format: date-time
        message:
          type: string

    ExternalProviderHealthResponse:
      type: object
      required:
        - providers
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/ExternalProviderHealthItem"

    ExternalProvider:
      type: object
      required:
        - providerId
        - kind
        - code
        - active
      properties:
        providerId:
          type: string
        kind:
          $ref: "#/components/schemas/ExternalProviderKind"
        code:
          type: string
        active:
          type: boolean
        credentials:
          type: object
          additionalProperties: true
        parameters:
          type: object
          additionalProperties: true
        updatedAt:
          type: string
          format: date-time

    UpdateProviderRequest:
      type: object
      properties:
        active:
          type: boolean
        credentials:
          type: object
          additionalProperties: true
        parameters:
          type: object
          additionalProperties: true
