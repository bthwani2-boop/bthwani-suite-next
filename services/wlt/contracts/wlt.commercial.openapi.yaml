openapi: 3.1.0
info:
  title: BThwani WLT Commercial Benefits and Funding API
  version: 0.4.0
  description: WLT-owned contract for commercial products, subscriptions, loyalty truth, and promotion funding lifecycle.
x-bthwani-owner: services/wlt
x-bthwani-parent-contract: services/wlt/contracts/wlt.openapi.yaml
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: DISABLED
x-bthwani-client-binding: MANUAL_TYPED_ADAPTER
x-bthwani-runtime-dependency: true
x-bthwani-financial-owner: true
paths:
  /wlt/commercial/products:
    post:
      operationId: createWltCommercialProduct
      tags: [WltCommercialBenefits]
      security: [{ bearerAuth: [] }]
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      parameters:
        - $ref: '#/components/parameters/ServiceCallerHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommercialProductWrite' }
      responses:
        '201': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /wlt/commercial/products/{productReference}:
    get:
      operationId: getWltCommercialProduct
      tags: [WltCommercialBenefits]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/ServiceCallerHeader'
        - $ref: '#/components/parameters/ProductReference'
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
    patch:
      operationId: updateWltCommercialProduct
      tags: [WltCommercialBenefits]
      security: [{ bearerAuth: [] }]
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      parameters:
        - $ref: '#/components/parameters/ServiceCallerHeader'
        - $ref: '#/components/parameters/ProductReference'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommercialProductWrite' }
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /wlt/commercial/clients/{clientId}/benefits:
    get:
      operationId: getWltClientCommercialBenefits
      tags: [WltCommercialBenefits]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/ServiceCallerHeader'
        - name: clientId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /wlt/commercial/loyalty-entries:
    post:
      operationId: appendWltLoyaltyEntry
      tags: [WltCommercialBenefits]
      security: [{ bearerAuth: [] }]
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      parameters:
        - $ref: '#/components/parameters/ServiceCallerHeader'
        - $ref: '#/components/parameters/IdempotencyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoyaltyEntryWrite' }
      responses:
        '201': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /wlt/commercial/subscriptions:
    post:
      operationId: activateWltCommercialSubscription
      tags: [WltCommercialBenefits]
      security: [{ bearerAuth: [] }]
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      parameters:
        - $ref: '#/components/parameters/ServiceCallerHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubscriptionActivation' }
      responses:
        '201': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /wlt/promotion-funding/reservations:
    post:
      operationId: reserveWltPromotionFunding
      tags: [WltPromotionFunding]
      security: [{ bearerAuth: [] }]
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/ServiceCallerHeader'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/IdempotencyHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromotionFundingReserve' }
      responses:
        '201': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /wlt/promotion-funding/reservations/{reservationId}:
    get:
      operationId: getWltPromotionFundingReservation
      tags: [WltPromotionFunding]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/ServiceCallerHeader'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ReservationId'
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
  /wlt/promotion-funding/reservations/{reservationId}/commit:
    post:
      operationId: commitWltPromotionFunding
      tags: [WltPromotionFunding]
      security: [{ bearerAuth: [] }]
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/ServiceCallerHeader'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ReservationId'
        - $ref: '#/components/parameters/IdempotencyHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromotionFundingCommit' }
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /wlt/promotion-funding/reservations/{reservationId}/release:
    post:
      operationId: releaseWltPromotionFunding
      tags: [WltPromotionFunding]
      security: [{ bearerAuth: [] }]
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/ServiceCallerHeader'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ReservationId'
        - $ref: '#/components/parameters/IdempotencyHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromotionFundingRelease' }
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /wlt/promotion-funding/reservations/{reservationId}/reverse:
    post:
      operationId: reverseWltPromotionFunding
      tags: [WltPromotionFunding]
      security: [{ bearerAuth: [] }]
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/ServiceCallerHeader'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ReservationId'
        - $ref: '#/components/parameters/IdempotencyHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromotionFundingReverse' }
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      schema: { type: string, minLength: 1 }
    ServiceCallerHeader:
      name: X-Service-Caller
      in: header
      required: true
      schema: { type: string, enum: [dsh] }
    TenantHeader:
      name: X-Tenant-ID
      in: header
      required: true
      schema: { type: string, minLength: 1 }
    IdempotencyHeader:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1 }
    CorrelationHeader:
      name: X-Correlation-ID
      in: header
      required: true
      schema: { type: string, minLength: 1 }
    ProductReference:
      name: productReference
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    ReservationId:
      name: reservationId
      in: path
      required: true
      schema: { type: string, pattern: '^pfr_' }
  responses:
    ObjectResponse:
      description: Governed WLT commercial object.
      content:
        application/json:
          schema: { type: object, additionalProperties: true }
    ErrorResponse:
      description: Governed error response.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    CommercialProductWrite:
      type: object
      additionalProperties: true
      minProperties: 1
    LoyaltyEntryWrite:
      type: object
      additionalProperties: true
      required: [clientId, direction, points, sourceType, sourceId]
      properties:
        clientId: { type: string, minLength: 1 }
        direction: { type: string, enum: [earn, burn, expire, reverse] }
        points: { type: integer, format: int64, minimum: 1 }
        sourceType: { type: string, minLength: 1 }
        sourceId: { type: string, minLength: 1 }
    SubscriptionActivation:
      type: object
      additionalProperties: false
      required: [clientId, productReference, paymentSessionId, subscriptionPurchaseId]
      properties:
        clientId: { type: string, minLength: 1 }
        productReference: { type: string, minLength: 1 }
        paymentSessionId: { type: string, minLength: 1, pattern: '^wps_' }
        subscriptionPurchaseId: { type: string, minLength: 1 }
    PromotionFundingReserve:
      type: object
      additionalProperties: false
      required:
        - tenantId
        - externalReference
        - checkoutIntentId
        - couponRedemptionId
        - couponId
        - clientId
        - platformFundedMinorUnits
        - partnerFundedMinorUnits
        - totalDiscountMinorUnits
        - currency
      properties:
        tenantId: { type: string, minLength: 1 }
        externalReference: { type: string, minLength: 1 }
        checkoutIntentId: { type: string, minLength: 1 }
        couponRedemptionId: { type: string, minLength: 1 }
        couponId: { type: string, minLength: 1 }
        clientId: { type: string, minLength: 1 }
        partnerId: { type: string, minLength: 1 }
        platformFundedMinorUnits: { type: integer, format: int64, minimum: 0 }
        partnerFundedMinorUnits: { type: integer, format: int64, minimum: 0 }
        totalDiscountMinorUnits: { type: integer, format: int64, minimum: 1 }
        currency: { type: string, minLength: 1 }
    PromotionFundingCommit:
      type: object
      additionalProperties: false
      required: [tenantId, orderId]
      properties:
        tenantId: { type: string, minLength: 1 }
        orderId: { type: string, minLength: 1 }
    PromotionFundingRelease:
      type: object
      additionalProperties: false
      required: [tenantId, reason]
      properties:
        tenantId: { type: string, minLength: 1 }
        reason: { type: string, minLength: 1 }
    PromotionFundingReverse:
      type: object
      additionalProperties: false
      required: [tenantId, orderId, reason]
      properties:
        tenantId: { type: string, minLength: 1 }
        orderId: { type: string, minLength: 1 }
        reason: { type: string, minLength: 1 }
