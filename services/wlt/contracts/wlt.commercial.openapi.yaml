openapi: 3.1.0
info:
  title: BThwani WLT Commercial Benefits API
  version: 0.1.0
  description: >
    WLT-owned financial contract for subscription products, paid subscription
    activation, append-only loyalty entries, and client benefit balances.
    All routes are service-to-service. Mutations are disabled unless the WLT
    mutation gate and service authentication both pass.

x-bthwani-owner: services/wlt
x-bthwani-parent-contract: services/wlt/contracts/wlt.openapi.yaml
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: ENABLED
x-bthwani-runtime-dependency: true
x-bthwani-financial-owner: true

paths:
  /wlt/commercial/products/{productReference}:
    get:
      operationId: getWltCommercialProduct
      summary: Get a WLT-owned commercial product by reference.
      tags: [WltCommercialBenefits]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/ServiceCallerHeader"
        - name: productReference
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WltCommercialProductResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateWltCommercialProduct
      summary: Update or independently approve a WLT commercial product.
      tags: [WltCommercialBenefits]
      security: [{ bearerAuth: [] }]
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/ServiceCallerHeader"
        - name: productReference
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WltUpdateCommercialProductRequest" }
      responses:
        "200":
          description: Product updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WltCommercialProductResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/FeatureNotEnabled" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /wlt/commercial/products:
    post:
      operationId: createWltCommercialProduct
      summary: Create an idempotent WLT subscription product draft.
      tags: [WltCommercialBenefits]
      security: [{ bearerAuth: [] }]
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/ServiceCallerHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WltCreateCommercialProductRequest" }
      responses:
        "201":
          description: Product draft created or identical draft returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WltCommercialProductResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/FeatureNotEnabled" }
        "409": { $ref: "#/components/responses/Conflict" }

  /wlt/commercial/clients/{clientId}/benefits:
    get:
      operationId: getWltClientCommercialBenefits
      summary: Return WLT-owned loyalty balance and active paid subscription.
      tags: [WltCommercialBenefits]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/ServiceCallerHeader"
        - name: clientId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: WLT benefit truth returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WltClientBenefitsResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /wlt/commercial/loyalty-entries:
    post:
      operationId: appendWltLoyaltyEntry
      summary: Append one idempotent loyalty movement and atomically update balance.
      tags: [WltCommercialBenefits]
      security: [{ bearerAuth: [] }]
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/ServiceCallerHeader"
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
        - name: X-Correlation-ID
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WltAppendLoyaltyEntryRequest" }
      responses:
        "201":
          description: Loyalty entry appended or identical idempotent result returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WltLoyaltyEntryResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/FeatureNotEnabled" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /wlt/commercial/subscriptions:
    post:
      operationId: activateWltCommercialSubscription
      summary: Activate a subscription only from a matching captured WLT payment session.
      tags: [WltCommercialBenefits]
      security: [{ bearerAuth: [] }]
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/ServiceCallerHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WltActivateSubscriptionRequest" }
      responses:
        "201":
          description: Paid subscription activated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WltSubscriptionResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/FeatureNotEnabled" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      schema: { type: string }
    ServiceCallerHeader:
      name: X-Service-Caller
      in: header
      required: true
      schema:
        type: string
        enum: [dsh]

  responses:
    InvalidRequest:
      description: Input validation failed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/WltErrorResponse" }
    Unauthenticated:
      description: Service authentication failed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/WltErrorResponse" }
    Forbidden:
      description: Caller is forbidden.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/WltErrorResponse" }
    FeatureNotEnabled:
      description: WLT mutation gate is disabled or caller is forbidden.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/WltErrorResponse" }
    NotFound:
      description: Referenced financial record was not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/WltErrorResponse" }
    Conflict:
      description: State, version, balance, approval, idempotency, or payment conflict.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/WltErrorResponse" }

  schemas:
    WltErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    WltCommercialProductStatus:
      type: string
      enum: [draft, active, paused, archived]

    WltCommercialProduct:
      type: object
      additionalProperties: false
      required:
        - reference
        - productType
        - displayName
        - priceMinorUnits
        - currency
        - billingCycle
        - status
        - version
        - createdByActorId
        - createdAt
        - updatedAt
      properties:
        reference: { type: string }
        productType: { type: string, enum: [subscription] }
        displayName: { type: string }
        priceMinorUnits: { type: integer, format: int64, minimum: 1 }
        currency: { type: string, enum: [YER] }
        billingCycle: { type: string, enum: [monthly, quarterly, annual] }
        status: { $ref: "#/components/schemas/WltCommercialProductStatus" }
        version: { type: integer, minimum: 1 }
        createdByActorId: { type: string }
        approvedByActorId: { type: string }
        approvedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    WltCommercialProductResponse:
      type: object
      additionalProperties: false
      required: [product]
      properties:
        product: { $ref: "#/components/schemas/WltCommercialProduct" }

    WltCreateCommercialProductRequest:
      type: object
      additionalProperties: false
      required: [reference, displayName, priceMinorUnits, billingCycle, createdByActorId]
      properties:
        reference: { type: string, minLength: 1 }
        displayName: { type: string, minLength: 1 }
        priceMinorUnits: { type: integer, format: int64, minimum: 1 }
        currency: { type: string, enum: [YER], default: YER }
        billingCycle: { type: string, enum: [monthly, quarterly, annual] }
        createdByActorId: { type: string, minLength: 1 }

    WltUpdateCommercialProductRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, actorId]
      properties:
        displayName: { type: string, minLength: 1 }
        priceMinorUnits: { type: integer, format: int64, minimum: 1 }
        currency: { type: string, enum: [YER] }
        billingCycle: { type: string, enum: [monthly, quarterly, annual] }
        status: { $ref: "#/components/schemas/WltCommercialProductStatus" }
        expectedVersion: { type: integer, minimum: 1 }
        actorId: { type: string, minLength: 1 }

    WltLoyaltyAccount:
      type: object
      additionalProperties: false
      required: [clientId, pointsBalance, lifetimePoints, updatedAt]
      properties:
        clientId: { type: string }
        pointsBalance: { type: integer, format: int64, minimum: 0 }
        lifetimePoints: { type: integer, format: int64, minimum: 0 }
        tierReference: { type: string }
        updatedAt: { type: string, format: date-time }

    WltLoyaltyEntry:
      type: object
      additionalProperties: false
      required:
        - id
        - clientId
        - direction
        - points
        - balanceAfter
        - sourceType
        - sourceId
        - idempotencyKey
        - metadata
        - createdAt
      properties:
        id: { type: string, format: uuid }
        clientId: { type: string }
        direction: { type: string, enum: [earn, burn, expire, reverse] }
        points: { type: integer, format: int64, minimum: 1 }
        balanceAfter: { type: integer, format: int64, minimum: 0 }
        sourceType: { type: string }
        sourceId: { type: string }
        reversalOf: { type: string, format: uuid }
        idempotencyKey: { type: string }
        correlationId: { type: string }
        metadata: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }

    WltAppendLoyaltyEntryRequest:
      type: object
      additionalProperties: false
      required: [clientId, direction, points, sourceType, sourceId]
      properties:
        clientId: { type: string, minLength: 1 }
        direction: { type: string, enum: [earn, burn, expire, reverse] }
        points: { type: integer, format: int64, minimum: 1 }
        sourceType: { type: string, minLength: 1 }
        sourceId: { type: string, minLength: 1 }
        reversalOf: { type: string, format: uuid }
        idempotencyKey: { type: string }
        correlationId: { type: string }
        metadata: { type: object, additionalProperties: true }

    WltLoyaltyEntryResponse:
      type: object
      additionalProperties: false
      required: [entry]
      properties:
        entry: { $ref: "#/components/schemas/WltLoyaltyEntry" }

    WltSubscription:
      type: object
      additionalProperties: false
      required: [id, clientId, productReference, status, startsAt, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        clientId: { type: string }
        productReference: { type: string }
        status: { type: string, enum: [active, paused, cancelled, expired] }
        paymentSessionId: { type: string, format: uuid }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    WltActivateSubscriptionRequest:
      type: object
      additionalProperties: false
      required: [clientId, productReference, paymentSessionId]
      properties:
        clientId: { type: string, minLength: 1 }
        productReference: { type: string, minLength: 1 }
        paymentSessionId: { type: string, format: uuid }

    WltSubscriptionResponse:
      type: object
      additionalProperties: false
      required: [subscription]
      properties:
        subscription: { $ref: "#/components/schemas/WltSubscription" }

    WltClientBenefits:
      type: object
      additionalProperties: false
      properties:
        loyaltyAccount: { $ref: "#/components/schemas/WltLoyaltyAccount" }
        activeSubscription: { $ref: "#/components/schemas/WltSubscription" }

    WltClientBenefitsResponse:
      type: object
      additionalProperties: false
      required: [benefits]
      properties:
        benefits: { $ref: "#/components/schemas/WltClientBenefits" }
