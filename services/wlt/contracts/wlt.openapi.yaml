openapi: 3.1.0
info:
  title: BThwani WLT Service API
  version: 0.2.0
  description: WLT owns wallet and financial mutation endpoints. DSH and frontend surfaces must not call external financial providers directly.

x-bthwani-owner: services/wlt
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: ENABLED
x-bthwani-runtime-dependency: true
x-bthwani-financial-owner: true

paths:
  /wlt/health:
    get:
      operationId: getWltHealth
      summary: Return WLT liveness state.
      tags:
        - WltSystem
      responses:
        "200":
          description: WLT process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltHealthResponse"

  /wlt/readiness:
    get:
      operationId: getWltReadiness
      summary: Return WLT readiness state.
      tags:
        - WltSystem
      responses:
        "200":
          description: WLT dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltReadinessResponse"
        "503":
          description: WLT is not ready.

  /wlt/references/payment-status:
    get:
      operationId: getWltPaymentStatusRef
      summary: Return payment status reference for a given orderId. Read-only display surface for DSH.
      tags:
        - WltReferences
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment status reference found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentStatusRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/references/settlement-status:
    get:
      operationId: getWltSettlementStatusRef
      summary: Return settlement status reference for a given orderId. Read-only display surface for DSH.
      tags:
        - WltReferences
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Settlement status reference found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementStatusRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/references/refund-status:
    get:
      operationId: getWltRefundStatusRef
      summary: Return refund status reference for a given orderId. Read-only display surface for DSH.
      tags:
        - WltReferences
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund status reference found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundStatusRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/references/wallet-status:
    get:
      operationId: getWltWalletStatusRef
      summary: Return wallet status reference for a given actor. Read-only display surface for DSH.
      tags:
        - WltReferences
      parameters:
        - name: actorId
          in: query
          required: true
          schema:
            type: string
        - name: actorType
          in: query
          required: true
          schema:
            type: string
            enum:
              - client
              - partner
              - captain
              - field
      responses:
        "200":
          description: Wallet status reference found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltWalletStatusRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"


  /wlt/wallets/{actorType}/{actorId}:
    get:
      operationId: getWltWallet
      summary: Return the full operational wallet for an actor.
      tags:
        - WltWallets
      parameters:
        - name: actorType
          in: path
          required: true
          schema:
            type: string
            enum:
              - client
              - partner
              - captain
              - field
        - name: actorId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wallet returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltWalletResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payout-requests:
    post:
      operationId: createWltPayoutRequest
      summary: Create a payout request.
      tags:
        - WltPayouts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreatePayoutRequest"
      responses:
        "201":
          description: Payout request created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPayoutRequestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      operationId: listWltPayoutRequests
      summary: List payout requests.
      description: >-
        beneficiaryActorId and beneficiaryActorType must be supplied
        together and scope results to that beneficiary. If neither is
        supplied, the caller must be an internal/service caller (e.g.
        X-Service-Caller: dsh) to list across all beneficiaries.
      tags:
        - WltPayouts
      parameters:
        - name: beneficiaryActorId
          in: query
          schema: { type: string }
        - name: beneficiaryActorType
          in: query
          schema: { type: string }
      responses:
        "200":
          description: List of payout requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPayoutRequestListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/payout-requests/{payoutId}:
    get:
      operationId: getWltPayoutRequest
      summary: Get a payout request.
      tags:
        - WltPayouts
      parameters:
        - name: payoutId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Payout request found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPayoutRequestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payout-requests/{payoutId}/approve:
    post:
      operationId: approveWltPayoutRequest
      summary: Approve a payout request.
      tags:
        - WltPayouts
      parameters:
        - name: payoutId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Approved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPayoutRequestResponse"

  /wlt/payout-requests/{payoutId}/reject:
    post:
      operationId: rejectWltPayoutRequest
      summary: Reject a payout request.
      tags:
        - WltPayouts
      parameters:
        - name: payoutId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPayoutRequestResponse"

  /wlt/payout-requests/{payoutId}/process:
    post:
      operationId: processWltPayoutRequest
      summary: Start processing payout request.
      tags:
        - WltPayouts
      parameters:
        - name: payoutId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPayoutRequestResponse"

  /wlt/payout-requests/{payoutId}/complete:
    post:
      operationId: completeWltPayoutRequest
      summary: Complete payout request.
      tags:
        - WltPayouts
      parameters:
        - name: payoutId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPayoutRequestResponse"

  /wlt/payout-requests/{payoutId}/fail:
    post:
      operationId: failWltPayoutRequest
      summary: Fail payout request.
      tags:
        - WltPayouts
      parameters:
        - name: payoutId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPayoutRequestResponse"

  /wlt/payment-sessions:
    post:
      operationId: createWltPaymentSessionReference
      summary: Create a WLT-owned payment-session reference for DSH checkout handoff.
      description: Creates an opaque payment-session reference only. No wallet debit, ledger posting, provider capture, refund, or settlement occurs here.
      tags:
        - WltPaymentSessions
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
        - name: X-Correlation-ID
          in: header
          required: true
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreatePaymentSessionRequest"
      responses:
        "201":
          description: Payment-session reference created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /wlt/payment-sessions/{paymentSessionId}:
    get:
      operationId: getWltPaymentSessionReference
      summary: Read a WLT-owned payment-session reference.
      tags:
        - WltPaymentSessions
      parameters:
        - name: paymentSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment-session reference.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payment-sessions/{paymentSessionId}/authorize:
    post:
      operationId: authorizeWltPaymentSession
      summary: Authorize a payment session with an amount.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltPaymentSessions
      parameters:
        - name: paymentSessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltAuthorizePaymentSessionRequest"
      responses:
        "200":
          description: Payment session authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /wlt/payment-sessions/{paymentSessionId}/capture:
    post:
      operationId: captureWltPaymentSession
      summary: Capture an authorized payment session.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltPaymentSessions
      parameters:
        - name: paymentSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment session captured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCapturePaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payment-sessions/{paymentSessionId}/expire:
    post:
      operationId: expireWltPaymentSession
      summary: Expire a payment session.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltPaymentSessions
      parameters:
        - name: paymentSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment session expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /wlt/payment-sessions/{paymentSessionId}/cancel-for-order:
    post:
      operationId: cancelWltPaymentSessionForOrder
      summary: >-
        Signal that the order behind this payment session was cancelled;
        WLT decides whether to expire (not yet captured) or request a refund
        (already captured/cod_collected).
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime. WLT
        -- not the caller -- owns the session's true state, so this endpoint
        lets DSH signal a cancellation without itself having to decide
        between expiring an unfunded session or refunding a funded one. If
        the session is captured or cod_collected, this creates a
        requested-status refund for human review; it never auto-completes
        or moves money. If the session is already in a terminal state
        (expired/failed/etc.), this returns action "none" rather than an
        error, since a cancellation racing an already-terminal session is
        normal, not a client error.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltPaymentSessions
      parameters:
        - name: paymentSessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCancelPaymentSessionForOrderRequest"
      responses:
        "200":
          description: >-
            Either the session was expired, a refund was requested, or no
            action was needed because the session was already terminal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCancelPaymentSessionForOrderResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payment-sessions/{paymentSessionId}/cod-collect:
    post:
      operationId: markWltCodCollected
      summary: Mark a COD payment session as collected.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltPaymentSessions
      parameters:
        - name: paymentSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: COD payment session marked as collected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/refunds:
    post:
      operationId: createWltRefund
      summary: Create a refund for a captured payment session.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltRefunds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreateRefundRequest"
      responses:
        "201":
          description: Refund created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      operationId: listWltRefunds
      summary: List refunds by orderId or clientId.
      tags:
        - WltRefunds
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
        - name: orderId
          in: query
          schema:
            type: string
        - name: clientId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of refunds.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/refunds/{refundId}:
    get:
      operationId: getWltRefund
      summary: Get a refund by ID.
      tags:
        - WltRefunds
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
        - name: refundId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/refunds/{refundId}/approve:
    post:
      operationId: approveWltRefund
      summary: Approve a requested refund.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltRefunds
      parameters:
        - name: refundId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund approved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/refunds/{refundId}/complete:
    post:
      operationId: completeWltRefund
      summary: Complete an approved refund.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltRefunds
      parameters:
        - name: refundId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/refunds/{refundId}/reject:
    post:
      operationId: rejectWltRefund
      summary: Reject a refund.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltRefunds
      parameters:
        - name: refundId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/settlements:
    post:
      operationId: createWltSettlement
      summary: Create a partner settlement record.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltSettlements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreateSettlementRequest"
      responses:
        "201":
          description: Settlement created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      operationId: listWltSettlements
      summary: List settlements by partnerId.
      tags:
        - WltSettlements
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
        - name: partnerId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of settlements.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/settlements/summary:
    get:
      operationId: getWltSettlementSummary
      summary: Get aggregated settlement summary for a partner over a period.
      tags:
        - WltSettlements
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
        - name: partnerId
          in: query
          required: true
          schema:
            type: string
        - name: periodStart
          in: query
          schema:
            type: string
            format: date
        - name: periodEnd
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Settlement summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementSummaryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/settlements/{settlementId}:
    get:
      operationId: getWltSettlement
      summary: Get a settlement by ID.
      tags:
        - WltSettlements
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
        - name: settlementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Settlement found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/settlements/{settlementId}/post:
    post:
      operationId: postWltSettlement
      summary: Post (settle) a pending settlement.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltSettlements
      parameters:
        - name: settlementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Settlement posted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /wlt/cod-records:
    post:
      operationId: createWltCodRecord
      summary: DSH-only. Opens a COD collection record for a delivered order.
      description: >
        Called by DSH once a COD order is delivered. WLT derives amountMinorUnits/
        currency from its own payment session for the given checkoutIntentId rather
        than trusting the caller. Idempotent on orderId: replays return the existing
        record.
      tags:
        - WltCod
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreateCodRecordRequest"
      responses:
        "201":
          description: COD record created (or already existed for this orderId).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCodRecordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      operationId: listWltCodRecords
      summary: List COD records by captainId or partnerId.
      tags:
        - WltCod
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
        - name: captainId
          in: query
          schema:
            type: string
        - name: partnerId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of COD records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCodRecordListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/cod-records/{codRecordId}:
    get:
      operationId: getWltCodRecord
      summary: Get a COD record by ID.
      tags:
        - WltCod
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
        - name: codRecordId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: COD record found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCodRecordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/cod-records/{codRecordId}/collect:
    post:
      operationId: collectWltCod
      summary: Mark a COD record as collected.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltCod
      parameters:
        - name: codRecordId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: COD record marked as collected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCodRecordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /wlt/cod-records/{codRecordId}/remit:
    post:
      operationId: remitWltCod
      summary: Mark a COD record as remitted.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltCod
      parameters:
        - name: codRecordId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: COD record marked as remitted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCodRecordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /wlt/commissions:
    post:
      operationId: createWltCommission
      summary: DSH-only. Create a commission record.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltCod
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreateCommissionRequest"
      responses:
        "201":
          description: Commission created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCommissionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      operationId: listWltCommissions
      summary: List commissions by sourceId, or by beneficiaryActorId+beneficiaryActorType.
      description: >-
        beneficiaryActorId and beneficiaryActorType must be supplied
        together; supplying only one is rejected with 400.
      tags:
        - WltCod
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
        - name: sourceId
          in: query
          schema:
            type: string
        - name: beneficiaryActorId
          in: query
          schema:
            type: string
        - name: beneficiaryActorType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of commissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCommissionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/ledger/entries:
    post:
      operationId: appendWltLedgerEntry
      summary: Append an immutable ledger entry.
      description: >-
        Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless
        WLT_MUTATIONS_ENABLED=true; not enabled in the default runtime.
      x-bthwani-mutation-approved: false
      x-bthwani-default-enabled: false
      tags:
        - WltLedger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreateLedgerEntryRequest"
      responses:
        "201":
          description: Ledger entry appended.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltLedgerEntryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      operationId: listWltLedgerEntries
      summary: List ledger entries with optional filters and cursor pagination.
      tags:
        - WltLedger
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
        - name: actorId
          in: query
          schema:
            type: string
        - name: actorType
          in: query
          schema:
            type: string
            enum:
              - client
              - partner
              - captain
              - system
              - platform
              - field
        - name: orderId
          in: query
          schema:
            type: string
        - name: entryType
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of ledger entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltLedgerEntryListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/ledger/entries/{entryId}:
    get:
      operationId: getWltLedgerEntry
      summary: Get a ledger entry by ID.
      tags:
        - WltLedger
      parameters:
        - name: Authorization
          in: header
          required: true
          schema: { type: string }
        - name: X-Service-Caller
          in: header
          required: true
          schema:
            type: string
            enum: [dsh]
        - name: entryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ledger entry found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltLedgerEntryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payout-destinations/{partnerId}:
    put:
      operationId: upsertWltPayoutDestination
      summary: Create or replace active payout destination for a partner.
      description: Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless WLT_MUTATIONS_ENABLED=true.
      x-bthwani-mutation-approved: true
      x-bthwani-default-enabled: true
      tags:
        - WltPayoutDestinations
      parameters:
        - name: partnerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltUpsertPayoutDestinationRequest"
      responses:
        "201":
          description: Payout destination upserted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPayoutDestinationRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      operationId: getWltPayoutDestination
      summary: Get active payout destination for a partner.
      tags:
        - WltPayoutDestinations
      parameters:
        - name: partnerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payout destination found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPayoutDestinationRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payout-destinations/{partnerId}/deactivate:
    post:
      operationId: deactivateWltPayoutDestination
      summary: Deactivate active payout destination for a partner.
      description: Gated financial mutation. Returns 403 FEATURE_NOT_ENABLED unless WLT_MUTATIONS_ENABLED=true.
      x-bthwani-mutation-approved: true
      x-bthwani-default-enabled: true
      tags:
        - WltPayoutDestinations
      parameters:
        - name: partnerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Payout destination deactivated.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  responses:
    BadRequest:
      description: Invalid request parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WltApiError"
    Unauthorized:
      description: Service authorization is missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WltApiError"
    Forbidden:
      description: Caller is not allowed to perform this operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WltApiError"
    Conflict:
      description: Request conflicts with an existing idempotent operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WltApiError"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WltApiError"

  schemas:
    WltApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string

    WltHealthResponse:
      type: object
      required:
        - service
        - status
        - checkedAt
      properties:
        service:
          type: string
          const: wlt
        status:
          type: string
          enum:
            - healthy
        checkedAt:
          type: string
          format: date-time

    WltReadinessResponse:
      type: object
      required:
        - service
        - status
        - dependencies
        - checkedAt
      properties:
        service:
          type: string
          const: wlt
        status:
          type: string
          enum:
            - ready
            - not_ready
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum:
              - ready
              - degraded
              - down
              - not_configured
        checkedAt:
          type: string
          format: date-time

    WltPaymentStatusRef:
      type: object
      required:
        - id
        - orderId
        - status
        - updatedAt
      properties:
        id:
          type: string
        orderId:
          type: string
        status:
          type: string
          enum:
            - pending
            - authorized
            - captured
            - failed
            - refunded
            - partially_refunded
        updatedAt:
          type: string
          format: date-time

    WltSettlementStatusRef:
      type: object
      required:
        - id
        - orderId
        - status
        - updatedAt
      properties:
        id:
          type: string
        orderId:
          type: string
        status:
          type: string
          enum:
            - pending
            - processing
            - settled
            - failed
        updatedAt:
          type: string
          format: date-time

    WltRefundStatusRef:
      type: object
      required:
        - id
        - orderId
        - status
        - updatedAt
      properties:
        id:
          type: string
        orderId:
          type: string
        status:
          type: string
          enum:
            - none
            - requested
            - approved
            - completed
            - rejected
        updatedAt:
          type: string
          format: date-time

    WltWalletStatusRef:
      type: object
      required:
        - id
        - actorId
        - actorType
        - status
        - currency
        - updatedAt
      properties:
        id:
          type: string
        actorId:
          type: string
        actorType:
          type: string
          enum:
            - client
            - partner
            - captain
            - field
        status:
          type: string
          enum:
            - active
            - suspended
            - frozen
            - closed
        updatedAt:
          type: string
          format: date-time

    WltFieldCommissionRef:
      type: object
      required:
        - id
        - partnerId
        - partnerName
        - amountMinorUnits
        - currency
        - status
        - description
        - evidenceRequired
        - settledAt
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        partnerId:
          type: string
        partnerName:
          type: string
        amountMinorUnits:
          type: integer
          format: int64
        currency:
          type: string
        status:
          type: string
          enum:
            - eligible_pending_review
            - approved_pending_settlement
            - settled
            - held_for_evidence
            - rejected
        description:
          type: string
        evidenceRequired:
          type: boolean
        settledAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WltFieldCommissionRefResponse:
      type: object
      required:
        - reference
      properties:
        reference:
          $ref: "#/components/schemas/WltFieldCommissionRef"


    WltPaymentSession:
      type: object
      required:
        - id
        - checkoutIntentId
        - clientId
        - storeId
        - paymentMethod
        - status
        - providerReference
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        checkoutIntentId:
          type: string
        clientId:
          type: string
        storeId:
          type: string
        paymentMethod:
          type: string
          enum:
            - cod
            - wallet
            - mixed
            - official_wallet
        status:
          type: string
          enum:
            - reference_created
            - pending_provider
            - authorized
            - captured
            - cod_pending
            - cod_collected
            - failed
            - expired
            - provider_result_unknown
        providerReference:
          type: string
          description: Empty unless a future WLT-owned provider integration attaches an external reference.
        amountMinorUnits:
          type: integer
          format: int64
        currency:
          type: string
        capturedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WltCreatePaymentSessionRequest:
      type: object
      required:
        - checkoutIntentId
        - clientId
        - storeId
        - amountMinorUnits
        - currency
      properties:
        checkoutIntentId:
          type: string
        clientId:
          type: string
        storeId:
          type: string
        paymentMethod:
          type: string
          enum:
            - cod
            - wallet
            - mixed
            - official_wallet
        amountMinorUnits:
          type: integer
          format: int64
          minimum: 0
        currency:
          type: string
          default: YER
        cartSnapshotHash:
          type: string

    WltPaymentStatusRefResponse:
      type: object
      required:
        - reference
      properties:
        reference:
          $ref: "#/components/schemas/WltPaymentStatusRef"

    WltSettlementStatusRefResponse:
      type: object
      required:
        - reference
      properties:
        reference:
          $ref: "#/components/schemas/WltSettlementStatusRef"

    WltRefundStatusRefResponse:
      type: object
      required:
        - reference
      properties:
        reference:
          $ref: "#/components/schemas/WltRefundStatusRef"

    WltWalletResponse:
      type: object
      required:
        - wallet
      properties:
        wallet:
          $ref: "#/components/schemas/WltWallet"

    WltWallet:
      type: object
      required:
        - id
        - actorId
        - actorType
        - status
        - currency
        - availableBalanceMinorUnits
        - pendingBalanceMinorUnits
        - heldBalanceMinorUnits
        - earnedTotalMinorUnits
        - settledTotalMinorUnits
        - paidTotalMinorUnits
        - updatedAt
      properties:
        id: { type: string }
        actorId: { type: string }
        actorType: { type: string }
        status: { type: string }
        currency: { type: string }
        availableBalanceMinorUnits: { type: integer, format: int64 }
        pendingBalanceMinorUnits: { type: integer, format: int64 }
        heldBalanceMinorUnits: { type: integer, format: int64 }
        earnedTotalMinorUnits: { type: integer, format: int64 }
        settledTotalMinorUnits: { type: integer, format: int64 }
        paidTotalMinorUnits: { type: integer, format: int64 }
        lastLedgerEntryAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    WltCreatePayoutRequest:
      type: object
      required: [beneficiaryActorId, beneficiaryActorType, amountMinorUnits, currency, idempotencyKey]
      properties:
        beneficiaryActorId: { type: string }
        beneficiaryActorType: { type: string }
        amountMinorUnits: { type: integer, format: int64 }
        currency: { type: string }
        idempotencyKey: { type: string }

    WltPayoutRequestResponse:
      type: object
      required: [payoutRequest]
      properties:
        payoutRequest:
          $ref: "#/components/schemas/WltPayoutRequest"

    WltPayoutRequestListResponse:
      type: object
      required: [payoutRequests, total]
      properties:
        payoutRequests:
          type: array
          items:
            $ref: "#/components/schemas/WltPayoutRequest"
        total: { type: integer }

    WltPayoutRequest:
      type: object
      required:
        - id
        - beneficiaryActorId
        - beneficiaryActorType
        - amountMinorUnits
        - currency
        - status
        - requestedAt
      properties:
        id: { type: string }
        beneficiaryActorId: { type: string }
        beneficiaryActorType: { type: string }
        amountMinorUnits: { type: integer, format: int64 }
        currency: { type: string }
        status: { type: string }
        requestedAt: { type: string, format: date-time }
        approvedAt: { type: string, format: date-time }
        rejectedAt: { type: string, format: date-time }
        processedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        failedAt: { type: string, format: date-time }
        failureReason: { type: string }

    WltWalletStatusRefResponse:
      type: object
      required:
        - reference
      properties:
        reference:
          $ref: "#/components/schemas/WltWalletStatusRef"

    WltPaymentSessionResponse:
      type: object
      required:
        - paymentSession
      properties:
        paymentSession:
          $ref: "#/components/schemas/WltPaymentSession"

    WltAuthorizePaymentSessionRequest:
      type: object
      description: >-
        Intentionally empty: the amount/currency to authorize are always
        read from the payment session's own row (set at reference-creation
        time), never from the request body -- this prevents amount
        tampering by the caller. Any body is ignored.
      properties: {}

    WltCapturePaymentSessionResponse:
      type: object
      required:
        - paymentSession
      properties:
        paymentSession:
          $ref: "#/components/schemas/WltPaymentSession"

    WltRefund:
      type: object
      required:
        - id
        - paymentSessionId
        - orderId
        - clientId
        - amountMinorUnits
        - currency
        - reason
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        paymentSessionId:
          type: string
        orderId:
          type: string
        clientId:
          type: string
        amountMinorUnits:
          type: integer
          format: int64
        currency:
          type: string
        reason:
          type: string
        status:
          type: string
          enum:
            - requested
            - approved
            - processing
            - completed
            - rejected
            - reversed
        resolvedAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WltCreateRefundRequest:
      type: object
      description: >-
        amountMinorUnits/currency are intentionally not accepted here -- the
        refunded amount is always derived from the referenced payment
        session's own row, never from caller input, to prevent amount
        tampering. The session must be captured or cod_collected.
