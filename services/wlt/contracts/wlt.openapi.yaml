openapi: 3.1.0
info:
  title: BThwani WLT Service API
  version: 0.2.0
  description: Wallet and financial ledger service. Read-only reference endpoints for DSH surface consumption. No mutation endpoints exposed.

x-bthwani-owner: services/wlt
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: ENABLED
x-bthwani-runtime-dependency: true
x-bthwani-financial-owner: true

paths:
  /wlt/health:
    get:
      operationId: getWltHealth
      summary: Return WLT liveness state.
      tags:
        - WltSystem
      responses:
        "200":
          description: WLT process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltHealthResponse"

  /wlt/readiness:
    get:
      operationId: getWltReadiness
      summary: Return WLT readiness state.
      tags:
        - WltSystem
      responses:
        "200":
          description: WLT dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltReadinessResponse"
        "503":
          description: WLT is not ready.

  /wlt/references/payment-status:
    get:
      operationId: getWltPaymentStatusRef
      summary: Return payment status reference for a given orderId. Read-only display surface for DSH.
      tags:
        - WltReferences
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment status reference found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentStatusRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/references/settlement-status:
    get:
      operationId: getWltSettlementStatusRef
      summary: Return settlement status reference for a given orderId. Read-only display surface for DSH.
      tags:
        - WltReferences
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Settlement status reference found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementStatusRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/references/refund-status:
    get:
      operationId: getWltRefundStatusRef
      summary: Return refund status reference for a given orderId. Read-only display surface for DSH.
      tags:
        - WltReferences
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund status reference found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundStatusRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/references/wallet-status:
    get:
      operationId: getWltWalletStatusRef
      summary: Return wallet status reference for a given actor. Read-only display surface for DSH.
      tags:
        - WltReferences
      parameters:
        - name: actorId
          in: query
          required: true
          schema:
            type: string
        - name: actorType
          in: query
          required: true
          schema:
            type: string
            enum:
              - client
              - partner
              - captain
              - field
      responses:
        "200":
          description: Wallet status reference found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltWalletStatusRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payment-sessions:
    post:
      operationId: createWltPaymentSessionReference
      summary: Create a WLT-owned payment-session reference for DSH checkout handoff.
      description: Creates an opaque payment-session reference only. No wallet debit, ledger posting, provider capture, refund, or settlement occurs here.
      tags:
        - WltPaymentSessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreatePaymentSessionRequest"
      responses:
        "201":
          description: Payment-session reference created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/payment-sessions/{paymentSessionId}:
    get:
      operationId: getWltPaymentSessionReference
      summary: Read a WLT-owned payment-session reference.
      tags:
        - WltPaymentSessions
      parameters:
        - name: paymentSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment-session reference.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  responses:
    BadRequest:
      description: Invalid request parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WltApiError"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WltApiError"

  schemas:
    WltApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string

    WltHealthResponse:
      type: object
      required:
        - service
        - status
        - checkedAt
      properties:
        service:
          type: string
          const: wlt
        status:
          type: string
          enum:
            - healthy
        checkedAt:
          type: string
          format: date-time

    WltReadinessResponse:
      type: object
      required:
        - service
        - status
        - dependencies
        - checkedAt
      properties:
        service:
          type: string
          const: wlt
        status:
          type: string
          enum:
            - ready
            - not_ready
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum:
              - ready
              - degraded
              - down
              - not_configured
        checkedAt:
          type: string
          format: date-time

    WltPaymentStatusRef:
      type: object
      required:
        - id
        - orderId
        - status
        - updatedAt
      properties:
        id:
          type: string
        orderId:
          type: string
        status:
          type: string
          enum:
            - pending
            - authorized
            - captured
            - failed
            - refunded
            - partially_refunded
        updatedAt:
          type: string
          format: date-time

    WltSettlementStatusRef:
      type: object
      required:
        - id
        - orderId
        - status
        - updatedAt
      properties:
        id:
          type: string
        orderId:
          type: string
        status:
          type: string
          enum:
            - pending
            - processing
            - settled
            - failed
        updatedAt:
          type: string
          format: date-time

    WltRefundStatusRef:
      type: object
      required:
        - id
        - orderId
        - status
        - updatedAt
      properties:
        id:
          type: string
        orderId:
          type: string
        status:
          type: string
          enum:
            - none
            - requested
            - approved
            - completed
            - rejected
        updatedAt:
          type: string
          format: date-time

    WltWalletStatusRef:
      type: object
      required:
        - id
        - actorId
        - actorType
        - status
        - currency
        - updatedAt
      properties:
        id:
          type: string
        actorId:
          type: string
        actorType:
          type: string
          enum:
            - client
            - partner
            - captain
            - field
        status:
          type: string
          enum:
            - active
            - suspended
            - frozen
            - closed
        currency:
          type: string
        updatedAt:
          type: string
          format: date-time

    WltPaymentSession:
      type: object
      required:
        - id
        - checkoutIntentId
        - clientId
        - storeId
        - paymentMethod
        - status
        - providerReference
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        checkoutIntentId:
          type: string
        clientId:
          type: string
        storeId:
          type: string
        paymentMethod:
          type: string
          enum:
            - cod
            - wallet
            - mixed
            - official_wallet
        status:
          type: string
          enum:
            - reference_created
            - pending_provider
            - failed
            - expired
        providerReference:
          type: string
          description: Empty unless a future WLT-owned provider integration attaches an external reference.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WltCreatePaymentSessionRequest:
      type: object
      required:
        - checkoutIntentId
        - clientId
        - storeId
      properties:
        checkoutIntentId:
          type: string
        clientId:
          type: string
        storeId:
          type: string
        paymentMethod:
          type: string
          enum:
            - cod
            - wallet
            - mixed
            - official_wallet

    WltPaymentStatusRefResponse:
      type: object
      required:
        - reference
      properties:
        reference:
          $ref: "#/components/schemas/WltPaymentStatusRef"

    WltSettlementStatusRefResponse:
      type: object
      required:
        - reference
      properties:
        reference:
          $ref: "#/components/schemas/WltSettlementStatusRef"

    WltRefundStatusRefResponse:
      type: object
      required:
        - reference
      properties:
        reference:
          $ref: "#/components/schemas/WltRefundStatusRef"

    WltWalletStatusRefResponse:
      type: object
      required:
        - reference
      properties:
        reference:
          $ref: "#/components/schemas/WltWalletStatusRef"

    WltPaymentSessionResponse:
      type: object
      required:
        - paymentSession
      properties:
        paymentSession:
          $ref: "#/components/schemas/WltPaymentSession"
