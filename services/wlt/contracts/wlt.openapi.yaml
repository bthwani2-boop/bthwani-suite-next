openapi: 3.1.0
info:
  title: BThwani WLT Service API
  version: 0.2.0
  description: WLT owns wallet and financial mutation endpoints. DSH and frontend surfaces must not call external financial providers directly.

x-bthwani-owner: services/wlt
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: ENABLED
x-bthwani-runtime-dependency: true
x-bthwani-financial-owner: true

paths:
  /wlt/health:
    get:
      operationId: getWltHealth
      summary: Return WLT liveness state.
      tags:
        - WltSystem
      responses:
        "200":
          description: WLT process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltHealthResponse"

  /wlt/readiness:
    get:
      operationId: getWltReadiness
      summary: Return WLT readiness state.
      tags:
        - WltSystem
      responses:
        "200":
          description: WLT dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltReadinessResponse"
        "503":
          description: WLT is not ready.

  /wlt/references/payment-status:
    get:
      operationId: getWltPaymentStatusRef
      summary: Return payment status reference for a given orderId. Read-only display surface for DSH.
      tags:
        - WltReferences
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment status reference found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentStatusRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/references/settlement-status:
    get:
      operationId: getWltSettlementStatusRef
      summary: Return settlement status reference for a given orderId. Read-only display surface for DSH.
      tags:
        - WltReferences
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Settlement status reference found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementStatusRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/references/refund-status:
    get:
      operationId: getWltRefundStatusRef
      summary: Return refund status reference for a given orderId. Read-only display surface for DSH.
      tags:
        - WltReferences
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund status reference found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundStatusRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/references/wallet-status:
    get:
      operationId: getWltWalletStatusRef
      summary: Return wallet status reference for a given actor. Read-only display surface for DSH.
      tags:
        - WltReferences
      parameters:
        - name: actorId
          in: query
          required: true
          schema:
            type: string
        - name: actorType
          in: query
          required: true
          schema:
            type: string
            enum:
              - client
              - partner
              - captain
              - field
      responses:
        "200":
          description: Wallet status reference found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltWalletStatusRefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payment-sessions:
    post:
      operationId: createWltPaymentSessionReference
      summary: Create a WLT-owned payment-session reference for DSH checkout handoff.
      description: Creates an opaque payment-session reference only. No wallet debit, ledger posting, provider capture, refund, or settlement occurs here.
      tags:
        - WltPaymentSessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreatePaymentSessionRequest"
      responses:
        "201":
          description: Payment-session reference created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/payment-sessions/{paymentSessionId}:
    get:
      operationId: getWltPaymentSessionReference
      summary: Read a WLT-owned payment-session reference.
      tags:
        - WltPaymentSessions
      parameters:
        - name: paymentSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment-session reference.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payment-sessions/{paymentSessionId}/authorize:
    post:
      operationId: authorizeWltPaymentSession
      summary: Authorize a payment session with an amount.
      tags:
        - WltPaymentSessions
      parameters:
        - name: paymentSessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltAuthorizePaymentSessionRequest"
      responses:
        "200":
          description: Payment session authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payment-sessions/{paymentSessionId}/capture:
    post:
      operationId: captureWltPaymentSession
      summary: Capture an authorized payment session.
      tags:
        - WltPaymentSessions
      parameters:
        - name: paymentSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment session captured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCapturePaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payment-sessions/{paymentSessionId}/expire:
    post:
      operationId: expireWltPaymentSession
      summary: Expire a payment session.
      tags:
        - WltPaymentSessions
      parameters:
        - name: paymentSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment session expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/payment-sessions/{paymentSessionId}/cod-collect:
    post:
      operationId: markWltCodCollected
      summary: Mark a COD payment session as collected.
      tags:
        - WltPaymentSessions
      parameters:
        - name: paymentSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: COD payment session marked as collected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltPaymentSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/refunds:
    post:
      operationId: createWltRefund
      summary: Create a refund for a captured payment session.
      tags:
        - WltRefunds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreateRefundRequest"
      responses:
        "201":
          description: Refund created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      operationId: listWltRefunds
      summary: List refunds by orderId or clientId.
      tags:
        - WltRefunds
      parameters:
        - name: orderId
          in: query
          schema:
            type: string
        - name: clientId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of refunds.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/refunds/{refundId}:
    get:
      operationId: getWltRefund
      summary: Get a refund by ID.
      tags:
        - WltRefunds
      parameters:
        - name: refundId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/refunds/{refundId}/approve:
    post:
      operationId: approveWltRefund
      summary: Approve a requested refund.
      tags:
        - WltRefunds
      parameters:
        - name: refundId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund approved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/refunds/{refundId}/complete:
    post:
      operationId: completeWltRefund
      summary: Complete an approved refund.
      tags:
        - WltRefunds
      parameters:
        - name: refundId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/refunds/{refundId}/reject:
    post:
      operationId: rejectWltRefund
      summary: Reject a refund.
      tags:
        - WltRefunds
      parameters:
        - name: refundId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltRefundResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/settlements:
    post:
      operationId: createWltSettlement
      summary: Create a partner settlement record.
      tags:
        - WltSettlements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreateSettlementRequest"
      responses:
        "201":
          description: Settlement created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      operationId: listWltSettlements
      summary: List settlements by partnerId.
      tags:
        - WltSettlements
      parameters:
        - name: partnerId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of settlements.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/settlements/summary:
    get:
      operationId: getWltSettlementSummary
      summary: Get aggregated settlement summary for a partner over a period.
      tags:
        - WltSettlements
      parameters:
        - name: partnerId
          in: query
          required: true
          schema:
            type: string
        - name: periodStart
          in: query
          schema:
            type: string
            format: date
        - name: periodEnd
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Settlement summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementSummaryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/settlements/{settlementId}:
    get:
      operationId: getWltSettlement
      summary: Get a settlement by ID.
      tags:
        - WltSettlements
      parameters:
        - name: settlementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Settlement found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/settlements/{settlementId}/post:
    post:
      operationId: postWltSettlement
      summary: Post (settle) a pending settlement.
      tags:
        - WltSettlements
      parameters:
        - name: settlementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Settlement posted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltSettlementResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/cod-records:
    post:
      operationId: createWltCodRecord
      summary: Create a COD record for an order.
      tags:
        - WltCod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreateCodRecordRequest"
      responses:
        "201":
          description: COD record created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCodRecordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      operationId: listWltCodRecords
      summary: List COD records by captainId or partnerId.
      tags:
        - WltCod
      parameters:
        - name: captainId
          in: query
          schema:
            type: string
        - name: partnerId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of COD records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCodRecordListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/cod-records/{codRecordId}:
    get:
      operationId: getWltCodRecord
      summary: Get a COD record by ID.
      tags:
        - WltCod
      parameters:
        - name: codRecordId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: COD record found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCodRecordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/cod-records/{codRecordId}/collect:
    post:
      operationId: collectWltCod
      summary: Mark a COD record as collected.
      tags:
        - WltCod
      parameters:
        - name: codRecordId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: COD record marked as collected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCodRecordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/cod-records/{codRecordId}/remit:
    post:
      operationId: remitWltCod
      summary: Mark a COD record as remitted.
      tags:
        - WltCod
      parameters:
        - name: codRecordId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: COD record marked as remitted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCodRecordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /wlt/commissions:
    post:
      operationId: createWltCommission
      summary: Create a commission record.
      tags:
        - WltCod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreateCommissionRequest"
      responses:
        "201":
          description: Commission created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCommissionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      operationId: listWltCommissions
      summary: List commissions by orderId or captainId.
      tags:
        - WltCod
      parameters:
        - name: orderId
          in: query
          schema:
            type: string
        - name: captainId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of commissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltCommissionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/ledger/entries:
    post:
      operationId: appendWltLedgerEntry
      summary: Append an immutable ledger entry.
      tags:
        - WltLedger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WltCreateLedgerEntryRequest"
      responses:
        "201":
          description: Ledger entry appended.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltLedgerEntryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      operationId: listWltLedgerEntries
      summary: List ledger entries with optional filters and cursor pagination.
      tags:
        - WltLedger
      parameters:
        - name: actorId
          in: query
          schema:
            type: string
        - name: actorType
          in: query
          schema:
            type: string
            enum:
              - client
              - partner
              - captain
              - system
              - platform
        - name: orderId
          in: query
          schema:
            type: string
        - name: entryType
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of ledger entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltLedgerEntryListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /wlt/ledger/entries/{entryId}:
    get:
      operationId: getWltLedgerEntry
      summary: Get a ledger entry by ID.
      tags:
        - WltLedger
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ledger entry found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltLedgerEntryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  responses:
    BadRequest:
      description: Invalid request parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WltApiError"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WltApiError"

  schemas:
    WltApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string

    WltHealthResponse:
      type: object
      required:
        - service
        - status
        - checkedAt
      properties:
        service:
          type: string
          const: wlt
        status:
          type: string
          enum:
            - healthy
        checkedAt:
          type: string
          format: date-time

    WltReadinessResponse:
      type: object
      required:
        - service
        - status
        - dependencies
        - checkedAt
      properties:
        service:
          type: string
          const: wlt
        status:
          type: string
          enum:
            - ready
            - not_ready
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum:
              - ready
              - degraded
              - down
              - not_configured
        checkedAt:
          type: string
          format: date-time

    WltPaymentStatusRef:
      type: object
      required:
        - id
        - orderId
        - status
        - updatedAt
      properties:
        id:
          type: string
        orderId:
          type: string
        status:
          type: string
          enum:
            - pending
            - authorized
            - captured
            - failed
            - refunded
            - partially_refunded
        updatedAt:
          type: string
          format: date-time

    WltSettlementStatusRef:
      type: object
      required:
        - id
        - orderId
        - status
        - updatedAt
      properties:
        id:
          type: string
        orderId:
          type: string
        status:
          type: string
          enum:
            - pending
            - processing
            - settled
            - failed
        updatedAt:
          type: string
          format: date-time

    WltRefundStatusRef:
      type: object
      required:
        - id
        - orderId
        - status
        - updatedAt
      properties:
        id:
          type: string
        orderId:
          type: string
        status:
          type: string
          enum:
            - none
            - requested
            - approved
            - completed
            - rejected
        updatedAt:
          type: string
          format: date-time

    WltWalletStatusRef:
      type: object
      required:
        - id
        - actorId
        - actorType
        - status
        - currency
        - updatedAt
      properties:
        id:
          type: string
        actorId:
          type: string
        actorType:
          type: string
          enum:
            - client
            - partner
            - captain
            - field
        status:
          type: string
          enum:
            - active
            - suspended
            - frozen
            - closed
        currency:
          type: string
        updatedAt:
          type: string
          format: date-time

    WltPaymentSession:
      type: object
      required:
        - id
        - checkoutIntentId
        - clientId
        - storeId
        - paymentMethod
        - status
        - providerReference
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        checkoutIntentId:
          type: string
        clientId:
          type: string
        storeId:
          type: string
        paymentMethod:
          type: string
          enum:
            - cod
            - wallet
            - mixed
            - official_wallet
        status:
          type: string
          enum:
            - reference_created
            - pending_provider
            - authorized
            - captured
            - cod_pending
            - cod_collected
            - failed
            - expired
        providerReference:
          type: string
          description: Empty unless a future WLT-owned provider integration attaches an external reference.
        amountMinorUnits:
          type: integer
          format: int64
        currency:
          type: string
        capturedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WltCreatePaymentSessionRequest:
      type: object
      required:
        - checkoutIntentId
        - clientId
        - storeId
      properties:
        checkoutIntentId:
          type: string
        clientId:
          type: string
        storeId:
          type: string
        paymentMethod:
          type: string
          enum:
            - cod
            - wallet
            - mixed
            - official_wallet

    WltPaymentStatusRefResponse:
      type: object
      required:
        - reference
      properties:
        reference:
