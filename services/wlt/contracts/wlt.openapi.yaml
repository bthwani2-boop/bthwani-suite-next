openapi: 3.1.0
info:
  title: BThwani WLT Service API
  version: 0.1.0
  description: Wallet and financial ledger service contract baseline. Foundation-007A defines health and readiness only; financial mutation endpoints are added only after WLT contract review.

x-bthwani-owner: services/wlt
x-bthwani-contract-state: CONTRACT_DRAFT
x-bthwani-client-generation: DISABLED_UNTIL_CONTRACT_ACTIVE
x-bthwani-runtime-dependency: false
x-bthwani-financial-owner: true

paths:
  /wlt/health:
    get:
      operationId: getWltHealth
      summary: Return WLT liveness state.
      tags:
        - WltSystem
      responses:
        "200":
          description: WLT process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltHealthResponse"

  /wlt/readiness:
    get:
      operationId: getWltReadiness
      summary: Return WLT readiness state.
      tags:
        - WltSystem
      responses:
        "200":
          description: WLT dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WltReadinessResponse"
        "503":
          description: WLT is not ready.

components:
  schemas:
    WltHealthResponse:
      type: object
      required:
        - service
        - status
        - checkedAt
      properties:
        service:
          type: string
          const: wlt
        status:
          type: string
          enum:
            - healthy
        checkedAt:
          type: string
          format: date-time

    WltReadinessResponse:
      type: object
      required:
        - service
        - status
        - dependencies
        - checkedAt
      properties:
        service:
          type: string
          const: wlt
        status:
          type: string
          enum:
            - ready
            - not_ready
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum:
              - ready
              - degraded
              - down
              - not_configured
        checkedAt:
          type: string
          format: date-time
