openapi: 3.1.0
info:
  title: DSH Governed Incident API
  version: 1.1.0
  description: >-
    Permission-scoped support incidents and sovereign operational interventions
    with retry-safe mutations, optimistic transitions, evidence references and
    append-only audit readback.
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-runtime-dependency: true
x-bthwani-generation: DISABLED
x-bthwani-client-binding: MANUAL_TYPED_ADAPTER
servers:
  - url: http://localhost:58080
security:
  - bearerAuth: []
paths:
  /dsh/operator/support/incidents:
    get:
      operationId: listDshGovernedIncidents
      parameters:
        - name: status
          in: query
          required: false
          schema: { $ref: '#/components/schemas/IncidentStatus' }
      responses:
        '200': { $ref: '#/components/responses/IncidentList' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
    post:
      operationId: createDshGovernedIncident
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateIncidentInput' }
      responses:
        '201': { $ref: '#/components/responses/Incident' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /dsh/operator/support/incidents/{incidentId}:
    parameters:
      - $ref: '#/components/parameters/IncidentId'
    get:
      operationId: getDshGovernedIncident
      responses:
        '200': { $ref: '#/components/responses/Incident' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
    patch:
      operationId: updateDshGovernedIncident
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateIncidentInput' }
      responses:
        '200': { $ref: '#/components/responses/Incident' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /dsh/operator/support/incidents/{incidentId}/events:
    parameters:
      - $ref: '#/components/parameters/IncidentId'
    get:
      operationId: listDshGovernedIncidentEvents
      responses:
        '200':
          description: Append-only incident audit events.
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/IncidentEvent' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }

  /dsh/operator/operational-incidents:
    get:
      operationId: listDshOperationalIncidents
      parameters:
        - { name: orderId, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, required: false, schema: { type: integer, minimum: 0 } }
      responses:
        '200': { $ref: '#/components/responses/OperationalIncidentList' }
        '403': { $ref: '#/components/responses/Error' }
    post:
      operationId: reportDshOperationalIncident
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReportOperationalIncidentInput' }
      responses:
        '200': { $ref: '#/components/responses/OperationalIncident' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '422': { $ref: '#/components/responses/Error' }
  /dsh/operator/operational-incidents/{incidentId}:
    get:
      operationId: getDshOperationalIncident
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      responses:
        '200': { $ref: '#/components/responses/OperationalIncident' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IncidentId:
      name: incidentId
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1, maxLength: 200 }
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema: { type: string, minLength: 1, maxLength: 200 }
  schemas:
    IncidentStatus:
      type: string
      enum: [open, monitoring, resolved]
    IncidentSeverity:
      type: string
      enum: [low, medium, high, critical]
    IncidentScope:
      type: string
      enum: [delivery, stores, payments, platform, unknown]
    CreateIncidentInput:
      type: object
      required: [title, description, severity]
      properties:
        title: { type: string, minLength: 3, maxLength: 160 }
        description: { type: string, minLength: 5, maxLength: 4000 }
        severity: { $ref: '#/components/schemas/IncidentSeverity' }
        affectedScope: { $ref: '#/components/schemas/IncidentScope' }
    UpdateIncidentInput:
      type: object
      required: [expectedStatus, status]
      properties:
        expectedStatus: { $ref: '#/components/schemas/IncidentStatus' }
        status: { $ref: '#/components/schemas/IncidentStatus' }
        postmortemUrl: { type: string, maxLength: 1000 }
    Incident:
      type: object
      required: [id, title, description, severity, status, affectedScope, raisedBy, postmortemUrl, createdAt, updatedAt]
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        severity: { $ref: '#/components/schemas/IncidentSeverity' }
        status: { $ref: '#/components/schemas/IncidentStatus' }
        affectedScope: { $ref: '#/components/schemas/IncidentScope' }
        raisedBy: { type: string }
        resolvedBy: { type: string }
        resolvedAt: { type: [string, 'null'], format: date-time }
        postmortemUrl: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    IncidentEvent:
      type: object
      required: [id, incidentId, actorId, eventType, toStatus, correlationId, createdAt]
      properties:
        id: { type: string }
        incidentId: { type: string }
        actorId: { type: string }
        eventType:
          type: string
          enum: [created, monitoring_started, reopened, resolved, status_changed]
        fromStatus:
          oneOf:
            - { $ref: '#/components/schemas/IncidentStatus' }
            - { type: string, maxLength: 0 }
        toStatus: { $ref: '#/components/schemas/IncidentStatus' }
        correlationId: { type: string }
        createdAt: { type: string, format: date-time }
    OperationalIncidentType:
      type: string
      enum: [cancel, suspend, raise_exception]
    OperationalTargetEntityType:
      type: string
      enum: [partner_delivery_task, pickup_session, order]
    ReportOperationalIncidentInput:
      type: object
      additionalProperties: false
      required:
        - orderId
        - targetEntityType
        - targetEntityId
        - incidentType
        - reason
        - ticketReference
        - expectedVersion
      properties:
        orderId: { type: string, minLength: 1 }
        targetEntityType: { $ref: '#/components/schemas/OperationalTargetEntityType' }
        targetEntityId: { type: string, minLength: 1 }
        incidentType: { $ref: '#/components/schemas/OperationalIncidentType' }
        reason: { type: string, minLength: 1, maxLength: 2000 }
        ticketReference: { type: string, minLength: 1, maxLength: 256 }
        correlationId: { type: string, maxLength: 200 }
        expectedVersion: { type: integer, minimum: 0 }
        evidenceReferences:
          type: array
          maxItems: 20
          items: { type: string, minLength: 1, maxLength: 512 }
        reasonCode: { type: string, maxLength: 128 }
        reasonNote: { type: string, maxLength: 2000 }
    OperationalIncident:
      type: object
      additionalProperties: true
      required:
        - id
        - orderId
        - targetEntityType
        - targetEntityId
        - incidentType
        - status
        - reason
        - ticketReference
        - actorId
        - actorRole
        - correlationId
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        orderId: { type: string }
        targetEntityType: { $ref: '#/components/schemas/OperationalTargetEntityType' }
        targetEntityId: { type: string }
        incidentType: { $ref: '#/components/schemas/OperationalIncidentType' }
        status: { type: string }
        reason: { type: string }
        ticketReference: { type: string }
        actorId: { type: string }
        actorRole: { type: string }
        beforeState: { type: [object, 'null'], additionalProperties: true }
        afterState: { type: [object, 'null'], additionalProperties: true }
        failureReason: { type: [string, 'null'] }
        partnerNotified: { type: boolean }
        partnerNotifiedAt: { type: [string, 'null'], format: date-time }
        correlationId: { type: string }
        appliedAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
  responses:
    Incident:
      description: Operational support incident.
      content:
        application/json:
          schema:
            type: object
            required: [incident]
            properties:
              incident: { $ref: '#/components/schemas/Incident' }
    IncidentList:
      description: Operational support incidents.
      content:
        application/json:
          schema:
            type: object
            required: [incidents]
            properties:
              incidents:
                type: array
                items: { $ref: '#/components/schemas/Incident' }
    OperationalIncident:
      description: Sovereign operational intervention record.
      content:
        application/json:
          schema:
            type: object
            required: [incident]
            properties:
              incident: { $ref: '#/components/schemas/OperationalIncident' }
    OperationalIncidentList:
      description: Sovereign operational intervention records.
      content:
        application/json:
          schema:
            type: object
            required: [incidents]
            properties:
              incidents:
                type: array
                items: { $ref: '#/components/schemas/OperationalIncident' }
    Error:
      description: Governed error response.
      content:
        application/json:
          schema:
            type: object
            required: [code, message]
            properties:
              code: { type: string }
              message: { type: string }
