openapi: 3.1.0
info:
  title: DSH Governed Incident API
  version: 1.0.0
  description: Permission-scoped operational incidents with retry-safe mutations, optimistic transitions and append-only audit readback.
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-runtime-dependency: true
x-bthwani-generation: DISABLED
x-bthwani-client-binding: MANUAL_TYPED_ADAPTER
servers:
  - url: http://localhost:58080
security:
  - bearerAuth: []
paths:
  /dsh/operator/support/incidents:
    get:
      operationId: listDshGovernedIncidents
      parameters:
        - name: status
          in: query
          required: false
          schema: { $ref: '#/components/schemas/IncidentStatus' }
      responses:
        '200': { $ref: '#/components/responses/IncidentList' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
    post:
      operationId: createDshGovernedIncident
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateIncidentInput' }
      responses:
        '201': { $ref: '#/components/responses/Incident' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /dsh/operator/support/incidents/{incidentId}:
    parameters:
      - $ref: '#/components/parameters/IncidentId'
    get:
      operationId: getDshGovernedIncident
      responses:
        '200': { $ref: '#/components/responses/Incident' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
    patch:
      operationId: updateDshGovernedIncident
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateIncidentInput' }
      responses:
        '200': { $ref: '#/components/responses/Incident' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /dsh/operator/support/incidents/{incidentId}/events:
    parameters:
      - $ref: '#/components/parameters/IncidentId'
    get:
      operationId: listDshGovernedIncidentEvents
      responses:
        '200':
          description: Append-only incident audit events.
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/IncidentEvent' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IncidentId:
      name: incidentId
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1, maxLength: 200 }
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema: { type: string, minLength: 1, maxLength: 200 }
  schemas:
    IncidentStatus:
      type: string
      enum: [open, monitoring, resolved]
    IncidentSeverity:
      type: string
      enum: [low, medium, high, critical]
    IncidentScope:
      type: string
      enum: [delivery, stores, payments, platform, unknown]
    CreateIncidentInput:
      type: object
      required: [title, description, severity]
      properties:
        title: { type: string, minLength: 3, maxLength: 160 }
        description: { type: string, minLength: 5, maxLength: 4000 }
        severity: { $ref: '#/components/schemas/IncidentSeverity' }
        affectedScope: { $ref: '#/components/schemas/IncidentScope' }
    UpdateIncidentInput:
      type: object
      required: [expectedStatus, status]
      properties:
        expectedStatus: { $ref: '#/components/schemas/IncidentStatus' }
        status: { $ref: '#/components/schemas/IncidentStatus' }
        postmortemUrl: { type: string, maxLength: 1000 }
    Incident:
      type: object
      required: [id, title, description, severity, status, affectedScope, raisedBy, postmortemUrl, createdAt, updatedAt]
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        severity: { $ref: '#/components/schemas/IncidentSeverity' }
        status: { $ref: '#/components/schemas/IncidentStatus' }
        affectedScope: { $ref: '#/components/schemas/IncidentScope' }
        raisedBy: { type: string }
        resolvedBy: { type: string }
        resolvedAt: { type: [string, 'null'], format: date-time }
        postmortemUrl: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    IncidentEvent:
      type: object
      required: [id, incidentId, actorId, eventType, toStatus, correlationId, createdAt]
      properties:
        id: { type: string }
        incidentId: { type: string }
        actorId: { type: string }
        eventType:
          type: string
          enum: [created, monitoring_started, reopened, resolved, status_changed]
        fromStatus:
          oneOf:
            - { $ref: '#/components/schemas/IncidentStatus' }
            - { type: string, maxLength: 0 }
        toStatus: { $ref: '#/components/schemas/IncidentStatus' }
        correlationId: { type: string }
        createdAt: { type: string, format: date-time }
  responses:
    Incident:
      description: Operational incident.
      content:
        application/json:
          schema:
            type: object
            required: [incident]
            properties:
              incident: { $ref: '#/components/schemas/Incident' }
    IncidentList:
      description: Operational incidents.
      content:
        application/json:
          schema:
            type: object
            required: [incidents]
            properties:
              incidents:
                type: array
                items: { $ref: '#/components/schemas/Incident' }
    Error:
      description: Governed error response.
      content:
        application/json:
          schema:
            type: object
            required: [code, message]
            properties:
              code: { type: string }
              message: { type: string }
