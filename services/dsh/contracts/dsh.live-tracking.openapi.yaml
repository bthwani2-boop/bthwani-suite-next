openapi: 3.1.0
info:
  title: BThwani DSH Captain Live Tracking API
  version: 1.0.0
  description: >
    Canonical JRN-017 contract for trusted foreground captain location, privacy-aware
    client tracking, partner reference-only readback, and operator tracking alerts.
    DSH owns operational truth; Providers owns route computation; no financial mutation is allowed.
x-bthwani-owner: services/dsh
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: DISABLED
x-bthwani-client-binding: STANDALONE_MANUAL_TYPED_ADAPTER
x-bthwani-adapter-owner: frontend/shared/dispatch
x-bthwani-runtime-dependency: true

paths:
  /dsh/captain/dispatch/assignments/{assignmentId}/location:
    post:
      operationId: pushTrustedCaptainDispatchLocation
      tags: [DshLiveTracking]
      summary: Store the authenticated captain's latest trusted foreground sample only.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrustedLocationInput' }
      responses:
        '200':
          description: Sample accepted or exact latest-sample replay returned idempotently.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DispatchAssignmentResponse' }
        '400': { $ref: '#/components/responses/InvalidRequest' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnacceptableLocation' }
        '429': { $ref: '#/components/responses/TooFrequent' }

  /dsh/client/orders/{orderId}/tracking:
    get:
      operationId: getClientPrivacyAwareLiveTracking
      tags: [DshLiveTracking]
      summary: Read assignment state, rounded delivery-window location, freshness, and governed ETA.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Client-owned order tracking projection returned.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientLiveTrackingResponse' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /dsh/partner/orders/{orderId}/dispatch-tracking:
    get:
      operationId: getPartnerDispatchTrackingReference
      tags: [DshLiveTracking]
      summary: Read delivery state and ETA reference without captain coordinates or mutations.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Partner-owned order reference projection returned with no location coordinates.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PartnerTrackingResponse' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /dsh/operator/dispatch/tracking-alerts:
    get:
      operationId: listOperatorDispatchTrackingAlerts
      tags: [DshLiveTracking]
      summary: List accepted non-terminal assignments whose trusted location is missing, stale, or lost.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current tracking alerts returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [alerts, total]
                properties:
                  alerts:
                    type: array
                    items: { $ref: '#/components/schemas/TrackingAlert' }
                  total: { type: integer, minimum: 0 }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrderId:
      name: orderId
      in: path
      required: true
      schema: { type: string, format: uuid }

  schemas:
    TrustedLocationInput:
      type: object
      additionalProperties: false
      required: [latitude, longitude, accuracyMeters, recordedAt]
      properties:
        latitude: { type: number, format: double, minimum: -90, maximum: 90 }
        longitude: { type: number, format: double, minimum: -180, maximum: 180 }
        accuracyMeters: { type: number, format: double, exclusiveMinimum: 0, maximum: 100 }
        recordedAt: { type: string, format: date-time }

    DeliveryStatus:
      type: string
      enum: [assigned, driver_assigned, driver_arrived_store, picked_up, arrived_customer, returning_to_store, return_arrived_store, returned_to_store, delivered, cancelled]

    DeliveryProjection:
      type: object
      additionalProperties: true
      required: [status]
      properties:
        status: { $ref: '#/components/schemas/DeliveryStatus' }
        updatedAt: { type: string, format: date-time }

    DispatchAssignment:
      type: object
      additionalProperties: true
      required: [id, orderId, captainId, status, delivery, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        orderId: { type: string }
        captainId: { type: string }
        status: { type: string, enum: [offered, accepted, declined, completed, cancelled] }
        lastLatitude: { type: [number, 'null'], minimum: -90, maximum: 90 }
        lastLongitude: { type: [number, 'null'], minimum: -180, maximum: 180 }
        locationRecordedAt: { type: [string, 'null'], format: date-time }
        delivery: { $ref: '#/components/schemas/DeliveryProjection' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PartnerDispatchReference:
      type: object
      additionalProperties: false
      required: [id, orderId, status, delivery, updatedAt]
      properties:
        id: { type: string, format: uuid }
        orderId: { type: string }
        status: { type: string }
        responseDeadlineAt: { type: [string, 'null'], format: date-time }
        acceptedAt: { type: [string, 'null'], format: date-time }
        completedAt: { type: [string, 'null'], format: date-time }
        delivery: { $ref: '#/components/schemas/DeliveryProjection' }
        updatedAt: { type: string, format: date-time }

    TrackingLocation:
      type: object
      additionalProperties: false
      required: [latitude, longitude, recordedAt, freshnessState, ageSeconds]
      properties:
        latitude: { type: number, format: double, minimum: -90, maximum: 90, description: Rounded to privacy-preserving precision. }
        longitude: { type: number, format: double, minimum: -180, maximum: 180, description: Rounded to privacy-preserving precision. }
        recordedAt: { type: string, format: date-time }
        freshnessState: { type: string, enum: [fresh, stale, lost] }
        ageSeconds: { type: integer, minimum: 0 }

    TrackingEta:
      type: object
      additionalProperties: false
      required: [providerCode, distanceMeters, durationSeconds, estimatedArrivalAt, computedAt]
      properties:
        providerCode: { type: string, minLength: 1 }
        distanceMeters: { type: integer, minimum: 0 }
        durationSeconds: { type: integer, minimum: 0 }
        estimatedArrivalAt: { type: string, format: date-time }
        computedAt: { type: string, format: date-time }

    LiveTrackingProjection:
      type: object
      additionalProperties: false
      required: [locationVisibility, location, eta, routeState]
      properties:
        locationVisibility: { type: string, enum: [hidden_until_pickup, delivery_window_rounded] }
        location: { anyOf: [{ $ref: '#/components/schemas/TrackingLocation' }, { type: 'null' }] }
        eta: { anyOf: [{ $ref: '#/components/schemas/TrackingEta' }, { type: 'null' }] }
        routeState: { type: string, enum: [not_applicable, awaiting_location, location_lost, destination_unavailable, provider_unavailable, ready, arrived] }

    DispatchAssignmentResponse:
      type: object
      additionalProperties: false
      required: [assignment]
      properties:
        assignment: { $ref: '#/components/schemas/DispatchAssignment' }

    ClientLiveTrackingResponse:
      type: object
      additionalProperties: false
      required: [assignment, tracking]
      properties:
        assignment: { $ref: '#/components/schemas/DispatchAssignment' }
        tracking: { $ref: '#/components/schemas/LiveTrackingProjection' }

    PartnerTrackingResponse:
      type: object
      additionalProperties: false
      required: [assignment, tracking]
      properties:
        assignment: { $ref: '#/components/schemas/PartnerDispatchReference' }
        tracking: { $ref: '#/components/schemas/LiveTrackingProjection' }

    TrackingAlert:
      type: object
      additionalProperties: false
      required: [assignmentId, orderId, captainId, severity, code, message]
      properties:
        assignmentId: { type: string, format: uuid }
        orderId: { type: string }
        captainId: { type: string }
        severity: { type: string, enum: [warning, critical] }
        code: { type: string, enum: [LOCATION_NOT_RECEIVED, LOCATION_stale, LOCATION_lost] }
        ageSeconds: { type: integer, minimum: 0 }
        message: { type: string }

    DshError:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

  responses:
    InvalidRequest:
      description: Request payload or timestamp is invalid.
      content: { application/json: { schema: { $ref: '#/components/schemas/DshError' } } }
    Unauthenticated:
      description: Authentication is required.
      content: { application/json: { schema: { $ref: '#/components/schemas/DshError' } } }
    Forbidden:
      description: Actor scope or permission does not allow this operation.
      content: { application/json: { schema: { $ref: '#/components/schemas/DshError' } } }
    NotFound:
      description: Assignment or owned order was not found.
      content: { application/json: { schema: { $ref: '#/components/schemas/DshError' } } }
    Conflict:
      description: Location sequence or replay payload conflicts with the stored latest sample.
      content: { application/json: { schema: { $ref: '#/components/schemas/DshError' } } }
    UnacceptableLocation:
      description: Sample is stale, future-dated, or insufficiently accurate.
      content: { application/json: { schema: { $ref: '#/components/schemas/DshError' } } }
    TooFrequent:
      description: Location samples must respect the configured minimum interval.
      content: { application/json: { schema: { $ref: '#/components/schemas/DshError' } } }
