# @paths
  /dsh/partner/order-workboard:
    get:
      operationId: getDshPartnerOrderWorkboard
      summary: Return actor-scoped partner orders with server-authoritative executable actions.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          required: false
          description: Optional exact lifecycle status. Omit to return the complete store workboard.
          schema:
            $ref: "#/components/schemas/DshOrderStatus"
      responses:
        "200":
          description: Actor-scoped partner workboard.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshPartnerOrderWorkboardResponse"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /dsh/orders/{orderId}/preparation:
    get:
      operationId: getDshOrderPreparation
      summary: Return governed preparation timing to an authorized client, partner, assigned captain, or operator.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Preparation timing returned.
          content:
            application/json:
              schema:
                type: object
                required: [preparation]
                properties:
                  preparation:
                    $ref: "#/components/schemas/DshOrderPreparation"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dsh/partner/orders/{orderId}/preparation-estimate:
    post:
      operationId: reviseDshPartnerOrderPreparationEstimate
      summary: Revise the remaining preparation estimate with an auditable reason.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshRevisePreparationEstimateInput"
      responses:
        "200":
          description: Preparation estimate revised.
          content:
            application/json:
              schema:
                type: object
                required: [preparation]
                properties:
                  preparation:
                    $ref: "#/components/schemas/DshOrderPreparation"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/orders/{orderId}/preparation-issues:
    get:
      operationId: listDshOrderPreparationIssues
      summary: List preparation issues for an authorized client, partner, assigned captain, or operator.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Preparation issues returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshPreparationIssueListResponse"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dsh/partner/orders/{orderId}/preparation-issues:
    post:
      operationId: createDshPartnerOrderPreparationIssue
      summary: Open a missing-item, substitution, quality, or order-level preparation issue.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshCreatePreparationIssueInput"
      responses:
        "201":
          description: Preparation issue opened.
          content:
            application/json:
              schema:
                type: object
                required: [issue]
                properties:
                  issue:
                    $ref: "#/components/schemas/DshPreparationIssue"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/client/orders/{orderId}/preparation-issues/{issueId}/decision:
    post:
      operationId: decideDshClientOrderPreparationIssue
      summary: Record the owning client's approval or rejection of a proposed substitution.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: issueId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshDecidePreparationIssueInput"
      responses:
        "200":
          description: Customer substitution decision recorded.
          content:
            application/json:
              schema:
                type: object
                required: [issue]
                properties:
                  issue:
                    $ref: "#/components/schemas/DshPreparationIssue"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/orders/{orderId}/preparation-issues/{issueId}/resolve:
    post:
      operationId: resolveDshPartnerOrderPreparationIssue
      summary: Resolve one open preparation issue after any required customer decision.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: issueId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshResolvePreparationIssueInput"
      responses:
        "200":
          description: Preparation issue resolved.
          content:
            application/json:
              schema:
                type: object
                required: [issue]
                properties:
                  issue:
                    $ref: "#/components/schemas/DshPreparationIssue"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/stores/{storeId}/order-preparation-policy:
    get:
      operationId: getDshPartnerStorePreparationPolicy
      summary: Return the authenticated store preparation policy.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: storeId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Store preparation policy returned.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy:
                    $ref: "#/components/schemas/DshStorePreparationPolicy"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: updateDshPartnerStorePreparationPolicy
      summary: Update the authenticated store preparation policy with version control.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: storeId
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshUpdateStorePreparationPolicyInput"
      responses:
        "200":
          description: Store preparation policy updated.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy:
                    $ref: "#/components/schemas/DshStorePreparationPolicy"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/operator/order-preparation/alerts/refresh:
    post:
      operationId: refreshDshOperatorOrderPreparationAlerts
      summary: Detect, open, and auto-resolve durable preparation alerts.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Preparation alert scan completed.
          content:
            application/json:
              schema:
                type: object
                required: [result]
                properties:
                  result:
                    $ref: "#/components/schemas/DshRefreshPreparationAlertsResult"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /dsh/operator/order-preparation/alerts:
    get:
      operationId: listDshOperatorOrderPreparationAlerts
      summary: List durable preparation alerts for operations.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DshPreparationAlertStatus"
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Preparation alerts returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshPreparationAlertListResponse"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /dsh/operator/order-preparation/alerts/{alertId}/acknowledge:
    post:
      operationId: acknowledgeDshOperatorOrderPreparationAlert
      summary: Acknowledge one active preparation alert using optimistic concurrency.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: alertId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshAcknowledgePreparationAlertInput"
      responses:
        "200":
          description: Preparation alert acknowledged.
          content:
            application/json:
              schema:
                type: object
                required: [alert]
                properties:
                  alert:
                    $ref: "#/components/schemas/DshPreparationAlert"
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

# @schemas
    DshPartnerOrderAction:
      type: string
      description: Server-authoritative action currently executable by the authenticated partner.
      enum: [accept, reject, prepare, ready, revise_estimate, report_issue, resolve_issue, handoff]

    DshPreparationSlaState:
      type: string
      enum: [not_started, on_track, due_soon, overdue, ready]

    DshOrderPreparation:
      type: object
      required:
        - orderId
        - estimatedPreparationMinutes
        - preparationWarningMinutes
        - preparationDelayReason
        - preparationEstimateRevisionCount
        - preparationSlaState
        - preparationRemainingSeconds
      properties:
        orderId: { type: string, format: uuid }
        acceptedAt: { type: string, format: date-time, nullable: true }
        preparationStartedAt: { type: string, format: date-time, nullable: true }
        estimatedReadyAt: { type: string, format: date-time, nullable: true }
        readyAt: { type: string, format: date-time, nullable: true }
        estimatedPreparationMinutes: { type: integer, minimum: 0, maximum: 180 }
        preparationWarningMinutes: { type: integer, minimum: 0, maximum: 60 }
        preparationDelayReason: { type: string }
        preparationEstimateRevisionCount: { type: integer, minimum: 0 }
        preparationSlaState:
          $ref: "#/components/schemas/DshPreparationSlaState"
        preparationRemainingSeconds: { type: integer, format: int64 }

    DshPreparationIssueKind:
      type: string
      enum: [missing_item, substitution_required, quality_issue, other]

    DshPreparationIssueStatus:
      type: string
      enum: [open, resolved]

    DshPreparationIssueCustomerDecision:
      type: string
      enum: [not_required, pending, approved, rejected]

    DshPreparationIssue:
      type: object
      required:
        - id
        - orderId
        - storeId
        - orderItemId
        - kind
        - status
        - affectedQuantity
        - note
        - replacementProductId
        - replacementProductName
        - customerDecision
        - customerDecidedByActorId
        - customerDecisionNote
        - openedByActorId
        - openedAt
        - resolvedByActorId
        - resolutionNote
        - version
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        storeId: { type: string }
        orderItemId:
          type: string
          description: Immutable order-item UUID for item-level issues; empty only for kind=other.
        kind:
          $ref: "#/components/schemas/DshPreparationIssueKind"
        status:
          $ref: "#/components/schemas/DshPreparationIssueStatus"
        affectedQuantity: { type: integer, minimum: 1 }
        note: { type: string, minLength: 3, maxLength: 500 }
        replacementProductId: { type: string }
        replacementProductName: { type: string }
        customerDecision:
          $ref: "#/components/schemas/DshPreparationIssueCustomerDecision"
        customerDecidedByActorId: { type: string }
        customerDecisionNote: { type: string, maxLength: 500 }
        customerDecidedAt: { type: string, format: date-time, nullable: true }
        openedByActorId: { type: string }
        openedAt: { type: string, format: date-time }
        resolvedByActorId: { type: string }
        resolutionNote: { type: string }
        resolvedAt: { type: string, format: date-time, nullable: true }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCreatePreparationIssueInput:
      type: object
      required: [kind, affectedQuantity, note]
      properties:
        orderItemId:
          type: string
          format: uuid
          description: Required when kind is missing_item, substitution_required, or quality_issue.
        kind:
          $ref: "#/components/schemas/DshPreparationIssueKind"
        affectedQuantity: { type: integer, minimum: 1 }
        note: { type: string, minLength: 3, maxLength: 500 }
        replacementProductId: { type: string }
        replacementProductName: { type: string, minLength: 2 }
      oneOf:
        - required: [orderItemId]
          properties:
            kind:
              type: string
              enum: [missing_item, substitution_required, quality_issue]
        - properties:
            kind:
              type: string
              enum: [other]

    DshDecidePreparationIssueInput:
      type: object
      required: [expectedVersion, decision]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
        decision:
          type: string
          enum: [approved, rejected]
        note: { type: string, maxLength: 500 }

    DshResolvePreparationIssueInput:
      type: object
      required: [expectedVersion, resolutionNote]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
        resolutionNote: { type: string, minLength: 3, maxLength: 500 }

    DshPreparationIssueListResponse:
      type: object
      required: [issues, openCount, pendingCustomerDecisionCount]
      properties:
        issues:
          type: array
          items:
            $ref: "#/components/schemas/DshPreparationIssue"
        openCount: { type: integer, minimum: 0 }
        pendingCustomerDecisionCount: { type: integer, minimum: 0 }

    DshRevisePreparationEstimateInput:
      type: object
      required: [remainingMinutes, reason]
      properties:
        remainingMinutes: { type: integer, minimum: 5, maximum: 180 }
        reason: { type: string, minLength: 3, maxLength: 500 }

    DshStorePreparationPolicy:
      type: object
      required:
        - storeId
        - defaultPreparationMinutes
        - warningBeforeMinutes
        - version
        - updatedByActorId
        - updatedAt
      properties:
        storeId: { type: string }
        defaultPreparationMinutes: { type: integer, minimum: 5, maximum: 180 }
        warningBeforeMinutes: { type: integer, minimum: 1, maximum: 60 }
        version: { type: integer, minimum: 1 }
        updatedByActorId: { type: string }
        updatedAt: { type: string, format: date-time }

    DshUpdateStorePreparationPolicyInput:
      type: object
      required: [expectedVersion, defaultPreparationMinutes, warningBeforeMinutes, reason]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
        defaultPreparationMinutes: { type: integer, minimum: 5, maximum: 180 }
        warningBeforeMinutes: { type: integer, minimum: 1, maximum: 60 }
        reason: { type: string, minLength: 3, maxLength: 500 }

    DshPreparationAlertKind:
      type: string
      enum: [due_soon, overdue, customer_decision_pending]

    DshPreparationAlertStatus:
      type: string
      enum: [open, acknowledged, resolved]

    DshPreparationAlert:
      type: object
      required:
        - id
        - orderId
        - storeId
        - kind
        - status
        - estimateRevision
        - detectedAt
        - acknowledgedByActorId
        - resolutionReason
        - version
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        storeId: { type: string }
        kind:
          $ref: "#/components/schemas/DshPreparationAlertKind"
        status:
          $ref: "#/components/schemas/DshPreparationAlertStatus"
        estimateRevision: { type: integer, minimum: 0 }
        detectedAt: { type: string, format: date-time }
        acknowledgedByActorId: { type: string }
        acknowledgedAt: { type: string, format: date-time, nullable: true }
        resolvedAt: { type: string, format: date-time, nullable: true }
        resolutionReason: { type: string }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshRefreshPreparationAlertsResult:
      type: object
      required: [opened, resolved, active]
      properties:
        opened: { type: integer, minimum: 0 }
        resolved: { type: integer, minimum: 0 }
        active: { type: integer, minimum: 0 }

    DshAcknowledgePreparationAlertInput:
      type: object
      required: [expectedVersion]
      properties:
        expectedVersion: { type: integer, minimum: 1 }

    DshPreparationAlertListResponse:
      type: object
      required: [alerts, total]
      properties:
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/DshPreparationAlert"
        total: { type: integer, minimum: 0 }

    DshPartnerOrderWorkboardOrder:
      allOf:
        - $ref: "#/components/schemas/DshOrder"
        - type: object
          required:
            - allowedActions
            - preparation
            - preparationIssues
            - openPreparationIssueCount
            - pendingCustomerDecisionCount
            - resolvablePreparationIssueCount
            - storeCaptainHandoffStatus
            - storeCaptainHandoffAssignmentId
            - storeCaptainHandoffCaptainId
            - openStoreCaptainHandoffExceptionId
            - openStoreCaptainHandoffExceptionReason
            - openStoreCaptainHandoffExceptionStatus
          properties:
            allowedActions:
              type: array
              uniqueItems: true
              items:
                $ref: "#/components/schemas/DshPartnerOrderAction"
            preparation:
              $ref: "#/components/schemas/DshOrderPreparation"
            preparationIssues:
              type: array
              items:
                $ref: "#/components/schemas/DshPreparationIssue"
            openPreparationIssueCount: { type: integer, minimum: 0 }
            pendingCustomerDecisionCount: { type: integer, minimum: 0 }
            resolvablePreparationIssueCount: { type: integer, minimum: 0 }
            storeCaptainHandoffStatus: { type: string }
            storeCaptainHandoffAssignmentId: { type: string }
            storeCaptainHandoffCaptainId: { type: string }
            partnerHandoffConfirmedAt: { type: string, format: date-time, nullable: true }
            captainPickupConfirmedAt: { type: string, format: date-time, nullable: true }
            openStoreCaptainHandoffExceptionId: { type: string }
            openStoreCaptainHandoffExceptionReason: { type: string }
            openStoreCaptainHandoffExceptionStatus: { type: string }

    DshPartnerOrderWorkboardResponse:
      type: object
      required: [orders, total]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/DshPartnerOrderWorkboardOrder"
        total:
          type: integer
          minimum: 0
