# @paths
  /dsh/operator/pickups/{orderId}/reschedule:
    post:
      operationId: rescheduleDshPickupWindow
      summary: Reopen a no-show pickup session with a new governed collection window.
      description: >-
        Invalidates the previous OTP, clears the no-show projection, advances the
        optimistic version, and requires the partner to issue and deliver a fresh
        OTP before collection. This operation never exposes an OTP to operators.
      tags: [DshOperatorPickup]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshReschedulePickupWindowRequest" }
      responses:
        "200":
          description: No-show pickup session reopened with the requested window.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshPickupSessionResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Pickup version changed; reload before retrying.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshErrorResponse" }
        "422":
          description: Only a no-show pickup session can be rescheduled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshErrorResponse" }

# @pickup-session-properties
        customerNotifiedAt: { type: ["string", "null"], format: date-time }
        customerArrivedAt: { type: ["string", "null"], format: date-time }
        noShowAt: { type: ["string", "null"], format: date-time }
        noShowReason: { type: ["string", "null"] }
        rescheduledAt: { type: ["string", "null"], format: date-time }

# @schemas
    DshReschedulePickupWindowRequest:
      allOf:
        - $ref: "#/components/schemas/DshPickupMutationRequest"
        - type: object
          additionalProperties: false
          required: [reason, newExpiry]
          properties:
            reason:
              type: string
              minLength: 1
              maxLength: 1000
            newExpiry:
              type: string
              format: date-time
