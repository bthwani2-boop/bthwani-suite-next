openapi: 3.1.0
info:
  title: BThwani DSH Partner Fleet Connection API
  version: 0.1.0
  description: >
    Active DSH contract shard for binding a partner store courier team member
    to an authenticated captain actor through a short-lived one-time code.
    Plaintext codes are returned once and never persisted.

x-bthwani-owner: services/dsh
x-bthwani-parent-contract: services/dsh/contracts/dsh.openapi.yaml
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: ENABLED
x-bthwani-runtime-dependency: true

paths:
  /dsh/partner/stores/{storeId}/couriers/{memberId}/connection-code:
    post:
      operationId: issueDshPartnerCourierConnectionCode
      summary: Issue a short-lived one-time code for an eligible courier team member.
      tags: [DshPartnerFleet]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: storeId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: memberId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                expiresInHours: { type: integer, minimum: 1, maximum: 48, default: 24 }
      responses:
        "201":
          description: Code issued; plaintext is included only in this response.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [issued]
                properties:
                  issued: { $ref: "#/components/schemas/DshIssuedCourierConnection" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Ineligible" }

  /dsh/partner/stores/{storeId}/courier-connections:
    get:
      operationId: listDshPartnerCourierConnections
      summary: List code lifecycle records for the authenticated partner store.
      tags: [DshPartnerFleet]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: storeId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Connection records without plaintext codes.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [connections]
                properties:
                  connections:
                    type: array
                    items: { $ref: "#/components/schemas/DshCourierConnection" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dsh/partner/stores/{storeId}/courier-connections/{connectionId}/revoke:
    post:
      operationId: revokeDshPartnerCourierConnection
      summary: Revoke a pending courier connection code using optimistic concurrency.
      tags: [DshPartnerFleet]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: storeId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: connectionId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [expectedVersion]
              properties:
                expectedVersion: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Pending connection code revoked.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [connection]
                properties:
                  connection: { $ref: "#/components/schemas/DshCourierConnection" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/captain/partner-fleet/connect:
    post:
      operationId: connectDshCaptainToPartnerFleet
      summary: Redeem a one-time partner courier code as the authenticated captain.
      tags: [DshPartnerFleet]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [code]
              properties:
                code: { type: string, minLength: 8, maxLength: 16 }
      responses:
        "200":
          description: Captain identity bound to the store courier team member.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [membership]
                properties:
                  membership: { $ref: "#/components/schemas/DshCaptainFleetMembership" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410": { $ref: "#/components/responses/Expired" }
        "422": { $ref: "#/components/responses/Ineligible" }

  /dsh/captain/partner-fleet/memberships:
    get:
      operationId: listDshCaptainPartnerFleetMemberships
      summary: List partner-store courier memberships bound to the authenticated captain.
      tags: [DshPartnerFleet]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Captain fleet memberships.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [memberships]
                properties:
                  memberships:
                    type: array
                    items: { $ref: "#/components/schemas/DshCaptainFleetMembership" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  responses:
    InvalidRequest:
      description: Request validation failed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/DshFleetError" }
    Unauthenticated:
      description: Bearer session is missing, invalid, or expired.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/DshFleetError" }
    Forbidden:
      description: Actor role or store scope is not permitted.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/DshFleetError" }
    NotFound:
      description: Store, courier member, or connection record was not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/DshFleetError" }
    Conflict:
      description: Identity already bound or optimistic concurrency conflict.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/DshFleetError" }
    Expired:
      description: Connection code has expired.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/DshFleetError" }
    Ineligible:
      description: Store team member is not an eligible courier.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/DshFleetError" }

  schemas:
    DshFleetError:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    DshCourierConnectionStatus:
      type: string
      enum: [pending, redeemed, revoked, expired]

    DshCourierConnection:
      type: object
      additionalProperties: false
      required:
        - id
        - storeId
        - teamMemberId
        - codeLast4
        - status
        - expiresAt
        - createdByActorId
        - version
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        storeId: { type: string }
        teamMemberId: { type: string }
        codeLast4: { type: string, minLength: 4, maxLength: 4 }
        status: { $ref: "#/components/schemas/DshCourierConnectionStatus" }
        expiresAt: { type: string, format: date-time }
        createdByActorId: { type: string }
        redeemedByCaptainActorId: { type: string }
        redeemedAt: { type: string, format: date-time }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshIssuedCourierConnection:
      type: object
      additionalProperties: false
      required: [connection, code]
      properties:
        connection: { $ref: "#/components/schemas/DshCourierConnection" }
        code:
          type: string
          minLength: 8
          description: Returned once only; never persisted as plaintext.

    DshCaptainFleetMembership:
      type: object
      additionalProperties: false
      required: [teamMemberId, storeId, storeName, courierName, status, branchAssignment, deliveryAssignment, version]
      properties:
        teamMemberId: { type: string }
        storeId: { type: string }
        storeName: { type: string }
        courierName: { type: string }
        status: { type: string }
        branchAssignment: { type: string }
        deliveryAssignment: { type: string }
        version: { type: integer, minimum: 1 }
