DshClientCatalogProduct:
  type: object
  required: [id, domainId, canonicalNameAr, canonicalNameEn, brand, unit, measurementType, approvalStatus, isActive, unitPrice, currency, stockStatus, imageObjectKey]
  properties:
    id: { type: string }
    domainId: { type: string }
    categoryNodeId: { type: ["string", "null"] }
    canonicalNameAr: { type: string }
    canonicalNameEn: { type: string }
    brand: { type: string }
    barcode: { type: ["string", "null"] }
    gtin: { type: ["string", "null"] }
    sku: { type: ["string", "null"] }
    unit: { type: string }
    measurementType: { type: string }
    canonicalImageObjectKey: { type: ["string", "null"] }
    approvalStatus: { type: string, enum: [approved] }
    isActive: { type: boolean }
    unitPrice: { type: number, format: double, minimum: 0 }
    currency: { type: string }
    stockStatus: { type: string, enum: [in_stock, low_stock, out_of_stock] }
    imageObjectKey: { type: string, deprecated: true, description: "Deprecated: use effectiveImage instead." }
    effectiveImage:
      type: object
      nullable: true
      description: >
        DAM-computed effective product image. Priority: approved store-assortment
        partner_custom_product_image (when policy allows) > approved master-product
        canonical_product_image > null.
      properties:
        url: { type: string }
        altAr: { type: string }
        source: { type: string, enum: [store_custom, canonical] }

