    isActive: { type: boolean }
    allowsStoreProductCustomImage: { type: boolean }
    allowsProductProposal: { type: boolean }
    requiresBarcode: { type: boolean }
    requiresCatalogReview: { type: boolean }
    requiresProductImage: { type: boolean }

DshCatalogResponse:
