# BThwani DSH OpenAPI schemas module: support.
# Source of truth. Referenced by ../dsh.openapi.yaml; do not add an openapi root here.

DshTicketStatus:
  type: string
  enum: [open, in_review, pending_user, resolved, closed]

DshTicketPriority:
  type: string
  enum: [low, normal, high, urgent]

DshSupportTicket:
  type: object
  required: [id, storeId, reporterId, reporterRole, subject, description, category, priority, status, assignedTo, orderId, createdAt, updatedAt]
  properties:
    id: { type: string }
    storeId: { type: string }
    reporterId: { type: string }
    reporterRole: { type: string }
    subject: { type: string }
    description: { type: string }
    category: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshTicketCategory" }
    priority: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshTicketPriority" }
    status: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshTicketStatus" }
    assignedTo: { type: string }
    orderId: { type: string }
    resolvedAt: { type: ["string", "null"], format: date-time }
    closedAt: { type: ["string", "null"], format: date-time }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }

DshTicketResponse:
  type: object
  required: [ticket]
  properties:
    ticket: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshSupportTicket" }

DshTicketsResponse:
  type: object
  required: [tickets]
  properties:
    tickets:
      type: array
      items: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshSupportTicket" }

DshCreateTicketRequest:
  type: object
  required: [subject, description, category]
  properties:
    subject: { type: string, minLength: 3 }
    description: { type: string, minLength: 10 }
    category: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshTicketCategory" }
    priority: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshTicketPriority" }
    storeId: { type: string }
    orderId: { type: string }

DshUpdateTicketRequest:
  type: object
  required: [status]
  properties:
    status: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshTicketStatus" }
    assignedTo: { type: string }

DshSupportMediaKind:
  type: string
  enum: [image, audio, video, document]

DshSupportMediaUploadStatus:
  type: string
  enum: [uploaded, processing, ready, failed]

DshSupportMessageAttachmentInput:
  type: object
  additionalProperties: false
  required: [mediaAssetId, fileName, mimeType, sizeBytes, kind]
  properties:
    mediaAssetId: { type: string, minLength: 1, maxLength: 240 }
    fileName: { type: string, minLength: 1, maxLength: 240 }
    mimeType: { type: string, minLength: 1, maxLength: 160 }
    sizeBytes: { type: integer, minimum: 1, maximum: 104857600 }
    kind: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshSupportMediaKind" }
    durationMs: { type: ["integer", "null"], minimum: 0 }
    thumbnailMediaAssetId: { type: string, maxLength: 240 }
    waveformRef: { type: string, maxLength: 2000 }
    uploadStatus:
      allOf:
        - { $ref: "../../dsh.openapi.yaml#/components/schemas/DshSupportMediaUploadStatus" }
      default: ready

DshSupportMessageAttachment:
  allOf:
    - { $ref: "../../dsh.openapi.yaml#/components/schemas/DshSupportMessageAttachmentInput" }
    - type: object
      additionalProperties: false
      required: [id, ticketId, messageId, attachedBy, isInternal, createdAt, uploadStatus]
      properties:
        id: { type: string, format: uuid }
        ticketId: { type: string, format: uuid }
        messageId: { type: string, format: uuid }
        attachedBy: { type: string }
        isInternal: { type: boolean }
        createdAt: { type: string, format: date-time }

DshRichMessageRequest:
  type: object
  additionalProperties: false
  properties:
    body: { type: string, minLength: 1, maxLength: 4000 }
    isInternal: { type: boolean, default: false }
    attachments:
      type: array
      maxItems: 10
      uniqueItems: true
      items: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshSupportMessageAttachmentInput" }
  anyOf:
    - required: [body]
    - required: [attachments]
      properties:
        attachments:
          type: array
          minItems: 1

DshSupportMessage:
  type: object
  additionalProperties: false
  required: [id, ticketId, senderId, senderRole, body, isInternal, attachments, createdAt]
  properties:
    id: { type: string, format: uuid }
    ticketId: { type: string, format: uuid }
    senderId: { type: string }
    senderRole: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshSenderRole" }
    body: { type: string, maxLength: 4000 }
    isInternal: { type: boolean }
    attachments:
      type: array
      items: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshSupportMessageAttachment" }
    createdAt: { type: string, format: date-time }

DshSupportAnalyticsResponse:
  type: object
  required: [totalTickets, openTickets, resolvedTickets, byCategory, period, generatedAt]
  properties:
    totalTickets: { type: integer }
    openTickets: { type: integer }
    resolvedTickets: { type: integer }
    byCategory:
      type: array
      items: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshTicketCategoryCount" }
    period: { type: string }
    generatedAt: { type: string, format: date-time }
