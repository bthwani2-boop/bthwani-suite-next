# BThwani DSH OpenAPI schemas module: dispatch.
# Source of truth. Referenced by ../dsh.openapi.yaml; do not add an openapi root here.

DshDispatchAssignment:
  type: object
  required: [id, orderId, specialRequestId, requestType, captainId, assignedBy, status, responseDeadlineAt, createdAt, updatedAt, delivery]
  properties:
    id: { type: string }
    orderId: { type: string }
    specialRequestId: { type: string }
    requestType: { type: string }
    captainId: { type: string }
    assignedBy: { type: string }
    status: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshAssignmentStatus" }
    responseDeadlineAt: { type: string, format: date-time }
    acceptedAt: { type: ["string", "null"], format: date-time }
    declinedAt: { type: ["string", "null"], format: date-time }
    completedAt: { type: ["string", "null"], format: date-time }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }
    # Only the captain's latest foreground location sample is retained —
    # no history — and it is purged (set back to null) once the
    # assignment reaches a terminal state (declined/completed).
    lastLatitude: { type: ["number", "null"] }
    lastLongitude: { type: ["number", "null"] }
    locationRecordedAt: { type: ["string", "null"], format: date-time }
    delivery: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshDelivery" }

DshDispatchAssignmentResponse:
  type: object
  required: [assignment]
  properties:
    assignment: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshDispatchAssignment" }

DshPartnerDispatchReference:
  type: object
  required: [id, orderId, captainId, status, createdAt, updatedAt, deliveryStatus]
  description: >-
    JRN-017 partner-facing reference status only. Never includes the
    captain's location or proof-of-delivery reference.
  properties:
    id: { type: string }
    orderId: { type: string }
    captainId: { type: string }
    status: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshAssignmentStatus" }
    acceptedAt: { type: ["string", "null"], format: date-time }
    completedAt: { type: ["string", "null"], format: date-time }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }
    deliveryStatus: { type: string }

DshPartnerDispatchReferenceResponse:
  type: object
  required: [assignment]
  properties:
    assignment:
      oneOf:
        - $ref: "../../dsh.openapi.yaml#/components/schemas/DshPartnerDispatchReference"
        - type: "null"

DshDispatchAssignmentsResponse:
  type: object
  required: [assignments]
  properties:
    assignments:
      type: array
      items: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshDispatchAssignment" }

DshPushDispatchLocationRequest:
  type: object
  required: [latitude, longitude]
  description: >-
    Foreground-only location sample (register item 14 + 42 — no live
    tracking, no background location). Sent by the captain app roughly
    every 3 minutes while a delivery assignment is active.
  properties:
    latitude:
      type: number
      minimum: -90
      maximum: 90
    longitude:
      type: number
      minimum: -180
      maximum: 180
    recordedAt:
      type: string
      format: date-time

