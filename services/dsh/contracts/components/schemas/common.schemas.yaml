# BThwani DSH OpenAPI schemas module: common.
# Source of truth. Referenced by ../dsh.openapi.yaml; do not add an openapi root here.

DshAcknowledgeDeliveryExceptionRequest:
  type: object
  additionalProperties: false
  required: [expectedVersion]
  properties:
    expectedVersion: { type: integer, minimum: 1 }

DshResolveDeliveryExceptionRequest:
  type: object
  additionalProperties: false
  required: [expectedVersion, action, note]
  properties:
    expectedVersion: { type: integer, minimum: 1 }
    action:
      type: string
      enum: [retry_same_captain, reassign_captain, return_to_store]
    note: { type: string, minLength: 5, maxLength: 1000 }
    newCaptainId:
      type: string
      minLength: 1
      description: Required only when action is reassign_captain.

DshDeliveryExceptionReasonCode:
  type: string
  enum:
    - customer_unreachable
    - recipient_refused
    - wrong_address
    - unsafe_location
    - vehicle_breakdown
    - accident
    - damaged_order
    - cash_collection_issue
    - weather_or_road_block
    - proof_unavailable
    - handoff_shortage
    - handoff_mismatch
    - other

DshDeliveryExceptionStatus:
  type: string
  enum: [open, acknowledged, resolved]

DshDeliveryExceptionSeverity:
  type: string
  enum: [medium, high, critical]

DshDeliveryException:
  type: object
  additionalProperties: false
  required:
    - id
    - tenantId
    - assignmentId
    - orderId
    - captainId
    - reasonCode
    - note
    - deliveryStatusAtReport
    - severity
    - status
    - correlationId
    - reportedAt
    - version
    - createdAt
    - updatedAt
  properties:
    id: { type: string, format: uuid }
    tenantId: { type: string }
    assignmentId: { type: string, format: uuid }
    orderId: { type: string, format: uuid }
    captainId: { type: string }
    reasonCode: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshDeliveryExceptionReasonCode" }
    note: { type: string }
    deliveryStatusAtReport: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshDeliveryStatus" }
    severity: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshDeliveryExceptionSeverity" }
    status: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshDeliveryExceptionStatus" }
    correlationId: { type: string }
    reportedLatitude: { type: number, format: double, nullable: true }
    reportedLongitude: { type: number, format: double, nullable: true }
    reportedAt: { type: string, format: date-time }
    acknowledgedAt: { type: string, format: date-time, nullable: true }
    acknowledgedByActorId: { type: string, nullable: true }
    resolvedAt: { type: string, format: date-time, nullable: true }
    resolvedByActorId: { type: string, nullable: true }
    resolutionAction:
      type: string
      enum: [retry_same_captain, reassign_captain, return_to_store, cancel_order]
      nullable: true
    resolutionNote: { type: string, nullable: true }
    replacementAssignmentId: { type: string, format: uuid, nullable: true }
    replacementCaptainId: { type: string, nullable: true }
    returnStartedAt: { type: string, format: date-time, nullable: true }
    returnArrivedAt: { type: string, format: date-time, nullable: true }
    returnedAt: { type: string, format: date-time, nullable: true }
    returnAcceptedByActorId: { type: string, nullable: true }
    version: { type: integer, minimum: 1 }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }

DshDeliveryExceptionResponse:
  type: object
  additionalProperties: false
  required: [exception]
  properties:
    exception: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshDeliveryException" }

DshDeliveryExceptionListResponse:
  type: object
  additionalProperties: false
  required: [exceptions]
  properties:
    exceptions:
      type: array
      items: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshDeliveryException" }

