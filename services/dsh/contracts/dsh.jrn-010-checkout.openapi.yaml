openapi: 3.1.0
info:
  title: DSH JRN-010 Checkout and WLT Handoff
  version: 1.0.0
  description: >-
    Authoritative JRN-010 contract shard. DSH owns checkout operational truth;
    WLT owns payment-session and financial truth.
x-bthwani-journey-id: JRN-010
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-truth-boundary:
  dsh: checkout intent, snapshots, operational projection
  wlt: payment session, authorization, capture, refund, ledger
paths:
  /dsh/client/checkout-intents:
    post:
      operationId: createDshClientCheckoutIntent
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateCheckoutIntentInput'}
      responses:
        '200': {$ref: '#/components/responses/CheckoutIntentResponse'}
        '201': {$ref: '#/components/responses/CheckoutIntentResponse'}
        '202': {$ref: '#/components/responses/CheckoutIntentResponse'}
        '409': {$ref: '#/components/responses/ErrorResponse'}
        '422': {$ref: '#/components/responses/ErrorResponse'}
        '503': {$ref: '#/components/responses/ErrorResponse'}
  /dsh/client/checkout-intents/{intentId}:
    get:
      operationId: getDshClientCheckoutIntent
      security: [{ bearerAuth: [] }]
      parameters: [{$ref: '#/components/parameters/IntentId'}]
      responses:
        '200': {$ref: '#/components/responses/CheckoutIntentResponse'}
        '404': {$ref: '#/components/responses/ErrorResponse'}
  /dsh/client/checkout-intents/{intentId}/cancel:
    post:
      operationId: cancelDshClientCheckoutIntent
      security: [{ bearerAuth: [] }]
      parameters: [{$ref: '#/components/parameters/IntentId'}]
      responses:
        '200': {$ref: '#/components/responses/CheckoutIntentResponse'}
        '409': {$ref: '#/components/responses/ErrorResponse'}
  /dsh/operator/checkout-intents:
    get:
      operationId: listDshOperatorCheckoutIntents
      security: [{ bearerAuth: [] }]
      parameters:
        - name: state
          in: query
          schema: {$ref: '#/components/schemas/CheckoutIntentState'}
      responses:
        '200':
          description: Tenant-visible operational checkout projections.
          content:
            application/json:
              schema:
                type: object
                required: [intents]
                properties:
                  intents:
                    type: array
                    items: {$ref: '#/components/schemas/CheckoutIntent'}
  /dsh/operator/checkout-intents/{intentId}/reconcile:
    post:
      operationId: reconcileDshOperatorCheckoutIntent
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IntentId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200': {$ref: '#/components/responses/CheckoutIntentResponse'}
        '202': {$ref: '#/components/responses/CheckoutIntentResponse'}
        '409': {$ref: '#/components/responses/ErrorResponse'}
        '503': {$ref: '#/components/responses/ErrorResponse'}
  /dsh/internal/wlt/payment-session-events:
    post:
      operationId: applyDshWltPaymentSessionEvent
      security: [{ serviceToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/WltPaymentSessionEvent'}
      responses:
        '200':
          description: Event receipt and atomically updated DSH projection.
          content:
            application/json:
              schema:
                type: object
                required: [intent, eventReference, replayed]
                properties:
                  intent: {$ref: '#/components/schemas/CheckoutIntent'}
                  eventReference: {type: string}
                  replayed: {type: boolean}
        '409': {$ref: '#/components/responses/ErrorResponse'}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    serviceToken:
      type: apiKey
      in: header
      name: Authorization
  parameters:
    IntentId:
      name: intentId
      in: path
      required: true
      schema: {type: string, format: uuid}
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: {type: string, minLength: 16, maxLength: 200}
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema: {type: string, maxLength: 200}
  schemas:
    CheckoutIntentState:
      type: string
      enum: [pending, wlt_handoff_failed, wlt_outcome_unknown, payment_pending, confirmed, cancelled, payment_confirmed, payment_failed, expired]
    PaymentMethod:
      type: string
      enum: [cod, wallet, mixed, official_wallet]
    FulfillmentMode:
      type: string
      enum: [bthwani_delivery, partner_delivery, pickup]
    CreateCheckoutIntentInput:
      type: object
      required: [cartId, storeId]
      properties:
        cartId: {type: string, format: uuid}
        storeId: {type: string}
        fulfillmentMode: {$ref: '#/components/schemas/FulfillmentMode'}
        paymentMethod: {$ref: '#/components/schemas/PaymentMethod'}
        deliveryAddressId: {type: string, format: uuid}
        note: {type: string, maxLength: 1000}
        couponCode: {type: string, maxLength: 32}
    WltPaymentSessionEvent:
      type: object
      additionalProperties: false
      required: [tenantId, checkoutIntentId, paymentSessionId, status]
      properties:
        eventId: {type: string, minLength: 8, maxLength: 200}
        correlationId: {type: string, maxLength: 200}
        tenantId: {type: string, minLength: 1}
        checkoutIntentId: {type: string, format: uuid}
        paymentSessionId: {type: string, minLength: 1}
        status:
          type: string
          enum: [authorized, reference_created, cod_pending, captured, cod_collected, failed, expired]
    CheckoutIntent:
      type: object
      required: [id, tenantId, clientId, cartId, storeId, fulfillmentMode, state, paymentMethod, wltPaymentSessionId, subtotalMinorUnits, deliveryFeeMinorUnits, discountMinorUnits, totalMinorUnits, currency, pricingSnapshotHash, version, createdAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        tenantId: {type: string}
        clientId: {type: string}
        cartId: {type: string, format: uuid}
        storeId: {type: string}
        fulfillmentMode: {$ref: '#/components/schemas/FulfillmentMode'}
        state: {$ref: '#/components/schemas/CheckoutIntentState'}
        paymentMethod: {$ref: '#/components/schemas/PaymentMethod'}
        wltPaymentSessionId: {type: string}
        deliveryAddress: {type: string}
        note: {type: string}
        subtotalMinorUnits: {type: integer, format: int64, minimum: 0}
        deliveryFeeMinorUnits: {type: integer, format: int64, minimum: 0}
        discountMinorUnits: {type: integer, format: int64, minimum: 0}
        totalMinorUnits: {type: integer, format: int64, minimum: 0}
        currency: {type: string, minLength: 3, maxLength: 3}
        pricingSnapshotHash: {type: string}
        couponId: {type: string}
        couponRedemptionId: {type: string}
        couponCodeLast4: {type: string}
        version: {type: integer, minimum: 1}
        reconciliationRequired: {type: boolean}
        reconciliationAgeSeconds: {type: integer, format: int64, minimum: 0}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
  responses:
    CheckoutIntentResponse:
      description: Canonical DSH checkout projection.
      content:
        application/json:
          schema:
            type: object
            required: [intent]
            properties:
              intent: {$ref: '#/components/schemas/CheckoutIntent'}
    ErrorResponse:
      description: Governed error envelope.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                required: [code, message]
                properties:
                  code: {type: string}
                  message: {type: string}
