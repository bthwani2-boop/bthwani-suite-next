openapi: 3.1.0
info:
  title: BThwani DSH-SLICE-003 Contract Skeleton
  version: 0.1.0
  description: Contract-only cart serviceability and future DSH-004 checkout handoff envelopes.
x-bthwani-owner: services/dsh
x-bthwani-contract-state: CONTRACT_DRAFT
x-bthwani-client-generation: DISABLED
x-bthwani-runtime-dependency: false
x-bthwani-contract-only: true
paths:
  /dsh/carts/serviceability:
    post:
      operationId: evaluateDshCartServiceability
      summary: Evaluate whether a cart can be served without creating payment state.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CartServiceabilityRequest" }
      responses:
        "200":
          description: Operational serviceability decision.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CartServiceabilityResult" }
  /dsh/checkout-intents:
    post:
      operationId: createDshCheckoutIntentDraft
      summary: DSH-004 handoff draft only; no runtime handler is registered in DSH-SLICE-003.
      responses:
        "501": { description: Contract-only until DSH-004 approval. }
  /dsh/checkout-intents/{checkoutIntentId}/cancel:
    post:
      operationId: cancelDshCheckoutIntentDraft
      summary: Operational cancellation contract; never performs a refund.
      parameters:
        - name: checkoutIntentId
          in: path
          required: true
          schema: { type: string }
      responses:
        "501": { description: Contract-only until DSH-004 approval. }
  /dsh/integrations/wlt/payment-callbacks:
    post:
      operationId: acceptWltPaymentCallbackEnvelope
      summary: Future WLT-owned callback envelope; DSH consumes opaque final references only.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WltPaymentCallbackEnvelope" }
      responses:
        "501": { description: Contract-only; signature and payment truth remain WLT-owned. }
components:
  schemas:
    CartServiceabilityRequest:
      type: object
      required: [storeId, serviceAreaCode, items]
      properties:
        storeId: { type: string }
        serviceAreaCode: { type: string }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId: { type: string }
              quantity: { type: integer, minimum: 1 }
    CartServiceabilityResult:
      type: object
      required: [serviceable, code]
      properties:
        serviceable: { type: boolean }
        code: { type: string, enum: [serviceable, store_unavailable, out_of_area, catalog_unavailable] }
        reason: { type: string }
    WltPaymentCallbackEnvelope:
      type: object
      required: [paymentSessionId, paymentStatus, checkoutIntentId, occurredAt]
      properties:
        paymentSessionId: { type: string }
        paymentStatus: { type: string }
        checkoutIntentId: { type: string }
        occurredAt: { type: string, format: date-time }
      description: Contains opaque WLT references only. No amount, ledger, refund, settlement, or signature verification logic belongs to DSH.
