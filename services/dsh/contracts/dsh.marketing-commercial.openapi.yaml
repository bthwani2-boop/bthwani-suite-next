openapi: 3.1.0
info:
  title: BThwani DSH Marketing Commercial Programs API
  version: 0.4.0
  description: DSH-owned marketing definitions, coupon policy, and governed client purchase workflow; WLT remains the financial truth owner.
x-bthwani-owner: services/dsh
x-bthwani-parent-contract: services/dsh/contracts/dsh.openapi.yaml
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: DISABLED
x-bthwani-client-binding: MANUAL_TYPED_ADAPTER
x-bthwani-runtime-dependency: true
x-bthwani-financial-mutation-owner: services/wlt
paths:
  /dsh/operator/marketing/coupons:
    get:
      operationId: listDshMarketingCoupons
      tags: [DshMarketingCommercial]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
    post:
      operationId: createDshMarketingCoupon
      tags: [DshMarketingCommercial]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CouponCreateWrite' }
      responses:
        '201': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/marketing/coupons/{couponId}:
    patch:
      operationId: updateDshMarketingCoupon
      tags: [DshMarketingCommercial]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: couponId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CouponUpdateWrite' }
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/marketing/loyalty-tiers:
    get:
      operationId: listDshMarketingLoyaltyTiers
      tags: [DshMarketingCommercial]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
    post:
      operationId: createDshMarketingLoyaltyTier
      tags: [DshMarketingCommercial]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommercialDefinitionWrite' }
      responses:
        '201': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/marketing/loyalty-tiers/{tierId}:
    patch:
      operationId: updateDshMarketingLoyaltyTier
      tags: [DshMarketingCommercial]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: tierId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VersionedCommercialDefinitionWrite' }
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/marketing/subscription-plans:
    get:
      operationId: listDshMarketingSubscriptionPlans
      tags: [DshMarketingCommercial]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
    post:
      operationId: createDshMarketingSubscriptionPlan
      tags: [DshMarketingCommercial]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommercialDefinitionWrite' }
      responses:
        '201': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/marketing/subscription-plans/{planId}:
    patch:
      operationId: updateDshMarketingSubscriptionPlan
      tags: [DshMarketingCommercial]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: planId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VersionedCommercialDefinitionWrite' }
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/client/marketing/subscriptions/purchase:
    post:
      operationId: createDshClientSubscriptionPurchase
      tags: [DshMarketingCommercial]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string, minLength: 1 }
        - name: X-Correlation-ID
          in: header
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubscriptionPurchaseWrite' }
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '201': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '503': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/client/marketing/subscriptions/{purchaseId}/activate:
    post:
      operationId: activateDshClientSubscriptionPurchase
      tags: [DshMarketingCommercial]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: purchaseId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: X-Correlation-ID
          in: header
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
        '503': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/client/benefits:
    get:
      operationId: getDshClientBenefits
      tags: [DshMarketingCommercial]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '503': { $ref: '#/components/responses/ErrorResponse' }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
  responses:
    ObjectResponse:
      description: Governed commercial response.
      content:
        application/json:
          schema: { type: object, additionalProperties: true }
    ErrorResponse:
      description: Governed error response.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    CommercialDefinitionWrite:
      type: object
      additionalProperties: true
      minProperties: 1
    VersionedCommercialDefinitionWrite:
      type: object
      additionalProperties: true
      required: [expectedVersion]
      properties:
        expectedVersion: { type: integer, minimum: 1 }
    CouponFundingSource:
      type: string
      enum: [platform, partner, shared]
    CouponCreateWrite:
      type: object
      additionalProperties: false
      required: [nameAr, code, discountType]
      properties:
        nameAr: { type: string, minLength: 1 }
        description: { type: string }
        code: { type: string, minLength: 6, maxLength: 32 }
        storeId: { type: string, minLength: 1 }
        fundingSource: { $ref: '#/components/schemas/CouponFundingSource' }
        platformShareBps: { type: integer, minimum: 0, maximum: 10000 }
        fundingPartnerId: { type: string, minLength: 1 }
        discountType: { type: string, enum: [percent, fixed] }
        discountPercent: { type: number, exclusiveMinimum: 0, maximum: 100 }
        fixedDiscountMinorUnits: { type: integer, format: int64, minimum: 0 }
        maxDiscountMinorUnits: { type: integer, format: int64, minimum: 0 }
        minSubtotalMinorUnits: { type: integer, format: int64, minimum: 0 }
        globalUsageLimit: { type: integer, minimum: 0 }
        perClientUsageLimit: { type: integer, minimum: 1 }
        eligibleFulfillmentModes:
          type: array
          minItems: 1
          uniqueItems: true
          items: { type: string, enum: [bthwani_delivery, partner_delivery, pickup] }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
    CouponUpdateWrite:
      allOf:
        - $ref: '#/components/schemas/CouponCreateWrite'
        - type: object
          required: [expectedVersion]
          properties:
            expectedVersion: { type: integer, minimum: 1 }
            status: { type: string, enum: [draft, active, paused, archived] }
    SubscriptionPurchaseWrite:
      type: object
      additionalProperties: false
      required: [planId, paymentMethod]
      properties:
        planId: { type: string, minLength: 1 }
        paymentMethod:
          type: string
          enum: [wallet, mixed, official_wallet]
