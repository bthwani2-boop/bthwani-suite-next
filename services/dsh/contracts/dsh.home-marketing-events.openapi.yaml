openapi: 3.1.0
info:
  title: BThwani DSH Home Marketing Events and Targeting API
  version: 1.2.0
  description: >
    Standalone contract for context-validated client-home impression/click
    ingestion and governed city, service-area, and audience targeting. Home
    content truth remains owned by dsh_home_banners and dsh_home_promos; this
    contract owns only telemetry ingestion and the targeting projection.

x-bthwani-owner: services/dsh
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: DISABLED
x-bthwani-runtime-dependency: true
x-bthwani-adapter-owner: services/dsh/frontend/shared/home-discovery

paths:
  /dsh/home-discovery/events:
    post:
      operationId: recordDshHomeMarketingEvent
      summary: Record one targeted, publishable home banner or promo impression/click.
      tags: [DshHomeMarketing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshHomeMarketingEventInput"
      responses:
        "204":
          description: Event accepted; duplicate impressions for the same view are ignored.
        "400":
          $ref: "#/components/responses/InvalidEvent"
        "404":
          $ref: "#/components/responses/ContentNotPublishable"

  /dsh/operator/home-discovery/{kind}/{itemId}/targeting:
    parameters:
      - $ref: "#/components/parameters/HomeContentKind"
      - $ref: "#/components/parameters/HomeContentItemId"
    get:
      operationId: getDshOperatorHomeTargeting
      summary: Read the governed targeting projection for one home item.
      tags: [DshHomeMarketing]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Targeting projection returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeTargetingResponse"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: replaceDshOperatorHomeTargeting
      summary: Atomically replace all target dimensions for one home item.
      tags: [DshHomeMarketing]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshHomeTargeting"
      responses:
        "200":
          description: Targeting projection replaced and audited.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeTargetingResponse"
        "400": { $ref: "#/components/responses/InvalidEvent" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    HomeContentKind:
      name: kind
      in: path
      required: true
      schema:
        type: string
        enum: [banners, promos]
    HomeContentItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 8

  schemas:
    DshHomeMarketingEventInput:
      type: object
      additionalProperties: false
      required:
        - eventType
        - contentKind
        - contentId
        - viewerRef
        - audienceSegment
      properties:
        eventType:
          type: string
          enum: [impression, click]
        contentKind:
          type: string
          enum: [banners, promos]
        contentId:
          type: string
          minLength: 1
        viewerRef:
          type: string
          minLength: 8
          maxLength: 160
          pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{7,159}$"
        cityCode:
          type: string
          maxLength: 80
          pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{0,79}$"
        serviceAreaCode:
          type: string
          maxLength: 80
          pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{0,79}$"
        audienceSegment:
          type: string
          enum: [guest, authenticated]

    DshHomeTargeting:
      type: object
      additionalProperties: false
      required: [cityCodes, serviceAreaCodes, audienceSegments]
      properties:
        cityCodes:
          type: array
          uniqueItems: true
          maxItems: 100
          items:
            type: string
            minLength: 1
            maxLength: 80
            pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{0,79}$"
        serviceAreaCodes:
          type: array
          uniqueItems: true
          maxItems: 100
          items:
            type: string
            minLength: 1
            maxLength: 80
            pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{0,79}$"
        audienceSegments:
          type: array
          uniqueItems: true
          maxItems: 2
          items:
            type: string
            enum: [guest, authenticated]

    DshHomeTargetingResponse:
      type: object
      additionalProperties: false
      required: [targeting]
      properties:
        targeting:
          $ref: "#/components/schemas/DshHomeTargeting"

    DshHomeMarketingEventError:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

  responses:
    InvalidEvent:
      description: Request payload failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshHomeMarketingEventError"
    ContentNotPublishable:
      description: Referenced content is absent, inactive, outside schedule, or outside the supplied target context.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshHomeMarketingEventError"
    Unauthenticated:
      description: Authentication is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshHomeMarketingEventError"
    Forbidden:
      description: Marketing permission is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshHomeMarketingEventError"
    NotFound:
      description: Home content item was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshHomeMarketingEventError"
