openapi: 3.1.0
info:
  title: BThwani DSH JRN-037 Payout Destinations API
  version: 1.0.0
  description: >-
    Actor-scoped payout destination and operator reconciliation proxy surface.
    WLT remains the financial owner; DSH derives actor identity from the session.
x-bthwani-owner: services/dsh
x-bthwani-journey: JRN-037
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: MANUAL_TYPED_ADAPTER
x-bthwani-runtime-dependency: true
servers:
  - url: http://localhost:58080
security:
  - bearerAuth: []
paths:
  /dsh/partner/me/finance/payout-destination:
    get:
      operationId: getDshPartnerOwnPayoutDestination
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
    put:
      operationId: upsertDshPartnerOwnPayoutDestination
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        $ref: '#/components/requestBodies/ObjectBody'
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/me/finance/payout-destination/deactivate:
    post:
      operationId: deactivateDshPartnerOwnPayoutDestination
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/me/finance/payout-requests:
    post:
      operationId: createDshPartnerOwnPayoutRequest
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        $ref: '#/components/requestBodies/ObjectBody'
      responses:
        '201': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/captain/me/finance/payout-destination:
    get:
      operationId: getDshCaptainOwnPayoutDestination
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
    put:
      operationId: upsertDshCaptainOwnPayoutDestination
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        $ref: '#/components/requestBodies/ObjectBody'
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/captain/me/finance/payout-destination/deactivate:
    post:
      operationId: deactivateDshCaptainOwnPayoutDestination
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/field/me/finance/payout-destination:
    get:
      operationId: getDshFieldOwnPayoutDestination
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
    put:
      operationId: upsertDshFieldOwnPayoutDestination
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        $ref: '#/components/requestBodies/ObjectBody'
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/field/me/finance/payout-destination/deactivate:
    post:
      operationId: deactivateDshFieldOwnPayoutDestination
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/control-panel/finance/payout-requests/{payoutId}/audit:
    get:
      operationId: listDshControlPanelPayoutAudit
      parameters:
        - $ref: '#/components/parameters/PayoutId'
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/control-panel/finance/payout-requests/{payoutId}/reconcile:
    post:
      operationId: reconcileDshControlPanelPayoutRequest
      parameters:
        - $ref: '#/components/parameters/PayoutId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200': { $ref: '#/components/responses/ObjectResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '502': { $ref: '#/components/responses/ErrorResponse' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PayoutId:
      name: payoutId
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 200 }
  requestBodies:
    ObjectBody:
      required: true
      content:
        application/json:
          schema: { type: object, additionalProperties: true }
  responses:
    ObjectResponse:
      description: Governed WLT-owned payout response.
      content:
        application/json:
          schema: { type: object, additionalProperties: true }
    ErrorResponse:
      description: Governed error response.
      content:
        application/json:
          schema: { type: object, additionalProperties: true }
