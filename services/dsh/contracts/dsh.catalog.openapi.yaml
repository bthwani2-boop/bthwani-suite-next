components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
  parameters:
    DomainId: { name: domainId, in: path, required: true, schema: { type: string } }
    NodeId: { name: nodeId, in: path, required: true, schema: { type: string } }
    ProductId: { name: productId, in: path, required: true, schema: { type: string } }
    MasterProductId: { name: masterProductId, in: path, required: true, schema: { type: string } }
    ProposalId: { name: proposalId, in: path, required: true, schema: { type: string } }
    PolicyId: { name: policyId, in: path, required: true, schema: { type: string } }
    AssetId: { name: assetId, in: path, required: true, schema: { type: string } }
    StoreId: { name: storeId, in: path, required: true, schema: { type: string } }
    PartnerId: { name: partnerId, in: path, required: true, schema: { type: string } }
  responses:
    InvalidRequest: { description: Invalid request, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
    Unauthenticated: { description: Missing or invalid identity, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
    Forbidden: { description: Permission or ownership denied, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
    NotFound: { description: Entity not found, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
    Conflict: { description: Version conflict; reload before retrying, content: { application/json: { schema: { $ref: "#/components/schemas/ConflictResponse" } } } }
    InvalidTransition: { description: Governed state transition rejected, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
  schemas:
    PositiveVersion: { type: integer, minimum: 1 }
    ErrorResponse:
      type: object
      required: [code, message]
      properties: { code: { type: string }, message: { type: string } }
    ConflictResponse:
      type: object
      required: [code, message, entityId, currentVersion]
      properties:
        code: { const: CONFLICT }
        message: { type: string }
        entityId: { type: string }
        expectedVersion: { type: [integer, "null"], minimum: 1 }
        currentVersion: { type: integer, minimum: 1 }
    VersionedEntity:
      type: object
      required: [id, version]
      properties: { id: { type: string }, version: { $ref: "#/components/schemas/PositiveVersion" } }
    Domain:
      allOf:
