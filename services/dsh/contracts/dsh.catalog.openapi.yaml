openapi: 3.1.0
info:
  title: BThwani DSH Sovereign Central Catalog API
  version: 1.0.0
  description: >-
    Executable contract fragment for the sovereign central catalog. It mirrors
    the paths registered by the DSH runtime and requires optimistic concurrency
    control for every mutation of an existing versioned entity.

x-bthwani-owner: services/dsh
x-bthwani-parent-contract: contracts/dsh.openapi.yaml
x-bthwani-contract-role: executable-fragment
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: ENABLED
x-bthwani-runtime-dependency: true

paths:
  /dsh/operator/catalog/domains:
    get:
      operationId: listCatalogDomains
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Domains, content: { application/json: { schema: { $ref: "#/components/schemas/DomainListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createCatalogDomain
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateDomainRequest" } } }
      responses:
        "201": { description: Domain created, content: { application/json: { schema: { $ref: "#/components/schemas/DomainResponse" } } } }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/operator/catalog/domains/{domainId}:
    patch:
      operationId: updateCatalogDomain
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/DomainId" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateDomainRequest" } } }
      responses:
        "200": { description: Domain updated, content: { application/json: { schema: { $ref: "#/components/schemas/DomainResponse" } } } }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/operator/catalog/nodes:
    get:
      operationId: listCatalogNodes
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: domainId, in: query, schema: { type: string } }
        - { name: parentId, in: query, schema: { type: string } }
      responses:
        "200": { description: Nodes, content: { application/json: { schema: { $ref: "#/components/schemas/NodeListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    post:
      operationId: createCatalogNode
