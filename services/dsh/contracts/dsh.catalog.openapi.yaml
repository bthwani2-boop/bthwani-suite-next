      responses:
        "200": { description: Node updated, content: { application/json: { schema: { $ref: "#/components/schemas/NodeResponse" } } } }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/operator/catalog/master-products:
    get:
      operationId: listMasterProductsOperator
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: domainId, in: query, schema: { type: string } }
        - { name: categoryNodeId, in: query, schema: { type: string } }
        - { name: approvalStatus, in: query, schema: { type: string } }
        - { name: search, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 200 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0 } }
      responses:
        "200": { description: Master products, content: { application/json: { schema: { $ref: "#/components/schemas/MasterProductListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    post:
