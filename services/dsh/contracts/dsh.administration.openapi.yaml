openapi: 3.1.0
x-bthwani-contract-state: CONTRACT_ACTIVE
info:
  title: DSH Administration Governance API
  version: 1.2.0
  description: JRN-031 maker-checker administration contract.
servers:
  - url: /dsh
paths:
  /operator/admin/roles:
    get:
      operationId: listDshAdministrationRoles
      responses:
        "200":
          description: Approved administrative roles.
          content:
            application/json:
              schema:
                type: object
                required: [roles]
                properties:
                  roles:
                    type: array
                    items:
                      $ref: "#/components/schemas/Role"
  /operator/admin/roles/requests:
    post:
      operationId: requestDshAdministrationRoleDefinition
      description: Creates a pending role-definition request; it never creates a role directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleDefinitionRequestInput"
      responses:
        "202":
          description: Pending role-definition request created.
          content:
            application/json:
              schema:
                type: object
                required: [request]
                properties:
                  request:
                    $ref: "#/components/schemas/RoleDefinitionRequest"
        "409": { description: Role exists or an equivalent request is pending. }
  /operator/admin/role-requests:
    get:
      operationId: listDshAdministrationRoleDefinitionRequests
      parameters:
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/ApprovalStatus"
      responses:
        "200":
          description: Role-definition approval queue.
          content:
            application/json:
              schema:
                type: object
                required: [requests]
                properties:
                  requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/RoleDefinitionRequest"
  /operator/admin/role-requests/{requestId}/review:
    post:
      operationId: reviewDshAdministrationRoleDefinitionRequest
      description: Creates a role only after an independent checker approves the pending request.
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalReviewInput"
      responses:
        "200":
          description: Role-definition request reviewed.
          content:
            application/json:
              schema:
                type: object
                required: [request]
                properties:
                  request:
                    $ref: "#/components/schemas/RoleDefinitionRequest"
                  role:
                    oneOf:
                      - $ref: "#/components/schemas/Role"
                      - type: "null"
        "403": { description: Self-approval is forbidden. }
        "409": { description: Version, lifecycle, or duplicate-role conflict. }
  /operator/admin/staff:
    get:
      operationId: listDshAdministrationStaff
      responses:
        "200":
          description: Existing approved staff role assignments.
          content:
            application/json:
              schema:
                type: object
                required: [staff]
                properties:
                  staff:
                    type: array
                    items:
                      $ref: "#/components/schemas/StaffAssignment"
  /operator/admin/staff/{staffId}/roles:
    post:
      operationId: requestDshStaffRoleChange
      description: Creates a pending maker-checker request for either assignment or revocation; it never mutates the approved assignment directly.
      parameters:
        - in: path
          name: staffId
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleChangeRequestInput"
      responses:
        "202":
          description: Pending role-change approval request created.
          content:
            application/json:
              schema:
                type: object
                required: [approval]
                properties:
                  approval:
                    $ref: "#/components/schemas/RoleAssignmentApproval"
        "403": { description: Self-change or authorization is forbidden. }
        "409": { description: Requested assignment state is no longer valid or an equivalent request is pending. }
  /operator/admin/approvals:
    get:
      operationId: listDshRoleAssignmentApprovals
      parameters:
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/ApprovalStatus"
      responses:
        "200":
          description: Staff role-change approval queue.
          content:
            application/json:
              schema:
                type: object
                required: [approvals]
                properties:
                  approvals:
                    type: array
                    items:
                      $ref: "#/components/schemas/RoleAssignmentApproval"
  /operator/admin/approvals/{approvalId}/review:
    post:
      operationId: reviewDshStaffRoleChange
      description: Applies an assignment or revocation only when checker differs from maker and beneficiary.
      parameters:
        - in: path
          name: approvalId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalReviewInput"
      responses:
        "200":
          description: Role-change request reviewed and applied only when approved.
          content:
            application/json:
              schema:
                type: object
                required: [approval]
                properties:
                  approval:
                    $ref: "#/components/schemas/RoleAssignmentApproval"
                  assignment:
                    oneOf:
                      - $ref: "#/components/schemas/StaffAssignment"
                      - type: "null"
        "403": { description: Self-approval is forbidden. }
        "409": { description: Version, lifecycle, or role-state conflict. }
components:
  schemas:
    ApprovalStatus:
      type: string
      enum: [pending, approved, rejected]
    AdministrationPermission:
      type: string
      enum:
        - administration.read
        - administration.manage
        - administration.approve
    RoleChangeAction:
      type: string
      enum:
        - staff_role_assignment
        - staff_role_revocation
    Role:
      type: object
      required: [id, name, description, permissions, createdAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        permissions:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/AdministrationPermission"
        createdAt: { type: string, format: date-time }
    RoleDefinitionRequestInput:
      type: object
      additionalProperties: false
      required: [name, description, permissions, reason]
      properties:
        name:
          type: string
          pattern: "^[a-z][a-z0-9-]{2,79}$"
        description: { type: string, maxLength: 500 }
        permissions:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/AdministrationPermission"
        reason: { type: string, minLength: 5 }
    RoleDefinitionRequest:
      type: object
      required:
        - id
        - roleName
        - description
        - permissions
        - requestedBy
        - reason
        - status
        - reviewedBy
        - reviewNote
        - version
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        roleName: { type: string }
        description: { type: string }
        permissions:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/AdministrationPermission"
        requestedBy: { type: string }
        reason: { type: string, minLength: 5 }
        status:
          $ref: "#/components/schemas/ApprovalStatus"
        reviewedBy: { type: string }
        reviewNote: { type: string }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        reviewedAt:
          type: [string, "null"]
          format: date-time
    StaffAssignment:
      type: object
      required: [id, actorId, roleId, roleName, assignedBy, assignedAt]
      properties:
        id: { type: string, format: uuid }
        actorId: { type: string }
        roleId: { type: string, format: uuid }
        roleName: { type: string }
        assignedBy: { type: string }
        assignedAt: { type: string, format: date-time }
    RoleChangeRequestInput:
      type: object
      additionalProperties: false
      required: [roleId, actionType, reason]
      properties:
        roleId: { type: string, format: uuid }
        actionType:
          $ref: "#/components/schemas/RoleChangeAction"
        reason: { type: string, minLength: 5 }
    ApprovalReviewInput:
      type: object
      additionalProperties: false
      required: [decision, reviewNote, expectedVersion]
      properties:
        decision:
          type: string
          enum: [approved, rejected]
        reviewNote: { type: string }
        expectedVersion: { type: integer, minimum: 1 }
    RoleAssignmentApproval:
      type: object
      required:
        - id
        - actionType
        - targetActorId
        - roleId
        - roleName
        - requestedBy
        - reason
        - status
        - reviewedBy
        - reviewNote
        - version
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        actionType:
          $ref: "#/components/schemas/RoleChangeAction"
        targetActorId: { type: string }
        roleId: { type: string, format: uuid }
        roleName: { type: string }
        requestedBy: { type: string }
        reason: { type: string, minLength: 5 }
        status:
          $ref: "#/components/schemas/ApprovalStatus"
        reviewedBy: { type: string }
        reviewNote: { type: string }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        reviewedAt:
          type: [string, "null"]
          format: date-time
