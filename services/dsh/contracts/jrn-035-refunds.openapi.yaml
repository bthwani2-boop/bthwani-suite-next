openapi: 3.1.0
x-bthwani-contract-state: CONTRACT_ACTIVE
info:
  title: DSH Financial Refund Orchestration
  version: 1.2.1
  description: >-
    JRN-035 DSH contract. DSH validates actor, permission, authenticated tenant
    and owned-order scope, then delegates all financial truth to WLT. The actor
    tenant from Identity is authoritative; an optional X-Tenant-ID selector may
    only confirm that tenant and a mismatch is rejected. Client and partner reads
    intentionally exclude provider and operator evidence. WLT idempotency and
    outcome-persistence failures are propagated without changing status or body.
servers:
  - url: http://localhost:58080
security:
  - bearerAuth: []
paths:
  /dsh/control-panel/finance/refunds:
    get:
      operationId: listDshFinanceRefunds
      summary: List refunds for the authenticated tenant and optional order
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeaderOptional'
        - name: orderId
          in: query
          schema: { type: string, minLength: 1 }
      responses:
        '200':
          description: Canonical WLT refund list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlPanelRefundListEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '502': { $ref: '#/components/responses/WltUnavailable' }
    post:
      operationId: createDshFinanceRefund
      summary: Request a partial or full remaining refund
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
        - $ref: '#/components/parameters/IdempotencyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDshRefundRequest' }
      responses:
        '201':
          description: Refund request created in WLT
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlPanelRefundEnvelope' }
        '200':
          description: Exact idempotent replay
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlPanelRefundEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/MutationReceiptFailure' }
        '502': { $ref: '#/components/responses/WltUnavailable' }
  /dsh/control-panel/finance/refunds/{refundId}:
    get:
      operationId: getDshFinanceRefund
      summary: Read one authenticated-tenant-scoped canonical refund
      parameters:
        - $ref: '#/components/parameters/RefundId'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeaderOptional'
      responses:
        '200':
          description: Canonical WLT refund
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlPanelRefundEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /dsh/control-panel/finance/refunds/{refundId}/approve:
    post:
      operationId: approveDshFinanceRefund
      summary: Approve a requested refund as an independent operator
      parameters:
        - $ref: '#/components/parameters/RefundId'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
        - $ref: '#/components/parameters/IdempotencyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DecisionRequest' }
      responses:
        '200':
          description: Approved refund or exact replay
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlPanelRefundEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/MutationReceiptFailure' }
  /dsh/control-panel/finance/refunds/{refundId}/reject:
    post:
      operationId: rejectDshFinanceRefund
      summary: Reject a requested refund as an independent operator
      parameters:
        - $ref: '#/components/parameters/RefundId'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
        - $ref: '#/components/parameters/IdempotencyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DecisionRequest' }
      responses:
        '200':
          description: Rejected refund or exact replay
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlPanelRefundEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/MutationReceiptFailure' }
  /dsh/control-panel/finance/refunds/{refundId}/complete:
    post:
      operationId: completeDshFinanceRefund
      summary: Execute an approved refund through WLT and the provider
      description: >-
        DSH preserves the WLT status and error body. A 202 is returned only when
        WLT durably records provider_unknown. A 500 persistence failure is not
        retry permission and must not cause another provider call.
      parameters:
        - $ref: '#/components/parameters/RefundId'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
        - $ref: '#/components/parameters/IdempotencyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        '200':
          description: Provider-confirmed and ledger-posted refund or exact replay
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlPanelRefundEnvelope' }
        '202':
          description: Provider result unknown; reconciliation is required and retry is forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderUnknownError' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/CompletionPersistenceFailure' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '502': { $ref: '#/components/responses/WltUnavailable' }
  /dsh/control-panel/finance/refunds/{refundId}/reconcile:
    post:
      operationId: reconcileDshFinanceRefund
      summary: Resolve an unknown provider result with evidence
      parameters:
        - $ref: '#/components/parameters/RefundId'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
        - $ref: '#/components/parameters/IdempotencyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReconcileRequest' }
      responses:
        '200':
          description: Reconciled refund or exact replay
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ControlPanelRefundEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/MutationReceiptFailure' }
  /dsh/control-panel/finance/refunds/{refundId}/audit:
    get:
      operationId: listDshFinanceRefundAudit
      summary: Read operator, provider and lifecycle audit evidence
      parameters:
        - $ref: '#/components/parameters/RefundId'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeaderOptional'
      responses:
        '200':
          description: Append-only WLT audit events
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
  /dsh/client/orders/{orderId}/refunds:
    get:
      operationId: getDshClientOrderRefundStatus
      summary: Read privacy-safe refund status for the authenticated client's owned order
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/CorrelationHeaderOptional'
      responses:
        '200':
          description: Privacy-safe refund statuses
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivacyRefundListEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '502': { $ref: '#/components/responses/WltUnavailable' }
  /dsh/partner/orders/{orderId}/refunds:
    get:
      operationId: getDshPartnerOrderRefundStatus
      summary: Read privacy-safe refund status for an authenticated partner store order
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/CorrelationHeaderOptional'
      responses:
        '200':
          description: Privacy-safe refund statuses
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrivacyRefundListEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '502': { $ref: '#/components/responses/WltUnavailable' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    RefundId:
      name: refundId
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    OrderId:
      name: orderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TenantHeader:
      name: X-Tenant-ID
      in: header
      required: false
      description: >-
        Optional legacy tenant confirmation. DSH derives the authoritative tenant
        from the authenticated Identity actor and rejects a supplied mismatch.
      schema: { type: string, minLength: 1 }
    CorrelationHeader:
      name: X-Correlation-ID
      in: header
      required: true
      schema: { type: string, minLength: 1 }
    CorrelationHeaderOptional:
      name: X-Correlation-ID
      in: header
      required: false
      schema: { type: string, minLength: 1 }
    IdempotencyHeader:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1, maxLength: 255 }
  schemas:
    RefundStatus:
      type: string
      enum: [requested, approved, processing, provider_unknown, completed, rejected, reversed]
    ControlPanelRefund:
      type: object
      additionalProperties: false
      required: [id, orderId, paymentSessionId, clientId, amountMinorUnits, currency, reason, status, requestedByOperatorId, eligibilityReference, resolvedAt, createdAt, updatedAt]
      properties:
        id: { type: string }
        orderId: { type: string }
        paymentSessionId: { type: string }
        clientId: { type: string }
        amountMinorUnits: { type: integer, format: int64, minimum: 1 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        reason: { type: string }
        status: { $ref: '#/components/schemas/RefundStatus' }
        requestedByOperatorId: { type: string }
        approvedByOperatorId: { type: string }
        rejectedByOperatorId: { type: string }
        decisionReason: { type: string }
        eligibilityReference: { type: string }
        providerReference: { type: string }
        providerStatus: { type: string }
        reconciliationCaseId: { type: string }
        resolvedAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PrivacyRefund:
      type: object
      additionalProperties: false
      description: Does not expose provider references, provider errors or operator identities.
      required: [id, orderId, amountMinorUnits, currency, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        orderId: { type: string }
        amountMinorUnits: { type: integer, format: int64, minimum: 1 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        status: { $ref: '#/components/schemas/RefundStatus' }
        resolvedAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateDshRefundRequest:
      type: object
      additionalProperties: false
      required: [paymentSessionId, orderId, clientId, amountMinorUnits, reason, eligibilityReference]
      properties:
        paymentSessionId: { type: string, minLength: 1 }
        orderId: { type: string, format: uuid }
        clientId: { type: string, minLength: 1 }
        amountMinorUnits:
          type: integer
          format: int64
          minimum: 0
          description: Zero requests the full remaining refundable amount.
        reason: { type: string, minLength: 1 }
        eligibilityReference: { type: string, minLength: 1 }
    DecisionRequest:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason: { type: string, minLength: 1 }
    ReconcileRequest:
      type: object
      additionalProperties: false
      required: [resolutionAction, evidenceNote]
      properties:
        resolutionAction:
          type: string
          enum: [confirmed_success, confirmed_failed]
        evidenceNote: { type: string, minLength: 1 }
        providerReference: { type: string, minLength: 1 }
      allOf:
        - if:
            properties:
              resolutionAction: { const: confirmed_success }
          then:
            required: [providerReference]
    RefundAuditEvent:
      type: object
      additionalProperties: false
      required: [id, refundId, eventType, actorId, actorType, toStatus, createdAt]
      properties:
        id: { type: string, format: uuid }
        refundId: { type: string }
        eventType: { type: string }
        actorId: { type: string }
        actorType:
          type: string
          enum: [operator, service, provider, reconciler, system]
        fromStatus: { type: string }
        toStatus: { type: string }
        reason: { type: string }
        correlationId: { type: string }
        createdAt: { type: string, format: date-time }
    ControlPanelRefundEnvelope:
      type: object
      required: [refund]
      properties:
        refund: { $ref: '#/components/schemas/ControlPanelRefund' }
        replayed: { type: boolean }
    ControlPanelRefundListEnvelope:
      type: object
      required: [refunds]
      properties:
        refunds:
          type: array
          items: { $ref: '#/components/schemas/ControlPanelRefund' }
    PrivacyRefundListEnvelope:
      type: object
      required: [refunds]
      properties:
        refunds:
          type: array
          items: { $ref: '#/components/schemas/PrivacyRefund' }
    AuditEnvelope:
      type: object
      required: [auditEvents]
      properties:
        auditEvents:
          type: array
          items: { $ref: '#/components/schemas/RefundAuditEvent' }
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    ProviderUnknownError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            code: { const: PROVIDER_RESULT_UNKNOWN }
    OutcomePersistenceError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            code: { const: REFUND_OUTCOME_PERSISTENCE_FAILED }
    MutationReceiptError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            code:
              type: string
              enum: [REFUND_IDEMPOTENCY_STORE_FAILED, REFUND_IDEMPOTENCY_RECEIPT_FAILED]
    CompletionPersistenceError:
      oneOf:
        - $ref: '#/components/schemas/OutcomePersistenceError'
        - $ref: '#/components/schemas/MutationReceiptError'
  responses:
    BadRequest:
      description: Invalid request, missing authenticated tenant or missing reconciliation evidence
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid actor session
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Permission, tenant mismatch, maker-checker or store scope denied
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Refund or owned order not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Lifecycle, amount, changed-payload or in-progress idempotency conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    MutationReceiptFailure:
      description: WLT could not claim or complete the mutation replay receipt
      content:
        application/json:
          schema: { $ref: '#/components/schemas/MutationReceiptError' }
    CompletionPersistenceFailure:
      description: WLT could not persist the provider outcome or mutation replay evidence; automatic retry is forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CompletionPersistenceError' }
    WltUnavailable:
      description: DSH could not reach the canonical WLT financial service
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
