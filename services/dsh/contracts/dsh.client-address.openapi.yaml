openapi: 3.1.0
info:
  title: BThwani DSH Client Address API
  version: 0.2.0
  description: Authenticated client-owned delivery address book for DSH checkout and serviceability. Active address writes require coordinates that resolve to the supplied active DSH-owned service-area geofence.
x-bthwani-owner: services/dsh
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: DISABLED
x-bthwani-client-binding: MANUAL_TYPED_ADAPTER
x-bthwani-runtime-dependency: true

paths:
  /dsh/client/addresses:
    get:
      operationId: listDshClientAddresses
      tags: [DshClientAddress]
      summary: List active addresses owned by the authenticated client.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Address list.
          content:
            application/json:
              schema:
                type: object
                required: [addresses]
                properties:
                  addresses:
                    type: array
                    items: { $ref: "#/components/schemas/DshClientAddress" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    post:
      operationId: createDshClientAddress
      tags: [DshClientAddress]
      summary: Create an address owned by the authenticated client after governed geofence verification.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCreateClientAddressInput" }
      responses:
        "201":
          description: Address created.
          content:
            application/json:
              schema:
                type: object
                required: [address]
                properties:
                  address: { $ref: "#/components/schemas/DshClientAddress" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ServiceAreaUnverified" }

  /dsh/client/addresses/{addressId}:
    parameters:
      - $ref: "#/components/parameters/AddressId"
    patch:
      operationId: updateDshClientAddress
      tags: [DshClientAddress]
      summary: Update an owned address using optimistic concurrency and governed geofence verification.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshUpdateClientAddressInput" }
      responses:
        "200":
          description: Address updated.
          content:
            application/json:
              schema:
                type: object
                required: [address]
                properties:
                  address: { $ref: "#/components/schemas/DshClientAddress" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/ServiceAreaUnverified" }
    delete:
      operationId: deleteDshClientAddress
      tags: [DshClientAddress]
      summary: Soft-delete an address owned by the authenticated client.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ExpectedVersion"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "204": { description: Address deleted. }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/client/addresses/{addressId}/default:
    parameters:
      - $ref: "#/components/parameters/AddressId"
    post:
      operationId: setDshClientDefaultAddress
      tags: [DshClientAddress]
      summary: Make one active client address the sole default address.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Default address updated.
          content:
            application/json:
              schema:
                type: object
                required: [address]
                properties:
                  address: { $ref: "#/components/schemas/DshClientAddress" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AddressId:
      name: addressId
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 200 }
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema: { type: string, minLength: 1, maxLength: 200 }
    ExpectedVersion:
      name: If-Match-Version
      in: header
      required: true
      schema: { type: integer, minimum: 1 }

  schemas:
    DshClientAddress:
      type: object
      required:
        - id
        - label
        - recipientName
        - phoneE164
        - addressLine
        - serviceAreaCode
        - isDefault
        - version
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        label: { type: string }
        recipientName: { type: string }
        phoneE164: { type: string }
        addressLine: { type: string }
        serviceAreaCode: { type: string }
        building: { type: string, nullable: true }
        floor: { type: string, nullable: true }
        unit: { type: string, nullable: true }
        deliveryInstructions: { type: string, nullable: true }
        latitude: { type: number, format: double, minimum: -90, maximum: 90, nullable: true }
        longitude: { type: number, format: double, minimum: -180, maximum: 180, nullable: true }
        isDefault: { type: boolean }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCreateClientAddressInput:
      type: object
      additionalProperties: false
      required: [label, recipientName, phoneE164, addressLine, serviceAreaCode, latitude, longitude]
      properties:
        label: { type: string, minLength: 1, maxLength: 80 }
        recipientName: { type: string, minLength: 2, maxLength: 160 }
        phoneE164: { type: string, pattern: '^\\+[1-9][0-9]{7,14}$' }
        addressLine: { type: string, minLength: 5, maxLength: 500 }
        serviceAreaCode:
          type: string
          minLength: 1
          maxLength: 80
          description: Must equal the active DSH service-area code resolved from latitude and longitude.
        building: { type: string, maxLength: 120 }
        floor: { type: string, maxLength: 40 }
        unit: { type: string, maxLength: 40 }
        deliveryInstructions: { type: string, maxLength: 500 }
        latitude: { type: number, format: double, minimum: -90, maximum: 90 }
        longitude: { type: number, format: double, minimum: -180, maximum: 180 }
        makeDefault: { type: boolean, default: false }

    DshUpdateClientAddressInput:
      allOf:
        - $ref: "#/components/schemas/DshCreateClientAddressInput"
        - type: object
          required: [expectedVersion]
          properties:
            expectedVersion: { type: integer, minimum: 1 }

    DshError:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

  responses:
    InvalidRequest:
      description: Invalid request.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/DshError" }
    Unauthenticated:
      description: Authentication required.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/DshError" }
    NotFound:
      description: Address not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/DshError" }
    Conflict:
      description: Idempotency, duplicate-address, or optimistic-concurrency conflict.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/DshError" }
    ServiceAreaUnverified:
      description: Coordinates are missing, outside active service areas, or do not match serviceAreaCode.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/DshError" }
