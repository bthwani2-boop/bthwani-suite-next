openapi: 3.1.0
info:
  title: BThwani DSH Notification Governance API
  version: 1.2.0
  description: >-
    Standalone governed contract for JRN-023 notification delivery policy,
    actor channels, quiet hours, localized templates, deep links, actor-owned
    push endpoints and delivery audit.
servers:
  - url: /
tags:
  - name: DshNotificationGovernance
security:
  - bearerAuth: []
paths:
  /dsh/notifications/push-endpoints:
    put:
      operationId: upsertDshNotificationPushEndpoint
      summary: Register or refresh the authenticated actor's current push endpoint.
      tags: [DshNotificationGovernance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshUpsertNotificationPushEndpointRequest"
      responses:
        "200":
          description: Actor-owned push endpoint registered or refreshed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshNotificationPushEndpointResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /dsh/notifications/push-endpoints/{deviceId}:
    delete:
      operationId: deactivateDshNotificationPushEndpoint
      summary: Deactivate one push endpoint owned by the authenticated actor.
      tags: [DshNotificationGovernance]
      parameters:
        - name: deviceId
          in: path
          required: true
          schema: { type: string, minLength: 1, maxLength: 256 }
      responses:
        "200":
          description: Push endpoint deactivated.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [deactivated]
                properties:
                  deactivated: { type: boolean, const: true }
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /dsh/operator/notifications/delivery-attempts:
    get:
      operationId: listDshNotificationDeliveryAttempts
      summary: List governed notification delivery attempts and retry/dead-letter summary.
      tags: [DshNotificationGovernance]
      parameters:
        - name: outcome
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DshNotificationDeliveryOutcome"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Delivery attempts and aggregate delivery state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshNotificationDeliveryAuditResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    InvalidRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshNotificationError"
    Unauthenticated:
      description: Authentication is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshNotificationError"
    Forbidden:
      description: The authenticated actor lacks notification-governance permission.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshNotificationError"
    NotFound:
      description: Requested push endpoint was not found for the actor.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshNotificationError"
  schemas:
    DshNotificationChannel:
      type: string
      enum: [in_app, push]
    DshNotificationLocale:
      type: string
      enum: [ar, en]
    DshNotificationDeliveryOutcome:
      type: string
      enum: [sent, retry_scheduled, dead_letter]
    DshNotificationPreferencePolicy:
      type: object
      additionalProperties: false
      required:
        - actorId
        - actorType
        - topic
        - enabled
        - channels
        - locale
        - timezone
        - updatedAt
      properties:
        actorId: { type: string, minLength: 1 }
        actorType:
          type: string
          enum: [client, partner, captain, field, operator]
        topic: { type: string, minLength: 1 }
        enabled: { type: boolean }
        channels:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/DshNotificationChannel"
        quietHoursStart:
          type: [string, "null"]
          pattern: "^(?:[01][0-9]|2[0-3]):[0-5][0-9](?::[0-5][0-9])?$"
        quietHoursEnd:
          type: [string, "null"]
          pattern: "^(?:[01][0-9]|2[0-3]):[0-5][0-9](?::[0-5][0-9])?$"
        locale:
          $ref: "#/components/schemas/DshNotificationLocale"
        timezone: { type: string, minLength: 1 }
        updatedAt: { type: string, format: date-time }
    DshPlatformNotificationPolicy:
      type: object
      additionalProperties: false
      required:
        - id
        - topic
        - actorTypes
        - isEnabled
        - description
        - defaultChannels
        - titleAr
        - bodyAr
        - titleEn
        - bodyEn
        - variables
        - deepLinkPattern
        - updatedBy
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        topic: { type: string, minLength: 1 }
        actorTypes:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: [client, partner, captain, field, operator]
        isEnabled: { type: boolean }
        description: { type: string }
        defaultChannels:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/DshNotificationChannel"
        titleAr: { type: string }
        bodyAr: { type: string }
        titleEn: { type: string }
        bodyEn: { type: string }
        variables:
          type: array
          uniqueItems: true
          items: { type: string, minLength: 1 }
        deepLinkPattern: { type: string }
        updatedBy: { type: string }
        updatedAt: { type: string, format: date-time }
    DshUpsertNotificationPushEndpointRequest:
      type: object
      additionalProperties: false
      required: [provider, endpointToken, deviceId, platform]
      properties:
        provider: { type: string, const: expo }
        endpointToken: { type: string, minLength: 1, maxLength: 4096 }
        deviceId: { type: string, minLength: 1, maxLength: 256 }
        platform:
          type: string
          enum: [android, ios]
    DshNotificationPushEndpoint:
      type: object
      additionalProperties: false
      required:
        - id
        - actorId
        - actorType
        - provider
        - deviceId
        - platform
        - active
        - lastSeenAt
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        actorId: { type: string }
        actorType:
          type: string
          enum: [client, partner, captain, field, operator]
        provider: { type: string, const: expo }
        deviceId: { type: string }
        platform:
          type: string
          enum: [android, ios]
        active: { type: boolean }
        lastSeenAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DshNotificationPushEndpointResponse:
      type: object
      additionalProperties: false
      required: [endpoint]
      properties:
        endpoint:
          $ref: "#/components/schemas/DshNotificationPushEndpoint"
    DshNotificationDeliveryAttempt:
      type: object
      additionalProperties: false
      required:
        - id
        - eventId
        - eventType
        - entityType
        - entityId
        - attemptNumber
        - outcome
        - errorMessage
        - createdAt
        - outboxStatus
        - correlationId
      properties:
        id: { type: string, format: uuid }
        eventId: { type: string, format: uuid }
        eventType: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        attemptNumber: { type: integer, minimum: 1 }
        outcome:
          $ref: "#/components/schemas/DshNotificationDeliveryOutcome"
        errorMessage: { type: string }
        nextRetryAt: { type: [string, "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        outboxStatus:
          type: string
          enum: [pending, sent, failed]
        correlationId: { type: string }
    DshNotificationPushDeliveryAudit:
      type: object
      additionalProperties: false
      required:
        - id
        - notificationId
        - actorId
        - actorType
        - topic
        - status
        - attemptCount
        - nextRetryAt
        - providerMessageId
        - lastError
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        notificationId: { type: string, format: uuid }
        actorId: { type: string }
        actorType:
          type: string
          enum: [client, partner, captain, field, operator]
        topic: { type: string }
        status:
          type: string
          enum: [pending, sent, failed]
        attemptCount: { type: integer, minimum: 0 }
        nextRetryAt: { type: string, format: date-time }
        providerMessageId: { type: string }
        lastError: { type: string }
        sentAt: { type: [string, "null"], format: date-time }
        failedAt: { type: [string, "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DshNotificationDeliveryAuditSummary:
      type: object
      additionalProperties: false
      required:
        - sent
        - retryScheduled
        - deadLetter
        - pendingOutbox
        - failedOutbox
        - sentPush
        - pendingPush
        - failedPush
      properties:
        sent: { type: integer, minimum: 0 }
        retryScheduled: { type: integer, minimum: 0 }
        deadLetter: { type: integer, minimum: 0 }
        pendingOutbox: { type: integer, minimum: 0 }
        failedOutbox: { type: integer, minimum: 0 }
        sentPush: { type: integer, minimum: 0 }
        pendingPush: { type: integer, minimum: 0 }
        failedPush: { type: integer, minimum: 0 }
    DshNotificationDeliveryAuditResponse:
      type: object
      additionalProperties: false
      required: [attempts, pushDeliveries, summary]
      properties:
        attempts:
          type: array
          items:
            $ref: "#/components/schemas/DshNotificationDeliveryAttempt"
        pushDeliveries:
          type: array
          items:
            $ref: "#/components/schemas/DshNotificationPushDeliveryAudit"
        summary:
          $ref: "#/components/schemas/DshNotificationDeliveryAuditSummary"
    DshNotificationError:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
