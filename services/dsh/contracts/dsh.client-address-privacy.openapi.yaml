openapi: 3.1.0
info:
  title: BThwani DSH Client Address Privacy API
  version: 0.1.0
  description: Governed retention and irreversible anonymization controls for deleted client addresses.
x-bthwani-owner: services/dsh
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: DISABLED
x-bthwani-client-binding: MANUAL_TYPED_ADAPTER
x-bthwani-runtime-dependency: true

paths:
  /dsh/operator/privacy/client-addresses/policy:
    get:
      operationId: getDshClientAddressPrivacyPolicy
      tags: [DshClientAddressPrivacy]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current retention policy.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy: { $ref: "#/components/schemas/DshClientAddressPrivacyPolicy" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      operationId: updateDshClientAddressPrivacyPolicy
      tags: [DshClientAddressPrivacy]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshUpdateClientAddressPrivacyPolicyInput" }
      responses:
        "200":
          description: Policy updated or replayed idempotently.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy: { $ref: "#/components/schemas/DshClientAddressPrivacyPolicy" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/operator/privacy/client-addresses/anonymize:
    post:
      operationId: anonymizeDshExpiredClientAddresses
      tags: [DshClientAddressPrivacy]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [limit]
              properties:
                limit: { type: integer, minimum: 0, maximum: 10000 }
      responses:
        "200":
          description: Due deleted addresses anonymized or prior result replayed.
          content:
            application/json:
              schema:
                type: object
                required: [result]
                properties:
                  result: { $ref: "#/components/schemas/DshClientAddressAnonymizationResult" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 200 }
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 200 }
  schemas:
    DshClientAddressPrivacyPolicy:
      type: object
      required: [enabled, retentionDays, batchLimit, version, updatedBy, updatedAt]
      properties:
        enabled: { type: boolean }
        retentionDays: { type: integer, minimum: 0, maximum: 3650 }
        batchLimit: { type: integer, minimum: 1, maximum: 10000 }
        version: { type: integer, minimum: 1 }
        updatedBy: { type: string }
        updatedAt: { type: string, format: date-time }
    DshUpdateClientAddressPrivacyPolicyInput:
      type: object
      additionalProperties: false
      required: [enabled, retentionDays, batchLimit, expectedVersion, reason]
      properties:
        enabled: { type: boolean }
        retentionDays: { type: integer, minimum: 0, maximum: 3650 }
        batchLimit: { type: integer, minimum: 1, maximum: 10000 }
        expectedVersion: { type: integer, minimum: 1 }
        reason: { type: string, minLength: 3, maxLength: 500 }
    DshClientAddressAnonymizationResult:
      type: object
      required: [anonymizedCount, completedAt]
      properties:
        anonymizedCount: { type: integer, minimum: 0 }
        completedAt: { type: string, format: date-time }
    DshError:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
  responses:
    InvalidRequest: { description: Invalid request, content: { application/json: { schema: { $ref: "#/components/schemas/DshError" } } } }
    Unauthenticated: { description: Authentication required, content: { application/json: { schema: { $ref: "#/components/schemas/DshError" } } } }
    Forbidden: { description: Permission required, content: { application/json: { schema: { $ref: "#/components/schemas/DshError" } } } }
    Conflict: { description: Version or idempotency conflict, content: { application/json: { schema: { $ref: "#/components/schemas/DshError" } } } }
