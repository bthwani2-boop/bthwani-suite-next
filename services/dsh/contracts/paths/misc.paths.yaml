# BThwani DSH OpenAPI path-items module: misc.
# Source of truth. Referenced by ../dsh.openapi.yaml; do not add an openapi root here.

/dsh/store-context:
  get:
    operationId: getDshStoreContext
    summary: Resolve the authenticated actor's own or assigned store context.
    tags: [DshStoreGovernance]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Scoped store context.
        content:
          application/json:
            schema:
              $ref: "../dsh.openapi.yaml#/components/schemas/DshStoreContextResponse"
      "401":
        $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated"
      "403":
        $ref: "../dsh.openapi.yaml#/components/responses/Forbidden"
      "404":
        $ref: "../dsh.openapi.yaml#/components/responses/NotFound"
      "503":
        $ref: "../dsh.openapi.yaml#/components/responses/ServiceUnavailable"

/dsh/control-panel/finance/settlements:
  get:
    operationId: listDshControlPanelFinanceSettlements
    summary: Operator reads the governed WLT settlements view through the DSH finance proxy. WLT service auth stays server-side.
    tags: [DshFinanceProxy]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: partnerId
        in: query
        required: false
        schema: { type: string }
      - name: limit
        in: query
        required: false
        schema: { type: string }
      - name: cursor
        in: query
        required: false
        schema: { type: string }
    responses:
      "200":
        description: WLT settlements view (verbatim passthrough).
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

