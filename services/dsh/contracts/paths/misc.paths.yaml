/dsh/client/special-requests/{requestId}/approve-quote:
  post:
    operationId: approveDshSpecialRequestQuote
    summary: Approve an operator-set quote and hand off to WLT for a payment session
    tags:
      - DshClientSpecialRequests
    security: [{ bearerAuth: [] }]
    parameters:
      - name: requestId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [expectedVersion]
            properties:
              expectedVersion: { type: integer }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshSpecialRequestResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409": { $ref: "../dsh.openapi.yaml#/components/responses/Conflict" }
      "503": { description: WLT payment-session handoff is unavailable. }
