/dsh/control-panel/finance/reconciliation-cases/{caseId}/resolve:
  post:
    operationId: resolveDshControlPanelFinanceReconciliationCase
    summary: Operator resolves a reconciliation case.
    tags: [DshFinanceProxy]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: caseId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [resolutionAction, resolutionNote]
            properties:
              resolutionAction:
                type: string
                enum: [confirmed_success, confirmed_failed, manual_adjustment, ignored]
              resolutionNote:
                type: string
    responses:
      "200":
        description: WLT reconciliation case resolution result (verbatim passthrough).
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
