    summary: Governed finance operation owned by DSH/WLT.
    tags: [DshCaptainFinance]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: recordId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: false
      content:
        application/json:
          schema: { type: object, additionalProperties: true }
    responses:
      "200": { description: Governed finance response, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
      "201": { description: Governed finance object created, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
