        in: query
        required: false
        schema: { type: string, enum: [pending_review, approved, rejected, archived] }
      - name: limit
        in: query
        required: false
        schema: { type: integer, default: 50 }
      - name: offset
        in: query
        required: false
        schema: { type: integer, default: 0 }
    responses:
      "200":
        description: List of reels (operator view).
        content:
          application/json:
            schema:
              type: object
              properties:
                reels:
                  type: array
                  items: { $ref: "../dsh.openapi.yaml#/components/schemas/DshReel" }

/dsh/operator/reels/{reelId}/review:
  post:
    operationId: reviewReel
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: reelId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [decision]
            properties:
              decision: { type: string, enum: [approved, rejected, archived] }
              reviewNote: { type: string }
              targetType: { type: string, enum: [master_product, store, offer] }
              targetId: { type: string }
              sortOrder: { type: integer }
    responses:
      "200":
        description: Reel reviewed.
        content:
          application/json:
            schema:
              type: object
              properties:
                reel: { $ref: "../dsh.openapi.yaml#/components/schemas/DshReel" }

/dsh/partner/reels:
  post:
    operationId: submitReel
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [assetId, targetType, targetId]
            properties:
              assetId: { type: string }
              titleAr: { type: string }
              titleEn: { type: string }
              targetType: { type: string, enum: [master_product, store, offer] }
              targetId: { type: string }
              sortOrder: { type: integer }
              sourceStoreId: { type: string }
    responses:
      "201":
        description: Reel submitted for review.
        content:
          application/json:
            schema:
              type: object
              properties:
                reel: { $ref: "../dsh.openapi.yaml#/components/schemas/DshReel" }

