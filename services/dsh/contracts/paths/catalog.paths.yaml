# BThwani DSH OpenAPI path-items module: catalog.
# Source of truth. Referenced by ../dsh.openapi.yaml; do not add an openapi root here.

/dsh/stores/{storeId}/catalog:
  get:
    operationId: getPublishedDshCatalog
    deprecated: false # response shape changed: now { domains, products } from the master catalog (dsh-030); see CentralCatalog tag.
    summary: Return the approved, active catalog for a publicly eligible store.
    tags: [DshCatalog]
    parameters:
      - $ref: "../dsh.openapi.yaml#/components/parameters/StoreId"
    responses:
      "200":
        description: Published categories and products.
        content:
          application/json:
            schema:
              $ref: "../dsh.openapi.yaml#/components/schemas/DshCatalogResponse"
      "404":
        $ref: "../dsh.openapi.yaml#/components/responses/NotFound"

/dsh/public/media/{assetId}/{variant}:
  get:
    operationId: getPublicCatalogMedia
    summary: Stream an approved DAM asset's binary. Unauthenticated -- only status=approved assets are ever served.
    tags: [DshCatalog]
    parameters:
      - name: assetId
        in: path
        required: true
        schema: { type: string }
      - name: variant
        in: path
        required: true
        description: Rendition selector; only "original" is served today.
        schema: { type: string }
    responses:
      "200":
        description: Image bytes.
      "404":
        $ref: "../dsh.openapi.yaml#/components/responses/NotFound"

# ─── Central Catalog Sovereignty ───────────────────────────────────────────
# governance/catalog/CENTRAL_CATALOG_SOVEREIGNTY_DECISION.md. From dsh-030
# forward, dsh_catalog_domains/dsh_catalog_nodes/dsh_master_products are the
# only ground truth for categories/products. Local catalog routes and tables
# were retired by dsh-036; every surface uses the endpoints below.

/dsh/operator/catalog/domains:
  get:
    operationId: listCatalogDomains
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    responses:
      "200": { description: BUSINESS_DOMAIN (L1) list. }
  post:
    operationId: createCatalogDomain
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    responses:
      "201": { description: Domain created. }

/dsh/operator/catalog/domains/{domainId}:
  patch:
    operationId: updateCatalogDomain
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: domainId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            description: All fields are optional. Only provided fields are updated.
            properties:
              expectedVersion: { type: integer }
              nameAr: { type: string }
              nameEn: { type: string }
              icon: { type: string }
              sortOrder: { type: integer }
              isActive: { type: boolean }
              isClientVisible: { type: boolean }
              requiresProductCatalog: { type: boolean }
              isManualRequest: { type: boolean }
    responses:
      "200": { description: Domain updated. }

/dsh/operator/catalog/nodes:
  get:
    operationId: listCatalogNodes
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: domainId
        in: query
        schema: { type: string }
      - name: parentId
        in: query
        schema: { type: string }
    responses:
      "200": { description: BUSINESS_SUBDOMAIN/PRODUCT_MAIN_CLASS/PRODUCT_SUB_CLASS (L2-L4) list. }
  post:
    operationId: createCatalogNode
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    responses:
      "201": { description: Node created. }

/dsh/operator/catalog/nodes/{nodeId}:
  patch:
    operationId: updateCatalogNode
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: nodeId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            description: All fields are optional. Only provided fields are updated.
            properties:
              expectedVersion: { type: integer }
              nameAr: { type: string }
              nameEn: { type: string }
              icon: { type: string }
              sortOrder: { type: integer }
              isActive: { type: boolean }
              isClientVisible: { type: boolean }
    responses:
      "200": { description: Node updated. }

/dsh/operator/catalog/master-products:
  get:
    operationId: listMasterProductsOperator
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: domainId
        in: query
        schema: { type: string }
      - name: categoryNodeId
        in: query
        schema: { type: string }
      - name: approvalStatus
        in: query
        schema: { type: string }
      - name: search
        in: query
        schema: { type: string }
      - name: isActive
        in: query
        schema: { type: boolean }
      - name: imageStatus
        in: query
        schema: { type: string }
      - name: sortBy
        in: query
        schema: { type: string, enum: [createdAt, updatedAt, nameAr, price] }
      - name: sortDirection
        in: query
        schema: { type: string, enum: [asc, desc] }
      - name: createdFrom
        in: query
        schema: { type: string, format: date-time }
      - name: createdTo
        in: query
        schema: { type: string, format: date-time }
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      - name: offset
        in: query
        schema: { type: integer, minimum: 0, default: 0 }
    responses:
      "200":
        description: MASTER_PRODUCT (L5) list.
        content:
          application/json:
            schema:
              $ref: "../dsh.openapi.yaml#/components/schemas/DshMasterProductListResponse"
  post:
    operationId: createMasterProduct
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    responses:
      "201": { description: Master product created. }

/dsh/operator/catalog/master-products/{productId}:
  patch:
    operationId: updateMasterProduct
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: productId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            description: All fields are optional. Only provided fields are updated. Do NOT send canonicalImageObjectKey — images are managed via DAM asset links.
            properties:
              expectedVersion: { type: integer }
              canonicalNameAr: { type: string }
              canonicalNameEn: { type: string }
              brand: { type: string }
              unit: { type: string }
              unitPrice: { type: number }
              currency: { type: string }
              stockStatus: { type: string, enum: [in_stock, low_stock, out_of_stock] }
              isActive: { type: boolean }
              approvalStatus: { type: string }
    responses:
      "200": { description: Master product updated. }

/dsh/operator/catalog/product-proposals:
  get:
    operationId: listProductProposals
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: status
        in: query
        schema: { type: string }
      - name: storeId
        in: query
        schema: { type: string }
      - name: limit
        in: query
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      - name: offset
        in: query
        schema: { type: integer, minimum: 0, default: 0 }
    responses:
      "200":
        description: Product proposal queue (requests to add to the master catalog).
        content:
          application/json:
            schema:
              $ref: "../dsh.openapi.yaml#/components/schemas/DshProductProposalListResponse"

/dsh/operator/catalog/product-proposals/{proposalId}/decision:
