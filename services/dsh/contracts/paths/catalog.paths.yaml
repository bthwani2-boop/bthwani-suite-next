    operationId: decideProductProposal
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: proposalId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200": { description: Proposal moved to under_review/adopted/rejected/needs_fix. }

/dsh/operator/catalog/product-proposals/{proposalId}/transition:
  post:
    operationId: transitionProductProposal
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: proposalId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200": { description: Proposal transitioned along the multi-stage review pipeline. }

/dsh/operator/catalog/platform-policies:
  get:
    operationId: listCatalogPlatformPolicies
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    responses:
      "200": { description: "Per-domain/per-node/default commission, fee, and capability policy rows." }

/dsh/operator/catalog/platform-policies/{policyId}:
  put:
    operationId: updateCatalogPlatformPolicy
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: policyId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: >
              All fields must be sent (PUT semantics — omitted fields will be cleared).
              This prevents unintentional zeroing of booleans and integers.
            properties:
              expectedVersion: { type: integer }
              isActive: { type: boolean }
              requiresMarketingReview: { type: boolean }
              requiresProductImage: { type: boolean }
              requiresCategoryImage: { type: boolean }
              requiresDescription: { type: boolean }
              requiresBrand: { type: boolean }
              requiresUnit: { type: boolean }
              productDataQualityMinimumScore: { type: integer }
              maxGalleryImages: { type: integer }
              manualRequestMode: { type: boolean }
              allowsStoreProductCustomImage: { type: boolean }
    responses:
      "200": { description: Policy updated. }
  patch:
    operationId: patchCatalogPlatformPolicy
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: policyId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            description: All fields are optional. Only provided fields are updated.
            properties:
              expectedVersion: { type: integer }
              isActive: { type: boolean }
              requiresMarketingReview: { type: boolean }
              requiresProductImage: { type: boolean }
              requiresCategoryImage: { type: boolean }
              requiresDescription: { type: boolean }
              requiresBrand: { type: boolean }
              requiresUnit: { type: boolean }
              productDataQualityMinimumScore: { type: integer }
              maxGalleryImages: { type: integer }
              manualRequestMode: { type: boolean }
              allowsStoreProductCustomImage: { type: boolean }
    responses:
      "200": { description: Policy updated. }

/dsh/operator/catalog/seed-status:
  get:
    operationId: getCatalogSeedStatus
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    responses:
      "200":
        description: Seed status diagnostics.

/dsh/operator/catalog/assets:
  get:
    operationId: listCatalogAssets
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: status
        in: query
        required: false
        schema: { type: string }
      - name: limit
        in: query
        required: false
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      - name: offset
        in: query
        required: false
        schema: { type: integer, minimum: 0, default: 0 }
    responses:
      "200":
        description: List of DAM assets.
        content:
          application/json:
            schema:
              $ref: "../dsh.openapi.yaml#/components/schemas/DshCatalogAssetListResponse"

/dsh/operator/catalog/assets/upload-intents:
  post:
    operationId: createAssetUploadIntent
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [fileName, mimeType, sizeBytes]
            properties:
              fileName: { type: string }
              mimeType:
                type: string
                description: >
                  For image assets: image/jpeg, image/png, or image/webp only.
                  For reel videos: video/mp4 only.
              sizeBytes: { type: integer }
              altAr: { type: string }
              altEn: { type: string }
              intendedEntityType:
                type: string
                description: Optional target entity type (domain, node, master_product, store, store_assortment, product_proposal, campaign).
              intendedEntityId:
                type: string
                description: Optional target entity ID.
              intendedRole:
                type: string
                description: Optional DAM role for the target entity.
    responses:
      "201":
        description: Upload intent created.
        content:
          application/json:
            schema:
              type: object
              properties:
                asset: { $ref: "../dsh.openapi.yaml#/components/schemas/DshCatalogAsset" }
                uploadUrl:
                  type: string
                  description: >
                    Short-lived presigned MinIO PUT URL signed against the public endpoint.
                    The client must PUT directly to this URL without modifying it.
                expiresAt: { type: string, format: date-time }

/dsh/operator/catalog/assets/{assetId}/complete:
  post:
    operationId: completeAssetUpload
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: assetId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Asset upload verified against storage and moved out of draft.

/dsh/operator/catalog/assets/{assetId}:
  patch:
    operationId: updateCatalogAsset
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: assetId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            description: >
              Only alt text and dominant color may be updated via PATCH.
              Status, size, checksum, and publicUrl are controlled by the upload lifecycle
              (intent → PUT → complete) and must not be sent here.
            properties:
              altAr: { type: string }
              altEn: { type: string }
              dominantColor: { type: string }
    responses:
      "200":
        description: Asset alt text / dominant color updated.
  delete:
    operationId: deleteCatalogAsset
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: assetId
        in: path
        required: true
        schema: { type: string }
    responses:
      "204":
        description: Asset deleted (only draft/uploaded/rejected with no active links).

/dsh/operator/catalog/assets/{assetId}/review:
  post:
    operationId: reviewCatalogAsset
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: assetId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [decision]
            properties:
              decision:
                type: string
                enum: [approved, rejected, archived]
                description: >
                  Valid transitions: uploaded→pending_review (automatic on complete),
                  pending_review→approved|rejected, approved→archived.
                  draft assets may not be approved directly.
              reviewNote: { type: string }
    responses:
      "200":
        description: Asset reviewed by operator.
        content:
          application/json:
            schema:
              type: object
              properties:
                asset: { $ref: "../dsh.openapi.yaml#/components/schemas/DshCatalogAsset" }

/dsh/operator/catalog/assets/{assetId}/link:
  post:
    operationId: linkCatalogAsset
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: assetId
        in: path
        required: true
        schema: { type: string }
    responses:
      "201":
        description: Link established.

/dsh/operator/catalog/assets/{assetId}/links/{linkId}:
  delete:
    operationId: unlinkCatalogAsset
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: assetId
        in: path
        required: true
        schema: { type: string }
      - name: linkId
        in: path
        required: true
        schema: { type: string }
      - name: entityType
        in: query
        required: true
        schema: { type: string }
      - name: entityId
        in: query
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Link removed.

/dsh/operator/reels:
  get:
    operationId: listReels
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
