/dsh/field/catalog/taxonomy:
  get:
    operationId: getFieldCatalogTaxonomy
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    responses:
      "200": { description: Read-only domain+node tree for the field surface (never hardcode categories in app-field). }

/dsh/field/catalog/master-products:
  get:
    operationId: listFieldMasterProducts
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    responses:
      "200": { description: Searchable master product list for the field surface. }

/dsh/field/partners/{partnerId}/stores/{storeId}/assortment/{masterProductId}:
  put:
    operationId: fieldUpsertStoreAssortment
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: partnerId
        in: path
        required: true
        schema: { type: string }
      - $ref: "../dsh.openapi.yaml#/components/parameters/StoreId"
      - name: masterProductId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200": { description: Assortment row created/updated on behalf of a field-onboarded partner's store. }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }

/dsh/field/partners/{partnerId}/assortment:
  get:
    operationId: fieldGetStoreAssortment
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: partnerId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200": { description: Current central assortment for the field-owned partner draft. }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }

/dsh/field/partners/{partnerId}/catalog/product-proposals:
  post:
    operationId: createFieldProductProposal
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: partnerId
        in: path
        required: true
        schema: { type: string }
    responses:
      "201": { description: Product proposal submitted for the field-owned partner store — never a final sellable product. }

/dsh/field/partners/{partnerId}/catalog/product-proposals/{proposalId}:
  put:
    operationId: updateFieldProductProposal
    tags: [CentralCatalog]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: partnerId
        in: path
        required: true
        schema: { type: string }
      - name: proposalId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200": { description: Product proposal updated and resubmitted. }

# ─── Cart & Serviceability Quote ────────────────────────────────
# Runtime handlers registered in server.go. Client must be authenticated.
# DSH catalog now owns a real numeric unitPrice per product (see dsh-022
# migration): checkout derives the cart total from this, never from the
# client. priceReference remains a display-only label. Payment execution,
# capture, settlement, refund, and ledger truth remain WLT-owned.
# ──────────────────────────────────────────────────────────────────────────

/dsh/catalog-approvals:
  get:
    operationId: listDshCatalogApprovals
    summary: List catalog approval records (partner submission review queue).
    tags: [DshCatalogApprovals]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: entityType
        in: query
        required: false
        schema: { type: string }
      - name: stage
        in: query
        required: false
        schema: { type: string }
      - name: source
        in: query
        required: false
        schema: { type: string }
    responses:
      "200":
        description: Catalog approval records.
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
  post:
    operationId: createDshCatalogApproval
    summary: Create a catalog approval record.
    tags: [DshCatalogApprovals]
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { type: object, additionalProperties: true }
    responses:
      "201":
        description: Created catalog approval record.
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/catalog-approvals/{recordId}:
  get:
    operationId: getDshCatalogApproval
    summary: Read one catalog approval record.
    tags: [DshCatalogApprovals]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: recordId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Catalog approval record.
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

/dsh/catalog-approvals/{recordId}/transition:
  post:
    operationId: transitionDshCatalogApproval
    summary: Transition a catalog approval record to a new stage.
    tags: [DshCatalogApprovals]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: recordId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { type: object, additionalProperties: true }
    responses:
      "200":
        description: Updated catalog approval record.
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

/dsh/partner/catalog-approvals:
  get:
    operationId: listDshPartnerCatalogApprovals
    summary: Partner reads their own catalog approval queue.
    tags: [DshCatalogApprovals]
    security: [{ bearerAuth: [] }]
    responses:
      "200":
        description: Partner catalog approval queue.
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
