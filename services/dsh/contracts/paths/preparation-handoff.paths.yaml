/dsh/partner/order-workboard:
  get:
    operationId: getDshPartnerOrderWorkboard
    summary: Return actor-scoped partner orders with server-authoritative executable actions.
    tags: [DshOrders]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: status
        in: query
        required: false
        description: Optional exact lifecycle status. Omit to return the complete store workboard.
        schema:
          $ref: "../dsh.openapi.yaml#/components/schemas/DshOrderStatus"
    responses:
      "200":
        description: Actor-scoped partner workboard.
        content:
          application/json:
            schema:
              $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerOrderWorkboardResponse"
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }

/dsh/orders/{orderId}/preparation:
  get:
    operationId: getDshOrderPreparation
    summary: Return governed preparation timing to an authorized client, partner, assigned captain, or operator.
    tags: [DshOrders]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Preparation timing returned.
        content:
          application/json:
            schema:
              type: object
              required: [preparation]
              properties:
                preparation:
                  $ref: "../dsh.openapi.yaml#/components/schemas/DshOrderPreparation"
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

