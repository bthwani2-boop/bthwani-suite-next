  delete:
    operationId: archiveDshCampaign
    summary: Archive a marketing campaign (soft archive — status set to cancelled, archived_at recorded; the row is never physically deleted).
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    parameters:
      - name: campaignId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Campaign archived.
        content:
          application/json:
            schema:
              type: object
              required: [archived]
