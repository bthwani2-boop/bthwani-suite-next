/dsh/operator/marketing/tickers/{tickerId}:
  patch:
    operationId: updateDshMarketingTicker
    summary: Update a marketing news ticker. Status lifecycle is governed (draft -> published|paused, published <-> paused, never back to draft); illegal transitions return 409.
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    parameters:
      - name: tickerId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshUpdateMarketingTickerRequest" }
    responses:
      "200":
        description: Ticker updated.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshMarketingTickerResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
  delete:
    operationId: deleteDshMarketingTicker
    summary: Delete a marketing news ticker (soft delete — deleted_at recorded; the row keeps an auditable history).
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    parameters:
      - name: tickerId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Ticker deleted.
        content:
          application/json:
            schema:
              type: object
              required: [deleted]
              properties:
                deleted: { type: boolean }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

