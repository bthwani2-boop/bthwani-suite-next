/dsh/operator/marketing/tickers/{tickerId}:
  patch:
    operationId: updateDshMarketingTicker
    summary: Update a marketing news ticker. Status lifecycle is governed (draft -> published|paused, published <-> paused, never back to draft); illegal transitions return 409.
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    parameters:
      - name: tickerId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshUpdateMarketingTickerRequest" }
    responses:
      "200":
        description: Ticker updated.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshMarketingTickerResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409": { $ref: "../dsh.openapi.yaml#/components/responses/Conflict" }
  delete:
    operationId: deleteDshMarketingTicker
    summary: Delete a marketing news ticker (soft delete — deleted_at recorded; the row keeps an auditable history).
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    parameters:
      - name: tickerId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Ticker deleted.
        content:
          application/json:
            schema:
              type: object
              required: [deleted]
              properties:
                deleted: { type: boolean }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

/dsh/operator/marketing/partner-offers:
  get:
    operationId: listDshPartnerOffers
    summary: List partner marketing offers (operator review queue, excludes archived rows).
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Partner offers.
        content:
          application/json:
            schema:
              type: object
              required: [offers]
              properties:
                offers:
                  type: array
                  items:
                    allOf:
                      - { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerOffer" }
                      - type: object
                        properties:
                          couponId: { type: string }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }

/dsh/operator/marketing/partner-offers/{offerId}:
  patch:
    operationId: updateDshPartnerOffer
    summary: Apply one legal partner-offer transition using expectedVersion. Marketing-ready and published states require a valid active window; rejection requires a reason and publication revalidates store and coupon eligibility.
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    parameters:
      - name: offerId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required: [expectedVersion]
            properties:
              expectedVersion: { type: integer, minimum: 1 }
              status: { type: string, enum: [inbound, review, marketing-ready, published, paused, rejected] }
              title: { type: string, minLength: 1 }
              valueLabel: { type: string, minLength: 1 }
              eligibility: { type: string, enum: [all, client] }
              activeFromDate: { type: string, format: date }
              activeToDate: { type: string, format: date }
              rejectionReason: { type: string }
              marginRiskNote: { type: string }
              couponId: { type: string }
    responses:
      "200":
        description: Partner offer updated.
        content:
          application/json:
            schema:
              type: object
              required: [offer]
              properties:
                offer:
                  allOf:
                    - { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerOffer" }
                    - type: object
                      properties:
                        couponId: { type: string }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409": { $ref: "../dsh.openapi.yaml#/components/responses/Conflict" }
  delete:
    operationId: archiveDshPartnerOffer
    summary: Archive a partner offer (soft archive — archived_at recorded; the row is never physically deleted).
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    parameters:
      - name: offerId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Partner offer archived.
        content:
          application/json:
            schema:
              type: object
              required: [archived]
              properties:
                archived: { type: boolean }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

/dsh/partner/marketing/offers:
  get:
    operationId: listDshPartnerSelfOffers
    summary: List the calling partner's own submitted offers, scoped to their resolved store.
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Own partner offers.
        content:
          application/json:
            schema:
              type: object
              required: [offers]
              properties:
                offers:
                  type: array
                  items:
                    allOf:
                      - { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerOffer" }
                      - type: object
                        properties:
                          couponId: { type: string }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
  post:
    operationId: submitDshPartnerSelfOffer
    summary: Submit a new offer for review. The store binding is always the caller's own resolved store, never client-supplied.
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required: [title, valueLabel]
            properties:
              title: { type: string, minLength: 1 }
              partnerName: { type: string }
              storeLabel: { type: string }
              productId: { type: string }
              productLabel: { type: string }
              category: { type: string }
              offerType: { type: string, enum: [discount, free-delivery, bundle, buy-x-get-y, coupon] }
              valueLabel: { type: string, minLength: 1 }
              eligibility: { type: string, enum: [all, client] }
    responses:
      "201":
        description: Partner offer submitted.
        content:
          application/json:
            schema:
              type: object
              required: [offer]
              properties:
                offer:
                  allOf:
                    - { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerOffer" }
                    - type: object
                      properties:
                        couponId: { type: string }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "409": { $ref: "../dsh.openapi.yaml#/components/responses/Conflict" }

