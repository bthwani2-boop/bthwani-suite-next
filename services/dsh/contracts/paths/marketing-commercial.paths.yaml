/dsh/operator/marketing/campaigns:
  get:
    operationId: listDshCampaigns
    summary: List non-archived marketing campaigns with their current optimistic-concurrency version.
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Campaigns list.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshCampaignsListResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
  post:
    operationId: createDshCampaign
    summary: Create a scheduled marketing campaign draft after validating its audience, placement and target.
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshCreateCampaignRequest" }
    responses:
      "201":
        description: Campaign created.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshCampaignResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }

/dsh/operator/marketing/campaigns/{campaignId}:
  get:
    operationId: getDshCampaign
    summary: Get a single non-archived marketing campaign.
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    parameters:
      - name: campaignId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Campaign detail.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshCampaignResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
  patch:
    operationId: updateDshCampaign
    summary: Update campaign content, schedule, target or lifecycle using expectedVersion; activation revalidates the schedule and target and stale writes return 409.
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    parameters:
      - name: campaignId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshUpdateCampaignRequest" }
    responses:
      "200":
        description: Campaign updated.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshCampaignResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409": { $ref: "../dsh.openapi.yaml#/components/responses/Conflict" }
  delete:
    operationId: archiveDshCampaign
    summary: Archive a marketing campaign (soft archive — status set to cancelled, archived_at recorded; the row is never physically deleted).
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    parameters:
      - name: campaignId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Campaign archived.
        content:
          application/json:
            schema:
              type: object
              required: [archived]
              properties:
                archived: { type: boolean }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

