      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
  patch:
    operationId: updateDshCampaign
    summary: Update a marketing campaign.
    tags: [DshMarketing]
    security:
      - bearerAuth: []
    parameters:
      - name: campaignId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshUpdateCampaignRequest" }
    responses:
      "200":
        description: Campaign updated.
        content:
          application/json:
