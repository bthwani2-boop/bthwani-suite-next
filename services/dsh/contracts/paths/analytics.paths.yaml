            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshDeliveryAnalyticsResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/operator/analytics/stores:
