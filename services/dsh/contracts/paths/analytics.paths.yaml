      "200":
        description: Store analytics snapshot.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshStoreAnalyticsResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/partner/analytics/performance:
  get:
    operationId: getDshPartnerPerformance
    summary: Authenticated partner's own store performance summary.
    tags: [DshAnalytics]
    security:
      - bearerAuth: []
