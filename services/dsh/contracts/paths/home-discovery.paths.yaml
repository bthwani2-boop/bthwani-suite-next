/dsh/public/reels:
  get:
    operationId: listPublicReels
    tags: [DshHomeDiscovery]
    parameters:
      - name: limit
        in: query
        required: false
        schema: { type: integer, default: 20 }
    responses:
      "200":
        description: Approved reels for public home screen carousel.
        content:
          application/json:
            schema:
              type: object
              properties:
                reels:
                  type: array
                  items: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPublicReel" }
