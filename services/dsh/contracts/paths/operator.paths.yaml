# BThwani DSH OpenAPI path-items module: operator.
# Source of truth. Referenced by ../dsh.openapi.yaml; do not add an openapi root here.

/dsh/operator/stores:
  get:
    operationId: listOperatorDshStores
    summary: List all stores for an authenticated operator.
    tags: [DshStoreGovernance]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: All stores including hidden and suspended stores.
        content:
          application/json:
            schema:
              $ref: "../dsh.openapi.yaml#/components/schemas/DshStoreListResponse"
      "401":
        $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated"
      "403":
        $ref: "../dsh.openapi.yaml#/components/responses/Forbidden"

/dsh/operator/stores/{storeId}:
  get:
    operationId: getOperatorDshStore
    summary: Get unrestricted store detail for an authenticated operator.
    tags: [DshStoreGovernance]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../dsh.openapi.yaml#/components/parameters/StoreId"
    responses:
      "200":
        description: Operator store detail.
        content:
          application/json:
            schema:
              $ref: "../dsh.openapi.yaml#/components/schemas/DshStoreDetailResponse"
      "401":
        $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated"
      "403":
        $ref: "../dsh.openapi.yaml#/components/responses/Forbidden"
      "404":
        $ref: "../dsh.openapi.yaml#/components/responses/NotFound"

/dsh/operator/stores/{storeId}/governance:
  post:
    operationId: governDshStore
    summary: Apply an authenticated and audited lifecycle, visibility, or serviceability action.
    tags: [DshStoreGovernance]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../dsh.openapi.yaml#/components/parameters/StoreId"
      - $ref: "../dsh.openapi.yaml#/components/parameters/IdempotencyKey"
      - $ref: "../dsh.openapi.yaml#/components/parameters/CorrelationId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../dsh.openapi.yaml#/components/schemas/OperatorStoreGovernanceRequest"
    responses:
      "200":
        description: Governance action applied.
        content:
          application/json:
            schema:
              $ref: "../dsh.openapi.yaml#/components/schemas/DshStoreActionResponse"
      "400":
        $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest"
      "401":
        $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated"
      "403":
        $ref: "../dsh.openapi.yaml#/components/responses/Forbidden"
      "404":
        $ref: "../dsh.openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../dsh.openapi.yaml#/components/responses/Conflict"

/dsh/operator/diagnostics/stores/{storeId}:
  get:
    operationId: getStoreDiagnostics
    summary: Get store publication diagnostics
    tags: [Operator Store Management]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../dsh.openapi.yaml#/components/parameters/StoreId"
    responses:
      "200":
        description: Store diagnostics.
        content:
          application/json:
            schema:
              type: object
              properties:
                isReady: { type: boolean }
                blockers:
                  type: array
                  items: { type: string }
      "401":
        $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated"
      "403":
        $ref: "../dsh.openapi.yaml#/components/responses/Forbidden"
      "404":
        $ref: "../dsh.openapi.yaml#/components/responses/NotFound"

/dsh/operator/stores/{storeId}/audit:
  get:
    operationId: listDshStoreAudit
    summary: List the latest audited store actions for an operator.
