      "401":
        $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated"
      "403":
        $ref: "../dsh.openapi.yaml#/components/responses/Forbidden"

/dsh/operator/notifications/config:
  get:
    operationId: listDshPlatformNotificationConfig
    summary: List platform-level notification topic configurations.
    tags: [notifications]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Platform notification config list.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPlatformNotificationConfigListResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
  put:
    operationId: upsertDshPlatformNotificationConfig
    summary: Upsert platform-level notification config for a topic.
    tags: [notifications]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshUpsertPlatformNotificationConfigRequest" }
    responses:
      "200":
        description: Config upserted.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPlatformNotificationConfigResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

