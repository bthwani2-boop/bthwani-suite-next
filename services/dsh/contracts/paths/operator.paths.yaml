/dsh/operator/pickups:
  get:
    operationId: listDshOperatorPickups
    summary: List pickup sessions for operators
    tags:
      - DshOperatorPickup
    security: [{ bearerAuth: [] }]
    parameters:
      - name: storeId
        in: query
        schema: { type: string }
      - name: limit
        in: query
        schema: { type: integer, default: 50 }
      - name: offset
        in: query
        schema: { type: integer, default: 0 }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPickupSessionListResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }

/dsh/operator/pickups/{orderId}:
  get:
    operationId: getDshOperatorPickup
    summary: Get a pickup session by order id
    tags:
      - DshOperatorPickup
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPickupSessionResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

/dsh/operator/pickups/{orderId}/extend-window:
  post:
    operationId: extendDshPickupWindow
    summary: Manually extend a pickup session's expiry window
    tags:
      - DshOperatorPickup
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshExtendPickupWindowRequest" }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPickupSessionResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409":
        description: Pickup session version changed; reload before retrying (VERSION_CONFLICT).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }
      "422":
        description: Pickup session was already used (PICKUP_CODE_ALREADY_USED).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

/dsh/operator/pickups/{orderId}/reschedule:
  post:
    operationId: rescheduleDshPickupWindow
    summary: Reopen a no-show pickup session with a new governed collection window.
    description: >-
      Invalidates the previous OTP, clears the no-show projection, advances the
      optimistic version, and requires the partner to issue and deliver a fresh
      OTP before collection. This operation never exposes an OTP to operators.
    tags: [DshOperatorPickup]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshReschedulePickupWindowRequest" }
    responses:
      "200":
        description: No-show pickup session reopened with the requested window.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPickupSessionResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409":
        description: Pickup version changed; reload before retrying.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }
      "422":
        description: Only a no-show pickup session can be rescheduled.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }
