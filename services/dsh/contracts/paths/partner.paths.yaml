      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

# ── Administration ────────────────────────────────────────────────

/dsh/operator/partners:
  get:
    operationId: listDshPartners
    summary: List partners with lifecycle status and filters.
    tags: [DshPartnerActivation]
    security:
      - bearerAuth: []
    parameters:
      - name: status
        in: query
        schema: { type: string }
      - name: category
        in: query
        schema: { type: string }
      - name: limit
        in: query
        schema: { type: integer, default: 50, maximum: 100 }
      - name: offset
        in: query
        schema: { type: integer, default: 0 }
    responses:
      "200":
        description: Partners list.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerListResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
  post:
    operationId: createDshPartner
    summary: Create a new partner profile (operator or field actor).
    tags: [DshPartnerActivation]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshCreatePartnerRequest" }
    responses:
      "201":
        description: Partner created.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartner" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "409": { $ref: "../dsh.openapi.yaml#/components/responses/Conflict" }

