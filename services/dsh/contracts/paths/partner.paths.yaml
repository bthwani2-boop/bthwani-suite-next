        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

/dsh/operator/partner-deliveries:
  get:
    operationId: listDshOperatorPartnerDeliveries
    summary: List partner_delivery tasks for operators
    tags:
      - DshOperatorPartnerDelivery
    security: [{ bearerAuth: [] }]
    parameters:
      - name: storeId
        in: query
        schema: { type: string }
      - name: status
        in: query
        schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerDeliveryTaskStatus" }
      - name: limit
        in: query
        schema: { type: integer, default: 50 }
      - name: offset
        in: query
        schema: { type: integer, default: 0 }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerDeliveryTaskListResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }

/dsh/operator/partner-deliveries/{taskId}:
  get:
    operationId: getDshOperatorPartnerDelivery
    summary: Get a partner_delivery task by id
    tags:
      - DshOperatorPartnerDelivery
    security: [{ bearerAuth: [] }]
    parameters:
      - name: taskId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerDeliveryTaskResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

/dsh/operator/partner-deliveries/order/{orderId}:
  get:
    operationId: getDshOperatorPartnerDeliveryByOrder
    summary: Get a partner_delivery task by orderId, for operator surfaces that only hold the order id
    description: >-
      Mirrors getDshOperatorPickup's by-orderId lookup. LiveOrders operator
      screens carry orderId, not the partner_delivery task id; this lets
      them resolve the task's current version before raising an exception,
      which is optimistic-concurrency gated on expectedVersion.
    tags:
      - DshOperatorPartnerDelivery
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerDeliveryTaskResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

/dsh/partner/orders/{orderId}/pickup:
  get:
    operationId: getDshPartnerPickupState
    summary: Return the authenticated partner's resumable pickup session stage.
    description: >-
      Reads the sovereign order, pickup session, and durable pickup audit trail.
      Returns cancelled explicitly after order cancellation and never represents
      cancellation as a used or successfully verified pickup.
    tags: [DshPickup]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Resumable pickup state returned.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerPickupStateResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "422":
        description: The order does not use pickup fulfillment.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

/dsh/partner/orders/{orderId}/pickup/mark-ready:
  post:
    operationId: markDshPickupReady
    summary: Store marks a pickup order ready for pickup
    tags:
      - DshPickup
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPickupMutationRequest" }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPickupMarkReadyResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "422":
        description: Order is not a pickup-mode order in a preparing state (PICKUP_INVALID_TRANSITION).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

/dsh/partner/orders/{orderId}/pickup/notify:
  post:
