# BThwani DSH OpenAPI path-items module: partner.
# Source of truth. Referenced by ../dsh.openapi.yaml; do not add an openapi root here.

/dsh/partner/stores/{storeId}/settings:
  get:
    operationId: getPartnerStoreSettings
    summary: Get bounded operating settings for the authenticated partner's own store.
    tags: [DshStoreGovernance]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../dsh.openapi.yaml#/components/parameters/StoreId"
    responses:
      "200":
        description: Store settings.
        content:
          application/json:
            schema:
              $ref: "../dsh.openapi.yaml#/components/schemas/PartnerStoreSettingsRequest"
      "401":
        $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated"
      "403":
        $ref: "../dsh.openapi.yaml#/components/responses/Forbidden"
      "404":
        $ref: "../dsh.openapi.yaml#/components/responses/NotFound"
  patch:
    operationId: updatePartnerStoreSettings
    summary: Update bounded operating settings for the authenticated partner's own store.
    tags: [DshStoreGovernance]
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../dsh.openapi.yaml#/components/parameters/StoreId"
      - $ref: "../dsh.openapi.yaml#/components/parameters/IdempotencyKey"
      - $ref: "../dsh.openapi.yaml#/components/parameters/CorrelationId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../dsh.openapi.yaml#/components/schemas/PartnerStoreSettingsRequest"
    responses:
      "200":
        description: Store settings updated or idempotently replayed.
        content:
          application/json:
            schema:
              $ref: "../dsh.openapi.yaml#/components/schemas/DshStoreActionResponse"
      "400":
        $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest"
      "401":
        $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated"
      "403":
        $ref: "../dsh.openapi.yaml#/components/responses/Forbidden"
      "404":
        $ref: "../dsh.openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../dsh.openapi.yaml#/components/responses/Conflict"

