    tags: [DshPartnerActivation]
    security:
      - bearerAuth: []
    parameters:
      - name: partnerId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerTransitionRequest" }
    responses:
      "200":
