/dsh/partner/orders/{orderId}/partner-delivery:
  get:
    operationId: getDshPartnerDeliveryTask
    summary: Return the authenticated partner's partner_delivery task for the order.
    tags: [DshPartnerDelivery]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Partner delivery state returned (task is null before assignment).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerDeliveryStateResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "422":
        description: The order does not use partner_delivery fulfillment.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

/dsh/client/orders/{orderId}/partner-delivery:
  get:
    operationId: getDshClientPartnerDeliveryTask
    summary: Return the authenticated client's reference partner_delivery status for the order.
    description: >-
      Client-facing reference status for JRN-016. Read-only projection of
      the same partner_delivery task the store courier operates; the client
      never mutates it.
    tags: [DshPartnerDelivery]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Partner delivery state returned (task is null before assignment).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerDeliveryStateResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "422":
        description: The order does not use partner_delivery fulfillment.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

/dsh/partner/orders/{orderId}/partner-delivery/assign:
  post:
    operationId: assignDshPartnerDeliveryTask
    summary: Assign a store courier to a partner_delivery order
    tags:
      - DshPartnerDelivery
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshAssignPartnerDeliveryTaskRequest" }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerDeliveryTaskResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409":
        description: Version conflict, or the order already has an active dispatch assignment or partner delivery task (VERSION_CONFLICT, PARTNER_DELIVERY_ALREADY_ASSIGNED).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }
      "422":
        description: Order is not ready for partner delivery assignment, or the store courier is not eligible (PARTNER_DELIVERY_NOT_READY, COURIER_INELIGIBLE).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

/dsh/partner/orders/{orderId}/partner-delivery/pickup:
  post:
    operationId: markDshPartnerDeliveryPickedUp
    summary: Store courier marks a partner_delivery task picked up
    tags:
      - DshPartnerDelivery
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerDeliveryMutationRequest" }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerDeliveryTaskResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409":
        description: Partner delivery task version changed; reload before retrying (VERSION_CONFLICT).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }
      "422":
        description: Task is not in a status that allows this transition (PARTNER_DELIVERY_INVALID_TRANSITION).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

