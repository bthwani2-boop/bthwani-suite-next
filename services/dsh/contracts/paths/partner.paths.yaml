/dsh/partner/stores/{storeId}/coverage-zones:
  get:
    operationId: listDshPartnerStoreCoverageZones
    summary: Get store coverage zones.
    tags: [DshPartner]
    security:
      - bearerAuth: []
    parameters:
      - name: storeId
        in: path
        required: true
