    summary: Issue a fresh pickup OTP and notify the customer the order is ready
    tags:
      - DshPickup
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshIssuePickupOtpRequest" }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPickupNotifyResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409":
        description: Pickup session version changed; reload before retrying (VERSION_CONFLICT).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }
      "422":
        description: Order is not a pickup-mode order in the ready-for-pickup state (PICKUP_INVALID_TRANSITION).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

/dsh/partner/orders/{orderId}/pickup/customer-arrived:
  post:
    operationId: markDshPickupCustomerArrived
    summary: Record that the customer has arrived to collect a pickup order
