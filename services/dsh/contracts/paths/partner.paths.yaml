      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "422":
        description: Order is not a pickup-mode order (PICKUP_INVALID_TRANSITION).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

/dsh/partner/orders/{orderId}/pickup/verify:
  post:
    operationId: verifyDshPickupSession
    summary: Verify a customer-submitted pickup OTP and complete the pickup
    tags:
      - DshPickup
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshVerifyPickupOtpRequest" }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPickupSessionResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409":
        description: Pickup session version changed; reload before retrying (VERSION_CONFLICT).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }
      "422":
        description: Code already used, expired, attempts exceeded, or invalid (PICKUP_CODE_ALREADY_USED, PICKUP_CODE_EXPIRED, PICKUP_CODE_ATTEMPTS_EXCEEDED, PICKUP_CODE_INVALID, PICKUP_INVALID_TRANSITION).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

/dsh/partner/orders/{orderId}/pickup/no-show:
  post:
    operationId: markDshPickupNoShow
    summary: Mark an issued-but-unused pickup session as a no-show
    tags:
      - DshPickup
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPickupNoShowRequest" }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPickupSessionResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409":
        description: Pickup session version changed; reload before retrying (VERSION_CONFLICT).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }
      "422":
        description: Pickup session was already used (PICKUP_CODE_ALREADY_USED).
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

/dsh/partner/orders/{orderId}/cancel:
  post:
    operationId: cancelDshPartnerOrder
    summary: Cancel a partner-owned order using a structured operational reason.
    tags: [DshPartnerOrders]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshOrderCancellationRequest" }
    responses:
      "200":
        description: Order cancelled and financial closure queued or not required.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshCancelOrderResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409":
        description: Order state does not allow partner cancellation.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshErrorResponse" }

/dsh/partner/orders/{orderId}/cancellation:
  get:
    operationId: getDshPartnerOrderCancellation
    summary: Return the partner-scoped cancellation and WLT closure projection.
    tags: [DshPartnerOrders]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Cancellation projection returned.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshOrderCancellationResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
