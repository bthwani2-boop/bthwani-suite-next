    responses:
      "200":
        description: List of coverage zones.
        content:
          application/json:
            schema:
              type: array
              items: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerCoverageZone" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/partner/orders:
  get:
    operationId: listDshPartnerOrders
    summary: List orders for a partner's store. Default status filter is pending.
    tags: [DshOrders]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum: [pending, store_accepted, preparing, ready_for_pickup, cancelled]
    responses:
      "200":
        description: List of partner orders.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshOrdersResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/partner/orders/{orderId}/accept:
  post:
    operationId: acceptDshOrder
    summary: Partner accepts a pending order. Transitions pending → store_accepted.
    tags: [DshOrders]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Order accepted.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshOrderResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409": { $ref: "../dsh.openapi.yaml#/components/responses/Conflict" }

/dsh/partner/orders/{orderId}/reject:
  post:
    operationId: rejectDshOrder
    summary: Partner rejects a pending order with mandatory reason. Transitions pending → cancelled.
    tags: [DshOrders]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshRejectOrderRequest" }
    responses:
      "200":
        description: Order rejected.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshOrderResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409": { $ref: "../dsh.openapi.yaml#/components/responses/Conflict" }

/dsh/partner/orders/{orderId}/preparing:
  post:
    operationId: markDshOrderPreparing
    summary: Partner marks order as preparing. Transitions store_accepted → preparing.
    tags: [DshOrders]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Order marked preparing.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshOrderResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409": { $ref: "../dsh.openapi.yaml#/components/responses/Conflict" }

/dsh/partner/orders/{orderId}/ready:
  post:
    operationId: markDshOrderReadyForPickup
    summary: Partner marks order ready for pickup. Transitions preparing → ready_for_pickup.
    tags: [DshOrders]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: orderId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Order ready for pickup.
