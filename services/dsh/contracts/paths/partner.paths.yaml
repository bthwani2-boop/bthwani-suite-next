/dsh/partner/stores/{storeId}/team:
  get:
    operationId: listDshPartnerStoreTeam
    summary: List team members for a store.
    tags: [DshPartner]
    security:
      - bearerAuth: []
    parameters:
      - name: storeId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: List of team members.
        content:
          application/json:
            schema:
              type: object
              properties:
                members:
                  type: array
                  items:
                    $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerTeamMember"
              required: [members]
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/partner/stores/{storeId}/team/invites:
  post:
    operationId: inviteDshPartnerStoreTeamMember
    summary: Invite a new team member.
    tags: [DshPartner]
    security:
      - bearerAuth: []
    parameters:
      - name: storeId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              identity:
                type: string
            required: [identity]
    responses:
      "200":
        description: Invite sent.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
              required: [success]
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/partner/stores/{storeId}/team/members/{memberId}/action:
  post:
    operationId: executeDshPartnerStoreTeamMemberAction
    summary: Execute an action on a team member.
    tags: [DshPartner]
    security:
      - bearerAuth: []
    parameters:
      - name: storeId
        in: path
        required: true
        schema: { type: string }
      - name: memberId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              action:
                type: string
                enum: [pause, activate, block, resend-invite, cancel-invite]
            required: [action]
    responses:
      "200":
        description: Action executed.
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
              required: [success]
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

