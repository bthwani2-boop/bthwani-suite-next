      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "409": { $ref: "../dsh.openapi.yaml#/components/responses/Conflict" }

/dsh/partner/me/finance/settlements:
  get:
    operationId: listDshPartnerFinanceSettlements
    summary: Partner reads their own governed WLT settlements view through the DSH finance proxy. WLT service auth stays server-side.
    tags: [DshFinanceProxy]
    security: [{ bearerAuth: [] }]
    parameters:
      - name: limit
        in: query
        required: false
        schema: { type: string }
      - name: cursor
        in: query
        required: false
        schema: { type: string }
    responses:
      "200":
        description: WLT settlements view (verbatim passthrough).
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/partner/me/finance/settlements/summary:
  get:
    operationId: getDshPartnerFinanceSettlementSummary
