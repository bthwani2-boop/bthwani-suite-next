  put:
    operationId: updateDshPartnerStoreCourierSettings
    summary: Update store courier settings.
    tags: [DshPartner]
    security:
      - bearerAuth: []
    parameters:
      - name: storeId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerStoreCourierSettings" }
    responses:
      "200":
        description: Courier settings updated.
        content:
