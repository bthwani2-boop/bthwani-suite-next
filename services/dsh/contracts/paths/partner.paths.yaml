    tags: [DshFinanceProxy]
    security: [{ bearerAuth: [] }]
    responses:
      "200":
        description: WLT settlement summary (verbatim passthrough).
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/operator/platform/store-onboarding-fee:
  get:
    operationId: getDshStoreOnboardingFeePolicy
    summary: Get the store onboarding fee policy (operator edit view).
    tags: [DshPlatformPolicies]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Store onboarding fee policy.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshStoreOnboardingFeePolicyResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
  put:
    operationId: upsertDshStoreOnboardingFeePolicy
    summary: Upsert the store onboarding fee policy. DSH owns the policy definition only — never a WLT financial record.
    tags: [DshPlatformPolicies]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshUpsertStoreOnboardingFeePolicyRequest" }
    responses:
      "200":
        description: Store onboarding fee policy upserted.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshStoreOnboardingFeePolicyResponse" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/platform/store-onboarding-fee:
  get:
    operationId: getDshStoreOnboardingFeeReference
    summary: Read-only store onboarding fee reference for app-field/app-partner. Never exposed to app-client.
    tags: [DshPlatformPolicies]
    security:
