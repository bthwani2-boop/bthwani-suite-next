/dsh/partner/invites/{inviteId}/accept:
  post:
    operationId: acceptDshPartnerInvite
    summary: Accept a pending team invitation.
    tags: [DshPartner]
    security:
      - bearerAuth: []
    parameters:
      - name: inviteId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Invite accepted.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
              required: [success]
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

/dsh/partner/invites/{inviteId}/reject:
  post:
    operationId: rejectDshPartnerInvite
    summary: Reject a pending team invitation.
    tags: [DshPartner]
    security:
      - bearerAuth: []
    parameters:
      - name: inviteId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Invite rejected.
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
              required: [success]
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

/dsh/media:
  get:
    operationId: getMedia
    summary: Stream back a previously uploaded document/photo for review.
    tags: [DshPartnerActivation]
    security:
      - bearerAuth: []
    parameters:
      - name: mediaRef
        in: query
        required: true
        schema: { type: string, minLength: 1 }
    responses:
      "200":
        description: Media stream.
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
      "503": { $ref: "../dsh.openapi.yaml#/components/responses/ServiceUnavailable" }

/dsh/operator/admin/partners:
  get:
    operationId: listDshPartnerActivations
    summary: List partner activation requests.
    tags: [DshAdministration]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Partner activations list.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerActivationsListResponse" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/operator/admin/partners/{partnerId}/activate:
  post:
    operationId: activateDshPartner
    summary: Activate a partner.
    tags: [DshAdministration]
    security:
      - bearerAuth: []
    parameters:
      - name: partnerId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshActivatePartnerRequest" }
    responses:
      "200":
        description: Partner activated.
        content:
          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerActivation" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

/dsh/operator/admin/partners/{partnerId}/block:
  post:
    operationId: blockDshPartner
    summary: Block a partner.
    tags: [DshAdministration]
    security:
      - bearerAuth: []
    parameters:
      - name: partnerId
        in: path
        required: true
        schema: { type: string }
    requestBody:
