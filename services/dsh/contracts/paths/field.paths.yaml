      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

/dsh/field/partners/{partnerId}/store:
  get:
    operationId: getFieldPartnerStore
    summary: Field agent reads the first store draft linked to a partner it owns.
    tags: [DshPartnerActivation]
    security:
      - bearerAuth: []
    parameters:
      - name: partnerId
        in: path
        required: true
        schema: { type: string }
    responses:
      "200":
        description: Partner's draft store.
        content:
          application/json:
            schema:
              type: object
              required: [storeId, store]
              properties:
                storeId: { type: string }
                store: { $ref: "../dsh.openapi.yaml#/components/schemas/DshFieldPartnerStoreDraft" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }
  patch:
    operationId: updateFieldPartnerStore
    summary: Field agent updates first-store draft data without publishing it to clients.
    tags: [DshPartnerActivation]
    security:
      - bearerAuth: []
    parameters:
      - name: partnerId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshUpdateFieldPartnerStoreDraftRequest" }
    responses:
      "200":
        description: Store draft updated.
        content:
          application/json:
            schema:
              type: object
              required: [storeId, store, audit]
              properties:
                storeId: { type: string }
                store: { $ref: "../dsh.openapi.yaml#/components/schemas/DshFieldPartnerStoreDraft" }
                audit: { type: object }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }

/dsh/field/partners/{partnerId}/documents:
  get:
    operationId: listFieldPartnerDocuments
    summary: Field agent lists documents uploaded for a partner draft it owns.
