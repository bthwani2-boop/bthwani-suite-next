# BThwani DSH OpenAPI path-items module: field.
# Source of truth. Referenced by ../dsh.openapi.yaml; do not add an openapi root here.

/dsh/field/me/finance/wallet:
  get:
    operationId: getDshFieldMeWallet
    summary: Return the authenticated field agent's wallet balance.
    tags:
      - DshFieldFinance
    security: [{ bearerAuth: [] }]
    responses:
      "200":
        description: Wallet returned successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                wallet:
                  type: object
                  properties:
                    actorId: { type: string }
                    actorType: { type: string }
                    status: { type: string }
                    currency: { type: string }
                    availableBalanceMinorUnits: { type: integer, format: int64 }
                    pendingBalanceMinorUnits: { type: integer, format: int64 }
                    heldBalanceMinorUnits: { type: integer, format: int64 }
                    earnedTotalMinorUnits: { type: integer, format: int64 }
                    settledTotalMinorUnits: { type: integer, format: int64 }
                    paidTotalMinorUnits: { type: integer, format: int64 }
                    lastLedgerEntryAt: { type: string, format: date-time, nullable: true }
                    updatedAt: { type: string, format: date-time, nullable: true }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/field/me/finance/commissions:
  get:
    operationId: getDshFieldMeCommissions
    summary: Return the authenticated field agent's commissions.
    tags:
      - DshFieldFinance
    security: [{ bearerAuth: [] }]
    responses:
      "200":
        description: Commissions list returned successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                commissions:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string }
                      beneficiaryActorId: { type: string }
                      beneficiaryActorType: { type: string }
                      sourceType: { type: string }
                      sourceId: { type: string }
                      visitId: { type: string, nullable: true }
                      storeId: { type: string, nullable: true }
                      partnerId: { type: string, nullable: true }
                      commissionPolicyId: { type: string, nullable: true }
                      amountMinorUnits: { type: integer, format: int64 }
                      currency: { type: string }
                      status: { type: string }
                      idempotencyKey: { type: string, nullable: true }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/field/me/finance/ledger-entries:
  get:
    operationId: getDshFieldMeLedgerEntries
    summary: Return the authenticated field agent's ledger entries.
    tags:
      - DshFieldFinance
    security: [{ bearerAuth: [] }]
    responses:
      "200":
        description: Ledger entries returned successfully.
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/field/me/finance/payout-requests:
  get:
    operationId: getDshFieldMePayoutRequests
    summary: Return the authenticated field agent's payout requests.
    tags:
      - DshFieldFinance
    security: [{ bearerAuth: [] }]
    responses:
      "200":
        description: Payout requests returned successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                payoutRequests:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string }
                      beneficiaryActorId: { type: string }
                      beneficiaryActorType: { type: string }
                      amountMinorUnits: { type: integer, format: int64 }
                      currency: { type: string }
                      status: { type: string }
                      requestedAt: { type: string, format: date-time }
                      completedAt: { type: string, format: date-time, nullable: true }
                      failureReason: { type: string, nullable: true }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
  post:
    operationId: submitDshFieldMePayoutRequest
    summary: Submit a new payout request for the authenticated field agent.
    tags:
      - DshFieldFinance
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - amountMinorUnits
              - currency
              - idempotencyKey
            properties:
              amountMinorUnits: { type: integer, format: int64 }
              currency: { type: string }
              idempotencyKey: { type: string }
    responses:
      "201":
        description: Payout request created successfully.
        content:
          application/json:
            schema:
              type: object
              properties:
                payoutRequest:
                  type: object
                  properties:
                    id: { type: string }
                    beneficiaryActorId: { type: string }
                    beneficiaryActorType: { type: string }
                    amountMinorUnits: { type: integer, format: int64 }
                    currency: { type: string }
                    status: { type: string }
                    requestedAt: { type: string, format: date-time }
                    completedAt: { type: string, format: date-time, nullable: true }
                    failureReason: { type: string, nullable: true }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }

/dsh/field/stores/{storeId}/verifications:
