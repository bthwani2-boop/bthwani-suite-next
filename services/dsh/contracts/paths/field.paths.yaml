                documents:
                  type: array
                  items: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerDocument" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }
  post:
    operationId: uploadFieldPartnerDocument
    summary: Field agent uploads a document for partner onboarding.
