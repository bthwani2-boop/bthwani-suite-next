/dsh/field/partners/{partnerId}/submit:
  post:
    operationId: submitFieldPartnerDraft
    summary: Field agent submits partner draft for review.
    tags: [DshPartnerActivation]
    security:
      - bearerAuth: []
    parameters:
      - name: partnerId
        in: path
        required: true
        schema: { type: string }
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
