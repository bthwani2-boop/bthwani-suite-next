          application/json:
            schema: { $ref: "../dsh.openapi.yaml#/components/schemas/DshPartnerDocument" }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "404": { $ref: "../dsh.openapi.yaml#/components/responses/NotFound" }

/dsh/field/media/uploads:
  post:
    operationId: uploadFieldMedia
    summary: Field agent uploads a binary document/photo, receiving a mediaRef to attach via uploadFieldPartnerDocument.
    tags: [DshPartnerActivation]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [partnerId, file]
            properties:
              partnerId: { type: string }
              file: { type: string, format: binary }
    responses:
      "201":
        description: Media uploaded.
        content:
          application/json:
            schema:
              type: object
              required: [mediaRef]
              properties:
                mediaRef: { type: string }
      "400": { $ref: "../dsh.openapi.yaml#/components/responses/InvalidRequest" }
      "401": { $ref: "../dsh.openapi.yaml#/components/responses/Unauthenticated" }
      "403": { $ref: "../dsh.openapi.yaml#/components/responses/Forbidden" }

