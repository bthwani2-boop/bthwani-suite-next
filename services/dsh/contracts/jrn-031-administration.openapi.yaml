openapi: 3.1.0
info:
  title: BThwani DSH JRN-031 Administration API
  version: 1.0.0
  description: Governed administration roles, maker-checker approvals, append-only audit, rollback, and privacy-safe diagnostics.
x-bthwani-owner: services/dsh
x-bthwani-journey: JRN-031
x-bthwani-contract-state: CONTRACT_ACTIVE
servers:
  - url: http://localhost:58080
security:
  - bearerAuth: []
paths:
  /dsh/operator/admin/roles:
    get:
      operationId: listAdministrationRoles
      summary: List governed administration roles
      responses:
        '200':
          description: Role projections
          content:
            application/json:
              schema:
                type: object
                required: [roles]
                properties:
                  roles:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'
  /dsh/operator/admin/roles/requests:
    post:
      operationId: requestAdministrationRoleDefinition
      summary: Request a surface-scoped role definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleDefinitionRequestInput'
      responses:
        '202':
          description: Request accepted for independent review
          content:
            application/json:
              schema:
                type: object
                required: [request]
                properties:
                  request:
                    $ref: '#/components/schemas/RoleDefinitionRequest'
  /dsh/operator/admin/role-requests:
    get:
      operationId: listAdministrationRoleDefinitionRequests
      parameters:
        - $ref: '#/components/parameters/ApprovalStatus'
      responses:
        '200':
          description: Role-definition requests
          content:
            application/json:
              schema:
                type: object
                required: [requests]
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoleDefinitionRequest'
  /dsh/operator/admin/role-requests/{requestId}/review:
    post:
      operationId: reviewAdministrationRoleDefinition
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewInput'
      responses:
        '200':
          description: Review result and optional created role
          content:
            application/json:
              schema:
                type: object
                required: [request]
                properties:
                  request:
                    $ref: '#/components/schemas/RoleDefinitionRequest'
                  role:
                    oneOf:
                      - $ref: '#/components/schemas/Role'
                      - type: 'null'
  /dsh/operator/admin/staff:
    get:
      operationId: listAdministrationStaffAssignments
      responses:
        '200':
          description: Approved role assignments
          content:
            application/json:
              schema:
                type: object
                required: [staff]
                properties:
                  staff:
                    type: array
                    items:
                      $ref: '#/components/schemas/StaffAssignment'
  /dsh/operator/admin/staff/{staffId}/roles:
    post:
      operationId: requestAdministrationStaffRoleChange
      parameters:
        - $ref: '#/components/parameters/StaffId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleChangeRequestInput'
      responses:
        '202':
          description: Role change accepted for independent review
          content:
            application/json:
              schema:
                type: object
                required: [approval]
                properties:
                  approval:
                    $ref: '#/components/schemas/RoleAssignmentApproval'
  /dsh/operator/admin/approvals:
    get:
      operationId: listAdministrationRoleAssignmentApprovals
      parameters:
        - $ref: '#/components/parameters/ApprovalStatus'
      responses:
        '200':
          description: Role-assignment approvals
          content:
            application/json:
              schema:
                type: object
                required: [approvals]
                properties:
                  approvals:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoleAssignmentApproval'
  /dsh/operator/admin/approvals/{approvalId}/review:
    post:
      operationId: reviewAdministrationRoleAssignment
      parameters:
        - $ref: '#/components/parameters/ApprovalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewInput'
      responses:
        '200':
          description: Role-assignment review result
  /dsh/operator/admin/approvals/{approvalId}/rollback-requests:
    post:
      operationId: requestAdministrationDecisionRollback
      parameters:
        - $ref: '#/components/parameters/ApprovalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 5
                  maxLength: 1000
      responses:
        '202':
          description: Rollback accepted for independent review
          content:
            application/json:
              schema:
                type: object
                required: [request]
                properties:
                  request:
                    $ref: '#/components/schemas/RollbackRequest'
  /dsh/operator/admin/rollback-requests:
    get:
      operationId: listAdministrationRollbackRequests
      parameters:
        - $ref: '#/components/parameters/ApprovalStatus'
      responses:
        '200':
          description: Rollback requests
          content:
            application/json:
              schema:
                type: object
                required: [requests]
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/RollbackRequest'
  /dsh/operator/admin/rollback-requests/{requestId}/review:
    post:
      operationId: reviewAdministrationDecisionRollback
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewInput'
      responses:
        '200':
          description: Rollback review result
  /dsh/operator/admin/diagnostics:
    get:
      operationId: getAdministrationDiagnostics
      responses:
        '200':
          description: Aggregate diagnostics without PII
          content:
            application/json:
              schema:
                type: object
                required: [diagnostics]
                properties:
                  diagnostics:
                    $ref: '#/components/schemas/AdministrationDiagnostics'
  /dsh/operator/admin/partners:
    get:
      operationId: listAdministrationPartnerActivationProjections
      responses:
        '200':
          description: Read-only partner lifecycle projections
  /dsh/operator/admin/captains:
    get:
      operationId: listAdministrationCaptainCredentialProjections
      responses:
        '200':
          description: Read-only captain accreditation projections
  /dsh/operator/admin/audit:
    get:
      operationId: listAdministrationAudit
      parameters:
        - name: actorId
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
      responses:
        '200':
          description: Redacted append-only administration audit
          content:
            application/json:
              schema:
                type: object
                required: [audit]
                properties:
                  audit:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEntry'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ApprovalId:
      name: approvalId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    StaffId:
      name: staffId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ApprovalStatus:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/ApprovalStatus'
  schemas:
    ApprovalStatus:
      type: string
      enum: [pending, approved, rejected]
    Decision:
      type: string
      enum: [approved, rejected]
    RoleChangeAction:
      type: string
      enum: [staff_role_assignment, staff_role_revocation]
    AdministrationSurface:
      type: string
      enum: [control-panel, app-client, app-partner, app-captain, app-field, webapp, website]
    AdministrationPermission:
      type: string
      enum:
        - administration.read
        - administration.manage
        - administration.approve
        - administration.role.request
        - administration.role.approve
        - administration.staff.request
        - administration.staff.approve
        - administration.audit.read
        - administration.diagnostics.read
        - administration.rollback.request
        - administration.rollback.approve
    Role:
      type: object
      required: [id, name, description, permissions, surfaces, active, version, createdAt]
      properties:
        id: { type: string }
        name: { type: string, pattern: '^[a-z][a-z0-9-]{2,79}$' }
        description: { type: string }
        permissions:
          type: array
          minItems: 1
          uniqueItems: true
          items: { $ref: '#/components/schemas/AdministrationPermission' }
        surfaces:
          type: array
          minItems: 1
          uniqueItems: true
          contains: { const: control-panel }
          items: { $ref: '#/components/schemas/AdministrationSurface' }
        active: { type: boolean }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
    RoleDefinitionRequestInput:
      type: object
      additionalProperties: false
      required: [name, description, permissions, surfaces, reason]
      properties:
        name: { type: string, pattern: '^[a-z][a-z0-9-]{2,79}$' }
        description: { type: string, maxLength: 1000 }
        permissions:
          type: array
          minItems: 1
          uniqueItems: true
          items: { $ref: '#/components/schemas/AdministrationPermission' }
        surfaces:
          type: array
          minItems: 1
          uniqueItems: true
          contains: { const: control-panel }
          items: { $ref: '#/components/schemas/AdministrationSurface' }
        reason: { type: string, minLength: 5, maxLength: 1000 }
    RoleDefinitionRequest:
      allOf:
        - $ref: '#/components/schemas/RoleDefinitionRequestInput'
        - type: object
          required: [id, roleName, requestedBy, status, reviewedBy, reviewNote, version, createdAt, updatedAt]
          properties:
            id: { type: string }
            roleName: { type: string }
            requestedBy: { type: string }
            status: { $ref: '#/components/schemas/ApprovalStatus' }
            reviewedBy: { type: string }
            reviewNote: { type: string }
            version: { type: integer, minimum: 1 }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
            reviewedAt: { type: string, format: date-time }
    RoleChangeRequestInput:
      type: object
      additionalProperties: false
      required: [roleId, actionType, reason]
      properties:
        roleId: { type: string, minLength: 1 }
        actionType: { $ref: '#/components/schemas/RoleChangeAction' }
        reason: { type: string, minLength: 5, maxLength: 1000 }
    ReviewInput:
      type: object
      additionalProperties: false
      required: [decision, reviewNote, expectedVersion]
      properties:
        decision: { $ref: '#/components/schemas/Decision' }
        reviewNote: { type: string, maxLength: 1000 }
        expectedVersion: { type: integer, minimum: 1 }
    StaffAssignment:
      type: object
      required: [id, actorId, roleId, roleName, assignedBy, assignedAt]
      properties:
        id: { type: string }
        actorId: { type: string }
        roleId: { type: string }
        roleName: { type: string }
        assignedBy: { type: string }
        assignedAt: { type: string, format: date-time }
    RoleAssignmentApproval:
      type: object
      required: [id, actionType, targetActorId, roleId, roleName, requestedBy, reason, status, reviewedBy, reviewNote, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        actionType: { $ref: '#/components/schemas/RoleChangeAction' }
        targetActorId: { type: string }
        roleId: { type: string }
        roleName: { type: string }
        requestedBy: { type: string }
        reason: { type: string }
        status: { $ref: '#/components/schemas/ApprovalStatus' }
        reviewedBy: { type: string }
        reviewNote: { type: string }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        reviewedAt: { type: string, format: date-time }
    RollbackRequest:
      type: object
      required: [id, sourceApprovalId, sourceActionType, inverseActionType, targetActorId, roleId, roleName, requestedBy, reason, status, reviewedBy, reviewNote, version, createdAt, updatedAt, sourceApprovedBy]
      properties:
        id: { type: string }
        sourceApprovalId: { type: string }
        sourceActionType: { $ref: '#/components/schemas/RoleChangeAction' }
        inverseActionType: { $ref: '#/components/schemas/RoleChangeAction' }
        targetActorId: { type: string }
        roleId: { type: string }
        roleName: { type: string }
        requestedBy: { type: string }
        reason: { type: string }
        status: { $ref: '#/components/schemas/ApprovalStatus' }
        reviewedBy: { type: string }
        reviewNote: { type: string }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        reviewedAt: { type: string, format: date-time }
        sourceApprovedBy: { type: string }
    AdministrationDiagnostics:
      type: object
      additionalProperties: false
      required: [status, activeRoleCount, approvedAssignmentCount, pendingRoleDefinitionCount, pendingRoleAssignmentCount, pendingRollbackCount, recentRestrictedAuditCount, generatedAt]
      properties:
        status: { type: string, enum: [healthy, attention] }
        activeRoleCount: { type: integer, minimum: 0 }
        approvedAssignmentCount: { type: integer, minimum: 0 }
        pendingRoleDefinitionCount: { type: integer, minimum: 0 }
        pendingRoleAssignmentCount: { type: integer, minimum: 0 }
        pendingRollbackCount: { type: integer, minimum: 0 }
        recentRestrictedAuditCount: { type: integer, minimum: 0 }
        generatedAt: { type: string, format: date-time }
    AuditEntry:
      type: object
      additionalProperties: false
      required: [id, actorId, action, targetId, detail, sensitivity, correlationId, createdAt]
      properties:
        id: { type: string }
        actorId: { type: string }
        action: { type: string }
        targetId: { type: string }
        detail:
          type: string
          description: Redacted allowlisted metadata only; never raw reason, review note, phone, credential, document, token, or secret.
        sensitivity: { type: string, enum: [internal, restricted] }
        correlationId: { type: string }
        createdAt: { type: string, format: date-time }
