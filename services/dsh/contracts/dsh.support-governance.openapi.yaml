openapi: 3.1.0
info:
  title: DSH Governed Support API
  version: 1.1.0
  description: Owner-scoped client support, permission-scoped operator support, temporary administration support sessions, state transitions, and audit readback.
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-runtime-dependency: true
x-bthwani-generation: DISABLED
x-bthwani-client-binding: MANUAL_TYPED_ADAPTER
servers:
  - url: http://localhost:58080
security:
  - bearerAuth: []
paths:
  /dsh/client/support/tickets:
    get:
      operationId: listDshClientSupportTickets
      responses:
        '200': { $ref: '#/components/responses/TicketList' }
    post:
      operationId: createDshClientSupportTicket
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTicketInput' }
      responses:
        '201': { $ref: '#/components/responses/Ticket' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /dsh/client/support/tickets/{ticketId}:
    parameters:
      - $ref: '#/components/parameters/TicketId'
    get:
      operationId: getDshClientSupportTicket
      responses:
        '200': { $ref: '#/components/responses/Ticket' }
        '404': { $ref: '#/components/responses/Error' }
  /dsh/client/support/tickets/{ticketId}/messages:
    parameters:
      - $ref: '#/components/parameters/TicketId'
    get:
      operationId: listDshClientSupportMessages
      responses:
        '200': { $ref: '#/components/responses/MessageList' }
        '404': { $ref: '#/components/responses/Error' }
    post:
      operationId: addDshClientSupportMessage
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddMessageInput' }
      responses:
        '201': { $ref: '#/components/responses/Message' }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /dsh/operator/support/tickets:
    get:
      operationId: listDshOperatorSupportTickets
      parameters:
        - name: status
          in: query
          required: false
          schema: { $ref: '#/components/schemas/TicketStatus' }
      responses:
        '200': { $ref: '#/components/responses/TicketList' }
        '403': { $ref: '#/components/responses/Error' }
  /dsh/operator/support/tickets/{ticketId}:
    parameters:
      - $ref: '#/components/parameters/TicketId'
    get:
      operationId: getDshOperatorSupportTicket
      responses:
        '200': { $ref: '#/components/responses/Ticket' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
    patch:
      operationId: updateDshOperatorSupportTicket
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTicketInput' }
      responses:
        '200': { $ref: '#/components/responses/Ticket' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /dsh/operator/support/tickets/{ticketId}/messages:
    parameters:
      - $ref: '#/components/parameters/TicketId'
    get:
      operationId: listDshOperatorSupportMessages
      responses:
        '200': { $ref: '#/components/responses/MessageList' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
    post:
      operationId: addDshOperatorSupportMessage
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddMessageInput' }
      responses:
        '201': { $ref: '#/components/responses/Message' }
        '400': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /dsh/operator/support/tickets/{ticketId}/events:
    parameters:
      - $ref: '#/components/parameters/TicketId'
    get:
      operationId: listDshOperatorSupportEvents
      responses:
        '200':
          description: Append-only ticket audit events.
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/TicketEvent' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /dsh/operator/admin/support-sessions:
    get:
      operationId: listDshAdminSupportSessions
      summary: List governed temporary support-access requests and active sessions.
      parameters:
        - name: status
          in: query
          required: false
          schema: { $ref: '#/components/schemas/SupportSessionStatus' }
      responses:
        '200': { $ref: '#/components/responses/SupportSessionList' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
    post:
      operationId: createDshAdminSupportSession
      summary: Request a bounded temporary support-access session.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSupportSessionInput' }
      responses:
        '201': { $ref: '#/components/responses/SupportSession' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /dsh/operator/admin/support-sessions/{requestId}/review:
    post:
      operationId: reviewDshAdminSupportSession
      summary: Approve or reject a temporary support-access request using maker-checker review.
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewSupportSessionInput' }
      responses:
        '200': { $ref: '#/components/responses/SupportSession' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /dsh/operator/admin/support-sessions/{requestId}/revoke:
    post:
      operationId: revokeDshAdminSupportSession
      summary: Revoke an approved or active temporary support-access session.
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RevokeSupportSessionInput' }
      responses:
        '200': { $ref: '#/components/responses/SupportSession' }
        '400': { $ref: '#/components/responses/Error' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /dsh/operator/admin/support/snapshot:
    get:
      operationId: getDshAdminSupportSnapshot
      summary: Read a redacted operational snapshot of temporary support access.
      responses:
        '200': { $ref: '#/components/responses/SupportSnapshot' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TicketId:
      name: ticketId
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    RequestId:
      name: requestId
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 1, maxLength: 200 }
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema: { type: string, minLength: 1, maxLength: 200 }
  schemas:
    TicketStatus:
      type: string
      enum: [open, in_review, pending_user, resolved, closed]
    TicketPriority:
      type: string
      enum: [low, normal, high, urgent]
    TicketCategory:
      type: string
      enum: [order_issue, delivery_issue, store_quality, payment_reference, account_access, app_bug, other]
    CreateTicketInput:
      type: object
      required: [subject, description, category]
      properties:
        storeId: { type: string }
        orderId: { type: string }
        subject: { type: string, minLength: 3, maxLength: 160 }
        description: { type: string, minLength: 5, maxLength: 4000 }
        category: { $ref: '#/components/schemas/TicketCategory' }
        priority: { $ref: '#/components/schemas/TicketPriority' }
    AddMessageInput:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 4000 }
        isInternal: { type: boolean, default: false }
    UpdateTicketInput:
      type: object
      required: [status]
      properties:
        expectedStatus: { $ref: '#/components/schemas/TicketStatus' }
        status: { $ref: '#/components/schemas/TicketStatus' }
        assignedTo: { type: string }
    Ticket:
      type: object
      required: [id, reporterId, reporterRole, subject, description, category, priority, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        storeId: { type: string }
        reporterId: { type: string }
        reporterRole: { type: string }
        subject: { type: string }
        description: { type: string }
        category: { $ref: '#/components/schemas/TicketCategory' }
        priority: { $ref: '#/components/schemas/TicketPriority' }
        status: { $ref: '#/components/schemas/TicketStatus' }
        assignedTo: { type: string }
        orderId: { type: string }
        resolvedAt: { type: [string, 'null'], format: date-time }
        closedAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Message:
      type: object
      required: [id, ticketId, senderId, senderRole, body, isInternal, createdAt]
      properties:
        id: { type: string }
        ticketId: { type: string }
        senderId: { type: string }
        senderRole: { type: string }
        body: { type: string }
        isInternal: { type: boolean }
        createdAt: { type: string, format: date-time }
    TicketEvent:
      type: object
      required: [id, ticketId, reporterId, actorId, actorRole, eventType, correlationId, createdAt]
      properties:
        id: { type: string }
        ticketId: { type: string }
        reporterId: { type: string }
        actorId: { type: string }
        actorRole: { type: string }
        eventType: { type: string, enum: [created, message_added, status_changed, escalated, closed] }
        correlationId: { type: string }
        createdAt: { type: string, format: date-time }
    SupportSessionStatus:
      type: string
      enum: [pending, approved, rejected, active, revoked, expired]
    CreateSupportSessionInput:
      type: object
      additionalProperties: false
      required: [targetActorId, reason, durationMinutes]
      properties:
        targetActorId: { type: string, minLength: 1 }
        reason: { type: string, minLength: 5, maxLength: 1000 }
        durationMinutes: { type: integer, minimum: 5, maximum: 240 }
    ReviewSupportSessionInput:
      type: object
      additionalProperties: false
      required: [decision, reviewNote, expectedVersion]
      properties:
        decision: { type: string, enum: [approved, rejected] }
        reviewNote: { type: string, maxLength: 1000 }
        expectedVersion: { type: integer, minimum: 1 }
    RevokeSupportSessionInput:
      type: object
      additionalProperties: false
      required: [reason, expectedVersion]
      properties:
        reason: { type: string, minLength: 5, maxLength: 1000 }
        expectedVersion: { type: integer, minimum: 1 }
    SupportSession:
      type: object
      additionalProperties: false
      required: [id, targetActorId, requestedBy, reason, durationMinutes, status, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        targetActorId: { type: string }
        requestedBy: { type: string }
        reason: { type: string }
        durationMinutes: { type: integer, minimum: 5 }
        status: { $ref: '#/components/schemas/SupportSessionStatus' }
        reviewedBy: { type: [string, 'null'] }
        reviewNote: { type: string }
        activatedAt: { type: [string, 'null'], format: date-time }
        expiresAt: { type: [string, 'null'], format: date-time }
        revokedAt: { type: [string, 'null'], format: date-time }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SupportSnapshot:
      type: object
      additionalProperties: false
      required: [pending, active, revoked, expired, generatedAt]
      properties:
        pending: { type: integer, minimum: 0 }
        active: { type: integer, minimum: 0 }
        revoked: { type: integer, minimum: 0 }
        expired: { type: integer, minimum: 0 }
        generatedAt: { type: string, format: date-time }
  responses:
    Ticket:
      description: Support ticket.
      content:
        application/json:
          schema:
            type: object
            required: [ticket]
            properties:
              ticket: { $ref: '#/components/schemas/Ticket' }
    TicketList:
      description: Support tickets.
      content:
        application/json:
          schema:
            type: object
            required: [tickets]
            properties:
              tickets:
                type: array
                items: { $ref: '#/components/schemas/Ticket' }
    Message:
      description: Support message.
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message: { $ref: '#/components/schemas/Message' }
    MessageList:
      description: Support messages.
      content:
        application/json:
          schema:
            type: object
            required: [messages]
            properties:
              messages:
                type: array
                items: { $ref: '#/components/schemas/Message' }
    SupportSession:
      description: Governed temporary support-access session.
      content:
        application/json:
          schema:
            type: object
            required: [supportSession]
            properties:
              supportSession: { $ref: '#/components/schemas/SupportSession' }
    SupportSessionList:
      description: Governed temporary support-access sessions.
      content:
        application/json:
          schema:
            type: object
            required: [supportSessions]
            properties:
              supportSessions:
                type: array
                items: { $ref: '#/components/schemas/SupportSession' }
    SupportSnapshot:
      description: Redacted support-access operational snapshot.
      content:
        application/json:
          schema:
            type: object
            required: [supportSnapshot]
            properties:
              supportSnapshot: { $ref: '#/components/schemas/SupportSnapshot' }
    Error:
      description: Governed error response.
      content:
        application/json:
          schema:
            type: object
            required: [code, message]
            properties:
              code: { type: string }
              message: { type: string }
