openapi: 3.1.0
info:
  title: BThwani DSH Partner Fulfillment API
  version: 1.1.0
  description: >-
    Governed partner-owned delivery and pickup lifecycles, actor-scoped readback,
    durable command identity, proof completion, bounded pickup recovery, and
    persisted operator SLA-alert evidence.
x-bthwani-owner: services/dsh
x-bthwani-parent-contract: services/dsh/contracts/dsh.openapi.yaml
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: DISABLED
x-bthwani-client-binding: MANUAL_TYPED_ADAPTER
x-bthwani-runtime-dependency: true
security:
  - bearerAuth: []
paths:
  /dsh/partner/orders/{orderId}/partner-delivery:
    get:
      operationId: getDshPartnerDeliveryTask
      tags: [DshPartnerDelivery]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      responses:
        '200': { $ref: '#/components/responses/TaskStateResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/client/orders/{orderId}/partner-delivery:
    get:
      operationId: getDshClientPartnerDeliveryTask
      tags: [DshPartnerDelivery]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      responses:
        '200': { $ref: '#/components/responses/TaskStateResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/partner-delivery/assign:
    post:
      operationId: assignDshPartnerDeliveryTask
      tags: [DshPartnerDelivery]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignRequest' }
      responses:
        '200': { $ref: '#/components/responses/TaskResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/partner-delivery/pickup:
    post:
      operationId: markDshPartnerDeliveryPickedUp
      tags: [DshPartnerDelivery]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody: { $ref: '#/components/requestBodies/MutationRequest' }
      responses:
        '200': { $ref: '#/components/responses/TaskResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/partner-delivery/depart:
    post:
      operationId: departDshPartnerDeliveryTask
      tags: [DshPartnerDelivery]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody: { $ref: '#/components/requestBodies/MutationRequest' }
      responses:
        '200': { $ref: '#/components/responses/TaskResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/partner-delivery/arrive:
    post:
      operationId: arriveDshPartnerDeliveryTask
      tags: [DshPartnerDelivery]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody: { $ref: '#/components/requestBodies/MutationRequest' }
      responses:
        '200': { $ref: '#/components/responses/TaskResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/partner-delivery/proof:
    post:
      operationId: submitDshPartnerDeliveryProof
      tags: [DshPartnerDelivery]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProofRequest' }
      responses:
        '200': { $ref: '#/components/responses/TaskResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/partner-delivery/exception:
    post:
      operationId: raiseDshPartnerDeliveryException
      tags: [DshPartnerDelivery]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExceptionRequest' }
      responses:
        '200': { $ref: '#/components/responses/TaskResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/partner-deliveries:
    get:
      operationId: listDshOperatorPartnerDeliveries
      tags: [DshPartnerDelivery]
      parameters:
        - { name: storeId, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/TaskStatus' } }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
      responses:
        '200': { $ref: '#/components/responses/TaskListResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/partner-deliveries/{taskId}:
    get:
      operationId: getDshOperatorPartnerDelivery
      tags: [DshPartnerDelivery]
      parameters: [{ $ref: '#/components/parameters/TaskId' }]
      responses:
        '200': { $ref: '#/components/responses/TaskResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/partner-deliveries/order/{orderId}:
    get:
      operationId: getDshOperatorPartnerDeliveryByOrder
      tags: [DshPartnerDelivery]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      responses:
        '200': { $ref: '#/components/responses/TaskResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /dsh/client/orders/{orderId}/pickup:
    get:
      operationId: getDshClientPickupState
      tags: [DshPickup]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      responses:
        '200': { $ref: '#/components/responses/PickupStateResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/pickup:
    get:
      operationId: getDshPartnerPickupState
      tags: [DshPickup]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      responses:
        '200': { $ref: '#/components/responses/PickupStateResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/pickup/mark-ready:
    post:
      operationId: markDshPickupReady
      tags: [DshPickup]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody: { $ref: '#/components/requestBodies/MutationRequest' }
      responses:
        '200': { $ref: '#/components/responses/PickupActionResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/pickup/notify:
    post:
      operationId: notifyDshPickupCustomer
      tags: [DshPickup]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PickupNotifyRequest' }
      responses:
        '200': { $ref: '#/components/responses/PickupActionResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
        '503': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/pickup/customer-arrived:
    post:
      operationId: markDshPickupCustomerArrived
      tags: [DshPickup]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody: { $ref: '#/components/requestBodies/MutationRequest' }
      responses:
        '200': { $ref: '#/components/responses/PickupActionResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/pickup/verify:
    post:
      operationId: verifyDshPickupCode
      tags: [DshPickup]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PickupVerifyRequest' }
      responses:
        '200': { $ref: '#/components/responses/PickupActionResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/pickup/no-show:
    post:
      operationId: markDshPickupNoShow
      tags: [DshPickup]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PickupReasonRequest' }
      responses:
        '200': { $ref: '#/components/responses/PickupActionResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/pickup/extend-window:
    post:
      operationId: extendDshPartnerPickupWindow
      tags: [DshPickup]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PickupWindowRequest' }
      responses:
        '200': { $ref: '#/components/responses/PickupActionResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/partner/orders/{orderId}/pickup/reschedule:
    post:
      operationId: rescheduleDshPartnerPickupWindow
      tags: [DshPickup]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PickupWindowRequest' }
      responses:
        '200': { $ref: '#/components/responses/PickupActionResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/pickups:
    get:
      operationId: listDshOperatorPickups
      tags: [DshPickup]
      parameters:
        - { name: storeId, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
      responses:
        '200': { $ref: '#/components/responses/PickupListResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/pickups/{orderId}:
    get:
      operationId: getDshOperatorPickup
      tags: [DshPickup]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      responses:
        '200': { $ref: '#/components/responses/PickupActionResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/pickups/{orderId}/extend-window:
    post:
      operationId: overrideDshPickupWindow
      tags: [DshPickup]
      parameters: [{ $ref: '#/components/parameters/OrderId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PickupWindowRequest' }
      responses:
        '200': { $ref: '#/components/responses/PickupActionResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
        '422': { $ref: '#/components/responses/ErrorResponse' }

  /dsh/operator/partner-delivery/sla-alerts/refresh:
    post:
      operationId: refreshDshPartnerDeliverySlaAlerts
      tags: [DshFulfillmentSla]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: false }
      responses:
        '200': { $ref: '#/components/responses/SlaRefreshResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/partner-delivery/sla-alerts:
    get:
      operationId: listDshPartnerDeliverySlaAlerts
      tags: [DshFulfillmentSla]
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/SlaAlertStatus' } }
        - { $ref: '#/components/parameters/Limit' }
      responses:
        '200': { $ref: '#/components/responses/SlaAlertListResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/partner-delivery/sla-alerts/{alertId}/acknowledge:
    post:
      operationId: acknowledgeDshPartnerDeliverySlaAlert
      tags: [DshFulfillmentSla]
      parameters: [{ $ref: '#/components/parameters/AlertId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AcknowledgeAlertRequest' }
      responses:
        '200': { $ref: '#/components/responses/SlaAlertResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/pickups/sla-alerts/refresh:
    post:
      operationId: refreshDshPickupSlaAlerts
      tags: [DshFulfillmentSla]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: false }
      responses:
        '200': { $ref: '#/components/responses/SlaRefreshResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/pickups/sla-alerts:
    get:
      operationId: listDshPickupSlaAlerts
      tags: [DshFulfillmentSla]
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/SlaAlertStatus' } }
        - { $ref: '#/components/parameters/Limit' }
      responses:
        '200': { $ref: '#/components/responses/SlaAlertListResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
  /dsh/operator/pickups/sla-alerts/{alertId}/acknowledge:
    post:
      operationId: acknowledgeDshPickupSlaAlert
      tags: [DshFulfillmentSla]
      parameters: [{ $ref: '#/components/parameters/AlertId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AcknowledgeAlertRequest' }
      responses:
        '200': { $ref: '#/components/responses/SlaAlertResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    OrderId:
      name: orderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TaskId:
      name: taskId
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    AlertId:
      name: alertId
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 200 }
    Offset:
      name: offset
      in: query
      required: false
      schema: { type: integer, minimum: 0 }
  requestBodies:
    MutationRequest:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/MutationRequest' }
  schemas:
    TaskStatus:
      type: string
      enum: [unassigned, assigned, departed, arrived, proof_pending, completed, cancelled, exception]
    MutationRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, commandId]
      properties:
        expectedVersion: { type: integer, minimum: 0 }
        commandId: { type: string, minLength: 1, maxLength: 160 }
        correlationId: { type: string, minLength: 1, maxLength: 128 }
        reason: { type: string, maxLength: 1000 }
    AssignRequest:
      allOf:
        - { $ref: '#/components/schemas/MutationRequest' }
        - type: object
          required: [storeCourierId]
          properties:
            storeCourierId: { type: string, minLength: 1 }
    ProofRequest:
      allOf:
        - { $ref: '#/components/schemas/MutationRequest' }
        - type: object
          required: [proofMethod, proofReference]
          properties:
            proofMethod: { type: string, minLength: 1 }
            proofReference: { type: string, minLength: 1 }
    ExceptionRequest:
      allOf:
        - { $ref: '#/components/schemas/MutationRequest' }
        - type: object
          required: [reason, ticketReference]
          properties:
            reason: { type: string, minLength: 1 }
            ticketReference: { type: string, minLength: 1 }
            evidenceReferences:
              type: array
              maxItems: 10
              uniqueItems: true
              items: { type: string, minLength: 1, maxLength: 512 }
    PickupNotifyRequest:
      allOf:
        - { $ref: '#/components/schemas/MutationRequest' }
        - type: object
          properties:
            clientId: { type: string, minLength: 1 }
    PickupVerifyRequest:
      allOf:
        - { $ref: '#/components/schemas/MutationRequest' }
        - type: object
          required: [code]
          properties:
            code: { type: string, minLength: 1, maxLength: 32 }
    PickupReasonRequest:
      allOf:
        - { $ref: '#/components/schemas/MutationRequest' }
        - type: object
          required: [reason]
          properties:
            reason: { type: string, minLength: 1, maxLength: 1000 }
    PickupWindowRequest:
      allOf:
        - { $ref: '#/components/schemas/PickupReasonRequest' }
        - type: object
          required: [newExpiry]
          properties:
            newExpiry: { type: string, format: date-time }
    AcknowledgeAlertRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion]
      properties:
        expectedVersion: { type: integer, minimum: 0 }
    SlaAlertStatus:
      type: string
      enum: [open, acknowledged, resolved]
    PartnerDeliveryTask:
      type: object
      additionalProperties: true
      required: [id, orderId, storeId, status, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        orderId: { type: string, format: uuid }
        storeId: { type: string }
        branchId: { type: string }
        storeCourierId: { type: string }
        status: { $ref: '#/components/schemas/TaskStatus' }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PickupSession:
      type: object
      additionalProperties: true
      required: [id, orderId, storeId, clientId, expiresAt, status, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        orderId: { type: string, format: uuid }
        storeId: { type: string }
        clientId: { type: string }
        expiresAt: { type: string, format: date-time }
        status: { type: string }
        extensionCount: { type: integer, minimum: 0 }
        maxExtensions: { type: integer, minimum: 0 }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SlaAlert:
      type: object
      additionalProperties: true
      required: [id, orderId, storeId, leg, status, detectedAt, version]
      properties:
        id: { type: string }
        taskId: { type: [string, 'null'] }
        sessionId: { type: [string, 'null'] }
        orderId: { type: string }
        storeId: { type: string }
        leg: { type: string }
        status: { $ref: '#/components/schemas/SlaAlertStatus' }
        detectedAt: { type: string, format: date-time }
        acknowledgedByActorId: { type: [string, 'null'] }
        acknowledgedAt: { type: [string, 'null'], format: date-time }
        resolvedAt: { type: [string, 'null'], format: date-time }
        version: { type: integer, minimum: 1 }
    SlaRefreshResult:
      type: object
      additionalProperties: false
      required: [opened, resolved, active]
      properties:
        opened: { type: integer, minimum: 0 }
        resolved: { type: integer, minimum: 0 }
        active: { type: integer, minimum: 0 }
    ErrorEnvelope:
      type: object
      additionalProperties: true
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
  responses:
    TaskResponse:
      description: Partner delivery task.
      content:
        application/json:
          schema:
            type: object
            required: [task]
            properties:
              task: { $ref: '#/components/schemas/PartnerDeliveryTask' }
    TaskStateResponse:
      description: Actor-scoped partner delivery state.
      content:
        application/json:
          schema:
            type: object
            required: [task, stage]
            properties:
              task:
                oneOf:
                  - { $ref: '#/components/schemas/PartnerDeliveryTask' }
                  - { type: 'null' }
              stage: { type: string }
    TaskListResponse:
      description: Operator partner delivery list.
      content:
        application/json:
          schema:
            type: object
            required: [tasks]
            properties:
              tasks:
                type: array
                items: { $ref: '#/components/schemas/PartnerDeliveryTask' }
    PickupStateResponse:
      description: Actor-scoped pickup state.
      content:
        application/json:
          schema:
            type: object
            required: [session, stage]
            properties:
              session:
                oneOf:
                  - { $ref: '#/components/schemas/PickupSession' }
                  - { type: 'null' }
              stage: { type: string }
    PickupActionResponse:
      description: Pickup action response.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
            properties:
              session: { $ref: '#/components/schemas/PickupSession' }
              orderId: { type: string }
              status: { type: string }
    PickupListResponse:
      description: Pickup session list.
      content:
        application/json:
          schema:
            type: object
            required: [sessions]
            properties:
              sessions:
                type: array
                items: { $ref: '#/components/schemas/PickupSession' }
    SlaRefreshResponse:
      description: SLA refresh result.
      content:
        application/json:
          schema:
            type: object
            required: [result]
            properties:
              result: { $ref: '#/components/schemas/SlaRefreshResult' }
    SlaAlertResponse:
      description: SLA alert.
      content:
        application/json:
          schema:
            type: object
            required: [alert]
            properties:
              alert: { $ref: '#/components/schemas/SlaAlert' }
    SlaAlertListResponse:
      description: SLA alerts.
      content:
        application/json:
          schema:
            type: object
