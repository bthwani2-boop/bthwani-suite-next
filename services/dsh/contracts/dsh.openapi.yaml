          enum: [pending, wlt_handoff_failed, payment_pending, confirmed, cancelled, expired]
        paymentMethod:
          type: string
          enum: [cod, wallet, mixed, official_wallet]
        wltPaymentSessionId:
          type: string
          description: "Opaque WLT-owned payment-session reference. DSH never mutates financial truth."
        deliveryAddress: { type: string }
        note: { type: string }
        version: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCreateCheckoutIntentRequest:
      type: object
      required: [cartId, storeId]
      properties:
        cartId: { type: string }
        storeId: { type: string }
        fulfillmentMode:
          type: string
          enum: [bthwani_delivery, partner_delivery, pickup]
        paymentMethod:
          type: string
          enum: [cod, wallet, mixed, official_wallet]
        deliveryAddress: { type: string }
        note: { type: string }

