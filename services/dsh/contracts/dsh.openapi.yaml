openapi: 3.1.0
info:
  title: BThwani DSH Service API
  version: 0.4.0
  description: Delivery and shopping hub service contract. DSH-001 includes public discovery and protected store-role governance actions.

x-bthwani-owner: services/dsh
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: ENABLED
x-bthwani-runtime-dependency: true

paths:
  /dsh/health:
    get:
      operationId: getDshHealth
      summary: Return DSH liveness state.
      tags:
        - DshSystem
      responses:
        "200":
          description: DSH process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHealthResponse"

  /dsh/readiness:
    get:
      operationId: getDshReadiness
      summary: Return DSH readiness state.
      tags:
        - DshSystem
      responses:
        "200":
          description: DSH dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshReadinessResponse"
        "503":
          description: DSH is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshReadinessResponse"

  /dsh/stores:
    get:
      operationId: listDshStores
      summary: List discoverable stores.
      tags:
        - DshStoreDiscovery
      parameters:
        - name: cityCode
          in: query
          required: false
          schema:
            type: string
          description: Filter by city code.
        - name: serviceAreaCode
          in: query
          required: false
          schema:
            type: string
          description: Filter by service area code.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DshStoreStatus"
          description: Filter by store status.
        - name: isVisible
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by visibility flag.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of stores.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreListResponse"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"

  /dsh/home-discovery:
    get:
      operationId: getDshHomeDiscovery
      summary: Return home discovery payload for the client home screen.
      tags:
        - DshHomeDiscovery
      parameters:
        - name: cityCode
          in: query
          required: false
          schema:
            type: string
          description: Filter by city code.
        - name: serviceAreaCode
          in: query
          required: false
          schema:
            type: string
          description: Filter by service area code.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Maximum number of stores to return.
      responses:
        "200":
          description: Home discovery payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeDiscoveryResponse"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"
        "503":
          description: Service unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"

  /dsh/operator/home-discovery/{kind}:
    parameters:
      - $ref: "#/components/parameters/HomeContentKind"
    get:
      operationId: listOperatorHomeDiscoveryContent
      summary: List all home discovery content including inactive items.
      tags: [DshHomeDiscovery]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Administrative home discovery content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeAdminListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createOperatorHomeDiscoveryContent
      summary: Create a banner, promotion, or category.
      tags: [DshHomeDiscovery]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshHomeAdminContentInput"
      responses:
        "201":
          description: Content created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeAdminItemResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dsh/operator/home-discovery/{kind}/{itemId}:
    parameters:
      - $ref: "#/components/parameters/HomeContentKind"
      - name: itemId
        in: path
        required: true
        schema:
          type: string
    patch:
      operationId: updateOperatorHomeDiscoveryContent
      summary: Update a home discovery content item.
      tags: [DshHomeDiscovery]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshHomeAdminContentInput"
      responses:
        "200":
          description: Content updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeAdminItemResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteOperatorHomeDiscoveryContent
      summary: Delete a home discovery content item.
      tags: [DshHomeDiscovery]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "204":
          description: Content deleted.
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /dsh/stores/{storeId}:
    get:
      operationId: getDshStore
      summary: Get a single store by ID.
      tags:
        - DshStoreDiscovery
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
          description: Store identifier.
      responses:
        "200":
          description: Store detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreDetailResponse"
        "400":
          description: Invalid store ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"
        "404":
          description: Store not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"

  /dsh/store-context:
    get:
      operationId: getDshStoreContext
      summary: Resolve the authenticated actor's own or assigned store context.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Scoped store context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreContextResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /dsh/operator/stores:
    get:
      operationId: listOperatorDshStores
      summary: List all stores for an authenticated operator.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All stores including hidden and suspended stores.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dsh/operator/stores/{storeId}:
    get:
      operationId: getOperatorDshStore
      summary: Get unrestricted store detail for an authenticated operator.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          description: Operator store detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /dsh/partner/stores/{storeId}/settings:
    patch:
      operationId: updatePartnerStoreSettings
      summary: Update bounded operating settings for the authenticated partner's own store.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerStoreSettingsRequest"
      responses:
        "200":
          description: Store settings updated or idempotently replayed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreActionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /dsh/field/stores/{storeId}/verifications:
    post:
      operationId: submitFieldStoreVerification
      summary: Submit a verification outcome for the authenticated field actor's assigned store.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldStoreVerificationRequest"
      responses:
        "200":
          description: Verification recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreActionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /dsh/captain/stores/{storeId}/pickup-readiness:
    post:
      operationId: reportCaptainPickupReadiness
      summary: Report readiness for the authenticated captain's assigned pickup point.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptainPickupReadinessRequest"
      responses:
        "200":
          description: Pickup readiness report recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreActionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /dsh/operator/stores/{storeId}/governance:
    post:
      operationId: governDshStore
      summary: Apply an authenticated and audited lifecycle, visibility, or serviceability action.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorStoreGovernanceRequest"
      responses:
        "200":
          description: Governance action applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreActionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /dsh/operator/stores/{storeId}/audit:
    get:
      operationId: listDshStoreAudit
      summary: List the latest audited store actions for an operator.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          description: Store audit timeline.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreAuditResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dsh/stores/{storeId}/catalog:
    get:
      operationId: getPublishedDshCatalog
      summary: Return the approved, active catalog for a publicly eligible store.
      tags: [DshCatalog]
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          description: Published categories and products.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshCatalogResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /dsh/partner/catalog:
    get:
      operationId: getPartnerDshCatalog
      summary: Return the authenticated partner's complete catalog.
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Partner catalog including draft and inactive items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshCatalogResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dsh/partner/catalog/categories:
    post:
      operationId: createPartnerCatalogCategory
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/CorrelationId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCatalogCategoryInput" }
      responses:
        "201":
          description: Category created.
          content:
            application/json:
              schema:
                type: object
                required: [category]
                properties:
                  category: { $ref: "#/components/schemas/DshCatalogCategory" }

  /dsh/partner/catalog/categories/{categoryId}:
    parameters:
      - name: categoryId
        in: path
        required: true
        schema: { type: string }
      - $ref: "#/components/parameters/CorrelationId"
    patch:
      operationId: updatePartnerCatalogCategory
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCatalogCategoryInput" }
      responses:
        "200": { description: Category updated. }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      operationId: deletePartnerCatalogCategory
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: expectedVersion
          in: query
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "204": { description: Category deleted. }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/catalog/products:
    post:
      operationId: createPartnerCatalogProduct
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/CorrelationId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCatalogProductInput" }
      responses:
        "201":
          description: Product created.

  /dsh/partner/catalog/products/{productId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema: { type: string }
      - $ref: "#/components/parameters/CorrelationId"
    patch:
      operationId: updatePartnerCatalogProduct
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCatalogProductInput" }
      responses:
        "200": { description: Product updated. }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      operationId: deletePartnerCatalogProduct
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: expectedVersion
          in: query
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "204": { description: Product deleted. }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/catalog/media/upload-intents:
    post:
      operationId: createPartnerCatalogMediaUploadIntent
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/CorrelationId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshMediaUploadIntentInput" }
      responses:
        "201":
          description: Object-storage upload intent created.

  /dsh/partner/catalog/media/{mediaId}/complete:
    patch:
      operationId: completePartnerCatalogMedia
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshMediaCompleteInput" }
      responses:
        "200": { description: Media reference completed. }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/catalog/media/{mediaId}:
    delete:
      operationId: deletePartnerCatalogMedia
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string }
        - name: expectedVersion
          in: query
          required: true
          schema: { type: integer, minimum: 1 }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "204": { description: Media reference deleted. }

  /dsh/partner/catalog/submit:
    post:
      operationId: submitPartnerCatalog
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/CorrelationId" }]
      responses:
        "201": { description: Catalog submitted for operator review. }

  /dsh/operator/catalog/submissions:
    get:
      operationId: listOperatorCatalogSubmissions
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Catalog submission queue. }

  /dsh/operator/catalog/{storeId}/decision:
    post:
      operationId: decideOperatorCatalogSubmission
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCatalogDecisionInput" }
      responses:
        "200": { description: Submission approved or rejected. }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/operator/catalog/{storeId}/audit:
    get:
      operationId: listOperatorCatalogAudit
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/StoreId" }]
      responses:
        "200": { description: Catalog audit timeline. }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    HomeContentKind:
      name: kind
      in: path
      required: true
      schema:
        type: string
        enum: [banners, promos, categories]
    StoreId:
      name: storeId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 200
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 200
  responses:
    InvalidRequest:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    Unauthenticated:
      description: Bearer session is missing, invalid, or expired.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    Forbidden:
      description: Actor role cannot perform this function.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    NotFound:
      description: Scoped store context was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    Conflict:
      description: Version or idempotency conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    ServiceUnavailable:
      description: Identity or DSH dependency is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
  schemas:
    DshStoreStatus:
      type: string
      enum:
        - active
        - inactive
        - temporarily_closed
        - unavailable

    DshStoreServiceabilityStatus:
      type: string
      enum:
        - serviceable
        - limited
        - out_of_area
        - unavailable

    DshStoreServiceabilitySummary:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/DshStoreServiceabilityStatus"

    DshStoreSummary:
      type: object
      required:
        - id
        - slug
        - displayName
        - status
        - cityCode
        - serviceAreaCode
        - serviceability
        - isVisible
        - category
        - categoryLabel
        - deliveryModes
        - isFreeDelivery
        - followerCount
        - hasProBadge
        - hasCouponBadge
        - isPopular
        - partnerReadiness
        - catalogApprovalStatus
        - marketingVisibility
        - publicationEligible
      properties:
        id:
          type: string
        slug:
          type: string
        displayName:
          type: string
        status:
          $ref: "#/components/schemas/DshStoreStatus"
        cityCode:
          type: string
        serviceAreaCode:
          type: string
        serviceability:
          $ref: "#/components/schemas/DshStoreServiceabilitySummary"
        ratingAverage:
          type: ["number", "null"]
          format: float
        ratingCount:
          type: integer
        deliveryEtaMin:
          type: ["integer", "null"]
        deliveryEtaMax:
          type: ["integer", "null"]
        isVisible:
          type: boolean
        heroImageUrl:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        category:
          $ref: "#/components/schemas/DshStoreCategory"
        categoryLabel:
          type: string
          description: Human-readable category label resolved from dsh_categories
        deliveryModes:
          type: array
          items:
            $ref: "#/components/schemas/DshStoreDeliveryMode"
        isFreeDelivery:
          type: boolean
        distanceKm:
          type: ["number", "null"]
          format: float
        followerCount:
          type: integer
          minimum: 0
        hasProBadge:
          type: boolean
        hasCouponBadge:
          type: boolean
        pointsMultiplier:
          type: ["integer", "null"]
          minimum: 1
        isPopular:
          type: boolean
        partnerReadiness:
          type: string
          enum: [pending, ready, blocked]
        catalogApprovalStatus:
          type: string
          enum: [draft, submitted, approved, rejected]
        marketingVisibility:
          type: string
          enum: [hidden, visible]
        publicationEligible:
          type: boolean

    DshStoreCategory:
      type: string
      enum:
        - restaurant
        - grocery
        - pharmacy
        - bakery
        - default

    DshStoreDeliveryMode:
      type: string
      enum:
        - delivery
        - pickup
        - express

    DshStoreDetail:
      allOf:
        - $ref: "#/components/schemas/DshStoreSummary"
        - type: object
          required:
            - createdAt
            - updatedAt
            - version
          properties:
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            version:
              type: integer
              minimum: 1

    DshPagination:
      type: object
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer

    DshStoreListResponse:
      type: object
      required:
        - stores
        - pagination
      properties:
        stores:
          type: array
          items:
            $ref: "#/components/schemas/DshStoreSummary"
        pagination:
          $ref: "#/components/schemas/DshPagination"

    DshStoreDetailResponse:
      type: object
      required:
        - store
      properties:
        store:
          $ref: "#/components/schemas/DshStoreDetail"

    DshErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string

    DshStoreContextResponse:
      type: object
      required: [actorRole, scope, store]
      properties:
        actorRole:
          type: string
          enum: [partner, field, captain, operator]
        scope:
          type: string
          enum: [own, assigned, all]
        store:
          $ref: "#/components/schemas/DshStoreDetail"
        latestAction:
          oneOf:
            - $ref: "#/components/schemas/DshStoreAuditEvent"
            - type: "null"

    PartnerStoreSettingsRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, status, deliveryModes, reason]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
        status:
          $ref: "#/components/schemas/DshStoreStatus"
        deliveryModes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/DshStoreDeliveryMode"
        reason:
          type: string
          minLength: 3
          maxLength: 500

    FieldStoreVerificationRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, outcome, evidenceStatus, notes]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
        outcome:
          type: string
          enum: [verified, needs_follow_up, rejected]
        evidenceStatus:
          type: string
          enum: [complete, partial, missing]
        notes:
          type: string
          minLength: 3
          maxLength: 1000

    CaptainPickupReadinessRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, readiness, reason]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
        readiness:
          type: string
          enum: [ready, blocked]
        reason:
          type: string
          minLength: 3
          maxLength: 500

    OperatorStoreGovernanceRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, action, value, reason]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
        action:
          type: string
          enum: [lifecycle, visibility, serviceability, partner-readiness, catalog-approval, marketing-visibility]
        value:
          type: string
          minLength: 1
        reason:
          type: string
          minLength: 3
          maxLength: 500

    DshStoreActionResponse:
      type: object
      required: [store, audit, replayed]
      properties:
        store:
          $ref: "#/components/schemas/DshStoreDetail"
        audit:
          $ref: "#/components/schemas/DshStoreAuditEvent"
        replayed:
          type: boolean

    DshStoreAuditEvent:
      type: object
      required:
        [id, actorId, actorRole, storeId, action, fromState, toState, correlationId, createdAt]
      properties:
        id:
          type: string
        actorId:
          type: string
        actorRole:
          type: string
        storeId:
          type: string
        action:
          type: string
        fromState:
          type: object
          additionalProperties: true
        toState:
          type: object
          additionalProperties: true
        reason:
          type: string
        correlationId:
          type: string
        createdAt:
          type: string
          format: date-time

    DshStoreAuditResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/DshStoreAuditEvent"

    DshCatalogCategory:
      type: object
      required: [id, storeId, name, description, sortOrder, isActive, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        storeId: { type: string }
        name: { type: string }
        description: { type: string }
        sortOrder: { type: integer }
        isActive: { type: boolean }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCatalogMedia:
      type: object
      required: [id, storeId, objectKey, contentType, state, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        storeId: { type: string }
        productId: { type: ["string", "null"] }
        objectKey: { type: string }
        contentType: { type: string }
        state: { type: string, enum: [pending, complete, deleted] }
        publicUrl: { type: ["string", "null"] }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCatalogProduct:
      type: object
      required: [id, storeId, name, description, sku, priceReference, isActive, version, media, createdAt, updatedAt]
      properties:
        id: { type: string }
        storeId: { type: string }
        categoryId: { type: ["string", "null"] }
        name: { type: string }
        description: { type: string }
        sku: { type: string }
        priceReference:
          type: string
          description: Opaque WLT-owned price reference; DSH does not calculate monetary truth.
        isActive: { type: boolean }
        version: { type: integer, minimum: 1 }
        media:
          type: array
          items: { $ref: "#/components/schemas/DshCatalogMedia" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCatalogResponse:
      type: object
      required: [categories, products]
      properties:
        storeId: { type: string }
        categories:
          type: array
          items: { $ref: "#/components/schemas/DshCatalogCategory" }
        products:
          type: array
          items: { $ref: "#/components/schemas/DshCatalogProduct" }

    DshCatalogCategoryInput:
      type: object
      additionalProperties: false
      required: [name, description, sortOrder, isActive, expectedVersion]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        sortOrder: { type: integer }
        isActive: { type: boolean }
        expectedVersion: { type: integer, minimum: 0 }

    DshCatalogProductInput:
      type: object
      additionalProperties: false
      required: [name, description, sku, priceReference, isActive, expectedVersion]
      properties:
        categoryId: { type: ["string", "null"] }
        name: { type: string, minLength: 1 }
        description: { type: string }
        sku: { type: string, minLength: 1 }
        priceReference: { type: string, minLength: 1 }
        isActive: { type: boolean }
        expectedVersion: { type: integer, minimum: 0 }

    DshMediaUploadIntentInput:
      type: object
      additionalProperties: false
      required: [fileName, contentType]
      properties:
        productId: { type: ["string", "null"] }
        fileName: { type: string, minLength: 1 }
        contentType: { type: string, pattern: "^image/" }

    DshMediaCompleteInput:
      type: object
      additionalProperties: false
      required: [publicUrl, expectedVersion]
      properties:
        publicUrl: { type: string, format: uri }
        expectedVersion: { type: integer, minimum: 1 }

    DshCatalogDecisionInput:
      type: object
      additionalProperties: false
      required: [decision, reason, expectedVersion]
      properties:
        decision: { type: string, enum: [approved, rejected] }
        reason: { type: string, minLength: 3 }
        expectedVersion: { type: integer, minimum: 1 }

    DshHealthResponse:
      type: object
      required:
        - service
        - status
        - checkedAt
      properties:
        service:
          type: string
          const: dsh
        status:
          type: string
          enum:
            - healthy
        checkedAt:
          type: string
          format: date-time

    DshReadinessResponse:
      type: object
      required:
        - service
        - status
        - dependencies
        - checkedAt
      properties:
        service:
          type: string
          const: dsh
        status:
          type: string
          enum:
            - ready
            - not_ready
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum:
              - ready
              - degraded
              - down
              - not_configured
        checkedAt:
          type: string
          format: date-time

    DshHomeBanner:
      type: object
      required:
        - id
        - title
        - imageUrl
        - actionType
        - actionTarget
      properties:
        id:
          type: string
        title:
          type: string
        subtitle:
          type: string
        imageUrl:
          type: string
        actionType:
          type: string
          enum:
            - store
            - category
            - external
            - none
        actionTarget:
          type: string

    DshHomePromo:
      type: object
      required:
        - id
        - title
        - imageUrl
      properties:
        id:
          type: string
        title:
          type: string
        subtitle:
          type: string
        badgeLabel:
          type: string
        imageUrl:
          type: string
        actionType:
          type: string
          enum:
            - store
            - category
            - external
            - none
        actionTarget:
          type: string

    DshHomeFilter:
      type: object
      required:
        - id
        - label
        - kind
      properties:
        id:
          type: string
        label:
          type: string
        kind:
          type: string
          enum:
            - all
            - favorites
            - nearest
            - new
            - offers
        isActive:
          type: boolean
          default: false

    DshHomeCategory:
      type: object
      required:
        - id
        - label
        - sortOrder
      properties:
        id:
          type: string
        label:
          type: string
        iconUrl:
          type: string
        sortOrder:
          type: integer

    DshHomeAdminContentItem:
      type: object
      required: [id, kind, title, actionType, actionTarget, sortOrder, isActive]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [banners, promos, categories]
        title:
          type: string
        subtitle:
          type: string
        badgeLabel:
          type: string
        imageUrl:
          type: string
        actionType:
          type: string
          enum: [store, category, external, none]
        actionTarget:
          type: string
        sortOrder:
          type: integer
          minimum: 0
        isActive:
          type: boolean

    DshHomeAdminContentInput:
      type: object
      required: [title, subtitle, badgeLabel, imageUrl, actionType, actionTarget, sortOrder, isActive]
      properties:
        title:
          type: string
          minLength: 2
        subtitle:
          type: string
        badgeLabel:
          type: string
        imageUrl:
          type: string
        actionType:
          type: string
          enum: [store, category, external, none]
        actionTarget:
          type: string
        sortOrder:
          type: integer
          minimum: 0
        isActive:
          type: boolean

    DshHomeAdminListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DshHomeAdminContentItem"

    DshHomeAdminItemResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: "#/components/schemas/DshHomeAdminContentItem"

    DshHomeDiscoveryResponse:
      type: object
      required:
        - banners
        - promos
        - filters
        - categories
        - stores
        - pagination
        - generatedAt
      properties:
        banners:
          type: array
          items:
            $ref: "#/components/schemas/DshHomeBanner"
        promos:
          type: array
          items:
            $ref: "#/components/schemas/DshHomePromo"
        filters:
          type: array
          items:
            $ref: "#/components/schemas/DshHomeFilter"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/DshHomeCategory"
        stores:
          type: array
          items:
            $ref: "#/components/schemas/DshStoreSummary"
        pagination:
          $ref: "#/components/schemas/DshPagination"
        generatedAt:
          type: string
          format: date-time
