        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Pickup session version changed; reload before retrying (VERSION_CONFLICT).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshErrorResponse" }
        "422":
          description: Pickup session was already used (PICKUP_CODE_ALREADY_USED).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshErrorResponse" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    HomeContentKind:
      name: kind
      in: path
      required: true
      schema:
        type: string
        enum: [banners, promos]
    StoreId:
      name: storeId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 200
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 200
  responses:
    InvalidRequest:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    Unauthenticated:
      description: Bearer session is missing, invalid, or expired.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    Forbidden:
      description: Actor role cannot perform this function.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    NotFound:
      description: Scoped store context was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    Conflict:
      description: Version or idempotency conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    ServiceUnavailable:
      description: Identity or DSH dependency is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
  schemas:
    DshStoreStatus:
      type: string
      enum:
        - active
        - inactive
        - temporarily_closed
        - unavailable

    DshStoreServiceabilityStatus:
      type: string
      enum:
        - serviceable
        - limited
        - out_of_area
        - unavailable

    DshStoreServiceabilitySummary:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/DshStoreServiceabilityStatus"

    DshStoreSummary:
      type: object
      required:
        - id
        - slug
        - displayName
        - status
        - cityCode
        - serviceAreaCode
        - serviceability
        - isVisible
        - category
        - categoryLabel
        - deliveryModes
        - isFreeDelivery
        - followerCount
        - hasProBadge
        - hasCouponBadge
        - isPopular
        - partnerReadiness
        - catalogApprovalStatus
        - marketingVisibility
        - publicationEligible
      properties:
        id:
          type: string
        slug:
          type: string
        displayName:
          type: string
        status:
          $ref: "#/components/schemas/DshStoreStatus"
        cityCode:
          type: string
        serviceAreaCode:
          type: string
        serviceability:
          $ref: "#/components/schemas/DshStoreServiceabilitySummary"
        ratingAverage:
          type: ["number", "null"]
          format: float
        ratingCount:
          type: integer
        deliveryEtaMin:
          type: ["integer", "null"]
        deliveryEtaMax:
          type: ["integer", "null"]
        isVisible:
          type: boolean
        heroImageUrl:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        category:
          $ref: "#/components/schemas/DshStoreCategory"
        categoryLabel:
          type: string
          description: Human-readable category label resolved from the sovereign central catalog domain
        deliveryModes:
          type: array
          items:
            $ref: "#/components/schemas/DshStoreDeliveryMode"
        isFreeDelivery:
          type: boolean
        distanceKm:
          type: ["number", "null"]
          format: float
        followerCount:
          type: integer
          minimum: 0
        hasProBadge:
          type: boolean
        hasCouponBadge:
          type: boolean
        pointsMultiplier:
          type: ["integer", "null"]
          minimum: 1
        isPopular:
          type: boolean
        partnerReadiness:
          type: string
          enum: [pending, ready, blocked]
        catalogApprovalStatus:
          type: string
          enum: [draft, submitted, approved, rejected]
        marketingVisibility:
          type: string
          enum: [hidden, visible]
        publicationEligible:
          type: boolean

    DshStoreCategory:
      type: string
      description: Sovereign central catalog domain identifier assigned to the store.
      pattern: ^domain-[a-z0-9-]+$

    DshStoreDeliveryMode:
      type: string
      enum:
        - delivery
        - pickup
        - express

    DshPartnerOperationalScope:
      type: object
      required:
        - scopeId
        - storeId
        - partnerId
        - displayName
        - role
        - permissions
      properties:
        scopeId: { type: string }
        storeId: { type: string }
        partnerId: { type: string }
        displayName: { type: string }
        role:
          type: string
          enum: [owner, manager, staff]
        permissions:
          type: array
          items:
            type: string

    DshStoreDetail:
      allOf:
        - $ref: "#/components/schemas/DshStoreSummary"
        - type: object
          required:
            - createdAt
            - updatedAt
            - version
          properties:
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            version:
              type: integer
              minimum: 1

    DshFieldPartnerStoreDraft:
      type: object
      required:
        - storeId
        - partnerId
        - displayName
        - cityCode
        - serviceAreaCode
        - addressLine
        - coverageSummary
        - operatingHours
        - deliveryReadiness
        - storefrontPhotoRef
        - interiorPhotoRef
        - signagePhotoRef
        - status
        - isVisible
        - partnerReadiness
        - catalogApprovalStatus
        - marketingVisibility
        - version
      properties:
        storeId: { type: string }
        partnerId: { type: string }
        displayName: { type: string }
        cityCode: { type: string }
        serviceAreaCode: { type: string }
        addressLine: { type: string }
        coverageSummary: { type: string }
        operatingHours: { type: string }
        deliveryReadiness: { type: string }
        storefrontPhotoRef: { type: string }
        interiorPhotoRef: { type: string }
        signagePhotoRef: { type: string }
        status:
          $ref: "#/components/schemas/DshStoreStatus"
        isVisible: { type: boolean }
        partnerReadiness:
          type: string
          enum: [pending, ready, blocked]
        catalogApprovalStatus:
          type: string
          enum: [draft, submitted, approved, rejected]
        marketingVisibility:
          type: string
          enum: [hidden, visible]
        version:
          type: integer
          minimum: 1

    DshUpdateFieldPartnerStoreDraftRequest:
      type: object
      additionalProperties: false
      properties:
        displayName: { type: string }
        cityCode: { type: string }
        serviceAreaCode: { type: string }
        addressLine: { type: string }
        coverageSummary: { type: string }
        operatingHours: { type: string }
        deliveryReadiness: { type: string }
        storefrontPhotoRef: { type: string }
        interiorPhotoRef: { type: string }
        signagePhotoRef: { type: string }

    DshPagination:
      type: object
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer

    DshStoreListResponse:
      type: object
      required:
        - stores
        - pagination
      properties:
        stores:
          type: array
          items:
            $ref: "#/components/schemas/DshStoreSummary"
        pagination:
          $ref: "#/components/schemas/DshPagination"

    DshStoreDetailResponse:
      type: object
      required:
        - store
      properties:
        store:
          $ref: "#/components/schemas/DshStoreDetail"

    DshErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string

    DshStoreContextResponse:
      type: object
      required: [actorRole, scope, store]
      properties:
        actorRole:
          type: string
          enum: [partner, field, captain, operator]
        scope:
          type: string
          enum: [own, assigned, all]
        store:
          $ref: "#/components/schemas/DshStoreDetail"
        latestAction:
          $ref: "#/components/schemas/DshStoreAuditEvent"
          nullable: true

    PartnerStoreSettingsRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, status, deliveryModes, reason]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
        status:
          $ref: "#/components/schemas/DshStoreStatus"
        deliveryModes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/DshStoreDeliveryMode"
        reason:
          type: string
          minLength: 3
          maxLength: 500

    FieldStoreVerificationRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, visitId, outcome, evidenceStatus, notes]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
        visitId:
          type: string
          description: The readiness visit (dsh_field_visits.id) this verification is derived from.
        outcome:
          type: string
          enum: [verified, needs_follow_up, rejected]
        evidenceStatus:
          type: string
          enum: [complete, partial, missing]
        notes:
          type: string
          minLength: 3
          maxLength: 1000

    CaptainPickupReadinessRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, readiness, reason]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
        readiness:
          type: string
          enum: [ready, blocked]
        reason:
          type: string
          minLength: 3
          maxLength: 500

    OperatorStoreGovernanceRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, action, value, reason]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
        action:
          type: string
          enum: [lifecycle, visibility, serviceability, partner-readiness, catalog-approval, marketing-visibility]
        value:
          type: string
          minLength: 1
        reason:
          type: string
          minLength: 3
          maxLength: 500

    DshStoreActionResponse:
      type: object
      required: [store, audit, replayed]
      properties:
        store:
          $ref: "#/components/schemas/DshStoreDetail"
        audit:
          $ref: "#/components/schemas/DshStoreAuditEvent"
        replayed:
          type: boolean

    DshStoreAuditEvent:
      type: object
      required:
        [id, actorId, actorRole, storeId, action, fromState, toState, correlationId, createdAt]
      properties:
        id:
          type: string
        actorId:
          type: string
        actorRole:
          type: string
        storeId:
          type: string
        action:
          type: string
        fromState:
          type: object
          additionalProperties: true
        toState:
          type: object
          additionalProperties: true
        reason:
          type: string
        correlationId:
          type: string
        createdAt:
          type: string
          format: date-time

    DshStoreAuditResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/DshStoreAuditEvent"


    DshCatalogAsset:
      type: object
      required: [id, objectKey, mimeType, sizeBytes, status, sourceSurface, uploadedBy, createdAt, updatedAt, version]
      properties:
        id: { type: string }
        objectKey: { type: string }
        publicUrl: { type: [string, "null"] }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        widthPx: { type: [integer, "null"] }
        heightPx: { type: [integer, "null"] }
        checksum: { type: [string, "null"] }
        altAr: { type: string }
        altEn: { type: string }
        dominantColor: { type: [string, "null"] }
        status:
          type: string
          enum: [draft, uploaded, pending_review, approved, rejected, archived]
        sourceSurface: { type: string }
        uploadedBy: { type: string }
        reviewedBy: { type: [string, "null"] }
        reviewNote: { type: string }
        intendedEntityType: { type: [string, "null"] }
        intendedEntityId: { type: [string, "null"] }
        intendedRole: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCatalogAssetListResponse:
      type: object
      required: [assets, total, limit, offset]
      properties:
        assets:
          type: array
          items: { $ref: "#/components/schemas/DshCatalogAsset" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    DshMasterProduct:
      type: object
      required: [id, domainId, canonicalNameAr, canonicalNameEn, brand, unit, measurementType, approvalStatus, isActive, createdSource, createdAt, updatedAt, version]
      properties:
        id: { type: string }
        domainId: { type: string }
        categoryNodeId: { type: [string, "null"] }
        canonicalNameAr: { type: string }
        canonicalNameEn: { type: string }
        brand: { type: string }
        barcode: { type: [string, "null"] }
        gtin: { type: [string, "null"] }
        sku: { type: [string, "null"] }
        unit: { type: string }
        measurementType: { type: string }
        canonicalImageObjectKey: { type: [string, "null"] }
        approvalStatus:
          type: string
          enum: [draft, pending_review, approved, rejected, archived]
        isActive: { type: boolean }
        duplicateGroupId: { type: [string, "null"] }
        createdSource: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        version: { type: integer }

    MasterProductSummary:
      type: object
      required: [id, domainId, canonicalNameAr, canonicalNameEn, brand, unit, measurementType, approvalStatus, isActive, updatedAt, version]
      properties:
        id: { type: string }
        domainId: { type: string }
        categoryNodeId: { type: [string, "null"] }
        canonicalNameAr: { type: string }
        canonicalNameEn: { type: string }
        brand: { type: string }
        barcode: { type: [string, "null"] }
        sku: { type: [string, "null"] }
        unit: { type: string }
        measurementType: { type: string }
        approvalStatus: { type: string }
        isActive: { type: boolean }
        effectiveImage: { type: [string, "null"] }
        thumbnailUrl: { type: [string, "null"] }
        imageAltAr: { type: [string, "null"] }
        imageStatus: { type: string }
        updatedAt: { type: string, format: date-time }
        version: { type: integer }

    DshMasterProductListResponse:
      type: object
      required: [masterProducts, total, limit, offset]
      properties:
        masterProducts:
          type: array
          items: { $ref: "#/components/schemas/MasterProductSummary" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    DshProductProposal:
      type: object
      required: [id, proposedNameAr, proposedNameEn, domainId, brand, sourceSurface, sourceActorId, status, reviewNote, createdAt, updatedAt, reviewStage, auditRequired, resubmissionCount, version]
      properties:
        id: { type: string }
        proposedNameAr: { type: string }
        proposedNameEn: { type: string }
        domainId: { type: string }
        categoryNodeId: { type: [string, "null"] }
        brand: { type: string }
        barcode: { type: [string, "null"] }
        imageObjectKey: { type: [string, "null"] }
        sourceSurface:
          type: string
          enum: [app-field, app-partner, control-panel-catalog, control-panel-platform]
        sourceActorId: { type: string }
        sourceStoreId: { type: [string, "null"] }
        status:
          type: string
          enum: [catalog-draft, partner-proposed, partner-review, marketing-review, catalog-adopted, catalog-approved, client-visible, needs-fix, rejected]
        reviewNote: { type: string }
        adoptedMasterProductId: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        reviewStage: { type: string }
        partnerReviewedBy: { type: [string, "null"] }
        marketingReviewedBy: { type: [string, "null"] }
        catalogAdoptedBy: { type: [string, "null"] }
        catalogApprovedBy: { type: [string, "null"] }
        clientVisibleAt: { type: [string, "null"], format: date-time }
        auditRequired: { type: boolean }
        blockedReason: { type: [string, "null"] }
        resubmissionCount: { type: integer }
        linkedStoreId: { type: [string, "null"] }

    DshProductProposalListResponse:
      type: object
      required: [proposals, total, limit, offset]
      properties:
        proposals:
          type: array
          items: { $ref: "#/components/schemas/DshProductProposal" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    DshReel:
      type: object
      required: [id, assetId, targetType, targetId, status, sortOrder, submittedBy, submittedByRole, createdAt, updatedAt]
      properties:
        id: { type: string }
        assetId: { type: string }
        titleAr: { type: string }
        titleEn: { type: string }
        targetType: { type: string, enum: [master_product, store, offer] }
        targetId: { type: string }
        status: { type: string, enum: [pending_review, approved, rejected, archived] }
        sortOrder: { type: integer }
        submittedBy: { type: string }
        submittedByRole: { type: string }
        sourceStoreId: { type: [string, "null"] }
        reviewedBy: { type: [string, "null"] }
        reviewNote: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshPublicReel:
      type: object
      required: [id, videoUrl, targetType, targetId, sortOrder]
      properties:
        id: { type: string }
        titleAr: { type: string }
        titleEn: { type: string }
        videoUrl:
          type: string
          description: Public streaming URL from /dsh/public/media/{assetId}/original
        targetType: { type: string, enum: [master_product, store, offer] }
        targetId: { type: string }
        sortOrder: { type: integer }

    DshCentralCatalogDomain:

      type: object
      required: [id, slug, nameAr, nameEn, icon, sortOrder, isActive, isClientVisible, requiresProductCatalog, isManualRequest, version]
      properties:
        id: { type: string }
        slug: { type: string }
        nameAr: { type: string }
        nameEn: { type: string }
        icon: { type: string }
        sortOrder: { type: integer }
        isActive: { type: boolean }
        isClientVisible: { type: boolean }
        requiresProductCatalog: { type: boolean }
        isManualRequest: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCentralCatalogNode:
      type: object
      required: [id, domainId, level, slug, nameAr, nameEn, icon, sortOrder, isActive, isClientVisible, version]
      properties:
        id: { type: string }
        domainId: { type: string }
        parentId: { type: ["string", "null"] }
        level: { type: string, enum: [BUSINESS_SUBDOMAIN, PRODUCT_MAIN_CLASS, PRODUCT_SUB_CLASS] }
        slug: { type: string }
        nameAr: { type: string }
        nameEn: { type: string }
        icon: { type: string }
        sortOrder: { type: integer }
        isActive: { type: boolean }
        isClientVisible: { type: boolean }

    DshClientCatalogProduct:
      type: object
      required: [id, domainId, canonicalNameAr, canonicalNameEn, brand, unit, measurementType, approvalStatus, isActive, unitPrice, currency, stockStatus, imageObjectKey]
      properties:
        id: { type: string }
        domainId: { type: string }
        categoryNodeId: { type: ["string", "null"] }
        canonicalNameAr: { type: string }
        canonicalNameEn: { type: string }
        brand: { type: string }
        barcode: { type: ["string", "null"] }
        gtin: { type: ["string", "null"] }
        sku: { type: ["string", "null"] }
        unit: { type: string }
        measurementType: { type: string }
        canonicalImageObjectKey: { type: ["string", "null"] }
        approvalStatus: { type: string, enum: [approved] }
        isActive: { type: boolean }
        unitPrice: { type: number, format: double, minimum: 0 }
        currency: { type: string }
        stockStatus: { type: string, enum: [in_stock, low_stock, out_of_stock] }
        imageObjectKey: { type: string, deprecated: true, description: "Deprecated: use effectiveImage instead." }
        effectiveImage:
          type: object
          nullable: true
          description: >
            DAM-computed effective product image. Priority: approved store-assortment
            partner_custom_product_image (when policy allows) > approved master-product
            canonical_product_image > null.
          properties:
            url: { type: string }
            altAr: { type: string }
            source: { type: string, enum: [store_custom, canonical] }

    DshCatalogAssetLink:
      type: object
      required: [id, assetId, entityType, entityId, role, sortOrder, isPrimary, status]
      properties:
        id: { type: string }
        assetId: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        role: { type: string }
        sortOrder: { type: integer }
        isPrimary: { type: boolean }
        status: { type: string }

    DshCatalogPolicySnapshot:
      type: object
      required: [id, policyScope, isActive, version]
      properties:
        id: { type: string }
        domainId: { type: ["string", "null"] }
        nodeId: { type: ["string", "null"] }
        policyScope: { type: string, enum: [default, domain, node] }
        isActive: { type: boolean }
        allowsStoreProductCustomImage: { type: boolean }
        allowsProductProposal: { type: boolean }
        requiresBarcode: { type: boolean }
        requiresCatalogReview: { type: boolean }
        requiresProductImage: { type: boolean }

    DshCatalogResponse:
      type: object
      required: [domains, nodes, products, media, policySnapshot]
      properties:
        domains:
          type: array
          items: { $ref: "#/components/schemas/DshCentralCatalogDomain" }
        nodes:
          type: array
          items: { $ref: "#/components/schemas/DshCentralCatalogNode" }
        products:
          type: array
          items: { $ref: "#/components/schemas/DshClientCatalogProduct" }
        media:
          type: array
          items: { $ref: "#/components/schemas/DshCatalogAssetLink" }
        policySnapshot:
          type: array
          items: { $ref: "#/components/schemas/DshCatalogPolicySnapshot" }

    DshHealthResponse:
      type: object
      required:
        - service
        - status
        - checkedAt
      properties:
        service:
          type: string
          const: dsh
        status:
          type: string
          enum:
            - healthy
        checkedAt:
          type: string
          format: date-time

    DshReadinessResponse:
      type: object
      required:
        - service
        - status
        - dependencies
        - checkedAt
      properties:
        service:
          type: string
          const: dsh
        status:
          type: string
          enum:
            - ready
            - not_ready
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum:
              - ready
              - degraded
              - down
              - not_configured
        checkedAt:
          type: string
          format: date-time

    DshHomeBanner:
      type: object
      required:
        - id
        - title
        - imageUrl
        - actionType
        - actionTarget
      properties:
        id:
          type: string
        title:
          type: string
        subtitle:
          type: string
        imageUrl:
          type: string
        actionType:
          type: string
          enum:
            - store
            - category
            - external
            - none
        actionTarget:
          type: string

    DshHomePromo:
      type: object
      required:
        - id
        - title
        - imageUrl
      properties:
        id:
          type: string
        title:
          type: string
        subtitle:
          type: string
        badgeLabel:
          type: string
        imageUrl:
          type: string
        actionType:
          type: string
          enum:
            - store
            - category
            - external
            - none
        actionTarget:
          type: string

    DshHomeFilter:
      type: object
      required:
        - id
        - label
        - kind
      properties:
        id:
          type: string
        label:
          type: string
        kind:
          type: string
          enum:
            - all
            - favorites
            - nearest
            - new
            - offers
        isActive:
          type: boolean
          default: false

    DshHomeCategory:
      type: object
      required:
        - id
        - label
        - sortOrder
      properties:
        id:
          type: string
        label:
          type: string
        iconUrl:
          type: string
        sortOrder:
          type: integer

    DshHomeAdminContentItem:
      type: object
      required: [id, kind, title, actionType, actionTarget, sortOrder, isActive]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [banners, promos]
        title:
          type: string
        subtitle:
          type: string
        badgeLabel:
          type: string
        imageUrl:
          type: string
        actionType:
          type: string
          enum: [store, category, external, none]
        actionTarget:
          type: string
        sortOrder:
          type: integer
          minimum: 0
        isActive:
          type: boolean

    DshHomeAdminContentInput:
      type: object
      required: [title, subtitle, badgeLabel, imageUrl, actionType, actionTarget, sortOrder, isActive]
      properties:
        title:
          type: string
          minLength: 2
        subtitle:
          type: string
        badgeLabel:
          type: string
        imageUrl:
          type: string
        actionType:
          type: string
          enum: [store, category, external, none]
        actionTarget:
          type: string
        sortOrder:
          type: integer
          minimum: 0
        isActive:
          type: boolean

    DshHomeAdminListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DshHomeAdminContentItem"

    DshHomeAdminItemResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: "#/components/schemas/DshHomeAdminContentItem"

    DshHomeDiscoveryResponse:
      type: object
      required:
        - banners
        - promos
        - filters
        - categories
        - stores
        - pagination
        - generatedAt
      properties:
        banners:
          type: array
          items:
            $ref: "#/components/schemas/DshHomeBanner"
        promos:
          type: array
          items:
            $ref: "#/components/schemas/DshHomePromo"
        filters:
          type: array
          items:
            $ref: "#/components/schemas/DshHomeFilter"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/DshHomeCategory"
        stores:
          type: array
          items:
            $ref: "#/components/schemas/DshStoreSummary"
        pagination:
          $ref: "#/components/schemas/DshPagination"
        generatedAt:
          type: string
          format: date-time

    # ─── Cart schemas ────────────────────────────────────────────────

    DshCartItem:
      type: object
      required: [id, cartId, productId, masterProductId, storeAssortmentId, productName, priceReference, unitPrice, quantity, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        cartId: { type: string }
        productId: { type: string }
        masterProductId: { type: string, description: "Sovereign central-catalog master product id (equal to productId today)." }
        storeAssortmentId: { type: ["string", "null"], description: "The dsh_store_assortments row this cart line resolved against." }
        productName: { type: string, description: "Snapshotted server-side from the catalog product at add-to-cart time." }
        priceReference: { type: string, description: "Display label snapshotted from catalog — not a computed financial amount." }
        unitPrice: { type: number, format: double, minimum: 0, description: "Snapshotted from the catalog product's unitPrice at add-to-cart time." }
        quantity: { type: integer, minimum: 1 }
        version: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCart:
      type: object
      required: [id, clientId, storeId, fulfillmentMode, state, note, items, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        clientId: { type: string }
        storeId: { type: string }
        fulfillmentMode:
          type: string
          enum: [bthwani_delivery, partner_delivery, pickup]
        state:
          type: string
          enum: [active, checked_out, abandoned]
        note: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/DshCartItem"
        version: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCartResponse:
      type: object
      required: [cart]
      properties:
        cart:
          $ref: "#/components/schemas/DshCart"
          nullable: true

    DshUpsertCartItemRequest:
      type: object
      additionalProperties: false
      required: [storeId, masterProductId, quantity]
      properties:
        storeId: { type: string }
        fulfillmentMode:
          type: string
          enum: [bthwani_delivery, partner_delivery, pickup]
        masterProductId: { type: string, description: "Sovereign central-catalog master product id to add/update in the cart." }
        quantity: { type: integer, minimum: 1 }

    DshUpsertCartItemResponse:
      type: object
      required: [cartId, item]
      properties:
        cartId: { type: string }
        item:
          $ref: "#/components/schemas/DshCartItem"

    DshOperatorCartsResponse:
      type: object
      required: [carts]
      properties:
        carts:
          type: array
          items:
            $ref: "#/components/schemas/DshCart"

    CartServiceabilityRequest:
      type: object
      required: [storeId]
      properties:
        storeId: { type: string }
        serviceAreaCode: { type: string }

    CartServiceabilityResult:
      type: object
      required: [serviceable, code]
      properties:
        serviceable: { type: boolean }
        code:
          type: string
          enum: [serviceable, store_unavailable, out_of_area, catalog_unavailable]
        reason: { type: string }
        availableModes:
          type: array
          description: >-
            Per-mode availability for this store+location, derived from the
            store's enabled delivery modes and the same zone/distance check as
            `serviceable`/`code`. Never a static three-mode list.
          items:
            $ref: "#/components/schemas/FulfillmentModeAvailability"

    FulfillmentModeAvailability:
      type: object
      required: [mode, available]
      properties:
        mode:
          type: string
          enum: [bthwani_delivery, partner_delivery, pickup]
        available: { type: boolean }
        unavailableReasonCode:
          type: string
          enum: [mode_not_enabled, out_of_area, store_unavailable]

    # ─── Checkout Intent schemas ────────────────────────────────────

    DshCheckoutIntent:
      type: object
      required: [id, clientId, cartId, storeId, fulfillmentMode, state, paymentMethod, wltPaymentSessionId, deliveryAddress, note, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        clientId: { type: string }
        cartId: { type: string }
        storeId: { type: string }
        fulfillmentMode:
          type: string
          enum: [bthwani_delivery, partner_delivery, pickup]
        state:
          type: string
          enum: [pending, wlt_handoff_failed, payment_pending, payment_confirmed, payment_failed, confirmed, cancelled, expired]
        paymentMethod:
          type: string
          enum: [cod, wallet, mixed, official_wallet]
        wltPaymentSessionId:
          type: string
          description: "Opaque WLT-owned payment-session reference. DSH never mutates financial truth."
        deliveryAddress: { type: string }
        note: { type: string }
        version: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCreateCheckoutIntentRequest:
      type: object
      required: [cartId, storeId]
      properties:
        cartId: { type: string }
        storeId: { type: string }
        fulfillmentMode:
          type: string
          enum: [bthwani_delivery, partner_delivery, pickup]
        paymentMethod:
          type: string
          enum: [cod, wallet, mixed, official_wallet]
        deliveryAddress: { type: string }
        note: { type: string }

    DshCheckoutIntentResponse:
      type: object
      required: [intent]
      properties:
        intent:
          $ref: "#/components/schemas/DshCheckoutIntent"

    DshOperatorCheckoutIntentsResponse:
      type: object
      required: [intents]
      properties:
        intents:
          type: array
          items:
            $ref: "#/components/schemas/DshCheckoutIntent"

    # ─── Order schemas ──────────────────────────────────────────────
    DshOrderStatus:
      type: string
      enum: [pending, store_accepted, preparing, ready_for_pickup, driver_assigned, driver_arrived_store, picked_up, arrived_customer, delivered, cancelled]

    DshOrderItem:
      type: object
      required: [id, productId, productName, quantity, unitPrice]
      properties:
        id: { type: string }
        productId: { type: string }
        productName: { type: string }
        quantity: { type: integer, minimum: 1 }
        unitPrice: { type: number, format: double, minimum: 0 }

    DshOrder:
      type: object
      required: [id, checkoutIntentId, storeId, fulfillmentMode, clientId, status, wltPaymentRefId, createdAt, updatedAt]
      properties:
        id: { type: string }
        checkoutIntentId: { type: string }
        storeId: { type: string }
        fulfillmentMode:
          type: string
          enum: [bthwani_delivery, partner_delivery, pickup]
        clientId: { type: string }
        status: { $ref: "#/components/schemas/DshOrderStatus" }
        rejectionReason: { type: string }
        wltPaymentRefId:
          type: string
          description: "Opaque WLT payment reference. DSH never mutates financial truth."
        items:
          type: array
          items: { $ref: "#/components/schemas/DshOrderItem" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshOrderResponse:
      type: object
      required: [order]
      properties:
        order: { $ref: "#/components/schemas/DshOrder" }

    DshOrdersResponse:
      type: object
      required: [orders]
      properties:
        orders:
          type: array
          items: { $ref: "#/components/schemas/DshOrder" }

    DshCreateOrderRequest:
      type: object
      required: [checkoutIntentId]
      properties:
        checkoutIntentId: { type: string }

    DshRejectOrderRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          description: Mandatory rejection reason from partner.

    # ─── Dispatch schemas ───────────────────────────────────────────
    DshAssignmentStatus:
      type: string
      enum: [offered, accepted, declined, completed]

    DshDeliveryStatus:
      type: string
      enum: [assigned, driver_assigned, driver_arrived_store, picked_up, arrived_customer, delivered]

    DshDelivery:
      type: object
      required: [id, assignmentId, orderId, captainId, status, podMethod, podReference, note, createdAt, updatedAt]
      properties:
        id: { type: string }
        assignmentId: { type: string }
        orderId: { type: string }
        captainId: { type: string }
        status: { $ref: "#/components/schemas/DshDeliveryStatus" }
        podMethod: { type: string }
        podReference: { type: string }
        note: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshDispatchAssignment:
      type: object
      required: [id, orderId, specialRequestId, requestType, captainId, assignedBy, status, responseDeadlineAt, createdAt, updatedAt, delivery]
      properties:
        id: { type: string }
        orderId: { type: string }
        specialRequestId: { type: string }
        requestType: { type: string }
        captainId: { type: string }
        assignedBy: { type: string }
        status: { $ref: "#/components/schemas/DshAssignmentStatus" }
        responseDeadlineAt: { type: string, format: date-time }
        acceptedAt: { type: ["string", "null"], format: date-time }
        declinedAt: { type: ["string", "null"], format: date-time }
        completedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        # Only the captain's latest foreground location sample is retained —
        # no history — and it is purged (set back to null) once the
        # assignment reaches a terminal state (declined/completed).
        lastLatitude: { type: ["number", "null"] }
        lastLongitude: { type: ["number", "null"] }
        locationRecordedAt: { type: ["string", "null"], format: date-time }
        delivery: { $ref: "#/components/schemas/DshDelivery" }

    DshDispatchAssignmentResponse:
      type: object
      required: [assignment]
      properties:
        assignment: { $ref: "#/components/schemas/DshDispatchAssignment" }

    DshDispatchAssignmentsResponse:
      type: object
      required: [assignments]
      properties:
        assignments:
          type: array
          items: { $ref: "#/components/schemas/DshDispatchAssignment" }

    DshCreateAssignmentRequest:
      type: object
      required: [orderId, captainId]
      properties:
        orderId: { type: string }
        captainId: { type: string }

    DshDeclineAssignmentRequest:
      type: object
      properties:
        reason: { type: string }

    DshUpdateDeliveryStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [driver_arrived_store, picked_up, arrived_customer]

    DshSubmitPoDRequest:
      type: object
      required: [method, reference]
      properties:
        method:
          type: string
          enum: [photo, code, signature]
        reference:
          type: string
          minLength: 2
        note:
          type: string

    DshPushDispatchLocationRequest:
      type: object
      required: [latitude, longitude]
      description: >-
        Foreground-only location sample (register item 14 + 42 — no live
        tracking, no background location). Sent by the captain app roughly
        every 3 minutes while a delivery assignment is active.
      properties:
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
        recordedAt:
          type: string
          format: date-time

    # ── Field Readiness ──────────────────────────────────────────────

    DshVisitType:
      type: string
      enum: [onboarding, periodic, escalation_followup]

    DshVisitStatus:
      type: string
      enum: [in_progress, complete, escalated]

    DshCheckType:
      type: string
      enum: [location_verified, documents_uploaded, product_list_submitted, equipment_checked, safety_compliant, hygiene_compliant]

    DshCheckStatus:
      type: string
      enum: [pending, passed, failed]

    DshEscalationStatus:
      type: string
      enum: [open, acknowledged, resolved, escalated_further]

    DshEscalationSeverity:
      type: string
      enum: [low, medium, high, critical]

    DshEscalationCategory:
      type: string
      enum: [document_missing, safety_violation, location_mismatch, product_compliance, equipment_failure, other]

    DshFieldVisit:
      type: object
      required: [id, storeId, fieldAgentId, visitType, status, notes, startedAt, createdAt, updatedAt]
      properties:
        id: { type: string }
        storeId: { type: string }
        fieldAgentId: { type: string }
        visitType: { $ref: "#/components/schemas/DshVisitType" }
        status: { $ref: "#/components/schemas/DshVisitStatus" }
        notes: { type: string }
        startedAt: { type: string, format: date-time }
        completedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshFieldVisitResponse:
      type: object
      required: [visit]
      properties:
        visit: { $ref: "#/components/schemas/DshFieldVisit" }

    DshFieldVisitsResponse:
      type: object
      required: [visits]
      properties:
        visits:
          type: array
          items: { $ref: "#/components/schemas/DshFieldVisit" }

    DshCreateFieldVisitRequest:
      type: object
      properties:
        visitType: { $ref: "#/components/schemas/DshVisitType" }

    DshReadinessCheck:
      type: object
      required: [id, visitId, storeId, checkType, status, evidenceUrl, notes, verifiedBy, createdAt, updatedAt]
      properties:
        id: { type: string }
        visitId: { type: string }
        storeId: { type: string }
        checkType: { $ref: "#/components/schemas/DshCheckType" }
        status: { $ref: "#/components/schemas/DshCheckStatus" }
        evidenceUrl: { type: string }
        notes: { type: string }
        verifiedBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshReadinessCheckResponse:
      type: object
      required: [check]
      properties:
        check: { $ref: "#/components/schemas/DshReadinessCheck" }

    DshReadinessChecksResponse:
      type: object
      required: [checks]
      properties:
        checks:
          type: array
          items: { $ref: "#/components/schemas/DshReadinessCheck" }

    DshUpsertReadinessCheckRequest:
      type: object
      required: [checkType, status]
      properties:
        checkType: { $ref: "#/components/schemas/DshCheckType" }
        status: { $ref: "#/components/schemas/DshCheckStatus" }
        evidenceUrl: { type: string }
        notes: { type: string }

    DshReadinessEscalation:
      type: object
      required: [id, visitId, storeId, raisedBy, severity, category, description, status, resolutionNote, createdAt, updatedAt]
      properties:
        id: { type: string }
        visitId: { type: string }
        storeId: { type: string }
        raisedBy: { type: string }
        severity: { $ref: "#/components/schemas/DshEscalationSeverity" }
        category: { $ref: "#/components/schemas/DshEscalationCategory" }
        description: { type: string }
        status: { $ref: "#/components/schemas/DshEscalationStatus" }
        resolvedBy: { type: string }
        resolvedAt: { type: ["string", "null"], format: date-time }
        resolutionNote: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshEscalationResponse:
      type: object
      required: [escalation]
      properties:
        escalation: { $ref: "#/components/schemas/DshReadinessEscalation" }

    DshEscalationsResponse:
      type: object
      required: [escalations]
      properties:
        escalations:
          type: array
          items: { $ref: "#/components/schemas/DshReadinessEscalation" }

    DshFieldWorkQueueResponse:
      type: object
      required: [visits, escalations]
      properties:
        visits:
          type: array
          items: { $ref: "#/components/schemas/DshFieldVisit" }
        escalations:
          type: array
          items: { $ref: "#/components/schemas/DshReadinessEscalation" }

    DshCreateEscalationRequest:
      type: object
      required: [severity, category, description]
      properties:
        visitId: { type: string }
        severity: { $ref: "#/components/schemas/DshEscalationSeverity" }
        category: { $ref: "#/components/schemas/DshEscalationCategory" }
        description: { type: string, minLength: 10 }

    DshUpdateEscalationRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/DshEscalationStatus" }
        resolutionNote: { type: string }

    DshOnboardingStatusResponse:
      type: object
      required: [storeId, totalVisits, completedVisits, openEscalations, onboardingComplete, status]
      properties:
        storeId: { type: string }
        totalVisits: { type: integer }
        completedVisits: { type: integer }
        openEscalations: { type: integer }
        onboardingComplete: { type: boolean }
        status:
          type: string
          enum: [pending, complete, escalation_required]

    # ── Support ──────────────────────────────────────────────────────

    DshTicketStatus:
      type: string
      enum: [open, in_review, pending_user, resolved, closed]

    DshTicketPriority:
      type: string
      enum: [low, normal, high, urgent]

    DshTicketCategory:
      type: string
      enum: [order_issue, delivery_issue, store_quality, payment_reference, account_access, app_bug, other]

    DshSenderRole:
      type: string
      enum: [client, partner, captain, operator, system]

    DshIncidentStatus:
      type: string
      enum: [open, monitoring, resolved]

    DshIncidentSeverity:
      type: string
      enum: [low, medium, high, critical]

    DshIncidentScope:
      type: string
      enum: [delivery, stores, payments, platform, unknown]

    DshSupportTicket:
      type: object
      required: [id, storeId, reporterId, reporterRole, subject, description, category, priority, status, assignedTo, orderId, createdAt, updatedAt]
      properties:
        id: { type: string }
        storeId: { type: string }
        reporterId: { type: string }
        reporterRole: { type: string }
        subject: { type: string }
        description: { type: string }
        category: { $ref: "#/components/schemas/DshTicketCategory" }
        priority: { $ref: "#/components/schemas/DshTicketPriority" }
        status: { $ref: "#/components/schemas/DshTicketStatus" }
        assignedTo: { type: string }
        orderId: { type: string }
        resolvedAt: { type: ["string", "null"], format: date-time }
        closedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshTicketResponse:
      type: object
      required: [ticket]
      properties:
        ticket: { $ref: "#/components/schemas/DshSupportTicket" }

    DshTicketsResponse:
      type: object
      required: [tickets]
      properties:
        tickets:
          type: array
          items: { $ref: "#/components/schemas/DshSupportTicket" }

    DshCreateTicketRequest:
      type: object
      required: [subject, description, category]
      properties:
        subject: { type: string, minLength: 3 }
        description: { type: string, minLength: 10 }
        category: { $ref: "#/components/schemas/DshTicketCategory" }
        priority: { $ref: "#/components/schemas/DshTicketPriority" }
        storeId: { type: string }
        orderId: { type: string }

    DshUpdateTicketRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/DshTicketStatus" }
        assignedTo: { type: string }

    DshSupportMessage:
      type: object
      required: [id, ticketId, senderId, senderRole, body, isInternal, createdAt]
      properties:
        id: { type: string }
        ticketId: { type: string }
        senderId: { type: string }
        senderRole: { $ref: "#/components/schemas/DshSenderRole" }
        body: { type: string }
        isInternal: { type: boolean }
        createdAt: { type: string, format: date-time }

    DshMessageResponse:
      type: object
      required: [message]
      properties:
        message: { $ref: "#/components/schemas/DshSupportMessage" }

    DshMessagesResponse:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items: { $ref: "#/components/schemas/DshSupportMessage" }

    DshAddMessageRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 2 }
        isInternal: { type: boolean }

    DshIncident:
      type: object
      required: [id, title, description, severity, status, affectedScope, raisedBy, postmortemUrl, createdAt, updatedAt]
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        severity: { $ref: "#/components/schemas/DshIncidentSeverity" }
        status: { $ref: "#/components/schemas/DshIncidentStatus" }
        affectedScope: { $ref: "#/components/schemas/DshIncidentScope" }
        raisedBy: { type: string }
        resolvedBy: { type: string }
        resolvedAt: { type: ["string", "null"], format: date-time }
        postmortemUrl: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshIncidentResponse:
      type: object
      required: [incident]
      properties:
        incident: { $ref: "#/components/schemas/DshIncident" }

    DshIncidentsResponse:
      type: object
      required: [incidents]
      properties:
        incidents:
          type: array
          items: { $ref: "#/components/schemas/DshIncident" }

    DshCreateIncidentRequest:
      type: object
      required: [title, description, severity]
      properties:
        title: { type: string, minLength: 3 }
        description: { type: string }
        severity: { $ref: "#/components/schemas/DshIncidentSeverity" }
        affectedScope: { $ref: "#/components/schemas/DshIncidentScope" }

    DshUpdateIncidentRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/DshIncidentStatus" }
        postmortemUrl: { type: string }

    # ── Analytics Schemas ─────────────────────────────────────────
    DshPlatformKpisResponse:
      type: object
      required: [totalOrders, deliveredOrders, cancelledOrders, activeStores, openTickets, fieldVisitsCompleted, openEscalations, openIncidents, period, generatedAt]
      properties:
        totalOrders: { type: integer }
        deliveredOrders: { type: integer }
        cancelledOrders: { type: integer }
        activeStores: { type: integer }
