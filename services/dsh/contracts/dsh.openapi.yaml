      summary: Operator lists all support tickets with optional status filter.
      tags: [DshSupport]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, in_review, pending_user, resolved, closed]
      responses:
        "200":
          description: List of tickets.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshTicketsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/operator/support/tickets/{ticketId}:
    patch:
      operationId: updateDshOperatorTicket
      summary: Operator updates ticket status or assignee.
      tags: [DshSupport]
      security:
        - bearerAuth: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshUpdateTicketRequest" }
      responses:
        "200":
          description: Ticket updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshTicketResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dsh/operator/incidents:
    post:
      operationId: createDshIncident
      summary: Operator raises a new operational incident.
      tags: [DshSupport]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCreateIncidentRequest" }
      responses:
        "201":
          description: Incident created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshIncidentResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    get:
      operationId: listDshIncidents
      summary: Operator lists incidents with optional status filter.
      tags: [DshSupport]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, monitoring, resolved]
      responses:
        "200":
          description: List of incidents.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshIncidentsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/operator/incidents/{incidentId}:
    patch:
      operationId: updateDshIncident
      summary: Operator resolves or sets an incident to monitoring.
      tags: [DshSupport]
      security:
        - bearerAuth: []
      parameters:
        - name: incidentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshUpdateIncidentRequest" }
      responses:
        "200":
          description: Incident updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshIncidentResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── DSH-010: Platform Analytics & Operational Reporting ────────────────────
  /dsh/operator/analytics/platform:
    get:
      operationId: getDshPlatformKpis
      summary: Platform-wide operational KPIs for the operator dashboard.
      tags: [DshAnalytics]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Platform KPIs snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshPlatformKpisResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/operator/analytics/orders:
    get:
      operationId: getDshOrderAnalytics
      summary: Order volume and fulfillment analytics for a given period.
      tags: [DshAnalytics]
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [today, week, month], default: today }
      responses:
        "200":
          description: Order analytics breakdown.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderAnalyticsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/operator/analytics/delivery:
    get:
      operationId: getDshDeliveryAnalytics
      summary: Delivery assignment and completion analytics.
      tags: [DshAnalytics]
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [today, week, month], default: today }
      responses:
        "200":
          description: Delivery analytics breakdown.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDeliveryAnalyticsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/operator/analytics/support:
    get:
      operationId: getDshSupportAnalytics
      summary: Support ticket volume and resolution analytics.
      tags: [DshAnalytics]
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [today, week, month], default: today }
      responses:
        "200":
          description: Support analytics breakdown.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshSupportAnalyticsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/operator/analytics/stores:
    get:
      operationId: getDshStoreAnalytics
      summary: Store activity and readiness analytics.
      tags: [DshAnalytics]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Store analytics snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshStoreAnalyticsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/partner/analytics/performance:
    get:
      operationId: getDshPartnerPerformance
      summary: Authenticated partner's own store performance summary.
      tags: [DshAnalytics]
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [today, week, month], default: today }
      responses:
        "200":
          description: Partner performance metrics for their own store.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshPartnerPerformanceResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/integrations/wlt/payment-callbacks:
    post:
      operationId: acceptWltPaymentCallbackEnvelope
      summary: Future WLT-owned callback envelope; DSH consumes opaque final references only.
      tags: [DshCheckout]
      x-contract-state: CONTRACT_DRAFT
      x-bthwani-client-generation: DISABLED
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WltPaymentCallbackEnvelope" }
      responses:
        "501": { description: Contract-only; signature and payment truth remain WLT-owned. }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    HomeContentKind:
      name: kind
      in: path
      required: true
      schema:
        type: string
        enum: [banners, promos, categories]
    StoreId:
      name: storeId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 200
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 200
  responses:
    InvalidRequest:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    Unauthenticated:
      description: Bearer session is missing, invalid, or expired.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    Forbidden:
      description: Actor role cannot perform this function.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    NotFound:
      description: Scoped store context was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    Conflict:
      description: Version or idempotency conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
    ServiceUnavailable:
      description: Identity or DSH dependency is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DshErrorResponse"
  schemas:
    DshStoreStatus:
      type: string
      enum:
        - active
        - inactive
        - temporarily_closed
        - unavailable

    DshStoreServiceabilityStatus:
      type: string
      enum:
        - serviceable
        - limited
        - out_of_area
        - unavailable

    DshStoreServiceabilitySummary:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/DshStoreServiceabilityStatus"

    DshStoreSummary:
      type: object
      required:
        - id
        - slug
        - displayName
        - status
        - cityCode
        - serviceAreaCode
        - serviceability
        - isVisible
        - category
        - categoryLabel
        - deliveryModes
        - isFreeDelivery
        - followerCount
        - hasProBadge
        - hasCouponBadge
        - isPopular
        - partnerReadiness
        - catalogApprovalStatus
        - marketingVisibility
        - publicationEligible
      properties:
        id:
          type: string
        slug:
          type: string
        displayName:
          type: string
        status:
          $ref: "#/components/schemas/DshStoreStatus"
        cityCode:
          type: string
        serviceAreaCode:
          type: string
        serviceability:
          $ref: "#/components/schemas/DshStoreServiceabilitySummary"
        ratingAverage:
          type: ["number", "null"]
          format: float
        ratingCount:
          type: integer
        deliveryEtaMin:
          type: ["integer", "null"]
        deliveryEtaMax:
          type: ["integer", "null"]
        isVisible:
          type: boolean
        heroImageUrl:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        category:
          $ref: "#/components/schemas/DshStoreCategory"
        categoryLabel:
          type: string
          description: Human-readable category label resolved from dsh_categories
        deliveryModes:
          type: array
          items:
            $ref: "#/components/schemas/DshStoreDeliveryMode"
        isFreeDelivery:
          type: boolean
        distanceKm:
          type: ["number", "null"]
          format: float
        followerCount:
          type: integer
          minimum: 0
        hasProBadge:
          type: boolean
        hasCouponBadge:
          type: boolean
        pointsMultiplier:
          type: ["integer", "null"]
          minimum: 1
        isPopular:
          type: boolean
        partnerReadiness:
          type: string
          enum: [pending, ready, blocked]
        catalogApprovalStatus:
          type: string
          enum: [draft, submitted, approved, rejected]
        marketingVisibility:
          type: string
          enum: [hidden, visible]
        publicationEligible:
          type: boolean

    DshStoreCategory:
      type: string
      enum:
        - restaurant
        - grocery
        - pharmacy
        - bakery
        - default

    DshStoreDeliveryMode:
      type: string
      enum:
        - delivery
        - pickup
        - express

    DshStoreDetail:
      allOf:
        - $ref: "#/components/schemas/DshStoreSummary"
        - type: object
          required:
            - createdAt
            - updatedAt
            - version
          properties:
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            version:
              type: integer
              minimum: 1

    DshPagination:
      type: object
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer

    DshStoreListResponse:
      type: object
      required:
        - stores
        - pagination
      properties:
        stores:
          type: array
          items:
            $ref: "#/components/schemas/DshStoreSummary"
        pagination:
          $ref: "#/components/schemas/DshPagination"

    DshStoreDetailResponse:
      type: object
      required:
        - store
      properties:
        store:
          $ref: "#/components/schemas/DshStoreDetail"

    DshErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string

    DshStoreContextResponse:
      type: object
      required: [actorRole, scope, store]
      properties:
        actorRole:
          type: string
          enum: [partner, field, captain, operator]
        scope:
          type: string
          enum: [own, assigned, all]
        store:
          $ref: "#/components/schemas/DshStoreDetail"
        latestAction:
          oneOf:
            - $ref: "#/components/schemas/DshStoreAuditEvent"
            - type: "null"

    PartnerStoreSettingsRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, status, deliveryModes, reason]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
        status:
          $ref: "#/components/schemas/DshStoreStatus"
        deliveryModes:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/DshStoreDeliveryMode"
        reason:
          type: string
          minLength: 3
          maxLength: 500

    FieldStoreVerificationRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, outcome, evidenceStatus, notes]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
        outcome:
          type: string
          enum: [verified, needs_follow_up, rejected]
        evidenceStatus:
          type: string
          enum: [complete, partial, missing]
        notes:
          type: string
          minLength: 3
          maxLength: 1000

    CaptainPickupReadinessRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, readiness, reason]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
        readiness:
          type: string
          enum: [ready, blocked]
        reason:
          type: string
          minLength: 3
          maxLength: 500

    OperatorStoreGovernanceRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, action, value, reason]
      properties:
        expectedVersion:
          type: integer
          minimum: 1
        action:
          type: string
          enum: [lifecycle, visibility, serviceability, partner-readiness, catalog-approval, marketing-visibility]
        value:
          type: string
          minLength: 1
        reason:
          type: string
          minLength: 3
          maxLength: 500

    DshStoreActionResponse:
      type: object
      required: [store, audit, replayed]
      properties:
        store:
          $ref: "#/components/schemas/DshStoreDetail"
        audit:
          $ref: "#/components/schemas/DshStoreAuditEvent"
        replayed:
          type: boolean

    DshStoreAuditEvent:
      type: object
      required:
        [id, actorId, actorRole, storeId, action, fromState, toState, correlationId, createdAt]
      properties:
        id:
          type: string
        actorId:
          type: string
        actorRole:
          type: string
        storeId:
          type: string
        action:
          type: string
        fromState:
          type: object
          additionalProperties: true
        toState:
          type: object
          additionalProperties: true
        reason:
          type: string
        correlationId:
          type: string
        createdAt:
          type: string
          format: date-time

    DshStoreAuditResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/DshStoreAuditEvent"

    DshCatalogCategory:
      type: object
      required: [id, storeId, name, description, sortOrder, isActive, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        storeId: { type: string }
        name: { type: string }
        description: { type: string }
        sortOrder: { type: integer }
        isActive: { type: boolean }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCatalogMedia:
      type: object
      required: [id, storeId, objectKey, contentType, state, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        storeId: { type: string }
        productId: { type: ["string", "null"] }
        objectKey: { type: string }
        contentType: { type: string }
        state: { type: string, enum: [pending, complete, deleted] }
        publicUrl: { type: ["string", "null"] }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCatalogProduct:
      type: object
      required: [id, storeId, name, description, sku, priceReference, isActive, version, media, createdAt, updatedAt]
      properties:
        id: { type: string }
        storeId: { type: string }
        categoryId: { type: ["string", "null"] }
        name: { type: string }
        description: { type: string }
        sku: { type: string }
        priceReference:
          type: string
          description: Opaque WLT-owned price reference; DSH does not calculate monetary truth.
        isActive: { type: boolean }
        version: { type: integer, minimum: 1 }
        media:
          type: array
          items: { $ref: "#/components/schemas/DshCatalogMedia" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCatalogResponse:
      type: object
      required: [categories, products]
      properties:
        storeId: { type: string }
        categories:
          type: array
          items: { $ref: "#/components/schemas/DshCatalogCategory" }
        products:
          type: array
          items: { $ref: "#/components/schemas/DshCatalogProduct" }

    DshCatalogCategoryInput:
      type: object
      additionalProperties: false
      required: [name, description, sortOrder, isActive, expectedVersion]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        sortOrder: { type: integer }
        isActive: { type: boolean }
        expectedVersion: { type: integer, minimum: 0 }

    DshCatalogProductInput:
      type: object
      additionalProperties: false
      required: [name, description, sku, priceReference, isActive, expectedVersion]
      properties:
        categoryId: { type: ["string", "null"] }
        name: { type: string, minLength: 1 }
        description: { type: string }
        sku: { type: string, minLength: 1 }
        priceReference: { type: string, minLength: 1 }
        isActive: { type: boolean }
        expectedVersion: { type: integer, minimum: 0 }

    DshMediaUploadIntentInput:
      type: object
      additionalProperties: false
      required: [fileName, contentType]
      properties:
        productId: { type: ["string", "null"] }
        fileName: { type: string, minLength: 1 }
        contentType: { type: string, pattern: "^image/" }

    DshMediaCompleteInput:
      type: object
      additionalProperties: false
      required: [publicUrl, expectedVersion]
      properties:
        publicUrl: { type: string, format: uri }
        expectedVersion: { type: integer, minimum: 1 }

    DshCatalogDecisionInput:
      type: object
      additionalProperties: false
      required: [decision, reason, expectedVersion]
      properties:
        decision: { type: string, enum: [approved, rejected] }
        reason: { type: string, minLength: 3 }
        expectedVersion: { type: integer, minimum: 1 }

    DshHealthResponse:
      type: object
      required:
        - service
        - status
        - checkedAt
      properties:
        service:
          type: string
          const: dsh
        status:
          type: string
          enum:
            - healthy
        checkedAt:
          type: string
          format: date-time

    DshReadinessResponse:
      type: object
      required:
        - service
        - status
        - dependencies
        - checkedAt
      properties:
        service:
          type: string
          const: dsh
        status:
          type: string
          enum:
            - ready
            - not_ready
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum:
              - ready
              - degraded
              - down
              - not_configured
        checkedAt:
          type: string
          format: date-time

    DshHomeBanner:
      type: object
      required:
        - id
        - title
        - imageUrl
        - actionType
        - actionTarget
      properties:
        id:
          type: string
        title:
          type: string
        subtitle:
          type: string
        imageUrl:
          type: string
        actionType:
          type: string
          enum:
            - store
            - category
            - external
            - none
        actionTarget:
          type: string

    DshHomePromo:
      type: object
      required:
        - id
        - title
        - imageUrl
      properties:
        id:
          type: string
        title:
          type: string
        subtitle:
          type: string
        badgeLabel:
          type: string
        imageUrl:
          type: string
        actionType:
          type: string
          enum:
            - store
            - category
            - external
            - none
        actionTarget:
          type: string

    DshHomeFilter:
      type: object
      required:
        - id
        - label
        - kind
      properties:
        id:
          type: string
        label:
          type: string
        kind:
          type: string
          enum:
            - all
            - favorites
            - nearest
            - new
            - offers
        isActive:
          type: boolean
          default: false

    DshHomeCategory:
      type: object
      required:
        - id
        - label
        - sortOrder
      properties:
        id:
          type: string
        label:
          type: string
        iconUrl:
          type: string
        sortOrder:
          type: integer

    DshHomeAdminContentItem:
      type: object
      required: [id, kind, title, actionType, actionTarget, sortOrder, isActive]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [banners, promos, categories]
        title:
          type: string
        subtitle:
          type: string
        badgeLabel:
          type: string
        imageUrl:
          type: string
        actionType:
          type: string
          enum: [store, category, external, none]
        actionTarget:
          type: string
        sortOrder:
          type: integer
          minimum: 0
        isActive:
          type: boolean

    DshHomeAdminContentInput:
      type: object
      required: [title, subtitle, badgeLabel, imageUrl, actionType, actionTarget, sortOrder, isActive]
      properties:
        title:
          type: string
          minLength: 2
        subtitle:
          type: string
        badgeLabel:
          type: string
        imageUrl:
          type: string
        actionType:
          type: string
          enum: [store, category, external, none]
        actionTarget:
          type: string
        sortOrder:
          type: integer
          minimum: 0
        isActive:
          type: boolean

    DshHomeAdminListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DshHomeAdminContentItem"

    DshHomeAdminItemResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: "#/components/schemas/DshHomeAdminContentItem"

    DshHomeDiscoveryResponse:
      type: object
      required:
        - banners
        - promos
        - filters
        - categories
        - stores
        - pagination
        - generatedAt
      properties:
        banners:
          type: array
          items:
            $ref: "#/components/schemas/DshHomeBanner"
        promos:
          type: array
          items:
            $ref: "#/components/schemas/DshHomePromo"
        filters:
          type: array
          items:
            $ref: "#/components/schemas/DshHomeFilter"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/DshHomeCategory"
        stores:
          type: array
          items:
            $ref: "#/components/schemas/DshStoreSummary"
        pagination:
          $ref: "#/components/schemas/DshPagination"
        generatedAt:
          type: string
          format: date-time

    # ─── DSH-004: Cart schemas ────────────────────────────────────────────────

    DshCartItem:
      type: object
      required: [id, cartId, productId, productName, priceReference, quantity, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        cartId: { type: string }
        productId: { type: string }
        productName: { type: string }
        priceReference: { type: string, description: "Display label from catalog — not a computed financial amount." }
        quantity: { type: integer, minimum: 1 }
        version: { type: integer }
        createdAt: { type: string, format: date-time }
