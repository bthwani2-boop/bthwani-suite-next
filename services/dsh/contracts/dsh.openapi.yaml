      properties:
        cartId: { type: string }
        storeId: { type: string }
        fulfillmentMode:
          type: string
          enum: [bthwani_delivery, partner_delivery, pickup]
        paymentMethod:
          type: string
          enum: [cod, wallet, mixed, official_wallet]
        deliveryAddress: { type: string }
