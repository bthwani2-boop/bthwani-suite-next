        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCreateEscalationRequest" }
      responses:
        "201":
          description: Escalation created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshEscalationResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/operator/field-readiness/escalations:
    get:
      operationId: listDshOperatorEscalations
