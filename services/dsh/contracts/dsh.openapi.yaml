          application/json:
            schema: { $ref: "#/components/schemas/DshCreateAssignmentRequest" }
      responses:
        "201":
          description: Assignment created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/captain/dispatch/assignments:
    get:
      operationId: listDshCaptainAssignments
      summary: Captain lists only their own dispatch assignments.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Captain assignments.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/captain/dispatch/assignments/{assignmentId}/accept:
    post:
      operationId: acceptDshAssignment
      summary: Captain accepts an offered assignment.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Assignment accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/captain/dispatch/assignments/{assignmentId}/decline:
    post:
      operationId: declineDshAssignment
      summary: Captain declines an offered assignment and returns the order to ready-for-pickup.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshDeclineAssignmentRequest" }
      responses:
        "200":
          description: Assignment declined.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/captain/dispatch/assignments/{assignmentId}/status:
    post:
      operationId: updateDshDeliveryStatus
      summary: Captain advances assigned delivery lifecycle status.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshUpdateDeliveryStatusRequest" }
      responses:
        "200":
          description: Delivery status updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/captain/dispatch/assignments/{assignmentId}/pod:
    post:
      operationId: submitDshPoD
      summary: Captain submits proof of delivery and closes the DSH delivery lifecycle.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshSubmitPoDRequest" }
      responses:
        "200":
          description: Proof of delivery submitted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
