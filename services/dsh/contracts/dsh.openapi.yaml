openapi: 3.1.0
info:
  title: BThwani DSH Service API
  version: 0.5.0
  description: >
    Delivery and shopping hub service contract. DSH-001 store discovery and governance
    (RUNTIME_VERIFIED). DSH-002 home discovery (RUNTIME_VERIFIED). DSH-003 catalog
    management (RUNTIME_VERIFIED). DSH-004 cart and serviceability (RUNTIME_VERIFIED).
    DSH-005 checkout intent and WLT handoff, DSH-006 order fulfillment, DSH-007
    dispatch and captain delivery — backend handlers registered, frontend surface UI
    not yet approved (NOT_APPROVED_YET). DSH-008 field verification and store quality
    assurance (RUNTIME_VERIFIED). DSH-009 support incidents and escalation room
    (RUNTIME_VERIFIED). DSH-010 platform analytics and operational reporting —
    backend implementation NOT_APPROVED_YET, handlers inactive.
    WLT handoff uses reference fields only; no financial mutation inside DSH.

x-bthwani-owner: services/dsh
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: ENABLED
x-bthwani-runtime-dependency: true

paths:
  /dsh/health:
    get:
      operationId: getDshHealth
      summary: Return DSH liveness state.
      tags:
        - DshSystem
      responses:
        "200":
          description: DSH process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHealthResponse"

  /dsh/readiness:
    get:
      operationId: getDshReadiness
      summary: Return DSH readiness state.
      tags:
        - DshSystem
      responses:
        "200":
          description: DSH dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshReadinessResponse"
        "503":
          description: DSH is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshReadinessResponse"

  /dsh/stores:
    get:
      operationId: listDshStores
      summary: List discoverable stores.
      tags:
        - DshStoreDiscovery
      parameters:
        - name: cityCode
          in: query
          required: false
          schema:
            type: string
          description: Filter by city code.
        - name: serviceAreaCode
          in: query
          required: false
          schema:
            type: string
          description: Filter by service area code.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DshStoreStatus"
          description: Filter by store status.
        - name: isVisible
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by visibility flag.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of stores.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreListResponse"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"

  /dsh/home-discovery:
    get:
      operationId: getDshHomeDiscovery
      summary: Return home discovery payload for the client home screen.
      tags:
        - DshHomeDiscovery
      parameters:
        - name: cityCode
          in: query
          required: false
          schema:
            type: string
          description: Filter by city code.
        - name: serviceAreaCode
          in: query
          required: false
          schema:
            type: string
          description: Filter by service area code.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Maximum number of stores to return.
      responses:
        "200":
          description: Home discovery payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeDiscoveryResponse"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"
        "503":
          description: Service unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"

  /dsh/operator/home-discovery/{kind}:
    parameters:
      - $ref: "#/components/parameters/HomeContentKind"
    get:
      operationId: listOperatorHomeDiscoveryContent
      summary: List all home discovery content including inactive items.
      tags: [DshHomeDiscovery]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Administrative home discovery content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeAdminListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createOperatorHomeDiscoveryContent
      summary: Create a banner, promotion, or category.
      tags: [DshHomeDiscovery]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshHomeAdminContentInput"
      responses:
        "201":
          description: Content created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeAdminItemResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dsh/operator/home-discovery/{kind}/{itemId}:
    parameters:
      - $ref: "#/components/parameters/HomeContentKind"
      - name: itemId
        in: path
        required: true
        schema:
          type: string
    patch:
      operationId: updateOperatorHomeDiscoveryContent
      summary: Update a home discovery content item.
      tags: [DshHomeDiscovery]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshHomeAdminContentInput"
      responses:
        "200":
          description: Content updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeAdminItemResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteOperatorHomeDiscoveryContent
      summary: Delete a home discovery content item.
      tags: [DshHomeDiscovery]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "204":
          description: Content deleted.
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /dsh/stores/{storeId}:
    get:
      operationId: getDshStore
      summary: Get a single store by ID.
      tags:
        - DshStoreDiscovery
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
          description: Store identifier.
      responses:
        "200":
          description: Store detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreDetailResponse"
        "400":
          description: Invalid store ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"
        "404":
          description: Store not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"

  /dsh/store-context:
    get:
      operationId: getDshStoreContext
      summary: Resolve the authenticated actor's own or assigned store context.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Scoped store context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreContextResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /dsh/operator/stores:
    get:
      operationId: listOperatorDshStores
      summary: List all stores for an authenticated operator.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All stores including hidden and suspended stores.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dsh/operator/stores/{storeId}:
    get:
      operationId: getOperatorDshStore
      summary: Get unrestricted store detail for an authenticated operator.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          description: Operator store detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /dsh/partner/stores/{storeId}/settings:
    patch:
      operationId: updatePartnerStoreSettings
      summary: Update bounded operating settings for the authenticated partner's own store.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerStoreSettingsRequest"
      responses:
        "200":
          description: Store settings updated or idempotently replayed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreActionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /dsh/field/stores/{storeId}/verifications:
    post:
      operationId: submitFieldStoreVerification
      summary: Submit a verification outcome for the authenticated field actor's assigned store.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldStoreVerificationRequest"
      responses:
        "200":
          description: Verification recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreActionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /dsh/captain/stores/{storeId}/pickup-readiness:
    post:
      operationId: reportCaptainPickupReadiness
      summary: Report readiness for the authenticated captain's assigned pickup point.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptainPickupReadinessRequest"
      responses:
        "200":
          description: Pickup readiness report recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreActionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /dsh/operator/stores/{storeId}/governance:
    post:
      operationId: governDshStore
      summary: Apply an authenticated and audited lifecycle, visibility, or serviceability action.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorStoreGovernanceRequest"
      responses:
        "200":
          description: Governance action applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreActionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /dsh/operator/stores/{storeId}/audit:
    get:
      operationId: listDshStoreAudit
      summary: List the latest audited store actions for an operator.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          description: Store audit timeline.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreAuditResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dsh/stores/{storeId}/catalog:
    get:
      operationId: getPublishedDshCatalog
      summary: Return the approved, active catalog for a publicly eligible store.
      tags: [DshCatalog]
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          description: Published categories and products.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshCatalogResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /dsh/partner/catalog:
    get:
      operationId: getPartnerDshCatalog
      summary: Return the authenticated partner's complete catalog.
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Partner catalog including draft and inactive items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshCatalogResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dsh/partner/catalog/categories:
    post:
      operationId: createPartnerCatalogCategory
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/CorrelationId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCatalogCategoryInput" }
      responses:
        "201":
          description: Category created.
          content:
            application/json:
              schema:
                type: object
                required: [category]
                properties:
                  category: { $ref: "#/components/schemas/DshCatalogCategory" }

  /dsh/partner/catalog/categories/{categoryId}:
    parameters:
      - name: categoryId
        in: path
        required: true
        schema: { type: string }
      - $ref: "#/components/parameters/CorrelationId"
    patch:
      operationId: updatePartnerCatalogCategory
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCatalogCategoryInput" }
      responses:
        "200": { description: Category updated. }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      operationId: deletePartnerCatalogCategory
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: expectedVersion
          in: query
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "204": { description: Category deleted. }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/catalog/products:
    post:
      operationId: createPartnerCatalogProduct
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/CorrelationId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCatalogProductInput" }
      responses:
        "201":
          description: Product created.

  /dsh/partner/catalog/products/{productId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema: { type: string }
      - $ref: "#/components/parameters/CorrelationId"
    patch:
      operationId: updatePartnerCatalogProduct
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCatalogProductInput" }
      responses:
        "200": { description: Product updated. }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      operationId: deletePartnerCatalogProduct
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: expectedVersion
          in: query
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "204": { description: Product deleted. }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/catalog/media/upload-intents:
    post:
      operationId: createPartnerCatalogMediaUploadIntent
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/CorrelationId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshMediaUploadIntentInput" }
      responses:
        "201":
          description: Object-storage upload intent created.

  /dsh/partner/catalog/media/{mediaId}/complete:
    patch:
      operationId: completePartnerCatalogMedia
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshMediaCompleteInput" }
      responses:
        "200": { description: Media reference completed. }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/catalog/media/{mediaId}:
    delete:
      operationId: deletePartnerCatalogMedia
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string }
        - name: expectedVersion
          in: query
          required: true
          schema: { type: integer, minimum: 1 }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "204": { description: Media reference deleted. }

  /dsh/partner/catalog/submit:
    post:
      operationId: submitPartnerCatalog
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/CorrelationId" }]
      responses:
        "201": { description: Catalog submitted for operator review. }

  /dsh/operator/catalog/submissions:
    get:
      operationId: listOperatorCatalogSubmissions
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Catalog submission queue. }

  /dsh/operator/catalog/{storeId}/decision:
    post:
      operationId: decideOperatorCatalogSubmission
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCatalogDecisionInput" }
      responses:
        "200": { description: Submission approved or rejected. }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/operator/catalog/{storeId}/audit:
    get:
      operationId: listOperatorCatalogAudit
      tags: [DshCatalog]
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/StoreId" }]
      responses:
        "200": { description: Catalog audit timeline. }

  # ─── DSH-004: Cart & Serviceability Quote ────────────────────────────────
  # Runtime handlers registered in server.go. Client must be authenticated.
  # Financial amounts are NEVER computed by DSH — priceReference is a label
  # from the catalog. All wallet/payment truth is WLT-owned.
  # ──────────────────────────────────────────────────────────────────────────

  /dsh/client/cart:
    get:
      operationId: getDshClientCart
      summary: Get the active cart for the authenticated client at a given store.
      tags: [DshCart]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: storeId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Active cart or null if no active cart for this store.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshCartResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    delete:
      operationId: clearDshClientCart
      summary: Remove all items from the active cart (cart itself is kept).
      tags: [DshCart]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: cartId
          in: query
          schema: { type: string }
        - name: storeId
          in: query
          schema: { type: string }
      responses:
        "204": { description: Cart cleared. }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/client/cart/items:
    post:
      operationId: upsertDshCartItem
      summary: Add or update an item in the client cart. Creates cart if not exists.
      tags: [DshCart]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshUpsertCartItemRequest" }
      responses:
        "200":
          description: Cart item upserted. Returns cartId and updated item.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshUpsertCartItemResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/client/cart/items/{itemId}:
    delete:
      operationId: removeDshCartItem
      summary: Remove a specific item from the client cart.
      tags: [DshCart]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string }
        - name: cartId
          in: query
          required: true
          schema: { type: string }
      responses:
        "204": { description: Item removed. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dsh/client/cart/serviceability:
    post:
      operationId: checkDshCartServiceability
      summary: Check whether the store can be served in the client's zone. No financial computation.
      tags: [DshCart]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CartServiceabilityRequest" }
      responses:
        "200":
          description: Operational serviceability decision.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CartServiceabilityResult" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/operator/carts:
    get:
      operationId: listOperatorCarts
      summary: List carts for operator monitoring. No financial mutation.
      tags: [DshCart]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: state
          in: query
          schema:
            type: string
            enum: [active, checked_out, abandoned]
      responses:
        "200":
          description: Cart list for operator review.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOperatorCartsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ─── DSH-005: Checkout Intent & WLT Handoff ──────────────────────────────
  # Implemented. DSH creates intent records only; payment truth is WLT-owned.
  # wltPaymentSessionId is an opaque WLT-owned payment-session reference.
  # ──────────────────────────────────────────────────────────────────────────

  /dsh/client/checkout-intents:
    post:
      operationId: createDshCheckoutIntent
      summary: Create a checkout intent from an active cart. DSH never executes payment.
      tags: [DshCheckout]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCreateCheckoutIntentRequest" }
      responses:
        "201":
          description: Checkout intent created with opaque WLT payment-session reference.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshCheckoutIntentResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "503": { description: WLT payment-session handoff is unavailable. }

  /dsh/client/checkout-intents/{intentId}:
    get:
      operationId: getDshCheckoutIntent
      summary: Get a checkout intent by ID (client-scoped).
      tags: [DshCheckout]
      security:
        - bearerAuth: []
      parameters:
        - name: intentId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Checkout intent.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshCheckoutIntentResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dsh/client/checkout-intents/{intentId}/cancel:
    post:
      operationId: cancelDshCheckoutIntent
      summary: Cancel a checkout intent. Never triggers refund — financial finalization is WLT-owned.
      tags: [DshCheckout]
      security:
        - bearerAuth: []
      parameters:
        - name: intentId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Intent cancelled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshCheckoutIntentResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { description: Intent already closed or not found. }

  /dsh/operator/checkout-intents:
    get:
      operationId: listOperatorCheckoutIntents
      summary: List checkout intents for operator monitoring. No financial mutation.
      tags: [DshCheckout]
      security:
        - bearerAuth: []
      parameters:
        - name: state
          in: query
          schema:
            type: string
            enum: [pending, payment_pending, confirmed, cancelled, expired]
      responses:
        "200":
          description: List of checkout intents.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOperatorCheckoutIntentsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  # ─── DSH-006: Order Fulfillment & Partner Acceptance ────────────────────────
  /dsh/client/orders:
    post:
      operationId: createDshOrder
      summary: Create an order from a confirmed checkout intent (client).
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCreateOrderRequest" }
      responses:
        "201":
          description: Order created in pending state, awaiting partner acceptance.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    get:
      operationId: listDshClientOrders
      summary: List the authenticated client's orders.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Paginated list of client orders.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrdersResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/client/orders/{orderId}:
    get:
      operationId: getDshClientOrder
      summary: Get a single order by ID (client-scoped).
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order detail with items.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dsh/partner/orders:
    get:
      operationId: listDshPartnerOrders
      summary: List orders for a partner's store. Default status filter is pending.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: storeId
          in: query
          required: true
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, store_accepted, preparing, ready_for_pickup, cancelled]
      responses:
        "200":
          description: List of partner orders.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrdersResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/partner/orders/{orderId}/accept:
    post:
      operationId: acceptDshOrder
      summary: Partner accepts a pending order. Transitions pending → store_accepted.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/orders/{orderId}/reject:
    post:
      operationId: rejectDshOrder
      summary: Partner rejects a pending order with mandatory reason. Transitions pending → cancelled.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshRejectOrderRequest" }
      responses:
        "200":
          description: Order rejected.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/orders/{orderId}/preparing:
    post:
      operationId: markDshOrderPreparing
      summary: Partner marks order as preparing. Transitions store_accepted → preparing.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order marked preparing.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/orders/{orderId}/ready:
    post:
      operationId: markDshOrderReadyForPickup
      summary: Partner marks order ready for pickup. Transitions preparing → ready_for_pickup.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order ready for pickup.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/operator/orders:
    get:
      operationId: listDshOperatorOrders
      summary: Operator view of all orders with optional status filter.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, store_accepted, preparing, ready_for_pickup, driver_assigned, driver_arrived_store, picked_up, arrived_customer, delivered, cancelled]
      responses:
        "200":
          description: List of all orders.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrdersResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/operator/dispatch/assignments:
    get:
      operationId: listDshDispatchAssignments
      summary: Operator dispatch room with active and historical captain assignments.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Dispatch assignments.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    post:
      operationId: createDshAssignment
