    get:
      operationId: fieldGetStoreAssortment
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: partnerId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Current central assortment for the field-owned partner draft. }
        "403": { $ref: "#/components/responses/Forbidden" }

  /dsh/field/partners/{partnerId}/catalog/product-proposals:
    post:
      operationId: createFieldProductProposal
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: partnerId
          in: path
          required: true
          schema: { type: string }
      responses:
        "201": { description: Product proposal submitted for the field-owned partner store — never a final sellable product. }

  /dsh/field/partners/{partnerId}/catalog/product-proposals/{proposalId}:
    put:
      operationId: updateFieldProductProposal
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: partnerId
          in: path
          required: true
          schema: { type: string }
        - name: proposalId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Product proposal updated and resubmitted. }

  # ─── Cart & Serviceability Quote ────────────────────────────────
  # Runtime handlers registered in server.go. Client must be authenticated.
  # DSH catalog now owns a real numeric unitPrice per product (see dsh-022
  # migration): checkout derives the cart total from this, never from the
  # client. priceReference remains a display-only label. Payment execution,
  # capture, settlement, refund, and ledger truth remain WLT-owned.
  # ──────────────────────────────────────────────────────────────────────────

  /dsh/client/cart:
    get:
      operationId: getDshClientCart
      summary: Get the active cart for the authenticated client at a given store.
      tags: [DshCart]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: storeId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Active cart or null if no active cart for this store.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshCartResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    delete:
      operationId: clearDshClientCart
      summary: Remove all items from the active cart (cart itself is kept).
      tags: [DshCart]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: cartId
          in: query
          schema: { type: string }
        - name: storeId
          in: query
          schema: { type: string }
      responses:
        "204": { description: Cart cleared. }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/client/cart/items:
    post:
      operationId: upsertDshCartItem
      summary: Add or update an item in the client cart. Creates cart if not exists.
      tags: [DshCart]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshUpsertCartItemRequest" }
      responses:
        "200":
          description: Cart item upserted. Returns cartId and updated item.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshUpsertCartItemResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/client/cart/items/{itemId}:
    delete:
      operationId: removeDshCartItem
      summary: Remove a specific item from the client cart.
      tags: [DshCart]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string }
        - name: cartId
          in: query
          required: true
          schema: { type: string }
      responses:
        "204": { description: Item removed. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dsh/client/cart/serviceability:
    post:
      operationId: checkDshCartServiceability
      summary: Check whether the store can be served in the client's zone. No financial computation.
      tags: [DshCart]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CartServiceabilityRequest" }
      responses:
        "200":
          description: Operational serviceability decision.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CartServiceabilityResult" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/operator/carts:
    get:
      operationId: listOperatorCarts
      summary: List carts for operator monitoring. No financial mutation.
      tags: [DshCart]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: state
          in: query
          schema:
            type: string
            enum: [active, checked_out, abandoned]
      responses:
        "200":
          description: Cart list for operator review.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOperatorCartsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ─── Checkout Intent & WLT Handoff ──────────────────────────────
  # Implemented. DSH creates intent records only; payment truth is WLT-owned.
  # wltPaymentSessionId is an opaque WLT-owned payment-session reference.
  # ──────────────────────────────────────────────────────────────────────────

  /dsh/client/checkout-intents:
    post:
      operationId: createDshCheckoutIntent
      summary: Create a checkout intent from an active cart. DSH never executes payment.
      tags: [DshCheckout]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCreateCheckoutIntentRequest" }
      responses:
        "201":
          description: Checkout intent created with opaque WLT payment-session reference.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshCheckoutIntentResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "503": { description: WLT payment-session handoff is unavailable. }

  /dsh/client/checkout-intents/{intentId}:
    get:
      operationId: getDshCheckoutIntent
      summary: Get a checkout intent by ID (client-scoped).
      tags: [DshCheckout]
      security:
        - bearerAuth: []
      parameters:
        - name: intentId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Checkout intent.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshCheckoutIntentResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dsh/client/checkout-intents/{intentId}/cancel:
    post:
      operationId: cancelDshCheckoutIntent
      summary: Cancel a checkout intent. Never triggers refund — financial finalization is WLT-owned.
      tags: [DshCheckout]
      security:
        - bearerAuth: []
      parameters:
        - name: intentId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Intent cancelled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshCheckoutIntentResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { description: Intent already closed or not found. }

  /dsh/operator/checkout-intents:
    get:
      operationId: listOperatorCheckoutIntents
      summary: List checkout intents for operator monitoring. No financial mutation.
      tags: [DshCheckout]
      security:
        - bearerAuth: []
      parameters:
        - name: state
          in: query
          schema:
            type: string
            enum: [pending, wlt_handoff_failed, payment_pending, payment_confirmed, payment_failed, confirmed, cancelled, expired]
      responses:
        "200":
          description: List of checkout intents.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOperatorCheckoutIntentsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  # ─── Order Fulfillment & Partner Acceptance ────────────────────────
  /dsh/client/orders:
    post:
      operationId: createDshOrder
      summary: Create an order from a confirmed checkout intent (client).
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCreateOrderRequest" }
      responses:
        "201":
          description: Order created in pending state, awaiting partner acceptance.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    get:
      operationId: listDshClientOrders
      summary: List the authenticated client's orders.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Paginated list of client orders.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrdersResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/client/orders/{orderId}:
    get:
      operationId: getDshClientOrder
      summary: Get a single order by ID (client-scoped).
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order detail with items.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dsh/partner/orders:
    get:
      operationId: listDshPartnerOrders
      summary: List orders for a partner's store. Default status filter is pending.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, store_accepted, preparing, ready_for_pickup, cancelled]
      responses:
        "200":
          description: List of partner orders.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrdersResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/partner/orders/{orderId}/accept:
    post:
      operationId: acceptDshOrder
      summary: Partner accepts a pending order. Transitions pending → store_accepted.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/orders/{orderId}/reject:
    post:
      operationId: rejectDshOrder
      summary: Partner rejects a pending order with mandatory reason. Transitions pending → cancelled.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshRejectOrderRequest" }
      responses:
        "200":
          description: Order rejected.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/orders/{orderId}/preparing:
    post:
      operationId: markDshOrderPreparing
      summary: Partner marks order as preparing. Transitions store_accepted → preparing.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order marked preparing.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/orders/{orderId}/ready:
    post:
      operationId: markDshOrderReadyForPickup
      summary: Partner marks order ready for pickup. Transitions preparing → ready_for_pickup.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order ready for pickup.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrderResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/operator/orders:
    get:
      operationId: listDshOperatorOrders
      summary: Operator view of all orders with optional status filter.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, store_accepted, preparing, ready_for_pickup, driver_assigned, driver_arrived_store, picked_up, arrived_customer, delivered, cancelled]
      responses:
        "200":
          description: List of all orders.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshOrdersResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/operator/orders/{orderId}/cancel:
    post:
      operationId: cancelDshOperatorOrder
      summary: Operator cancels an active order with a mandatory reason.
      tags: [DshOrders]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Order cancelled successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshOrderResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /dsh/operator/dispatch/assignments:
    get:
      operationId: listDshDispatchAssignments
      summary: Operator dispatch room with active and historical captain assignments.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Dispatch assignments.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    post:
      operationId: createDshAssignment
      summary: Operator assigns a ready-for-pickup order to a captain.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshCreateAssignmentRequest" }
      responses:
        "201":
          description: Assignment created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/captain/dispatch/assignments:
    get:
      operationId: listDshCaptainAssignments
      summary: Captain lists only their own dispatch assignments.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Captain assignments.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/captain/dispatch/assignments/{assignmentId}/accept:
    post:
      operationId: acceptDshAssignment
      summary: Captain accepts an offered assignment.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Assignment accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/captain/dispatch/assignments/{assignmentId}/decline:
    post:
      operationId: declineDshAssignment
      summary: Captain declines an offered assignment and returns the order to ready-for-pickup.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshDeclineAssignmentRequest" }
      responses:
        "200":
          description: Assignment declined.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/captain/dispatch/assignments/{assignmentId}/status:
    post:
      operationId: updateDshDeliveryStatus
      summary: Captain advances assigned delivery lifecycle status.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshUpdateDeliveryStatusRequest" }
      responses:
        "200":
          description: Delivery status updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/captain/dispatch/assignments/{assignmentId}/pod:
    post:
      operationId: submitDshPoD
      summary: Captain submits proof of delivery and closes the DSH delivery lifecycle.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshSubmitPoDRequest" }
      responses:
        "200":
          description: Proof of delivery submitted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/captain/dispatch/assignments/{assignmentId}/location:
    post:
      operationId: pushDshCaptainLocation
      summary: >-
        Captain pushes a foreground-only location sample for an active
        assignment (register item 14 + 42 — no live tracking, no background
        location). Rejected once the assignment is no longer accepted/active.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshPushDispatchLocationRequest" }
      responses:
        "200":
          description: Location recorded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentResponse" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/client/orders/{orderId}/tracking:
    get:
      operationId: getDshClientOrderTracking
      summary: >-
        Client reads order delivery status updates for their own order,
        including the captain's last known foreground location (if any) while
        the delivery is active. No location history is kept or exposed.
      tags: [DshDispatch]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tracking assignment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshDispatchAssignmentResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /dsh/control-panel/finance/settlements:
    get:
      operationId: listDshControlPanelFinanceSettlements
      summary: Operator reads the governed WLT settlements view through the DSH finance proxy. WLT service auth stays server-side.
      tags: [DshFinanceProxy]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: partnerId
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: string }
        - name: cursor
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: WLT settlements view (verbatim passthrough).
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/control-panel/finance/settlements/summary:
    get:
      operationId: getDshControlPanelFinanceSettlementSummary
      summary: Operator reads the governed WLT settlement summary through the DSH finance proxy.
      tags: [DshFinanceProxy]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: partnerId
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: WLT settlement summary (verbatim passthrough).
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/control-panel/finance/refunds:
    get:
      operationId: listDshControlPanelFinanceRefunds
      summary: Operator reads the governed WLT refunds view through the DSH finance proxy.
      tags: [DshFinanceProxy]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: orderId
          in: query
          required: false
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: string }
        - name: cursor
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: WLT refunds view (verbatim passthrough).
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/partner/me/finance/settlements:
    get:
      operationId: listDshPartnerFinanceSettlements
      summary: Partner reads their own governed WLT settlements view through the DSH finance proxy. WLT service auth stays server-side.
      tags: [DshFinanceProxy]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: string }
        - name: cursor
