openapi: 3.1.0
info:
  title: BThwani DSH Service API
  version: 0.5.0
  description: >
    Delivery and shopping hub service contract. Core capabilities include Store Discovery,
    Home Discovery, Catalog Management, Cart & Serviceability, Checkout & WLT Handoff,
    Order Fulfillment, Dispatch & Captain Delivery, Partner Onboarding & Store Publication,
    Support, and Analytics.
    WLT handoff uses reference fields only; no financial mutation inside DSH.

x-bthwani-owner: services/dsh
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: ENABLED
x-bthwani-runtime-dependency: true

paths:
  /dsh/field/me/finance/wallet:
    get:
      operationId: getDshFieldMeWallet
      summary: Return the authenticated field agent's wallet balance.
      tags:
        - DshFieldFinance
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Wallet returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  wallet:
                    type: object
                    properties:
                      actorId: { type: string }
                      actorType: { type: string }
                      status: { type: string }
                      currency: { type: string }
                      availableBalanceMinorUnits: { type: integer, format: int64 }
                      pendingBalanceMinorUnits: { type: integer, format: int64 }
                      heldBalanceMinorUnits: { type: integer, format: int64 }
                      earnedTotalMinorUnits: { type: integer, format: int64 }
                      settledTotalMinorUnits: { type: integer, format: int64 }
                      paidTotalMinorUnits: { type: integer, format: int64 }
                      lastLedgerEntryAt: { type: string, format: date-time, nullable: true }
                      updatedAt: { type: string, format: date-time, nullable: true }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/field/me/finance/commissions:
    get:
      operationId: getDshFieldMeCommissions
      summary: Return the authenticated field agent's commissions.
      tags:
        - DshFieldFinance
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Commissions list returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  commissions:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        beneficiaryActorId: { type: string }
                        beneficiaryActorType: { type: string }
                        sourceType: { type: string }
                        sourceId: { type: string }
                        visitId: { type: string, nullable: true }
                        storeId: { type: string, nullable: true }
                        partnerId: { type: string, nullable: true }
                        commissionPolicyId: { type: string, nullable: true }
                        amountMinorUnits: { type: integer, format: int64 }
                        currency: { type: string }
                        status: { type: string }
                        idempotencyKey: { type: string, nullable: true }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/field/me/finance/ledger-entries:
    get:
      operationId: getDshFieldMeLedgerEntries
      summary: Return the authenticated field agent's ledger entries.
      tags:
        - DshFieldFinance
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Ledger entries returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/field/me/finance/payout-requests:
    get:
      operationId: getDshFieldMePayoutRequests
      summary: Return the authenticated field agent's payout requests.
      tags:
        - DshFieldFinance
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Payout requests returned successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  payoutRequests:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        beneficiaryActorId: { type: string }
                        beneficiaryActorType: { type: string }
                        amountMinorUnits: { type: integer, format: int64 }
                        currency: { type: string }
                        status: { type: string }
                        requestedAt: { type: string, format: date-time }
                        completedAt: { type: string, format: date-time, nullable: true }
                        failureReason: { type: string, nullable: true }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    post:
      operationId: submitDshFieldMePayoutRequest
      summary: Submit a new payout request for the authenticated field agent.
      tags:
        - DshFieldFinance
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amountMinorUnits
                - currency
                - idempotencyKey
              properties:
                amountMinorUnits: { type: integer, format: int64 }
                currency: { type: string }
                idempotencyKey: { type: string }
      responses:
        "201":
          description: Payout request created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  payoutRequest:
                    type: object
                    properties:
                      id: { type: string }
                      beneficiaryActorId: { type: string }
                      beneficiaryActorType: { type: string }
                      amountMinorUnits: { type: integer, format: int64 }
                      currency: { type: string }
                      status: { type: string }
                      requestedAt: { type: string, format: date-time }
                      completedAt: { type: string, format: date-time, nullable: true }
                      failureReason: { type: string, nullable: true }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/health:
    get:
      operationId: getDshHealth
      summary: Return DSH liveness state.
      tags:
        - DshSystem
      responses:
        "200":
          description: DSH process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHealthResponse"

  /dsh/readiness:
    get:
      operationId: getDshReadiness
      summary: Return DSH readiness state.
      tags:
        - DshSystem
      responses:
        "200":
          description: DSH dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshReadinessResponse"
        "503":
          description: DSH is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshReadinessResponse"

  /dsh/stores:
    get:
      operationId: listDshStores
      summary: List discoverable stores.
      tags:
        - DshStoreDiscovery
      parameters:
        - name: cityCode
          in: query
          required: false
          schema:
            type: string
          description: Filter by city code.
        - name: serviceAreaCode
          in: query
          required: false
          schema:
            type: string
          description: Filter by service area code.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DshStoreStatus"
          description: Filter by store status.
        - name: isVisible
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by visibility flag.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated list of stores.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreListResponse"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"

  /dsh/home-discovery:
    get:
      operationId: getDshHomeDiscovery
      summary: Return home discovery payload for the client home screen.
      tags:
        - DshHomeDiscovery
      parameters:
        - name: cityCode
          in: query
          required: false
          schema:
            type: string
          description: Filter by city code.
        - name: serviceAreaCode
          in: query
          required: false
          schema:
            type: string
          description: Filter by service area code.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: Maximum number of stores to return.
      responses:
        "200":
          description: Home discovery payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeDiscoveryResponse"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"
        "503":
          description: Service unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"

  /dsh/operator/workforce/media/uploads:
    post:
      operationId: uploadWorkforceMedia
      summary: Operator-only. Upload workforce media document (license, photo, etc.).
      tags:
        - DshWorkforce
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [actorId, actorRole, file]
              properties:
                actorId:
                  type: string
                actorRole:
                  type: string
                  enum: [field, captain]
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Media uploaded successfully.
          content:
            application/json:
              schema:
                type: object
                required: [mediaRef]
                properties:
                  mediaRef:
                    type: string
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dsh/operator/home-discovery/{kind}:
    parameters:
      - $ref: "#/components/parameters/HomeContentKind"
    get:
      operationId: listOperatorHomeDiscoveryContent
      summary: List all home discovery content including inactive items.
      tags: [DshHomeDiscovery]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Administrative home discovery content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeAdminListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createOperatorHomeDiscoveryContent
      summary: Create a home banner or promotion; categories come from the central catalog.
      tags: [DshHomeDiscovery]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshHomeAdminContentInput"
      responses:
        "201":
          description: Content created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeAdminItemResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dsh/operator/home-discovery/{kind}/{itemId}:
    parameters:
      - $ref: "#/components/parameters/HomeContentKind"
      - name: itemId
        in: path
        required: true
        schema:
          type: string
    patch:
      operationId: updateOperatorHomeDiscoveryContent
      summary: Update a home discovery content item.
      tags: [DshHomeDiscovery]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DshHomeAdminContentInput"
      responses:
        "200":
          description: Content updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshHomeAdminItemResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteOperatorHomeDiscoveryContent
      summary: Delete a home discovery content item.
      tags: [DshHomeDiscovery]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "204":
          description: Content deleted.
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /dsh/stores/{storeId}:
    get:
      operationId: getDshStore
      summary: Get a single store by ID.
      tags:
        - DshStoreDiscovery
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
          description: Store identifier.
      responses:
        "200":
          description: Store detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreDetailResponse"
        "400":
          description: Invalid store ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"
        "404":
          description: Store not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshErrorResponse"

  /dsh/store-context:
    get:
      operationId: getDshStoreContext
      summary: Resolve the authenticated actor's own or assigned store context.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Scoped store context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreContextResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /dsh/operator/stores:
    get:
      operationId: listOperatorDshStores
      summary: List all stores for an authenticated operator.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All stores including hidden and suspended stores.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dsh/operator/stores/{storeId}:
    get:
      operationId: getOperatorDshStore
      summary: Get unrestricted store detail for an authenticated operator.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          description: Operator store detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /dsh/partner/stores/{storeId}/settings:
    get:
      operationId: getPartnerStoreSettings
      summary: Get bounded operating settings for the authenticated partner's own store.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          description: Store settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerStoreSettingsRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updatePartnerStoreSettings
      summary: Update bounded operating settings for the authenticated partner's own store.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerStoreSettingsRequest"
      responses:
        "200":
          description: Store settings updated or idempotently replayed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreActionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /dsh/partner/stores/{storeId}/courier-settings:
    get:
      operationId: getDshPartnerStoreCourierSettings
      summary: Get store courier settings.
      tags: [DshPartner]
      security:
        - bearerAuth: []
      parameters:
        - name: storeId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Courier settings.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshPartnerStoreCourierSettings" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    put:
      operationId: updateDshPartnerStoreCourierSettings
      summary: Update store courier settings.
      tags: [DshPartner]
      security:
        - bearerAuth: []
      parameters:
        - name: storeId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshPartnerStoreCourierSettings" }
      responses:
        "200":
          description: Courier settings updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DshPartnerStoreCourierSettings" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/partner/stores/{storeId}/coverage-zones:
    get:
      operationId: listDshPartnerStoreCoverageZones
      summary: Get store coverage zones.
      tags: [DshPartner]
      security:
        - bearerAuth: []
      parameters:
        - name: storeId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: List of coverage zones.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DshPartnerCoverageZone" }
        "401": { $ref: "#/components/responses/Unauthenticated" }

  /dsh/field/stores/{storeId}/verifications:
    post:
      operationId: submitFieldStoreVerification
      summary: Submit a verification outcome for the authenticated field actor's assigned store.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldStoreVerificationRequest"
      responses:
        "200":
          description: Verification recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreActionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /dsh/captain/stores/{storeId}/pickup-readiness:
    post:
      operationId: reportCaptainPickupReadiness
      summary: Report readiness for the authenticated captain's assigned pickup point.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptainPickupReadinessRequest"
      responses:
        "200":
          description: Pickup readiness report recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreActionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /dsh/operator/stores/{storeId}/governance:
    post:
      operationId: governDshStore
      summary: Apply an authenticated and audited lifecycle, visibility, or serviceability action.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorStoreGovernanceRequest"
      responses:
        "200":
          description: Governance action applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreActionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /dsh/operator/diagnostics/stores/{storeId}:
    get:
      operationId: getStoreDiagnostics
      summary: Get store publication diagnostics
      tags: [Operator Store Management]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          description: Store diagnostics.
          content:
            application/json:
              schema:
                type: object
                properties:
                  isReady: { type: boolean }
                  blockers:
                    type: array
                    items: { type: string }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /dsh/operator/stores/{storeId}/audit:
    get:
      operationId: listDshStoreAudit
      summary: List the latest audited store actions for an operator.
      tags: [DshStoreGovernance]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          description: Store audit timeline.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshStoreAuditResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dsh/stores/{storeId}/catalog:
    get:
      operationId: getPublishedDshCatalog
      deprecated: false # response shape changed: now { domains, products } from the master catalog (dsh-030); see CentralCatalog tag.
      summary: Return the approved, active catalog for a publicly eligible store.
      tags: [DshCatalog]
      parameters:
        - $ref: "#/components/parameters/StoreId"
      responses:
        "200":
          description: Published categories and products.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshCatalogResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /dsh/public/media/{assetId}/{variant}:
    get:
      operationId: getPublicCatalogMedia
      summary: Stream an approved DAM asset's binary. Unauthenticated -- only status=approved assets are ever served.
      tags: [DshCatalog]
      parameters:
        - name: assetId
          in: path
          required: true
          schema: { type: string }
        - name: variant
          in: path
          required: true
          description: Rendition selector; only "original" is served today.
          schema: { type: string }
      responses:
        "200":
          description: Image bytes.
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Central Catalog Sovereignty ───────────────────────────────────────────
  # governance/catalog/CENTRAL_CATALOG_SOVEREIGNTY_DECISION.md. From dsh-030
  # forward, dsh_catalog_domains/dsh_catalog_nodes/dsh_master_products are the
  # only ground truth for categories/products. Local catalog routes and tables
  # were retired by dsh-036; every surface uses the endpoints below.
  /dsh/operator/catalog/domains:
    get:
      operationId: listCatalogDomains
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: BUSINESS_DOMAIN (L1) list. }
    post:
      operationId: createCatalogDomain
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Domain created. }

  /dsh/operator/catalog/domains/{domainId}:
    patch:
      operationId: updateCatalogDomain
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: domainId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: All fields are optional. Only provided fields are updated.
              properties:
                expectedVersion: { type: integer }
                nameAr: { type: string }
                nameEn: { type: string }
                icon: { type: string }
                sortOrder: { type: integer }
                isActive: { type: boolean }
                isClientVisible: { type: boolean }
                requiresProductCatalog: { type: boolean }
                isManualRequest: { type: boolean }
      responses:
        "200": { description: Domain updated. }

  /dsh/operator/catalog/nodes:
    get:
      operationId: listCatalogNodes
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: domainId
          in: query
          schema: { type: string }
        - name: parentId
          in: query
          schema: { type: string }
      responses:
        "200": { description: BUSINESS_SUBDOMAIN/PRODUCT_MAIN_CLASS/PRODUCT_SUB_CLASS (L2-L4) list. }
    post:
      operationId: createCatalogNode
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Node created. }

  /dsh/operator/catalog/nodes/{nodeId}:
    patch:
      operationId: updateCatalogNode
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: nodeId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: All fields are optional. Only provided fields are updated.
              properties:
                expectedVersion: { type: integer }
                nameAr: { type: string }
                nameEn: { type: string }
                icon: { type: string }
                sortOrder: { type: integer }
                isActive: { type: boolean }
                isClientVisible: { type: boolean }
      responses:
        "200": { description: Node updated. }

  /dsh/operator/catalog/master-products:
    get:
      operationId: listMasterProductsOperator
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: domainId
          in: query
          schema: { type: string }
        - name: categoryNodeId
          in: query
          schema: { type: string }
        - name: approvalStatus
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
        - name: isActive
          in: query
          schema: { type: boolean }
        - name: imageStatus
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema: { type: string, enum: [createdAt, updatedAt, nameAr, price] }
        - name: sortDirection
          in: query
          schema: { type: string, enum: [asc, desc] }
        - name: createdFrom
          in: query
          schema: { type: string, format: date-time }
        - name: createdTo
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: MASTER_PRODUCT (L5) list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DshMasterProductListResponse"
    post:
      operationId: createMasterProduct
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Master product created. }

  /dsh/operator/catalog/master-products/{productId}:
    patch:
      operationId: updateMasterProduct
      tags: [CentralCatalog]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: All fields are optional. Only provided fields are updated. Do NOT send canonicalImageObjectKey — images are managed via DAM asset links.
              properties:
                expectedVersion: { type: integer }
                canonicalNameAr: { type: string }
                canonicalNameEn: { type: string }
                brand: { type: string }
                unit: { type: string }
                unitPrice: { type: number }
                currency: { type: string }
                stockStatus: { type: string, enum: [in_stock, low_stock, out_of_stock] }
                isActive: { type: boolean }
                approvalStatus: { type: string }
      responses:
        "200": { description: Master product updated. }

