openapi: 3.1.0
info:
  title: BThwani DSH Partner Commercial Closure API
  version: 1.0.0
  description: >
    Active DSH contract shard for governed checkout coupons, store delivery
    pricing and loyalty earning policies. DSH owns operational eligibility and
    immutable checkout pricing; WLT owns financial balances, funding and paid
    entitlements.
x-bthwani-owner: services/dsh
x-bthwani-parent-contract: services/dsh/contracts/dsh.openapi.yaml
x-bthwani-contract-state: CONTRACT_ACTIVE
x-bthwani-client-generation: ENABLED
x-bthwani-runtime-dependency: true
paths:
  /dsh/operator/marketing/coupons:
    get:
      operationId: listDshCoupons
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Governed coupons.
          content:
            application/json:
              schema:
                type: object
                required: [coupons]
                properties:
                  coupons: { type: array, items: { $ref: '#/components/schemas/DshCoupon' } }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
    post:
      operationId: createDshCoupon
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DshCouponCreate' }
      responses:
        '201':
          description: Coupon created. Plaintext code is returned once only.
          content:
            application/json:
              schema:
                type: object
                required: [issued]
                properties:
                  issued:
                    type: object
                    required: [coupon, code]
                    properties:
                      coupon: { $ref: '#/components/schemas/DshCoupon' }
                      code: { type: string, minLength: 6, maxLength: 32 }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /dsh/operator/marketing/coupons/{couponId}:
    patch:
      operationId: updateDshCoupon
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: couponId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DshCouponUpdate' }
      responses:
        '200':
          description: Coupon updated.
          content:
            application/json:
              schema:
                type: object
                required: [coupon]
                properties:
                  coupon: { $ref: '#/components/schemas/DshCoupon' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /dsh/operator/stores/{storeId}/delivery-pricing:
    get:
      operationId: listOperatorDshStoreDeliveryPricing
      tags: [DshDeliveryPricing]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreId'
      responses:
        '200':
          description: All governed fulfillment pricing records for the store.
          content:
            application/json:
              schema:
                type: object
                required: [pricing]
                properties:
                  pricing: { type: array, items: { $ref: '#/components/schemas/DshDeliveryPricing' } }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }

  /dsh/operator/stores/{storeId}/delivery-pricing/{fulfillmentMode}:
    put:
      operationId: upsertOperatorDshStoreDeliveryPricing
      tags: [DshDeliveryPricing]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreId'
        - $ref: '#/components/parameters/FulfillmentMode'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DshDeliveryPricingMutation' }
      responses:
        '200':
          description: Delivery pricing saved with a new version and audit event.
          content:
            application/json:
              schema:
                type: object
                required: [pricing]
                properties:
                  pricing: { $ref: '#/components/schemas/DshDeliveryPricing' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /dsh/partner/stores/{storeId}/delivery-pricing:
    get:
      operationId: listPartnerDshStoreDeliveryPricing
      tags: [DshDeliveryPricing]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreId'
      responses:
        '200':
          description: Store pricing visible to the authenticated partner.
          content:
            application/json:
              schema:
                type: object
                required: [pricing]
                properties:
                  pricing: { type: array, items: { $ref: '#/components/schemas/DshDeliveryPricing' } }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /dsh/partner/stores/{storeId}/delivery-pricing/{fulfillmentMode}:
    put:
      operationId: upsertPartnerDshStoreDeliveryPricing
      description: The partner may mutate only partner_delivery for its resolved store.
      tags: [DshDeliveryPricing]
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/StoreId'
        - $ref: '#/components/parameters/FulfillmentMode'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DshDeliveryPricingMutation' }
      responses:
        '200':
          description: Partner-delivery pricing saved.
          content:
            application/json:
              schema:
                type: object
                required: [pricing]
                properties:
                  pricing: { $ref: '#/components/schemas/DshDeliveryPricing' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /dsh/operator/marketing/loyalty-earning-policies:
    get:
      operationId: listDshLoyaltyEarningPolicies
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Earning policies.
          content:
            application/json:
              schema:
                type: object
                required: [policies]
                properties:
                  policies: { type: array, items: { $ref: '#/components/schemas/DshLoyaltyEarningPolicy' } }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
    post:
      operationId: createDshLoyaltyEarningPolicy
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DshLoyaltyEarningPolicyCreate' }
      responses:
        '201':
          description: Draft policy created.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy: { $ref: '#/components/schemas/DshLoyaltyEarningPolicy' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }

  /dsh/operator/marketing/loyalty-earning-policies/{policyId}:
    patch:
      operationId: updateDshLoyaltyEarningPolicy
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: policyId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DshLoyaltyEarningPolicyUpdate' }
      responses:
        '200':
          description: Policy updated.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy: { $ref: '#/components/schemas/DshLoyaltyEarningPolicy' }
        '400': { $ref: '#/components/responses/ErrorResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
  parameters:
    StoreId:
      name: storeId
      in: path
      required: true
      schema: { type: string, minLength: 1 }
    FulfillmentMode:
      name: fulfillmentMode
      in: path
      required: true
      schema: { type: string, enum: [bthwani_delivery, partner_delivery, pickup] }
  responses:
    ErrorResponse:
      description: Governed API error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    DshCoupon:
      type: object
      additionalProperties: false
      required:
        - id
        - nameAr
        - codeLast4
        - discountType
        - discountPercent
        - fixedDiscountMinorUnits
        - maxDiscountMinorUnits
        - minSubtotalMinorUnits
        - globalUsageLimit
        - perClientUsageLimit
        - eligibleFulfillmentModes
        - fundingSource
        - platformShareBps
        - partnerShareBps
        - status
        - createdByActorId
        - version
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        nameAr: { type: string }
        description: { type: string }
        codeLast4: { type: string, minLength: 4, maxLength: 4 }
        storeId: { type: string }
        discountType: { type: string, enum: [percent, fixed] }
        discountPercent: { type: number, minimum: 0, maximum: 100 }
        fixedDiscountMinorUnits: { type: integer, format: int64, minimum: 0 }
        maxDiscountMinorUnits: { type: integer, format: int64, minimum: 0 }
        minSubtotalMinorUnits: { type: integer, format: int64, minimum: 0 }
        globalUsageLimit: { type: integer, minimum: 0 }
        perClientUsageLimit: { type: integer, minimum: 1 }
        eligibleFulfillmentModes:
          type: array
          minItems: 1
          items: { type: string, enum: [bthwani_delivery, partner_delivery, pickup] }
        fundingSource: { type: string, enum: [platform, partner, shared] }
        platformShareBps: { type: integer, minimum: 0, maximum: 10000 }
        partnerShareBps: { type: integer, minimum: 0, maximum: 10000 }
        sponsorId: { type: string }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        status: { type: string, enum: [draft, active, paused, archived] }
        createdByActorId: { type: string }
        approvedByActorId: { type: string }
        approvedAt: { type: string, format: date-time }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshCouponCreate:
      type: object
      additionalProperties: false
      required: [nameAr, code, discountType]
      properties:
        nameAr: { type: string, minLength: 1 }
        description: { type: string }
        code: { type: string, minLength: 6, maxLength: 32 }
        storeId: { type: string }
        discountType: { type: string, enum: [percent, fixed] }
        discountPercent: { type: number, minimum: 0, maximum: 100 }
        fixedDiscountMinorUnits: { type: integer, format: int64, minimum: 0 }
        maxDiscountMinorUnits: { type: integer, format: int64, minimum: 0 }
        minSubtotalMinorUnits: { type: integer, format: int64, minimum: 0 }
        globalUsageLimit: { type: integer, minimum: 0 }
        perClientUsageLimit: { type: integer, minimum: 1 }
        eligibleFulfillmentModes:
          type: array
          items: { type: string, enum: [bthwani_delivery, partner_delivery, pickup] }
        fundingSource: { type: string, enum: [platform, partner, shared] }
        platformShareBps: { type: integer, minimum: 0, maximum: 10000 }
        partnerShareBps: { type: integer, minimum: 0, maximum: 10000 }
        sponsorId: { type: string }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }

    DshCouponUpdate:
      allOf:
        - type: object
          properties:
            nameAr: { type: string }
            description: { type: string }
            storeId: { type: string }
            discountType: { type: string, enum: [percent, fixed] }
            discountPercent: { type: number, minimum: 0, maximum: 100 }
            fixedDiscountMinorUnits: { type: integer, format: int64, minimum: 0 }
            maxDiscountMinorUnits: { type: integer, format: int64, minimum: 0 }
            minSubtotalMinorUnits: { type: integer, format: int64, minimum: 0 }
            globalUsageLimit: { type: integer, minimum: 0 }
            perClientUsageLimit: { type: integer, minimum: 1 }
            eligibleFulfillmentModes:
              type: array
              items: { type: string, enum: [bthwani_delivery, partner_delivery, pickup] }
            fundingSource: { type: string, enum: [platform, partner, shared] }
            platformShareBps: { type: integer, minimum: 0, maximum: 10000 }
            partnerShareBps: { type: integer, minimum: 0, maximum: 10000 }
            sponsorId: { type: string }
            startsAt: { type: string, format: date-time }
            endsAt: { type: string, format: date-time }
            status: { type: string, enum: [draft, active, paused, archived] }
        - type: object
          required: [expectedVersion]
          properties:
            expectedVersion: { type: integer, minimum: 1 }

    DshDeliveryPricing:
      type: object
      additionalProperties: false
      required: [storeId, fulfillmentMode, feeMinorUnits, currency, status, pricingSource, version, createdAt, updatedAt]
      properties:
        storeId: { type: string }
        fulfillmentMode: { type: string, enum: [bthwani_delivery, partner_delivery, pickup] }
        feeMinorUnits: { type: integer, format: int64, minimum: 0 }
        currency: { type: string, enum: [YER] }
        status: { type: string, enum: [active, paused, archived] }
        pricingSource: { type: string, enum: [control_panel, partner_store, platform_default, migration_legacy] }
        createdByActorId: { type: string }
        approvedByActorId: { type: string }
        approvedAt: { type: string, format: date-time }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshDeliveryPricingMutation:
      type: object
      additionalProperties: false
      required: [feeMinorUnits, currency, status, expectedVersion, reason]
      properties:
        feeMinorUnits: { type: integer, format: int64, minimum: 0 }
        currency: { type: string, enum: [YER] }
        status: { type: string, enum: [active, paused, archived] }
        expectedVersion: { type: integer, minimum: 0 }
        reason: { type: string, minLength: 1 }

    DshLoyaltyEarningPolicy:
      type: object
      additionalProperties: false
      required: [id, nameAr, pointsNumerator, eligibleMinorUnitsDenominator, minimumPoints, maximumPointsPerOrder, status, createdByActorId, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        nameAr: { type: string }
        pointsNumerator: { type: integer, format: int64, minimum: 1 }
        eligibleMinorUnitsDenominator: { type: integer, format: int64, minimum: 1 }
        minimumPoints: { type: integer, format: int64, minimum: 0 }
        maximumPointsPerOrder: { type: integer, format: int64, minimum: 0 }
        status: { type: string, enum: [draft, active, paused, archived] }
        createdByActorId: { type: string }
        approvedByActorId: { type: string }
        approvedAt: { type: string, format: date-time }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DshLoyaltyEarningPolicyCreate:
      type: object
      additionalProperties: false
      required: [nameAr, pointsNumerator, eligibleMinorUnitsDenominator, minimumPoints, maximumPointsPerOrder]
      properties:
        nameAr: { type: string, minLength: 1 }
        pointsNumerator: { type: integer, format: int64, minimum: 1 }
        eligibleMinorUnitsDenominator: { type: integer, format: int64, minimum: 1 }
        minimumPoints: { type: integer, format: int64, minimum: 0 }
        maximumPointsPerOrder: { type: integer, format: int64, minimum: 0 }

    DshLoyaltyEarningPolicyUpdate:
      allOf:
        - type: object
          properties:
            nameAr: { type: string }
            pointsNumerator: { type: integer, format: int64, minimum: 1 }
            eligibleMinorUnitsDenominator: { type: integer, format: int64, minimum: 1 }
            minimumPoints: { type: integer, format: int64, minimum: 0 }
            maximumPointsPerOrder: { type: integer, format: int64, minimum: 0 }
            status: { type: string, enum: [draft, active, paused, archived] }
        - type: object
          required: [expectedVersion]
          properties:
            expectedVersion: { type: integer, minimum: 1 }
