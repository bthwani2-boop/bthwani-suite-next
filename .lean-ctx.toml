# LeanCTX policy for bthwani-suite-next
# الهدف: متاح للوكلاء فقط، بدون تغيير سلوك التطبيق أو CI.

shell_activation = "agents-only"
rules_injection = "dedicated"
cache_policy = "safe"
response_verbosity = "headers_only"
tool_profile = "power"

enable_wakeup_ctx = false
auto_capture = false
journal_enabled = false
update_check_disabled = true

[cloud]
contribute_enabled = false
