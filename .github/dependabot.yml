version: 2
updates:
  # Root npm / pnpm packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # WLT Go backend packages
  - package-ecosystem: "gomod"
    directory: "/services/wlt/backend"
    schedule:
      interval: "weekly"

  # DSH Go backend packages
  - package-ecosystem: "gomod"
    directory: "/services/dsh/backend"
    schedule:
      interval: "weekly"

  # Identity Go backend packages
  - package-ecosystem: "gomod"
    directory: "/core/identity/backend"
    schedule:
      interval: "weekly"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
