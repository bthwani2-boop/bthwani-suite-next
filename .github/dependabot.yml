version: 2
updates:
  # Root npm / pnpm packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "gate:ci-required"
    commit-message:
      prefix: "chore(deps)"
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"

  # WLT Go backend packages
  - package-ecosystem: "gomod"
    directory: "/services/wlt/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "gate:ci-required"
    commit-message:
      prefix: "chore(deps)"

  # DSH Go backend packages
  - package-ecosystem: "gomod"
    directory: "/services/dsh/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "gate:ci-required"
    commit-message:
      prefix: "chore(deps)"

  # Identity Go backend packages
  - package-ecosystem: "gomod"
    directory: "/core/identity/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "gate:ci-required"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "gate:ci-required"
    commit-message:
      prefix: "chore(deps)"
