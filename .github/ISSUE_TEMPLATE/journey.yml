name: Feature Journey
description: Propose or track a new operational journey / capability.
labels: ["journey", "needs-evidence"]
body:
  - type: markdown
    attributes:
      value: |
        Track implementation of feature journeys with required evidence.
  - type: input
    id: journey-id
    attributes:
      label: Journey ID
      placeholder: e.g., notifications
    validations:
      required: true
  - type: textarea
    id: overview
    attributes:
      label: Overview & Scope
      placeholder: Describe the goal and affected boundaries/surfaces.
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Implementation Checklist
      placeholder: List of files and systems affected.
    validations:
      required: true
