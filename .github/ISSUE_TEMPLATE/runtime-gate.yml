name: Runtime Gate
description: Run or verify runtime gates/smoke tests.
labels: ["runtime", "gate"]
body:
  - type: markdown
    attributes:
      value: |
        Track local or CI-based runtime gates and smoke assertions.
  - type: input
    id: environment
    attributes:
      label: Target Environment
      placeholder: e.g., local-docker, staging
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: Smoke Test Results
      placeholder: Paste command line logs or validation outputs.
    validations:
      required: true
