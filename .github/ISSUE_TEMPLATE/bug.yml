name: Bug Report
description: Report a bug or issue in the workspace.
labels: ["bug", "fix-required"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide a clear and concise description of the bug.
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What goes wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: 1. Go to...\n2. Click on...\n3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
