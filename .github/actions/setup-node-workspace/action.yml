name: Setup BThwani Node workspace
description: Install the repository-pinned PNPM and Node toolchain, then install the frozen workspace with durable failure evidence.

inputs:
  node-version:
    description: Node.js version required by the root package contract.
    required: false
    default: "24.17.0"
  pnpm-version:
    description: PNPM version required by the root package contract.
    required: false
    default: "10.34.0"

runs:
  using: composite
  steps:
    - name: Setup PNPM
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Register immutable status diagnostics
      shell: bash
      env:
        BTHWANI_STATUS_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        echo "::add-mask::${BTHWANI_STATUS_TOKEN}"
        echo "BTHWANI_STATUS_TOKEN=${BTHWANI_STATUS_TOKEN}" >> "${GITHUB_ENV}"

    - name: Install frozen workspace
      id: install
      continue-on-error: true
      shell: bash
      run: |
        set -uo pipefail
        log="${RUNNER_TEMP}/pnpm-install.log"
        pnpm install --frozen-lockfile --reporter=append-only >"${log}" 2>&1

    - name: Upload PNPM installation failure log
      if: ${{ steps.install.outcome == 'failure' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ github.job }}-pnpm-install-${{ github.run_id }}
        path: ${{ runner.temp }}/pnpm-install.log
        if-no-files-found: error
        retention-days: 7

    - name: Fail closed on PNPM installation error
      if: ${{ steps.install.outcome == 'failure' }}
      shell: bash
      run: |
        echo "::error title=Frozen PNPM installation failed::The complete log was uploaded as an artifact."
        tail -n 160 "${RUNNER_TEMP}/pnpm-install.log"
        exit 1
