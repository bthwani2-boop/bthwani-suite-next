name: JRN-020..030 Final Non-Cancelling Closure

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "services/dsh/tsconfig.jrn-020-030.json"
      - "services/dsh/backend/internal/dispatch/**"
      - "services/dsh/backend/internal/support/**"
      - "services/dsh/backend/internal/specialrequests/**"
      - "services/dsh/backend/internal/notifications/**"
      - "services/dsh/backend/internal/fieldreadiness/**"
      - "services/dsh/backend/internal/marketing/**"
      - "services/dsh/backend/internal/coupons/**"
      - "services/dsh/backend/internal/partnerfleet/**"
      - "services/dsh/backend/internal/platformpolicies/**"
      - "services/dsh/backend/internal/promotionfundingoutbox/**"
      - "services/dsh/backend/internal/operationaloutbox/**"
      - "services/dsh/backend/internal/http/support_message_delivery_routes.go"
      - "services/dsh/backend/internal/http/support_message_delivery_routes_test.go"
      - "services/dsh/backend/internal/http/journeys_020_025_routes_test.go"
      - "services/dsh/backend/internal/http/journeys_026_030_routes_test.go"
      - "services/dsh/backend/internal/http/dispatch*.go"
      - "services/dsh/backend/internal/http/governed_support.go"
      - "services/dsh/backend/internal/http/support*.go"
      - "services/dsh/backend/internal/http/specialrequests.go"
      - "services/dsh/backend/internal/http/notifications.go"
      - "services/dsh/backend/internal/http/notification_routes.go"
      - "services/dsh/backend/internal/http/fieldreadiness.go"
      - "services/dsh/backend/internal/http/field_readiness_routes.go"
      - "services/dsh/backend/internal/http/marketing.go"
      - "services/dsh/backend/internal/http/coupons.go"
      - "services/dsh/backend/internal/http/delivery_pricing.go"
      - "services/dsh/backend/internal/http/partner_fleet*.go"
      - "services/dsh/backend/internal/http/platform_operational_policies.go"
      - "services/dsh/backend/internal/http/coupon_funding_lifecycle.go"
      - "services/dsh/backend/internal/http/subscription_purchases.go"
      - "services/dsh/backend/internal/http/server.go"
      - "services/dsh/backend/cmd/dsh-api/main.go"
      - "services/dsh/database/migrations/dsh-0*.sql"
      - "services/dsh/database/tests/**"
      - "services/dsh/contracts/dsh.openapi.yaml"
      - "services/dsh/contracts/dsh.marketing-commercial.openapi.yaml"
      - "services/dsh/contracts/dsh.partner-fleet.openapi.yaml"
      - "services/dsh/contracts/dsh.platform-policies.openapi.yaml"
      - "services/dsh/frontend/shared/dispatch/**"
      - "services/dsh/frontend/shared/support/**"
      - "services/dsh/frontend/shared/special-requests/**"
      - "services/dsh/frontend/shared/notifications/**"
      - "services/dsh/frontend/shared/field-readiness/**"
      - "services/dsh/frontend/shared/marketing/**"
      - "services/dsh/frontend/shared/partner/partner-fleet.api.ts"
      - "services/dsh/frontend/shared/partner/use-partner-fleet-controller.ts"
      - "services/dsh/frontend/shared/partner/use-delivery-pricing-controller.ts"
      - "services/dsh/frontend/shared/partner/partner-delivery-pricing.api.ts"
      - "services/dsh/frontend/shared/platform/**"
      - "services/dsh/frontend/shared/home-discovery/**"
      - "services/dsh/frontend/app-client/account/BenefitsHubScreen.tsx"
      - "services/dsh/frontend/app-client/DshClientSurface.tsx"
      - "services/dsh/frontend/app-captain/orders/CaptainOrderSupportConversationScreen.tsx"
      - "services/dsh/frontend/app-captain/account/PartnerFleetConnectionCard.tsx"
      - "services/dsh/frontend/app-partner/team/PartnerTeamManagementScreen.tsx"
      - "services/dsh/frontend/control-panel/operations/SpecialOpsWorkbenchScreen.tsx"
      - "services/dsh/frontend/control-panel/operations/AreaCapacityScreen.tsx"
      - "services/dsh/frontend/control-panel/marketing/**"
      - "services/dsh/tests/journeys-020-025-binding.test.mjs"
      - "services/dsh/tests/journeys-026-030-binding.test.mjs"
      - "services/dsh/tests/jrn-030-partner-fleet-surface-binding.test.mjs"
      - "services/wlt/backend/internal/promotionfunding/**"
      - "services/wlt/contracts/wlt.promotion-funding.openapi.yaml"
      - "tools/guards/fullstack-boundary-gate.mjs"
      - "tools/guards/wlt-financial-boundary-gate.mjs"
      - "tools/guards/no-broken-imports.mjs"
      - "tools/guards/jrn-015-020-affected-boundary.mjs"
      - "governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md"
      - "governance/evidence/JRN-020-030_FULLSTACK_CLOSURE.json"
      - ".github/actions/setup-node-workspace/action.yml"
      - ".github/workflows/jrn-020-030-sambassam-closure.yml"
      - ".github/workflows/jrn-020-030-final-closure.yml"

permissions:
  contents: read
  statuses: write

jobs:
  static-integrity:
    name: Static contracts, bindings, and sovereign boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node and PNPM workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify repository hygiene
        run: git diff --check
      - name: Verify JRN-020..030 bindings
        run: >-
          node --test
          services/dsh/tests/journeys-020-025-binding.test.mjs
          services/dsh/tests/journeys-026-030-binding.test.mjs
          services/dsh/tests/jrn-030-partner-fleet-surface-binding.test.mjs
      - name: Verify sovereign boundaries
        run: |
          pnpm guard:fullstack-boundary
          pnpm guard:wlt-financial-boundary
          pnpm guard:no-broken-imports
          node tools/guards/jrn-015-020-affected-boundary.mjs

  typecheck:
    name: Shared brain and authorized surface typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node and PNPM workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Typecheck JRN-020..030 scope
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-020-030.json --noEmit --pretty false

  go-integration:
    name: Go domains, routes, and runtime compile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: services/dsh/backend
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Go from module
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify domains and routes
        run: >-
          go test
          ./cmd/dsh-api
          ./internal/dispatch
          ./internal/support
          ./internal/specialrequests
          ./internal/notifications
          ./internal/fieldreadiness
          ./internal/marketing
          ./internal/coupons
          ./internal/partnerfleet
          ./internal/platformpolicies
          ./internal/promotionfundingoutbox
          ./internal/operationaloutbox
          ./internal/http
          -count=1

  database-integration:
    name: PostgreSQL migrations and authorized SQL invariants
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dsh_runtime
          POSTGRES_PASSWORD: dsh_runtime_password
          POSTGRES_DB: dsh_runtime
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dsh_runtime -d dsh_runtime"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGPASSWORD: dsh_runtime_password
      DATABASE_URL: postgres://dsh_runtime:dsh_runtime_password@localhost:5432/dsh_runtime?sslmode=disable
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Apply every DSH migration on a clean PostgreSQL 16 database
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t migrations < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
          test "${#migrations[@]}" -gt 0
          for file in "${migrations[@]}"; do
            echo "==> $file"
            psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -f "$file"
          done
          echo "applied_migrations=${#migrations[@]}"
      - name: Run only JRN-020..030 SQL invariant suites
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tests < <(
            find services/dsh/database/tests -maxdepth 1 -type f -name '*.sql' \
              | sort \
              | grep -E '/dsh-(009|011|012|019|020|034|054|055|058|059|065|066|067|068|069|070|071|072|073|074|075|076|077|080|084|087|093|094|095|096|097)[^/]*\.sql$'
          )
          test "${#tests[@]}" -gt 0
          for file in "${tests[@]}"; do
            echo "==> $file"
            psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -f "$file"
          done
          echo "executed_sql_tests=${#tests[@]}"

  publish-result:
    name: Publish final same-commit closure status
    if: always()
    needs: [static-integrity, typecheck, go-integration, database-integration]
    runs-on: ubuntu-latest
    steps:
      - name: Publish aggregate status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          STATIC_RESULT: ${{ needs.static-integrity.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          GO_RESULT: ${{ needs.go-integration.result }}
          DATABASE_RESULT: ${{ needs.database-integration.result }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=failure
          DESCRIPTION="JRN-020..030 final closure failed"
          if [ "$STATIC_RESULT" = success ] && [ "$TYPECHECK_RESULT" = success ] && [ "$GO_RESULT" = success ] && [ "$DATABASE_RESULT" = success ]; then
            STATE=success
            DESCRIPTION="JRN-020..030 final closure passed"
          fi
          jq -n \
            --arg state "$STATE" \
            --arg context "journeys/jrn-020-030/final-closure" \
            --arg description "$DESCRIPTION" \
            --arg target_url "$TARGET_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
