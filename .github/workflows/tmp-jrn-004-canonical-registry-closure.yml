name: Temporary JRN-004 Canonical Registry Closure

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "tools/scripts/apply-jrn-004-canonical-registry-closure.py"
      - ".github/workflows/tmp-jrn-004-canonical-registry-closure.yml"

permissions:
  contents: write

concurrency:
  group: tmp-jrn-004-canonical-registry-closure
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout latest branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: sambassam
          fetch-depth: 0
      - name: Apply guarded registry patch
        run: python3 tools/scripts/apply-jrn-004-canonical-registry-closure.py
      - name: Remove temporary patch resources
        run: |
          git rm tools/scripts/apply-jrn-004-canonical-registry-closure.py
          git rm .github/workflows/tmp-jrn-004-canonical-registry-closure.yml
      - name: Verify canonical decision
        shell: bash
        run: |
          grep -F '| JRN-004 | اكتشاف المتاجر وسياقها وحوكمتها | DSH | READY_FOR_REVIEW |' governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md
          ! grep -F '| JRN-004 | اكتشاف المتاجر وسياقها وحوكمتها | DSH | NEEDS_EVIDENCE |' governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md
          grep -F 'services/dsh/contracts/jrn-004-slice-verification-registry.json' governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md
          git diff --check
      - name: Commit and push atomic closure
        shell: bash
        run: |
          git config user.name "bthwani-jrn-004-bot"
          git config user.email "actions@users.noreply.github.com"
          git add governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md
          git commit -am "docs(jrn-004): mark canonical journey ready for review"
          git push origin HEAD:sambassam
