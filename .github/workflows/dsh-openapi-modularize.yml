name: DSH OpenAPI Modular Verification

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/dsh-openapi-modularize.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jrn032-fullstack-guard-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-032 full-stack ownership diagnostic
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - name: Checkout immutable JRN-032 verification source
        uses: actions/checkout@v4
        with:
          ref: verify/jrn-032-final2-8e71db5
          fetch-depth: 1
          show-progress: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full-stack guard and persist failure
        run: |
          set +e
          pnpm run guard:fullstack-boundary > "${RUNNER_TEMP}/jrn032-fullstack.log" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 240 "${RUNNER_TEMP}/jrn032-fullstack.log" > governance/evidence/JRN-032_FULLSTACK_GUARD_FAILURE.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add governance/evidence/JRN-032_FULLSTACK_GUARD_FAILURE.log
            git commit -m "diagnostics(jrn-032): capture full-stack guard failure [skip ci]" || true
            git push origin HEAD:verify/jrn-032-final2-8e71db5
            exit "$status"
          fi
