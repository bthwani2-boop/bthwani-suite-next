name: DSH OpenAPI Modular Verification

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/dsh-openapi-modularize.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jrn032-http-diagnostic-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-032 protected HTTP diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout immutable JRN-032 verification source
        uses: actions/checkout@v4
        with:
          ref: verify/jrn-032-final2-8e71db5
          fetch-depth: 1
          show-progress: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Run protected HTTP tests and persist failure
        run: |
          set +e
          (cd services/dsh/backend && go test ./internal/http) > "${RUNNER_TEMP}/jrn032-http.log" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 220 "${RUNNER_TEMP}/jrn032-http.log" > governance/evidence/JRN-032_HTTP_FAILURE.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add governance/evidence/JRN-032_HTTP_FAILURE.log
            git commit -m "diagnostics(jrn-032): capture HTTP test failure [skip ci]" || true
            git push origin HEAD:verify/jrn-032-final2-8e71db5
            exit "$status"
          fi
