name: DSH OpenAPI Modular Verification

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/dsh-openapi-modularize.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jrn032-fullstack-guard-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-032 affected-surface ownership guard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout immutable JRN-032 verification source
        uses: actions/checkout@v4
        with:
          ref: verify/jrn-032-final2-8e71db5
          fetch-depth: 1
          show-progress: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run affected-surface full-stack guard
        env:
          FULLSTACK_GUARD_INCLUDE: services/dsh/frontend/shared/analytics/,services/dsh/frontend/control-panel/analytics/,services/dsh/frontend/app-partner/account/PartnerAnalyticsInsightsPanel.tsx,apps/control-panel/runtime/src/app/dsh/analytics/,apps/app-partner/runtime/src/jrn032-analytics.compile-contract.tsx
        run: pnpm run guard:fullstack-boundary
