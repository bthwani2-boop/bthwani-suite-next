name: DSH OpenAPI Modular Verification

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/dsh-openapi-modularize.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jrn032-isolated-master-runner
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-032 isolated canonical closure
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout immutable JRN-032 verification source
        uses: actions/checkout@v4
        with:
          ref: verify/jrn-032-final2-8e71db5
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Execute deterministic JRN-032 closure
        env:
          JRN032_SOURCE_SHA: ca9d706a9e47fdf711e9babf1aa2aa0ddd4891d7
          JRN032_VERIFICATION_HEAD: verify/jrn-032-final2-8e71db5
        run: bash tools/scripts/jrn032-final-verify.sh
