name: DSH OpenAPI Modular Verification

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/dsh-openapi-modularize.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jrn032-wlt-boundary-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-032 WLT financial ownership guard
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout immutable JRN-032 verification source
        uses: actions/checkout@v4
        with:
          ref: verify/jrn-032-final2-8e71db5
          fetch-depth: 1
          show-progress: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run WLT financial ownership guard
        run: pnpm run guard:wlt-financial-boundary
