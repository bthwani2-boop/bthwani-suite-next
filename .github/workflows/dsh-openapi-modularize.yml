name: DSH OpenAPI Modular Verification

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/dsh-openapi-modularize.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jrn032-focused-types-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-032 focused TypeScript surfaces
    runs-on: macos-14
    timeout-minutes: 35
    steps:
      - name: Checkout immutable JRN-032 verification source
        uses: actions/checkout@v4
        with:
          ref: verify/jrn-032-final2-8e71db5
          fetch-depth: 1
          show-progress: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize canonical JRN-032 contract
        run: |
          node tools/scripts/patch-jrn032-openapi.mjs
          pnpm --dir services/dsh openapi:compose
          pnpm --dir services/dsh openapi:verify

      - name: Typecheck focused DSH analytics surface
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-032.json --noEmit

      - name: Typecheck focused control-panel analytics runtime
        run: |
          set +e
          pnpm --dir apps/control-panel/runtime exec tsc -p tsconfig.jrn-032.json --noEmit > "${RUNNER_TEMP}/jrn032-control-panel.log" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 240 "${RUNNER_TEMP}/jrn032-control-panel.log" > governance/evidence/JRN-032_CONTROL_PANEL_TYPECHECK_FAILURE.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add governance/evidence/JRN-032_CONTROL_PANEL_TYPECHECK_FAILURE.log
            git commit -m "diagnostics(jrn-032): capture control-panel typecheck failure [skip ci]" || true
            git push origin HEAD:verify/jrn-032-final2-8e71db5
            exit "$status"
          fi

      - name: Typecheck focused partner analytics runtime
        run: |
          set +e
          pnpm --dir apps/app-partner/runtime exec tsc -p tsconfig.jrn-032.json --noEmit > "${RUNNER_TEMP}/jrn032-partner.log" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 240 "${RUNNER_TEMP}/jrn032-partner.log" > governance/evidence/JRN-032_PARTNER_TYPECHECK_FAILURE.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add governance/evidence/JRN-032_PARTNER_TYPECHECK_FAILURE.log
            git commit -m "diagnostics(jrn-032): capture partner typecheck failure [skip ci]" || true
            git push origin HEAD:verify/jrn-032-final2-8e71db5
            exit "$status"
          fi
