name: DSH OpenAPI Modular Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "services/dsh/contracts/dsh.openapi.yaml"
      - "services/dsh/contracts/paths/**"
      - "services/dsh/contracts/components/**"
      - "services/dsh/contracts/generated/dsh.bundle.openapi.yaml"
      - "services/dsh/contracts/dsh.modular.manifest.json"
      - "services/dsh/contracts/dsh.contract-ownership.json"
      - "services/dsh/contracts/README.md"
      - "services/dsh/package.json"
      - "services/dsh/tests/dsh-openapi-modular.test.mjs"
      - "services/dsh/clients/generated/dsh-api.ts"
      - "tools/scripts/dsh-openapi-modular-lib.mjs"
      - "tools/scripts/compose-dsh-openapi.mjs"
      - "tools/guards/dsh-openapi-modular-gate.mjs"
      - "tools/scripts/serve-swagger.mjs"
      - "tools/scripts/build-swagger-static.mjs"
      - ".github/workflows/dsh-openapi-modularize.yml"
  pull_request:
    branches: [master]
    paths:
      - "services/dsh/contracts/dsh.openapi.yaml"
      - "services/dsh/contracts/paths/**"
      - "services/dsh/contracts/components/**"
      - "services/dsh/contracts/generated/dsh.bundle.openapi.yaml"
      - "services/dsh/contracts/dsh.modular.manifest.json"
      - "services/dsh/contracts/dsh.contract-ownership.json"
      - "services/dsh/contracts/README.md"
      - "services/dsh/package.json"
      - "services/dsh/tests/dsh-openapi-modular.test.mjs"
      - "services/dsh/clients/generated/dsh-api.ts"
      - "tools/scripts/dsh-openapi-modular-lib.mjs"
      - "tools/scripts/compose-dsh-openapi.mjs"
      - "tools/guards/dsh-openapi-modular-gate.mjs"
      - "tools/scripts/serve-swagger.mjs"
      - "tools/scripts/build-swagger-static.mjs"
      - ".github/workflows/dsh-openapi-modularize.yml"

permissions:
  contents: read

concurrency:
  group: dsh-openapi-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Contract, generated client, and Swagger drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository state
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify modular contract and regenerate client
        run: pnpm --dir services/dsh openapi:verify

      - name: Run contract foundation gate
        run: pnpm run contracts:lint

      - name: Run focused DSH OpenAPI tests
        run: |
          set -o pipefail
          pnpm --dir services/dsh openapi:test 2>&1 | tee dsh-openapi-contract-tests.log

      - name: Upload DSH verification diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dsh-openapi-verification-${{ github.sha }}
          path: dsh-openapi-contract-tests.log
          if-no-files-found: warn
          retention-days: 14

      - name: Build and validate Swagger publication
        run: pnpm run swagger:build

      - name: Reject generated artifact drift
        run: |
          git diff --check
          git diff --exit-code -- \
            services/dsh/contracts/generated/dsh.bundle.openapi.yaml \
            services/dsh/clients/generated/dsh-api.ts
