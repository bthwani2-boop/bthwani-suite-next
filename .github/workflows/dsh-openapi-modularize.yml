name: DSH OpenAPI Modular Verification

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/dsh-openapi-modularize.yml"
      - "tools/scripts/jrn032-final-verify.sh"
      - "tools/scripts/patch-jrn032-openapi.mjs"
      - "governance/evidence/JRN-032_*"
      - "services/dsh/contracts/dsh.openapi.yaml"
      - "services/dsh/contracts/paths/analytics.paths.yaml"
      - "services/dsh/contracts/components/schemas/analytics.schemas.yaml"
      - "services/dsh/backend/internal/analytics/**"
      - "services/dsh/backend/internal/http/analytics.go"
      - "services/dsh/backend/internal/http/jrn032_*"
      - "services/dsh/backend/internal/http/delivery_proof_routes.go"
      - "services/dsh/backend/internal/wlt/analytics_read*"
      - "services/dsh/frontend/shared/analytics/**"
      - "services/dsh/frontend/control-panel/analytics/**"
      - "services/dsh/frontend/app-partner/account/PartnerAnalyticsInsightsPanel.tsx"
      - "apps/control-panel/runtime/src/app/dsh/analytics/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jrn032-final-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-032 canonical contract and full-stack closure
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout immutable PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Execute deterministic JRN-032 closure
        env:
          JRN032_SOURCE_SHA: ca9d706a9e47fdf711e9babf1aa2aa0ddd4891d7
          JRN032_VERIFICATION_HEAD: ${{ github.head_ref || github.ref_name }}
        run: bash tools/scripts/jrn032-final-verify.sh
