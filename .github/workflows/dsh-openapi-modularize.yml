name: DSH OpenAPI Modular Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "services/dsh/contracts/dsh.openapi.yaml"
      - "services/dsh/contracts/paths/**"
      - "services/dsh/contracts/components/**"
      - "services/dsh/contracts/generated/dsh.bundle.openapi.yaml"
      - "services/dsh/contracts/dsh.modular.manifest.json"
      - "services/dsh/contracts/dsh.contract-ownership.json"
      - "services/dsh/contracts/README.md"
      - "services/dsh/package.json"
      - "services/dsh/tests/dsh-openapi-modular.test.mjs"
      - "services/dsh/clients/generated/dsh-api.ts"
      - "tools/scripts/dsh-openapi-modular-lib.mjs"
      - "tools/scripts/compose-dsh-openapi.mjs"
      - "tools/scripts/patch-jrn032-openapi.mjs"
      - "tools/guards/dsh-openapi-modular-gate.mjs"
      - "tools/scripts/serve-swagger.mjs"
      - "tools/scripts/build-swagger-static.mjs"
      - ".github/workflows/dsh-openapi-modularize.yml"
  pull_request:
    branches: [master]
    paths:
      - "services/dsh/contracts/dsh.openapi.yaml"
      - "services/dsh/contracts/paths/**"
      - "services/dsh/contracts/components/**"
      - "services/dsh/contracts/generated/dsh.bundle.openapi.yaml"
      - "services/dsh/contracts/dsh.modular.manifest.json"
      - "services/dsh/contracts/dsh.contract-ownership.json"
      - "services/dsh/contracts/README.md"
      - "services/dsh/package.json"
      - "services/dsh/tests/dsh-openapi-modular.test.mjs"
      - "services/dsh/clients/generated/dsh-api.ts"
      - "services/dsh/backend/internal/analytics/**"
      - "services/dsh/backend/internal/http/analytics.go"
      - "services/dsh/backend/internal/http/jrn032_*"
      - "services/dsh/backend/internal/http/delivery_proof_routes.go"
      - "services/dsh/backend/internal/wlt/analytics_read*"
      - "services/dsh/frontend/shared/analytics/**"
      - "services/dsh/frontend/control-panel/analytics/**"
      - "services/dsh/frontend/app-partner/account/PartnerAnalyticsInsightsPanel.tsx"
      - "apps/control-panel/runtime/src/app/dsh/analytics/**"
      - "governance/evidence/JRN-032_*"
      - "tools/scripts/dsh-openapi-modular-lib.mjs"
      - "tools/scripts/compose-dsh-openapi.mjs"
      - "tools/scripts/patch-jrn032-openapi.mjs"
      - "tools/guards/dsh-openapi-modular-gate.mjs"
      - "tools/scripts/serve-swagger.mjs"
      - "tools/scripts/build-swagger-static.mjs"
      - ".github/workflows/dsh-openapi-modularize.yml"

permissions:
  contents: write

concurrency:
  group: dsh-openapi-jrn032-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-032 canonical contract and full-stack closure
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout immutable PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Register JRN-032 paths in canonical OpenAPI root
        run: node tools/scripts/patch-jrn032-openapi.mjs

      - name: Format governed Go files
        working-directory: services/dsh/backend
        run: |
          gofmt -w \
            internal/analytics/analytics.go \
            internal/analytics/jrn032_window.go \
            internal/analytics/jrn032_preparation.go \
            internal/analytics/jrn032_people.go \
            internal/analytics/jrn032_drilldown.go \
            internal/analytics/jrn032_window_test.go \
            internal/analytics/jrn032_drilldown_test.go \
            internal/http/analytics.go \
            internal/http/jrn032_analytics.go \
            internal/http/jrn032_routes.go \
            internal/http/jrn032_routes_test.go \
            internal/http/delivery_proof_routes.go \
            internal/wlt/analytics_read.go \
            internal/wlt/analytics_read_test.go

      - name: Verify modular contract and regenerate client
        run: pnpm --dir services/dsh openapi:verify

      - name: Materialize generated contract and formatting
        run: |
          if git diff --quiet; then
            echo "No generated or formatting changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add services/dsh/contracts/dsh.openapi.yaml \
                    services/dsh/contracts/generated/dsh.bundle.openapi.yaml \
                    services/dsh/clients/generated/dsh-api.ts \
                    services/dsh/backend/internal/analytics \
                    services/dsh/backend/internal/http/analytics.go \
                    services/dsh/backend/internal/http/jrn032_analytics.go \
                    services/dsh/backend/internal/http/jrn032_routes.go \
                    services/dsh/backend/internal/http/jrn032_routes_test.go \
                    services/dsh/backend/internal/http/delivery_proof_routes.go \
                    services/dsh/backend/internal/wlt/analytics_read.go \
                    services/dsh/backend/internal/wlt/analytics_read_test.go
            git commit -m "chore(jrn-032): materialize canonical analytics contract [skip ci]"
            git pull --rebase origin "${{ github.head_ref || github.ref_name }}"
            git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
          fi

      - name: Run analytics backend tests
        working-directory: services/dsh/backend
        run: go test ./internal/analytics ./internal/wlt ./internal/http

      - name: Typecheck DSH surfaces
        run: pnpm --dir services/dsh typecheck

      - name: Typecheck control panel runtime
        run: pnpm --dir apps/control-panel/runtime typecheck

      - name: Typecheck partner runtime
        run: pnpm --dir apps/app-partner/runtime typecheck

      - name: Run full-stack and WLT ownership guards
        run: |
          pnpm run guard:fullstack-boundary
          pnpm run guard:wlt-financial-boundary

      - name: Run contract foundation gate
        run: pnpm run contracts:lint

      - name: Run focused DSH OpenAPI tests
        run: pnpm --dir services/dsh openapi:test

      - name: Build and validate Swagger publication
        run: pnpm run swagger:build

      - name: Reject generated artifact drift
        run: git diff --exit-code -- services/dsh/contracts/generated/dsh.bundle.openapi.yaml services/dsh/clients/generated/dsh-api.ts

      - name: Record final remote verification evidence
        env:
          VERIFIED_SOURCE_SHA: ca9d706a9e47fdf711e9babf1aa2aa0ddd4891d7
          VERIFIED_HEAD: ${{ github.head_ref || github.ref_name }}
          VERIFIED_RUN_ID: ${{ github.run_id }}
          VERIFIED_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          verified_at = datetime.now(timezone.utc).isoformat()
          registry_path = Path("governance/evidence/JRN-032_SLICE_VERIFICATION.json")
          registry = json.loads(registry_path.read_text(encoding="utf-8"))
          for item in registry["slices"]:
              item["status"] = "verified_remote"
          registry["formalDecision"] = "TECHNICALLY_CLOSED_PENDING_INDEPENDENT_ACCEPTANCE"
          registry["remoteVerification"] = {
              "sourceSha": os.environ["VERIFIED_SOURCE_SHA"],
              "verificationHead": os.environ["VERIFIED_HEAD"],
              "workflowRunId": int(os.environ["VERIFIED_RUN_ID"]),
              "runAttempt": int(os.environ["VERIFIED_RUN_ATTEMPT"]),
              "verifiedAt": verified_at,
              "checks": [
                  "canonical OpenAPI root composition",
                  "generated DSH bundle and TypeScript client",
                  "Go analytics WLT and HTTP tests",
                  "DSH control-panel and partner typechecks",
                  "full-stack and WLT ownership guards",
                  "repository contract lint",
                  "focused OpenAPI tests and Swagger publication",
                  "zero generated artifact drift"
              ]
          }
          registry_path.write_text(json.dumps(registry, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          Path("governance/evidence/JRN-032_FINAL_REMOTE_VERIFICATION.md").write_text(f"""# JRN-032 Final Remote Verification

- repository_mode: REMOTE_ONLY
- source_branch: sambassam
- verified_source_sha: {os.environ['VERIFIED_SOURCE_SHA']}
- verification_head: {os.environ['VERIFIED_HEAD']}
- workflow_run_id: {os.environ['VERIFIED_RUN_ID']}
- run_attempt: {os.environ['VERIFIED_RUN_ATTEMPT']}
- verified_at: {verified_at}
- technical_decision: TECHNICALLY_CLOSED_PENDING_INDEPENDENT_ACCEPTANCE

## Passed technical checks

- Canonical OpenAPI root composition and generated DSH bundle/client.
- Analytics, WLT read-only boundary, and protected HTTP route tests.
- DSH, control-panel, and partner TypeScript typechecks.
- Full-stack and financial ownership guards.
- Repository contract lint.
- Focused OpenAPI tests and Swagger build.
- Zero generated artifact drift after generation.

## Independent gates

Product Manager, Product Owner, financial-control, deployment, and live-environment acceptance remain independent and are not self-approved by engineering automation.
""", encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/evidence/JRN-032_SLICE_VERIFICATION.json governance/evidence/JRN-032_FINAL_REMOTE_VERIFICATION.md
          git commit -m "docs(jrn-032): record final remote verification [skip ci]"
          git pull --rebase origin "${{ github.head_ref || github.ref_name }}"
          git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
