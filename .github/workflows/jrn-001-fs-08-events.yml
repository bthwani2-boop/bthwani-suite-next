name: JRN-001 FS-08 Events and Reconciliation

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/database/migrations/dsh-101_partner_wlt_outbox_reconciliation.sql
      - services/dsh/backend/internal/partnerwltoutbox/**
      - services/dsh/backend/internal/wlt/payout_destination.go
      - services/dsh/backend/cmd/dsh-api/main.go
      - services/dsh/tests/jrn-001-fs-08-events.test.mjs
      - .github/workflows/jrn-001-fs-08-events.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dsh_jrn001
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U postgres -d dsh_jrn001"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dsh_jrn001?sslmode=disable
      DSH_REQUIRE_DB_TESTS: "true"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.26.5'
          cache-dependency-path: services/dsh/backend/go.sum
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply DSH migrations
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration" >/dev/null
          done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Verify outbox schema contains no raw payout columns
        shell: bash
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF to_regclass('public.dsh_partner_wlt_outbox') IS NULL THEN
              RAISE EXCEPTION 'missing partner WLT outbox';
            END IF;
            IF to_regclass('public.dsh_partner_wlt_reconciliation_cases') IS NULL THEN
              RAISE EXCEPTION 'missing partner WLT reconciliation cases';
            END IF;
            IF EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_name IN ('dsh_partner_wlt_outbox','dsh_partner_wlt_reconciliation_cases')
                AND column_name IN ('account_number','iban','payout_mobile_number')
            ) THEN
              RAISE EXCEPTION 'raw payout column leaked into DSH event storage';
            END IF;
          END $$;
          SQL
      - name: Verify Go formatting
        shell: bash
        run: |
          test -z "$(gofmt -l \
            services/dsh/backend/internal/partnerwltoutbox/outbox.go \
            services/dsh/backend/internal/partnerwltoutbox/outbox_db_test.go \
            services/dsh/backend/internal/wlt/payout_destination.go \
            services/dsh/backend/cmd/dsh-api/main.go)"
      - name: Compile partner WLT worker and client
        working-directory: services/dsh/backend
        run: go test ./internal/partnerwltoutbox ./internal/wlt ./cmd/dsh-api
      - name: Run event, retry, and reconciliation DB integration tests
        working-directory: services/dsh/backend
        run: go test ./internal/partnerwltoutbox -count=1 -run 'TestPartnerDeactivationTriggerAndOutboxDeliveryDBIntegration|TestPartnerWltReconciliationCreatesAndResolvesMaskedReadbackCaseDBIntegration'
      - name: Verify event and worker wiring
        run: node services/dsh/tests/jrn-001-fs-08-events.test.mjs
      - name: Publish FS-08 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then
            STATE=success
            DESCRIPTION='FS-08 events and reconciliation verified'
          else
            STATE=failure
            DESCRIPTION='FS-08 events or reconciliation failed'
          fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-08-events-reconciliation' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
