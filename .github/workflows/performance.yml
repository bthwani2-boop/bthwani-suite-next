name: Performance Governance

on:
  workflow_dispatch:
    inputs:
      run_k6:
        description: "Run k6 API smoke tests"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_lighthouse:
        description: "Run Lighthouse CI for control panel"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [implementing, journy, master, sam, "fix/lian-sovereign-final-closure"]
    paths:
      - "tools/performance/**"
      - "tools/guards/heavy-import-gate.mjs"
      - "tools/guards/bundle-budget-gate.mjs"
      - "tools/guards/performance-budget-gate.mjs"
      - "services/**/backend/**/*.go"
      - "apps/control-panel/**"
      - "infra/docker/scripts/runtime.ps1"
      - "services/wlt/database/migrations/**"
      - ".github/workflows/performance.yml"
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  static-perf-gates:
    name: Static Performance Gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.34.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard — Performance budget config
        run: pnpm run guard:performance-budget

      - name: Guard — Heavy imports
        run: pnpm run guard:heavy-imports

      - name: Guard — Bundle budget analysis
        run: pnpm run guard:bundle-budget
        continue-on-error: true

      - name: Generate performance report
        run: pnpm run diagnostics:performance

      - name: Upload performance report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: performance-report
          path: .diagnostics/performance/performance-summary.md
          retention-days: 30

  go-benchmarks:
    name: Go Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "services/dsh/backend/go.mod"
          cache: true

      - name: Go benchmarks — DSH
        run: |
          cd services/dsh/backend
          go test -bench=. -benchmem -benchtime=2s -count=1 ./... 2>&1 | tee /tmp/dsh-benchmarks.txt

      - name: Go benchmarks — WLT
        run: |
          cd services/wlt/backend
          go test -bench=. -benchmem -benchtime=2s -count=1 ./... 2>&1 | tee /tmp/wlt-benchmarks.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: go-benchmarks
          path: /tmp/*-benchmarks.txt
          retention-days: 30

  k6-api-smoke:
    name: k6 API Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.inputs.run_k6 == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup PNPM
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.34.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start runtime
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 -Action reset -Force -Profiles identity,workforce,dsh,wlt,financial-simulators

      - name: Setup k6
        uses: grafana/setup-k6-action@85119162329017cffa5e1450d8caef5780543201

      - name: k6 — DSH API smoke
        run: k6 run tools/performance/k6/dsh-smoke.js
        env:
          BASE_URL: http://localhost:58080

      - name: k6 — WLT API smoke
        run: k6 run tools/performance/k6/wlt-smoke.js
        env:
          BASE_URL: http://localhost:58083

      - name: k6 — Identity smoke
        run: k6 run tools/performance/k6/identity-smoke.js
        env:
          BASE_URL: http://localhost:58082

      - name: Docker compose logs on failure
        if: failure()
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.financial-simulators.yml logs --tail=200 | tee /tmp/docker-logs.txt

      - name: Upload docker logs artifact
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: k6-docker-logs-${{ github.run_id }}
          path: /tmp/docker-logs.txt
          retention-days: 7

      - name: Docker compose down
        if: always()
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.financial-simulators.yml down -v --remove-orphans

  lighthouse-ci:
    name: Lighthouse CI — Control Panel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.inputs.run_lighthouse == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.34.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build control-panel
        run: pnpm --dir apps/control-panel/runtime run build
        env:
          NODE_ENV: production

      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun --config=tools/performance/web/lighthouserc.cjs
        working-directory: apps/control-panel/runtime
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
