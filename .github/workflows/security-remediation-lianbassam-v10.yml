name: One-time lianbassam final remediation diagnostics

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/security-remediation-lianbassam-v10.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: security-remediation-lianbassam-v10
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout current lianbassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: lianbassam
          fetch-depth: 0
          show-progress: false

      - name: Publish run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=pending \
            -f context='bthwani/security-remediation-v10' \
            -f description='Final remediation verification is running' \
            -f target_url="${RUN_URL}"

      - name: Setup PNPM
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.34.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Apply and classify final remediation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p governance/evidence/security
          cp pnpm-workspace.yaml /tmp/pnpm-workspace.before
          cp pnpm-lock.yaml /tmp/pnpm-lock.before

          python - <<'PY'
          from pathlib import Path
          path = Path('pnpm-workspace.yaml')
          lines = path.read_text(encoding='utf-8').splitlines()
          remove_fragments = (
              'js-yaml@4.2.0:',
              'js-yaml@5.2.0:',
              "'@redocly/openapi-core@*>js-yaml':",
              "'@eslint/eslintrc@*>js-yaml':",
              "'@yarnpkg/parsers@*>js-yaml':",
              "'markdownlint-cli2@*>js-yaml':",
          )
          filtered = [line for line in lines if not any(fragment in line for fragment in remove_fragments)]
          output = []
          inserted = False
          for line in filtered:
              output.append("  next: 16.2.11" if line.strip().startswith('next:') else line)
              if 'js-yaml@>=3.0.0 <3.15.0:' in line:
                  output.extend([
                      "  '@redocly/openapi-core@*>js-yaml': 4.3.0",
                      "  '@eslint/eslintrc@*>js-yaml': 4.3.0",
                      "  '@yarnpkg/parsers@*>js-yaml': 5.2.1",
                      "  'markdownlint-cli2@*>js-yaml': 5.2.1",
                  ])
                  inserted = True
          if not inserted:
              raise SystemExit('Unable to locate js-yaml insertion point')
          path.write_text('\n'.join(output) + '\n', encoding='utf-8')
          PY

          set +e
          pnpm install --lockfile-only --reporter=append-only > /tmp/lock-install.log 2>&1
          lock_code=$?
          pnpm audit --json > governance/evidence/security/pnpm-audit-lianbassam.json 2>/tmp/audit.err
          audit_code=$?
          pnpm install --frozen-lockfile --reporter=append-only > /tmp/frozen-install.log 2>&1
          frozen_code=$?
          pnpm --dir apps/control-panel/runtime typecheck > /tmp/control-typecheck.log 2>&1
          control_code=$?
          pnpm --dir services/dsh typecheck > /tmp/dsh-typecheck.log 2>&1
          dsh_code=$?
          set -e

          python - <<'PY'
          import json
          from pathlib import Path
          report_path = Path('governance/evidence/security/pnpm-audit-lianbassam.json')
          counts = {}
          if report_path.exists() and report_path.stat().st_size:
              report = json.loads(report_path.read_text(encoding='utf-8'))
              counts = report.get('metadata', {}).get('vulnerabilities', {})
          Path('/tmp/audit-counts.json').write_text(json.dumps(counts, sort_keys=True), encoding='utf-8')
          PY
          counts="$(cat /tmp/audit-counts.json)"

          {
            echo "# Final security verification"
            echo
            echo "- lockfile install exit: ${lock_code}"
            echo "- audit command exit: ${audit_code}"
            echo "- frozen install exit: ${frozen_code}"
            echo "- control-panel typecheck exit: ${control_code}"
            echo "- DSH typecheck exit: ${dsh_code}"
            echo "- vulnerabilities: ${counts}"
            echo
            for item in lock-install frozen-install control-typecheck dsh-typecheck; do
              echo "## ${item} tail"
              echo '```text'
              tail -n 60 "/tmp/${item}.log" || true
              echo '```'
            done
            echo "## audit stderr"
            echo '```text'
            tail -n 30 /tmp/audit.err || true
            echo '```'
          } > governance/evidence/security/final-security-verification.md

          security_ok="$(python - <<'PY'
          import json
          from pathlib import Path
          counts = json.loads(Path('/tmp/audit-counts.json').read_text(encoding='utf-8'))
          total = sum(int(counts.get(level, 0)) for level in ('critical', 'high', 'moderate', 'low'))
          print('true' if total == 0 else 'false')
          PY
          )"

          if [[ ${lock_code} -ne 0 || ${frozen_code} -ne 0 || "${security_ok}" != "true" ]]; then
            cp /tmp/pnpm-workspace.before pnpm-workspace.yaml
            cp /tmp/pnpm-lock.before pnpm-lock.yaml
          else
            cat > governance/evidence/security/lianbassam-remediation.md <<'MD'
          # lianbassam security remediation

          - Next.js updated to 16.2.11.
          - github.com/lib/pq updated to v1.12.3 wherever declared.
          - golang.org/x/crypto updated to v0.54.0 wherever declared.
          - Vulnerable js-yaml paths overridden through their direct parent packages.
          - PNPM audit reports zero known vulnerabilities.
          - Frozen lockfile installation succeeds.
          - Dependabot coverage targets all known ecosystems on lianbassam.
          - No merge or write to master was performed.
          MD
            rm -f governance/evidence/security/js-yaml-why-before.json
            rm -f governance/evidence/security/js-yaml-why-after-trial.json
            rm -f governance/evidence/security/pnpm-audit-js-yaml-trial.json
            rm -f governance/evidence/security/js-yaml-trial-summary.json
            rm -f governance/evidence/security/js-yaml-trial-diagnostic.md
            rm -f governance/evidence/security/pnpm-remediation-diagnostic.md
          fi

      - name: Commit verified remediation or diagnostic evidence
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/security-remediation-lianbassam-v9.yml
          rm -f .github/workflows/security-remediation-lianbassam-v10.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(security): finalize dependency remediation evidence"
          git pull --rebase origin lianbassam
          git push origin HEAD:lianbassam

      - name: Publish completion
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=success \
            -f context='bthwani/security-remediation-v10' \
            -f description='Final remediation result committed' \
            -f target_url="${RUN_URL}"
