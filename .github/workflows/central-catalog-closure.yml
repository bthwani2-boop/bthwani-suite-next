name: Central Catalog Verification

on:
  push:
    branches:
      - bassam
      - master
      - "fix/lian-sovereign-final-closure"
    paths:
      - "services/dsh/database/**"
      - "services/dsh/backend/internal/centralcatalog/**"
      - "services/dsh/backend/internal/http/catalog*.go"
      - "services/dsh/contracts/**"
      - "services/dsh/frontend/shared/catalog/**"
      - "services/dsh/tests/central-catalog-closure.test.mjs"
      - "infra/data-plane/postgres/init/001_create_runtime_databases.sh"
      - "infra/docker/scripts/schema-migration-runner.ps1"
      - "tools/scripts/invoke-database-upgrade-truth.ps1"
      - "tools/scripts/scan-legacy-catalog-references.mjs"
      - ".github/workflows/central-catalog-closure.yml"
  pull_request:
    branches: [master]
    paths:
      - "services/dsh/database/**"
      - "services/dsh/backend/internal/centralcatalog/**"
      - "services/dsh/backend/internal/http/catalog*.go"
      - "services/dsh/contracts/**"
      - "services/dsh/frontend/shared/catalog/**"
      - "services/dsh/tests/central-catalog-closure.test.mjs"
      - "infra/data-plane/postgres/init/001_create_runtime_databases.sh"
      - "infra/docker/scripts/schema-migration-runner.ps1"
      - "tools/scripts/invoke-database-upgrade-truth.ps1"
      - "tools/scripts/scan-legacy-catalog-references.mjs"
      - ".github/workflows/central-catalog-closure.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: central-catalog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-closure:
    name: Central catalog governed database truth
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
          POSTGRES_PASSWORD: bthwani_runtime_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bthwani_runtime -d bthwani_runtime"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install PostgreSQL client
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Initialize governed runtime databases
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGPASSWORD: bthwani_runtime_password
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
        shell: bash
        run: sh infra/data-plane/postgres/init/001_create_runtime_databases.sh

      - name: Run DSH clean install invariants and idempotent ledger
        env:
          DATABASE_URL: postgres://dsh_runtime:bthwani_runtime_password@localhost:5432/dsh_runtime?sslmode=disable
          PGPASSWORD: bthwani_runtime_password
        shell: pwsh
        run: |
          ./tools/scripts/invoke-database-upgrade-truth.ps1 `
            -ServiceName dsh `
            -MigrationDirectory services/dsh/database/migrations `
            -TestsDirectory services/dsh/database/tests `
            -DatabaseUrl $env:DATABASE_URL `
            -SourceCommitSha $env:GITHUB_SHA

      - name: Apply central catalog local verification seeds
        env:
          PGPASSWORD: bthwani_runtime_password
          DATABASE_URL: postgres://dsh_runtime:bthwani_runtime_password@localhost:5432/dsh_runtime?sslmode=disable
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r seed; do
            psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -f "$seed"
          done < <(find services/dsh/database/seeds/local -maxdepth 1 -type f -name '*.sql' | sort)

  legacy-and-static:
    name: Legacy reference scan and central catalog static tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Scan legacy local-catalog references
        run: node tools/scripts/scan-legacy-catalog-references.mjs

      - name: Run central catalog static tests
        run: node --test services/dsh/tests/central-catalog-closure.test.mjs

      - name: Verify sovereign overlay and generated facade
        run: node tools/scripts/generate-dsh-catalog-client.mjs --check

  catalog-result:
    name: Central catalog verification result
    if: always()
    needs: [migration-closure, legacy-and-static]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require every catalog domain to pass
        env:
          MIGRATION: ${{ needs.migration-closure.result }}
          STATIC: ${{ needs.legacy-and-static.result }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'migration=%s\nlegacy-static=%s\n' "$MIGRATION" "$STATIC"
          test "$MIGRATION" = success
          test "$STATIC" = success
