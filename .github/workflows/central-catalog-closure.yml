name: Central Catalog Verification

on:
  push:
    branches: [bassam, master]
    paths:
      - "services/dsh/database/**"
      - "services/dsh/backend/internal/catalog/**"
      - "services/dsh/backend/internal/http/catalog*.go"
      - "services/dsh/contracts/**"
      - "services/dsh/frontend/shared/catalog/**"
      - "services/dsh/tests/central-catalog-closure.test.mjs"
      - "infra/data-plane/postgres/init/001_create_runtime_databases.sh"
      - "tools/scripts/test-central-catalog-migration.ps1"
      - "tools/scripts/scan-legacy-catalog-references.mjs"
      - ".github/workflows/central-catalog-closure.yml"
  pull_request:
    branches: [master]
    paths:
      - "services/dsh/database/**"
      - "services/dsh/backend/internal/catalog/**"
      - "services/dsh/backend/internal/http/catalog*.go"
      - "services/dsh/contracts/**"
      - "services/dsh/frontend/shared/catalog/**"
      - "services/dsh/tests/central-catalog-closure.test.mjs"
      - "infra/data-plane/postgres/init/001_create_runtime_databases.sh"
      - "tools/scripts/test-central-catalog-migration.ps1"
      - "tools/scripts/scan-legacy-catalog-references.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: central-catalog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-closure:
    name: Central catalog migration fresh legacy and double-run
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
          POSTGRES_PASSWORD: bthwani_runtime_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bthwani_runtime -d bthwani_runtime"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Initialize runtime databases
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGPASSWORD: bthwani_runtime_password
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
        run: sh infra/data-plane/postgres/init/001_create_runtime_databases.sh
      - name: Run catalog migration closure test
        shell: pwsh
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGPASSWORD: bthwani_runtime_password
        run: ./tools/scripts/test-central-catalog-migration.ps1 -PsqlMode native
      - name: Apply all DSH migrations twice
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGPASSWORD: bthwani_runtime_password
        shell: bash
        run: |
          set -euo pipefail
          for pass in 1 2; do
            echo "Migration pass $pass"
            while IFS= read -r migration; do
              psql -h localhost -U dsh_runtime -d dsh_runtime -v ON_ERROR_STOP=1 -f "$migration"
            done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
          done
      - name: Apply central catalog local verification seeds
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGPASSWORD: bthwani_runtime_password
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r seed; do
            psql -h localhost -U dsh_runtime -d dsh_runtime -v ON_ERROR_STOP=1 -f "$seed"
          done < <(find services/dsh/database/seeds/local -maxdepth 1 -type f -name '*.sql' | sort)

  legacy-and-static:
    name: Legacy reference scan and central catalog static tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.17.0
      - name: Scan legacy local-catalog references
        run: node tools/scripts/scan-legacy-catalog-references.mjs
      - name: Run central catalog static tests
        run: node --test services/dsh/tests/central-catalog-closure.test.mjs

  catalog-result:
    name: Central catalog verification result
    if: always()
    needs: [migration-closure, legacy-and-static]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require both catalog jobs to pass
        env:
          MIGRATION: ${{ needs.migration-closure.result }}
          STATIC: ${{ needs.legacy-and-static.result }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'migration=%s\nlegacy-static=%s\n' "$MIGRATION" "$STATIC"
          test "$MIGRATION" = success
          test "$STATIC" = success
