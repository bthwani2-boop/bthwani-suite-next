name: Partner delivery verification
run-name: Partner delivery verification · ${{ github.sha }}

on:
  push:
    branches: [sambassam]
    paths: &jrn016_paths
      - ".github/workflows/partner-delivery-verification.yml"
      - "governance/product/contracts/jrn-016-partner-delivery.product-truth.json"
      - "services/dsh/backend/internal/http/partner_delivery*.go"
      - "services/dsh/backend/internal/http/delivery_proof_upload.go"
      - "services/dsh/backend/internal/partnerdelivery/**"
      - "services/dsh/contracts/dsh.partner-delivery.openapi.yaml"
      - "services/dsh/contracts/dsh.delivery-proof-media.openapi.yaml"
      - "services/dsh/contracts/jrn-016-slice-closure.json"
      - "services/dsh/contracts/contract-registry.ts"
      - "services/dsh/database/migrations/dsh-116_partner_delivery_command_idempotency_and_exception_evidence.sql"
      - "services/dsh/frontend/shared/partner-delivery/**"
      - "services/dsh/frontend/shared/media/pod/delivery-proof-media.api.ts"
      - "services/dsh/frontend/shared/orders/use-client-order-journey-controller.ts"
      - "services/dsh/frontend/app-partner/orders/PartnerFulfillmentActionsPanel.tsx"
      - "services/dsh/frontend/control-panel/operations/PartnerDeliveryWorkbenchScreen.tsx"
      - "services/dsh/tests/jrn-016-partner-delivery-closure.test.mjs"
  pull_request:
    paths: *jrn016_paths
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: partner-delivery-${{ github.sha }}
  cancel-in-progress: false

jobs:
  database-and-backend:
    name: JRN-016 database and backend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsh_partner_delivery
          POSTGRES_USER: dsh_partner_delivery
          POSTGRES_PASSWORD: dsh_partner_delivery
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U dsh_partner_delivery -d dsh_partner_delivery"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DSH_DATABASE_URL: postgres://dsh_partner_delivery:dsh_partner_delivery@localhost:55432/dsh_partner_delivery?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Check JRN-016 Go formatting
        shell: bash
        run: |
          set -euo pipefail
          files=(
            services/dsh/backend/internal/http/partner_delivery.go
            services/dsh/backend/internal/http/partner_delivery_client.go
            services/dsh/backend/internal/http/delivery_proof_upload.go
            services/dsh/backend/internal/partnerdelivery/partnerdelivery.go
            services/dsh/backend/internal/partnerdelivery/service.go
            services/dsh/backend/internal/partnerdelivery/command_receipts.go
            services/dsh/backend/internal/partnerdelivery/lifecycle_commands.go
            services/dsh/backend/internal/partnerdelivery/exception_commands.go
            services/dsh/backend/internal/partnerdelivery/jrn016_commands_db_test.go
            services/dsh/backend/internal/partnerdelivery/partnerdelivery_db_test.go
          )
          test -z "$(gofmt -l "${files[@]}")"
      - name: Compile partner delivery and protected HTTP boundaries
        shell: bash
        run: |
          set -euo pipefail
          cd services/dsh/backend
          go test ./internal/partnerdelivery ./internal/http -run '^$' -count=1
      - name: Apply all DSH migrations to a clean database
        shell: bash
        run: |
          set -euo pipefail
          for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" >/dev/null
          done
      - name: Prove command replay and exception evidence
        shell: bash
        run: |
          set -euo pipefail
          cd services/dsh/backend
          DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" \
            go test ./internal/partnerdelivery \
              -run '^(TestPartnerDeliveryCommandReplayDBIntegration|TestPartnerDeliveryExceptionEvidenceDBIntegration)$' \
              -count=1 -v

  contract-and-surfaces:
    name: JRN-016 contract and surfaces
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Enable pinned pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate contract registry and OpenAPI metadata
        run: pnpm run contracts:lint
      - name: Prove JRN-016 source bindings and slice registry
        run: node --test services/dsh/tests/jrn-016-partner-delivery-closure.test.mjs
      - name: Typecheck DSH shared brain and all surfaces
        run: pnpm --dir services/dsh exec tsc -p tsconfig.json --noEmit --pretty false
      - name: Verify UI and full-stack boundaries
        shell: bash
        run: |
          set -euo pipefail
          pnpm run guard:ui-kit-boundary
          pnpm run guard:fullstack-boundary
