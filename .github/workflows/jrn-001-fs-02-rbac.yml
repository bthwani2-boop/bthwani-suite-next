name: JRN-001 FS-02 RBAC and Surfaces

on:
  push:
    branches: [sambassam]
    paths:
      - governance/product/contracts/jrn-001-partner-onboarding-store-publication.product-truth.json
      - services/dsh/backend/internal/http/protected_store.go
      - services/dsh/backend/internal/http/partner_lifecycle_routes.go
      - services/dsh/backend/internal/partner/onboarding_integrity_handlers.go
      - services/dsh/backend/internal/partner/onboarding_integrity_repository.go
      - services/dsh/database/migrations/dsh-098_partner_onboarding_integrity.sql
      - services/dsh/tests/jrn-001-fs-02-rbac.test.mjs
      - .github/workflows/jrn-001-fs-02-rbac.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Verify FS-02 actor and surface enforcement
        run: node services/dsh/tests/jrn-001-fs-02-rbac.test.mjs
      - name: Publish FS-02 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then
            STATE=success
            DESCRIPTION='FS-02 RBAC and surfaces verified'
          else
            STATE=failure
            DESCRIPTION='FS-02 RBAC and surfaces failed'
          fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-02-rbac-surfaces' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
