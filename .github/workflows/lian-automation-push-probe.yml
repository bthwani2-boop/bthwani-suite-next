name: Probe Automation Branch Push

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-automation-push-probe.yml"

permissions:
  contents: write
  statuses: write

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Publish probe locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jq -n --arg state pending --arg context bthwani/automation-push-probe \
            --arg description "probing isolated branch push" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body -X POST -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" --data-binary @/tmp/status.json
      - name: Checkout automation branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: automation/rich-support-contract-generation
          fetch-depth: 0
          persist-credentials: true
      - name: Probe push
        id: push
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p .diagnostics
          printf '%s\n' "${GITHUB_RUN_ID}" > .diagnostics/automation-push-probe.txt
          git config user.name "bthwani-push-probe-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f .diagnostics/automation-push-probe.txt
          git commit -m "diagnostics: probe automation branch push"
          git push origin HEAD:automation/rich-support-contract-generation > /tmp/push.log 2>&1
      - name: Stage probe log
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/push-probe
          cp /tmp/push.log artifacts/push-probe/push.log 2>/dev/null || printf '%s\n' 'push command did not create a log' > artifacts/push-probe/push.log
          printf '%s\n' "outcome=${{ steps.push.outcome }}" > artifacts/push-probe/outcome.txt
      - name: Upload probe log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: automation-push-probe-${{ github.sha }}
          path: artifacts/push-probe
          if-no-files-found: error
          retention-days: 1
      - name: Fail closed on rejected push
        if: always()
        shell: bash
        run: test "${{ steps.push.outcome }}" = success
