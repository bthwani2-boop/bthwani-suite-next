name: One-time Closure Maintenance

on:
  push:
    branches: [reem]
    paths:
      - '.github/workflows/one-time-closure-maintenance.yml'

permissions:
  contents: write

concurrency:
  group: one-time-closure-maintenance-reem
  cancel-in-progress: false

jobs:
  apply-maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reem
        uses: actions/checkout@v4
        with:
          ref: reem
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod

      - name: Remove unreachable branch and apply canonical formatting
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('services/dsh/backend/internal/partner/model.go')
          text = path.read_text(encoding='utf-8')
          old = '''\tdefault:\n\t\treturn ErrInvalid\n\t}\n\treturn nil\n}'''
          new = '''\tdefault:\n\t\treturn ErrInvalid\n\t}\n}'''
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected exactly one unreachable return block, found {count}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

          gofmt -w \
            services/dsh/backend/internal/partner/model.go \
            services/wlt/backend/cmd/wlt-api/main.go \
            services/wlt/backend/internal/cod/cod.go \
            services/wlt/backend/internal/cod/cod_test.go \
            services/wlt/backend/internal/http/server.go \
            services/wlt/backend/internal/ledger/ledger.go \
            services/wlt/backend/internal/reference/handler.go \
            services/wlt/backend/internal/reference/model.go \
            services/wlt/backend/internal/reference/repository.go

          test -z "$(gofmt -l services/dsh/backend/internal/partner/model.go)"
          test -z "$(gofmt -l \
            services/wlt/backend/cmd/wlt-api/main.go \
            services/wlt/backend/internal/cod/cod.go \
            services/wlt/backend/internal/cod/cod_test.go \
            services/wlt/backend/internal/http/server.go \
            services/wlt/backend/internal/ledger/ledger.go \
            services/wlt/backend/internal/reference/handler.go \
            services/wlt/backend/internal/reference/model.go \
            services/wlt/backend/internal/reference/repository.go)"

      - name: Commit maintenance result
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No maintenance changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            services/dsh/backend/internal/partner/model.go \
            services/wlt/backend/cmd/wlt-api/main.go \
            services/wlt/backend/internal/cod/cod.go \
            services/wlt/backend/internal/cod/cod_test.go \
            services/wlt/backend/internal/http/server.go \
            services/wlt/backend/internal/ledger/ledger.go \
            services/wlt/backend/internal/reference/handler.go \
            services/wlt/backend/internal/reference/model.go \
            services/wlt/backend/internal/reference/repository.go
          git commit -m 'chore(closure): apply canonical Go formatting and remove unreachable code'
          git push origin HEAD:reem
