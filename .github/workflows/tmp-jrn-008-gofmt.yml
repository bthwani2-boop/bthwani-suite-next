name: Temporary JRN-008 Go Format

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-jrn-008-gofmt.yml"
      - "services/dsh/backend/internal/centralcatalog/catalog_governance.go"
      - "services/dsh/backend/internal/centralcatalog/catalog_pause_readback.go"
      - "services/dsh/backend/internal/http/catalog_governance_handlers.go"
      - "services/dsh/backend/internal/http/catalog_governance_routes_test.go"
      - "services/dsh/backend/internal/http/catalog_unified_routes.go"

permissions:
  contents: write

concurrency:
  group: tmp-jrn-008-gofmt-sambassam
  cancel-in-progress: false

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout sambassam
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: sambassam
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: false
      - name: Apply gofmt and push only when changed
        shell: bash
        run: |
          set -euo pipefail
          gofmt -w \
            services/dsh/backend/internal/centralcatalog/catalog_governance.go \
            services/dsh/backend/internal/centralcatalog/catalog_pause_readback.go \
            services/dsh/backend/internal/centralcatalog/catalog_governance_test.go \
            services/dsh/backend/internal/http/catalog_governance_handlers.go \
            services/dsh/backend/internal/http/catalog_governance_routes_test.go \
            services/dsh/backend/internal/http/catalog_unified_routes.go
          if git diff --quiet -- \
            services/dsh/backend/internal/centralcatalog/catalog_governance.go \
            services/dsh/backend/internal/centralcatalog/catalog_pause_readback.go \
            services/dsh/backend/internal/centralcatalog/catalog_governance_test.go \
            services/dsh/backend/internal/http/catalog_governance_handlers.go \
            services/dsh/backend/internal/http/catalog_governance_routes_test.go \
            services/dsh/backend/internal/http/catalog_unified_routes.go; then
            echo "JRN-008 Go sources already formatted"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            services/dsh/backend/internal/centralcatalog/catalog_governance.go \
            services/dsh/backend/internal/centralcatalog/catalog_pause_readback.go \
            services/dsh/backend/internal/centralcatalog/catalog_governance_test.go \
            services/dsh/backend/internal/http/catalog_governance_handlers.go \
            services/dsh/backend/internal/http/catalog_governance_routes_test.go \
            services/dsh/backend/internal/http/catalog_unified_routes.go
          git commit -m "style(jrn-008): apply canonical Go formatting"
          git push origin HEAD:sambassam
