name: Temporary COD Reconciliation Build Verification

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-cod-reconciliation-build-verification.yml"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/tmp-cod-reconciliation-build-verification.yml"

permissions:
  contents: read

concurrency:
  group: temporary-cod-reconciliation-build-verification-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: Build control panel finance surface
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify COD reconciliation binding
        shell: bash
        run: |
          set -euo pipefail
          test -f services/dsh/frontend/shared/finance-wlt-link/finance/cod-reconciliation.api.ts
          grep -Fq '../../shared/finance-wlt-link/finance/cod-reconciliation.api' services/dsh/frontend/control-panel/finance/CodReconciliationCasesPanel.tsx
          grep -Fq 'GET /dsh/control-panel/finance/cod-reconciliation-cases' services/dsh/backend/internal/http/server.go
          grep -Fq 'POST /dsh/control-panel/finance/cod-reconciliation-cases/{caseId}/assign' services/dsh/backend/internal/http/server.go
          grep -Fq 'POST /dsh/control-panel/finance/cod-reconciliation-cases/{caseId}/resolve' services/dsh/backend/internal/http/server.go
      - name: Typecheck control panel
        run: pnpm --dir apps/control-panel/runtime typecheck
      - name: Build control panel
        run: pnpm --dir apps/control-panel/runtime build
