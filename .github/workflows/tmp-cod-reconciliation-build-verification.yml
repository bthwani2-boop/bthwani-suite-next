name: Temporary COD Reconciliation Build Verification

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-cod-reconciliation-build-verification.yml"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/tmp-cod-reconciliation-build-verification.yml"

permissions:
  contents: read

concurrency:
  group: temporary-cod-reconciliation-build-verification-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: Build control panel finance surface
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify COD reconciliation binding
        shell: bash
        run: |
          set -euo pipefail
          test -f services/dsh/frontend/shared/finance-wlt-link/finance/cod-reconciliation.api.ts
          grep -Fq '../../shared/finance-wlt-link/finance/cod-reconciliation.api' services/dsh/frontend/control-panel/finance/CodReconciliationCasesPanel.tsx
          grep -Fq 'GET /dsh/control-panel/finance/cod-reconciliation-cases' services/dsh/backend/internal/http/server.go
          grep -Fq 'POST /dsh/control-panel/finance/cod-reconciliation-cases/{caseId}/assign' services/dsh/backend/internal/http/server.go
          grep -Fq 'POST /dsh/control-panel/finance/cod-reconciliation-cases/{caseId}/resolve' services/dsh/backend/internal/http/server.go
      - name: Capture typecheck and build
        shell: bash
        run: |
          set +e
          mkdir -p cod-verification
          pnpm --dir apps/control-panel/runtime typecheck > cod-verification/typecheck.log 2>&1
          echo "$?" > cod-verification/typecheck.exit
          pnpm --dir apps/control-panel/runtime build > cod-verification/build.log 2>&1
          echo "$?" > cod-verification/build.exit
          exit 0
      - name: Upload COD verification output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cod-reconciliation-build-verification
          path: cod-verification
          if-no-files-found: error
          retention-days: 1
      - name: Enforce verification result
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat cod-verification/typecheck.exit)" = "0"
          test "$(cat cod-verification/build.exit)" = "0"
