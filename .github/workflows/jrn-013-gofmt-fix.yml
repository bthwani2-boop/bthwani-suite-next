name: JRN-013 Focused Gofmt Correction

on:
  push:
    branches:
      - verification/jrn-013-final-closure-20260722
    paths:
      - ".github/workflows/jrn-013-gofmt-fix.yml"

permissions:
  contents: write

concurrency:
  group: jrn-013-focused-gofmt
  cancel-in-progress: false

jobs:
  format:
    if: contains(github.event.head_commit.message, '[jrn013-gofmt]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: verification/jrn-013-final-closure-20260722
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
      - name: Format JRN-013 Go boundary
        shell: bash
        run: |
          set -euo pipefail
          files=(
            services/dsh/backend/internal/dispatch/store_captain_handoff.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_idempotency.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_exceptions.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_db_test.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_idempotency_db_test.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_exceptions_db_test.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_resolution_db_test.go
            services/dsh/backend/internal/http/store_captain_handoff.go
            services/dsh/backend/internal/http/store_captain_handoff_exceptions.go
            services/dsh/backend/internal/http/order_journey_routes.go
            services/dsh/backend/internal/http/partner_order_workboard.go
            services/dsh/backend/internal/http/partner_order_workboard_test.go
          )
          gofmt -w "${files[@]}"
          test -z "$(gofmt -l "${files[@]}")"
      - name: Commit formatting correction
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "JRN-013 Go files are already formatted"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            services/dsh/backend/internal/dispatch/store_captain_handoff*.go \
            services/dsh/backend/internal/http/store_captain_handoff*.go \
            services/dsh/backend/internal/http/order_journey_routes.go \
            services/dsh/backend/internal/http/partner_order_workboard.go \
            services/dsh/backend/internal/http/partner_order_workboard_test.go
          git commit -m "style(jrn-013): apply focused gofmt"
          git pull --rebase origin verification/jrn-013-final-closure-20260722
          git push origin HEAD:verification/jrn-013-final-closure-20260722
