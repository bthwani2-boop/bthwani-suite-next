name: Lian Governed Go Format Repair

on:
  push:
    branches: [lian]
    paths:
      - ".github/workflows/lian-go-format-repair.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lian-go-format-repair
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current lian
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: lian
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Format every governed Go service
        shell: bash
        run: |
          set -euo pipefail
          for directory in \
            services/dsh/backend \
            services/wlt/backend \
            core/identity/backend \
            core/workforce/backend \
            core/platform-control/backend \
            core/providers/backend
          do
            find "$directory" -type f -name '*.go' -print0 | xargs -0 gofmt -w
          done
          rm -f .github/workflows/lian-go-format-repair.yml

      - name: Commit formatting and self-removal
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bthwani-governance-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git add -A
          git commit -m "fix(go): normalize governed service formatting"
          git push origin HEAD:lian
