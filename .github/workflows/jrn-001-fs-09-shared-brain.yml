name: JRN-001 FS-09 Shared Brain

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/frontend/shared/partner/**
      - services/dsh/frontend/shared/field-onboarding/**
      - services/dsh/frontend/app-field/onboarding/**
      - services/dsh/frontend/app-partner/account/PartnerOnboardingStatusView.tsx
      - services/dsh/frontend/control-panel/partners/**
      - services/dsh/tests/jrn-001-fs-09-shared-brain.test.mjs
      - .github/workflows/jrn-001-fs-09-shared-brain.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Install locked workspace
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Create FS-09 TypeScript project
        shell: bash
        run: |
          mkdir -p .tmp
          cat > .tmp/jrn-001-fs-09.tsconfig.json <<'JSON'
          {
            "extends": "../tsconfig.base.json",
            "compilerOptions": { "noEmit": true },
            "files": [
              "../services/dsh/frontend/css-modules.d.ts",
              "../services/dsh/frontend/shared/partner/index.ts",
              "../services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx",
              "../services/dsh/frontend/app-field/onboarding/DshFieldOnboardingScreen.tsx",
              "../services/dsh/frontend/app-partner/account/PartnerOnboardingStatusView.tsx",
              "../services/dsh/frontend/control-panel/partners/PartnerListScreen.tsx"
            ]
          }
          JSON
      - name: Typecheck shared brain and multisurface consumers
        run: pnpm exec tsc --noEmit -p .tmp/jrn-001-fs-09.tsconfig.json
      - name: Verify runtime, privacy, and readback invariants
        run: node --test services/dsh/tests/jrn-001-fs-09-shared-brain.test.mjs
      - name: Publish FS-09 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then
            STATE=success
            DESCRIPTION='FS-09 shared brain and controllers verified'
          else
            STATE=failure
            DESCRIPTION='FS-09 shared brain or controller verification failed'
          fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-09-shared-brain' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json