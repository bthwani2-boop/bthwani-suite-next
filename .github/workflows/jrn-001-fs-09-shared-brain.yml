name: JRN-001 FS-09 Shared Brain

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/frontend/shared/partner/**
      - services/dsh/frontend/shared/field-onboarding/**
      - services/dsh/frontend/shared/support/support.partner-policies.ts
      - services/dsh/frontend/app-field/onboarding/**
      - services/dsh/frontend/app-partner/account/PartnerOnboardingStatusView.tsx
      - services/dsh/frontend/control-panel/partners/**
      - services/dsh/tests/jrn-001-fs-09-shared-brain.test.mjs
      - .github/workflows/jrn-001-fs-09-shared-brain.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Install locked workspace
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Typecheck app-field consumer
        shell: bash
        run: |
          set +e
          pnpm --dir apps/app-field/runtime typecheck 2>&1 | tee /tmp/fs09.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Typecheck app-partner consumer
        shell: bash
        run: |
          set +e
          pnpm --dir apps/app-partner/runtime typecheck 2>&1 | tee /tmp/fs09.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Typecheck control-panel consumer
        shell: bash
        run: |
          set +e
          pnpm --dir apps/control-panel/runtime typecheck 2>&1 | tee /tmp/fs09.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Verify runtime, privacy, and readback invariants
        shell: bash
        run: |
          set +e
          node --test services/dsh/tests/jrn-001-fs-09-shared-brain.test.mjs 2>&1 | tee /tmp/fs09.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Publish FS-09 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then
            STATE=success
            CONTEXT='journeys/jrn-001/fs-09-shared-brain'
            DESCRIPTION='FS-09 shared brain and controllers verified'
          else
            STATE=failure
            RAW_ERROR="$(grep -m1 -E 'error TS[0-9]+|AssertionError|not ok|ERR_' /tmp/fs09.log 2>/dev/null || true)"
            ERROR_CODE="$(printf '%s' "$RAW_ERROR" | grep -o -m1 -E 'TS[0-9]+|ERR_[A-Z0-9_]+' || true)"
            ERROR_FILE="$(printf '%s' "$RAW_ERROR" | sed -E 's/^.*\/(.*\.(ts|tsx|mjs))[:(].*/\1/' | cut -c1-48)"
            [ -n "$ERROR_CODE" ] || ERROR_CODE='check-failed'
            [ -n "$ERROR_FILE" ] || ERROR_FILE='unknown-file'
            CONTEXT="journeys/jrn-001/fs-09/${ERROR_FILE}-${ERROR_CODE}"
            CONTEXT="$(printf '%s' "$CONTEXT" | tr -cd '[:alnum:]_./:-' | cut -c1-100)"
            DESCRIPTION="$(printf '%s' "${RAW_ERROR:-FS-09 verification failed}" | cut -c1-120)"
          fi
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json