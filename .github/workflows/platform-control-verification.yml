name: Platform Control Verification

on:
  push:
    branches:
      - bassam
      - master
      - "bassam-platform-*-verify-*"
    paths:
      - "core/platform-control/**"
      - "infra/docker/compose.runtime.yml"
      - "infra/data-plane/postgres/init/001_create_runtime_databases.sh"
      - "tools/scripts/platform-control-runtime.ps1"
      - "services/dsh/frontend/shared/platform/**"
      - "services/dsh/frontend/shared/session/control-panel-permissions.ts"
      - "services/dsh/frontend/control-panel/platform/**"
      - "apps/control-panel/runtime/src/shell/useDshNavigation.ts"
      - ".github/workflows/platform-control-verification.yml"
  pull_request:
    branches: [master]
    paths:
      - "core/platform-control/**"
      - "infra/docker/compose.runtime.yml"
      - "infra/data-plane/postgres/init/001_create_runtime_databases.sh"
      - "tools/scripts/platform-control-runtime.ps1"
      - "services/dsh/frontend/shared/platform/**"
      - "services/dsh/frontend/shared/session/control-panel-permissions.ts"
      - "services/dsh/frontend/control-panel/platform/**"
      - "apps/control-panel/runtime/src/shell/useDshNavigation.ts"
      - ".github/workflows/platform-control-verification.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: platform-control-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Platform control Go verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/platform-control/backend/go.mod
          cache: true
      - name: Verify format
        working-directory: core/platform-control/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Unformatted platform-control files:\n%s\n' "$files"; exit 1; }
      - name: Vet backend
        working-directory: core/platform-control/backend
        run: go vet ./...
      - name: Build backend
        working-directory: core/platform-control/backend
        run: go build ./...
      - name: Test backend
        working-directory: core/platform-control/backend
        run: go test ./... -count=1

  database:
    name: Platform control migration verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: platform_control_ci
          POSTGRES_PASSWORD: platform_control_ci_password
          POSTGRES_DB: platform_control_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platform_control_ci -d platform_control_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://platform_control_ci:platform_control_ci_password@localhost:5432/platform_control_ci?sslmode=disable
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply every platform-control migration
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "Applying $migration"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done < <(find core/platform-control/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Verify sovereign tables
        shell: bash
        run: |
          set -euo pipefail
          for table in platform_variables platform_feature_flags platform_change_sets platform_change_set_items platform_audit_events; do
            test "$(psql "$DATABASE_URL" -tAc "SELECT to_regclass('public.$table') IS NOT NULL")" = t
          done

  frontend:
    name: Platform control frontend contracts and types
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Contract lint
        run: pnpm run contracts:lint
      - name: Broken import guard
        run: pnpm run guard:no-broken-imports
      - name: UI kit boundary guard
        run: pnpm run guard:ui-kit-boundary
      - name: Frontend feature binding guard
        run: pnpm run guard:frontend-feature-binding
      - name: Workspace typecheck
        run: pnpm run typecheck

  result:
    name: Platform control verification result
    if: always()
    needs: [backend, database, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Require every platform-control verification job
        env:
          BACKEND: ${{ needs.backend.result }}
          DATABASE: ${{ needs.database.result }}
          FRONTEND: ${{ needs.frontend.result }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'backend=%s\ndatabase=%s\nfrontend=%s\n' "$BACKEND" "$DATABASE" "$FRONTEND"
          test "$BACKEND" = success
          test "$DATABASE" = success
          test "$FRONTEND" = success
