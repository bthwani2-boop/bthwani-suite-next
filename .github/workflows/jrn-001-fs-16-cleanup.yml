name: JRN-001 FS-16 Cleanup

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/contracts/jrn-001-cleanup-manifest.json
      - services/dsh/backend/internal/http/partner_lifecycle_routes.go
      - services/dsh/frontend/shared/field-onboarding/**
      - services/dsh/frontend/shared/partner/**
      - tools/guards/partner/jrn-001-cleanup-gate.mjs
      - .github/workflows/jrn-001-fs-16-cleanup.yml
      - .github/workflows/jrn-001-fs-10-app-field-repair.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Verify cleanup and canonical ownership
        run: node tools/guards/partner/jrn-001-cleanup-gate.mjs
      - name: Publish FS-16 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ "$RESULT" = success ] && STATE=success || STATE=failure
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-16-cleanup' --arg description "FS-16 cleanup: $RESULT" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
