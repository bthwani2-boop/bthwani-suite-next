name: Temporary SaaS Guard Diagnostic

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/saas-diagnostic.yml"
      - "tools/guards/saas-governance-gate.mjs"
      - "governance/saas/**"

permissions:
  contents: read
  statuses: write

concurrency:
  group: saas-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Capture SaaS governance guard output
        id: guard
        shell: bash
        run: |
          set +e
          log="${RUNNER_TEMP}/saas-governance.log"
          pnpm run guard:saas-governance >"${log}" 2>&1
          code=$?
          cat "${log}"
          echo "exit_code=${code}" >> "${GITHUB_OUTPUT}"
          exit 0
      - name: Upload SaaS guard diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: saas-governance-${{ github.run_id }}
          path: ${{ runner.temp }}/saas-governance.log
          if-no-files-found: error
          retention-days: 1
      - name: Publish diagnostic status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          EXIT_CODE: ${{ steps.guard.outputs.exit_code }}
        shell: bash
        run: |
          set -euo pipefail
          state="success"
          description="SaaS governance guard passed"
          if [[ "${EXIT_CODE:-1}" != "0" ]]; then
            state="failure"
            description="SaaS governance guard failed; inspect artifact"
          fi
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="${state}" \
            -f context="bthwani/saas-diagnostic" \
            -f description="${description}" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
      - name: Enforce diagnostic result
        if: always()
        env:
          EXIT_CODE: ${{ steps.guard.outputs.exit_code }}
        shell: bash
        run: exit "${EXIT_CODE:-1}"
