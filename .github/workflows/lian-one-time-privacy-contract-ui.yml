name: Lian One-Time Privacy Contract and UI Integrator

on:
  push:
    branches: [lian]
    paths:
      - ".github/workflows/lian-one-time-privacy-contract-ui.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lian-one-time-privacy-contract-ui
  cancel-in-progress: false

jobs:
  apply:
    name: Integrate privacy contract, capability, and UI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout current lian head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: lian
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Apply deterministic TypeScript and registry integration
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f"anchor not found in {path}: {old[:120]}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "services/dsh/frontend/shared/privacy/client-address-privacy.api.ts",
              "export async function anonymizeExpiredClientAddresses(\n  limit: number,\n): Promise<DshClientAddressAnonymizationResult> {\n  const body = { limit };",
              "export async function anonymizeExpiredClientAddresses(\n  limit: number,\n  runId: string,\n): Promise<DshClientAddressAnonymizationResult> {\n  const normalizedRunId = runId.trim();\n  if (normalizedRunId.length < 8 || normalizedRunId.length > 200) {\n    throw new Error(\"privacy run id must contain between 8 and 200 characters\");\n  }\n  const body = { limit };",
          )
          replace_once(
              "services/dsh/frontend/shared/privacy/client-address-privacy.api.ts",
              'idempotencyKey: stablePrivacyKey("anonymize", body),',
              'idempotencyKey: stablePrivacyKey(`anonymize:${normalizedRunId}`, body),',
          )
          replace_once(
              "services/dsh/frontend/shared/privacy/use-client-address-privacy-controller.ts",
              "async (limit: number) => {",
              "async (limit: number, runId: string) => {",
          )
          replace_once(
              "services/dsh/frontend/shared/privacy/use-client-address-privacy-controller.ts",
              "const result = await anonymizeExpiredClientAddresses(limit);",
              "const result = await anonymizeExpiredClientAddresses(limit, runId);",
          )

          screen = Path("services/dsh/frontend/control-panel/platform/PlatformPoliciesScreen.tsx")
          text = screen.read_text(encoding="utf-8")
          if 'ClientAddressPrivacySection' not in text:
              import_anchor = 'import { StoreOnboardingFeePolicySection } from "./StoreOnboardingFeePolicySection";'
              if import_anchor not in text:
                  raise SystemExit("PlatformPoliciesScreen import anchor not found")
              text = text.replace(
                  import_anchor,
                  import_anchor + '\nimport { ClientAddressPrivacySection } from "./ClientAddressPrivacySection";',
                  1,
              )
              component_anchor = '      <StoreOnboardingFeePolicySection authKind="authenticated" />'
              if component_anchor not in text:
                  raise SystemExit("PlatformPoliciesScreen component anchor not found")
              text = text.replace(
                  component_anchor,
                  component_anchor + '\n      <ClientAddressPrivacySection />',
                  1,
              )
              screen.write_text(text, encoding="utf-8")

          registry = Path("services/dsh/contracts/contract-registry.ts")
          text = registry.read_text(encoding="utf-8")
          if '"dsh-client-address-privacy"' not in text:
              union_anchor = '    | "dsh-client-address"\n'
              if union_anchor not in text:
                  raise SystemExit("contract registry union anchor not found")
              text = text.replace(
                  union_anchor,
                  union_anchor + '    | "dsh-client-address-privacy"\n',
                  1,
              )
              object_anchor = '''  {
    id: "dsh-client-map",
    path: "contracts/dsh.client-map.openapi.yaml",'''
              privacy_object = '''  {
    id: "dsh-client-address-privacy",
    path: "contracts/dsh.client-address-privacy.openapi.yaml",
    state: "CONTRACT_ACTIVE",
    runtimeDependency: true,
    clientStrategy: "STANDALONE_MANUAL_TYPED_ADAPTER",
    adapterOwner: "frontend/shared/privacy",
  },
'''
              if object_anchor not in text:
                  raise SystemExit("contract registry object anchor not found")
              text = text.replace(object_anchor, privacy_object + object_anchor, 1)
              registry.write_text(text, encoding="utf-8")

          master = Path("contracts/master.openapi.yaml")
          text = master.read_text(encoding="utf-8")
          if "dshClientAddressPrivacy:" not in text:
              anchor = "    dshClientAddress: ../services/dsh/contracts/dsh.client-address.openapi.yaml\n"
              if anchor not in text:
                  raise SystemExit("master contract address anchor not found")
              text = text.replace(
                  anchor,
                  anchor + "    dshClientAddressPrivacy: ../services/dsh/contracts/dsh.client-address-privacy.openapi.yaml\n",
                  1,
              )
              master.write_text(text, encoding="utf-8")

          capability = Path("services/dsh/capability-map.extensions.ts")
          text = capability.read_text(encoding="utf-8")
          if "getDshClientAddressPrivacyPolicy" not in text:
              anchor = '      "upsertDshOperatorServiceArea",\n'
              if anchor not in text:
                  raise SystemExit("privacy capability anchor not found")
              text = text.replace(
                  anchor,
                  anchor
                  + '      "getDshClientAddressPrivacyPolicy",\n'
                  + '      "updateDshClientAddressPrivacyPolicy",\n'
                  + '      "anonymizeDshExpiredClientAddresses",\n',
                  1,
              )
              scope_anchor = '      "map-provider-boundary",\n'
              if scope_anchor not in text:
                  raise SystemExit("privacy topic scope anchor not found")
              text = text.replace(
                  scope_anchor,
                  scope_anchor
                  + '      "client-address-retention",\n'
                  + '      "client-address-anonymization",\n',
                  1,
              )
              capability.write_text(text, encoding="utf-8")

      - name: Format exact privacy frontend and registry scope
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec prettier --write \
            services/dsh/contracts/dsh.client-address-privacy.openapi.yaml \
            services/dsh/contracts/contract-registry.ts \
            services/dsh/capability-map.extensions.ts \
            services/dsh/frontend/shared/privacy/client-address-privacy.types.ts \
            services/dsh/frontend/shared/privacy/client-address-privacy.api.ts \
            services/dsh/frontend/shared/privacy/use-client-address-privacy-controller.ts \
            services/dsh/frontend/shared/privacy/index.ts \
            services/dsh/frontend/control-panel/platform/ClientAddressPrivacySection.tsx \
            services/dsh/frontend/control-panel/platform/PlatformPoliciesScreen.tsx \
            contracts/master.openapi.yaml

      - name: Verify deterministic integration markers
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'dsh-client-address-privacy' services/dsh/contracts/contract-registry.ts
          grep -F 'dshClientAddressPrivacy:' contracts/master.openapi.yaml
          grep -F 'getDshClientAddressPrivacyPolicy' services/dsh/capability-map.extensions.ts
          grep -F 'ClientAddressPrivacySection' services/dsh/frontend/control-panel/platform/PlatformPoliciesScreen.tsx
          grep -F 'anonymize:${normalizedRunId}' services/dsh/frontend/shared/privacy/client-address-privacy.api.ts

      - name: Commit only when integration changes are required
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Privacy contract and UI are already integrated."
            exit 0
          fi
          git config user.name "bthwani-governed-fixer"
          git config user.email "actions@users.noreply.github.com"
          git add \
            services/dsh/contracts \
            services/dsh/capability-map.extensions.ts \
            services/dsh/frontend/shared/privacy \
            services/dsh/frontend/control-panel/platform \
            contracts/master.openapi.yaml
          git commit -m "feat(dsh): integrate governed address privacy control surface"
          git push origin HEAD:lian
