name: One-time Mount Operator Delivery Pricing

on:
  push:
    branches: [bassam]
    paths:
      - '.github/workflows/one-time-mount-operator-delivery-pricing.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-mount-operator-delivery-pricing
  cancel-in-progress: false

jobs:
  mount:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0

      - name: Patch partner detail stores tab
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin bassam
          python3 - <<'PY'
          from pathlib import Path

          path = Path('services/dsh/frontend/control-panel/partners/PartnerDetailOperationalScreen.tsx')
          text = path.read_text(encoding='utf-8')
          import_line = 'import { OperatorDeliveryPricingPanel } from "./stores/OperatorDeliveryPricingPanel";\n'
          if import_line not in text:
              lines = text.splitlines(keepends=True)
              insert_at = 0
              for i, line in enumerate(lines):
                  if line.startswith('import '):
                      insert_at = i + 1
              lines.insert(insert_at, import_line)
              text = ''.join(lines)

          state_anchor = '  const [documentReason, setDocumentReason] = useState("");'
          state_line = '  const [selectedPricingStoreId, setSelectedPricingStoreId] = useState<string | null>(null);'
          if state_line not in text:
              if text.count(state_anchor) != 1:
                  raise SystemExit('partner detail state anchor mismatch')
              text = text.replace(state_anchor, state_anchor + '\n' + state_line, 1)

          old_table = '''                  <CpTable aria-label="متاجر الشريك"><thead><tr><CpTableHeaderCell>المتجر</CpTableHeaderCell><CpTableHeaderCell>المدينة</CpTableHeaderCell><CpTableHeaderCell>الحالة</CpTableHeaderCell><CpTableHeaderCell>ظهور العميل</CpTableHeaderCell></tr></thead><tbody>
                    {stores.state.stores.map((store) => <tr key={store.id}><CpTableCell>{store.displayName}</CpTableCell><CpTableCell>{store.cityCode}</CpTableCell><CpTableCell>{store.status}</CpTableCell><CpTableCell>{store.isVisible ? "ظاهر" : "مخفي"}</CpTableCell></tr>)}
                  </tbody></CpTable>'''
          new_table = '''                  <div style={{ display: "grid", gap: 16 }}>
                    <CpTable aria-label="متاجر الشريك"><thead><tr><CpTableHeaderCell>المتجر</CpTableHeaderCell><CpTableHeaderCell>المدينة</CpTableHeaderCell><CpTableHeaderCell>الحالة</CpTableHeaderCell><CpTableHeaderCell>ظهور العميل</CpTableHeaderCell><CpTableHeaderCell>التسعير</CpTableHeaderCell></tr></thead><tbody>
                      {stores.state.stores.map((store) => <tr key={store.id}><CpTableCell>{store.displayName}</CpTableCell><CpTableCell>{store.cityCode}</CpTableCell><CpTableCell>{store.status}</CpTableCell><CpTableCell>{store.isVisible ? "ظاهر" : "مخفي"}</CpTableCell><CpTableCell><CpButton onClick={() => setSelectedPricingStoreId(store.id)}>{selectedPricingStoreId === store.id ? "مفتوح" : "إدارة التسعير"}</CpButton></CpTableCell></tr>)}
                    </tbody></CpTable>
                    {selectedPricingStoreId ? <OperatorDeliveryPricingPanel storeId={selectedPricingStoreId} /> : null}
                  </div>'''
          if new_table not in text:
              if text.count(old_table) != 1:
                  raise SystemExit('partner stores table anchor mismatch')
              text = text.replace(old_table, new_table, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git diff --check

      - name: Commit mount
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add services/dsh/frontend/control-panel/partners/PartnerDetailOperationalScreen.tsx
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'fix(control-panel): mount store delivery pricing governance'
          git pull --rebase origin bassam
          git push origin HEAD:bassam
