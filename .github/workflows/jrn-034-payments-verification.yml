name: JRN-034 DSH Build Diagnostic macOS

on:
  workflow_dispatch:
  push:
    branches: [verification/jrn-034-8423652]
    paths:
      - ".github/workflows/jrn-034-payments-verification.yml"
      - "services/wlt/backend/**"
      - "services/dsh/backend/**"
  pull_request:
    paths:
      - ".github/workflows/jrn-034-payments-verification.yml"
      - "services/wlt/backend/**"
      - "services/dsh/backend/**"

permissions:
  contents: read

concurrency:
  group: jrn-034-dsh-build-diagnostic-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: WLT and DSH payment backend diagnostic
    runs-on: macos-15
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
      - name: Set up Go from DSH module
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
      - name: Test WLT payment and provider packages
        working-directory: services/wlt/backend
        run: go test ./internal/payment ./internal/provider -count=1
      - name: Build WLT payment ownership graph
        working-directory: services/wlt/backend
        run: go build ./internal/payment ./internal/provider ./internal/reference ./internal/http
      - name: Test DSH WLT payment boundary
        working-directory: services/dsh/backend
        run: go test ./internal/wlt -count=1
      - name: Capture DSH payment proxy and router build diagnostics
        id: dsh_build
        shell: bash
        run: |
          set +e
          cd services/dsh/backend
          go build ./internal/wlt ./internal/http > "$GITHUB_WORKSPACE/jrn034-dsh-build.log" 2>&1
          status=$?
          cat "$GITHUB_WORKSPACE/jrn034-dsh-build.log"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload DSH build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jrn-034-dsh-build-diagnostics-${{ github.sha }}
          path: jrn034-dsh-build.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce DSH build result
        if: steps.dsh_build.outputs.status != '0'
        run: exit 1
