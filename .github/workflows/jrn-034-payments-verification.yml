name: JRN-034 Payments Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/jrn-034-payments-verification.yml"
      - "governance/product/contracts/jrn-034-payments-payment-sessions.product-truth.json"
      - "governance/runbooks/JRN-034_PAYMENT_SESSIONS.md"
      - "services/wlt/backend/internal/payment/**"
      - "services/wlt/backend/internal/provider/**"
      - "services/wlt/backend/internal/http/server.go"
      - "services/wlt/backend/internal/reference/payment_session_read.go"
      - "services/wlt/database/migrations/wlt-036_payment_session_operations_and_provider_events.sql"
      - "services/wlt/contracts/wlt.payments.openapi.yaml"
      - "services/wlt/frontend/shared/dsh/**payment-session**"
      - "services/wlt/frontend/shared/dsh/use-wlt-dsh-payment-controller.tsx"
      - "services/dsh/backend/internal/wlt/payment_sessions.go"
      - "services/dsh/backend/internal/wlt/payment_sessions_test.go"
      - "services/dsh/backend/internal/http/finance_payment_sessions.go"
      - "services/dsh/backend/internal/http/server.go"
      - "services/dsh/contracts/dsh.payment-sessions.openapi.yaml"
      - "services/dsh/frontend/control-panel/finance/PaymentSessionOperationsScreen.tsx"
      - "services/dsh/frontend/shared/finance-wlt-link/payment/**"
      - "services/dsh/tsconfig.jrn-034.json"
      - "apps/control-panel/runtime/src/app/dsh/finance/payment-sessions/**"
      - "infra/docker/scripts/wlt-migration-probes.ps1"
      - "contracts/master.openapi.yaml"
      - "tools/scripts/test-jrn-034-payments.mjs"
  pull_request:
    paths:
      - ".github/workflows/jrn-034-payments-verification.yml"
      - "governance/product/contracts/jrn-034-payments-payment-sessions.product-truth.json"
      - "services/wlt/backend/internal/payment/**"
      - "services/wlt/backend/internal/provider/**"
      - "services/wlt/backend/internal/http/server.go"
      - "services/wlt/database/migrations/wlt-036_payment_session_operations_and_provider_events.sql"
      - "services/wlt/contracts/wlt.payments.openapi.yaml"
      - "services/dsh/backend/internal/wlt/payment_sessions.go"
      - "services/dsh/backend/internal/wlt/payment_sessions_test.go"
      - "services/dsh/backend/internal/http/finance_payment_sessions.go"
      - "services/dsh/contracts/dsh.payment-sessions.openapi.yaml"
      - "services/dsh/frontend/control-panel/finance/PaymentSessionOperationsScreen.tsx"
      - "services/dsh/frontend/shared/finance-wlt-link/payment/**"
      - "services/dsh/tsconfig.jrn-034.json"
      - "tools/scripts/test-jrn-034-payments.mjs"

permissions:
  contents: read

concurrency:
  group: jrn-034-payments-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structural:
    name: Structural journey guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
      - name: Verify governed journey structure
        run: node tools/scripts/test-jrn-034-payments.mjs
      - name: Verify repository whitespace
        run: git diff --check

  backend:
    name: WLT and DSH payment backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
      - name: Set up Go from DSH module
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
      - name: Test WLT payment and provider packages
        working-directory: services/wlt/backend
        run: go test ./internal/payment ./internal/provider -count=1
      - name: Build WLT router and payment owners
        working-directory: services/wlt/backend
        run: go build ./internal/payment ./internal/provider ./internal/reference ./internal/http
      - name: Test DSH WLT payment boundary
        working-directory: services/dsh/backend
        run: go test ./internal/wlt -count=1
      - name: Build DSH payment proxy and router
        working-directory: services/dsh/backend
        run: go build ./internal/wlt ./internal/http

  frontend:
    name: Shared brain and payment operations surface
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck WLT shared brain
        run: pnpm --dir services/wlt typecheck
      - name: Typecheck focused JRN-034 DSH and control-panel graph
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-034.json --noEmit --pretty false

  contract:
    name: Focused contracts and product truth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Parse WLT payment contract
        run: pnpm --dir services/dsh exec openapi-typescript ../wlt/contracts/wlt.payments.openapi.yaml -o /tmp/wlt-payments-api.ts
      - name: Parse DSH payment operations contract
        run: pnpm --dir services/dsh exec openapi-typescript contracts/dsh.payment-sessions.openapi.yaml -o /tmp/dsh-payment-sessions-api.ts
      - name: Validate product truth against governed schema
        run: >-
          node --input-type=module -e
          "import fs from 'node:fs'; import Ajv from 'ajv';
          const schema=JSON.parse(fs.readFileSync('governance/product/product-truth.schema.json','utf8'));
          const truth=JSON.parse(fs.readFileSync('governance/product/contracts/jrn-034-payments-payment-sessions.product-truth.json','utf8'));
          const validate=new Ajv({allErrors:true,strict:false}).compile(schema);
          if(!validate(truth)){console.error(validate.errors);process.exit(1)}
          if(truth.capabilityId!=='JRN_034_PAYMENTS_PAYMENT_SESSIONS'||truth.state!=='DISCOVERY')process.exit(1);"