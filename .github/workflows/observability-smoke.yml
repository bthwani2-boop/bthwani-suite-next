name: Observability Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  jaeger-otel-smoke:
    name: Jaeger + OTel smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.34.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Jaeger (all-in-one)
        run: |
          docker run -d \
            --name bthwani-jaeger-ci \
            -e COLLECTOR_OTLP_ENABLED=true \
            -p 16686:16686 \
            -p 4317:4317 \
            -p 4318:4318 \
            jaegertracing/all-in-one:latest

      - name: Wait for Jaeger UI
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:16686 > /dev/null; then
              echo "Jaeger: UP"
              break
            fi
            echo "Waiting for Jaeger ($i/20)..."
            sleep 3
          done
          curl -sf http://localhost:16686 || (echo "Jaeger did not start" && exit 1)

      - name: Send OTel smoke span
        run: pnpm run diagnostics:otel:smoke

      - name: Verify Jaeger received span
        run: |
          sleep 2
          SERVICES=$(curl -sf "http://localhost:16686/api/services" | python3 -c "import json,sys; d=json.load(sys.stdin); print(' '.join(d.get('data', [])))" 2>/dev/null || echo "")
          echo "Registered services: $SERVICES"
          if echo "$SERVICES" | grep -q "bthwani-tools-smoke"; then
            echo "OTEL_JAEGER_VERIFICATION: PASS — service bthwani-tools-smoke found"
          else
            echo "OTEL_JAEGER_VERIFICATION: WARN — service not yet indexed (eventual consistency)"
          fi

      - name: Stop Jaeger
        if: always()
        run: docker rm -f bthwani-jaeger-ci || true
