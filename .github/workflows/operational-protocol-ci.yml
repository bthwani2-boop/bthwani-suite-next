name: Operational Protocol CI

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options:
          - affected
          - full
          - runtime
        default: affected
      journey_id:
        required: false

permissions:
  contents: read

jobs:
  protocol-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Protocol Integrity Gate
        run: pnpm run guard:governance-all

  factory-output-budget:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Output Budget Gate
        run: pnpm run guard:performance-all

  evidence-coherence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Evidence Coherence Gate
        run: pnpm run guard:agent-governance

  sdlc-stage-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: SDLC Support Package Gate
        run: pnpm run guard:sdlc

  scope-and-surface-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Scope and Surface Coverage Gate
        run: pnpm run guard:tool-catalog-coverage

  ownership-boundaries:
    if: >-
      ${{
        github.event_name != 'workflow_dispatch' ||
        inputs.mode == 'full' ||
        inputs.mode == 'runtime'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Ownership Boundaries Gate
        run: |
          pnpm run guard:fullstack-boundary
          pnpm run guard:frontend-feature-binding
          pnpm run guard:runtime-config
          pnpm run guard:dependency-graph
          pnpm run guard:ast-grep-rules
          pnpm run guard:ui-kit-boundary
          pnpm run guard:wlt-financial-boundary

  vertical-fullstack-integrity:
    if: >-
      ${{
        github.event_name != 'workflow_dispatch' ||
        inputs.mode == 'full' ||
        inputs.mode == 'runtime'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Vertical Fullstack Integrity Gate
        run: |
          pnpm run guard:frontend-feature-binding
          pnpm run guard:backend-api-binding
          pnpm run guard:api-binding
          pnpm run guard:service-manifest-drift
          pnpm run guard:go-routes-ci
          pnpm run guard:logic-coverage
          pnpm run guard:live-cross-journey-integrity
          pnpm run guard:runtime-real-bindings

  contract-data-integrity:
    if: >-
      ${{
        github.event_name != 'workflow_dispatch' ||
        inputs.mode == 'full' ||
        inputs.mode == 'runtime'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Contract Data Integrity Gate
        run: |
          pnpm run contracts:lint
          pnpm run openapi:generate
          git diff --exit-code
          pnpm run guard:backend-api-binding
          pnpm run guard:api-binding

  authorization-state-integrity:
    if: >-
      ${{
        github.event_name != 'workflow_dispatch' ||
        inputs.mode == 'full' ||
        inputs.mode == 'runtime'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Authorization State Integrity Gate
        run: pnpm run guard:live-cross-journey-integrity

  organization-and-performance:
    if: >-
      ${{
        github.event_name != 'workflow_dispatch' ||
        inputs.mode == 'full' ||
        inputs.mode == 'runtime'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Organization and Performance Gate
        run: |
          pnpm run guard:repo-naming
          pnpm run guard:repo-structure
          pnpm run guard:heavy-imports
          pnpm run guard:performance-budget
          pnpm run guard:bundle-budget
          pnpm run guard:dependency-graph
          pnpm run guard:repo-size

  ui-surface-purity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Ban Inline CSS and Direct API in Surfaces
        run: pnpm run diagnostics:ui-kit

  dead-code-prevention:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check for Unused Exports and Orphaned Files
        run: pnpm run diagnostics:knip

  ledger-completeness:
    if: >-
      ${{
        github.event_name != 'workflow_dispatch' ||
        inputs.mode == 'full' ||
        inputs.mode == 'runtime'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify WLT Financial Domain Boundary
        run: pnpm run guard:wlt-financial-boundary

  runtime-proof:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        inputs.mode == 'runtime'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.34.2
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Runtime Proof Gate
        run: |
          pnpm run runtime:full:reset
          pnpm run runtime:full:smoke

  final-protocol-gate:
    needs:
      - protocol-integrity
      - factory-output-budget
      - evidence-coherence
      - sdlc-stage-gate
      - scope-and-surface-coverage
      - ownership-boundaries
      - vertical-fullstack-integrity
      - contract-data-integrity
      - authorization-state-integrity
      - organization-and-performance
      - ui-surface-purity
      - dead-code-prevention
      - ledger-completeness
      - runtime-proof
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Final Protocol Check
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]; then
            echo "OPERATIONAL_PROTOCOL_FAIL"
            exit 1
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.mode }}" == "runtime" ]; then
            echo "OPERATIONAL_PROTOCOL_RUNTIME_PASS"
          else
            echo "OPERATIONAL_PROTOCOL_STATIC_PASS"
            echo "Runtime was not proven in this run; this result is not CLOSED_WITH_EVIDENCE."
          fi
