name: Dependabot Auto-Triage

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependabot-triage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  triage:
    name: Triage Dependabot PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect version bump type
        id: bump-type
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR title: $PR_TITLE"
          # Detect major version bump from title (e.g. "chore(deps): bump X from 1.x to 2.x")
          if echo "$PR_TITLE" | grep -qE 'from [0-9]+\. .* to [0-9]+\.' && \
             echo "$PR_TITLE" | grep -qP 'from (\d+)\.\d+ .* to (\d+)\.' 2>/dev/null; then
            FROM=$(echo "$PR_TITLE" | grep -oP 'from \K\d+' | head -1)
            TO=$(echo "$PR_TITLE" | grep -oP 'to \K\d+' | head -1)
            if [ "$FROM" != "$TO" ] 2>/dev/null; then
              echo "is_major=true" >> $GITHUB_OUTPUT
            else
              echo "is_major=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "is_major=false" >> $GITHUB_OUTPUT
          fi

      - name: Label major version bump
        if: steps.bump-type.outputs.is_major == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['review:major-version']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **Major version bump detected.** This PR requires manual review before merge.\n\nDo not merge until the changelog and breaking changes have been reviewed.'
            });

      - name: Label as ready-for-pr (CI must pass separately)
        uses: actions/github-script@v7
        with:
          script: |
            // Note: we label as pending-ci first; the actual status check
            // on CI jobs determines if it is truly ready.
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['dependencies', 'gate:ci-required']
            });
            console.log('Labels applied. No auto-merge performed.');
