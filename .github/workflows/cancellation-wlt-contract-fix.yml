name: Cancellation WLT Contract Fix
run-name: Cancellation WLT Contract Fix · ${{ github.sha }}

on:
  push:
    branches: ["journey/cancellation-refund-reconciliation-closure"]
    paths:
      - ".github/cancellation-wlt-contract-fix-trigger"
      - ".github/workflows/cancellation-wlt-contract-fix.yml"

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-workspace
      - name: Add governed cancellation contract
        shell: bash
        run: python tools/scripts/patch-cancellation-journey-final.py
      - name: Repair legacy WLT response references
        shell: bash
        run: python tools/scripts/fix-wlt-invalid-response-refs.py
      - name: Generate WLT client
        shell: bash
        run: pnpm run openapi:generate:wlt
      - name: Verify generated contract
        shell: bash
        run: |
          set -euo pipefail
          grep -F '/wlt/order-cancellations:' services/wlt/contracts/wlt.openapi.yaml
          grep -F 'WltGovernedOrderCancellationResponse' services/wlt/clients/generated/wlt-api.ts
          ! grep -F '#/components/responses/InvalidRequest' services/wlt/contracts/wlt.openapi.yaml
      - name: Commit repaired WLT contract
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/wlt/contracts/wlt.openapi.yaml services/wlt/clients/generated/wlt-api.ts
          git commit -m "fix(wlt-contract): publish governed order cancellation contract"
          git reset --hard HEAD
          git pull --rebase origin journey/cancellation-refund-reconciliation-closure
          git push origin HEAD:journey/cancellation-refund-reconciliation-closure
      - name: Publish repair status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          state=failure
          [ "$RESULT" = success ] && state=success
          jq -n --arg state "$state" --arg context "Cancellation WLT Contract Fix" --arg description "WLT cancellation contract repair: $RESULT" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
            -d @status.json
