name: Database Upgrade Truth

on:
  push:
    branches:
      - lian
      - "fix/lian-sovereign-final-closure"
    paths:
      - "services/**/database/**"
      - "core/**/database/**"
      - "infra/docker/scripts/schema-migration-runner.ps1"
      - "infra/docker/scripts/invoke-runtime-database-migrations.ps1"
      - "tools/scripts/invoke-database-upgrade-truth.ps1"
      - ".github/workflows/database-upgrade-truth.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: database-upgrade-truth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  service-database:
    name: Database truth — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: dsh
            migrations: services/dsh/database/migrations
            tests: services/dsh/database/tests
          - service: wlt
            migrations: services/wlt/database/migrations
            tests: services/wlt/database/tests
          - service: identity
            migrations: core/identity/database/migrations
            tests: core/identity/database/tests
          - service: workforce
            migrations: core/workforce/database/migrations
            tests: core/workforce/database/tests
          - service: providers
            migrations: core/providers/database/migrations
            tests: core/providers/database/tests
          - service: platform-control
            migrations: core/platform-control/database/migrations
            tests: core/platform-control/database/tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: closure
          POSTGRES_PASSWORD: closure_password
          POSTGRES_DB: closure
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U closure -d closure"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgres://closure:closure_password@localhost:5432/closure?sslmode=disable
      PGPASSWORD: closure_password
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run clean install, invariants, and idempotent runner
        id: upgrade
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $logPath = Join-Path $env:RUNNER_TEMP "database-${{ matrix.service }}.log"
          $captured = @()
          try {
            $captured = @(
              ./tools/scripts/invoke-database-upgrade-truth.ps1 `
                -ServiceName "${{ matrix.service }}" `
                -MigrationDirectory "${{ matrix.migrations }}" `
                -TestsDirectory "${{ matrix.tests }}" `
                -DatabaseUrl $env:DATABASE_URL `
                -SourceCommitSha $env:GITHUB_SHA 2>&1 |
                Tee-Object -FilePath $logPath
            )
            "detail=PASS" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } catch {
            $captured += $_
            $lines = @($captured | ForEach-Object { $_.ToString().Trim() } | Where-Object { $_ -ne "" })
            $candidate = @($lines | Where-Object {
              $_ -match '(?i)(ERROR|FATAL|exception|failed|invalid|migration|transaction|checksum|dirty)'
            } | Select-Object -Last 1)
            if ($candidate.Count -eq 0) {
              $candidate = @($lines | Select-Object -Last 1)
            }
            $detail = if ($candidate.Count -gt 0) { $candidate[0] } else { $_.Exception.Message }
            $detail = (($detail -replace '[\r\n/]', ' ') -replace '\s+', ' ').Trim()
            if ($detail.Length -gt 120) { $detail = $detail.Substring(0, 120) }
            "detail=$detail" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Error $detail
            exit 1
          }

      - name: Publish exact database result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          SERVICE: ${{ matrix.service }}
          OUTCOME: ${{ steps.upgrade.outcome }}
          STEP_DETAIL: ${{ steps.upgrade.outputs.detail }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success
          detail=PASS
          if [ "$OUTCOME" != success ]; then
            state=failure
            ledger_detail="$(psql "$DATABASE_URL" -X -qAt -c "SELECT COALESCE(migration_id || ':' || COALESCE(error_code,'DIRTY'), 'NO_LEDGER') FROM schema_migrations WHERE service_name = '$SERVICE' AND (dirty OR NOT success) ORDER BY applied_at DESC LIMIT 1;" 2>/dev/null || true)"
            detail="${ledger_detail:-${STEP_DETAIL:-PRE_LEDGER_FAILURE}}"
          fi
          detail="$(printf '%s' "$detail" | tr '\n\r/' '   ' | sed -E 's/[[:space:]]+/ /g' | cut -c1-120)"
          fixed_context="Database Upgrade Truth / $SERVICE"
          diagnostic_context="DB Error / $SERVICE / $(printf '%s' "$detail" | cut -c1-60)"
          jq -n --arg state "$state" --arg context "$fixed_context" --arg description "$detail" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/fixed.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/fixed.json
          if [ "$state" = failure ]; then
            diagnostic_context="$(printf '%s' "$diagnostic_context" | cut -c1-95)"
            jq -n --arg state failure --arg context "$diagnostic_context" --arg description "$detail" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/diagnostic.json
            curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/diagnostic.json
          fi

      - name: Enforce database result
        if: steps.upgrade.outcome != 'success'
        shell: bash
        run: exit 1
