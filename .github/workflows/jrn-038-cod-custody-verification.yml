name: JRN-038 COD Custody Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths: &jrn038_paths
      - "services/wlt/backend/internal/cod/sovereign_cod.go"
      - "services/wlt/backend/internal/cod/sovereign_cod_jrn038_test.go"
      - "services/wlt/backend/internal/http/server.go"
      - "services/wlt/contracts/jrn-038-cod-custody.openapi.yaml"
      - "services/wlt/database/migrations/wlt-038_cod_custody_evidence_reconciliation.sql"
      - "services/wlt/database/tests/jrn-038-cod-custody-invariants.sql"
      - "services/dsh/backend/internal/http/actor_finance_handlers.go"
      - "services/dsh/backend/internal/http/jrn038_cod_finance_handlers.go"
      - "services/dsh/backend/internal/http/jrn038_cod_finance_routes.go"
      - "services/dsh/backend/internal/http/refund_finance_routes.go"
      - "services/dsh/backend/internal/wlt/actor_finance_client.go"
      - "services/dsh/frontend/shared/finance-wlt-link/wlt-cod/**"
      - "services/dsh/frontend/shared/finance-wlt-link/finance/cod-reconciliation.api.ts"
      - "services/dsh/frontend/shared/finance-wlt-link/wlt/generated/WltDshPartnerBridge.tsx"
      - "services/dsh/frontend/app-captain/account/DshCaptainCodCustodyScreen.tsx"
      - "services/dsh/frontend/app-captain/account/DshCaptainFinanceScreen.tsx"
      - "services/dsh/frontend/control-panel/finance/CodReconciliationCasesPanel.tsx"
      - "services/dsh/frontend/control-panel/finance/FinanceDashboardScreen.tsx"
      - ".github/workflows/jrn-038-cod-custody-verification.yml"
  pull_request:
    branches: [master]
    paths: *jrn038_paths

permissions:
  contents: read

concurrency:
  group: jrn-038-cod-custody-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: JRN-038 database, backend, contract, and multi-surface proof
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wlt_jrn038
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d wlt_jrn038"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/wlt_jrn038?sslmode=disable
      WLT_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/wlt_jrn038?sslmode=disable

    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: services/wlt/backend/go.mod
          cache-dependency-path: |
            services/wlt/backend/go.sum
            services/dsh/backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install locked workspace
        run: pnpm install --frozen-lockfile

      - name: Check touched Go formatting
        shell: bash
        run: |
          test -z "$(gofmt -l \
            services/wlt/backend/internal/cod/sovereign_cod.go \
            services/wlt/backend/internal/cod/sovereign_cod_jrn038_test.go \
            services/wlt/backend/internal/http/server.go \
            services/dsh/backend/internal/http/actor_finance_handlers.go \
            services/dsh/backend/internal/http/jrn038_cod_finance_handlers.go \
            services/dsh/backend/internal/http/jrn038_cod_finance_routes.go \
            services/dsh/backend/internal/http/refund_finance_routes.go \
            services/dsh/backend/internal/wlt/actor_finance_client.go)"

      - name: Apply WLT migrations and custody invariants from zero
        shell: bash
        run: |
          for migration in $(find services/wlt/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            echo "Applying ${migration}"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/wlt/database/tests/jrn-038-cod-custody-invariants.sql

      - name: Test WLT backend
        working-directory: services/wlt/backend
        run: go test ./...

      - name: Test DSH backend
        working-directory: services/dsh/backend
        run: go test ./...

      - name: Typecheck WLT boundary
        run: pnpm --dir services/wlt typecheck

      - name: Typecheck DSH shared and surfaces
        run: pnpm --dir services/dsh typecheck

      - name: Verify financial boundary guards
        run: |
          pnpm guard:wlt-financial-boundary
          pnpm guard:fullstack-boundary

      - name: Verify JRN-038 route and contract parity
        shell: bash
        run: |
          grep -Fq 'POST /wlt/cod-records/{codRecordId}/collect' services/wlt/backend/internal/http/server.go
          grep -Fq 'POST /wlt/cod-records/{codRecordId}/remit' services/wlt/backend/internal/http/server.go
          grep -Fq 'GET /wlt/cod-reconciliation-cases' services/wlt/backend/internal/http/server.go
          grep -Fq '/wlt/cod-records/{codRecordId}/collect:' services/wlt/contracts/jrn-038-cod-custody.openapi.yaml
          grep -Fq '/wlt/cod-reconciliation-cases/{caseId}/resolve:' services/wlt/contracts/jrn-038-cod-custody.openapi.yaml
          grep -Fq 'registerJRN038CodFinanceRoutes(mux, s)' services/dsh/backend/internal/http/refund_finance_routes.go
          grep -Fq '/dsh/partner/me/finance/cod-records' services/dsh/backend/internal/http/jrn038_cod_finance_routes.go
          grep -Fq '/dsh/control-panel/finance/cod-reconciliation-cases' services/dsh/backend/internal/http/jrn038_cod_finance_routes.go
          grep -Fq 'PartnerCodCustodyPanel' services/dsh/frontend/shared/finance-wlt-link/wlt/generated/WltDshPartnerBridge.tsx
          grep -Fq 'DshCaptainCodCustodyScreen' services/dsh/frontend/app-captain/account/DshCaptainFinanceScreen.tsx
          grep -Fq 'CodReconciliationCasesPanel' services/dsh/frontend/control-panel/finance/FinanceDashboardScreen.tsx
