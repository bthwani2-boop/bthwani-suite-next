name: Marketing Commercial Closure

on:
  push:
    branches: [bassam]
    paths:
      - "services/dsh/backend/internal/coupons/**"
      - "services/dsh/backend/internal/http/**"
      - "services/dsh/backend/internal/orders/**"
      - "services/dsh/backend/internal/promotionfundingoutbox/**"
      - "services/dsh/backend/internal/wlt/**"
      - "services/dsh/backend/cmd/dsh-api/**"
      - "services/dsh/database/migrations/**"
      - "services/dsh/contracts/dsh.marketing-commercial.openapi.yaml"
      - "services/dsh/frontend/shared/marketing/**"
      - "services/dsh/frontend/control-panel/marketing/**"
      - "services/wlt/backend/internal/commercial/**"
      - "services/wlt/backend/internal/promotionfunding/**"
      - "services/wlt/backend/internal/http/**"
      - "services/wlt/database/migrations/**"
      - "services/wlt/contracts/wlt.commercial.openapi.yaml"
      - "contracts/master.openapi.yaml"
      - "tools/guards/**"
      - ".github/workflows/marketing-commercial-closure.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts-and-types:
    name: Contracts bindings and TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Contract foundation
        run: pnpm run contracts:lint
      - name: Backend route binding
        run: pnpm run guard:backend-api-binding
      - name: Frontend API binding
        run: pnpm run guard:api-binding
      - name: Broken import guard
        run: pnpm run guard:no-broken-imports
      - name: WLT financial boundary
        run: pnpm run guard:wlt-financial-boundary
      - name: Typecheck all workspaces
        run: pnpm run typecheck

  go-services:
    name: Go verification — ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: DSH
            directory: services/dsh/backend
            go_mod: services/dsh/backend/go.mod
            go_sum: services/dsh/backend/go.sum
          - name: WLT
            directory: services/wlt/backend
            go_mod: services/wlt/backend/go.mod
            go_sum: services/wlt/backend/go.sum
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: ${{ matrix.go_mod }}
          cache: true
          cache-dependency-path: ${{ matrix.go_sum }}
      - name: Formatting
        working-directory: ${{ matrix.directory }}
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Unformatted files:\n%s\n' "$files"; exit 1; }
      - name: Vet
        working-directory: ${{ matrix.directory }}
        run: go vet ./...
      - name: Test
        working-directory: ${{ matrix.directory }}
        run: go test ./... -count=1
      - name: Build
        working-directory: ${{ matrix.directory }}
        run: go build ./...

  closure-result:
    name: Marketing commercial closure result
    if: always()
    needs: [contracts-and-types, go-services]
    runs-on: ubuntu-latest
    steps:
      - name: Require every targeted gate
        env:
          CONTRACTS_TYPES: ${{ needs.contracts-and-types.result }}
          GO_SERVICES: ${{ needs.go-services.result }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'contracts_and_types=%s\ngo_services=%s\n' "$CONTRACTS_TYPES" "$GO_SERVICES"
          test "$CONTRACTS_TYPES" = success
          test "$GO_SERVICES" = success
