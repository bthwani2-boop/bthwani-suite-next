name: lianbassam workflow probe

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lianbassam-workflow-probe.yml"

permissions:
  statuses: write

jobs:
  probe:
    runs-on: ubuntu-24.04
    steps:
      - name: Publish probe status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=success \
            -f context='bthwani/lianbassam-workflow-probe' \
            -f description='Custom workflow execution confirmed' \
            -f target_url="${RUN_URL}"
