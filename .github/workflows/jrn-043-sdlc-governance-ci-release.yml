name: JRN-043 SDLC Governance CI Release

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths: &jrn043_paths
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/verification/jrn-043-sdlc-ci-release.test.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [master]
    paths: *jrn043_paths

permissions:
  contents: read

concurrency:
  group: jrn-043-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Immutable SDLC, governance, CI, and release proof
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify JRN-043 contracts and repository workflow invariants
        run: node --test tools/verification/jrn-043-sdlc-ci-release.test.mjs
      - name: Validate JRN-043 SDLC artifact inputs
        run: >-
          node tools/guards/sdlc/validate-sdlc-artifact-inputs.mjs
          --artifact=governance/evidence/jrn-043/artifact-manifest.json
          --impact=governance/evidence/jrn-043/change-impact.json
          --capability=JRN-043
      - name: Verify canonical governance and authority separation
        run: |
          pnpm run guard:governance-schema
          pnpm run guard:agent-governance
          pnpm run guard:authority-separation
          pnpm run guard:saas-governance
          pnpm run guard:sdlc
          pnpm run guard:cleanup-policy
      - name: Verify workflow registry, pinning, syntax, and security
        run: |
          pnpm run guard:guard-registry
          pnpm run guard:actions-pin
          pnpm run guard:workflow-lint
          pnpm run guard:workflow-security
      - name: Verify repository whitespace
        run: git diff --check

  result:
    name: JRN-043 SDLC Governance CI Release result
    needs: [verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce JRN-043 result
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: test "${VERIFY_RESULT}" = "success"
