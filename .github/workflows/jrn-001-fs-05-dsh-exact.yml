name: JRN-001 FS-05 DSH exact diagnostic

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-05-dsh-exact.yml]

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dsh_jrn001
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U postgres -d dsh_jrn001"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dsh_jrn001?sslmode=disable
      DSH_REQUIRE_DB_TESTS: "true"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.26.5'
          cache: false
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - shell: bash
        run: |
          while IFS= read -r migration; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration" >/dev/null; done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Publish exact failing assertion
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set +e
          go test ./internal/partner -count=1 -run TestGovernedSubmissionRequiresWltPayoutReferenceDBIntegration 2>&1 | tee /tmp/test.log
          EXIT_CODE=${PIPESTATUS[0]}
          LINE="$(grep -m1 -E 'onboarding_integrity_db_test\.go:[0-9]+:' /tmp/test.log || true)"
          MESSAGE="$(printf '%s' "$LINE" | sed -E 's/^[[:space:]]*onboarding_integrity_db_test\.go:[0-9]+:[[:space:]]*//' )"
          TOKEN="$(printf '%s' "$MESSAGE" | tr '[:upper:]' '[:lower:]' | tr -cs '[:alnum:]_.-' '-' | sed 's/^-//;s/-$//' | cut -c1-78)"
          if [ "$EXIT_CODE" -eq 0 ]; then STATE=success; TOKEN=pass; else STATE=failure; fi
          CONTEXT="j1/fs05/dsh/${TOKEN:-unknown}"
          DESCRIPTION="$(printf '%s' "${MESSAGE:-DSH diagnostic failed}" | cut -c1-120)"
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
