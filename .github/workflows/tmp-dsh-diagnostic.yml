name: Temporary DSH Diagnostic

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-dsh-diagnostic.yml"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/tmp-dsh-diagnostic.yml"

permissions:
  contents: read

concurrency:
  group: temporary-dsh-diagnostic-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  diagnose:
    name: Capture DSH test and build output
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Go from DSH module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Capture DSH diagnostics
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set +e
          : > dsh-diagnostic.log
          echo "### go test ./... -count=1" >> dsh-diagnostic.log
          go test ./... -count=1 >> dsh-diagnostic.log 2>&1
          echo "test_exit=$?" >> dsh-diagnostic.log
          echo "### go build ./..." >> dsh-diagnostic.log
          go build ./... >> dsh-diagnostic.log 2>&1
          echo "build_exit=$?" >> dsh-diagnostic.log
          exit 0
      - name: Upload DSH diagnostic
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dsh-diagnostic
          path: services/dsh/backend/dsh-diagnostic.log
          if-no-files-found: error
          retention-days: 1
