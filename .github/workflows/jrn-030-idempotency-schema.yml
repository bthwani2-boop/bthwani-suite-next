name: JRN-030 Audit Idempotency Schema

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    types: [synchronize]

permissions:
  contents: read

concurrency:
  group: jrn-030-idempotency-schema-${{ github.sha }}
  cancel-in-progress: false

jobs:
  inspect:
    name: Inspect partner-fleet audit idempotency schema
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout repository state
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Start PostgreSQL 16
        id: postgres
        shell: bash
        run: |
          set -euo pipefail
          brew list postgresql@16 >/dev/null 2>&1 || brew install postgresql@16
          pg_bin="$(brew --prefix postgresql@16)/bin"
          echo "${pg_bin}" >> "${GITHUB_PATH}"
          rm -rf /tmp/jrn030-schema-pgdata
          "${pg_bin}/initdb" -D /tmp/jrn030-schema-pgdata --auth=trust --encoding=UTF8 >/tmp/jrn030-schema-initdb.log
          "${pg_bin}/pg_ctl" -D /tmp/jrn030-schema-pgdata -o "-p 55432" -l /tmp/jrn030-schema-postgres.log start
          "${pg_bin}/createdb" -h 127.0.0.1 -p 55432 dsh_jrn_030
          echo "database_url=postgres://$(whoami)@127.0.0.1:55432/dsh_jrn_030?sslmode=disable" >> "${GITHUB_OUTPUT}"
      - name: Apply all DSH migrations
        env:
          DATABASE_URL: ${{ steps.postgres.outputs.database_url }}
        run: |
          for migration in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 -f "${migration}" >/dev/null
          done
      - name: Capture audit table and index definition
        env:
          DATABASE_URL: ${{ steps.postgres.outputs.database_url }}
        run: |
          {
            echo '=== columns ==='
            psql "${DATABASE_URL}" -P pager=off -c "SELECT ordinal_position,column_name,data_type,is_nullable,column_default FROM information_schema.columns WHERE table_schema='public' AND table_name='dsh_store_team_member_actions' ORDER BY ordinal_position"
            echo '=== indexes ==='
            psql "${DATABASE_URL}" -P pager=off -c "SELECT indexname,indexdef FROM pg_indexes WHERE schemaname='public' AND tablename='dsh_store_team_member_actions' ORDER BY indexname"
            echo '=== triggers ==='
            psql "${DATABASE_URL}" -P pager=off -c "SELECT tgname,pg_get_triggerdef(oid) FROM pg_trigger WHERE tgrelid='dsh_store_team_member_actions'::regclass AND NOT tgisinternal ORDER BY tgname"
          } > /tmp/jrn030-idempotency-schema.log 2>&1
          cat /tmp/jrn030-idempotency-schema.log
      - name: Upload schema evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jrn-030-idempotency-schema-${{ github.sha }}
          path: /tmp/jrn030-idempotency-schema.log
          if-no-files-found: error
          retention-days: 7
      - name: Stop PostgreSQL
        if: always()
        run: |
          pg_bin="$(brew --prefix postgresql@16)/bin"
          "${pg_bin}/pg_ctl" -D /tmp/jrn030-schema-pgdata stop -m fast || true
