name: One-time Partner Binding Commit First

on:
  push:
    branches: [bassam]
    paths:
      - '.github/workflows/one-time-partner-binding-commit-first.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-partner-binding-commit-first
  cancel-in-progress: false

jobs:
  bind:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0

      - name: Apply guarded runtime bindings
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin bassam
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if new in text:
                  return text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one anchor, found {count}")
              return text.replace(old, new, 1)

          commercial_path = Path("services/dsh/backend/internal/marketing/commercial_programs.go")
          commercial = commercial_path.read_text(encoding="utf-8")
          commercial = replace_once(
              commercial,
              "INSERT INTO dsh_subscription_plans\n\t\t\t(name_ar",
              "INSERT INTO dsh_subscription_plans AS p\n\t\t\t(name_ar",
              "subscription insert alias",
          )
          commercial_path.write_text(commercial, encoding="utf-8")

          server_path = Path("services/dsh/backend/internal/http/server.go")
          server = server_path.read_text(encoding="utf-8")
          marketing_anchor = '''\tmux.HandleFunc("GET /dsh/partner/marketing/offers", protected.handleListOwnPartnerOffers)
\tmux.HandleFunc("POST /dsh/partner/marketing/offers", protected.handleSubmitPartnerOffer)'''
          server = replace_once(
              server,
              marketing_anchor,
              marketing_anchor + '''
\tmux.HandleFunc("GET /dsh/operator/marketing/loyalty-tiers", protected.handleListLoyaltyTiers)
\tmux.HandleFunc("POST /dsh/operator/marketing/loyalty-tiers", protected.handleCreateLoyaltyTier)
\tmux.HandleFunc("PATCH /dsh/operator/marketing/loyalty-tiers/{tierId}", protected.handleUpdateLoyaltyTier)
\tmux.HandleFunc("GET /dsh/operator/marketing/subscription-plans", protected.handleListSubscriptionPlans)
\tmux.HandleFunc("POST /dsh/operator/marketing/subscription-plans", protected.handleCreateSubscriptionPlan)
\tmux.HandleFunc("PATCH /dsh/operator/marketing/subscription-plans/{planId}", protected.handleUpdateSubscriptionPlan)
\tmux.HandleFunc("GET /dsh/client/benefits", protected.handleGetClientBenefits)''',
              "commercial routes",
          )

          fleet_anchor = '''\tmux.HandleFunc("GET /dsh/partner/stores/{storeId}/coverage-zones", protected.handlePartnerCoverageZones)'''
          server = replace_once(
              server,
              fleet_anchor,
              fleet_anchor + '''
\tmux.HandleFunc("POST /dsh/partner/stores/{storeId}/couriers/{memberId}/connection-code", protected.handleIssuePartnerCourierConnectionCode)
\tmux.HandleFunc("GET /dsh/partner/stores/{storeId}/courier-connections", protected.handleListPartnerCourierConnections)
\tmux.HandleFunc("POST /dsh/partner/stores/{storeId}/courier-connections/{connectionId}/revoke", protected.handleRevokePartnerCourierConnection)''',
              "partner fleet routes",
          )

          captain_anchor = '''\tmux.HandleFunc("POST /dsh/captain/stores/{storeId}/pickup-readiness", protected.handleCaptainReadiness)'''
          server = replace_once(
              server,
              captain_anchor,
              captain_anchor + '''
\tmux.HandleFunc("POST /dsh/captain/partner-fleet/connect", protected.handleCaptainConnectPartnerFleet)
\tmux.HandleFunc("GET /dsh/captain/partner-fleet/memberships", protected.handleCaptainPartnerFleetMemberships)''',
              "captain fleet routes",
          )
          server_path.write_text(server, encoding="utf-8")

          renderer_path = Path("services/dsh/frontend/app-partner/DshPartnerRouteRenderer.tsx")
          renderer = renderer_path.read_text(encoding="utf-8")
          renderer = replace_once(
              renderer,
              '''    <PartnerTeamManagementScreen
      storeName={runtimePartnerProfile.storeName}''',
              '''    <PartnerTeamManagementScreen
      storeId={activeStoreIdForStoreScopedScreens}
      storeName={runtimePartnerProfile.storeName}''',
              "partner team store binding",
          )
          renderer_path.write_text(renderer, encoding="utf-8")
          PY
          gofmt -w \
            services/dsh/backend/internal/marketing/commercial_programs.go \
            services/dsh/backend/internal/http/commercial_programs.go \
            services/dsh/backend/internal/partnerfleet/courier_codes.go \
            services/dsh/backend/internal/http/partner_fleet.go \
            services/dsh/backend/internal/http/server.go
          git diff --check

      - name: Commit bindings
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            services/dsh/backend/internal/marketing/commercial_programs.go \
            services/dsh/backend/internal/http/server.go \
            services/dsh/frontend/app-partner/DshPartnerRouteRenderer.tsx
          if git diff --cached --quiet; then
            echo 'Runtime bindings already present.'
            exit 0
          fi
          git commit -m 'fix(partners): register runtime routes and store-scoped fleet UI'
          git pull --rebase origin bassam
          git push origin HEAD:bassam

      - name: Verify backend compilation
        shell: bash
        run: |
          set -euo pipefail
          cd services/dsh/backend
          go test ./...
