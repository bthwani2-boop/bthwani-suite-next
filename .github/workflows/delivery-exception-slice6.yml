name: Delivery Exception Slice Six
run-name: Delivery Exception Slice Six · ${{ github.sha }}

on:
  push:
    branches: ["journey/delivery-exception-redelivery-closure"]
    paths:
      - ".github/workflows/delivery-exception-slice6.yml"
      - "tools/scripts/patch-delivery-exception-slice6.py"
      - "tools/scripts/patch-delivery-exception-slice6-types.py"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: delivery-exception-slice6-${{ github.ref }}
  cancel-in-progress: true

jobs:
  implement-verify-clean:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsh_return_cancel
          POSTGRES_USER: dsh_return_cancel
          POSTGRES_PASSWORD: dsh_return_cancel
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U dsh_return_cancel -d dsh_return_cancel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DSH_DATABASE_URL: postgres://dsh_return_cancel:dsh_return_cancel@localhost:55432/dsh_return_cancel?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-workspace

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Apply returned-order cancellation handoff
        shell: bash
        run: |
          set -euo pipefail
          python tools/scripts/patch-delivery-exception-slice6.py
          python tools/scripts/patch-delivery-exception-slice6-types.py
          gofmt -w \
            services/dsh/backend/internal/orders/orders.go \
            services/dsh/backend/internal/orders/returned_cancellation_db_test.go

      - name: Compile governed cancellation boundaries
        shell: bash
        run: |
          set -euo pipefail
          cd services/dsh/backend
          go test ./internal/orders ./internal/checkoutfinanceoutbox ./internal/http ./cmd/dsh-api -run '^$' -count=1

      - name: Typecheck affected surfaces
        id: surfaces_typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/delivery-exception-slice6-typecheck
          {
            status=0
            for config in \
              apps/app-client/runtime/tsconfig.cancellation-journey.json \
              apps/app-partner/runtime/tsconfig.cancellation-journey.json \
              apps/control-panel/runtime/tsconfig.delivery-exception-journey.json
            do
              echo "=== TYPECHECK $config ==="
              pnpm exec tsc -p "$config" --noEmit --pretty false || status=1
            done
            exit "$status"
          } 2>&1 | tee artifacts/delivery-exception-slice6-typecheck/typecheck.log
          exit ${PIPESTATUS[0]}

      - name: Upload surface typecheck diagnostic
        if: steps.surfaces_typecheck.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: delivery-exception-slice6-typecheck-${{ github.sha }}
          path: artifacts/delivery-exception-slice6-typecheck/typecheck.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on surface typecheck failure
        if: steps.surfaces_typecheck.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Apply migrations and prove one cancellation handoff
        id: returned_cancel_db
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/delivery-exception-slice6-db
          for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" >/dev/null || exit 1
          done
          (
            cd services/dsh/backend
            DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" \
              go test ./internal/orders -run '^TestReturnedOrderCancellationCreatesOneGovernedFinancialHandoffDBIntegration$' -count=1 -v
          ) 2>&1 | tee artifacts/delivery-exception-slice6-db/returned-cancellation.log
          exit ${PIPESTATUS[0]}

      - name: Upload returned cancellation DB diagnostic
        if: steps.returned_cancel_db.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: delivery-exception-slice6-db-${{ github.sha }}
          path: artifacts/delivery-exception-slice6-db/returned-cancellation.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on returned cancellation DB failure
        if: steps.returned_cancel_db.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Prove WLT handoff boundary and fixture-free operations UI
        shell: bash
        run: |
          set -euo pipefail
          screen="services/dsh/frontend/control-panel/operations/ExceptionsEscalationsScreen.tsx"
          test_file="services/dsh/backend/internal/orders/returned_cancellation_db_test.go"
          grep -F "cancelOrder('operator'" "$screen"
          grep -F 'response.cancellation' "$screen"
          grep -F 'fetchOrderCancellation' "$screen"
          grep -F 'FINANCIAL_CLOSURE_LABELS' "$screen"
          grep -F 'returned-delivery-exception-' "$screen"
          grep -F 'financialReference' "$screen"
          grep -F 'financialFailure' "$screen"
          grep -F 'outboxCount != 1' "$test_file"
          grep -F 'FinancialClosureStatus != "pending"' "$test_file"
          ! grep -Ei '(mock|fixture|demo)[A-Za-z0-9_]*[[:space:]]*=' "$screen"

      - name: Remove temporary files and commit verified slice
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/delivery-exception-slice6.yml \
            tools/scripts/patch-delivery-exception-slice6.py \
            tools/scripts/patch-delivery-exception-slice6-types.py
          git add -A
          git commit -m "feat(delivery-exception): hand returned orders to governed cancellation and WLT [skip ci]"
          git pull --rebase origin journey/delivery-exception-redelivery-closure
          git push origin HEAD:journey/delivery-exception-redelivery-closure
          final_sha="$(git rev-parse HEAD)"
          jq -n --arg state success --arg context "Delivery Exception Slice Six" --arg description "returned order cancellation and single WLT handoff verified" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$final_sha" \
            -d @status.json

      - name: Publish focused failure status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state failure --arg context "Delivery Exception Slice Six" --arg description "returned-order financial handoff slice failed" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/${{ github.sha }}" \
            -d @status.json
