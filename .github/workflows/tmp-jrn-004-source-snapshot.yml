name: Temporary JRN-004 Source Snapshot

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-jrn-004-source-snapshot.yml"

permissions:
  contents: read
  statuses: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Upload exact source files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-004-source-snapshot
          path: |
            services/dsh/contracts/dsh.openapi.yaml
            services/dsh/clients/generated/dsh-api.ts
            services/dsh/backend/internal/http/protected_store.go
            services/dsh/frontend/app-client/store/StoreDetailShell.tsx
          retention-days: 1
          if-no-files-found: error
      - name: Publish snapshot status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state "success" --arg context "journeys/jrn-004/source-snapshot" --arg description "JRN-004 exact source snapshot uploaded" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
