name: JRN-031 Go Diagnostic

on:
  pull_request:
    paths:
      - "governance/evidence/.jrn-031-go-diagnostic-trigger"

permissions:
  contents: read

jobs:
  diagnose:
    name: Administration Go isolated and combined gates
    runs-on: macos-14
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/dsh/backend
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: false

      - id: validation
        name: Validate request and review input guards
        continue-on-error: true
        run: go test ./internal/administration -run 'Test(RequestStaffRoleAssignmentRejectsInvalidInput|RequestStaffRoleAssignmentRejectsSelfAssignment|ReviewStaffRoleAssignmentRejectsInvalidDecision|ReviewStaffRoleAssignmentRequiresVersion|RejectedRoleAssignmentRequiresReviewNote)$' -count=1

      - id: scopes
        name: Validate role operation and surface normalization
        continue-on-error: true
        run: go test ./internal/administration -run 'TestNormalizeRoleDefinitionRequiresControlPanelAndNormalizesScope$' -count=1

      - id: permissions
        name: Validate administration permission candidates
        continue-on-error: true
        run: go test ./internal/administration -run 'TestAdministrationPermissionCandidatesPreserveLegacyFallback$' -count=1

      - id: rollback
        name: Validate inverse rollback action
        continue-on-error: true
        run: go test ./internal/administration -run 'TestInverseRoleAction$' -count=1

      - id: redaction
        name: Validate audit detail redaction
        continue-on-error: true
        run: go test ./internal/administration -run 'TestAuditRedactionDropsSensitiveValues$' -count=1

      - id: routes
        name: Validate JRN-031 HTTP route registration
        continue-on-error: true
        run: go test ./internal/http -run 'TestJourney031ExposesGovernedAdministrationRoutes$' -count=1

      - id: combined_tests
        name: Run the exact combined test invocation
        continue-on-error: true
        run: go test ./internal/administration ./internal/http -run 'Test(Journey031ExposesGovernedAdministrationRoutes|RequestStaffRoleAssignmentRejectsInvalidInput|RequestStaffRoleAssignmentRejectsSelfAssignment|ReviewStaffRoleAssignmentRejectsInvalidDecision|ReviewStaffRoleAssignmentRequiresVersion|RejectedRoleAssignmentRequiresReviewNote|NormalizeRoleDefinitionRequiresControlPanelAndNormalizesScope|AdministrationPermissionCandidatesPreserveLegacyFallback|InverseRoleAction|AuditRedactionDropsSensitiveValues)$' -count=1

      - id: build_administration
        name: Build administration owner
        continue-on-error: true
        run: go build ./internal/administration

      - id: build_http
        name: Build protected HTTP owner
        continue-on-error: true
        run: go build ./internal/http

      - id: combined_build
        name: Run the exact combined build invocation
        continue-on-error: true
        run: go build ./internal/administration ./internal/http

      - name: Require every isolated and combined Go gate
        shell: bash
        run: |
          [[ "${{ steps.validation.outcome }}" == "success" ]]
          [[ "${{ steps.scopes.outcome }}" == "success" ]]
          [[ "${{ steps.permissions.outcome }}" == "success" ]]
          [[ "${{ steps.rollback.outcome }}" == "success" ]]
          [[ "${{ steps.redaction.outcome }}" == "success" ]]
          [[ "${{ steps.routes.outcome }}" == "success" ]]
          [[ "${{ steps.combined_tests.outcome }}" == "success" ]]
          [[ "${{ steps.build_administration.outcome }}" == "success" ]]
          [[ "${{ steps.build_http.outcome }}" == "success" ]]
          [[ "${{ steps.combined_build.outcome }}" == "success" ]]
