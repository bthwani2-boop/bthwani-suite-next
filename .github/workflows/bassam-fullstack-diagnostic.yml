name: Bassam Compile Repair Materializer

on:
  pull_request:
    paths:
      - .github/workflows/bassam-fullstack-diagnostic.yml

permissions:
  contents: read

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: bassam
          fetch-depth: 1
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.26.5'
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
      - name: Materialize exact compile repairs
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const wltPath = "services/wlt/contracts/wlt.openapi.yaml";
          let wlt = fs.readFileSync(wltPath, "utf8");
          const invalidRef = '$ref: "#/components/responses/InvalidRequest"';
          const invalidCount = wlt.split(invalidRef).length - 1;
          if (invalidCount > 1) throw new Error(`multiple invalid WLT response references: ${invalidCount}`);
          if (invalidCount === 1) {
            wlt = wlt.replace(invalidRef, '$ref: "#/components/responses/BadRequest"');
            fs.writeFileSync(wltPath, wlt);
          }

          const governedPath = "services/dsh/backend/internal/coupons/governed.go";
          let governed = fs.readFileSync(governedPath, "utf8");
          const oldBlock = `\tbaseTermsChanged := input.NameAr != nil || input.Description != nil || input.StoreID != nil || input.DiscountType != nil || input.DiscountPercent != nil || input.FixedDiscountMinorUnits != nil || input.MaxDiscountMinorUnits != nil || input.MinSubtotalMinorUnits != nil || input.GlobalUsageLimit != nil || input.PerClientUsageLimit != nil || input.EligibleFulfillmentModes != nil || input.StartsAt != nil || input.EndsAt != nil
\tfundingChanged := input.FundingSource != nil || input.PlatformShareBPS != nil || input.FundingPartnerID != nil
\tif current.Status == "active" && (baseTermsChanged || fundingChanged) {
`;
          const newBlock = `\tbaseTermsChanged := input.NameAr != nil || input.Description != nil || input.StoreID != nil || input.DiscountType != nil || input.DiscountPercent != nil || input.FixedDiscountMinorUnits != nil || input.MaxDiscountMinorUnits != nil || input.MinSubtotalMinorUnits != nil || input.GlobalUsageLimit != nil || input.PerClientUsageLimit != nil || input.EligibleFulfillmentModes != nil || input.StartsAt != nil || input.EndsAt != nil
\tcommercialChanged := baseTermsChanged || input.Status != nil
\tfundingChanged := input.FundingSource != nil || input.PlatformShareBPS != nil || input.FundingPartnerID != nil
\tif commercialChanged && fundingChanged {
\t\treturn GovernedCoupon{}, ErrInvalid
\t}
\tif current.Status == "active" && (commercialChanged || fundingChanged) {
`;
          if (governed.includes(oldBlock)) {
            governed = governed.replace(oldBlock, newBlock);
            fs.writeFileSync(governedPath, governed);
          } else if (!governed.includes("commercialChanged := baseTermsChanged || input.Status != nil")) {
            throw new Error("coupon governance block is neither old nor repaired");
          }

          const catalogPath = "services/dsh/frontend/control-panel/catalogs/CatalogDashboardScreen.tsx";
          let catalog = fs.readFileSync(catalogPath, "utf8");
          const oldSignature = 'const handleAssetReview = async (assetId: string, status: "approved" | "rejected" | "archived", note: string) => {';
          const newSignature = 'const handleAssetReview = async (assetId: string, status: "approved" | "rejected", note: string) => {';
          if (catalog.includes(oldSignature)) {
            catalog = catalog.replace(oldSignature, newSignature);
            fs.writeFileSync(catalogPath, catalog);
          } else if (!catalog.includes(newSignature)) {
            throw new Error("catalog asset review signature not found");
          }
          NODE

          find services/dsh/backend -name '*.go' -type f -print0 | xargs -0 gofmt -w
          pnpm run openapi:generate:wlt

      - name: Verify materialized files
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/bassam-materialized
          report=/tmp/bassam-materialized/REPORT.txt
          : > "$report"
          failed=0
          check() {
            name="$1"; shift
            echo "===== $name =====" >> "$report"
            "$@" >> "$report" 2>&1
            code=$?
            echo "EXIT=$code" >> "$report"
            echo >> "$report"
            if [ "$code" -ne 0 ]; then failed=1; fi
          }
          check 'DSH GOFMT' bash -lc 'cd services/dsh/backend && test -z "$(gofmt -l .)"'
          check 'DSH VET' bash -lc 'cd services/dsh/backend && go vet ./...'
          check 'DSH TEST' bash -lc 'cd services/dsh/backend && go test ./...'
          check 'DSH BUILD' bash -lc 'cd services/dsh/backend && go build ./...'
          check 'WLT OPENAPI GENERATE' pnpm run openapi:generate:wlt
          check 'CONTROL PANEL TYPECHECK' pnpm --dir apps/control-panel/runtime typecheck
          check 'CONTRACTS LINT' pnpm run contracts:lint
          check 'API BINDING' pnpm run guard:api-binding
          check 'BACKEND API BINDING' pnpm run guard:backend-api-binding
          check 'FRONTEND FEATURE BINDING' pnpm run guard:frontend-feature-binding
          cp services/wlt/contracts/wlt.openapi.yaml /tmp/bassam-materialized/wlt.openapi.yaml
          cp services/wlt/clients/generated/wlt-api.ts /tmp/bassam-materialized/wlt-api.ts
          cp services/dsh/backend/internal/coupons/governed.go /tmp/bassam-materialized/governed.go
          cp services/dsh/frontend/control-panel/catalogs/CatalogDashboardScreen.tsx /tmp/bassam-materialized/CatalogDashboardScreen.tsx
          echo "$failed" > /tmp/bassam-materialized/FAILED
          cat "$report"

      - name: Upload materialized repairs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: bassam-compile-repairs
          path: /tmp/bassam-materialized
          if-no-files-found: error
          retention-days: 3
