name: Bassam Governed Fullstack Repair

on:
  push:
    branches: [bassam]
    paths:
      - .github/workflows/bassam-fullstack-diagnostic.yml

permissions:
  contents: write

concurrency:
  group: bassam-governed-fullstack-repair
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: bassam
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-workspace
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.26.5'
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
            services/workforce/backend/go.sum
      - name: Apply governed repairs
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master

          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import { execFileSync } from "node:child_process";
          import YAML from "yaml";

          const wltPath = "services/wlt/contracts/wlt.openapi.yaml";
          let wlt = fs.readFileSync(wltPath, "utf8");
          const invalidRef = '$ref: "#/components/responses/InvalidRequest"';
          const occurrences = wlt.split(invalidRef).length - 1;
          if (occurrences !== 1) throw new Error(`expected one InvalidRequest reference, found ${occurrences}`);
          wlt = wlt.replace(invalidRef, '$ref: "#/components/responses/BadRequest"');
          fs.writeFileSync(wltPath, wlt);

          const dshPath = "services/dsh/contracts/dsh.openapi.yaml";
          const current = YAML.parse(fs.readFileSync(dshPath, "utf8"));
          const donor = YAML.parse(execFileSync("git", ["show", "origin/master:services/dsh/contracts/dsh.openapi.yaml"], { encoding: "utf8" }));
          current.paths ??= {};
          for (const [path, value] of Object.entries(donor.paths ?? {})) {
            if (!(path in current.paths)) current.paths[path] = value;
          }
          current.components ??= {};
          for (const [section, values] of Object.entries(donor.components ?? {})) {
            if (!values || typeof values !== "object" || Array.isArray(values)) continue;
            current.components[section] ??= {};
            for (const [name, value] of Object.entries(values)) {
              if (!(name in current.components[section])) current.components[section][name] = value;
            }
          }
          fs.writeFileSync(dshPath, YAML.stringify(current, { lineWidth: 120 }));

          const governedPath = "services/dsh/backend/internal/coupons/governed.go";
          let governed = fs.readFileSync(governedPath, "utf8");
          const oldBlock = `\tbaseTermsChanged := input.NameAr != nil || input.Description != nil || input.StoreID != nil || input.DiscountType != nil || input.DiscountPercent != nil || input.FixedDiscountMinorUnits != nil || input.MaxDiscountMinorUnits != nil || input.MinSubtotalMinorUnits != nil || input.GlobalUsageLimit != nil || input.PerClientUsageLimit != nil || input.EligibleFulfillmentModes != nil || input.StartsAt != nil || input.EndsAt != nil
\tfundingChanged := input.FundingSource != nil || input.PlatformShareBPS != nil || input.FundingPartnerID != nil
\tif current.Status == "active" && (baseTermsChanged || fundingChanged) {
`;
          const newBlock = `\tbaseTermsChanged := input.NameAr != nil || input.Description != nil || input.StoreID != nil || input.DiscountType != nil || input.DiscountPercent != nil || input.FixedDiscountMinorUnits != nil || input.MaxDiscountMinorUnits != nil || input.MinSubtotalMinorUnits != nil || input.GlobalUsageLimit != nil || input.PerClientUsageLimit != nil || input.EligibleFulfillmentModes != nil || input.StartsAt != nil || input.EndsAt != nil
\tcommercialChanged := baseTermsChanged || input.Status != nil
\tfundingChanged := input.FundingSource != nil || input.PlatformShareBPS != nil || input.FundingPartnerID != nil
\tif commercialChanged && fundingChanged {
\t\treturn GovernedCoupon{}, ErrInvalid
\t}
\tif current.Status == "active" && (commercialChanged || fundingChanged) {
`;
          if (!governed.includes(oldBlock)) throw new Error("governed coupon update block not found exactly");
          governed = governed.replace(oldBlock, newBlock);
          fs.writeFileSync(governedPath, governed);
          NODE

          find services/dsh/backend services/workforce/backend -name '*.go' -type f -print0 | xargs -0 gofmt -w
          pnpm run openapi:generate:dsh
          pnpm run openapi:generate:wlt

      - name: Verify and record exact results
        shell: bash
        run: |
          set +e
          mkdir -p governance/evidence /tmp/bassam-repair
          report=governance/evidence/BASSAM_FULLSTACK_REPAIR.md
          printf '# Bassam Fullstack Repair Evidence\n\n' > "$report"
          printf -- '- Source SHA: `%s`\n' "$(git rev-parse HEAD)" >> "$report"
          printf -- '- Executed at: `%s`\n\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$report"
          failed=0
          check() {
            name="$1"; shift
            slug=$(printf '%s' "$name" | tr '[:upper:] ' '[:lower:]-' | tr -cd 'a-z0-9_-')
            log="/tmp/bassam-repair/$slug.log"
            "$@" >"$log" 2>&1
            code=$?
            printf '## %s\n\n' "$name" >> "$report"
            if [ "$code" -eq 0 ]; then
              printf -- '- Result: **PASS**\n\n' >> "$report"
            else
              failed=1
              printf -- '- Result: **FAIL** (exit `%s`)\n\n' "$code" >> "$report"
            fi
            printf '```text\n' >> "$report"
            tail -n 260 "$log" >> "$report"
            printf '\n```\n\n' >> "$report"
          }
          check 'DSH gofmt' bash -lc 'cd services/dsh/backend && test -z "$(gofmt -l .)"'
          check 'DSH vet' bash -lc 'cd services/dsh/backend && go vet ./...'
          check 'DSH tests' bash -lc 'cd services/dsh/backend && go test ./...'
          check 'DSH build' bash -lc 'cd services/dsh/backend && go build ./...'
          check 'WLT tests' bash -lc 'cd services/wlt/backend && go test ./...'
          check 'WLT build' bash -lc 'cd services/wlt/backend && go build ./...'
          check 'Workforce gofmt' bash -lc 'cd services/workforce/backend && test -z "$(gofmt -l .)"'
          check 'Workforce vet' bash -lc 'cd services/workforce/backend && go vet ./...'
          check 'Workforce tests' bash -lc 'cd services/workforce/backend && go test ./...'
          check 'Workforce build' bash -lc 'cd services/workforce/backend && go build ./...'
          check 'Contracts lint' pnpm run contracts:lint
          check 'Control panel typecheck' pnpm --dir apps/control-panel/runtime typecheck
          check 'API binding' pnpm run guard:api-binding
          check 'Backend API binding' pnpm run guard:backend-api-binding
          check 'Frontend feature binding' pnpm run guard:frontend-feature-binding
          check 'Broken imports' pnpm run guard:no-broken-imports
          check 'Go routes' pnpm run guard:go-routes-ci
          printf '## Verdict\n\n' >> "$report"
          if [ "$failed" -eq 0 ]; then
            printf '**PASS — targeted full-stack repair gates passed on the remote branch.**\n' >> "$report"
          else
            printf '**FIX_REQUIRED — exact remaining failures are recorded above.**\n' >> "$report"
          fi
          echo "$failed" > /tmp/bassam-repair/failed

      - name: Commit repair and evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/bassam-fullstack-diagnostic.yml
          git config user.name bthwani-fullstack-repair-bot
          git config user.email fullstack-repair-bot@users.noreply.github.com
          git add -A
          git commit -m 'fix(fullstack): repair contracts bindings and compile gates' || true
          git fetch origin bassam
          git rebase origin/bassam
          git push origin HEAD:bassam

      - name: Preserve fail-closed status
        if: always()
        shell: bash
        run: |
          test "$(cat /tmp/bassam-repair/failed 2>/dev/null || echo 1)" = 0
