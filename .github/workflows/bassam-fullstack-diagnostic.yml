name: Bassam Compile Repair Commit

on:
  push:
    branches: [bassam]
    paths:
      - .github/workflows/bassam-fullstack-diagnostic.yml

permissions:
  contents: write

concurrency:
  group: bassam-compile-repair-commit
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: bassam
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-workspace
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.26.5'
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
            core/workforce/backend/go.sum
      - name: Apply exact corrections
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          wlt_path = Path('services/wlt/contracts/wlt.openapi.yaml')
          wlt = wlt_path.read_text()
          old_ref = '$ref: "#/components/responses/InvalidRequest"'
          count = wlt.count(old_ref)
          if count > 1:
              raise SystemExit(f'multiple invalid WLT response references: {count}')
          if count == 1:
              wlt_path.write_text(wlt.replace(old_ref, '$ref: "#/components/responses/BadRequest"', 1))

          governed_path = Path('services/dsh/backend/internal/coupons/governed.go')
          governed = governed_path.read_text()
          old_block = '''\tbaseTermsChanged := input.NameAr != nil || input.Description != nil || input.StoreID != nil || input.DiscountType != nil || input.DiscountPercent != nil || input.FixedDiscountMinorUnits != nil || input.MaxDiscountMinorUnits != nil || input.MinSubtotalMinorUnits != nil || input.GlobalUsageLimit != nil || input.PerClientUsageLimit != nil || input.EligibleFulfillmentModes != nil || input.StartsAt != nil || input.EndsAt != nil
\tfundingChanged := input.FundingSource != nil || input.PlatformShareBPS != nil || input.FundingPartnerID != nil
\tif current.Status == "active" && (baseTermsChanged || fundingChanged) {
'''
          new_block = '''\tbaseTermsChanged := input.NameAr != nil || input.Description != nil || input.StoreID != nil || input.DiscountType != nil || input.DiscountPercent != nil || input.FixedDiscountMinorUnits != nil || input.MaxDiscountMinorUnits != nil || input.MinSubtotalMinorUnits != nil || input.GlobalUsageLimit != nil || input.PerClientUsageLimit != nil || input.EligibleFulfillmentModes != nil || input.StartsAt != nil || input.EndsAt != nil
\tcommercialChanged := baseTermsChanged || input.Status != nil
\tfundingChanged := input.FundingSource != nil || input.PlatformShareBPS != nil || input.FundingPartnerID != nil
\tif commercialChanged && fundingChanged {
\t\treturn GovernedCoupon{}, ErrInvalid
\t}
\tif current.Status == "active" && (commercialChanged || fundingChanged) {
'''
          if old_block in governed:
              governed_path.write_text(governed.replace(old_block, new_block, 1))
          elif 'commercialChanged := baseTermsChanged || input.Status != nil' not in governed:
              raise SystemExit('coupon governance block not found')

          catalog_path = Path('services/dsh/frontend/control-panel/catalogs/CatalogDashboardScreen.tsx')
          catalog = catalog_path.read_text()
          old_sig = 'const handleAssetReview = async (assetId: string, status: "approved" | "rejected" | "archived", note: string) => {'
          new_sig = 'const handleAssetReview = async (assetId: string, status: "approved" | "rejected", note: string) => {'
          if old_sig in catalog:
              catalog_path.write_text(catalog.replace(old_sig, new_sig, 1))
          elif new_sig not in catalog:
              raise SystemExit('catalog review signature not found')
          PY

          find services/dsh/backend core/workforce/backend -name '*.go' -type f -print0 | xargs -0 gofmt -w
          pnpm run openapi:generate:wlt

      - name: Verify and record
        id: verify
        shell: bash
        run: |
          set +e
          mkdir -p governance/evidence /tmp/bassam-compile
          report=governance/evidence/BASSAM_COMPILE_REPAIR.md
          printf '# Bassam Compile Repair\n\n' > "$report"
          printf -- '- Source SHA: `%s`\n\n' "$(git rev-parse HEAD)" >> "$report"
          failed=0
          check() {
            name="$1"; shift
            log="/tmp/bassam-compile/$(printf '%s' "$name" | tr '[:upper:] ' '[:lower:]-' | tr -cd 'a-z0-9_-').log"
            "$@" >"$log" 2>&1
            code=$?
            printf '## %s\n\n' "$name" >> "$report"
            if [ "$code" -eq 0 ]; then printf -- '- Result: **PASS**\n\n' >> "$report"; else failed=1; printf -- '- Result: **FAIL** (exit `%s`)\n\n' "$code" >> "$report"; fi
            printf '```text\n' >> "$report"; tail -n 320 "$log" >> "$report"; printf '\n```\n\n' >> "$report"
          }
          check 'DSH format' bash -lc 'cd services/dsh/backend && test -z "$(gofmt -l .)"'
          check 'DSH vet' bash -lc 'cd services/dsh/backend && go vet ./...'
          check 'DSH tests' bash -lc 'cd services/dsh/backend && go test ./...'
          check 'DSH build' bash -lc 'cd services/dsh/backend && go build ./...'
          check 'Workforce format' bash -lc 'cd core/workforce/backend && test -z "$(gofmt -l .)"'
          check 'Workforce vet' bash -lc 'cd core/workforce/backend && go vet ./...'
          check 'Workforce tests' bash -lc 'cd core/workforce/backend && go test ./...'
          check 'Workforce build' bash -lc 'cd core/workforce/backend && go build ./...'
          check 'WLT client generation' pnpm run openapi:generate:wlt
          check 'Control panel typecheck' pnpm --dir apps/control-panel/runtime typecheck
          check 'Contracts lint' pnpm run contracts:lint
          check 'Governance schema' pnpm run guard:governance-schema
          if [ "$failed" -eq 0 ]; then printf '**PASS — compile repair checks passed.**\n' >> "$report"; else printf '**FIX_REQUIRED — remaining exact failures are above.**\n' >> "$report"; fi
          echo "failed=$failed" >> "$GITHUB_OUTPUT"

      - name: Commit corrections and evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/bassam-fullstack-diagnostic.yml
          git config user.name bthwani-compile-repair-bot
          git config user.email compile-repair-bot@users.noreply.github.com
          git add -A
          git commit -m 'fix(fullstack): close compile and contract blockers' || true
          git fetch origin bassam
          git rebase origin/bassam
          git push origin HEAD:bassam

      - name: Preserve fail-closed result
        if: steps.verify.outputs.failed == '1'
        run: exit 1
