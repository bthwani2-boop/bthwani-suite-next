name: One-time lianbassam js-yaml remediation

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/security-remediation-lianbassam-v3.yml"

permissions:
  contents: write
  statuses: write

jobs:
  remediate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout lianbassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: lianbassam
          fetch-depth: 1
          show-progress: false

      - name: Publish run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=pending \
            -f context='bthwani/security-remediation-v3' \
            -f description='Closing remaining js-yaml advisories' \
            -f target_url="${RUN_URL}"

      - name: Setup PNPM
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.34.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Apply precise js-yaml overrides
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('pnpm-workspace.yaml')
          lines = path.read_text(encoding='utf-8').splitlines()
          remove_fragments = (
              'js-yaml@>=4.0.0 <4.3.0:',
              'js-yaml@>=4.0.0 <=4.1.1:',
              'js-yaml@>=5.0.0 <=5.2.0:',
              "'@eslint/eslintrc>js-yaml':",
              "'@yarnpkg/parsers>js-yaml':",
              'js-yaml@4.2.0:',
              'js-yaml@5.2.0:',
          )
          filtered = [line for line in lines if not any(fragment in line for fragment in remove_fragments)]
          output = []
          inserted = False
          for line in filtered:
              output.append(line)
              if 'js-yaml@>=3.0.0 <3.15.0:' in line:
                  output.extend([
                      "  '@eslint/eslintrc>js-yaml': 4.3.0",
                      "  '@yarnpkg/parsers>js-yaml': 5.2.1",
                      "  js-yaml@4.2.0: 4.3.0",
                      "  js-yaml@5.2.0: 5.2.1",
                  ])
                  inserted = True
          if not inserted:
              raise SystemExit('Unable to locate js-yaml override insertion point')
          output = ["  next: 16.2.11" if line.strip().startswith('next:') else line for line in output]
          path.write_text('\n'.join(output) + '\n', encoding='utf-8')
          PY

          pnpm install --lockfile-only --reporter=append-only
          pnpm audit --json > governance/evidence/security/pnpm-audit-lianbassam.json || true

          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('governance/evidence/security/pnpm-audit-lianbassam.json').read_text(encoding='utf-8'))
          counts = report.get('metadata', {}).get('vulnerabilities', {})
          remaining = sum(int(counts.get(level, 0)) for level in ('critical', 'high', 'moderate', 'low'))
          print('Remaining vulnerability counts:', counts)
          if remaining:
              raise SystemExit(f'PNPM audit still reports {remaining} vulnerabilities')
          PY

          cat > governance/evidence/security/lianbassam-remediation.md <<'MD'
          # lianbassam security remediation

          - Next.js updated to 16.2.11.
          - github.com/lib/pq updated to v1.12.3 wherever declared.
          - golang.org/x/crypto updated to v0.54.0 wherever declared.
          - js-yaml advisory paths pinned to 4.3.0 and 5.2.1.
          - PNPM audit reports zero known vulnerabilities.
          - Dependabot coverage expanded to all known Node, Go, and Actions ecosystems and targeted at lianbassam.
          - No merge or write to master was performed.
          MD

      - name: Commit verified remediation
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/security-remediation-lianbassam-v3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(security): close remaining js-yaml advisories"
          git push origin HEAD:lianbassam

      - name: Publish success
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=success \
            -f context='bthwani/security-remediation-v3' \
            -f description='PNPM audit reached zero vulnerabilities' \
            -f target_url="${RUN_URL}"

      - name: Publish failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=failure \
            -f context='bthwani/security-remediation-v3' \
            -f description='Remaining advisory remediation failed' \
            -f target_url="${RUN_URL}"
