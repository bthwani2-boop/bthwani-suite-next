name: One-time Bind Delivery Pricing

on:
  push:
    branches: [bassam]
    paths:
      - '.github/workflows/one-time-bind-delivery-pricing.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-bind-delivery-pricing
  cancel-in-progress: false

jobs:
  bind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod

      - name: Register routes
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin bassam
          python3 - <<'PY'
          from pathlib import Path

          def insert_after(text, anchor, addition, label):
              if addition.strip() in text:
                  return text
              if text.count(anchor) != 1:
                  raise SystemExit(f'{label}: expected one anchor, found {text.count(anchor)}')
              return text.replace(anchor, anchor + '\n' + addition, 1)

          path = Path('services/dsh/backend/internal/http/server.go')
          text = path.read_text(encoding='utf-8')
          text = insert_after(
              text,
              '\tmux.HandleFunc("GET /dsh/operator/diagnostics/stores/{storeId}", protected.handleOperatorStoreDiagnostics)',
              '\tmux.HandleFunc("GET /dsh/operator/stores/{storeId}/delivery-pricing", protected.handleOperatorListDeliveryPricing)\n\tmux.HandleFunc("PUT /dsh/operator/stores/{storeId}/delivery-pricing/{fulfillmentMode}", protected.handleOperatorUpsertDeliveryPricing)',
              'operator delivery pricing routes',
          )
          text = insert_after(
              text,
              '\tmux.HandleFunc("GET /dsh/partner/stores/{storeId}/coverage-zones", protected.handlePartnerCoverageZones)',
              '\tmux.HandleFunc("GET /dsh/partner/stores/{storeId}/delivery-pricing", protected.handlePartnerListDeliveryPricing)\n\tmux.HandleFunc("PUT /dsh/partner/stores/{storeId}/delivery-pricing/{fulfillmentMode}", protected.handlePartnerUpsertDeliveryPricing)',
              'partner delivery pricing routes',
          )
          path.write_text(text, encoding='utf-8')
          PY
          gofmt -w services/dsh/backend/internal/http/server.go services/dsh/backend/internal/http/delivery_pricing.go services/dsh/backend/internal/checkout/delivery_pricing_admin.go
          git diff --check

      - name: Commit routes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add services/dsh/backend/internal/http/server.go services/dsh/backend/internal/http/delivery_pricing.go services/dsh/backend/internal/checkout/delivery_pricing_admin.go
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'fix(pricing): register scoped delivery pricing APIs'
          git pull --rebase origin bassam
          git push origin HEAD:bassam

      - name: Compile
        working-directory: services/dsh/backend
        run: go test ./...
