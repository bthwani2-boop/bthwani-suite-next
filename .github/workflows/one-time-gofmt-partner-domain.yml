name: One-time GoFmt Partner Domain

on:
  push:
    branches: [bassam]
    paths:
      - '.github/workflows/one-time-gofmt-partner-domain.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-gofmt-partner-domain
  cancel-in-progress: false

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod

      - name: Format partner domain sources
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin bassam
          gofmt -w \
            services/dsh/backend/internal/marketing/commercial_programs.go \
            services/dsh/backend/internal/marketing/commercial_programs_create_safe.go \
            services/dsh/backend/internal/marketing/commercial_programs_test.go \
            services/dsh/backend/internal/http/commercial_programs.go \
            services/dsh/backend/internal/partnerfleet/courier_codes.go \
            services/dsh/backend/internal/partnerfleet/courier_codes_test.go \
            services/dsh/backend/internal/http/partner_fleet.go \
            services/dsh/backend/internal/http/server.go
          git diff --check

      - name: Commit formatting
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add services/dsh/backend/internal/marketing services/dsh/backend/internal/partnerfleet services/dsh/backend/internal/http/commercial_programs.go services/dsh/backend/internal/http/partner_fleet.go services/dsh/backend/internal/http/server.go
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'style(partners): gofmt partner domain closure'
          git pull --rebase origin bassam
          git push origin HEAD:bassam
