name: Lian One-Time Privacy Route and Format Fixer

on:
  push:
    branches: [lian]
    paths:
      - ".github/workflows/lian-one-time-privacy-route-format.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lian-one-time-privacy-route-format
  cancel-in-progress: false

jobs:
  apply:
    name: Register privacy routes and normalize Go files
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout current lian head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: lian
          fetch-depth: 0

      - name: Register client-address privacy routes exactly once
        shell: python
        run: |
          from pathlib import Path

          path = Path("services/dsh/backend/internal/http/catalog_unified_routes.go")
          text = path.read_text(encoding="utf-8")
          markers = [
              'mux.HandleFunc("GET /dsh/operator/privacy/client-addresses/policy", s.handleGetClientAddressPrivacyPolicy)',
              'mux.HandleFunc("PUT /dsh/operator/privacy/client-addresses/policy", s.handleUpdateClientAddressPrivacyPolicy)',
              'mux.HandleFunc("POST /dsh/operator/privacy/client-addresses/anonymize", s.handleAnonymizeExpiredClientAddresses)',
          ]
          if all(marker in text for marker in markers):
              raise SystemExit(0)

          anchor = 'mux.HandleFunc("GET /dsh/platform/store-onboarding-fee", s.handleGetStoreOnboardingFeeReference)'
          if anchor not in text:
              raise SystemExit("platform route anchor not found; refusing non-deterministic patch")

          insertion = anchor + "\n\t" + "\n\t".join(markers)
          text = text.replace(anchor, insertion, 1)
          path.write_text(text, encoding="utf-8")

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Format exact governed Go scope
        shell: bash
        run: |
          set -euo pipefail
          gofmt -w \
            core/providers/backend/internal/providers/maps.go \
            core/providers/backend/internal/providers/map_repository.go \
            core/providers/backend/internal/providers/maps_test.go \
            core/providers/backend/internal/http/maps.go \
            core/providers/backend/internal/http/server.go \
            services/dsh/backend/internal/mapproviders/client.go \
            services/dsh/backend/internal/servicearea/geofence.go \
            services/dsh/backend/internal/servicearea/geofence_test.go \
            services/dsh/backend/internal/platformpolicies/policies.go \
            services/dsh/backend/internal/platformpolicies/platformpolicies.go \
            services/dsh/backend/internal/clientaddress/privacy.go \
            services/dsh/backend/internal/clientaddress/privacy_anonymize_idempotent.go \
            services/dsh/backend/internal/http/client_maps.go \
            services/dsh/backend/internal/http/platform_operational_policies.go \
            services/dsh/backend/internal/http/platformpolicies.go \
            services/dsh/backend/internal/http/client_address_privacy.go \
            services/dsh/backend/internal/http/catalog_unified_routes.go \
            services/dsh/backend/cmd/dsh-address-privacy/main.go \
            tools/guards/extract_routes.go

      - name: Verify the deterministic patch
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'GET /dsh/operator/privacy/client-addresses/policy' services/dsh/backend/internal/http/catalog_unified_routes.go
          grep -F 'PUT /dsh/operator/privacy/client-addresses/policy' services/dsh/backend/internal/http/catalog_unified_routes.go
          grep -F 'POST /dsh/operator/privacy/client-addresses/anonymize' services/dsh/backend/internal/http/catalog_unified_routes.go
          test -z "$(gofmt -l core/providers/backend services/dsh/backend tools/guards/extract_routes.go)"

      - name: Commit only when the remote branch needs the deterministic fix
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No route or formatting changes required."
            exit 0
          fi
          git config user.name "bthwani-governed-fixer"
          git config user.email "actions@users.noreply.github.com"
          git add \
            core/providers/backend/internal/providers \
            core/providers/backend/internal/http/maps.go \
            core/providers/backend/internal/http/server.go \
            services/dsh/backend/internal \
            services/dsh/backend/cmd/dsh-address-privacy \
            tools/guards/extract_routes.go
          git commit -m "fix(dsh): register privacy routes and normalize governed Go"
          git push origin HEAD:lian
