name: Order Preparation Slice One
run-name: Order Preparation Slice One · ${{ github.sha }}

on:
  push:
    branches: ["journey/order-preparation-handoff-closure"]
    paths:
      - ".github/workflows/order-preparation-slice1.yml"
      - "tools/scripts/patch-order-preparation-slice1.py"
      - "tools/scripts/patch-order-preparation-slice1-corrections.py"
  pull_request:
    branches: ["journey/order-preparation-handoff-gate-base"]
    paths:
      - ".github/workflows/order-preparation-slice1.yml"
      - "tools/scripts/patch-order-preparation-slice1.py"
      - "tools/scripts/patch-order-preparation-slice1-corrections.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: order-preparation-slice1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  implement-verify-clean:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup-node-workspace

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Apply server-authoritative partner action slice
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/order-preparation-slice1-apply
          {
            set -euo pipefail
            python tools/scripts/patch-order-preparation-slice1-corrections.py
            python tools/scripts/patch-order-preparation-slice1.py
            gofmt -w \
              services/dsh/backend/internal/http/server.go \
              services/dsh/backend/internal/http/partner_order_workboard.go \
              services/dsh/backend/internal/http/partner_order_workboard_test.go
          } 2>&1 | tee artifacts/order-preparation-slice1-apply/apply.log
          exit ${PIPESTATUS[0]}

      - name: Upload apply diagnostic
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: order-preparation-slice1-apply-${{ github.sha }}
          path: artifacts/order-preparation-slice1-apply/apply.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on apply failure
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Generate and prove DSH contract
        id: contract
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/order-preparation-slice1-contract
          {
            set -euo pipefail
            pnpm run openapi:generate:dsh
            grep -F '/dsh/partner/order-workboard:' services/dsh/contracts/dsh.openapi.yaml
            grep -F 'DshPartnerOrderAction:' services/dsh/contracts/dsh.openapi.yaml
            grep -F 'DshPartnerOrderWorkboardOrder:' services/dsh/contracts/dsh.openapi.yaml
            grep -F 'DshPartnerOrderWorkboardResponse:' services/dsh/contracts/dsh.openapi.yaml
            grep -F 'getDshPartnerOrderWorkboard' services/dsh/clients/generated/dsh-api.ts
            grep -F 'allowedActions' services/dsh/clients/generated/dsh-api.ts
          } 2>&1 | tee artifacts/order-preparation-slice1-contract/contract.log
          exit ${PIPESTATUS[0]}

      - name: Upload contract diagnostic
        if: steps.contract.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: order-preparation-slice1-contract-${{ github.sha }}
          path: artifacts/order-preparation-slice1-contract/contract.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on contract failure
        if: steps.contract.outcome == 'failure'
        run: exit 1

      - name: Prove focused backend boundaries
        id: backend
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/order-preparation-slice1-backend
          {
            cd services/dsh/backend
            go test ./internal/http -run '^TestPartnerOrderAllowedActions$' -count=1 -v
            go test ./internal/orders ./internal/http ./cmd/dsh-api -run '^$' -count=1
          } 2>&1 | tee artifacts/order-preparation-slice1-backend/backend.log
          exit ${PIPESTATUS[0]}

      - name: Upload backend diagnostic
        if: steps.backend.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: order-preparation-slice1-backend-${{ github.sha }}
          path: artifacts/order-preparation-slice1-backend/backend.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on backend failure
        if: steps.backend.outcome == 'failure'
        run: exit 1

      - name: Typecheck all affected order surfaces
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/order-preparation-slice1-typecheck
          {
            status=0
            for config in \
              apps/app-partner/runtime/tsconfig.order-journey.json \
              apps/app-client/runtime/tsconfig.order-journey.json \
              apps/app-captain/runtime/tsconfig.order-journey.json \
              apps/control-panel/runtime/tsconfig.order-journey.json
            do
              echo "=== TYPECHECK $config ==="
              pnpm exec tsc -p "$config" --noEmit --pretty false || status=1
            done
            exit "$status"
          } 2>&1 | tee artifacts/order-preparation-slice1-typecheck/typecheck.log
          exit ${PIPESTATUS[0]}

      - name: Upload typecheck diagnostic
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: order-preparation-slice1-typecheck-${{ github.sha }}
          path: artifacts/order-preparation-slice1-typecheck/typecheck.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Prove runtime truth and remove stale local inference
        id: runtime
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          server=services/dsh/backend/internal/http/server.go
          workboard=services/dsh/backend/internal/http/partner_order_workboard.go
          adapter=services/dsh/frontend/shared/partner/partner.adapters.ts
          commands=services/dsh/frontend/app-partner/orders/usePartnerOrderCommands.ts
          operational=services/dsh/frontend/app-partner/orders/OperationalOrdersInboxScreen.tsx
          decision=services/dsh/frontend/app-partner/orders/OperationalOrderDecisionScreen.tsx
          grep -F 'GET /dsh/partner/order-workboard' "$server"
          grep -F 'partnerOrderAllowedActions' "$workboard"
          grep -F 'order.AllowedActions' "$workboard"
          grep -F 'missing server allowedActions' "$adapter"
          grep -F "allowedActions.includes('prepare')" "$commands"
          grep -F 'item.allowedActions' "$operational"
          grep -F 'canAccept={canAccept}' "$decision"
          ! grep -R -F 'handleMarkReady' \
            services/dsh/frontend/app-partner/orders/usePartnerOrdersRuntime.ts \
            services/dsh/frontend/app-partner/orders/usePartnerOrdersModel.ts \
            services/dsh/frontend/app-partner/useDshPartnerSurfaceModel.ts \
            services/dsh/frontend/app-partner/DshPartnerSurface.tsx \
            services/dsh/frontend/app-partner/DshPartnerRouteRenderer.tsx
          ! grep -F 'fetchPartnerOrders(storeId' services/dsh/frontend/shared/orders/use-orders-controller.ts
          ! grep -Ei '(mock|fixture|demo)[A-Za-z0-9_]*[[:space:]]*=' \
            services/dsh/frontend/app-partner/orders/OrdersInboxScreen.tsx \
            services/dsh/frontend/app-partner/orders/OperationalOrdersInboxScreen.tsx \
            services/dsh/frontend/app-partner/orders/OperationalOrderDecisionScreen.tsx \
            services/dsh/frontend/app-partner/orders/DshPartnerOrderRejectionScreen.tsx

      - name: Stop on runtime truth failure
        if: steps.runtime.outcome == 'failure'
        run: exit 1

      - name: Remove temporary slice machinery and commit implementation
        if: steps.apply.outcome == 'success' && steps.contract.outcome == 'success' && steps.backend.outcome == 'success' && steps.typecheck.outcome == 'success' && steps.runtime.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/order-preparation-slice1-failure
          git rm -f \
            .github/workflows/order-preparation-slice1.yml \
            tools/scripts/patch-order-preparation-slice1.py \
            tools/scripts/patch-order-preparation-slice1-corrections.py
          git add -A
          git commit -m "feat(order-preparation): enforce server-authoritative partner actions [skip ci]"
          git pull --rebase origin journey/order-preparation-handoff-closure
          git push origin HEAD:journey/order-preparation-handoff-closure

      - name: Record focused failure stage
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          printf 'apply=%s\ncontract=%s\nbackend=%s\ntypecheck=%s\nruntime=%s\nsource_sha=%s\n' \
            '${{ steps.apply.outcome }}' \
            '${{ steps.contract.outcome }}' \
            '${{ steps.backend.outcome }}' \
            '${{ steps.typecheck.outcome }}' \
            '${{ steps.runtime.outcome }}' \
            '${{ github.event.pull_request.head.sha || github.sha }}' > .github/order-preparation-slice1-failure
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/order-preparation-slice1-failure
          git commit -m "ci(order-preparation): record focused slice-one failure [skip ci]"
          git pull --rebase origin journey/order-preparation-handoff-closure
          git push origin HEAD:journey/order-preparation-handoff-closure
