name: JRN-007 Home Discovery Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "services/dsh/tsconfig.jrn-007.json"
      - "services/dsh/backend/internal/homediscovery/**"
      - "services/dsh/backend/internal/http/server.go"
      - "services/dsh/backend/internal/http/journey_007_routes_test.go"
      - "services/dsh/contracts/contract-registry.ts"
      - "services/dsh/contracts/dsh.home-marketing-events.openapi.yaml"
      - "services/dsh/frontend/shared/home-discovery/**"
      - "services/dsh/frontend/app-client/home-discovery/**"
      - "services/dsh/frontend/app-client/DshClientSurface.tsx"
      - "services/dsh/frontend/control-panel/marketing/components/MarketingHomeDiscoveryPanel.tsx"
      - "services/dsh/tests/home-discovery-admin.test.mjs"
      - "services/dsh/tests/jrn-007-home-discovery-closure.test.mjs"
      - ".github/actions/setup-node-workspace/action.yml"
      - ".github/workflows/jrn-007-sambassam-verify.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-007-${{ github.ref }}
  cancel-in-progress: true

jobs:
  home-bindings:
    name: Contract and multi-surface bindings
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node and PNPM workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify repository hygiene
        run: git diff --check
      - name: Verify registered OpenAPI contracts
        run: pnpm contracts:lint
      - name: Verify JRN-007 source bindings
        run: node --test services/dsh/tests/jrn-007-home-discovery-closure.test.mjs
      - name: Typecheck JRN-007 shared brain and surfaces
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-007.json --noEmit --pretty false

  home-go:
    name: Home domain and governed routes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/dsh/backend
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Go from module
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify home discovery domain
        run: go test ./internal/homediscovery -count=1
      - name: Verify JRN-007 route registration
        run: go test ./internal/http -run TestJourney007ExposesHomeMarketingEventRoute -count=1

  publish-result:
    name: Publish JRN-007 same-commit status
    if: always()
    needs: [home-bindings, home-go]
    runs-on: ubuntu-latest
    steps:
      - name: Publish aggregate status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          BINDINGS_RESULT: ${{ needs.home-bindings.result }}
          GO_RESULT: ${{ needs.home-go.result }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=failure
          DESCRIPTION="JRN-007 home discovery verification failed"
          if [ "$BINDINGS_RESULT" = success ] && [ "$GO_RESULT" = success ]; then
            STATE=success
            DESCRIPTION="JRN-007 home discovery verification passed"
          fi
          jq -n \
            --arg state "$STATE" \
            --arg context "journeys/jrn-007/home-discovery" \
            --arg description "$DESCRIPTION" \
            --arg target_url "$TARGET_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
