name: Lian One-Time Harden Final Gate

on:
  push:
    branches: [lian]
    paths:
      - ".github/workflows/lian-one-time-harden-final-gate.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lian
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: lian
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch final closure gate deterministically
        shell: python
        run: |
          from pathlib import Path

          path = Path('.github/workflows/lian-final-closure-gate.yml')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              'permissions:\n  contents: read\n',
              'permissions:\n  contents: read\n  statuses: write\n',
              1,
          )
          text = text.replace(
              '  full-runtime:\n    name: Sovereign six-service runtime and journeys\n    runs-on: ubuntu-latest\n    timeout-minutes: 90\n',
              '  full-runtime:\n    name: Sovereign six-service runtime and journeys\n    runs-on: ubuntu-latest\n    timeout-minutes: 150\n',
              1,
          )

          old_evidence = '''          if ($evidence.state -ne "PASS") { throw "runtime evidence failed" }
          if ($evidence.commitSha -ne $env:GITHUB_SHA) { throw "runtime evidence belongs to another commit" }
          if ($evidence.services.PSObject.Properties.Count -lt 7) { throw "runtime evidence is incomplete" }
          if ($evidence.protectedRoutes.PSObject.Properties.Count -lt 5) { throw "protected route evidence is incomplete" }
'''
          new_evidence = '''          if ($evidence.state -ne "PASS") { throw "runtime evidence failed" }
          if ($evidence.commitSha -ne $env:GITHUB_SHA) { throw "runtime evidence belongs to another commit" }
          if ($evidence.services.PSObject.Properties.Count -lt 7) { throw "runtime evidence is incomplete" }
          if ($evidence.financialMatrix.state -ne "PASS") { throw "financial duplicate/replay matrix failed" }
          if ($evidence.disasterRecovery.state -ne "PASS") { throw "disaster recovery round trip failed" }
          if ($evidence.multiSurfaceJourney.state -ne "PASS") { throw "five-surface journey failed" }
          if ($evidence.multiSurfaceJourney.output -notmatch "DSH five-surface governed runtime matrix v2: PASS") { throw "five-surface journey output is incomplete" }
          if ($evidence.protectedRoutes.PSObject.Properties.Count -lt 5) { throw "protected route evidence is incomplete" }
'''
          if old_evidence not in text:
              raise SystemExit('final runtime evidence anchor not found')
          text = text.replace(old_evidence, new_evidence, 1)

          result_anchor = '''          test "$WLT_DATABASE_RESULT" = success
          test "$RUNTIME_RESULT" = success
'''
          publish = '''          test "$WLT_DATABASE_RESULT" = success
          test "$RUNTIME_RESULT" = success

      - name: Publish exact-SHA final closure status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          case "$JOB_STATUS" in
            success) state=success ;;
            cancelled) state=error ;;
            *) state=failure ;;
          esac
          payload="$(jq -n \\
            --arg state "$state" \\
            --arg context 'Lian Final Same-Commit Closure result' \\
            --arg description "repository, surfaces, Go, databases, runtime, finance and DR: $JOB_STATUS" \\
            --arg target_url "$RUN_URL" \\
            '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error \\
            -X POST \\
            -H "Authorization: Bearer $GH_TOKEN" \\
            -H "Accept: application/vnd.github+json" \\
            -H "X-GitHub-Api-Version: 2022-11-28" \\
            "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \\
            -d "$payload"
'''
          if result_anchor not in text:
              raise SystemExit('final result anchor not found')
          text = text.replace(result_anchor, publish, 1)
          path.write_text(text, encoding='utf-8')

      - name: Commit final gate hardening
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/workflows/lian-final-closure-gate.yml; then
            echo "No patch required"
            exit 0
          fi
          git config user.name "bthwani-governance-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .github/workflows/lian-final-closure-gate.yml
          git commit -m "fix(ci): require finance DR and five-surface runtime evidence"
          git push origin HEAD:lian
