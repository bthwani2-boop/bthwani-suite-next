name: One-time lianbassam complete js-yaml remediation

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/security-remediation-lianbassam-v11.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: security-remediation-lianbassam-v11
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout current lianbassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: lianbassam
          fetch-depth: 0
          show-progress: false

      - name: Publish run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=pending \
            -f context='bthwani/security-remediation-v11' \
            -f description='Complete js-yaml remediation is running' \
            -f target_url="${RUN_URL}"

      - name: Setup PNPM
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.34.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Apply complete parent-scoped overrides and verify zero findings
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p governance/evidence/security

          python - <<'PY'
          from pathlib import Path

          path = Path('pnpm-workspace.yaml')
          lines = path.read_text(encoding='utf-8').splitlines()
          remove_fragments = (
              'js-yaml@4.2.0:',
              'js-yaml@5.2.0:',
              "'@redocly/openapi-core@*>js-yaml':",
              "'@eslint/eslintrc@*>js-yaml':",
              "'@yarnpkg/parsers@*>js-yaml':",
              "'markdownlint-cli2@*>js-yaml':",
              "'front-matter@*>js-yaml':",
          )
          filtered = [line for line in lines if not any(fragment in line for fragment in remove_fragments)]
          output = []
          inserted = False
          for line in filtered:
              output.append("  next: 16.2.11" if line.strip().startswith('next:') else line)
              if 'js-yaml@>=3.0.0 <3.15.0:' in line:
                  output.extend([
                      "  '@redocly/openapi-core@*>js-yaml': 4.3.0",
                      "  '@eslint/eslintrc@*>js-yaml': 4.3.0",
                      "  '@yarnpkg/parsers@*>js-yaml': 5.2.1",
                      "  'markdownlint-cli2@*>js-yaml': 5.2.1",
                      "  'front-matter@*>js-yaml': 5.2.1",
                  ])
                  inserted = True
          if not inserted:
              raise SystemExit('Unable to locate js-yaml override insertion point')
          path.write_text('\n'.join(output) + '\n', encoding='utf-8')
          PY

          pnpm install --lockfile-only --reporter=append-only
          pnpm audit --json > governance/evidence/security/pnpm-audit-lianbassam.json || true

          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path('governance/evidence/security/pnpm-audit-lianbassam.json')
          report = json.loads(report_path.read_text(encoding='utf-8'))
          counts = report.get('metadata', {}).get('vulnerabilities', {})
          remaining = sum(int(counts.get(level, 0)) for level in ('critical', 'high', 'moderate', 'low'))
          if remaining:
              raise SystemExit(f'PNPM audit still reports {remaining} vulnerabilities: {counts}')

          Path('governance/evidence/security/lianbassam-remediation.md').write_text(
              '# lianbassam security remediation\n\n'
              '- Next.js updated to 16.2.11.\n'
              '- github.com/lib/pq updated to v1.12.3 wherever declared.\n'
              '- golang.org/x/crypto updated to v0.54.0 wherever declared.\n'
              '- Vulnerable js-yaml paths overridden through their direct parent packages.\n'
              '- PNPM audit reports zero known vulnerabilities.\n'
              '- Frozen lockfile installation succeeds.\n'
              '- Control-panel and DSH TypeScript checks pass.\n'
              '- Dependabot coverage targets all known ecosystems on lianbassam.\n'
              '- No merge or write to master was performed.\n',
              encoding='utf-8',
          )
          PY

          pnpm install --frozen-lockfile --reporter=append-only
          pnpm audit --audit-level low
          pnpm --dir apps/control-panel/runtime typecheck
          pnpm --dir services/dsh typecheck

          rm -f governance/evidence/security/js-yaml-why-before.json
          rm -f governance/evidence/security/js-yaml-why-after-trial.json
          rm -f governance/evidence/security/pnpm-audit-js-yaml-trial.json
          rm -f governance/evidence/security/js-yaml-trial-summary.json
          rm -f governance/evidence/security/js-yaml-trial-diagnostic.md
          rm -f governance/evidence/security/pnpm-remediation-diagnostic.md
          rm -f governance/evidence/security/final-security-verification.md

      - name: Commit complete verified remediation
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/security-remediation-lianbassam-v11.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(security): close all known dependency advisories"
          git pull --rebase origin lianbassam
          git push origin HEAD:lianbassam

      - name: Publish success
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=success \
            -f context='bthwani/security-remediation-v11' \
            -f description='All PNPM advisories closed and verified' \
            -f target_url="${RUN_URL}"

      - name: Publish failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=failure \
            -f context='bthwani/security-remediation-v11' \
            -f description='Complete dependency remediation failed' \
            -f target_url="${RUN_URL}"
