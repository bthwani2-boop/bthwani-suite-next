name: JRN-001 FS-07 Backend

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/backend/**
      - services/wlt/backend/internal/payout/**
      - services/wlt/backend/internal/http/server.go
      - services/dsh/tests/jrn-001-fs-07-backend.test.mjs
      - .github/workflows/jrn-001-fs-07-backend.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.26.5'
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Verify JRN-001 Go formatting
        shell: bash
        run: |
          test -z "$(gofmt -l \
            services/dsh/backend/internal/partner/onboarding_integrity_repository.go \
            services/dsh/backend/internal/partner/onboarding_integrity_handlers.go \
            services/dsh/backend/internal/partner/state_policy.go \
            services/dsh/backend/internal/partner/state_policy_handlers.go \
            services/dsh/backend/internal/http/partner_onboarding_integrity.go \
            services/dsh/backend/internal/http/partner_lifecycle_routes.go \
            services/dsh/backend/internal/http/partner_self_routes.go \
            services/dsh/backend/internal/wlt/payout_destination.go \
            services/wlt/backend/internal/payout/payout.go \
            services/wlt/backend/internal/payout/upsert_governed.go)"
      - name: Compile and test complete DSH backend
        working-directory: services/dsh/backend
        run: go test ./...
      - name: Compile and test WLT payout owner
        working-directory: services/wlt/backend
        run: go test ./internal/payout ./internal/http
      - name: Verify governed route and negative-policy bindings
        run: node services/dsh/tests/jrn-001-fs-07-backend.test.mjs
      - name: Publish FS-07 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then
            STATE=success
            DESCRIPTION='FS-07 backend verified'
          else
            STATE=failure
            DESCRIPTION='FS-07 backend failed'
          fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-07-backend' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
