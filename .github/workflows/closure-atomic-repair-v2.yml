name: Closure Atomic Repair V2

on:
  push:
    branches:
      - "fix/lian-sovereign-final-closure"
    paths:
      - ".github/workflows/closure-atomic-repair-v2.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: closure-atomic-repair-v2
  cancel-in-progress: false

jobs:
  repair:
    name: Apply final verified atomic repair
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout exact closure branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: fix/lian-sovereign-final-closure
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Apply final atomic source repair
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json

          root = Path.cwd()

          def replace_once(path, old, new, *, allow_new=False):
              file = root / path
              text = file.read_text(encoding="utf-8")
              if old in text:
                  file.write_text(text.replace(old, new, 1), encoding="utf-8")
                  return
              if allow_new and new in text:
                  return
              raise SystemExit(f"required replacement anchor missing: {path}: {old[:80]}")

          replace_once(
              "services/wlt/contracts/wlt.openapi.yaml",
              "#/components/responses/InvalidRequest",
              "#/components/responses/BadRequest",
              allow_new=True,
          )
          replace_once(
              "services/dsh/frontend/app-partner/orders/usePartnerOrdersRuntime.ts",
              "// Read-after-write for conflict resolution",
              "// read-after-write: reload server truth before accepting the final UI state",
              allow_new=True,
          )

          partner_guard = root / "tools/guards/partner/partner-surface-truth-gate.mjs"
          guard_text = partner_guard.read_text(encoding="utf-8")
          support_anchor = 'file: "services/dsh/frontend/app-partner/account/PartnerSupportScreen.tsx"'
          anchor_index = guard_text.find(support_anchor)
          required_start = guard_text.find("    required: [", anchor_index)
          required_end = guard_text.find("    ],", required_start)
          if anchor_index < 0 or required_start < 0 or required_end < 0:
              raise SystemExit("partner support guard block is missing")
          required_end += len("    ],")
          support_required = '''    required: [
                "usePartnerSupportController",
                "controller.createTicket(input)",
                "controller.sendMessage(messageBody)",
                "controller.reload",
                "controller.reloadDetail",
                "كل تذكرة ومحادثة مرتبطة بهوية الشريك",
              ],'''
          partner_guard.write_text(guard_text[:required_start] + support_required + guard_text[required_end:], encoding="utf-8")

          guards = [
              ("captain-surface-truth", "Captain Surface Truth Gate", "tools/guards/captain/captain-surface-truth-gate.mjs", "Validates the captain surface against governed runtime, assignment, location, proof-of-delivery, and finance bindings."),
              ("client-address-retry-truth", "Client Address Retry Truth Gate", "tools/guards/client-commerce/client-address-retry-truth-gate.mjs", "Validates client-address idempotency, retry, ownership, and checkout readback invariants."),
              ("client-commerce-truth", "Client Commerce Truth Gate", "tools/guards/client-commerce/client-commerce-truth-gate.mjs", "Validates the client commerce surface from discovery through cart, checkout, order creation, and tracking."),
              ("control-panel-runtime-truth", "Control Panel Runtime Truth Gate", "tools/guards/control-panel/control-panel-runtime-truth-gate.mjs", "Validates control-panel routes, actions, permissions, and runtime-backed read models."),
              ("field-surface-truth", "Field Surface Truth Gate", "tools/guards/field/field-surface-truth-gate.mjs", "Validates field workforce gates, visits, offline synchronization, media, finance, and readback bindings."),
              ("dsh-wlt-mutation-idempotency", "DSH WLT Mutation Idempotency Gate", "tools/guards/finance/dsh-wlt-mutation-idempotency-gate.mjs", "Validates deterministic mutation identity and replay safety across the DSH-to-WLT financial boundary."),
              ("map-platform-truth", "Map Platform Truth Gate", "tools/guards/maps/map-platform-truth-gate.mjs", "Validates governed map provider, reverse-geocoding, service-area, fallback, and secret boundaries."),
              ("partner-support-truth", "Partner Support Truth Gate", "tools/guards/partner/partner-support-truth-gate.mjs", "Validates partner support ownership, ticket, message, authorization, and lifecycle bindings."),
              ("partner-surface-truth", "Partner Surface Truth Gate", "tools/guards/partner/partner-surface-truth-gate.mjs", "Validates partner store scope, orders, catalog, team, support, wallet references, and fail-closed states."),
              ("operational-policy-ui-truth", "Operational Policy UI Truth Gate", "tools/guards/platform/operational-policy-ui-truth-gate.mjs", "Validates platform operational-policy UI bindings, optimistic concurrency, audit, and readback behavior."),
              ("client-address-privacy-integration", "Client Address Privacy Integration Gate", "tools/guards/privacy/client-address-privacy-integration-gate.mjs", "Validates address privacy policy integration across storage, API, serviceability, checkout, and deletion paths."),
              ("client-address-privacy-truth", "Client Address Privacy Truth Gate", "tools/guards/privacy/client-address-privacy-truth-gate.mjs", "Validates client-address PII ownership, retention, encryption, anonymization, and authorization contracts."),
              ("ui-action-binding", "UI Action Binding Gate", "tools/guards/ui-actions/ui-action-binding-gate.mjs", "Validates that governed interactive controls bind to real actions, permissions, errors, and readback paths."),
          ]
          package_path = root / "package.json"
          package = json.loads(package_path.read_text(encoding="utf-8"))
          for guard_id, _, source, _ in guards:
              package["scripts"][f"guard:{guard_id}"] = f"node {source}"
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          registry_path = root / "governance/guards/guard-registry.json"
          registry = json.loads(registry_path.read_text(encoding="utf-8"))
          ids = {entry["id"] for entry in registry["entries"]}
          for guard_id, name, source, description in guards:
              if guard_id not in ids:
                  registry["entries"].append({
                      "id": guard_id,
                      "name": name,
                      "script": f"guard:{guard_id}",
                      "exit_level": "fail",
                      "description": description,
                      "source_file": source,
                  })
          registry_path.write_text(json.dumps(registry, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          performance = root / ".github/workflows/performance.yml"
          perf = performance.read_text(encoding="utf-8")
          pins = {
              "actions/checkout@v4": "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5",
              "pnpm/action-setup@v4": "pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1",
              "actions/setup-node@v4": "actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020",
              "actions/setup-go@v5": "actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff",
              "actions/upload-artifact@v4": "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02",
              "grafana/setup-k6-action@v1": "grafana/setup-k6-action@85119162329017cffa5e1450d8caef5780543201",
          }
          for old, new in pins.items():
              perf = perf.replace(old, new)
          if "uses: actions/checkout@v4" in perf or "uses: actions/upload-artifact@v4" in perf:
              raise SystemExit("performance workflow retains mutable action tags")
          performance.write_text(perf, encoding="utf-8")

          marketing_paths = '''  /dsh/operator/marketing/loyalty-earning-policies:
            get:
              operationId: listDshLoyaltyEarningPolicies
              tags: [DshMarketingCommercial]
              security: [{ bearerAuth: [] }]
              responses:
                '200': { $ref: '#/components/responses/ObjectResponse' }
                '401': { $ref: '#/components/responses/ErrorResponse' }
                '403': { $ref: '#/components/responses/ErrorResponse' }
            post:
              operationId: createDshLoyaltyEarningPolicy
              tags: [DshMarketingCommercial]
              security: [{ bearerAuth: [] }]
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      type: object
                      additionalProperties: false
                      required: [nameAr, pointsNumerator, eligibleMinorUnitsDenominator, minimumPoints, maximumPointsPerOrder]
                      properties:
                        nameAr: { type: string, minLength: 1 }
                        pointsNumerator: { type: integer, format: int64, minimum: 1 }
                        eligibleMinorUnitsDenominator: { type: integer, format: int64, minimum: 1 }
                        minimumPoints: { type: integer, format: int64, minimum: 0 }
                        maximumPointsPerOrder: { type: integer, format: int64, minimum: 1 }
              responses:
                '201': { $ref: '#/components/responses/ObjectResponse' }
                '400': { $ref: '#/components/responses/ErrorResponse' }
                '401': { $ref: '#/components/responses/ErrorResponse' }
                '403': { $ref: '#/components/responses/ErrorResponse' }
                '409': { $ref: '#/components/responses/ErrorResponse' }
            /dsh/operator/marketing/loyalty-earning-policies/{policyId}:
              patch:
                operationId: updateDshLoyaltyEarningPolicy
                tags: [DshMarketingCommercial]
                security: [{ bearerAuth: [] }]
                parameters:
                  - name: policyId
                    in: path
                    required: true
                    schema: { type: string, minLength: 1 }
                requestBody:
                  required: true
                  content:
                    application/json:
                      schema:
                        type: object
                        additionalProperties: false
                        required: [expectedVersion]
                        properties:
                          nameAr: { type: string, minLength: 1 }
                          pointsNumerator: { type: integer, format: int64, minimum: 1 }
                          eligibleMinorUnitsDenominator: { type: integer, format: int64, minimum: 1 }
                          minimumPoints: { type: integer, format: int64, minimum: 0 }
                          maximumPointsPerOrder: { type: integer, format: int64, minimum: 1 }
                          status: { type: string, enum: [draft, active, paused, archived] }
                          expectedVersion: { type: integer, minimum: 1 }
                responses:
                  '200': { $ref: '#/components/responses/ObjectResponse' }
                  '400': { $ref: '#/components/responses/ErrorResponse' }
                  '401': { $ref: '#/components/responses/ErrorResponse' }
                  '403': { $ref: '#/components/responses/ErrorResponse' }
                  '404': { $ref: '#/components/responses/ErrorResponse' }
                  '409': { $ref: '#/components/responses/ErrorResponse' }
          '''
          marketing = root / "services/dsh/contracts/dsh.marketing-commercial.openapi.yaml"
          marketing_text = marketing.read_text(encoding="utf-8")
          if "/dsh/operator/marketing/loyalty-earning-policies:" not in marketing_text:
              marketing.write_text(marketing_text.replace("components:\n", marketing_paths + "components:\n", 1), encoding="utf-8")

          pricing_paths = '''  /dsh/operator/stores/{storeId}/delivery-pricing:
            get:
              operationId: listDshOperatorDeliveryPricing
              tags: [DshPartnerFleet]
              security: [{ bearerAuth: [] }]
              parameters: [{ $ref: '#/components/parameters/StoreId' }]
              responses:
                '200': { $ref: '#/components/responses/ObjectResponse' }
                '401': { $ref: '#/components/responses/ErrorResponse' }
                '403': { $ref: '#/components/responses/ErrorResponse' }
                '404': { $ref: '#/components/responses/ErrorResponse' }
            /dsh/operator/stores/{storeId}/delivery-pricing/{fulfillmentMode}:
              put:
                operationId: updateDshOperatorDeliveryPricing
                tags: [DshPartnerFleet]
                security: [{ bearerAuth: [] }]
                parameters:
                  - $ref: '#/components/parameters/StoreId'
                  - name: fulfillmentMode
                    in: path
                    required: true
                    schema: { type: string, enum: [bthwani_delivery, partner_delivery, pickup] }
                requestBody:
                  required: true
                  content: { application/json: { schema: { $ref: '#/components/schemas/DeliveryPricingMutation' } } }
                responses:
                  '200': { $ref: '#/components/responses/ObjectResponse' }
                  '400': { $ref: '#/components/responses/ErrorResponse' }
                  '401': { $ref: '#/components/responses/ErrorResponse' }
                  '403': { $ref: '#/components/responses/ErrorResponse' }
                  '404': { $ref: '#/components/responses/ErrorResponse' }
                  '409': { $ref: '#/components/responses/ErrorResponse' }
            /dsh/partner/stores/{storeId}/delivery-pricing:
              get:
                operationId: listDshPartnerDeliveryPricing
                tags: [DshPartnerFleet]
                security: [{ bearerAuth: [] }]
                parameters: [{ $ref: '#/components/parameters/StoreId' }]
                responses:
                  '200': { $ref: '#/components/responses/ObjectResponse' }
                  '401': { $ref: '#/components/responses/ErrorResponse' }
                  '403': { $ref: '#/components/responses/ErrorResponse' }
                  '404': { $ref: '#/components/responses/ErrorResponse' }
            /dsh/partner/stores/{storeId}/delivery-pricing/partner_delivery:
              put:
                operationId: updateDshPartnerDeliveryPricing
                tags: [DshPartnerFleet]
                security: [{ bearerAuth: [] }]
                parameters: [{ $ref: '#/components/parameters/StoreId' }]
                requestBody:
                  required: true
                  content: { application/json: { schema: { $ref: '#/components/schemas/DeliveryPricingMutation' } } }
                responses:
                  '200': { $ref: '#/components/responses/ObjectResponse' }
                  '400': { $ref: '#/components/responses/ErrorResponse' }
                  '401': { $ref: '#/components/responses/ErrorResponse' }
                  '403': { $ref: '#/components/responses/ErrorResponse' }
                  '404': { $ref: '#/components/responses/ErrorResponse' }
                  '409': { $ref: '#/components/responses/ErrorResponse' }
          '''
          pricing_schema = '''    DeliveryPricingMutation:
              type: object
              additionalProperties: false
              required: [feeMinorUnits, currency, status, expectedVersion, reason]
              properties:
                feeMinorUnits: { type: integer, format: int64, minimum: 0 }
                currency: { type: string, const: YER }
                status: { type: string, enum: [active, paused, archived] }
                expectedVersion: { type: integer, minimum: 0 }
                reason: { type: string, minLength: 1 }
          '''
          fleet = root / "services/dsh/contracts/dsh.partner-fleet.openapi.yaml"
          fleet_text = fleet.read_text(encoding="utf-8")
          if "/dsh/partner/stores/{storeId}/delivery-pricing:" not in fleet_text:
              fleet_text = fleet_text.replace("components:\n", pricing_paths + "components:\n", 1)
          if "    DeliveryPricingMutation:" not in fleet_text:
              fleet_text = fleet_text.replace("  schemas:\n", "  schemas:\n" + pricing_schema, 1)
          fleet.write_text(fleet_text, encoding="utf-8")

          privacy_paths = '''  /dsh/operator/privacy/client-addresses/policy:
            get:
              operationId: getDshClientAddressPrivacyPolicy
              tags: [DshClientAddress]
              security: [{ bearerAuth: [] }]
              responses:
                '200': { description: Governed privacy policy, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                '401': { $ref: '#/components/responses/Unauthenticated' }
            put:
              operationId: updateDshClientAddressPrivacyPolicy
              tags: [DshClientAddress]
              security: [{ bearerAuth: [] }]
              parameters:
                - $ref: '#/components/parameters/IdempotencyKey'
                - name: X-Correlation-ID
                  in: header
                  required: true
                  schema: { type: string, minLength: 8, maxLength: 200 }
              requestBody:
                required: true
                content: { application/json: { schema: { type: object, additionalProperties: true, minProperties: 1 } } }
              responses:
                '200': { description: Governed privacy policy, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                '400': { $ref: '#/components/responses/InvalidRequest' }
                '401': { $ref: '#/components/responses/Unauthenticated' }
                '409': { $ref: '#/components/responses/Conflict' }
            /dsh/operator/privacy/client-addresses/anonymize:
              post:
                operationId: anonymizeExpiredDshClientAddresses
                tags: [DshClientAddress]
                security: [{ bearerAuth: [] }]
                parameters:
                  - $ref: '#/components/parameters/IdempotencyKey'
                  - name: X-Correlation-ID
                    in: header
                    required: true
                    schema: { type: string, minLength: 8, maxLength: 200 }
                requestBody:
                  required: true
                  content:
                    application/json:
                      schema:
                        type: object
                        additionalProperties: false
                        required: [limit]
                        properties: { limit: { type: integer, minimum: 1, maximum: 10000 } }
                responses:
                  '200': { description: Anonymization result, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                  '400': { $ref: '#/components/responses/InvalidRequest' }
                  '401': { $ref: '#/components/responses/Unauthenticated' }
                  '409': { $ref: '#/components/responses/Conflict' }
          '''
          address = root / "services/dsh/contracts/dsh.client-address.openapi.yaml"
          address_text = address.read_text(encoding="utf-8")
          if "/dsh/operator/privacy/client-addresses/policy:" not in address_text:
              address.write_text(address_text.replace("components:\n", privacy_paths + "components:\n", 1), encoding="utf-8")

          for transient in [
              ".github/workflows/closure-source-export.yml",
              ".github/workflows/dsh-database-diagnostic-evidence.yml",
              ".github/workflows/closure-atomic-repair.yml",
              ".github/workflows/closure-atomic-repair-v2.yml",
          ]:
              target = root / transient
              if target.exists():
                  target.unlink()
          PY

      - name: Regenerate WLT client
        shell: bash
        run: pnpm run openapi:generate:wlt

      - name: Verify final atomic repair
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/final-atomic-repair
          failed=""
          run_check() {
            name="$1"
            shift
            "$@" >"artifacts/final-atomic-repair/$name.log" 2>&1
            code=$?
            cat "artifacts/final-atomic-repair/$name.log"
            if [ $code -ne 0 ] && [ -z "$failed" ]; then failed="$name"; fi
          }
          run_check partner-surface pnpm run guard:partner-surface-truth
          run_check guard-registry pnpm run guard:guard-registry
          run_check wlt-boundary pnpm run guard:wlt-financial-boundary
          run_check api-binding pnpm run guard:api-binding
          run_check backend-api-binding pnpm run guard:backend-api-binding
          run_check workflow-lint pnpm run guard:workflow-lint
          run_check actions-pin pnpm run guard:actions-pin
          run_check swagger pnpm run swagger:build
          rm -rf dist-swagger
          echo "failed_check=$failed" >> "$GITHUB_OUTPUT"
          [ -z "$failed" ]

      - name: Upload final atomic verification logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: closure-atomic-repair-v2-${{ github.sha }}
          path: artifacts/final-atomic-repair
          if-no-files-found: warn
          retention-days: 3

      - name: Commit verified final repair
        id: commit
        if: ${{ steps.verify.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bthwani-closure-executor"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(closure): register contracts guards and immutable workflows"
          git push origin HEAD:fix/lian-sovereign-final-closure

      - name: Publish final atomic repair status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          FAILED_CHECK: ${{ steps.verify.outputs.failed_check }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state=success
          description="final atomic repair committed"
          if [ "$VERIFY_OUTCOME" != success ]; then
            state=failure
            description="final atomic verification failed: ${FAILED_CHECK:-unknown}"
          elif [ "$COMMIT_OUTCOME" != success ]; then
            state=failure
            description="final atomic repair verified but push failed"
          fi
          payload="$(jq -n --arg state "$state" --arg context 'Closure Atomic Repair V2' --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d "$payload"

      - name: Enforce final verified repair
        if: ${{ steps.verify.outcome != 'success' || steps.commit.outcome != 'success' }}
        shell: bash
        run: exit 1
