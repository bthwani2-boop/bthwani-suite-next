name: JRN-042 Runtime Data Migrations and Recovery Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths: &jrn042_paths
      - "governance/product/contracts/jrn-042-runtime-data-migrations-backup.product-truth.json"
      - "infra/data-plane/jrn-042-runtime-governance.json"
      - "infra/data-plane/postgres/init/**"
      - "infra/docker/compose.runtime.yml"
      - "infra/docker/compose.observability.yml"
      - "infra/docker/env/runtime.env.example"
      - "infra/docker/scripts/schema-migration-runner.ps1"
      - "infra/docker/scripts/invoke-runtime-database-migrations.ps1"
      - "infra/docker/scripts/backup-runtime.ps1"
      - "infra/docker/scripts/restore-runtime.ps1"
      - "infra/docker/scripts/restore-verify-runtime.ps1"
      - "core/identity/database/migrations/**"
      - "core/workforce/database/migrations/**"
      - "core/providers/backend/**"
      - "core/providers/contracts/providers.openapi.yaml"
      - "core/providers/clients/generated/providers-api.ts"
      - "core/providers/database/migrations/**"
      - "core/platform-control/database/migrations/**"
      - "services/dsh/backend/internal/*outbox/**"
      - "services/dsh/database/migrations/**"
      - "services/wlt/backend/internal/dshoutbox/**"
      - "services/wlt/database/migrations/**"
      - "tools/scripts/run-jrn-042-runtime-data.ps1"
      - "tools/scripts/test-runtime-backup-restore.ps1"
      - "tools/verification/jrn-042-runtime-data.test.mjs"
      - ".github/workflows/jrn-042-runtime-data-verification.yml"
  pull_request:
    branches: [master]
    paths: *jrn042_paths

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-042-${{ github.ref }}
  cancel-in-progress: true

jobs:
  status-pending:
    name: Publish JRN-042 pending status
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish pending same-commit result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(python - <<'PY'
          import json
          import os
          print(json.dumps({
              "state": "pending",
              "context": "jrn-042/runtime-data",
              "description": "JRN-042 static and six-service DR proof is running",
              "target_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }))
          PY
          )"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"

  static-governance:
    name: Product runtime database and recovery invariants
    needs: status-pending
    if: always() && (needs.status-pending.result == 'success' || needs.status-pending.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact triggering commit
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Set up Providers Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: core/providers/backend/go.mod
          cache-dependency-path: core/providers/backend/go.sum
      - name: Install locked workspace
        run: pnpm install --frozen-lockfile
      - name: Run JRN-042 governance tests
        run: node --test tools/verification/jrn-042-runtime-data.test.mjs
      - name: Verify Providers contract and generated readiness binding
        run: |
          grep -q '^  /providers/readiness:' core/providers/contracts/providers.openapi.yaml
          grep -q 'operationId: getExternalProviderReadiness' core/providers/contracts/providers.openapi.yaml
          grep -q '^    RuntimeReadinessResponse:' core/providers/contracts/providers.openapi.yaml
          grep -q '"/providers/readiness"' core/providers/clients/generated/providers-api.ts
          grep -q 'getExternalProviderReadiness' core/providers/clients/generated/providers-api.ts
          test "$(grep -c '/readiness || exit 1' infra/docker/compose.runtime.yml)" -ge 6
      - name: Parse PowerShell closure and recovery commands
        shell: pwsh
        run: |
          $files = @(
            'tools/scripts/run-jrn-042-runtime-data.ps1',
            'infra/docker/scripts/schema-migration-runner.ps1',
            'infra/docker/scripts/invoke-runtime-database-migrations.ps1',
            'infra/docker/scripts/backup-runtime.ps1',
            'infra/docker/scripts/restore-runtime.ps1',
            'infra/docker/scripts/restore-verify-runtime.ps1',
            'tools/scripts/test-runtime-backup-restore.ps1'
          )
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) { $errors | Format-List | Out-String | Write-Error; throw "PowerShell parse failed: $file" }
          }
      - name: Validate canonical compose graphs
        run: |
          docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml --profile identity --profile workforce --profile dsh --profile wlt --profile providers --profile platform --profile media config --quiet
          docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.observability.yml --profile observability config --quiet
      - name: Verify Providers formatting and readiness tests
        run: |
          test -z "$(gofmt -l core/providers/backend/internal/http/server.go core/providers/backend/internal/http/readiness_test.go)"
          cd core/providers/backend
          go test ./internal/http ./internal/providers
      - name: Verify repository remains unchanged
        run: git diff --exit-code

  six-service-runtime-dr:
    name: Six services migrations outbox observability and DR
    needs: static-governance
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout exact triggering commit
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Execute full JRN-042 isolated runtime closure
        shell: pwsh
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          ./tools/scripts/run-jrn-042-runtime-data.ps1 `
            -Mode Full `
            -Posture Local `
            -ForceDisasterRecovery `
            -Cleanup
      - name: Upload same-commit runtime evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jrn-042-runtime-data-${{ github.sha }}
          path: artifacts/jrn-042-runtime-data-evidence.json
          if-no-files-found: warn
          retention-days: 14
      - name: Capture failure diagnostics
        if: failure()
        run: |
          docker ps -a || true
          docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml --profile identity --profile workforce --profile dsh --profile wlt --profile providers --profile platform --profile media logs --tail=200 || true

  result:
    name: JRN-042 Runtime Data result
    needs: [static-governance, six-service-runtime-dr]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish readable same-commit result
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          STATIC_RESULT: ${{ needs.static-governance.result }}
          RUNTIME_RESULT: ${{ needs.six-service-runtime-dr.result }}
        run: |
          set -euo pipefail
          state=failure
          description="JRN-042 static or six-service DR proof failed"
          if test "${STATIC_RESULT}" = "success" && test "${RUNTIME_RESULT}" = "success"; then
            state=success
            description="JRN-042 static and six-service DR proof passed"
          fi
          payload="$(STATE="${state}" DESCRIPTION="${description}" python - <<'PY'
          import json
          import os
          print(json.dumps({
              "state": os.environ["STATE"],
              "context": "jrn-042/runtime-data",
              "description": os.environ["DESCRIPTION"],
              "target_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }))
          PY
          )"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${payload}"
      - name: Enforce JRN-042 result
        env:
          STATIC_RESULT: ${{ needs.static-governance.result }}
          RUNTIME_RESULT: ${{ needs.six-service-runtime-dr.result }}
        run: |
          test "${STATIC_RESULT}" = "success"
          test "${RUNTIME_RESULT}" = "success"
