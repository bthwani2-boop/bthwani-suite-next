name: JRN-001 partner media tenant fix

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/jrn001-media-tenant-fix.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: jrn001-media-tenant-fix-lianbassam
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout current branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: lianbassam
          fetch-depth: 0

      - name: Publish running status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=pending \
            -f context='bthwani/jrn001-media-tenant' \
            -f description='Partner media tenant fix is running' \
            -f target_url="${RUN_URL}"

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Apply media tenant isolation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement, found {count}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "services/dsh/backend/internal/http/media_upload.go",
              '''func (s *protectedStoreServer) actorCanAccessMediaReference(ctx context.Context, actor store.StoreActor, ref mediaReference) (bool, error) {
          \tswitch actor.Role {
          \tcase "operator":
          \t\treturn true, nil
          \tcase "field":
          \t\treturn ref.OwnerActorID == actor.ID && ref.OwnerActorRole == "field", nil
          \tcase "captain":
          \t\treturn ref.OwnerActorID == actor.ID && ref.OwnerActorRole == "captain", nil
          \tcase "partner":
          \t\tif ref.PartnerID == "" {
          \t\t\treturn false, nil
          \t\t}
          \t\tvar allowed bool
          \t\terr := s.db.QueryRowContext(ctx, `
          \t\t\tSELECT EXISTS (
          \t\t\t\tSELECT 1
          \t\t\t\tFROM dsh_store_actor_scopes scopes
          \t\t\t\tJOIN dsh_stores stores ON stores.id = scopes.store_id
          \t\t\t\tWHERE scopes.actor_id = $1
          \t\t\t\t  AND scopes.actor_role = 'partner'
          \t\t\t\t  AND scopes.active = true
          \t\t\t\t  AND stores.partner_id = $2
          \t\t\t)`, actor.ID, ref.PartnerID).Scan(&allowed)
          \t\treturn allowed, err
          \tdefault:
          \t\treturn false, nil
          \t}
          }''',
              '''func (s *protectedStoreServer) actorCanAccessMediaReference(ctx context.Context, actor store.StoreActor, ref mediaReference) (bool, error) {
          \ttenantID := strings.TrimSpace(actor.TenantID)
          \tpartnerBelongsToTenant := func() (bool, error) {
          \t\tif ref.PartnerID == "" || tenantID == "" {
          \t\t\treturn false, nil
          \t\t}
          \t\tvar allowed bool
          \t\terr := s.db.QueryRowContext(ctx, `
          \t\t\tSELECT EXISTS (
          \t\t\t\tSELECT 1 FROM dsh_partners
          \t\t\t\tWHERE id = $1 AND tenant_id = $2
          \t\t\t)`, ref.PartnerID, tenantID).Scan(&allowed)
          \t\treturn allowed, err
          \t}

          \tswitch actor.Role {
          \tcase "operator":
          \t\tif ref.PartnerID == "" {
          \t\t\treturn true, nil
          \t\t}
          \t\treturn partnerBelongsToTenant()
          \tcase "field":
          \t\tif ref.OwnerActorID != actor.ID || ref.OwnerActorRole != "field" {
          \t\t\treturn false, nil
          \t\t}
          \t\tif ref.PartnerID == "" {
          \t\t\treturn true, nil
          \t\t}
          \t\treturn partnerBelongsToTenant()
          \tcase "captain":
          \t\tif ref.OwnerActorID != actor.ID || ref.OwnerActorRole != "captain" {
          \t\t\treturn false, nil
          \t\t}
          \t\tif ref.PartnerID == "" {
          \t\t\treturn true, nil
          \t\t}
          \t\treturn partnerBelongsToTenant()
          \tcase "partner":
          \t\tif ref.PartnerID == "" || tenantID == "" {
          \t\t\treturn false, nil
          \t\t}
          \t\tvar allowed bool
          \t\terr := s.db.QueryRowContext(ctx, `
          \t\t\tSELECT EXISTS (
          \t\t\t\tSELECT 1
          \t\t\t\tFROM dsh_store_actor_scopes scopes
          \t\t\t\tJOIN dsh_stores stores
          \t\t\t\t  ON stores.id = scopes.store_id
          \t\t\t\t AND stores.tenant_id = $3
          \t\t\t\tWHERE scopes.actor_id = $1
          \t\t\t\t  AND scopes.actor_role = 'partner'
          \t\t\t\t  AND scopes.active = true
          \t\t\t\t  AND scopes.tenant_id = $3
          \t\t\t\t  AND stores.partner_id = $2
          \t\t\t)`, actor.ID, ref.PartnerID, tenantID).Scan(&allowed)
          \t\treturn allowed, err
          \tdefault:
          \t\treturn false, nil
          \t}
          }''',
          )

          replace_once(
              "services/dsh/backend/internal/http/media_upload_test.go",
              '''\t\tPartnerID:      "partner-1",''',
              '''\t\tPartnerID:      "",''',
          )
          replace_once(
              "services/dsh/backend/internal/http/media_upload_test.go",
              '''\tactorID := "test-actor-1"
          \tmediaRefStr := "test-media-ref-1"''',
              '''\tactorID := "test-actor-1"
          \ttenantID := "local-dsh"
          \tmediaRefStr := "test-media-ref-1"''',
          )
          replace_once(
              "services/dsh/backend/internal/http/media_upload_test.go",
              '''\tif _, err := db.ExecContext(ctx, `
          \t\tINSERT INTO dsh_partners (id, legal_name_ar, legal_name_en, display_name, legal_identity_type, legal_identity_number, owner_name, primary_phone, email, category)
          \t\tVALUES ($1, 'شريك تجريبي', 'Test Partner', 'Test Partner', 'commercial_register', '12345', 'Owner', '+967770000000', 'test@local.test', 'restaurant')`,
          \t\tpartnerID); err != nil {''',
              '''\tif _, err := db.ExecContext(ctx, `
          \t\tINSERT INTO dsh_partners (id, tenant_id, legal_name_ar, legal_name_en, display_name, legal_identity_type, legal_identity_number, owner_name, primary_phone, email, category)
          \t\tVALUES ($1, $2, 'شريك تجريبي', 'Test Partner', 'Test Partner', 'commercial_register', '12345', 'Owner', '+967770000000', 'test@local.test', 'restaurant')`,
          \t\tpartnerID, tenantID); err != nil {''',
          )
          replace_once(
              "services/dsh/backend/internal/http/media_upload_test.go",
              '''\tif _, err := db.ExecContext(ctx, `
          \t\tINSERT INTO dsh_stores (id, slug, display_name, status, city_code, service_area_code, serviceability_status, is_visible, partner_id)
          \t\tVALUES ($1, $1, 'Test Store for Media', 'active', 'SAN', 'SAN-1', 'serviceable', true, $2)`,
          \t\tstoreID, partnerID); err != nil {''',
              '''\tif _, err := db.ExecContext(ctx, `
          \t\tINSERT INTO dsh_stores (id, tenant_id, slug, display_name, status, city_code, service_area_code, serviceability_status, is_visible, partner_id)
          \t\tVALUES ($1, $3, $1, 'Test Store for Media', 'active', 'SAN', 'SAN-1', 'serviceable', true, $2)`,
          \t\tstoreID, partnerID, tenantID); err != nil {''',
          )
          replace_once(
              "services/dsh/backend/internal/http/media_upload_test.go",
              '''\tif _, err := db.ExecContext(ctx, `
          \t\tINSERT INTO dsh_store_actor_scopes (actor_id, actor_role, store_id, scope_type, active)
          \t\tVALUES ($1, 'partner', $2, 'own', true)`,
          \t\tactorID, storeID); err != nil {''',
              '''\tif _, err := db.ExecContext(ctx, `
          \t\tINSERT INTO dsh_store_actor_scopes (tenant_id, actor_id, actor_role, store_id, scope_type, active)
          \t\tVALUES ($3, $1, 'partner', $2, 'own', true)`,
          \t\tactorID, storeID, tenantID); err != nil {''',
          )
          replace_once(
              "services/dsh/backend/internal/http/media_upload_test.go",
              '''\t\tactor := store.StoreActor{ID: actorID, Role: "partner"}''',
              '''\t\tactor := store.StoreActor{ID: actorID, Role: "partner", TenantID: tenantID}''',
          )
          replace_once(
              "services/dsh/backend/internal/http/media_upload_test.go",
              '''\t\tactor := store.StoreActor{ID: "other-actor-no-scope", Role: "partner"}''',
              '''\t\tactor := store.StoreActor{ID: "other-actor-no-scope", Role: "partner", TenantID: tenantID}''',
          )
          PY

          gofmt -w \
            services/dsh/backend/internal/http/media_upload.go \
            services/dsh/backend/internal/http/media_upload_test.go

      - name: Verify HTTP media authorization
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/http

      - name: Commit media tenant fix
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/jrn001-media-tenant-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(dsh): isolate partner media access by tenant"
          git pull --rebase origin lianbassam
          git push origin HEAD:lianbassam

      - name: Publish success
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=success \
            -f context='bthwani/jrn001-media-tenant' \
            -f description='Partner media tenant fix passed and was committed' \
            -f target_url="${RUN_URL}"

      - name: Publish failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=failure \
            -f context='bthwani/jrn001-media-tenant' \
            -f description='Partner media tenant fix failed' \
            -f target_url="${RUN_URL}"
