name: Closure Atomic Repair V3

on:
  push:
    branches:
      - "fix/lian-sovereign-final-closure"
    paths:
      - ".github/workflows/closure-atomic-repair-v3.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: closure-atomic-repair-v3
  cancel-in-progress: false

jobs:
  repair:
    name: Apply route contract and registry convergence
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout exact closure branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: fix/lian-sovereign-final-closure
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Apply route contract and registry convergence
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json
          import textwrap

          root = Path.cwd()

          def replace_once(path, old, new, allow_new=False):
              file = root / path
              text = file.read_text(encoding="utf-8")
              if old in text:
                  file.write_text(text.replace(old, new, 1), encoding="utf-8")
                  return
              if allow_new and new in text:
                  return
              raise SystemExit(f"replacement anchor missing: {path}: {old[:90]}")

          replace_once(
              "services/wlt/contracts/wlt.openapi.yaml",
              "#/components/responses/InvalidRequest",
              "#/components/responses/BadRequest",
              allow_new=True,
          )
          replace_once(
              "services/dsh/frontend/app-partner/orders/usePartnerOrdersRuntime.ts",
              "// Read-after-write for conflict resolution",
              "// read-after-write: reload server truth before accepting the final UI state",
              allow_new=True,
          )

          partner_guard = root / "tools/guards/partner/partner-surface-truth-gate.mjs"
          guard_text = partner_guard.read_text(encoding="utf-8")
          support_anchor = 'file: "services/dsh/frontend/app-partner/account/PartnerSupportScreen.tsx"'
          anchor_index = guard_text.find(support_anchor)
          required_start = guard_text.find("    required: [", anchor_index)
          required_end = guard_text.find("    ],", required_start)
          if anchor_index < 0 or required_start < 0 or required_end < 0:
              raise SystemExit("partner support guard block is missing")
          required_end += len("    ],")
          support_required = textwrap.dedent('''\
              required: [
                "usePartnerSupportController",
                "controller.createTicket(input)",
                "controller.sendMessage(messageBody)",
                "controller.reload",
                "controller.reloadDetail",
                "كل تذكرة ومحادثة مرتبطة بهوية الشريك",
              ],''')
          support_required = "    " + support_required.replace("\n", "\n    ").rstrip()
          partner_guard.write_text(guard_text[:required_start] + support_required + guard_text[required_end:], encoding="utf-8")

          guards = [
              ("captain-surface-truth", "Captain Surface Truth Gate", "tools/guards/captain/captain-surface-truth-gate.mjs", "Validates the captain surface against governed runtime, assignment, location, proof-of-delivery, and finance bindings."),
              ("client-address-retry-truth", "Client Address Retry Truth Gate", "tools/guards/client-commerce/client-address-retry-truth-gate.mjs", "Validates client-address idempotency, retry, ownership, and checkout readback invariants."),
              ("client-commerce-truth", "Client Commerce Truth Gate", "tools/guards/client-commerce/client-commerce-truth-gate.mjs", "Validates the client commerce surface from discovery through cart, checkout, order creation, and tracking."),
              ("control-panel-runtime-truth", "Control Panel Runtime Truth Gate", "tools/guards/control-panel/control-panel-runtime-truth-gate.mjs", "Validates control-panel routes, actions, permissions, and runtime-backed read models."),
              ("field-surface-truth", "Field Surface Truth Gate", "tools/guards/field/field-surface-truth-gate.mjs", "Validates field workforce gates, visits, offline synchronization, media, finance, and readback bindings."),
              ("dsh-wlt-mutation-idempotency", "DSH WLT Mutation Idempotency Gate", "tools/guards/finance/dsh-wlt-mutation-idempotency-gate.mjs", "Validates deterministic mutation identity and replay safety across the DSH-to-WLT financial boundary."),
              ("map-platform-truth", "Map Platform Truth Gate", "tools/guards/maps/map-platform-truth-gate.mjs", "Validates governed map provider, reverse-geocoding, service-area, fallback, and secret boundaries."),
              ("partner-support-truth", "Partner Support Truth Gate", "tools/guards/partner/partner-support-truth-gate.mjs", "Validates partner support ownership, ticket, message, authorization, and lifecycle bindings."),
              ("partner-surface-truth", "Partner Surface Truth Gate", "tools/guards/partner/partner-surface-truth-gate.mjs", "Validates partner store scope, orders, catalog, team, support, wallet references, and fail-closed states."),
              ("operational-policy-ui-truth", "Operational Policy UI Truth Gate", "tools/guards/platform/operational-policy-ui-truth-gate.mjs", "Validates platform operational-policy UI bindings, optimistic concurrency, audit, and readback behavior."),
              ("client-address-privacy-integration", "Client Address Privacy Integration Gate", "tools/guards/privacy/client-address-privacy-integration-gate.mjs", "Validates address privacy policy integration across storage, API, serviceability, checkout, and deletion paths."),
              ("client-address-privacy-truth", "Client Address Privacy Truth Gate", "tools/guards/privacy/client-address-privacy-truth-gate.mjs", "Validates client-address PII ownership, retention, encryption, anonymization, and authorization contracts."),
              ("ui-action-binding", "UI Action Binding Gate", "tools/guards/ui-actions/ui-action-binding-gate.mjs", "Validates that governed interactive controls bind to real actions, permissions, errors, and readback paths."),
          ]
          package_path = root / "package.json"
          package = json.loads(package_path.read_text(encoding="utf-8"))
          for guard_id, _, source, _ in guards:
              package["scripts"][f"guard:{guard_id}"] = f"node {source}"
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          registry_path = root / "governance/guards/guard-registry.json"
          registry = json.loads(registry_path.read_text(encoding="utf-8"))
          ids = {entry["id"] for entry in registry["entries"]}
          for guard_id, name, source, description in guards:
              if guard_id not in ids:
                  registry["entries"].append({
                      "id": guard_id,
                      "name": name,
                      "script": f"guard:{guard_id}",
                      "exit_level": "fail",
                      "description": description,
                      "source_file": source,
                  })
          registry_path.write_text(json.dumps(registry, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          server = root / "services/dsh/backend/internal/http/server.go"
          server_text = server.read_text(encoding="utf-8")
          compatibility_start = server_text.find("\t// Central Catalog compatibility surface.")
          unified_call = server_text.find("\tregisterUnifiedCatalogRoutes(mux, protected)", compatibility_start)
          if compatibility_start >= 0 and unified_call > compatibility_start:
              server_text = server_text[:compatibility_start] + "\t// The sovereign catalog routes are registered once through the unified registrar.\n" + server_text[unified_call:]
          privacy_anchor = '\tmux.HandleFunc("PUT /dsh/operator/platform/service-areas/{serviceAreaCode}", protected.handleOperatorUpsertServiceArea)\n'
          privacy_routes = privacy_anchor + '''\
\tmux.HandleFunc("GET /dsh/operator/privacy/client-addresses/policy", protected.handleGetClientAddressPrivacyPolicy)
\tmux.HandleFunc("PUT /dsh/operator/privacy/client-addresses/policy", protected.handleUpdateClientAddressPrivacyPolicy)
\tmux.HandleFunc("POST /dsh/operator/privacy/client-addresses/anonymize", protected.handleAnonymizeExpiredClientAddresses)
'''
          if "GET /dsh/operator/privacy/client-addresses/policy" not in server_text:
              if privacy_anchor not in server_text:
                  raise SystemExit("service-area route anchor missing")
              server_text = server_text.replace(privacy_anchor, privacy_routes, 1)
          server.write_text(server_text, encoding="utf-8")

          dsh_contract = root / "services/dsh/contracts/dsh.openapi.yaml"
          contract_text = dsh_contract.read_text(encoding="utf-8")
          routes = textwrap.dedent('''\
            /dsh/operator/analytics/operations:
              get:
                operationId: getDshOperationsAnalytics
                tags: [Analytics]
                security: [{ bearerAuth: [] }]
                responses:
                  '200': { description: Operations analytics, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                  '401': { description: Unauthenticated }
                  '403': { description: Forbidden }
            /dsh/operator/marketing/loyalty-earning-policies:
              get:
                operationId: listDshLoyaltyEarningPolicies
                tags: [Marketing]
                security: [{ bearerAuth: [] }]
                responses:
                  '200': { description: Loyalty policies, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                  '401': { description: Unauthenticated }
                  '403': { description: Forbidden }
              post:
                operationId: createDshLoyaltyEarningPolicy
                tags: [Marketing]
                security: [{ bearerAuth: [] }]
                requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true, minProperties: 1 } } } }
                responses:
                  '201': { description: Loyalty policy created, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                  '400': { description: Invalid request }
                  '401': { description: Unauthenticated }
                  '403': { description: Forbidden }
                  '409': { description: Conflict }
            /dsh/operator/marketing/loyalty-earning-policies/{policyId}:
              patch:
                operationId: updateDshLoyaltyEarningPolicy
                tags: [Marketing]
                security: [{ bearerAuth: [] }]
                parameters:
                  - { name: policyId, in: path, required: true, schema: { type: string, minLength: 1 } }
                requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true, minProperties: 1 } } } }
                responses:
                  '200': { description: Loyalty policy updated, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                  '400': { description: Invalid request }
                  '401': { description: Unauthenticated }
                  '403': { description: Forbidden }
                  '404': { description: Not found }
                  '409': { description: Conflict }
            /dsh/operator/stores/{storeId}/delivery-pricing:
              get:
                operationId: listDshOperatorDeliveryPricing
                tags: [PartnerDeliveryPricing]
                security: [{ bearerAuth: [] }]
                parameters:
                  - { name: storeId, in: path, required: true, schema: { type: string, minLength: 1 } }
                responses:
                  '200': { description: Delivery pricing, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                  '401': { description: Unauthenticated }
                  '403': { description: Forbidden }
                  '404': { description: Not found }
            /dsh/operator/stores/{storeId}/delivery-pricing/{fulfillmentMode}:
              put:
                operationId: updateDshOperatorDeliveryPricing
                tags: [PartnerDeliveryPricing]
                security: [{ bearerAuth: [] }]
                parameters:
                  - { name: storeId, in: path, required: true, schema: { type: string, minLength: 1 } }
                  - { name: fulfillmentMode, in: path, required: true, schema: { type: string, enum: [bthwani_delivery, partner_delivery, pickup] } }
                requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true, minProperties: 1 } } } }
                responses:
                  '200': { description: Delivery pricing updated, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                  '400': { description: Invalid request }
                  '401': { description: Unauthenticated }
                  '403': { description: Forbidden }
                  '404': { description: Not found }
                  '409': { description: Conflict }
            /dsh/partner/stores/{storeId}/delivery-pricing:
              get:
                operationId: listDshPartnerDeliveryPricing
                tags: [PartnerDeliveryPricing]
                security: [{ bearerAuth: [] }]
                parameters:
                  - { name: storeId, in: path, required: true, schema: { type: string, minLength: 1 } }
                responses:
                  '200': { description: Partner delivery pricing, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                  '401': { description: Unauthenticated }
                  '403': { description: Forbidden }
                  '404': { description: Not found }
            /dsh/partner/stores/{storeId}/delivery-pricing/{fulfillmentMode}:
              put:
                operationId: updateDshPartnerDeliveryPricing
                tags: [PartnerDeliveryPricing]
                security: [{ bearerAuth: [] }]
                parameters:
                  - { name: storeId, in: path, required: true, schema: { type: string, minLength: 1 } }
                  - { name: fulfillmentMode, in: path, required: true, schema: { type: string, const: partner_delivery } }
                requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true, minProperties: 1 } } } }
                responses:
                  '200': { description: Partner delivery pricing updated, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                  '400': { description: Invalid request }
                  '401': { description: Unauthenticated }
                  '403': { description: Forbidden }
                  '404': { description: Not found }
                  '409': { description: Conflict }
            /dsh/operator/privacy/client-addresses/policy:
              get:
                operationId: getDshClientAddressPrivacyPolicy
                tags: [ClientAddressPrivacy]
                security: [{ bearerAuth: [] }]
                responses:
                  '200': { description: Address privacy policy, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                  '401': { description: Unauthenticated }
                  '403': { description: Forbidden }
              put:
                operationId: updateDshClientAddressPrivacyPolicy
                tags: [ClientAddressPrivacy]
                security: [{ bearerAuth: [] }]
                requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true, minProperties: 1 } } } }
                responses:
                  '200': { description: Address privacy policy updated, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                  '400': { description: Invalid request }
                  '401': { description: Unauthenticated }
                  '403': { description: Forbidden }
                  '409': { description: Conflict }
            /dsh/operator/privacy/client-addresses/anonymize:
              post:
                operationId: anonymizeExpiredDshClientAddresses
                tags: [ClientAddressPrivacy]
                security: [{ bearerAuth: [] }]
                requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: false, required: [limit], properties: { limit: { type: integer, minimum: 1, maximum: 10000 } } } } } }
                responses:
                  '200': { description: Address anonymization result, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
                  '400': { description: Invalid request }
                  '401': { description: Unauthenticated }
                  '403': { description: Forbidden }
                  '409': { description: Conflict }
          ''')
          if "/dsh/operator/marketing/loyalty-earning-policies:" not in contract_text:
              marker = "components:\n"
              if marker not in contract_text:
                  raise SystemExit("DSH components anchor missing")
              contract_text = contract_text.replace(marker, routes + marker, 1)
          dsh_contract.write_text(contract_text, encoding="utf-8")

          binding_gate = root / "tools/guards/backend-api-binding-gate.mjs"
          binding_text = binding_gate.read_text(encoding="utf-8")
          old_duplicate = '''    if (previous) {
              violations.push({
                file: operationFile(service, operation),
                line: operation.line,
                message: `DUPLICATE_OPERATION_ID: "${operation.operationId}" already appears in ${operationFile(service, previous)} at line ${previous.line}`,
              });
            }
            seen.set(operation.operationId, operation);'''
          new_duplicate = '''    if (previous && operationKey(previous) !== operationKey(operation)) {
              violations.push({
                file: operationFile(service, operation),
                line: operation.line,
                message: `DUPLICATE_OPERATION_ID: "${operation.operationId}" maps to both ${operationKey(previous)} and ${operationKey(operation)}`,
              });
            }
            if (!previous) seen.set(operation.operationId, operation);'''
          if old_duplicate not in binding_text:
              raise SystemExit("backend duplicate-operation block missing")
          binding_gate.write_text(binding_text.replace(old_duplicate, new_duplicate, 1), encoding="utf-8")

          extractor = root / "tools/guards/extract_routes.go"
          extractor_text = extractor.read_text(encoding="utf-8")
          function_start = extractor_text.find("func parseRoutes(filePath string) ([]Route, error) {")
          if function_start < 0:
              raise SystemExit("route extractor function missing")
          replacement = r'''func parseRoutes(filePath string) ([]Route, error) {
	fileSet := token.NewFileSet()
	node, err := parser.ParseFile(fileSet, filePath, nil, parser.ParseComments)
	if err != nil {
		return nil, err
	}

	routes := []Route{}
	ast.Inspect(node, func(node ast.Node) bool {
		call, ok := node.(*ast.CallExpr)
		if !ok {
			return true
		}
		limit := len(call.Args)
		if limit > 2 {
			limit = 2
		}
		for _, argument := range call.Args[:limit] {
			literal, ok := argument.(*ast.BasicLit)
			if !ok || literal.Kind != token.STRING {
				continue
			}
			routeValue := strings.Trim(literal.Value, "`\"")
			parts := strings.Fields(routeValue)
			if len(parts) != 2 || !strings.HasPrefix(parts[1], "/") {
				continue
			}
			method := parts[0]
			if method != "GET" && method != "POST" && method != "PUT" && method != "PATCH" && method != "DELETE" {
				continue
			}
			routes = append(routes, Route{Method: method, Path: parts[1]})
			break
		}
		return true
	})
	return routes, nil
}
'''
          extractor.write_text(extractor_text[:function_start] + replacement, encoding="utf-8")

          for transient in [
              ".github/workflows/closure-source-export.yml",
              ".github/workflows/dsh-database-diagnostic-evidence.yml",
              ".github/workflows/closure-atomic-repair.yml",
              ".github/workflows/closure-atomic-repair-v2.yml",
              ".github/workflows/closure-atomic-repair-v3.yml",
          ]:
              target = root / transient
              if target.exists():
                  target.unlink()
          PY

      - name: Regenerate governed clients
        shell: bash
        run: |
          set -euo pipefail
          pnpm run openapi:generate:dsh
          pnpm run openapi:generate:wlt

      - name: Verify route contract convergence
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/route-contract-repair
          failed=""
          run_check() {
            name="$1"
            shift
            "$@" >"artifacts/route-contract-repair/$name.log" 2>&1
            code=$?
            cat "artifacts/route-contract-repair/$name.log"
            if [ $code -ne 0 ] && [ -z "$failed" ]; then failed="$name"; fi
          }
          run_check partner-surface pnpm run guard:partner-surface-truth
          run_check guard-registry pnpm run guard:guard-registry
          run_check wlt-boundary pnpm run guard:wlt-financial-boundary
          run_check api-binding pnpm run guard:api-binding
          run_check workflow-lint pnpm run guard:workflow-lint
          run_check actions-pin pnpm run guard:actions-pin
          run_check swagger pnpm run swagger:build
          run_check backend-api-binding pnpm run guard:backend-api-binding
          rm -rf dist-swagger
          echo "failed_check=$failed" >> "$GITHUB_OUTPUT"
          [ -z "$failed" ]

      - name: Upload route contract verification logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: closure-atomic-repair-v3-${{ github.sha }}
          path: artifacts/route-contract-repair
          if-no-files-found: warn
          retention-days: 3

      - name: Commit verified convergence
        id: commit
        if: ${{ steps.verify.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bthwani-closure-executor"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(closure): converge routes contracts and guard registry"
          git push origin HEAD:fix/lian-sovereign-final-closure

      - name: Publish convergence status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          FAILED_CHECK: ${{ steps.verify.outputs.failed_check }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          set -euo pipefail
          state=success
          description="route contract convergence committed"
          if [ "$VERIFY_OUTCOME" != success ]; then
            state=failure
            description="route contract verification failed: ${FAILED_CHECK:-unknown}"
          elif [ "$COMMIT_OUTCOME" != success ]; then
            state=failure
            description="route contract repair verified but push failed"
          fi
          payload="$(jq -n --arg state "$state" --arg context 'Closure Atomic Repair V3' --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d "$payload"

      - name: Enforce verified convergence
        if: ${{ steps.verify.outcome != 'success' || steps.commit.outcome != 'success' }}
        shell: bash
        run: exit 1
