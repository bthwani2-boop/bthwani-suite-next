name: Lian Client Address Privacy Integration

on:
  push:
    branches: [lian]
    paths:
      - "services/dsh/backend/internal/http/catalog_unified_routes.go"
      - "services/dsh/backend/internal/http/client_address_privacy.go"
      - "services/dsh/contracts/dsh.client-address-privacy.openapi.yaml"
      - "services/dsh/contracts/contract-registry.ts"
      - "services/dsh/capability-map.extensions.ts"
      - "services/dsh/frontend/shared/privacy/**"
      - "services/dsh/frontend/control-panel/platform/ClientAddressPrivacySection.tsx"
      - "services/dsh/frontend/control-panel/platform/PlatformPoliciesScreen.tsx"
      - "contracts/master.openapi.yaml"
      - "tools/guards/privacy/client-address-privacy-integration-gate.mjs"
      - ".github/workflows/lian-client-address-privacy-integration.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lian-client-address-privacy-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify client address privacy full-stack integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Run privacy integration guard
        run: node tools/guards/privacy/client-address-privacy-integration-gate.mjs

      - name: Verify backend route and contract congruence
        run: pnpm run guard:backend-api-binding

      - name: Verify service manifest and capability ownership
        run: pnpm run guard:service-manifest-drift

      - name: Typecheck privacy consumer surface
        run: pnpm run typecheck

      - name: Build control panel
        run: pnpm --dir apps/control-panel/runtime build

  result:
    name: Lian Client Address Privacy Integration result
    if: always()
    needs: [verify]
    runs-on: ubuntu-latest
    steps:
      - name: Require privacy integration to pass
        env:
          RESULT: ${{ needs.verify.result }}
        run: test "$RESULT" = success
