name: JRN-010..020 Sequential Closure Verify

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "services/dsh/backend/cmd/dsh-api/main.go"
      - "services/dsh/backend/internal/checkout/**"
      - "services/dsh/backend/internal/orders/**"
      - "services/dsh/backend/internal/dispatch/**"
      - "services/dsh/backend/internal/pickup/**"
      - "services/dsh/backend/internal/http/checkout.go"
      - "services/dsh/backend/internal/http/order_*.go"
      - "services/dsh/backend/internal/http/dispatch*.go"
      - "services/dsh/backend/internal/http/pickup*.go"
      - "services/dsh/backend/internal/http/store_captain_handoff.go"
      - "services/dsh/backend/internal/http/journeys_015_020_test.go"
      - "services/dsh/contracts/dsh.openapi.yaml"
      - "services/dsh/contracts/dsh.order-truth.openapi.yaml"
      - "services/dsh/contracts/fragments/order-preparation-handoff.fragment.yaml"
      - "services/dsh/database/migrations/dsh-09*.sql"
      - "services/dsh/database/migrations/dsh-90*.sql"
      - "services/dsh/database/tests/dsh-902_903_jrn011_order_truth_invariants.sql"
      - "services/dsh/frontend/shared/checkout/**"
      - "services/dsh/frontend/shared/order-truth/**"
      - "services/dsh/frontend/shared/orders/**"
      - "services/dsh/frontend/shared/dispatch/**"
      - "services/dsh/frontend/shared/pickup/**"
      - "services/dsh/frontend/shared/delivery/**"
      - "services/dsh/frontend/shared/partner-delivery/**"
      - "services/dsh/frontend/shared/media/pod/**"
      - "services/dsh/frontend/app-client/orders/**"
      - "services/dsh/frontend/app-partner/orders/**"
      - "services/dsh/frontend/app-captain/orders/**"
      - "services/dsh/frontend/control-panel/operations/**"
      - "services/dsh/tests/jrn-011-order-*.test.mjs"
      - "services/dsh/tests/journeys-020-025-binding.test.mjs"
      - "tools/guards/checkout/jrn-010-checkout-truth-gate.mjs"
      - "tools/guards/jrn-011-cross-surface-integrity-gate.mjs"
      - "tools/guards/jrn-012-014-preparation-dispatch-gate.mjs"
      - "tools/guards/jrn-015-020-affected-boundary.mjs"
      - ".github/workflows/jrn-010-020-sambassam-verify.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-010-020-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-integrity:
    name: Static contracts, bindings, and boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@10.34.2 --activate
      - name: Verify repository hygiene
        run: git diff --check
      - name: Verify JRN-010 checkout truth
        run: node tools/guards/checkout/jrn-010-checkout-truth-gate.mjs
      - name: Verify JRN-011 order truth
        run: |
          node tools/guards/jrn-011-cross-surface-integrity-gate.mjs
          node --test services/dsh/tests/jrn-011-order-*.test.mjs
      - name: Verify JRN-012..014 preparation, custody, and dispatch
        run: node tools/guards/jrn-012-014-preparation-dispatch-gate.mjs
      - name: Verify JRN-015..020 affected surfaces and readback
        run: |
          node tools/guards/jrn-015-020-affected-boundary.mjs
          node --test services/dsh/tests/journeys-020-025-binding.test.mjs
      - name: Verify sovereign boundaries
        run: |
          pnpm guard:fullstack-boundary
          pnpm guard:wlt-financial-boundary
          pnpm guard:no-broken-imports

  go-integration:
    name: Go domain, HTTP, and runtime compile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: services/dsh/backend
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Go from module
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify JRN-010..020 domain and route integration
        run: go test ./cmd/dsh-api ./internal/checkout ./internal/orders ./internal/dispatch ./internal/pickup ./internal/http -count=1

  dsh-typecheck:
    name: DSH shared brain and surface typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@10.34.2 --activate
      - name: Install locked workspace
        run: pnpm install --frozen-lockfile
      - name: Typecheck DSH
        run: pnpm --dir services/dsh typecheck

  publish-result:
    name: Publish same-commit closure status
    if: always()
    needs: [static-integrity, go-integration, dsh-typecheck]
    runs-on: ubuntu-latest
    steps:
      - name: Publish aggregate status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          STATIC_RESULT: ${{ needs.static-integrity.result }}
          GO_RESULT: ${{ needs.go-integration.result }}
          TYPECHECK_RESULT: ${{ needs.dsh-typecheck.result }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=failure
          DESCRIPTION="JRN-010..020 verification failed"
          if [ "$STATIC_RESULT" = success ] && [ "$GO_RESULT" = success ] && [ "$TYPECHECK_RESULT" = success ]; then
            STATE=success
            DESCRIPTION="JRN-010..020 verification passed"
          fi
          jq -n \
            --arg state "$STATE" \
            --arg context "journeys/jrn-010-020/sequential-closure" \
            --arg description "$DESCRIPTION" \
            --arg target_url "$TARGET_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
