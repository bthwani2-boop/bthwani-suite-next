name: Temporary Restore Governed Subscription Lifecycle

on:
  pull_request:
    branches: [sambassam]
    paths:
      - "tools/scripts/restore-subscription-lifecycle-governed.py"
      - ".github/workflows/tmp-restore-subscription-lifecycle.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout recovery branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Restore exact governed source and pointer fix
        run: python3 tools/scripts/restore-subscription-lifecycle-governed.py

      - name: Format and verify HTTP package
        run: |
          gofmt -w services/dsh/backend/internal/http/subscription_lifecycle_governed.go
          cd services/dsh/backend
          go test ./internal/http -run '^$'
          go build ./internal/http
          git diff --check

      - name: Commit verified restoration
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "bthwani-recovery"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix: restore governed subscription lifecycle source [skip ci]"
          git pull --rebase origin "$HEAD_REF"
          git push origin "HEAD:$HEAD_REF"
