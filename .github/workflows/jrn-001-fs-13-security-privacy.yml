name: JRN-001 FS-13 Security Privacy

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/contracts/jrn-001-security-privacy-registry.json
      - services/dsh/backend/internal/http/partner_lifecycle_routes.go
      - services/dsh/backend/internal/partner/**
      - services/dsh/database/migrations/dsh-098_partner_onboarding_integrity.sql
      - services/dsh/tests/jrn-001-fs-02-rbac.test.mjs
      - tools/guards/partner/jrn-001-security-privacy-gate.mjs
      - .github/workflows/jrn-001-fs-13-security-privacy.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Verify security and privacy gate
        run: |
          node tools/guards/partner/jrn-001-security-privacy-gate.mjs
          node --test services/dsh/tests/jrn-001-fs-02-rbac.test.mjs
      - name: Verify backend negative paths
        working-directory: services/dsh/backend
        run: go test ./internal/partner -run 'Test.*(Ownership|Idempotency|Version|Sanitize|Transition)' -count=1
      - name: Publish FS-13 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ "$RESULT" = success ] && STATE=success || STATE=failure
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-13-security-privacy' --arg description "FS-13 security privacy: $RESULT" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
