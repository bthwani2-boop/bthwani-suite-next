name: JRN-030 PostgreSQL Lifecycle Diagnostic

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    types: [synchronize]

permissions:
  contents: read

concurrency:
  group: jrn-030-lifecycle-${{ github.sha }}
  cancel-in-progress: false

jobs:
  diagnose:
    name: JRN-030 lifecycle diagnostic
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout repository state
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Start PostgreSQL 16
        id: postgres
        shell: bash
        run: |
          set -euo pipefail
          brew list postgresql@16 >/dev/null 2>&1 || brew install postgresql@16
          pg_bin="$(brew --prefix postgresql@16)/bin"
          echo "${pg_bin}" >> "${GITHUB_PATH}"
          rm -rf /tmp/jrn030-pgdata
          "${pg_bin}/initdb" -D /tmp/jrn030-pgdata --auth=trust --encoding=UTF8 >/tmp/jrn030-initdb.log
          "${pg_bin}/pg_ctl" -D /tmp/jrn030-pgdata -o "-p 55432" -l /tmp/jrn030-postgres.log start
          "${pg_bin}/createdb" -h 127.0.0.1 -p 55432 dsh_jrn_030
          echo "database_url=postgres://$(whoami)@127.0.0.1:55432/dsh_jrn_030?sslmode=disable" >> "${GITHUB_OUTPUT}"
      - name: Apply DSH migrations quietly
        env:
          DATABASE_URL: ${{ steps.postgres.outputs.database_url }}
        run: |
          set -euo pipefail
          : > /tmp/jrn030-migrations.log
          for migration in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            printf 'Applying %s\n' "${migration}" >> /tmp/jrn030-migrations.log
            psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 -f "${migration}" >> /tmp/jrn030-migrations.log 2>&1
          done
      - name: Execute and capture lifecycle proof
        id: lifecycle
        working-directory: services/dsh/backend
        env:
          DATABASE_URL: ${{ steps.postgres.outputs.database_url }}
        shell: bash
        run: |
          set +e
          go test ./internal/partnerfleet -run '^TestPartnerFleetLifecyclePostgres$' -count=1 -v > /tmp/jrn030-lifecycle.log 2>&1
          status=$?
          cat /tmp/jrn030-lifecycle.log
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0
      - name: Upload lifecycle diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jrn-030-lifecycle-diagnostic-${{ github.sha }}
          path: |
            /tmp/jrn030-lifecycle.log
            /tmp/jrn030-migrations.log
            /tmp/jrn030-postgres.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail when lifecycle proof failed
        if: steps.lifecycle.outputs.status != '0'
        run: exit 1
      - name: Stop PostgreSQL
        if: always()
        run: |
          pg_bin="$(brew --prefix postgresql@16)/bin"
          "${pg_bin}/pg_ctl" -D /tmp/jrn030-pgdata stop -m fast || true
