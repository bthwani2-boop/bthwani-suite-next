name: Apply operational policy editor fix

on:
  push:
    branches: [sambassam]
    paths:
      - "tools/important-scripts/fix-operational-policy-editor.mjs"
      - ".github/workflows/apply-operational-policy-editor-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sambassam
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
      - name: Apply editor repair
        run: node tools/important-scripts/fix-operational-policy-editor.mjs
      - name: Commit and push repair
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No editor repair required."
            exit 0
          fi
          git config user.name "bthwani-governance-bot"
          git config user.email "actions@users.noreply.github.com"
          git add services/dsh/frontend/shared/platform/use-platform-policies-controller.tsx
          git commit -m "fix(platform): align operational policy editor types"
          git pull --rebase origin sambassam
          git push origin HEAD:sambassam
