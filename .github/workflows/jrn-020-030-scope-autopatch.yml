name: JRN-020..030 Closure Scope Autopatch

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/jrn-020-030-scope-autopatch.yml"

permissions:
  contents: write

jobs:
  patch-and-remove-self:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout sambassam
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: true
      - name: Narrow closure triggers and preserve active runs
        shell: bash
        run: |
          git pull --ff-only origin sambassam
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/jrn-020-030-sambassam-closure.yml')
          content = path.read_text(encoding='utf-8')
          start = content.index('    paths:\n')
          end = content.index('\n\npermissions:', start)
          replacement = '''    paths:
      - "services/dsh/tsconfig.jrn-020-030.json"
      - "services/dsh/backend/internal/dispatch/**"
      - "services/dsh/backend/internal/support/**"
      - "services/dsh/backend/internal/specialrequests/**"
      - "services/dsh/backend/internal/notifications/**"
      - "services/dsh/backend/internal/fieldreadiness/**"
      - "services/dsh/backend/internal/marketing/**"
      - "services/dsh/backend/internal/coupons/**"
      - "services/dsh/backend/internal/partnerfleet/**"
      - "services/dsh/backend/internal/platformpolicies/**"
      - "services/dsh/backend/internal/promotionfundingoutbox/**"
      - "services/dsh/backend/internal/http/dispatch*.go"
      - "services/dsh/backend/internal/http/governed_support.go"
      - "services/dsh/backend/internal/http/support*.go"
      - "services/dsh/backend/internal/http/specialrequests.go"
      - "services/dsh/backend/internal/http/notifications.go"
      - "services/dsh/backend/internal/http/notification_routes.go"
      - "services/dsh/backend/internal/http/fieldreadiness.go"
      - "services/dsh/backend/internal/http/field_readiness_routes.go"
      - "services/dsh/backend/internal/http/marketing.go"
      - "services/dsh/backend/internal/http/coupons.go"
      - "services/dsh/backend/internal/http/delivery_pricing.go"
      - "services/dsh/backend/internal/http/partner_fleet*.go"
      - "services/dsh/backend/internal/http/platform_operational_policies.go"
      - "services/dsh/backend/internal/http/coupon_funding_lifecycle.go"
      - "services/dsh/backend/internal/http/subscription_purchases.go"
      - "services/dsh/backend/internal/http/journeys_020_025_routes_test.go"
      - "services/dsh/backend/internal/http/journeys_026_030_routes_test.go"
      - "services/dsh/backend/internal/http/server.go"
      - "services/dsh/backend/cmd/dsh-api/main.go"
      - "services/dsh/database/migrations/dsh-011*"
      - "services/dsh/database/migrations/dsh-012*"
      - "services/dsh/database/migrations/dsh-019*"
      - "services/dsh/database/migrations/dsh-034*"
      - "services/dsh/database/migrations/dsh-054*"
      - "services/dsh/database/migrations/dsh-056*"
      - "services/dsh/database/migrations/dsh-059*"
      - "services/dsh/database/migrations/dsh-065*"
      - "services/dsh/database/migrations/dsh-066*"
      - "services/dsh/database/migrations/dsh-067*"
      - "services/dsh/database/migrations/dsh-068*"
      - "services/dsh/database/migrations/dsh-069*"
      - "services/dsh/database/migrations/dsh-070*"
      - "services/dsh/database/migrations/dsh-071*"
      - "services/dsh/database/migrations/dsh-072*"
      - "services/dsh/database/migrations/dsh-073*"
      - "services/dsh/database/migrations/dsh-074*"
      - "services/dsh/database/migrations/dsh-075*"
      - "services/dsh/database/migrations/dsh-076*"
      - "services/dsh/database/migrations/dsh-077*"
      - "services/dsh/database/migrations/dsh-080*"
      - "services/dsh/database/migrations/dsh-084*"
      - "services/dsh/database/migrations/dsh-087*"
      - "services/dsh/database/migrations/dsh-093*"
      - "services/dsh/database/tests/**"
      - "services/dsh/contracts/dsh.openapi.yaml"
      - "services/dsh/contracts/dsh.marketing-commercial.openapi.yaml"
      - "services/dsh/contracts/dsh.partner-fleet.openapi.yaml"
      - "services/dsh/contracts/dsh.platform-policies.openapi.yaml"
      - "services/dsh/frontend/shared/dispatch/**"
      - "services/dsh/frontend/shared/support/**"
      - "services/dsh/frontend/shared/special-requests/**"
      - "services/dsh/frontend/shared/notifications/**"
      - "services/dsh/frontend/shared/field-readiness/**"
      - "services/dsh/frontend/shared/marketing/**"
      - "services/dsh/frontend/shared/partner/partner-fleet.api.ts"
