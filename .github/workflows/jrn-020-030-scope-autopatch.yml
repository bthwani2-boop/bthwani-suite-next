      - "services/dsh/frontend/app-client/DshClientSurface.tsx"
      - "services/dsh/frontend/app-captain/orders/CaptainOrderSupportConversationScreen.tsx"
      - "services/dsh/frontend/app-captain/account/PartnerFleetConnectionCard.tsx"
      - "services/dsh/frontend/app-partner/team/PartnerTeamManagementScreen.tsx"
      - "services/dsh/frontend/control-panel/operations/SpecialOpsWorkbenchScreen.tsx"
      - "services/dsh/frontend/control-panel/operations/AreaCapacityScreen.tsx"
      - "services/dsh/frontend/control-panel/marketing/**"
      - "services/dsh/tests/journeys-020-025-binding.test.mjs"
      - "services/dsh/tests/journeys-026-030-binding.test.mjs"
      - "services/dsh/tests/jrn-030-partner-fleet-surface-binding.test.mjs"
      - "services/wlt/backend/internal/promotionfunding/**"
      - "services/wlt/contracts/wlt.promotion-funding.openapi.yaml"
      - "tools/guards/fullstack-boundary-gate.mjs"
      - "tools/guards/wlt-financial-boundary-gate.mjs"
      - "tools/guards/no-broken-imports.mjs"
      - "tools/guards/jrn-015-020-affected-boundary.mjs"
      - "governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md"
      - "governance/evidence/JRN-020-030_FULLSTACK_CLOSURE.json"
      - ".github/actions/setup-node-workspace/action.yml"
      - ".github/workflows/jrn-020-030-sambassam-closure.yml"'''
          content = content[:start] + replacement + content[end:]
          content = content.replace('  cancel-in-progress: true', '  cancel-in-progress: false', 1)
          path.write_text(content, encoding='utf-8')
          PY
          git rm .github/workflows/jrn-020-030-scope-autopatch.yml
          git diff --check
      - name: Commit and push stabilized closure
        shell: bash
        run: |
          git config user.name "bthwani-journey-automation"
          git config user.email "actions@users.noreply.github.com"
          git add .github/workflows/jrn-020-030-sambassam-closure.yml
          git commit -m "ci(jrn-020-030): isolate closure triggers and retain active run"
          for attempt in 1 2 3; do
            git fetch origin sambassam
            git rebase origin/sambassam
            if git push origin HEAD:sambassam; then
              exit 0
            fi
          done
          exit 1
