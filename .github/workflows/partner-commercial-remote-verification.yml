name: Partner Commercial Remote Verification

on:
  push:
    branches: [bassam]
    paths:
      - '.github/workflows/partner-commercial-remote-verification.yml'
      - 'services/dsh/backend/**'
      - 'services/dsh/database/migrations/**'
      - 'services/dsh/frontend/**'
      - 'services/wlt/backend/**'
      - 'services/wlt/contracts/**'
      - 'tools/guards/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: partner-commercial-remote-verification-bassam
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: verification
          POSTGRES_PASSWORD: verification
          POSTGRES_DB: verification
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U verification -d verification"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Run verification and capture report
        id: verify
        continue-on-error: true
        shell: bash
        env:
          PGPASSWORD: verification
        run: |
          set +e
          report=/tmp/partner-commercial-report.txt
          : > "$report"
          run_step() {
            name="$1"; shift
            printf '\n## %s\n' "$name" >> "$report"
            "$@" >> "$report" 2>&1
            code=$?
            printf '\nexit_code=%s\n' "$code" >> "$report"
            return 0
          }

          run_step "Resolved commit" git rev-parse HEAD

          printf '\n## DSH migrations\n' >> "$report"
          migration_failed=0
          for file in services/dsh/database/migrations/*.sql; do
            printf '\n### %s\n' "$file" >> "$report"
            psql -h 127.0.0.1 -U verification -d verification -v ON_ERROR_STOP=1 -f "$file" >> "$report" 2>&1
            code=$?
            printf 'exit_code=%s\n' "$code" >> "$report"
            if [ "$code" -ne 0 ]; then migration_failed=1; break; fi
          done
          printf '\nmigration_suite_exit_code=%s\n' "$migration_failed" >> "$report"

          run_step "Go format" bash -lc 'files=$(gofmt -l services/dsh/backend services/wlt/backend); test -z "$files" || { printf "%s\n" "$files"; exit 1; }'
          run_step "DSH Go tests" bash -lc 'cd services/dsh/backend && go test ./...'
          run_step "WLT Go tests" bash -lc 'cd services/wlt/backend && go test ./...'
          run_step "Workspace install" pnpm install --frozen-lockfile
          run_step "Contract lint" pnpm run contracts:lint
          run_step "Backend API binding" pnpm run guard:backend-api-binding
          run_step "Frontend API binding" pnpm run guard:api-binding
          run_step "Frontend feature binding" pnpm run guard:frontend-feature-binding
          run_step "Broken imports" pnpm run guard:no-broken-imports
          run_step "Workspace typecheck" pnpm run typecheck

          mkdir -p governance/partners
          {
            echo '# Partner Commercial Remote Verification'
            echo
            echo '> Generated by GitHub Actions from the exact remote `bassam` commit.'
            echo
            echo '```text'
            cat "$report"
            echo '```'
          } > governance/partners/PARTNER_COMMERCIAL_REMOTE_VERIFICATION.md

      - name: Commit verification report
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add governance/partners/PARTNER_COMMERCIAL_REMOTE_VERIFICATION.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'chore(verification): record partner commercial remote results'
          git pull --rebase origin bassam
          git push origin HEAD:bassam
