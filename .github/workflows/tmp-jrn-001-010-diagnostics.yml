name: Temporary JRN-001..010 Diagnostics

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-jrn-001-010-diagnostics.yml"

permissions:
  contents: read
  statuses: write

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Run static diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          failures=0
          publish() {
            context="$1"; shift
            output=$("$@" 2>&1); code=$?
            state=success
            [ "$code" -eq 0 ] || { state=failure; failures=$((failures+1)); }
            description=$(printf '%s' "$output" | tail -n 4 | tr '\n' ' ' | tr -s ' ' | cut -c1-130)
            [ -n "$description" ] || description="$context completed with exit $code"
            jq -n --arg state "$state" --arg context "journeys/jrn-001-010/diag-$context" --arg description "$description" --arg target_url "$URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
            curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" -d @/tmp/status.json
            printf '%s\n' "$output"
          }
          publish static-guard node tools/guards/live-cross-journey-integrity-gate.mjs
          publish partner-tests bash -lc 'node --test services/dsh/tests/jrn-001-*.test.mjs'
          publish jrn-005-010-test node --test services/dsh/tests/jrn-005-010-integrity.test.mjs
          exit "$failures"

  workforce:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: core/workforce/backend/go.mod
          cache-dependency-path: core/workforce/backend/go.sum
      - name: Run workforce diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          failures=0
          publish() {
            context="$1"; shift
            output=$("$@" 2>&1); code=$?
            state=success
            [ "$code" -eq 0 ] || { state=failure; failures=$((failures+1)); }
            description=$(printf '%s' "$output" | tail -n 4 | tr '\n' ' ' | tr -s ' ' | cut -c1-130)
            [ -n "$description" ] || description="$context completed with exit $code"
            jq -n --arg state "$state" --arg context "journeys/jrn-001-010/diag-$context" --arg description "$description" --arg target_url "$URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
            curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" -d @/tmp/status.json
            printf '%s\n' "$output"
          }
          publish workforce-http bash -lc 'cd core/workforce/backend && go test ./internal/http -count=1'
          publish workforce-domain bash -lc 'cd core/workforce/backend && go test ./internal/workforce -count=1'
          exit "$failures"

  dsh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Run DSH diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          failures=0
          publish() {
            context="$1"; shift
            output=$("$@" 2>&1); code=$?
            state=success
            [ "$code" -eq 0 ] || { state=failure; failures=$((failures+1)); }
            description=$(printf '%s' "$output" | tail -n 4 | tr '\n' ' ' | tr -s ' ' | cut -c1-130)
            [ -n "$description" ] || description="$context completed with exit $code"
            jq -n --arg state "$state" --arg context "journeys/jrn-001-010/diag-$context" --arg description "$description" --arg target_url "$URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
            curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" -d @/tmp/status.json
            printf '%s\n' "$output"
          }
          publish dsh-http bash -lc 'cd services/dsh/backend && go test ./internal/http -count=1'
          publish dsh-partner bash -lc 'cd services/dsh/backend && go test ./internal/partner -count=1'
          publish dsh-cart bash -lc 'cd services/dsh/backend && go test ./internal/cart -count=1'
          publish dsh-checkout bash -lc 'cd services/dsh/backend && go test ./internal/checkout -count=1'
          publish dsh-wlt bash -lc 'cd services/dsh/backend && go test ./internal/wlt -count=1'
          exit "$failures"
