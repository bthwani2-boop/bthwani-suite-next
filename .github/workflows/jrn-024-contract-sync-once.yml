name: JRN-024 Contract Synchronization Once

on:
  push:
    branches: [sambassam]
    paths:
      - "governance/evidence/JRN-024_CONTRACT_SYNC_TRIGGER.md"
  pull_request:
    branches: [master]
    paths:
      - "governance/evidence/JRN-024_CONTRACT_SYNC_TRIGGER.md"

permissions:
  contents: write

concurrency:
  group: jrn-024-contract-sync-sambassam
  cancel-in-progress: false

jobs:
  synchronize:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'sambassam'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: sambassam
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Synchronize JRN-024 contract on the latest branch head
        id: synchronize
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee jrn-024-contract-sync.log) 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            echo "JRN-024 synchronization attempt ${attempt}"
            git fetch origin sambassam
            git reset --hard origin/sambassam

            node <<'NODE'
          const fs = require('node:fs');
          const schemaPath = 'services/dsh/contracts/components/schemas/field.schemas.yaml';
          const pathsPath = 'services/dsh/contracts/paths/field.paths.yaml';

          let schema = fs.readFileSync(schemaPath, 'utf8');
          const oldVisitTail = `    completedAt: { type: ["string", "null"], format: date-time }\n    createdAt: { type: string, format: date-time }\n    updatedAt: { type: string, format: date-time }`;
          const newVisitTail = `    completedAt: { type: ["string", "null"], format: date-time }\n    createdAt: { type: string, format: date-time }\n    updatedAt: { type: string, format: date-time }\n    geofenceRadiusMeters: { type: number }\n    startLatitude: { type: [number, "null"] }\n    startLongitude: { type: [number, "null"] }\n    startAccuracyMeters: { type: [number, "null"] }\n    startCapturedAt: { type: ["string", "null"], format: date-time }\n    startProvider: { type: ["string", "null"] }\n    startDeviceReference: { type: ["string", "null"] }\n    startIsMocked: { type: boolean }\n    startGeofenceStatus: { type: ["string", "null"], enum: [inside, outside, unknown, null] }\n    startDistanceFromStoreMeters: { type: [number, "null"] }\n    completionLatitude: { type: [number, "null"] }\n    completionLongitude: { type: [number, "null"] }\n    completionAccuracyMeters: { type: [number, "null"] }\n    completionCapturedAt: { type: ["string", "null"], format: date-time }\n    completionProvider: { type: ["string", "null"] }\n    completionIsMocked: { type: [boolean, "null"] }\n    completionGeofenceStatus: { type: ["string", "null"], enum: [inside, outside, unknown, null] }\n    completionDistanceFromStoreMeters: { type: [number, "null"] }\n    storeLatitude: { type: [number, "null"] }\n    storeLongitude: { type: [number, "null"] }`;
          if (!schema.includes('geofenceRadiusMeters: { type: number }')) {
            if (!schema.includes(oldVisitTail)) throw new Error('DshFieldVisit anchor not found');
            schema = schema.replace(oldVisitTail, newVisitTail);
          }

          const oldCreate = `DshCreateFieldVisitRequest:\n  type: object\n  properties:\n    visitType: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshVisitType" }`;
          const locationProperties = `      type: object\n      additionalProperties: false\n      required: [latitude, longitude, accuracyMeters, capturedAt, provider]\n      properties:\n        latitude: { type: number, minimum: -90, maximum: 90 }\n        longitude: { type: number, minimum: -180, maximum: 180 }\n        accuracyMeters: { type: number, exclusiveMinimum: 0, maximum: 50 }\n        capturedAt: { type: string, format: date-time }\n        provider: { type: string, minLength: 1 }\n        deviceReference: { type: string }\n        isMocked: { type: boolean, default: false }`;
          const newCreate = `DshCreateFieldVisitRequest:\n  type: object\n  additionalProperties: false\n  required: [startLocation]\n  properties:\n    visitType: { $ref: "../../dsh.openapi.yaml#/components/schemas/DshVisitType" }\n    startLocation:\n${locationProperties}`;
          if (!schema.includes('required: [startLocation]')) {
            if (!schema.includes(oldCreate)) throw new Error('DshCreateFieldVisitRequest anchor not found');
            schema = schema.replace(oldCreate, newCreate);
          }
          fs.writeFileSync(schemaPath, schema);

          let paths = fs.readFileSync(pathsPath, 'utf8');
          const completeStart = paths.indexOf('/dsh/field/visits/{visitId}/complete:');
          const checksStart = paths.indexOf('/dsh/field/visits/{visitId}/checks:');
          if (completeStart < 0 || checksStart < 0) throw new Error('complete path boundaries not found');
          let completeBlock = paths.slice(completeStart, checksStart);
          if (!completeBlock.includes('required: [completionLocation]')) {
            const completeAnchor = `    parameters:\n      - name: visitId\n        in: path\n        required: true\n        schema: { type: string }\n    responses:`;
            const completeBody = `    parameters:\n      - name: visitId\n        in: path\n        required: true\n        schema: { type: string }\n    requestBody:\n      required: true\n      content:\n        application/json:\n          schema:\n            type: object\n            additionalProperties: false\n            required: [completionLocation]\n            properties:\n              completionLocation:\n${locationProperties.split('\n').map((line) => `    ${line}`).join('\n')}\n    responses:`;
            if (!completeBlock.includes(completeAnchor)) throw new Error('complete request anchor not found');
            completeBlock = completeBlock.replace(completeAnchor, completeBody);
            paths = paths.slice(0, completeStart) + completeBlock + paths.slice(checksStart);
            fs.writeFileSync(pathsPath, paths);
          }
          NODE

            pnpm --dir services/dsh openapi:generate
            grep -Fq 'required: [startLocation]' services/dsh/contracts/components/schemas/field.schemas.yaml
            grep -Fq 'required: [completionLocation]' services/dsh/contracts/paths/field.paths.yaml
            grep -Fq 'startLocation:' services/dsh/contracts/generated/dsh.bundle.openapi.yaml
            grep -Fq 'completionLocation:' services/dsh/contracts/generated/dsh.bundle.openapi.yaml
            grep -Fq 'startLocation:' services/dsh/clients/generated/dsh-api.ts
            grep -Fq 'completionLocation:' services/dsh/clients/generated/dsh-api.ts

            if git diff --quiet -- services/dsh/contracts/components/schemas/field.schemas.yaml services/dsh/contracts/paths/field.paths.yaml services/dsh/contracts/generated/dsh.bundle.openapi.yaml services/dsh/clients/generated/dsh-api.ts; then
              echo "JRN-024 contract is already synchronized."
              exit 0
            fi

            git add services/dsh/contracts/components/schemas/field.schemas.yaml \
                    services/dsh/contracts/paths/field.paths.yaml \
                    services/dsh/contracts/generated/dsh.bundle.openapi.yaml \
                    services/dsh/clients/generated/dsh-api.ts
            git commit -m "fix(jrn-024): synchronize GPS visit contracts"
            if git push origin HEAD:sambassam; then
              exit 0
            fi
          done

          echo "Unable to push JRN-024 synchronization after five latest-head retries." >&2
          exit 1

      - name: Upload contract synchronization diagnostics
        if: failure() && steps.synchronize.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: jrn-024-contract-sync-diagnostics
          path: jrn-024-contract-sync.log
          if-no-files-found: error
          retention-days: 3
