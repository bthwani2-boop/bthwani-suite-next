name: JRN-003 Workforce Closure

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "core/identity/backend/**"
      - "core/workforce/backend/**"
      - "core/workforce/contracts/**"
      - "services/dsh/frontend/shared/workforce/**"
      - "services/dsh/frontend/app-field/account/**"
      - "services/dsh/tsconfig.jrn-010-020.json"
      - "apps/app-field/runtime/src/App.tsx"
      - "apps/app-captain/runtime/src/App.tsx"
      - ".github/workflows/jrn-003-workforce-closure.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-003-${{ github.sha }}
  cancel-in-progress: false

jobs:
  announce:
    name: Announce JRN-003 verification
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Publish pending same-commit status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state "pending" --arg context "journeys/jrn-003/targeted-verification" --arg description "JRN-003 targeted verification is running" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json

  backend:
    name: Identity and workforce behavior
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@d35c59abb0614a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: core/identity/backend/go.mod
          cache-dependency-path: |
            core/identity/backend/go.sum
            core/workforce/backend/go.sum
      - name: Verify identity packages
        run: cd core/identity/backend && go test ./internal/http ./internal/identity -count=1
      - name: Verify workforce packages
        run: cd core/workforce/backend && go test ./internal/http ./internal/workforce -count=1

  surfaces:
    name: Field and captain workforce consumers
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile --reporter=silent
      - name: Typecheck app-field
        id: app_field
        continue-on-error: true
        run: pnpm --dir apps/app-field/runtime typecheck 2>&1 | tee /tmp/jrn-003-app-field.log
      - name: Typecheck app-captain
        id: app_captain
        continue-on-error: true
        run: pnpm --dir apps/app-captain/runtime typecheck 2>&1 | tee /tmp/jrn-003-app-captain.log
      - name: Publish surface typecheck statuses
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          FIELD_OUTCOME: ${{ steps.app_field.outcome }}
          CAPTAIN_OUTCOME: ${{ steps.app_captain.outcome }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          publish_status() {
            NAME="$1"
            OUTCOME="$2"
            LOG="$3"
            STATE=success
            DESCRIPTION="$NAME typecheck passed"
            if [ "$OUTCOME" != success ]; then
              STATE=failure
              RAW="$(grep -m1 -E 'error TS[0-9]+:' "$LOG" || true)"
              DESCRIPTION="$NAME: ${RAW:-typecheck failed}"
            fi
            DESCRIPTION="$(printf '%s' "$DESCRIPTION" | cut -c1-140)"
            jq -n --arg state "$STATE" --arg context "journeys/jrn-003/$NAME" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
            curl --fail-with-body --silent --show-error -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
              -d @/tmp/status.json
          }
          publish_status app-field "$FIELD_OUTCOME" /tmp/jrn-003-app-field.log
          publish_status app-captain "$CAPTAIN_OUTCOME" /tmp/jrn-003-app-captain.log
          [ "$FIELD_OUTCOME" = success ] && [ "$CAPTAIN_OUTCOME" = success ]

  result:
    name: Publish JRN-003 result
    if: always()
    needs: [backend, surfaces]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish same-commit status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          SURFACES_RESULT: ${{ needs.surfaces.result }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=success
          if [ "$BACKEND_RESULT" != success ] || [ "$SURFACES_RESULT" != success ]; then
            STATE=failure
          fi
          DESCRIPTION="backend=$BACKEND_RESULT surfaces=$SURFACES_RESULT"
          jq -n --arg state "$STATE" --arg context "journeys/jrn-003/targeted-verification" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
          [ "$STATE" = success ]
