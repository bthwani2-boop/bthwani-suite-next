name: JRN-003 Workforce Slice Closure

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "core/identity/backend/**"
      - "core/workforce/backend/**"
      - "core/workforce/contracts/**"
      - "services/dsh/backend/**"
      - "services/dsh/contracts/dsh.jrn-003-workforce-scopes.openapi.yaml"
      - "services/dsh/database/migrations/dsh-048_workforce_actor_area_scopes.sql"
      - "services/dsh/frontend/shared/workforce/**"
      - "services/dsh/frontend/control-panel/hr/**"
      - "services/dsh/frontend/control-panel/shared/ProviderActivationWorkspace.tsx"
      - "services/dsh/frontend/app-field/account/**"
      - "apps/app-field/runtime/src/App.tsx"
      - "apps/app-captain/runtime/src/App.tsx"
      - "tools/guards/jrn-003-slice-closure-gate.mjs"
      - ".github/workflows/jrn-003-workforce-closure.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-003-${{ github.sha }}
  cancel-in-progress: false

jobs:
  announce:
    name: Announce JRN-003 verification
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -n --arg state pending --arg context journeys/jrn-003/all-slices --arg description "JRN-003 eleven-slice verification is running" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json

  static_guard:
    name: Eleven-slice contract guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - run: node tools/guards/jrn-003-slice-closure-gate.mjs

  database:
    name: PostgreSQL workforce scope schema
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jrn003
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jrn003"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGDATABASE: jrn003
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Apply prerequisite and JRN-003 migrations
        run: |
          psql -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-001_store_discovery.sql
          psql -v ON_ERROR_STOP=1 -c "CREATE TABLE dsh_partners (id text PRIMARY KEY);"
          psql -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-026_media_refs.sql
          psql -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-001b_store_governance.sql
          psql -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-048_workforce_actor_area_scopes.sql
      - name: Verify provider media and actor scopes
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO dsh_stores
            (id, slug, display_name, status, city_code, service_area_code, serviceability_status)
          VALUES
            ('store-1','store-1','Store 1','active','SAH','area-1','serviceable'),
            ('store-2','store-2','Store 2','active','SAH','area-1','serviceable');

          INSERT INTO dsh_media_refs
            (storage_key, owner_actor_id, owner_actor_role, purpose, content_type, original_filename)
          VALUES ('employee/object-1','employee-1','employee','employee_document','application/pdf','contract.pdf');

          INSERT INTO dsh_store_actor_scopes
            (actor_id, actor_role, store_id, scope_type, active)
          VALUES ('field-1','field','store-1','assigned',true);

          INSERT INTO dsh_actor_service_area_scopes
            (actor_id, actor_role, service_area_code, active, assigned_by)
          VALUES ('field-1','field','area-1',true,'operator-1');

          INSERT INTO dsh_workforce_scope_audit
            (actor_id, actor_role, changed_by, store_ids, service_areas, correlation_id)
          VALUES ('field-1','field','operator-1','["store-1"]','["area-1"]','jrn-003-db-check');

          DO $$
          BEGIN
            IF (SELECT count(*) FROM dsh_media_refs WHERE owner_actor_role = 'employee' AND partner_id IS NULL) <> 1 THEN
              RAISE EXCEPTION 'employee media ownership check failed';
            END IF;
            IF (SELECT count(*) FROM dsh_store_actor_scopes WHERE actor_id = 'field-1' AND active) <> 1 THEN
              RAISE EXCEPTION 'store scope check failed';
            END IF;
            IF (SELECT count(*) FROM dsh_actor_service_area_scopes WHERE actor_id = 'field-1' AND active) <> 1 THEN
              RAISE EXCEPTION 'service area scope check failed';
            END IF;
            IF (SELECT count(*) FROM dsh_workforce_scope_audit WHERE correlation_id = 'jrn-003-db-check') <> 1 THEN
              RAISE EXCEPTION 'scope audit check failed';
            END IF;
          END $$;
          SQL

  backend:
    name: Identity, Workforce and DSH behavior
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: core/identity/backend/go.mod
          cache-dependency-path: |
            core/identity/backend/go.sum
            core/workforce/backend/go.sum
            services/dsh/backend/go.sum
      - name: Verify Identity
        run: cd core/identity/backend && go test ./internal/http ./internal/identity -count=1
      - name: Verify Workforce
        run: cd core/workforce/backend && go test ./internal/http ./internal/workforce -count=1
      - name: Verify DSH workforce scopes and media
        run: cd services/dsh/backend && go test ./internal/http -count=1

  surfaces:
    name: Control panel and provider apps
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Install workspace
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile --reporter=silent
      - name: Typecheck control panel
        run: pnpm --dir apps/control-panel/runtime typecheck
      - name: Typecheck app-field
        run: pnpm --dir apps/app-field/runtime typecheck
      - name: Typecheck app-captain
        run: pnpm --dir apps/app-captain/runtime typecheck

  result:
    name: Publish JRN-003 all-slices result
    if: always()
    needs: [static_guard, database, backend, surfaces]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish same-commit result
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          GUARD_RESULT: ${{ needs.static_guard.result }}
          DATABASE_RESULT: ${{ needs.database.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          SURFACES_RESULT: ${{ needs.surfaces.result }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          STATE=success
          if [ "$GUARD_RESULT" != success ] || [ "$DATABASE_RESULT" != success ] || [ "$BACKEND_RESULT" != success ] || [ "$SURFACES_RESULT" != success ]; then
            STATE=failure
          fi
          DESCRIPTION="guard=$GUARD_RESULT db=$DATABASE_RESULT backend=$BACKEND_RESULT surfaces=$SURFACES_RESULT"
          jq -n --arg state "$STATE" --arg context journeys/jrn-003/all-slices --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
          [ "$STATE" = success ]
