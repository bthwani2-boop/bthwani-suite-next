name: Temporary JRN-001 PartnerHub patch

on:
  push:
    branches: [sambassam]
    paths:
      - .github/workflows/tmp-jrn-001-partnerhub-patch.yml

permissions:
  contents: write
  statuses: write

concurrency:
  group: tmp-jrn-001-partnerhub-patch
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: sambassam
          fetch-depth: 0
      - name: Patch PartnerHub and clean temporary workflows
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          partner_hub = Path('services/dsh/frontend/app-partner/account/PartnerHubScreen.tsx')
          source = partner_hub.read_text(encoding='utf-8')
          old = '\n'.join([
              '  if (selfStatusState.kind !== "success") {',
              '    return (',
              '      <StateView',
              '        tone="danger"',
              '        title="حالة شريك غير قابلة للعرض"',
              '        description="لم يعد DSH حالة نجاح أو خطأ صريحة."',
              '      />',
              '    );',
              '  }',
          ])
          new = '\n'.join([
              '  if (selfStatusState.kind === "not_found") {',
              '    return (',
              '      <StateView',
              '        tone="warning"',
              '        title="ملف الشريك غير موجود"',
              '        description="الجلسة الحالية غير مرتبطة بملف شريك صالح في DSH."',
              '        actionLabel="إعادة التحقق"',
              '        onActionPress={reloadSelfStatus}',
              '      />',
              '    );',
              '  }',
              '',
              '  if (selfStatusState.kind === "forbidden") {',
              '    return (',
              '      <StateView',
              '        tone="danger"',
              '        title="غير مصرح بعرض ملف الشريك"',
              '        description="تحقق من هوية الشريك ونطاق المتجر المرتبط بهذه الجلسة."',
              '        actionLabel="إعادة التحقق"',
              '        onActionPress={reloadSelfStatus}',
              '      />',
              '    );',
              '  }',
              '',
              '  if (selfStatusState.kind !== "success") {',
              '    return (',
              '      <StateView',
              '        tone="danger"',
              '        title="حالة شريك غير قابلة للعرض"',
              '        description="لم يعد DSH حالة صريحة قابلة للعرض."',
              '        actionLabel="إعادة التحقق"',
              '        onActionPress={reloadSelfStatus}',
              '      />',
              '    );',
              '  }',
          ])
          if old not in source:
              if 'selfStatusState.kind === "not_found"' not in source or 'selfStatusState.kind === "forbidden"' not in source:
                  raise SystemExit('PartnerHub status boundary not found')
          else:
              partner_hub.write_text(source.replace(old, new, 1), encoding='utf-8')

          manifest_path = Path('services/dsh/contracts/jrn-001-cleanup-manifest.json')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          for workflow in [
              '.github/workflows/jrn-001-fs-11-partner-hub-repair.yml',
              '.github/workflows/tmp-jrn-001-partnerhub-patch.yml',
          ]:
              if workflow not in manifest['removedTransientFiles']:
                  manifest['removedTransientFiles'].append(workflow)
              Path(workflow).unlink(missing_ok=True)
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A services/dsh/frontend/app-partner/account/PartnerHubScreen.tsx services/dsh/contracts/jrn-001-cleanup-manifest.json .github/workflows/jrn-001-fs-11-partner-hub-repair.yml .github/workflows/tmp-jrn-001-partnerhub-patch.yml
          git commit -m 'fix(jrn-001-fs-11): expose partner status recovery and clean repairs'
          for attempt in 1 2 3 4 5; do
            git fetch origin sambassam
            if git rebase origin/sambassam && git push origin HEAD:sambassam; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            sleep 2
          done
          exit 1
      - name: Publish patch status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          [ "$RESULT" = success ] && STATE=success || STATE=failure
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-11-partnerhub-patch' --arg description "PartnerHub patch: $RESULT" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
