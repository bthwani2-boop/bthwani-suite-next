name: JRN-024 Contract Finalizer

on:
  pull_request:
    branches: [master]
    paths:
      - "tools/scripts/sync-jrn-024-contract.mjs"
      - ".github/workflows/jrn-024-contract-finalizer.yml"
      - "governance/evidence/JRN-024_CONTRACT_SYNC_TRIGGER.md"

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'sambassam'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: sambassam
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate and publish JRN-024 contracts from latest head
        id: finalize
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee jrn-024-contract-finalizer.log) 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin sambassam
            git reset --hard origin/sambassam
            node tools/scripts/sync-jrn-024-contract.mjs
            pnpm --dir services/dsh openapi:compose

            node <<'NODE'
          const fs = require('node:fs');
          const file = 'services/dsh/contracts/generated/dsh.bundle.openapi.yaml';
          const lines = fs.readFileSync(file, 'utf8').split(/\r?\n/);
          const invalid = [];
          for (let i = 0; i < lines.length; i += 1) {
            const match = lines[i].match(/^(\s*)schema:\s*(null)?\s*$/);
            if (!match) continue;
            if (match[2] === 'null') {
              invalid.push(i);
              continue;
            }
            let next = i + 1;
            while (next < lines.length && (!lines[next].trim() || lines[next].trim().startsWith('#'))) next += 1;
            const nextIndent = next < lines.length ? lines[next].match(/^\s*/)[0].length : -1;
            if (nextIndent <= match[1].length) invalid.push(i);
          }
          if (invalid.length) {
            for (const index of invalid) {
              console.error(`Invalid null schema near generated line ${index + 1}:`);
              console.error(lines.slice(Math.max(0, index - 8), index + 9).join('\n'));
            }
            process.exit(1);
          }
          console.log('Generated request-body schema null scan: PASS');
          NODE

            pnpm --dir services/dsh exec openapi-typescript contracts/generated/dsh.bundle.openapi.yaml -o clients/generated/dsh-api.ts

            grep -Fq 'required: [startLocation]' services/dsh/contracts/components/schemas/field.schemas.yaml
            grep -Fq 'required: [completionLocation]' services/dsh/contracts/paths/field.paths.yaml
            grep -Fq 'startLocation:' services/dsh/contracts/generated/dsh.bundle.openapi.yaml
            grep -Fq 'completionLocation:' services/dsh/contracts/generated/dsh.bundle.openapi.yaml
            grep -Fq 'startLocation:' services/dsh/clients/generated/dsh-api.ts
            grep -Fq 'completionLocation:' services/dsh/clients/generated/dsh-api.ts

            if git diff --quiet -- services/dsh/contracts/components/schemas/field.schemas.yaml services/dsh/contracts/paths/field.paths.yaml services/dsh/contracts/generated/dsh.bundle.openapi.yaml services/dsh/clients/generated/dsh-api.ts; then
              echo "JRN-024 contracts already synchronized."
              exit 0
            fi

            git add services/dsh/contracts/components/schemas/field.schemas.yaml \
                    services/dsh/contracts/paths/field.paths.yaml \
                    services/dsh/clients/generated/dsh-api.ts
            git add -f services/dsh/contracts/generated/dsh.bundle.openapi.yaml
            git commit -m "fix(jrn-024): synchronize GPS visit contracts"
            if git push origin HEAD:sambassam; then
              exit 0
            fi
          done

          echo "Unable to publish JRN-024 contracts after five latest-head retries." >&2
          exit 1

      - name: Upload finalizer diagnostics
        if: failure() && steps.finalize.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: jrn-024-contract-finalizer-diagnostics
          path: jrn-024-contract-finalizer.log
          if-no-files-found: error
          retention-days: 3
