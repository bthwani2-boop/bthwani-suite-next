name: JRN-001 FS-12 Cross-Surface Consistency

on:
  push:
    branches: [sambassam]
    paths:
      - core/identity/clients/use-identity-session.ts
      - core/identity/clients/use-identity-session.d.ts
      - services/dsh/contracts/jrn-001-consistency-registry.json
      - services/dsh/frontend/shared/field-onboarding/**
      - services/dsh/frontend/shared/partner/**
      - services/dsh/frontend/app-field/components/DshFieldActivationCard.tsx
      - services/dsh/frontend/app-field/components/DshFieldSurface.tsx
      - services/dsh/frontend/app-field/components/DshFieldRouteRenderer.tsx
      - services/dsh/frontend/app-field/onboarding/**
      - services/dsh/frontend/app-partner/dsh-partner-binding.contracts.ts
      - services/dsh/frontend/app-partner/account/PartnerOnboardingStatusView.tsx
      - services/dsh/frontend/app-partner/team/PartnerTeamManagementScreen.tsx
      - services/dsh/frontend/control-panel/partners/**
      - apps/control-panel/runtime/src/app/dsh/partners/**
      - apps/control-panel/runtime/tsconfig.jrn-001.json
      - services/dsh/tests/tsconfig.jrn-001-*.json
      - tools/guards/partner/jrn-001-cross-surface-truth-gate.mjs
      - .github/workflows/jrn-001-fs-12-consistency.yml

permissions:
  contents: read
  statuses: write

jobs:
  truth_guard:
    name: Committed readback and local-truth guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - run: node tools/guards/partner/jrn-001-cross-surface-truth-gate.mjs

  app_field:
    name: Typecheck app-field JRN-001 consumer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile --reporter=silent
      - name: Typecheck and publish app-field result
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          pnpm --dir apps/app-field/runtime typecheck 2>&1 | tee /tmp/app-field-typecheck.log
          EXIT_CODE=${PIPESTATUS[0]}
          RAW="$(grep -m1 -E 'error TS[0-9]+:' /tmp/app-field-typecheck.log || true)"
          DETAIL="$(printf '%s' "${RAW:-typecheck-failed}" | sed -E 's#^.*/([^/]+)\(([0-9]+),([0-9]+)\): error (TS[0-9]+): (.*)$#\1-\2-\3-\4-\5#' | tr -cs '[:alnum:]' '-' | sed -E 's/^-+|-+$//g' | cut -c1-64)"
          STATE=success
          CONTEXT='journeys/jrn-001/fs-12/app-field'
          DESCRIPTION='app-field typecheck passed'
          if [ "$EXIT_CODE" -ne 0 ]; then
            STATE=failure
            CONTEXT="journeys/jrn-001/fs-12/app-field/$DETAIL"
            DESCRIPTION="app-field: ${RAW:-typecheck failed}"
          fi
          CONTEXT="$(printf '%s' "$CONTEXT" | cut -c1-100)"
          DESCRIPTION="$(printf '%s' "$DESCRIPTION" | cut -c1-140)"
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
          exit "$EXIT_CODE"

  app_partner:
    name: Typecheck app-partner JRN-001 consumer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile --reporter=silent
      - name: Typecheck and publish app-partner result
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          pnpm --dir apps/app-partner/runtime exec tsc --noEmit -p ../../../services/dsh/tests/tsconfig.jrn-001-app-partner.json 2>&1 | tee /tmp/app-partner-typecheck.log
          EXIT_CODE=${PIPESTATUS[0]}
          RAW="$(grep -m1 -E 'error TS[0-9]+:' /tmp/app-partner-typecheck.log || true)"
          DETAIL="$(printf '%s' "${RAW:-typecheck-failed}" | sed -E 's#^.*/([^/]+)\(([0-9]+),([0-9]+)\): error (TS[0-9]+): (.*)$#\1-\2-\3-\4-\5#' | tr -cs '[:alnum:]' '-' | sed -E 's/^-+|-+$//g' | cut -c1-62)"
          STATE=success
          CONTEXT='journeys/jrn-001/fs-12/app-partner'
          DESCRIPTION='app-partner JRN-001 typecheck passed'
          if [ "$EXIT_CODE" -ne 0 ]; then
            STATE=failure
            CONTEXT="journeys/jrn-001/fs-12/app-partner/$DETAIL"
            DESCRIPTION="app-partner: ${RAW:-typecheck failed}"
          fi
          CONTEXT="$(printf '%s' "$CONTEXT" | cut -c1-100)"
          DESCRIPTION="$(printf '%s' "$DESCRIPTION" | cut -c1-140)"
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
          exit "$EXIT_CODE"

  control_panel:
    name: Typecheck control-panel JRN-001 consumer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile --reporter=silent
      - name: Typecheck and publish control-panel result
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          pnpm --dir apps/control-panel/runtime exec tsc --noEmit -p tsconfig.jrn-001.json 2>&1 | tee /tmp/control-panel-typecheck.log
          EXIT_CODE=${PIPESTATUS[0]}
          RAW="$(grep -m1 -E 'error TS[0-9]+:' /tmp/control-panel-typecheck.log || true)"
          DETAIL="$(printf '%s' "${RAW:-typecheck-failed}" | sed -E 's#^.*/([^/]+)\(([0-9]+),([0-9]+)\): error (TS[0-9]+): (.*)$#\1-\2-\3-\4-\5#' | tr -cs '[:alnum:]' '-' | sed -E 's/^-+|-+$//g' | cut -c1-60)"
          STATE=success
          CONTEXT='journeys/jrn-001/fs-12/control-panel'
          DESCRIPTION='control-panel JRN-001 typecheck passed'
          if [ "$EXIT_CODE" -ne 0 ]; then
            STATE=failure
            CONTEXT="journeys/jrn-001/fs-12/control-panel/$DETAIL"
            DESCRIPTION="control-panel: ${RAW:-typecheck failed}"
          fi
          CONTEXT="$(printf '%s' "$CONTEXT" | cut -c1-100)"
          DESCRIPTION="$(printf '%s' "$DESCRIPTION" | cut -c1-140)"
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
          exit "$EXIT_CODE"

  result:
    name: Publish FS-12 result
    if: always()
    needs: [truth_guard, app_field, app_partner, control_panel]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish FS-12 status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          GUARD_RESULT: ${{ needs.truth_guard.result }}
          APP_FIELD_RESULT: ${{ needs.app_field.result }}
          APP_PARTNER_RESULT: ${{ needs.app_partner.result }}
          CONTROL_PANEL_RESULT: ${{ needs.control_panel.result }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=success
          if [ "$GUARD_RESULT" != success ] || [ "$APP_FIELD_RESULT" != success ] || [ "$APP_PARTNER_RESULT" != success ] || [ "$CONTROL_PANEL_RESULT" != success ]; then
            STATE=failure
          fi
          DESCRIPTION="guard=$GUARD_RESULT field=$APP_FIELD_RESULT partner=$APP_PARTNER_RESULT control=$CONTROL_PANEL_RESULT"
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-12-cross-surface-truth' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
          [ "$STATE" = success ]
