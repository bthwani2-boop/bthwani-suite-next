name: JRN-001 FS-12 Cross-Surface Consistency

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/contracts/jrn-001-consistency-registry.json
      - services/dsh/frontend/shared/field-onboarding/**
      - services/dsh/frontend/shared/partner/**
      - tools/guards/partner/jrn-001-cross-surface-truth-gate.mjs
      - .github/workflows/jrn-001-fs-12-consistency.yml

permissions:
  contents: read
  statuses: write

jobs:
  truth-guard:
    name: Committed readback and local-truth guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - run: node tools/guards/partner/jrn-001-cross-surface-truth-gate.mjs

  app-field:
    name: Typecheck app-field JRN-001 consumer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile --reporter=silent
      - run: pnpm --dir apps/app-field/runtime typecheck

  app-partner:
    name: Typecheck app-partner JRN-001 consumer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile --reporter=silent
      - run: pnpm --dir apps/app-partner/runtime typecheck

  control-panel:
    name: Typecheck control-panel JRN-001 consumer
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile --reporter=silent
      - run: pnpm --dir apps/control-panel/runtime typecheck

  result:
    name: Publish FS-12 result
    if: always()
    needs: [truth-guard, app-field, app-partner, control-panel]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish FS-12 status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          GUARD_RESULT: ${{ needs.truth-guard.result }}
          APP_FIELD_RESULT: ${{ needs.app-field.result }}
          APP_PARTNER_RESULT: ${{ needs.app-partner.result }}
          CONTROL_PANEL_RESULT: ${{ needs.control-panel.result }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=success
          if [ "$GUARD_RESULT" != success ] || [ "$APP_FIELD_RESULT" != success ] || [ "$APP_PARTNER_RESULT" != success ] || [ "$CONTROL_PANEL_RESULT" != success ]; then
            STATE=failure
          fi
          DESCRIPTION="guard=$GUARD_RESULT field=$APP_FIELD_RESULT partner=$APP_PARTNER_RESULT control=$CONTROL_PANEL_RESULT"
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-12-cross-surface-truth' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
          [ "$STATE" = success ]
