name: Repository Static Truth

on:
  push:
    branches:
      - lian
      - "fix/lian-sovereign-final-closure"
    paths:
      - "services/**"
      - "core/**"
      - "apps/**"
      - "shared/**"
      - "tools/**"
      - "governance/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
      - ".github/workflows/repository-static-truth.yml"
  pull_request:
    branches:
      - master
      - lian
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: repository-static-truth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-service:
    name: Source truth — ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: DSH
            directory: services/dsh/backend
            go_mod: services/dsh/backend/go.mod
            go_sum: services/dsh/backend/go.sum
          - name: WLT
            directory: services/wlt/backend
            go_mod: services/wlt/backend/go.mod
            go_sum: services/wlt/backend/go.sum
          - name: Identity
            directory: core/identity/backend
            go_mod: core/identity/backend/go.mod
            go_sum: core/identity/backend/go.sum
          - name: Workforce
            directory: core/workforce/backend
            go_mod: core/workforce/backend/go.mod
            go_sum: core/workforce/backend/go.sum
          - name: Platform-Control
            directory: core/platform-control/backend
            go_mod: core/platform-control/backend/go.mod
            go_sum: core/platform-control/backend/go.sum
          - name: Providers
            directory: core/providers/backend
            go_mod: core/providers/backend/go.mod
            go_sum: core/providers/backend/go.sum
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: ${{ matrix.go_mod }}
          cache: true
          cache-dependency-path: ${{ matrix.go_sum }}

      - name: Run governed Go phases
        id: source
        continue-on-error: true
        working-directory: ${{ matrix.directory }}
        shell: bash
        run: |
          set +e
          phase=gofmt
          detail="$(gofmt -l .)"
          if [ -n "$detail" ]; then
            printf 'phase=%s\ndetail=%s\n' "$phase" "$(printf '%s' "$detail" | head -n1)" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          for phase in vet test race build; do
            case "$phase" in
              vet) command=(go vet ./...) ;;
              test) command=(go test ./... -count=1) ;;
              race) command=(go test -race ./... -count=1) ;;
              build) command=(go build ./...) ;;
            esac
            "${command[@]}" >/tmp/go-phase.log 2>&1
            code=$?
            cat /tmp/go-phase.log
            if [ $code -ne 0 ]; then
              detail="$(grep -Eai 'undefined|cannot use|not enough|too many|FAIL|error' /tmp/go-phase.log | head -n1)"
              [ -n "$detail" ] || detail="$(tail -n1 /tmp/go-phase.log)"
              detail="$(printf '%s' "$detail" | tr '\n\r/' '   ' | sed -E 's/[[:space:]]+/ /g' | cut -c1-70)"
              printf 'phase=%s\ndetail=%s\n' "$phase" "$detail" >> "$GITHUB_OUTPUT"
              exit $code
            fi
          done
          printf 'phase=complete\ndetail=PASS\n' >> "$GITHUB_OUTPUT"

      - name: Publish Go source truth
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          SERVICE: ${{ matrix.name }}
          OUTCOME: ${{ steps.source.outcome }}
          PHASE: ${{ steps.source.outputs.phase }}
          DETAIL: ${{ steps.source.outputs.detail }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success
          [ "$OUTCOME" = success ] || state=failure
          detail="${PHASE:-unknown}:${DETAIL:-NO_DETAIL}"
          fixed_context="Repository Static Truth / $SERVICE"
          jq -n --arg state "$state" --arg context "$fixed_context" --arg description "$detail" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/fixed.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/fixed.json
          if [ "$state" = failure ]; then
            diagnostic="Source Error / $SERVICE / $detail"
            diagnostic="$(printf '%s' "$diagnostic" | cut -c1-95)"
            jq -n --arg state failure --arg context "$diagnostic" --arg description "$detail" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/diagnostic.json
            curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/diagnostic.json
          fi

      - name: Enforce Go source truth
        if: steps.source.outcome != 'success'
        shell: bash
        run: exit 1

  workspace:
    name: Source truth — contracts, governance, TypeScript, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Run repository phases
        id: workspace
        continue-on-error: true
        shell: bash
        run: |
          set +e
          phases=(
            governance-schema
            agent-governance
            authority-separation
            saas-governance
            guard-registry
            sdlc
            cleanup-policy
            command-integrity
            markdown-governance
            foundation
            bindings
            generated
            typecheck
            build
            test
          )
          for phase in "${phases[@]}"; do
            case "$phase" in
              governance-schema) command=(pnpm run guard:governance-schema) ;;
              agent-governance) command=(pnpm run guard:agent-governance) ;;
              authority-separation) command=(pnpm run guard:authority-separation) ;;
              saas-governance) command=(pnpm run guard:saas-governance) ;;
              guard-registry) command=(pnpm run guard:guard-registry) ;;
              sdlc) command=(pnpm run guard:sdlc) ;;
              cleanup-policy) command=(pnpm run guard:cleanup-policy) ;;
              command-integrity) command=(pnpm run guard:required-command-integrity) ;;
              markdown-governance) command=(pnpm run guard:markdown-governance) ;;
              foundation) command=(pnpm run foundation:gate) ;;
              bindings) command=(pnpm run guard:api-binding) ;;
              generated)
                command=(bash -o pipefail -c 'pnpm run openapi:generate && node tools/scripts/generate-dsh-catalog-client.mjs --check && git diff --exit-code -- core/identity/clients/generated core/workforce/clients/generated core/platform-control/clients/generated core/providers/clients/generated services/wlt/clients/generated services/dsh/clients/generated')
                ;;
              typecheck) command=(pnpm run typecheck) ;;
              build) command=(pnpm run build) ;;
              test) command=(pnpm run test) ;;
            esac
            "${command[@]}" >/tmp/workspace-phase.log 2>&1
            code=$?
            cat /tmp/workspace-phase.log
            if [ $code -ne 0 ]; then
              detail="$(grep -E '^- ' /tmp/workspace-phase.log | head -n1)"
              if [ -z "$detail" ]; then
                detail="$(grep -Eai 'error|failed|failure|missing|drift|invalid|expected|mismatch|forbidden' /tmp/workspace-phase.log | head -n1)"
              fi
              [ -n "$detail" ] || detail="$(tail -n1 /tmp/workspace-phase.log)"
              detail="$(printf '%s' "$detail" | tr '\n\r/' '   ' | sed -E 's/[[:space:]]+/ /g' | cut -c1-120)"
              printf 'phase=%s\ndetail=%s\n' "$phase" "$detail" >> "$GITHUB_OUTPUT"
              exit $code
            fi
          done
          printf 'phase=complete\ndetail=PASS\n' >> "$GITHUB_OUTPUT"

      - name: Publish workspace source truth
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          OUTCOME: ${{ steps.workspace.outcome }}
          PHASE: ${{ steps.workspace.outputs.phase }}
          DETAIL: ${{ steps.workspace.outputs.detail }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success
          [ "$OUTCOME" = success ] || state=failure
          detail="${PHASE:-unknown}:${DETAIL:-NO_DETAIL}"
          fixed_context="Repository Static Truth / workspace"
          jq -n --arg state "$state" --arg context "$fixed_context" --arg description "$detail" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/fixed.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/fixed.json
          if [ "$state" = failure ]; then
            diagnostic="Source Error / workspace / $detail"
            diagnostic="$(printf '%s' "$diagnostic" | cut -c1-95)"
            jq -n --arg state failure --arg context "$diagnostic" --arg description "$detail" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/diagnostic.json
            curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/diagnostic.json
          fi

      - name: Enforce workspace source truth
        if: steps.workspace.outcome != 'success'
        shell: bash
        run: exit 1
