name: Mobile Preflight

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'manual mobile preflight'

permissions:
  contents: read

jobs:
  mobile-expo-verify:
    name: Mobile Expo verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mobile Expo verify
        run: pnpm run mobile:expo:verify

  mobile-eas-preflight:
    name: Mobile EAS preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: mobile-expo-verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mobile EAS preflight (no store upload)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "WARNING: EXPO_TOKEN secret not set. Skipping EAS preflight."
            echo "Add EXPO_TOKEN to GitHub Secrets to enable full EAS preflight."
            exit 0
          fi
          pnpm run mobile:eas:preflight
