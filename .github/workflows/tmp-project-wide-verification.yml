name: Temporary Project-Wide Verification

on:
  push:
    branches: [sambassam]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temporary-project-wide-${{ github.sha }}
  cancel-in-progress: false

jobs:
  route-closure:
    name: Apply verified route authority closure
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout latest sambassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: true
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Set up Go from DSH module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Apply route authority closure
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              if new in text:
                  return text
              if old not in text:
                  raise SystemExit(f"missing anchor: {label}")
              return text.replace(old, new, 1)

          def remove_section(text, start_marker, end_marker, label):
              start = text.find(start_marker)
              if start < 0:
                  return text
              end = text.find(end_marker, start)
              if end < 0:
                  raise SystemExit(f"missing section end: {label}")
              return text[:start] + text[end:]

          server_path = Path('services/dsh/backend/internal/http/server.go')
          server = server_path.read_text(encoding='utf-8')
          server = remove_section(
              server,
              '\t// Central Catalog compatibility surface.\n',
              '\tregisterUnifiedCatalogRoutes(mux, protected)',
              'legacy catalog compatibility',
          )
          for route in (
              '\tmux.HandleFunc("POST /dsh/operator/incidents", protected.handleCreateIncident)\n',
              '\tmux.HandleFunc("GET /dsh/operator/incidents", protected.handleListIncidents)\n',
              '\tmux.HandleFunc("PATCH /dsh/operator/incidents/{incidentId}", protected.handleUpdateIncident)\n',
          ):
              server = server.replace(route, '')
          server_path.write_text(server, encoding='utf-8')

          incident_routes = Path('services/dsh/backend/internal/http/governed_incident_routes.go')
          if not incident_routes.exists():
              incident_routes.write_text('''package http

import (
\t"database/sql"
\t"net/http"

\t"dsh-api/internal/auth"
\t"dsh-api/internal/media"
\t"dsh-api/internal/wlt"
)

// RegisterGovernedIncidentRoutes makes the JRN-021 incident surface explicit
// in the runtime router and in static route extraction.
func RegisterGovernedIncidentRoutes(
\tmux *http.ServeMux,
\tdb *sql.DB,
\tidentityClient *auth.Client,
\twltClient *wlt.Client,
\tmediaProvider *media.Provider,
) {
\tprotected := newProtectedStoreServer(db, identityClient, wltClient, mediaProvider)
\tmux.HandleFunc("GET /dsh/operator/support/incidents", protected.handleListGovernedIncidents)
\tmux.HandleFunc("POST /dsh/operator/support/incidents", protected.handleCreateGovernedIncident)
\tmux.HandleFunc("GET /dsh/operator/support/incidents/{incidentId}", protected.handleGetGovernedIncident)
\tmux.HandleFunc("PATCH /dsh/operator/support/incidents/{incidentId}", protected.handleUpdateGovernedIncident)
\tmux.HandleFunc("GET /dsh/operator/support/incidents/{incidentId}/events", protected.handleListGovernedIncidentEvents)
}
''', encoding='utf-8')

          main_path = Path('services/dsh/backend/cmd/dsh-api/main.go')
          main = main_path.read_text(encoding='utf-8')
          main = replace_once(
              main,
              '\tdshHttp.RegisterSupportMessageDeliveryRoutes(router, db, identityClient, wltClient, mediaProvider)\n',
              '\tdshHttp.RegisterSupportMessageDeliveryRoutes(router, db, identityClient, wltClient, mediaProvider)\n\tdshHttp.RegisterGovernedIncidentRoutes(router, db, identityClient, wltClient, mediaProvider)\n',
              'incident registration call',
          )
          main = main.replace(
              '''\tgovernedIncidentRouter := dshHttp.GovernedIncidentMiddleware(
\t\tdb,
\t\tidentityClient,
\t\twltClient,
\t\tmediaProvider,
\t\tdeliveryExceptionGovernedRouter,
\t)
\thandler := dshHttp.CorsMiddleware(authMode, governedIncidentRouter)
''',
              '\thandler := dshHttp.CorsMiddleware(authMode, deliveryExceptionGovernedRouter)\n',
          )
          main_path.write_text(main, encoding='utf-8')

          support_path = Path('services/dsh/contracts/paths/support.paths.yaml')
          support = support_path.read_text(encoding='utf-8')
          support = remove_section(
              support,
              '/dsh/operator/incidents:\n',
              '# ── Platform Analytics & Operational Reporting',
              'legacy incident contract',
          )
          support_path.write_text(support, encoding='utf-8')

          root_path = Path('services/dsh/contracts/dsh.openapi.yaml')
          root = root_path.read_text(encoding='utf-8')
          for old_ref in (
              '  /dsh/operator/workforce/media/uploads:\n    $ref: "./paths/workforce.paths.yaml#/~1dsh~1operator~1workforce~1media~1uploads"\n',
              '  /dsh/operator/incidents:\n    $ref: "./paths/support.paths.yaml#/~1dsh~1operator~1incidents"\n',
              '  /dsh/operator/incidents/{incidentId}:\n    $ref: "./paths/support.paths.yaml#/~1dsh~1operator~1incidents~1{incidentId}"\n',
          ):
              root = root.replace(old_ref, '')
          root = root.replace(
              '  /dsh/stores/{storeId}/images/{role}:\n    $ref: "./paths/catalog.paths.yaml#/~1dsh~1stores~1{storeId}~1images~1{role}"\n',
              '  /dsh/operator/catalog/stores/{storeId}/images/{role}:\n    $ref: "./paths/catalog.paths.yaml#/~1dsh~1operator~1catalog~1stores~1{storeId}~1images~1{role}"\n',
          )
          root_path.write_text(root, encoding='utf-8')

          catalog_paths_path = Path('services/dsh/contracts/paths/catalog.paths.yaml')
          catalog_paths = catalog_paths_path.read_text(encoding='utf-8')
          catalog_paths = catalog_paths.replace(
              '/dsh/stores/{storeId}/images/{role}:\n',
              '/dsh/operator/catalog/stores/{storeId}/images/{role}:\n',
              1,
          )
          for path_key in (
              '/dsh/partner/catalog/product-proposals/{proposalId}:\n',
              '/dsh/field/partners/{partnerId}/catalog/product-proposals/{proposalId}:\n',
          ):
              start = catalog_paths.find(path_key)
              if start < 0:
                  continue
              next_path = catalog_paths.find('\n/dsh/', start + len(path_key))
              end = len(catalog_paths) if next_path < 0 else next_path
              method = catalog_paths.find('  put:\n', start, end)
              if method >= 0:
                  catalog_paths = catalog_paths[:method] + '  patch:\n' + catalog_paths[method + len('  put:\n'):]
          catalog_paths_path.write_text(catalog_paths, encoding='utf-8')

          catalog_contract_path = Path('services/dsh/contracts/dsh.catalog.openapi.yaml')
          catalog_contract = catalog_contract_path.read_text(encoding='utf-8')
          catalog_contract = catalog_contract.replace('operationId: updatePartnerProductProposal', 'operationId: updateCatalogPartnerProductProposal', 1)
          catalog_contract = catalog_contract.replace('operationId: updateFieldProductProposal', 'operationId: updateCatalogFieldProductProposal', 1)
          catalog_contract_path.write_text(catalog_contract, encoding='utf-8')

          registry_path = Path('services/dsh/contracts/contract-registry.ts')
          registry = registry_path.read_text(encoding='utf-8')
          if '| "dsh-support-message-delivery"' not in registry:
              registry = registry.replace('    | "dsh-support-governance"\n', '    | "dsh-support-governance"\n    | "dsh-support-message-delivery"\n', 1)
          if '| "dsh-cod-custody"' not in registry:
              registry = registry.replace('    | "dsh-payout-destinations"\n', '    | "dsh-payout-destinations"\n    | "dsh-cod-custody"\n', 1)
          if 'id: "dsh-cod-custody"' not in registry:
              marker = '  {\n    id: "dsh-marketing-commercial",\n'
              index = registry.find(marker)
              if index < 0:
                  raise SystemExit('missing COD registry insertion point')
              registry = registry[:index] + '''  {
    id: "dsh-cod-custody",
    path: "contracts/dsh.jrn-038-cod-custody.openapi.yaml",
    state: "CONTRACT_ACTIVE",
    runtimeDependency: true,
    clientStrategy: "STANDALONE_MANUAL_TYPED_ADAPTER",
    adapterOwner: "frontend/shared/finance-wlt-link/wlt-cod",
  },
''' + registry[index:]
          if 'id: "dsh-support-message-delivery"' not in registry:
              marker = '  {\n    id: "dsh-notifications-governance",\n'
              index = registry.find(marker)
              if index < 0:
                  raise SystemExit('missing support registry insertion point')
              registry = registry[:index] + '''  {
    id: "dsh-support-message-delivery",
    path: "contracts/dsh.support-message-delivery.openapi.yaml",
    state: "CONTRACT_ACTIVE",
    runtimeDependency: true,
    clientStrategy: "STANDALONE_MANUAL_TYPED_ADAPTER",
    adapterOwner: "frontend/shared/support",
  },
''' + registry[index:]
          registry_path.write_text(registry, encoding='utf-8')

          backend_path = Path('tools/guards/backend-api-binding-gate.mjs')
          backend = backend_path.read_text(encoding='utf-8')
          if 'services/wlt/contracts/wlt.payments.openapi.yaml' not in backend:
              backend = backend.replace(
                  '      "services/wlt/contracts/wlt.promotion-funding.openapi.yaml",\n',
                  '      "services/wlt/contracts/wlt.promotion-funding.openapi.yaml",\n      "services/wlt/contracts/wlt.payments.openapi.yaml",\n',
                  1,
              )
          backend_path.write_text(backend, encoding='utf-8')

          wlt_cod_path = Path('services/wlt/contracts/jrn-038-cod-custody.openapi.yaml')
          wlt_cod = wlt_cod_path.read_text(encoding='utf-8')
          for operation in ('collectCodCustody', 'remitCodCustody'):
              marker = f'      operationId: {operation}\n'
              metadata = marker + '      x-bthwani-mutation-approved: false\n      x-bthwani-default-enabled: false\n'
              if metadata not in wlt_cod:
                  wlt_cod = replace_once(wlt_cod, marker, metadata, operation)
          wlt_cod_path.write_text(wlt_cod, encoding='utf-8')
          PY
      - name: Verify DSH and OpenAPI foundation
        shell: bash
        run: |
          gofmt -w services/dsh/backend/internal/http/server.go services/dsh/backend/internal/http/governed_incident_routes.go services/dsh/backend/cmd/dsh-api/main.go
          (cd services/dsh/backend && go test ./... -count=1 && go build ./...)
          node tools/guards/_openapi-utils.test.mjs
          pnpm run contracts:lint
          git diff --check
      - name: Commit verified closure
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bthwani-governance-bot"
          git config user.email "actions@users.noreply.github.com"
          git add services/dsh/backend/internal/http/server.go \
            services/dsh/backend/internal/http/governed_incident_routes.go \
            services/dsh/backend/cmd/dsh-api/main.go \
            services/dsh/contracts/paths/support.paths.yaml \
            services/dsh/contracts/dsh.openapi.yaml \
            services/dsh/contracts/paths/catalog.paths.yaml \
            services/dsh/contracts/dsh.catalog.openapi.yaml \
            services/dsh/contracts/contract-registry.ts \
            services/wlt/contracts/jrn-038-cod-custody.openapi.yaml \
            tools/guards/backend-api-binding-gate.mjs
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "fix(routes): align runtime and contract authority"
          for attempt in 1 2 3; do
            if git push origin HEAD:sambassam; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git pull --rebase origin sambassam
          done
          exit 1

  governed-node:
    name: Verify governance contracts journeys and frontend
    needs: route-closure
    if: needs.route-closure.outputs.changed == 'false'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify governance foundation
        run: pnpm run guard:foundation
      - name: Verify contracts and bindings
        run: |
          pnpm run contracts:lint
          pnpm run guard:api-binding
          pnpm run guard:backend-api-binding
          pnpm run guard:service-manifest-drift
          pnpm run guard:frontend-feature-binding
      - name: Verify all registered journeys
        run: pnpm run guard:journey:full
      - name: Typecheck all Nx projects
        run: pnpm run nx:typecheck
      - name: Lint all Nx projects
        run: pnpm run nx:lint
      - name: Test all Nx projects
        run: pnpm run nx:test
      - name: Verify immutable diff hygiene
        run: git diff --check

  dsh:
    name: Verify DSH backend
    needs: route-closure
    if: needs.route-closure.outputs.changed == 'false'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Set up Go from DSH module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Test and build DSH
        working-directory: services/dsh/backend
        run: |
          go test ./... -count=1
          go build ./...

  wlt:
    name: Verify WLT backend
    needs: route-closure
    if: needs.route-closure.outputs.changed == 'false'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Set up Go from WLT module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache-dependency-path: services/wlt/backend/go.sum
      - name: Test and build WLT
        working-directory: services/wlt/backend
        run: |
          go test ./... -count=1
          go build ./...

  identity:
    name: Verify Identity backend
    needs: route-closure
    if: needs.route-closure.outputs.changed == 'false'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Set up Go from Identity module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/identity/backend/go.mod
          cache-dependency-path: core/identity/backend/go.sum
      - name: Test and build Identity
        working-directory: core/identity/backend
        run: |
          go test ./... -count=1
          go build ./...

  workforce:
    name: Verify Workforce backend
    needs: route-closure
    if: needs.route-closure.outputs.changed == 'false'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Set up Go from Workforce module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/workforce/backend/go.mod
          cache-dependency-path: core/workforce/backend/go.sum
      - name: Test and build Workforce
        working-directory: core/workforce/backend
        run: |
          go test ./... -count=1
          go build ./...

  providers:
    name: Verify Providers backend
    needs: route-closure
    if: needs.route-closure.outputs.changed == 'false'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Set up Go from Providers module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/providers/backend/go.mod
          cache-dependency-path: core/providers/backend/go.sum
      - name: Test and build Providers
        working-directory: core/providers/backend
        run: |
          go test ./... -count=1
          go build ./...

  platform:
    name: Verify Platform Control backend and migrations
    needs: route-closure
    if: needs.route-closure.outputs.changed == 'false'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platform -d platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://platform:platform@localhost:5432/platform?sslmode=disable
      PGPASSWORD: platform
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Set up Go from Platform Control module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/platform-control/backend/go.mod
          cache-dependency-path: core/platform-control/backend/go.sum
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply platform migrations
        run: |
          for migration in core/platform-control/database/migrations/platform-*.sql; do
            echo "Applying ${migration}"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done
      - name: Test and build Platform Control
        working-directory: core/platform-control/backend
        run: |
          go test ./... -count=1
          go build ./...

  result:
    name: Project-wide verification result
    needs: [route-closure, governed-node, dsh, wlt, identity, workforce, providers, platform]
    if: ${{ always() && needs.route-closure.outputs.changed == 'false' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Enforce every verification result
        env:
          NODE_RESULT: ${{ needs.governed-node.result }}
          DSH_RESULT: ${{ needs.dsh.result }}
          WLT_RESULT: ${{ needs.wlt.result }}
          IDENTITY_RESULT: ${{ needs.identity.result }}
          WORKFORCE_RESULT: ${{ needs.workforce.result }}
          PROVIDERS_RESULT: ${{ needs.providers.result }}
          PLATFORM_RESULT: ${{ needs.platform.result }}
        run: |
          set -euo pipefail
          failed=0
          for entry in \
            "node=${NODE_RESULT}" \
            "dsh=${DSH_RESULT}" \
            "wlt=${WLT_RESULT}" \
            "identity=${IDENTITY_RESULT}" \
            "workforce=${WORKFORCE_RESULT}" \
            "providers=${PROVIDERS_RESULT}" \
            "platform=${PLATFORM_RESULT}"; do
            name="${entry%%=*}"
            result="${entry#*=}"
            if [[ "${result}" != "success" ]]; then
              echo "${name} failed with ${result}"
              failed=1
            fi
          done
          exit "${failed}"
