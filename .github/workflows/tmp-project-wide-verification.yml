name: Temporary Project-Wide Verification

on:
  push:
    branches: [sambassam]
  pull_request:
    branches: [sambassam, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: temporary-project-wide-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  governed-node:
    name: Verify governance contracts journeys and frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify governance foundation
        run: pnpm run guard:foundation
      - name: Verify contracts and bindings
        run: |
          pnpm run contracts:lint
          pnpm run guard:api-binding
          pnpm run guard:backend-api-binding
          pnpm run guard:service-manifest-drift
          pnpm run guard:frontend-feature-binding
      - name: Verify all registered journeys
        run: pnpm run guard:journey:full
      - name: Typecheck all Nx projects
        run: pnpm run nx:typecheck
      - name: Lint all Nx projects
        run: pnpm run nx:lint
      - name: Test all Nx projects
        run: pnpm run nx:test
      - name: Verify immutable diff hygiene
        run: git diff --check

  dsh:
    name: Verify DSH backend
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Set up Go from DSH module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Test and build DSH
        working-directory: services/dsh/backend
        run: |
          go test ./... -count=1
          go build ./...

  wlt:
    name: Verify WLT backend
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Set up Go from WLT module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache-dependency-path: services/wlt/backend/go.sum
      - name: Test and build WLT
        working-directory: services/wlt/backend
        run: |
          go test ./... -count=1
          go build ./...

  identity:
    name: Verify Identity backend
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Set up Go from Identity module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/identity/backend/go.mod
          cache-dependency-path: core/identity/backend/go.sum
      - name: Test and build Identity
        working-directory: core/identity/backend
        run: |
          go test ./... -count=1
          go build ./...

  workforce:
    name: Verify Workforce backend
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Set up Go from Workforce module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/workforce/backend/go.mod
          cache-dependency-path: core/workforce/backend/go.sum
      - name: Test and build Workforce
        working-directory: core/workforce/backend
        run: |
          go test ./... -count=1
          go build ./...

  providers:
    name: Verify Providers backend
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Set up Go from Providers module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/providers/backend/go.mod
          cache-dependency-path: core/providers/backend/go.sum
      - name: Test and build Providers
        working-directory: core/providers/backend
        run: |
          go test ./... -count=1
          go build ./...

  platform:
    name: Verify Platform Control backend and migrations
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platform -d platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://platform:platform@localhost:5432/platform?sslmode=disable
      PGPASSWORD: platform
    steps:
      - name: Checkout immutable branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Set up Go from Platform Control module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/platform-control/backend/go.mod
          cache-dependency-path: core/platform-control/backend/go.sum
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply platform migrations
        run: |
          for migration in core/platform-control/database/migrations/platform-*.sql; do
            echo "Applying ${migration}"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done
      - name: Test and build Platform Control
        working-directory: core/platform-control/backend
        run: |
          go test ./... -count=1
          go build ./...

  result:
    name: Project-wide verification result
    needs: [governed-node, dsh, wlt, identity, workforce, providers, platform]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Enforce every verification result
        env:
          NODE_RESULT: ${{ needs.governed-node.result }}
          DSH_RESULT: ${{ needs.dsh.result }}
          WLT_RESULT: ${{ needs.wlt.result }}
          IDENTITY_RESULT: ${{ needs.identity.result }}
          WORKFORCE_RESULT: ${{ needs.workforce.result }}
          PROVIDERS_RESULT: ${{ needs.providers.result }}
          PLATFORM_RESULT: ${{ needs.platform.result }}
        run: |
          set -euo pipefail
          failed=0
          for entry in \
            "node=${NODE_RESULT}" \
            "dsh=${DSH_RESULT}" \
            "wlt=${WLT_RESULT}" \
            "identity=${IDENTITY_RESULT}" \
            "workforce=${WORKFORCE_RESULT}" \
            "providers=${PROVIDERS_RESULT}" \
            "platform=${PLATFORM_RESULT}"; do
            name="${entry%%=*}"
            result="${entry#*=}"
            if [[ "${result}" != "success" ]]; then
              echo "${name} failed with ${result}"
              failed=1
            fi
          done
          exit "${failed}"
