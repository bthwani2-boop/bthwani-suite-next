name: Delivery Exception Slice Three
run-name: Delivery Exception Slice Three · ${{ github.sha }}

on:
  push:
    branches: ["journey/delivery-exception-redelivery-closure"]
    paths:
      - ".github/workflows/delivery-exception-slice3.yml"
      - "tools/scripts/patch-delivery-exception-slice3.py"
      - "tools/scripts/patch-delivery-exception-slice3-types.py"
      - "tools/scripts/patch-delivery-exception-slice3-bindings.py"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: delivery-exception-slice3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  implement-verify-clean:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-workspace

      - name: Apply captain reporting surface
        shell: bash
        run: |
          set -euo pipefail
          python tools/scripts/patch-delivery-exception-slice3.py
          python tools/scripts/patch-delivery-exception-slice3-types.py
          python tools/scripts/patch-delivery-exception-slice3-bindings.py

      - name: Typecheck complete captain journey
        id: captain_typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/delivery-exception-slice3-typecheck
          pnpm exec tsc -p apps/app-captain/runtime/tsconfig.order-journey.json --noEmit --pretty false 2>&1 \
            | tee artifacts/delivery-exception-slice3-typecheck/typecheck.log
          exit ${PIPESTATUS[0]}

      - name: Upload captain typecheck diagnostic
        if: steps.captain_typecheck.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: delivery-exception-slice3-typecheck-${{ github.sha }}
          path: artifacts/delivery-exception-slice3-typecheck/typecheck.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on captain typecheck failure
        if: steps.captain_typecheck.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Prove live categorized exception surface
        shell: bash
        run: |
          set -euo pipefail
          screen="services/dsh/frontend/app-captain/orders/DshCaptainPoDSubmissionScreen.tsx"
          runtime="services/dsh/frontend/shared/delivery/use-captain-order-runtime.ts"
          actions="services/dsh/frontend/shared/delivery/delivery.actions.ts"
          surface="services/dsh/frontend/app-captain/DshCaptainSurface.tsx"
          state_types="services/dsh/frontend/shared/delivery/captain.surface.types.ts"
          grep -F 'fetchCaptainDeliveryException' "$screen"
          grep -F 'DELIVERY_EXCEPTION_REASONS' "$screen"
          grep -F 'const item = await onReportFailure' "$screen"
          grep -F 'readCaptainForegroundLocation' "$runtime"
          grep -F 'draft: CaptainDeliveryExceptionDraft' "$runtime"
          grep -F 'DshDeliveryExceptionReasonCode' services/dsh/frontend/shared/dispatch/dispatch.types.ts
          grep -F "setCaptainPodState('ready')" "$actions"
          grep -F 'onReportPodFailure={(draft) => actions.reportPodFailure(draft)}' "$surface"
          ! grep -F "orderId = 'ORD-9021'" "$screen"
          ! grep -F 'refused proof: rejected proof' "$screen"
          ! grep -F "setCaptainPodState('retry-required')" "$actions"
          ! grep -F "'retry-required'" "$state_types"
          ! grep -Ei '(mock|fixture|demo)[A-Za-z0-9_]*[[:space:]]*=' "$screen"

      - name: Remove temporary files and commit verified slice
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/delivery-exception-slice3.yml \
            tools/scripts/patch-delivery-exception-slice3.py \
            tools/scripts/patch-delivery-exception-slice3-types.py \
            tools/scripts/patch-delivery-exception-slice3-bindings.py
          git add -A
          git commit -m "feat(delivery-exception): add categorized captain reporting surface [skip ci]"
          git pull --rebase origin journey/delivery-exception-redelivery-closure
          git push origin HEAD:journey/delivery-exception-redelivery-closure
          final_sha="$(git rev-parse HEAD)"
          jq -n --arg state success --arg context "Delivery Exception Slice Three" --arg description "fixture-free captain exception form and live DSH status verified" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$final_sha" \
            -d @status.json

      - name: Publish focused failure status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state failure --arg context "Delivery Exception Slice Three" --arg description "captain exception surface slice failed" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/${{ github.sha }}" \
            -d @status.json
