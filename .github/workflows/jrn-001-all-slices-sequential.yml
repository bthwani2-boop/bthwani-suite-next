name: JRN-001 All Slices Sequential Closure

on:
  push:
    branches: [sambassam]
    paths:
      - governance/product/contracts/jrn-001-partner-onboarding-store-publication.product-truth.json
      - governance/evidence/JRN-001_PARTNER_ONBOARDING_EVIDENCE.json
      - governance/evidence/JRN-001_PARTNER_ONBOARDING_STORE_PUBLICATION.md
      - governance/runbooks/JRN-001_PARTNER_ONBOARDING_SUPPORT.md
      - core/identity/backend/**
      - core/identity/clients/**
      - services/dsh/contracts/jrn-001-*.json
      - services/dsh/contracts/dsh.partner-onboarding.openapi.yaml
      - services/dsh/backend/internal/http/partner_lifecycle_routes.go
      - services/dsh/backend/internal/partner/**
      - services/dsh/backend/internal/partnerwltoutbox/**
      - services/dsh/backend/internal/store/**
      - services/dsh/database/migrations/dsh-015_partner_lifecycle.sql
      - services/dsh/database/migrations/dsh-098_partner_onboarding_integrity.sql
      - services/dsh/database/migrations/dsh-099_partner_onboarding_audit_retention.sql
      - services/dsh/frontend/shared/partner/**
      - services/dsh/frontend/shared/field-onboarding/**
      - services/dsh/frontend/shared/store/**
      - services/dsh/frontend/shared/session/**
      - services/dsh/frontend/app-client/home-discovery/**
      - services/dsh/frontend/app-client/store/**
      - services/dsh/frontend/app-field/**
      - services/dsh/frontend/app-partner/**
      - services/dsh/frontend/control-panel/partners/**
      - apps/control-panel/runtime/src/app/dsh/partners/**
      - apps/control-panel/runtime/tsconfig.jrn-001.json
      - shared/ui-kit/src/components/TextField/**
      - services/dsh/tests/jrn-001-*.test.mjs
      - services/dsh/tests/tsconfig.jrn-001-*.json
      - tools/guards/partner/jrn-001-*.mjs
      - tools/guards/partner/partner-surface-truth-gate.mjs
      - tools/guards/wlt-financial-boundary-gate.mjs
      - tools/scripts/run-jrn-001-slices.mjs
      - .github/workflows/jrn-001-all-slices-sequential.yml

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-001-all-slices-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify-sequentially:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: 1.26.5
          cache-dependency-path: |
            services/dsh/backend/go.sum
            core/identity/backend/go.sum
      - name: Install locked workspace
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Verify repository patch hygiene
        run: git diff --check
      - name: Execute FS-01 through FS-18 one by one
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node tools/scripts/run-jrn-001-slices.mjs
