name: JRN-004 Full-Stack Slice Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md"
      - "governance/product-truth/JRN-004_STORE_DISCOVERY_CONTEXT_GOVERNANCE.md"
      - "governance/evidence/JRN-004_*"
      - "governance/runbooks/JRN-004_STORE_OPERATIONS.md"
      - "services/dsh/backend/internal/store/**"
      - "services/dsh/backend/internal/http/protected_store.go"
      - "services/dsh/backend/internal/http/server.go"
      - "services/dsh/backend/internal/http/store_publication_diagnostics.go"
      - "services/dsh/contracts/dsh.openapi.yaml"
      - "services/dsh/contracts/dsh.store-operational-context.overlay.yaml"
      - "services/dsh/contracts/jrn-004-*.json"
      - "services/dsh/database/migrations/dsh-001_store_discovery.sql"
      - "services/dsh/database/migrations/dsh-001b_store_governance.sql"
      - "services/dsh/database/migrations/dsh-002b_storefront_catalog.sql"
      - "services/dsh/database/migrations/dsh-016_field_partner_store_draft.sql"
      - "services/dsh/database/migrations/dsh-098_jrn_004_store_governance_closure.sql"
      - "services/dsh/database/tests/dsh-098_jrn_004_store_governance_closure.sql"
      - "services/dsh/frontend/shared/store/**"
      - "services/dsh/frontend/shared/partner/**"
      - "services/dsh/frontend/app-client/store/**"
      - "services/dsh/frontend/app-partner/store/**"
      - "services/dsh/frontend/app-partner/account/PartnerHubScreen.tsx"
      - "services/dsh/frontend/control-panel/partners/stores/**"
      - "services/dsh/tests/jrn-004-*.test.mjs"
      - "services/dsh/tsconfig.jrn-004.json"
      - ".github/workflows/jrn-004-fullstack-slices.yml"
      - ".github/workflows/jrn-004-store-context-verify.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-004-fullstack-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify JRN-004 functional and FS-01..FS-18 slices
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jrn004
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jrn004"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup Node workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Verify every JRN-004 slice
        id: targeted
        continue-on-error: true
        env:
          PGPASSWORD: postgres
        shell: bash
        run: |
          set +e
          : >/tmp/jrn-004-fullstack-evidence.log

          node --test services/dsh/tests/jrn-004-store-context-governance.test.mjs services/dsh/tests/jrn-004-fullstack-slices.test.mjs 2>&1 | tee -a /tmp/jrn-004-fullstack-evidence.log
          STATIC_EXIT=${PIPESTATUS[0]}

          pnpm --dir services/dsh exec tsc --project tsconfig.jrn-004.json 2>&1 | tee -a /tmp/jrn-004-fullstack-evidence.log
          TS_EXIT=${PIPESTATUS[0]}

          (
            cd services/dsh/backend
            go test ./internal/store ./internal/http -count=1
          ) 2>&1 | tee -a /tmp/jrn-004-fullstack-evidence.log
          GO_EXIT=${PIPESTATUS[0]}

          DB_EXIT=0
          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }
          psql -h localhost -U postgres -d jrn004 -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pgcrypto" 2>&1 | tee -a /tmp/jrn-004-fullstack-evidence.log || DB_EXIT=1
          if [ "$DB_EXIT" -eq 0 ]; then
            for migration in \
              services/dsh/database/migrations/dsh-001_store_discovery.sql \
              services/dsh/database/migrations/dsh-001b_store_governance.sql \
              services/dsh/database/migrations/dsh-002b_storefront_catalog.sql; do
              psql -h localhost -U postgres -d jrn004 -v ON_ERROR_STOP=1 -f "$migration" 2>&1 | tee -a /tmp/jrn-004-fullstack-evidence.log
              if [ "${PIPESTATUS[0]}" -ne 0 ]; then DB_EXIT=1; break; fi
            done
          fi
          if [ "$DB_EXIT" -eq 0 ]; then
            psql -h localhost -U postgres -d jrn004 -v ON_ERROR_STOP=1 -c "ALTER TABLE dsh_stores ADD COLUMN IF NOT EXISTS partner_id text" 2>&1 | tee -a /tmp/jrn-004-fullstack-evidence.log
            if [ "${PIPESTATUS[0]}" -ne 0 ]; then DB_EXIT=1; fi
          fi
          if [ "$DB_EXIT" -eq 0 ]; then
            for migration in \
              services/dsh/database/migrations/dsh-016_field_partner_store_draft.sql \
              services/dsh/database/migrations/dsh-098_jrn_004_store_governance_closure.sql; do
              psql -h localhost -U postgres -d jrn004 -v ON_ERROR_STOP=1 -f "$migration" 2>&1 | tee -a /tmp/jrn-004-fullstack-evidence.log
              if [ "${PIPESTATUS[0]}" -ne 0 ]; then DB_EXIT=1; break; fi
            done
          fi
          if [ "$DB_EXIT" -eq 0 ]; then
            psql -h localhost -U postgres -d jrn004 -v ON_ERROR_STOP=1 -f services/dsh/database/tests/dsh-098_jrn_004_store_governance_closure.sql 2>&1 | tee -a /tmp/jrn-004-fullstack-evidence.log
            if [ "${PIPESTATUS[0]}" -ne 0 ]; then DB_EXIT=1; fi
          fi

          git diff --check 2>&1 | tee -a /tmp/jrn-004-fullstack-evidence.log
          DIFF_EXIT=${PIPESTATUS[0]}

          printf 'static=%s typescript=%s go=%s postgres=%s diff=%s\n' "$STATIC_EXIT" "$TS_EXIT" "$GO_EXIT" "$DB_EXIT" "$DIFF_EXIT" | tee -a /tmp/jrn-004-fullstack-evidence.log
          if [ "$STATIC_EXIT" -ne 0 ] || [ "$TS_EXIT" -ne 0 ] || [ "$GO_EXIT" -ne 0 ] || [ "$DB_EXIT" -ne 0 ] || [ "$DIFF_EXIT" -ne 0 ]; then exit 1; fi

      - name: Upload same-commit evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-004-fullstack-slice-evidence
          path: /tmp/jrn-004-fullstack-evidence.log
          retention-days: 7
          if-no-files-found: error

      - name: Publish same-commit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFY_OUTCOME: ${{ steps.targeted.outcome }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=success
          DESCRIPTION="JRN-004 functional and FS-01..FS-18 checks passed"
          if [ "$VERIFY_OUTCOME" != success ]; then
            STATE=failure
            DESCRIPTION="JRN-004 static, TypeScript, Go, PostgreSQL, or diff check failed"
          fi
          jq -n --arg state "$STATE" --arg context "journeys/jrn-004/fullstack-slices" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/jrn-004-status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/jrn-004-status.json

      - name: Enforce JRN-004 result
        if: always()
        env:
          VERIFY_OUTCOME: ${{ steps.targeted.outcome }}
        run: test "$VERIFY_OUTCOME" = success
