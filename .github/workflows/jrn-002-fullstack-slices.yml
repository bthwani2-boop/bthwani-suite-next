name: JRN-002 Fullstack Slice Closure

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "core/identity/**"
      - "core/workforce/backend/internal/identityclient/**"
      - "services/dsh/frontend/shared/session/**"
      - "services/dsh/frontend/app-client/account/**"
      - "apps/app-client/runtime/src/App.tsx"
      - "apps/app-partner/runtime/src/App.tsx"
      - "apps/app-captain/runtime/src/App.tsx"
      - "apps/app-field/runtime/src/App.tsx"
      - "apps/control-panel/runtime/src/app/api/auth/**"
      - "governance/product-truth/JRN-002_IDENTITY_ACTIVATION_SESSIONS.md"
      - "governance/runbooks/JRN-002_IDENTITY_OPERATIONS.md"
      - "governance/evidence/JRN-002_IDENTITY_ACTIVATION_SESSIONS_CLOSURE.md"
      - "governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md"
      - ".github/workflows/jrn-002-fullstack-slices.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-002-slices-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify JRN-002 FS-01..FS-18
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup pinned Node workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: core/identity/backend/go.mod
          cache-dependency-path: |
            core/identity/backend/go.sum
            core/workforce/backend/go.sum

      - name: Verify all JRN-002 slices
        id: slice_verify
        continue-on-error: true
        shell: bash
        run: |
          set +e
          : >/tmp/jrn-002-slices.log

          git diff --check 2>&1 | tee -a /tmp/jrn-002-slices.log
          HYGIENE=${PIPESTATUS[0]}

          node --test core/identity/tests/jrn-002-*.test.mjs 2>&1 | tee -a /tmp/jrn-002-slices.log
          STATIC=${PIPESTATUS[0]}

          pnpm --dir core/identity typecheck 2>&1 | tee -a /tmp/jrn-002-slices.log
          TYPESCRIPT=${PIPESTATUS[0]}

          (cd core/identity/backend && go test ./... -count=1) 2>&1 | tee -a /tmp/jrn-002-slices.log
          IDENTITY_GO=${PIPESTATUS[0]}

          (cd core/workforce/backend && go test ./internal/identityclient ./internal/http ./internal/workforce -count=1) 2>&1 | tee -a /tmp/jrn-002-slices.log
          WORKFORCE_GO=${PIPESTATUS[0]}

          printf 'hygiene=%s static=%s typescript=%s identity_go=%s workforce_go=%s\n' \
            "$HYGIENE" "$STATIC" "$TYPESCRIPT" "$IDENTITY_GO" "$WORKFORCE_GO" | tee -a /tmp/jrn-002-slices.log

          if [ "$HYGIENE" -ne 0 ] || [ "$STATIC" -ne 0 ] || [ "$TYPESCRIPT" -ne 0 ] || [ "$IDENTITY_GO" -ne 0 ] || [ "$WORKFORCE_GO" -ne 0 ]; then
            exit 1
          fi

      - name: Upload slice evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-002-fullstack-slice-evidence
          path: /tmp/jrn-002-slices.log
          retention-days: 7
          if-no-files-found: error

      - name: Publish same-commit slice status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.slice_verify.outcome }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=success
          DESCRIPTION="JRN-002 FS-01..FS-18 static, TypeScript, and Go verification passed"
          if [ "$OUTCOME" != success ]; then
            STATE=failure
            DESCRIPTION="JRN-002 FS-01..FS-18 verification failed"
          fi
          jq -n --arg state "$STATE" --arg context "journeys/jrn-002/fullstack-slices" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/jrn-002-slices-status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/jrn-002-slices-status.json

      - name: Enforce slice result
        if: always()
        env:
          OUTCOME: ${{ steps.slice_verify.outcome }}
        run: test "$OUTCOME" = success
