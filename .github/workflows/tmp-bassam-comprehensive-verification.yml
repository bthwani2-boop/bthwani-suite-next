# Verification pass 6: PR-visible comprehensive verification
name: Temporary bassam comprehensive verification

on:
  push:
    branches:
      - integration/bassam-all-achievements-20260721
    paths:
      - .github/workflows/tmp-bassam-comprehensive-verification.yml
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/tmp-bassam-comprehensive-verification.yml

permissions:
  contents: read

jobs:
  verify-comprehensive-head:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
      - name: Verify Go formatting
        shell: bash
        run: |
          output="$(gofmt -d services/dsh/backend/internal/wlt/client.go services/dsh/backend/internal/wlt/client_test.go services/wlt/backend/internal/cod/cod.go services/wlt/backend/internal/cod/cod_db_test.go)"
          test -z "$output" || { printf '%s\n' "$output"; exit 1; }
      - name: Test DSH WLT boundary
        working-directory: services/dsh/backend
        run: go test ./internal/wlt
      - name: Test WLT COD custody
        working-directory: services/wlt/backend
        run: go test ./internal/cod
      - name: Verify generated WLT client
        run: node --test services/wlt/tests/wlt-api-client.test.mjs
      - name: Verify WLT financial boundary
        run: node tools/guards/wlt-financial-boundary-gate.mjs
      - name: Verify DSH WLT idempotency
        run: node tools/guards/finance/dsh-wlt-mutation-idempotency-gate.mjs
      - name: Verify DSH WLT finance boundary
        run: node tools/scripts/verify-dsh-wlt-finance-boundary.mjs
      - name: Verify contract foundation
        run: node tools/important-scripts/contracts-foundation.mjs
      - name: Verify WLT client generation drift
        run: |
          npx --yes openapi-typescript@7.13.0 services/wlt/contracts/wlt.openapi.yaml -o /tmp/wlt-api.ts
          diff -u services/wlt/clients/generated/wlt-api.ts /tmp/wlt-api.ts
