name: Platform Control Runtime Diagnostics

on:
  pull_request:
    branches:
      - "bassam-platform-verification-base-*"
    paths:
      - "core/platform-control/**"
      - "core/identity/backend/**"
      - "core/providers/backend/**"
      - "services/dsh/backend/**"
      - "services/wlt/backend/**"
      - "infra/docker/**"
      - "tools/scripts/platform-control-runtime.ps1"
      - "tools/scripts/platform-control-runtime/**"
      - ".github/workflows/platform-control-runtime-diagnostics.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run P3 smoke and capture output
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          ./tools/scripts/platform-control-runtime.ps1 -Action smoke *>&1 | Tee-Object /tmp/platform-runtime-smoke.txt
          $status = $LASTEXITCODE
          "smokeExit=$status" | Set-Content /tmp/platform-runtime-status.txt
          exit 0
      - name: Capture compose state and logs
        shell: bash
        run: |
          set +e
          docker compose --env-file infra/docker/env/runtime.env.example \
            -f infra/docker/compose.runtime.yml \
            -f infra/docker/compose.financial-simulators.yml \
            --profile platform --profile providers --profile wlt --profile dsh --profile media --profile financial-simulators \
            ps -a > /tmp/platform-runtime-ps.txt 2>&1
          docker compose --env-file infra/docker/env/runtime.env.example \
            -f infra/docker/compose.runtime.yml \
            -f infra/docker/compose.financial-simulators.yml \
            --profile platform --profile providers --profile wlt --profile dsh --profile media --profile financial-simulators \
            logs --no-color --tail=500 postgres wiremock-financial-provider minio identity-api providers-api wlt-api dsh-api platform-control-api \
            > /tmp/platform-runtime-logs.txt 2>&1
          docker version > /tmp/docker-version.txt 2>&1
          docker compose version > /tmp/docker-compose-version.txt 2>&1
          exit 0
      - name: Upload runtime diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: platform-runtime-deep-diagnostics
          path: /tmp/*.txt
          if-no-files-found: error
          retention-days: 3
      - name: Stop runtime
        if: always()
        shell: pwsh
        run: ./tools/scripts/platform-control-runtime.ps1 -Action down
