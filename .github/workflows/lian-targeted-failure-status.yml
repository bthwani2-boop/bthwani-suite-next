name: Lian Targeted Failure Status

on:
  push:
    branches: [lian]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: lian-targeted-failure-status-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dsh-go:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum
      - id: probe
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set +e
          failures=()
          files="$(gofmt -l .)"; if [ -n "$files" ]; then failures+=("gofmt:${files//$'\n'/|}"); fi
          go vet ./... || failures+=(vet)
          go test ./... -count=1 || failures+=(test)
          go build ./... || failures+=(build)
          joined="$(IFS=,; echo "${failures[*]}")"
          echo "failures=$joined" >> "$GITHUB_OUTPUT"
          [ ${#failures[@]} -eq 0 ]
      - name: Publish DSH Go diagnostic
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURES: ${{ steps.probe.outputs.failures }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success; description='gofmt, vet, test and build passed'
          if [ -n "$FAILURES" ]; then state=failure; description="$FAILURES"; fi
          description="${description:0:140}"
          jq -n --arg state "$state" --arg context 'Lian Target / DSH Go' --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json

  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false, fetch-depth: 0 }
      - uses: ./.github/actions/setup-node-workspace
      - id: probe
        shell: bash
        run: |
          set +e
          failures=()
          probe(){ name="$1"; shift; "$@" >/tmp/"$name".log 2>&1; code=$?; cat /tmp/"$name".log; if [ $code -ne 0 ]; then failures+=("$name"); fi; }
          probe governance pnpm run guard:governance-all
          probe foundation pnpm run foundation:gate
          joined="$(IFS=,; echo "${failures[*]}")"; echo "failures=$joined" >> "$GITHUB_OUTPUT"; [ ${#failures[@]} -eq 0 ]
      - name: Publish governance diagnostic
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURES: ${{ steps.probe.outputs.failures }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          state=success; description='governance and foundation passed'; if [ -n "$FAILURES" ]; then state=failure; description="failed:$FAILURES"; fi
          jq -n --arg state "$state" --arg context 'Lian Target / Governance' --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json

  surfaces:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - uses: ./.github/actions/setup-node-workspace
      - id: probe
        shell: bash
        run: |
          set +e
          failures=()
          probe(){ name="$1"; shift; "$@" >/tmp/"$name".log 2>&1; code=$?; cat /tmp/"$name".log; if [ $code -ne 0 ]; then failures+=("$name"); fi; }
          probe client-commerce node tools/guards/client-commerce/client-commerce-truth-gate.mjs
          probe partner node tools/guards/partner/partner-surface-truth-gate.mjs
          probe maps node tools/guards/maps/map-platform-truth-gate.mjs
          probe policy-ui node tools/guards/platform/operational-policy-ui-truth-gate.mjs
          probe privacy node tools/guards/privacy/client-address-privacy-truth-gate.mjs
          probe privacy-integration node tools/guards/privacy/client-address-privacy-integration-gate.mjs
          probe ui-actions node tools/guards/ui-actions/ui-action-binding-gate.mjs
          probe frontend-binding pnpm run guard:frontend-feature-binding
          probe backend-binding pnpm run guard:backend-api-binding
          probe manifest pnpm run guard:service-manifest-drift
          joined="$(IFS=,; echo "${failures[*]}")"; echo "failures=$joined" >> "$GITHUB_OUTPUT"; [ ${#failures[@]} -eq 0 ]
      - name: Publish surfaces diagnostic
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURES: ${{ steps.probe.outputs.failures }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          state=success; description='all targeted surface guards passed'; if [ -n "$FAILURES" ]; then state=failure; description="failed:$FAILURES"; fi
          description="${description:0:140}"
          jq -n --arg state "$state" --arg context 'Lian Target / Surfaces' --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json

  dsh-database:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: dsh_target, POSTGRES_PASSWORD: dsh_target_password, POSTGRES_DB: dsh_target }
        ports: ["55432:5432"]
        options: >-
          --health-cmd="pg_isready -U dsh_target -d dsh_target" --health-interval=5s --health-timeout=5s --health-retries=20
    env:
      DATABASE_URL: postgres://dsh_target:dsh_target_password@localhost:55432/dsh_target?sslmode=disable
      PGPASSWORD: dsh_target_password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - id: probe
        shell: bash
        run: |
          set +e
          failure=''
          for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name 'dsh-*.sql' | sort); do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" || { failure="apply:$(basename "$file")"; break; }; done
          if [ -z "$failure" ]; then for file in $(find services/dsh/database/tests -maxdepth 1 -type f -name '*.sql' | sort); do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" || { failure="test:$(basename "$file")"; break; }; done; fi
          if [ -z "$failure" ]; then for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name 'dsh-*.sql' | sort); do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" || { failure="replay:$(basename "$file")"; break; }; done; fi
          echo "failure=$failure" >> "$GITHUB_OUTPUT"; [ -z "$failure" ]
      - name: Publish DSH database diagnostic
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURE: ${{ steps.probe.outputs.failure }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          state=success; description='apply,invariants,replay passed'; if [ -n "$FAILURE" ]; then state=failure; description="$FAILURE"; fi
          jq -n --arg state "$state" --arg context 'Lian Target / Database / DSH' --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json

  wlt-database:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: wlt_target, POSTGRES_PASSWORD: wlt_target_password, POSTGRES_DB: wlt_target }
        ports: ["55433:5432"]
        options: >-
          --health-cmd="pg_isready -U wlt_target -d wlt_target" --health-interval=5s --health-timeout=5s --health-retries=20
    env:
      DATABASE_URL: postgres://wlt_target:wlt_target_password@localhost:55433/wlt_target?sslmode=disable
      PGPASSWORD: wlt_target_password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - id: probe
        shell: bash
        run: |
          set +e
          failure=''
          for file in $(find services/wlt/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" || { failure="apply:$(basename "$file")"; break; }; done
          if [ -z "$failure" ] && [ -d services/wlt/database/tests ]; then for file in $(find services/wlt/database/tests -maxdepth 1 -type f -name '*.sql' | sort); do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" || { failure="test:$(basename "$file")"; break; }; done; fi
          if [ -z "$failure" ]; then for file in $(find services/wlt/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" || { failure="replay:$(basename "$file")"; break; }; done; fi
          echo "failure=$failure" >> "$GITHUB_OUTPUT"; [ -z "$failure" ]
      - name: Publish WLT database diagnostic
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURE: ${{ steps.probe.outputs.failure }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          state=success; description='apply,invariants,replay passed'; if [ -n "$FAILURE" ]; then state=failure; description="$FAILURE"; fi
          jq -n --arg state "$state" --arg context 'Lian Target / Database / WLT' --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json

  runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false, fetch-depth: 0 }
      - uses: ./.github/actions/setup-node-workspace
      - id: probe
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          ./tools/scripts/run-lian-full-runtime-closure.ps1
          $code = $LASTEXITCODE
          $failure = "runtime closure failed"
          if (Test-Path artifacts/lian-runtime-closure-evidence.json) {
            try {
              $evidence = Get-Content artifacts/lian-runtime-closure-evidence.json -Raw | ConvertFrom-Json
              if (-not [string]::IsNullOrWhiteSpace($evidence.failure)) { $failure = "$($evidence.failure)" }
            } catch { }
          }
          "failure=$failure" >> $env:GITHUB_OUTPUT
          if ($code -ne 0) { exit $code }
      - name: Publish runtime diagnostic
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURE: ${{ steps.probe.outputs.failure }}
          PROBE_RESULT: ${{ steps.probe.outcome }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          state=success; description='runtime closure passed'; if [ "$PROBE_RESULT" != success ]; then state=failure; description="$FAILURE"; fi
          description="${description//$'\n'/ }"; description="${description:0:140}"
          jq -n --arg state "$state" --arg context 'Lian Target / Runtime' --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json
      - name: Stop runtime
        if: always()
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 -Action down -Profiles identity,workforce,dsh,wlt,financial-simulators,mail,media
          docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml --profile providers --profile platform down --remove-orphans
