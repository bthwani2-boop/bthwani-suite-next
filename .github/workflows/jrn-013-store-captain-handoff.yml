name: JRN-013 Store Captain Handoff
run-name: JRN-013 custody verification · ${{ github.sha }}

on:
  push:
    branches: ["sambassam"]
    paths:
      - ".github/workflows/jrn-013-store-captain-handoff.yml"
      - "services/dsh/backend/internal/dispatch/store_captain_handoff*.go"
      - "services/dsh/backend/internal/http/store_captain_handoff.go"
      - "services/dsh/database/migrations/dsh-095_store_captain_outbound_handoff.sql"
      - "services/dsh/database/migrations/dsh-096_store_captain_handoff_reassignment.sql"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jrn-013-store-captain-handoff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  custody-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsh_jrn_013
          POSTGRES_USER: dsh_jrn_013
          POSTGRES_PASSWORD: dsh_jrn_013
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U dsh_jrn_013 -d dsh_jrn_013"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DSH_DATABASE_URL: postgres://dsh_jrn_013:dsh_jrn_013@localhost:55432/dsh_jrn_013?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Check focused Go formatting
        shell: bash
        run: |
          set -euo pipefail
          files=(
            services/dsh/backend/internal/dispatch/store_captain_handoff.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_idempotency.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_db_test.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_idempotency_db_test.go
            services/dsh/backend/internal/http/store_captain_handoff.go
          )
          test -z "$(gofmt -l "${files[@]}")"

      - name: Compile custody boundaries
        shell: bash
        run: |
          set -euo pipefail
          cd services/dsh/backend
          go test ./internal/dispatch ./internal/http ./cmd/dsh-api -run '^$' -count=1

      - name: Apply DSH migrations from a clean database
        shell: bash
        run: |
          set -euo pipefail
          for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" >/dev/null
          done

      - name: Prove custody replay and reassignment invariants
        shell: bash
        run: |
          set -euo pipefail
          cd services/dsh/backend
          DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" \
            go test ./internal/dispatch \
              -run '^(TestOutboundStoreCaptainHandoffDBIntegration|TestOutboundHandoffReassignmentSupersedesPriorAttemptDBIntegration|TestStoreCaptainHandoffConfirmationReplaysAfterPickupDBIntegration|TestReplacementAssignmentImmediatelySupersedesStoreCaptainHandoffDBIntegration)$' \
              -count=1 -v
