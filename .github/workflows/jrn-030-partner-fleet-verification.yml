# Permanent same-commit gates for JRN-030 partner fleet and captain binding.
name: JRN-030 Partner Fleet Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "services/dsh/backend/internal/partnerfleet/**"
      - "services/dsh/backend/internal/http/partner_fleet*.go"
      - "services/dsh/backend/cmd/jrn030-route-proof/**"
      - "services/dsh/backend/cmd/dsh-api/main.go"
      - "services/dsh/database/migrations/dsh-059_partner_courier_connection_codes.sql"
      - "services/dsh/database/migrations/dsh-089_store_team_actor_scope_uniqueness.sql"
      - "services/dsh/database/migrations/dsh-933_jrn030_partner_fleet_action_audit.sql"
      - "services/dsh/frontend/shared/partner/partner-fleet.api.ts"
      - "services/dsh/frontend/shared/partner/use-partner-fleet-controller.ts"
      - "services/dsh/frontend/app-partner/team/PartnerTeamManagementScreen.tsx"
      - "services/dsh/frontend/app-captain/account/PartnerFleetConnectionCard.tsx"
      - "services/dsh/frontend/control-panel/partners/stores/OperatorPartnerFleetPanel.tsx"
      - "services/dsh/frontend/control-panel/partners/stores/OperatorDeliveryPricingPanel.tsx"
      - "services/dsh/contracts/dsh.partner-fleet.openapi.yaml"
      - "services/dsh/tests/jrn-030-partner-fleet.test.mjs"
      - "services/dsh/tsconfig.jrn-030.json"
      - "governance/product/contracts/JRN-030_PARTNER_FLEET_CONNECTION.product-truth.json"
      - "governance/evidence/JRN-030_TECHNICAL_CLOSURE_2026-07-22.md"
      - ".github/workflows/jrn-030-partner-fleet-verification.yml"

permissions:
  contents: read

concurrency:
  group: jrn-030-${{ github.sha }}
  cancel-in-progress: false

jobs:
  go-proof:
    name: JRN-030 isolated Go proof
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout repository state
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify JRN-030 Go formatting
        working-directory: services/dsh/backend
        run: |
          unformatted="$({ find internal/partnerfleet -type f -name '*.go' -print0 | xargs -0 gofmt -l; gofmt -l internal/http/partner_fleet.go internal/http/partner_fleet_membership_routes.go internal/http/partner_fleet_operator.go cmd/jrn030-route-proof/main.go; })"
          if [[ -n "${unformatted}" ]]; then
            printf 'Unformatted JRN-030 Go files:\n%s\n' "${unformatted}"
            exit 1
          fi
      - name: Compile JRN-030 partner-fleet package
        working-directory: services/dsh/backend
        run: go test ./internal/partnerfleet -run '^$'
      - name: Verify seven production route registrations
        working-directory: services/dsh/backend
        run: go run ./cmd/jrn030-route-proof
      - name: Build DSH API production binary
        working-directory: services/dsh/backend
        run: go build -o /tmp/dsh-api ./cmd/dsh-api

  verify:
    name: JRN-030 same-commit full-stack proof
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dsh_jrn_030
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d dsh_jrn_030"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dsh_jrn_030?sslmode=disable
      PORT: "58080"
      DSH_AUTH_MODE: identity
    steps:
      - name: Checkout repository state
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify JRN-030 Go formatting
        working-directory: services/dsh/backend
        run: |
          unformatted="$({ find internal/partnerfleet -type f -name '*.go' -print0 | xargs -0 gofmt -l; gofmt -l internal/http/partner_fleet.go internal/http/partner_fleet_membership_routes.go internal/http/partner_fleet_operator.go cmd/jrn030-route-proof/main.go; })"
          if [[ -n "${unformatted}" ]]; then
            printf 'Unformatted JRN-030 Go files:\n%s\n' "${unformatted}"
            exit 1
          fi
      - name: Compile JRN-030 partner-fleet package
        working-directory: services/dsh/backend
        run: go test ./internal/partnerfleet -run '^$'
      - name: Verify seven production route registrations
        working-directory: services/dsh/backend
        run: go run ./cmd/jrn030-route-proof
      - name: Build DSH API production binary
        working-directory: services/dsh/backend
        run: go build -o /tmp/dsh-api ./cmd/dsh-api
      - name: Parse and verify strict OpenAPI contract
        run: |
          ruby -e 'require "yaml"; document=YAML.load_file(ARGV.fetch(0)); abort "expected OpenAPI 3.1.0" unless document["openapi"]=="3.1.0"; expected=%w[ConnectionCode IssuedConnectionCode CaptainFleetMembership OperatorStoreFleetMember OperatorPartnerFleetSnapshot]; schemas=document.dig("components","schemas")||{}; missing=expected.reject{|name| schemas.key?(name)}; abort "missing schemas: #{missing.join(",")}" unless missing.empty?; abort "operator snapshot must be strict" unless schemas.dig("OperatorPartnerFleetSnapshot","additionalProperties")==false' services/dsh/contracts/dsh.partner-fleet.openapi.yaml
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply all DSH migrations to PostgreSQL 16
        run: |
          for migration in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            echo "Applying ${migration}"
            psql -v ON_ERROR_STOP=1 -h localhost -U postgres -d dsh_jrn_030 -f "${migration}"
          done
      - name: Prove JRN-030 schema invariants
        run: |
          psql -v ON_ERROR_STOP=1 -h localhost -U postgres -d dsh_jrn_030 <<'SQL'
          DO $$
          DECLARE
            matched_indexes integer;
            guard_source text;
          BEGIN
            SELECT COUNT(*) INTO matched_indexes FROM pg_indexes WHERE schemaname='public' AND indexname IN ('uq_dsh_partner_courier_pending_code','uq_dsh_store_team_members_store_identity_actor');
            IF matched_indexes <> 2 THEN RAISE EXCEPTION 'JRN-030 required indexes missing: found % of 2', matched_indexes; END IF;
            SELECT pg_get_functiondef('dsh_guard_team_member_action_audit()'::regprocedure) INTO guard_source;
            IF position('issue_captain_connection_code' in guard_source)=0 OR position('expire_captain_connection_code' in guard_source)=0 THEN RAISE EXCEPTION 'JRN-030 audit guard is not installed'; END IF;
          END
          $$;
          SQL
      - name: Execute JRN-030 PostgreSQL lifecycle proof
        working-directory: services/dsh/backend
        run: go test ./internal/partnerfleet -run '^TestPartnerFleetLifecyclePostgres$' -count=1 -v
      - name: Run DSH API and verify governed route runtime
        working-directory: services/dsh/backend
        run: |
          /tmp/dsh-api > /tmp/dsh-jrn-030.log 2>&1 &
          api_pid=$!
          trap 'kill ${api_pid} || true; cat /tmp/dsh-jrn-030.log' EXIT
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:58080/dsh/health >/dev/null && break
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:58080/dsh/health
          status=$(curl --silent --output /tmp/operator-response.json --write-out '%{http_code}' http://127.0.0.1:58080/dsh/operator/stores/store-1/partner-fleet)
          test "${status}" = "401" || test "${status}" = "503"
          test "${status}" != "404"
          test -s /tmp/operator-response.json
      - name: Verify JRN-030 shared brain and required surfaces
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-030.json --noEmit --pretty false
      - name: Verify JRN-030 full-stack and negative invariants
        run: node --test services/dsh/tests/jrn-030-partner-fleet.test.mjs
      - name: Verify Product Truth schema
        run: node tools/guards/product-truth-gate.mjs
      - name: Build same-commit evidence manifest
        run: |
          mkdir -p /tmp/jrn-030-evidence
          printf '{"journey":"JRN-030","commitSha":"%s","runId":"%s","result":"all-gates-passed"}\n' "${GITHUB_SHA}" "${GITHUB_RUN_ID}" > /tmp/jrn-030-evidence/manifest.json
      - name: Upload same-commit evidence manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jrn-030-evidence-${{ github.sha }}
          path: /tmp/jrn-030-evidence/manifest.json
          if-no-files-found: error
          retention-days: 30
