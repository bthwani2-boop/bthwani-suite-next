name: JRN-001 tenant scope hardening

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/jrn001-tenant-scope-hardening.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: jrn001-tenant-scope-hardening-lianbassam
  cancel-in-progress: false

jobs:
  harden:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout current branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: lianbassam
          fetch-depth: 0

      - name: Publish running status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=pending \
            -f context='bthwani/jrn001-tenant-scope' \
            -f description='Tenant scope hardening is running' \
            -f target_url="${RUN_URL}"

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Apply tenant scope hardening
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement, found {count}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "services/dsh/backend/internal/http/protected_store.go",
              '''func partnerRequestWithActor(r *http.Request, actor store.StoreActor) *http.Request {
          \tctx := context.WithValue(r.Context(), "actor_id", actor.ID)
          \tctx = context.WithValue(ctx, "actor_phone", actor.PhoneE164)
          \tctx = context.WithValue(ctx, "actor_surface", dshActorSurface(actor.Role))
          \treturn r.WithContext(ctx)
          }''',
              '''func partnerRequestWithActor(r *http.Request, actor store.StoreActor) *http.Request {
          \tctx := r.Context()
          \tif strings.TrimSpace(actor.TenantID) != "" {
          \t\tctx = partner.WithTenantContext(ctx, actor.TenantID)
          \t}
          \tctx = context.WithValue(ctx, "actor_id", actor.ID)
          \tctx = context.WithValue(ctx, "actor_phone", actor.PhoneE164)
          \tctx = context.WithValue(ctx, "actor_surface", dshActorSurface(actor.Role))
          \treturn r.WithContext(ctx)
          }''',
          )

          replace_once(
              "services/dsh/backend/internal/http/protected_store.go",
              '''func (s *protectedStoreServer) handleOperatorStores(w http.ResponseWriter, r *http.Request) {
          \t_, ok := s.requirePermission(w, r, "control-panel", PartnersPermissionRead, "operator")
          \tif !ok {
          \t\treturn
          \t}
          \tlistQuery, errMessage := store.ParseListQuery(r.URL.Query())
          \tif errMessage != "" {
          \t\tstore.SendError(w, http.StatusBadRequest, "INVALID_PARAMETER", errMessage)
          \t\treturn
          \t}
          \tresult, err := store.ListAllStores(s.db, listQuery)
          \tif err != nil {
          \t\tstore.SendError(w, http.StatusInternalServerError, "INTERNAL_ERROR", "could not load stores")
          \t\treturn
          \t}
          \tstore.SendJSON(w, http.StatusOK, result)
          }''',
              '''func (s *protectedStoreServer) handleOperatorStores(w http.ResponseWriter, r *http.Request) {
          \tactor, ok := s.requirePermission(w, r, "control-panel", PartnersPermissionRead, "operator")
          \tif !ok {
          \t\treturn
          \t}
          \tif strings.TrimSpace(actor.TenantID) == "" {
          \t\tstore.SendError(w, http.StatusForbidden, "TENANT_CONTEXT_REQUIRED", "trusted tenant context is required")
          \t\treturn
          \t}
          \tlistQuery, errMessage := store.ParseListQuery(r.URL.Query())
          \tif errMessage != "" {
          \t\tstore.SendError(w, http.StatusBadRequest, "INVALID_PARAMETER", errMessage)
          \t\treturn
          \t}
          \tresult, err := store.ListAllStoresForTenant(s.db, actor.TenantID, listQuery)
          \tif err != nil {
          \t\tstore.SendError(w, http.StatusInternalServerError, "INTERNAL_ERROR", "could not load tenant stores")
          \t\treturn
          \t}
          \tstore.SendJSON(w, http.StatusOK, result)
          }''',
          )

          replace_once(
              "services/dsh/backend/internal/http/protected_store.go",
              '''func (s *protectedStoreServer) handleOperatorStoreDetail(w http.ResponseWriter, r *http.Request) {
          \t_, ok := s.requirePermission(w, r, "control-panel", PartnersPermissionRead, "operator")
          \tif !ok {
          \t\treturn
          \t}
          \trow, err := store.GetStoreByIDInternal(r.Context(), s.db, r.PathValue("storeId"))
          \tif err != nil {
          \t\ts.writeStoreError(w, err)
          \t\treturn
          \t}
          \tstore.SendJSON(w, http.StatusOK, map[string]any{"store": store.RowToDetail(*row)})
          }''',
              '''func (s *protectedStoreServer) handleOperatorStoreDetail(w http.ResponseWriter, r *http.Request) {
          \tactor, ok := s.requirePermission(w, r, "control-panel", PartnersPermissionRead, "operator")
          \tif !ok {
          \t\treturn
          \t}
          \tif strings.TrimSpace(actor.TenantID) == "" {
          \t\tstore.SendError(w, http.StatusForbidden, "TENANT_CONTEXT_REQUIRED", "trusted tenant context is required")
          \t\treturn
          \t}
          \trow, err := store.GetStoreByIDInternalForTenant(r.Context(), s.db, actor.TenantID, r.PathValue("storeId"))
          \tif err != nil {
          \t\ts.writeStoreError(w, err)
          \t\treturn
          \t}
          \tstore.SendJSON(w, http.StatusOK, map[string]any{"store": store.RowToDetail(*row)})
          }''',
          )

          replace_once(
              "services/dsh/backend/internal/http/protected_store.go",
              '''func (s *protectedStoreServer) handleStoreAudit(w http.ResponseWriter, r *http.Request) {
          \t_, ok := s.requirePermission(w, r, "control-panel", PartnersPermissionRead, "operator")
          \tif !ok {
          \t\treturn
          \t}
          \tevents, err := store.ListStoreAudit(r.Context(), s.db, r.PathValue("storeId"), 20)
          \tif err != nil {
          \t\tstore.SendError(w, http.StatusInternalServerError, "INTERNAL_ERROR", "could not load store audit")
          \t\treturn
          \t}
          \tstore.SendJSON(w, http.StatusOK, map[string]any{"events": events})
          }''',
              '''func (s *protectedStoreServer) handleStoreAudit(w http.ResponseWriter, r *http.Request) {
          \tactor, ok := s.requirePermission(w, r, "control-panel", PartnersPermissionRead, "operator")
          \tif !ok {
          \t\treturn
          \t}
          \tif strings.TrimSpace(actor.TenantID) == "" {
          \t\tstore.SendError(w, http.StatusForbidden, "TENANT_CONTEXT_REQUIRED", "trusted tenant context is required")
          \t\treturn
          \t}
          \tif _, err := store.GetStoreByIDInternalForTenant(r.Context(), s.db, actor.TenantID, r.PathValue("storeId")); err != nil {
          \t\ts.writeStoreError(w, err)
          \t\treturn
          \t}
          \tevents, err := store.ListStoreAudit(r.Context(), s.db, r.PathValue("storeId"), 20)
          \tif err != nil {
          \t\tstore.SendError(w, http.StatusInternalServerError, "INTERNAL_ERROR", "could not load store audit")
          \t\treturn
          \t}
          \tstore.SendJSON(w, http.StatusOK, map[string]any{"events": events})
          }''',
          )

          replace_once(
              "services/dsh/backend/internal/store/governance.go",
              '''func ResolveActorStore(ctx context.Context, db *sql.DB, actor StoreActor) (*DshStoreRow, StoreScope, error) {
          \tvar scope StoreScope
          \terr := db.QueryRowContext(ctx, `
          \t\tSELECT store_id, scope_type
          \t\tFROM dsh_store_actor_scopes
          \t\tWHERE actor_id = $1 AND actor_role = $2 AND active = true
          \t\tORDER BY created_at ASC
          \t\tLIMIT 1`, actor.ID, actor.Role).Scan(&scope.StoreID, &scope.Type)
          \tif err == sql.ErrNoRows {
          \t\treturn nil, StoreScope{}, ErrScopedStoreNotFound
          \t}
          \tif err != nil {
          \t\treturn nil, StoreScope{}, err
          \t}
          \trow, err := getStoreByIDContext(ctx, db, scope.StoreID)
          \treturn row, scope, err
          }''',
              '''func ResolveActorStore(ctx context.Context, db *sql.DB, actor StoreActor) (*DshStoreRow, StoreScope, error) {
          \tif strings.TrimSpace(actor.TenantID) == "" {
          \t\treturn nil, StoreScope{}, ErrScopedStoreNotFound
          \t}
          \tvar scope StoreScope
          \terr := db.QueryRowContext(ctx, `
          \t\tSELECT store_id, scope_type
          \t\tFROM dsh_store_actor_scopes
          \t\tWHERE actor_id = $1 AND actor_role = $2 AND tenant_id = $3 AND active = true
          \t\tORDER BY created_at ASC
          \t\tLIMIT 1`, actor.ID, actor.Role, actor.TenantID).Scan(&scope.StoreID, &scope.Type)
          \tif err == sql.ErrNoRows {
          \t\treturn nil, StoreScope{}, ErrScopedStoreNotFound
          \t}
          \tif err != nil {
          \t\treturn nil, StoreScope{}, err
          \t}
          \trow, err := GetStoreByIDInternalForTenant(ctx, db, actor.TenantID, scope.StoreID)
          \treturn row, scope, err
          }''',
          )

          replace_once(
              "services/dsh/backend/internal/store/governance.go",
              '''func ResolveActorStoreForID(ctx context.Context, db *sql.DB, actor StoreActor, storeID string) (*DshStoreRow, StoreScope, error) {
          \tif storeID == "" {
          \t\treturn ResolveActorStore(ctx, db, actor)
          \t}
          \tvar scope StoreScope
          \terr := db.QueryRowContext(ctx, `
          \t\tSELECT store_id, scope_type
          \t\tFROM dsh_store_actor_scopes
          \t\tWHERE actor_id = $1 AND actor_role = $2 AND store_id = $3 AND active = true`,
          \t\tactor.ID, actor.Role, storeID).Scan(&scope.StoreID, &scope.Type)
          \tif err == sql.ErrNoRows {
          \t\treturn nil, StoreScope{}, ErrScopedStoreNotFound
          \t}
          \tif err != nil {
          \t\treturn nil, StoreScope{}, err
          \t}
          \trow, err := getStoreByIDContext(ctx, db, scope.StoreID)
          \treturn row, scope, err
          }''',
              '''func ResolveActorStoreForID(ctx context.Context, db *sql.DB, actor StoreActor, storeID string) (*DshStoreRow, StoreScope, error) {
          \tif strings.TrimSpace(actor.TenantID) == "" {
          \t\treturn nil, StoreScope{}, ErrScopedStoreNotFound
          \t}
          \tif storeID == "" {
          \t\treturn ResolveActorStore(ctx, db, actor)
          \t}
          \tvar scope StoreScope
          \terr := db.QueryRowContext(ctx, `
          \t\tSELECT store_id, scope_type
          \t\tFROM dsh_store_actor_scopes
          \t\tWHERE actor_id = $1 AND actor_role = $2 AND store_id = $3 AND tenant_id = $4 AND active = true`,
          \t\tactor.ID, actor.Role, storeID, actor.TenantID).Scan(&scope.StoreID, &scope.Type)
          \tif err == sql.ErrNoRows {
          \t\treturn nil, StoreScope{}, ErrScopedStoreNotFound
          \t}
          \tif err != nil {
          \t\treturn nil, StoreScope{}, err
          \t}
          \trow, err := GetStoreByIDInternalForTenant(ctx, db, actor.TenantID, scope.StoreID)
          \treturn row, scope, err
          }''',
          )

          replace_once(
              "services/dsh/backend/internal/store/governance.go",
              '''func ActorCanAccessStore(ctx context.Context, db queryer, actor StoreActor, storeID string) (bool, error) {
          \tif actor.Role == "operator" {
          \t\treturn true, nil
          \t}
          \tvar exists bool
          \terr := db.QueryRowContext(ctx, `
          \t\tSELECT EXISTS (
          \t\t\tSELECT 1 FROM dsh_store_actor_scopes
          \t\t\tWHERE actor_id = $1 AND actor_role = $2 AND store_id = $3 AND active = true
          \t\t)`, actor.ID, actor.Role, storeID).Scan(&exists)
          \treturn exists, err
          }''',
              '''func ActorCanAccessStore(ctx context.Context, db queryer, actor StoreActor, storeID string) (bool, error) {
          \tif strings.TrimSpace(actor.TenantID) == "" {
          \t\treturn false, nil
          \t}
          \tvar exists bool
          \tif actor.Role == "operator" || strings.HasPrefix(actor.Role, "permission:") {
          \t\terr := db.QueryRowContext(ctx, `
          \t\t\tSELECT EXISTS (
          \t\t\t\tSELECT 1 FROM dsh_stores WHERE id = $1 AND tenant_id = $2
          \t\t\t)`, storeID, actor.TenantID).Scan(&exists)
          \t\treturn exists, err
          \t}
          \terr := db.QueryRowContext(ctx, `
          \t\tSELECT EXISTS (
          \t\t\tSELECT 1 FROM dsh_store_actor_scopes
          \t\t\tWHERE actor_id = $1 AND actor_role = $2 AND store_id = $3 AND tenant_id = $4 AND active = true
          \t\t)`, actor.ID, actor.Role, storeID, actor.TenantID).Scan(&exists)
          \treturn exists, err
          }''',
          )

          replace_once(
              "services/dsh/backend/internal/partner/handler.go",
              '''func HandleListPartnerScopes(db *sql.DB) http.HandlerFunc {
          \treturn func(w http.ResponseWriter, r *http.Request) {
          \t\tstoreID := storeIDFromContext(r)
          \t\tif storeID == "" {
          \t\t\tsendError(w, http.StatusForbidden, "FORBIDDEN", "no store context")
          \t\t\treturn
          \t\t}
          \t\tactorID, _ := actorFromContext(r)
          \t\tvar partnerID sql.NullString
          \t\tif err := db.QueryRow(`SELECT partner_id FROM dsh_stores WHERE id = $1`, storeID).Scan(&partnerID); err != nil {
          \t\t\tsendError(w, http.StatusNotFound, "NOT_FOUND", "store not found")
          \t\t\treturn
          \t\t}
          \t\tif !partnerID.Valid || partnerID.String == "" {
          \t\t\tsendJSON(w, http.StatusOK, map[string]any{"scopes": []OperationalScope{}})
          \t\t\treturn
          \t\t}
          \t\tscopes, err := ListPartnerScopesForActor(db, partnerID.String, actorID)
          \t\tif err != nil {
          \t\t\tsendError(w, http.StatusInternalServerError, "INTERNAL_ERROR", "failed to list partner scopes")
          \t\t\treturn
          \t\t}
          \t\tsendJSON(w, http.StatusOK, map[string]any{"scopes": scopes})
          \t}
          }''',
              '''func HandleListPartnerScopes(db *sql.DB) http.HandlerFunc {
          \treturn func(w http.ResponseWriter, r *http.Request) {
          \t\ttenantID, ok := TenantIDFromContext(r.Context())
          \t\tif !ok {
          \t\t\tsendError(w, http.StatusForbidden, "TENANT_CONTEXT_REQUIRED", "trusted tenant context is required")
          \t\t\treturn
          \t\t}
          \t\tstoreID := storeIDFromContext(r)
          \t\tif storeID == "" {
          \t\t\tsendError(w, http.StatusForbidden, "FORBIDDEN", "no store context")
          \t\t\treturn
          \t\t}
          \t\tactorID, _ := actorFromContext(r)
          \t\tvar partnerID sql.NullString
          \t\tif err := db.QueryRow(`SELECT partner_id FROM dsh_stores WHERE id = $1 AND tenant_id = $2`, storeID, tenantID).Scan(&partnerID); err != nil {
          \t\t\tsendError(w, http.StatusNotFound, "NOT_FOUND", "store not found")
          \t\t\treturn
          \t\t}
          \t\tif !partnerID.Valid || partnerID.String == "" {
          \t\t\tsendJSON(w, http.StatusOK, map[string]any{"scopes": []OperationalScope{}})
          \t\t\treturn
          \t\t}
          \t\tscopes, err := ListPartnerScopesForActorForTenant(db, tenantID, partnerID.String, actorID)
          \t\tif err != nil {
          \t\t\tsendError(w, http.StatusInternalServerError, "INTERNAL_ERROR", "failed to list partner scopes")
          \t\t\treturn
          \t\t}
          \t\tsendJSON(w, http.StatusOK, map[string]any{"scopes": scopes})
          \t}
          }''',
          )
          PY

          gofmt -w \
            services/dsh/backend/internal/http/protected_store.go \
            services/dsh/backend/internal/store/governance.go \
            services/dsh/backend/internal/store/tenant_repository.go \
            services/dsh/backend/internal/partner/handler.go

      - name: Verify tenant scope implementation
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/store ./internal/partner ./internal/http

      - name: Commit hardening
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/jrn001-tenant-scope-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(dsh): close JRN-001 tenant scope paths"
          git pull --rebase origin lianbassam
          git push origin HEAD:lianbassam

      - name: Publish success
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=success \
            -f context='bthwani/jrn001-tenant-scope' \
            -f description='Tenant scope hardening passed and was committed' \
            -f target_url="${RUN_URL}"

      - name: Publish failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=failure \
            -f context='bthwani/jrn001-tenant-scope' \
            -f description='Tenant scope hardening failed' \
            -f target_url="${RUN_URL}"
