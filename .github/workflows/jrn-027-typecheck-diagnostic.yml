name: JRN-027 Frontend Type Diagnostic

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/jrn-027-typecheck-diagnostic.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jrn-027-type-diagnostic-${{ github.sha }}
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sambassam
          fetch-depth: 0
          show-progress: false
      - run: git pull --rebase origin sambassam
      - run: python3 tools/scripts/run-jrn-027-closure.py
      - uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"
      - uses: actions/setup-node@v5
        with:
          node-version: "24.17.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture TypeScript result
        shell: bash
        run: |
          set +e
          pnpm --dir services/dsh typecheck > /tmp/jrn027-typecheck.log 2>&1
          status=$?
          cat /tmp/jrn027-typecheck.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/jrn027-typecheck.log /tmp/jrn027-typecheck.saved.log
            git fetch origin sambassam
            git reset --hard origin/sambassam
            mkdir -p governance/evidence
            cp /tmp/jrn027-typecheck.saved.log governance/evidence/JRN-027_TYPECHECK_FAILURE.log
            git config user.name "bthwani-journey-closure"
            git config user.email "actions@users.noreply.github.com"
            git add governance/evidence/JRN-027_TYPECHECK_FAILURE.log
            git commit -m "chore(jrn-027): persist frontend type diagnostic [skip ci]"
            git push origin HEAD:sambassam
            exit "$status"
          fi
