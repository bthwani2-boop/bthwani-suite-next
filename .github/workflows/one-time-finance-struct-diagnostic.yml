name: One-time finance struct diagnostic

on:
  push:
    branches: [bassam]
    paths:
      - .github/workflows/one-time-finance-struct-diagnostic.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: bassam
          fetch-depth: 0
      - name: Write diagnostic
        shell: bash
        run: |
          report=governance/evidence/FINANCE_STRUCT_DIAGNOSTIC.md
          mkdir -p "$(dirname "$report")"
          {
            echo '# Finance Struct Diagnostic'
            echo
            echo '```text'
            grep -R -n -A20 -B5 'type CreateSubscriptionPaymentSessionInput' services/dsh/backend/internal/wlt || true
            echo
            grep -R -n 'ProductReference\|CommercialProductReference\|WLTProductReference' services/dsh/backend/internal/wlt || true
            echo '```'
          } > "$report"
          rm .github/workflows/one-time-finance-struct-diagnostic.yml
          git config user.name bthwani-finance-diagnostic-bot
          git config user.email finance-diagnostic-bot@users.noreply.github.com
          git add -A
          git commit -m 'chore(finance): publish subscription input diagnostic'
          git fetch origin bassam
          git rebase origin/bassam
          git push origin HEAD:bassam
