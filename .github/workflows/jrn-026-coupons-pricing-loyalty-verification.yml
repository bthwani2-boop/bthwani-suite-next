# Permanent targeted gates for governed coupons, pricing, loyalty, and promotion funding.
name: JRN-026 Coupons Pricing Loyalty Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "services/dsh/backend/internal/coupons/**"
      - "services/dsh/backend/internal/checkout/delivery_pricing*.go"
      - "services/dsh/backend/internal/http/coupons.go"
      - "services/dsh/backend/internal/http/coupon_funding_lifecycle.go"
      - "services/dsh/backend/internal/http/delivery_pricing.go"
      - "services/dsh/backend/internal/http/loyalty_policy.go"
      - "services/dsh/backend/internal/http/journeys_026_030_routes_test.go"
      - "services/dsh/backend/internal/http/jrn_026_routes_test.go"
      - "services/dsh/backend/internal/marketing/loyalty_policy.go"
      - "services/dsh/backend/internal/wlt/**"
      - "services/dsh/backend/internal/promotionfundingoutbox/**"
      - "services/dsh/frontend/shared/marketing/**"
      - "services/dsh/frontend/shared/partner/**delivery-pricing*"
      - "services/dsh/frontend/app-partner/store/**"
      - "services/dsh/frontend/app-client/checkout/**"
      - "services/dsh/frontend/control-panel/marketing/**"
      - "services/dsh/frontend/control-panel/partners/**"
      - "services/wlt/backend/internal/commercial/**"
      - "services/wlt/backend/internal/promotionfunding/**"
      - "services/wlt/backend/internal/shared/**"
      - "services/wlt/database/migrations/wlt-032_promotion_funding_ledger.sql"
      - "services/wlt/database/migrations/wlt-034_jrn_028_promotion_funding_audit_integrity.sql"
      - "services/wlt/database/tests/jrn-028-promotion-funding-integrity.sh"
      - "services/wlt/database/tests/jrn-028-promotion-funding-concurrency.sh"
      - "services/wlt/contracts/wlt.promotion-funding.openapi.yaml"
      - "services/dsh/contracts/**"
      - "services/dsh/tests/jrn-026-*.test.mjs"
      - "services/dsh/tests/jrn-028-promotion-funding.test.mjs"
      - "services/dsh/tsconfig.jrn-026.json"
      - "services/dsh/tsconfig.jrn-028.json"
      - "governance/product/contracts/JRN-026_COUPONS_DELIVERY_PRICING_LOYALTY.product-truth.json"
      - "governance/product/JRN-028_PROMOTION_FUNDING_PRODUCT_TRUTH.md"
      - "governance/evidence/JRN-028_ALL_SLICES_CLOSURE.json"
      - "governance/product/product-truth.schema.json"
      - "tools/guards/product-truth-gate.mjs"
      - "tools/guards/dsh-openapi-modular-gate.mjs"
      - ".github/workflows/jrn-026-coupons-pricing-loyalty-verification.yml"

permissions:
  contents: read

concurrency:
  group: jrn-026-028-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-jrn-026:
    name: JRN-026 targeted full-stack and WLT-boundary verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository state
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Compile governed DSH and WLT owners
        run: |
          (cd services/dsh/backend && go test ./internal/coupons ./internal/checkout ./internal/marketing ./internal/wlt ./internal/wltoutbox -run '^$')
          (cd services/wlt/backend && go test ./internal/commercial -run '^$')
      - name: Verify governed JRN-026 route registration
        working-directory: services/dsh/backend
        run: go test ./internal/http -run '^TestJourney026ExposesGovernedCouponPricingAndLoyaltyRoutes$'
      - name: Verify JRN-026 shared brain and affected surfaces
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-026.json --noEmit --pretty false
      - name: Verify JRN-026 governed bindings and negative invariants
        run: node --test services/dsh/tests/jrn-026-*.test.mjs
      - name: Verify Product Truth and modular OpenAPI
        run: |
          node tools/guards/product-truth-gate.mjs
          node tools/guards/dsh-openapi-modular-gate.mjs
          pnpm --dir services/dsh openapi:generate
          git diff --exit-code -- services/dsh/contracts/generated/dsh.bundle.openapi.yaml services/dsh/clients/generated/dsh-api.ts

  verify-jrn-028:
    name: JRN-028 promotion funding full-stack proof
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wlt_jrn_028
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d wlt_jrn_028"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGUSER: postgres
      PGDATABASE: wlt_jrn_028
    steps:
      - name: Checkout repository state
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Compile and test sovereign WLT promotion funding
        working-directory: services/wlt/backend
        run: |
          go test ./internal/promotionfunding ./internal/shared
          go test ./internal/http -run '^$'
      - name: Compile and test DSH projection, reconciliation, and outbox
        working-directory: services/dsh/backend
        run: |
          go test ./internal/coupons ./internal/wlt ./internal/promotionfundingoutbox
          go test ./internal/http -run '^$'
      - name: Verify JRN-028 all eighteen slice assertions
        run: node --test services/dsh/tests/jrn-028-promotion-funding.test.mjs
      - name: Verify JRN-028 TypeScript surface
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-028.json --noEmit --pretty false
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply WLT promotion funding schema and integrity controls
        run: |
          psql -v ON_ERROR_STOP=1 -f services/wlt/database/migrations/wlt-032_promotion_funding_ledger.sql
          psql -v ON_ERROR_STOP=1 -f services/wlt/database/migrations/wlt-034_jrn_028_promotion_funding_audit_integrity.sql
      - name: Prove governed promotion funding tables exist
        run: |
          psql -v ON_ERROR_STOP=1 -Atc "SELECT to_regclass('public.wlt_promotion_funding_reservations') IS NOT NULL" | grep -qx t
          psql -v ON_ERROR_STOP=1 -Atc "SELECT to_regclass('public.wlt_promotion_funding_events') IS NOT NULL" | grep -qx t
      - name: Verify JRN-028 database lifecycle and negative invariants
        run: bash services/wlt/database/tests/jrn-028-promotion-funding-integrity.sh
      - name: Verify JRN-028 concurrent transition serialization
        run: bash services/wlt/database/tests/jrn-028-promotion-funding-concurrency.sh
      - name: Verify repository whitespace
        run: git diff --check
