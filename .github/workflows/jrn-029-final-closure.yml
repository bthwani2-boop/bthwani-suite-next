# Registered one-shot final proof for the JRN-029 technical closure.
# Trigger revision: execute the registered workflow after branch registration.
name: JRN-029 Final Closure Proof

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/jrn-029-final-closure.yml"

permissions:
  contents: write

concurrency:
  group: jrn-029-final-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  close:
    name: JRN-029 final database API contract and surface proof
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dsh_jrn_029_final
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d dsh_jrn_029_final"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dsh_jrn_029_final?sslmode=disable
      PORT: "58080"
      DSH_AUTH_MODE: identity

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sovereign JRN-029 contract projection
        run: |
          node tools/scripts/finalize-jrn029-openapi.mjs
          pnpm --dir services/dsh openapi:verify
          test ! -e services/dsh/contracts/dsh.jrn-029.openapi.yaml
          for token in getDshOperationalProfile upsertDshOperationalProfile listDshOperationalDeliveryModes upsertDshOperationalDeliveryMode evaluateDshOperationalPolicy listDshOperationalPolicyAudit rollbackDshOperationalPolicy; do
            grep -q "operationId: ${token}" services/dsh/contracts/generated/dsh.bundle.openapi.yaml
          done
          grep -q '/dsh/platform/operational-policy/evaluate' services/dsh/clients/generated/dsh-api.ts

      - name: Verify Go formatting and compile composition
        working-directory: services/dsh/backend
        run: |
          mapfile -d '' go_files < <(find internal/platformpolicies -maxdepth 1 -type f -name 'jrn029*.go' -print0)
          go_files+=(
            internal/http/jrn029_operational_policy.go
            internal/http/jrn029_effects_middleware.go
            internal/http/jrn029_effects_middleware_test.go
            internal/http/jrn_029_operational_policy_routes_test.go
            cmd/dsh-api/main.go
          )
          unformatted="$(gofmt -l "${go_files[@]}")"
          if [[ -n "${unformatted}" ]]; then
            printf 'Unformatted JRN-029 Go files:\n%s\n' "${unformatted}"
            exit 1
          fi
          go test ./internal/platformpolicies ./internal/http ./cmd/dsh-api -run '^$'
          go build -o /tmp/dsh-api ./cmd/dsh-api

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply complete DSH schema
        run: |
          for migration in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            echo "Applying ${migration}"
            psql -v ON_ERROR_STOP=1 -h localhost -U postgres -d dsh_jrn_029_final -f "${migration}"
          done

      - name: Prove database invariants
        run: |
          psql -v ON_ERROR_STOP=1 -h localhost -U postgres -d dsh_jrn_029_final <<'SQL'
          DO $$
          DECLARE required_columns integer; generated_visibility text; required_indexes integer;
          BEGIN
            SELECT COUNT(*) INTO required_columns
              FROM information_schema.columns
             WHERE table_schema='public' AND (
               (table_name='dsh_platform_sla_rules' AND column_name='max_assignment_mins') OR
               (table_name='dsh_platform_capacity_configs' AND column_name IN ('is_paused','pause_reason'))
             );
            IF required_columns <> 3 THEN RAISE EXCEPTION 'JRN-029 columns missing: % of 3', required_columns; END IF;
            IF to_regclass('public.dsh_platform_delivery_mode_policies') IS NULL THEN RAISE EXCEPTION 'delivery-mode table missing'; END IF;
            SELECT is_generated INTO generated_visibility FROM information_schema.columns
             WHERE table_schema='public' AND table_name='dsh_stores' AND column_name='visibility_status';
            IF generated_visibility IS DISTINCT FROM 'ALWAYS' THEN RAISE EXCEPTION 'visibility projection is not generated: %', generated_visibility; END IF;
            SELECT COUNT(*) INTO required_indexes FROM pg_indexes WHERE schemaname='public' AND indexname IN (
              'idx_dsh_platform_delivery_modes_zone_enabled',
              'idx_dsh_platform_policy_events_correlation',
              'idx_dsh_stores_operational_visibility_area'
            );
            IF required_indexes <> 3 THEN RAISE EXCEPTION 'JRN-029 indexes missing: % of 3', required_indexes; END IF;
          END
          $$;
          SQL

      - name: Execute real PostgreSQL lifecycle and route tests
        working-directory: services/dsh/backend
        run: go test ./internal/platformpolicies ./internal/http -run 'TestJRN029' -count=1 -v

      - name: Run DSH API and prove every JRN-029 route is mounted
        working-directory: services/dsh/backend
        run: |
          /tmp/dsh-api > /tmp/dsh-jrn-029-final.log 2>&1 &
          api_pid=$!
          trap 'kill ${api_pid} || true; cat /tmp/dsh-jrn-029-final.log' EXIT
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:58080/dsh/health >/dev/null && break
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:58080/dsh/health
          check_route() {
            method="$1"; path="$2"; body="${3:-}"
            if [[ -n "${body}" ]]; then
              status=$(curl --silent --output /tmp/jrn029-final-route.json --write-out '%{http_code}' -X "${method}" -H 'Content-Type: application/json' --data "${body}" "http://127.0.0.1:58080${path}")
            else
              status=$(curl --silent --output /tmp/jrn029-final-route.json --write-out '%{http_code}' -X "${method}" "http://127.0.0.1:58080${path}")
            fi
            test "${status}" != "000"
            test "${status}" != "404"
          }
          zone_id=00000000-0000-0000-0000-000000000001
          event_id=00000000-0000-0000-0000-000000000002
          check_route GET "/dsh/operator/platform/operational-profiles/${zone_id}"
          check_route GET "/dsh/operator/platform/operational-profiles/${zone_id}/delivery-modes"
          check_route PUT "/dsh/operator/platform/operational-profiles/${zone_id}/delivery-modes/bthwani_delivery" '{}'
          check_route POST "/dsh/platform/operational-policy/evaluate" '{}'
          check_route GET "/dsh/operator/platform/operational-policy/audit"
          check_route POST "/dsh/operator/platform/operational-policy/audit/${event_id}/rollback" '{}'

      - name: Verify shared brain control panel and negative invariants
        run: |
          pnpm --dir services/dsh exec tsc -p tsconfig.jrn-029.json --noEmit --pretty false
          node --test services/dsh/tests/jrn-029-operational-policy.test.mjs

      - name: Validate Product Truth schema and authority separation
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import Ajv from 'ajv';
          const schema = JSON.parse(fs.readFileSync('governance/product/product-truth.schema.json','utf8'));
          const contract = JSON.parse(fs.readFileSync('governance/product/contracts/jrn-029-zones-sla-capacity-delivery-modes.product-truth.json','utf8'));
          const validate = new Ajv({allErrors:true,strict:false}).compile(schema);
          if (!validate(contract)) { console.error(validate.errors); process.exit(1); }
          if (contract.owners.productManagerApproval !== 'PENDING' || contract.owners.productOwnerApproval !== 'PENDING' || contract.owners.productAcceptanceDecision !== 'PENDING') throw new Error('independent authorities cannot be self-approved');
          NODE

      - name: Publish generated contract without accepting untested JRN-029 drift
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tested_sha="${GITHUB_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          jrn_paths=(
            services/dsh/database/migrations/dsh-129_jrn029_operational_policy_closure.sql
            services/dsh/database/migrations/dsh-130_jrn029_store_visibility_projection.sql
            services/dsh/backend/internal/platformpolicies
            services/dsh/backend/internal/http/jrn029_operational_policy.go
            services/dsh/backend/internal/http/jrn029_effects_middleware.go
            services/dsh/backend/internal/http/jrn_029_operational_policy_routes_test.go
            services/dsh/backend/cmd/dsh-api/main.go
            services/dsh/frontend/shared/platform/jrn029-operational-policy.api.ts
            services/dsh/frontend/control-panel/platform/Jrn029OperationalPolicySection.tsx
            services/dsh/frontend/control-panel/platform/PlatformPoliciesScreen.tsx
            services/dsh/tests/jrn-029-operational-policy.test.mjs
            services/dsh/tsconfig.jrn-029.json
            tools/scripts/integrate-jrn029-openapi.mjs
            tools/scripts/finalize-jrn029-openapi.mjs
          )
          for attempt in 1 2 3; do
            git fetch origin sambassam
            if ! git diff --quiet "${tested_sha}..origin/sambassam" -- "${jrn_paths[@]}"; then
              echo "JRN-029 source changed after the tested commit; refusing to publish untested output."
              exit 1
            fi
            git reset --hard origin/sambassam
            pnpm install --frozen-lockfile
            node tools/scripts/finalize-jrn029-openapi.mjs
            pnpm --dir services/dsh openapi:verify
            if git diff --quiet; then
              echo "JRN029_PUBLISHED_SHA=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"
              exit 0
            fi
            git add -A services/dsh/contracts services/dsh/clients/generated/dsh-api.ts
            git commit -m "chore(jrn-029): register sovereign OpenAPI and generated client"
            published_sha=$(git rev-parse HEAD)
            if git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:sambassam; then
              echo "JRN029_PUBLISHED_SHA=${published_sha}" >> "${GITHUB_ENV}"
              exit 0
            fi
          done
          echo "Could not publish generated contract after concurrent updates."
          exit 1

      - name: Build final closure evidence manifest
        run: |
          mkdir -p /tmp/jrn-029-final-evidence
          printf '{"journey":"JRN-029","testedCommitSha":"%s","publishedCommitSha":"%s","runId":"%s","database":"PostgreSQL 16","apiRuntime":"passed","sovereignOpenApi":"passed","generatedClient":"passed","sharedSurfaces":"passed","result":"technical-closure-passed"}\n' "${GITHUB_SHA}" "${JRN029_PUBLISHED_SHA}" "${GITHUB_RUN_ID}" > /tmp/jrn-029-final-evidence/manifest.json

      - name: Upload final closure evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jrn-029-final-evidence-${{ github.sha }}
          path: /tmp/jrn-029-final-evidence/manifest.json
          if-no-files-found: error
          retention-days: 30
