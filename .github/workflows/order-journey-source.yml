name: Order Journey Source
run-name: Order Journey Source · ${{ github.sha }}

on:
  push:
    branches: ["journey/order-lifecycle-multisurface-closure"]
    paths:
      - ".github/order-journey-source-trigger"
      - ".github/workflows/order-journey-source.yml"
      - "apps/**/tsconfig.order-journey.json"
      - "services/dsh/backend/internal/orders/**"
      - "services/dsh/backend/internal/pickup/**"
      - "services/dsh/backend/internal/partnerdelivery/**"
      - "services/dsh/backend/internal/http/**order*"
      - "services/dsh/backend/internal/http/**pickup*"
      - "services/dsh/backend/internal/wlt/**"
      - "services/dsh/backend/internal/wltoutbox/**"
      - "services/dsh/frontend/**/*order*"
      - "services/dsh/frontend/**/*delivery*"
      - "services/dsh/frontend/**/*pickup*"
      - "services/wlt/backend/internal/cod/**"
      - "services/wlt/backend/internal/http/delivery_collection_routes.go"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: order-journey-source-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-source:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
      - name: Compile DSH order journey packages
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l internal/orders internal/pickup internal/partnerdelivery internal/wlt internal/wltoutbox internal/http)"
          test -z "$files" || { printf 'Unformatted DSH files:\n%s\n' "$files"; exit 1; }
          go test ./internal/orders ./internal/pickup ./internal/partnerdelivery ./internal/wlt ./internal/wltoutbox ./internal/http -run '^$' -count=1
      - name: Compile WLT delivery collection packages
        working-directory: services/wlt/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l internal/cod internal/http cmd/wlt-api)"
          test -z "$files" || { printf 'Unformatted WLT files:\n%s\n' "$files"; exit 1; }
          go test ./internal/cod ./internal/http -run '^$' -count=1

  typescript-surfaces:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app-partner
            project: apps/app-partner/runtime/tsconfig.order-journey.json
          - name: app-client
            project: apps/app-client/runtime/tsconfig.order-journey.json
          - name: app-captain
            project: apps/app-captain/runtime/tsconfig.order-journey.json
          - name: control-panel
            project: apps/control-panel/runtime/tsconfig.order-journey.json
    name: typescript-${{ matrix.name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - name: Typecheck journey surface
        shell: bash
        run: pnpm exec tsc -p "${{ matrix.project }}" --noEmit --pretty false

  publish:
    if: always()
    needs: [go-source, typescript-surfaces]
    runs-on: ubuntu-latest
    steps:
      - name: Publish focused source status
        env:
          GO_RESULT: ${{ needs.go-source.result }}
          TS_RESULT: ${{ needs.typescript-surfaces.result }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          [ "$GO_RESULT" = success ] && [ "$TS_RESULT" = success ] && state=success
          description="go=$GO_RESULT ts=$TS_RESULT run=${GITHUB_RUN_ID}"
          jq -n --arg state "$state" --arg context "Order Journey Source" --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > payload.json
          posted=false
          for attempt in 1 2 3 4 5 6 7 8; do
            if curl --fail-with-body --silent --show-error -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
              -d @payload.json; then posted=true; break; fi
            sleep $((attempt * 3))
          done
          test "$posted" = true
          test "$state" = success
