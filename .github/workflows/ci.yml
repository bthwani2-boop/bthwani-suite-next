name: BThwani Contextual CI

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Verification depth
        required: true
        default: affected
        type: choice
        options: [affected, full]
      journey:
        description: Optional journey such as JRN-040
        required: false
        type: string
      runtime_proof:
        description: Start the full runtime and execute smoke proof
        required: true
        default: false
        type: boolean
  pull_request:
    branches: [master, lianbassam]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - ".github/**"
      - "governance/**"
      - "tools/**"
      - "contracts/**"
      - "core/**"
      - "services/**"
      - "apps/**"
      - "shared/**"
      - "infra/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "nx.json"
  push:
    branches: [master, lianbassam]
    paths:
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - ".github/**"
      - "governance/**"
      - "tools/**"
      - "contracts/**"
      - "core/**"
      - "services/**"
      - "apps/**"
      - "shared/**"
      - "infra/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "nx.json"

permissions:
  contents: read
  statuses: write

concurrency:
  group: contextual-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FULL_VERIFICATION_TRIGGER: governance/github/lianbassam-full-verification.trigger.json

jobs:
  context:
    name: Detect affected scope
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      base_sha: ${{ steps.scope.outputs.base_sha }}
      head_sha: ${{ steps.scope.outputs.head_sha }}
      full_verification: ${{ steps.scope.outputs.full_verification }}
      governance: ${{ steps.scope.outputs.governance }}
      workflow: ${{ steps.scope.outputs.workflow }}
      infrastructure: ${{ steps.scope.outputs.infrastructure }}
      security: ${{ steps.scope.outputs.security }}
      policy: ${{ steps.scope.outputs.policy }}
      frontend: ${{ steps.scope.outputs.frontend }}
      contracts: ${{ steps.scope.outputs.contracts }}
      journey: ${{ steps.scope.outputs.journey }}
      journey_scope: ${{ steps.scope.outputs.journey_scope }}
      node: ${{ steps.scope.outputs.node }}
      node_scope: ${{ steps.scope.outputs.node_scope }}
      dsh: ${{ steps.scope.outputs.dsh }}
      wlt: ${{ steps.scope.outputs.wlt }}
      identity: ${{ steps.scope.outputs.identity }}
      workforce: ${{ steps.scope.outputs.workforce }}
      platform: ${{ steps.scope.outputs.platform }}
      providers: ${{ steps.scope.outputs.providers }}
      database: ${{ steps.scope.outputs.database }}
      runtime: ${{ steps.scope.outputs.runtime }}
      shared_brain: ${{ steps.scope.outputs.shared_brain }}
      heavy: ${{ steps.scope.outputs.heavy }}
      jrn040: ${{ steps.scope.outputs.jrn040 }}
    steps:
      - name: Checkout immutable source history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
      - name: Publish contextual CI run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          jq -n \
            --arg state pending \
            --arg context bthwani/contextual-ci \
            --arg description "contextual CI routing and verification are running" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/contextual-ci-status.json
          curl --fail-with-body --retry 3 \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/contextual-ci-status.json
      - name: Verify contextual router decisions
        run: node --test tools/scripts/detect-ci-context.test.mjs
      - name: Classify changed paths
        id: scope
        shell: bash
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DISPATCH_MODE: ${{ inputs.mode }}
          DISPATCH_JOURNEY: ${{ inputs.journey }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          HEAD_SHA="${PR_HEAD_SHA:-${GITHUB_SHA}}"
          BASE_SHA="${PR_BASE_SHA:-${EVENT_BEFORE:-}}"
          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" =~ ^0+$ ]]; then
            BASE_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || printf '%s' "${HEAD_SHA}")"
          fi

          FULL_VERIFICATION=false
          if [[ "${EVENT_NAME}" == "workflow_dispatch" && "${DISPATCH_MODE:-affected}" == "full" ]]; then
            FULL_VERIFICATION=true
          elif git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | grep -Fxq "${FULL_VERIFICATION_TRIGGER}"; then
            FULL_VERIFICATION=true
          fi
          echo "full_verification=${FULL_VERIFICATION}" >> "${GITHUB_OUTPUT}"

          MODE="${DISPATCH_MODE:-affected}"
          if [[ "${FULL_VERIFICATION}" == "true" ]]; then MODE="full"; fi
          CI_BASE_SHA="${BASE_SHA}" \
          CI_HEAD_SHA="${HEAD_SHA}" \
          CI_MODE="${MODE}" \
          CI_JOURNEY="${DISPATCH_JOURNEY:-}" \
          node tools/scripts/detect-ci-context.mjs
      - name: Publish routing summary
        env:
          BASE_SHA: ${{ steps.scope.outputs.base_sha }}
          HEAD_SHA: ${{ steps.scope.outputs.head_sha }}
          NODE_SCOPE: ${{ steps.scope.outputs.node_scope }}
          JOURNEY_SCOPE: ${{ steps.scope.outputs.journey_scope }}
          HEAVY_CHECKS: ${{ steps.scope.outputs.heavy }}
          FULL_VERIFICATION: ${{ steps.scope.outputs.full_verification }}
        run: |
          {
            echo "### Contextual CI routing"
            echo "- Base: ${BASE_SHA}"
            echo "- Head: ${HEAD_SHA}"
            echo "- Full verification: ${FULL_VERIFICATION}"
            echo "- Node scope: ${NODE_SCOPE}"
            echo "- Journey scope: ${JOURNEY_SCOPE:-none}"
            echo "- Heavy checks: ${HEAVY_CHECKS}"
          } >> "${GITHUB_STEP_SUMMARY}"

  policy:
    name: Verify affected policy
    needs: [context]
    if: ${{ needs.context.outputs.policy == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify governance schema
        run: pnpm run guard:governance-schema
      - name: Verify agent governance
        run: pnpm run guard:agent-governance
      - name: Verify authority separation
        run: pnpm run guard:authority-separation
      - name: Verify SaaS governance
        run: pnpm run guard:saas-governance
      - name: Verify guard registry
        run: pnpm run guard:guard-registry
      - name: Verify SDLC governance
        run: pnpm run guard:sdlc
      - name: Verify cleanup policy
        run: pnpm run guard:cleanup-policy
      - name: Verify required command integrity
        run: pnpm run guard:required-command-integrity
      - name: Verify workflow supply chain
        if: ${{ needs.context.outputs.workflow == 'true' || needs.context.outputs.security == 'true' }}
        run: |
          pnpm run guard:actions-pin
          pnpm run guard:workflow-lint
          pnpm run guard:workflow-security
          pnpm run guard:opa-policies
      - name: Verify infrastructure policy
        if: ${{ needs.context.outputs.infrastructure == 'true' }}
        run: |
          pnpm run guard:runtime-config
          pnpm run guard:opa-policies
      - name: Verify immutable diff hygiene
        run: git diff --check

  node_contracts:
    name: Verify contract foundation and bindings
    needs: [context]
    if: ${{ needs.context.outputs.contracts == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout immutable source history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify imports resolve
        run: pnpm run guard:no-broken-imports
      - name: Verify contract foundation
        run: pnpm run contracts:lint
      - name: Verify frontend API binding
        run: pnpm run guard:api-binding
      - name: Verify backend API binding
        run: pnpm run guard:backend-api-binding
      - name: Verify service manifest drift
        run: pnpm run guard:service-manifest-drift
      - name: Verify frontend feature binding
        run: pnpm run guard:frontend-feature-binding
      - name: Verify runtime-facing bindings
        run: pnpm run guard:runtime-real-bindings
      - name: Verify cross-journey integrity
        run: pnpm run guard:live-cross-journey-integrity

  node_typecheck:
    name: Verify Node typecheck
    needs: [context]
    if: ${{ needs.context.outputs.full_verification == 'true' || needs.context.outputs.frontend == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout immutable source history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Restore Nx computation cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .nx/cache
          key: nx-typecheck-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}-${{ github.sha }}
          restore-keys: |
            nx-typecheck-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}-
      - name: Verify Node typecheck
        env:
          NX_BASE: ${{ needs.context.outputs.base_sha }}
          NX_HEAD: ${{ needs.context.outputs.head_sha }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.context.outputs.full_verification }}" == "true" ]]; then
            pnpm run nx:typecheck
          else
            pnpm run affected:typecheck
          fi

  node_lint:
    name: Verify Node lint
    needs: [context]
    if: ${{ needs.context.outputs.full_verification == 'true' || needs.context.outputs.frontend == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout immutable source history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Restore Nx computation cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .nx/cache
          key: nx-lint-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}-${{ github.sha }}
          restore-keys: |
            nx-lint-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}-
      - name: Verify Node lint
        env:
          NX_BASE: ${{ needs.context.outputs.base_sha }}
          NX_HEAD: ${{ needs.context.outputs.head_sha }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.context.outputs.full_verification }}" == "true" ]]; then
            pnpm run nx:lint
          else
            pnpm run affected:lint
          fi

  node_test:
    name: Verify Node tests
    needs: [context]
    if: ${{ needs.context.outputs.full_verification == 'true' || needs.context.outputs.frontend == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout immutable source history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Restore Nx computation cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .nx/cache
          key: nx-test-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}-${{ github.sha }}
          restore-keys: |
            nx-test-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}-
      - name: Verify Node tests
        env:
          NX_BASE: ${{ needs.context.outputs.base_sha }}
          NX_HEAD: ${{ needs.context.outputs.head_sha }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.context.outputs.full_verification }}" == "true" ]]; then
            pnpm run nx:test
          else
            pnpm run affected:test
          fi

  node_build:
    name: Verify Node build
    needs: [context]
    if: ${{ needs.context.outputs.full_verification == 'true' || (needs.context.outputs.frontend == 'true' && needs.context.outputs.heavy == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout immutable source history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Restore Nx computation cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .nx/cache
          key: nx-build-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}-${{ github.sha }}
          restore-keys: |
            nx-build-${{ hashFiles('pnpm-lock.yaml', 'nx.json') }}-
      - name: Verify Node build
        env:
          NX_BASE: ${{ needs.context.outputs.base_sha }}
          NX_HEAD: ${{ needs.context.outputs.head_sha }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.context.outputs.full_verification }}" == "true" ]]; then
            pnpm run nx:build
          else
            pnpm run affected:build
          fi

  node_journeys:
    name: Run detected journey gates
    needs: [context]
    if: ${{ needs.context.outputs.journey == 'true' && needs.context.outputs.journey_scope != '' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout immutable source history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Run detected journey gates
        shell: pwsh
        env:
          JOURNEY_SCOPE: ${{ needs.context.outputs.journey_scope }}
        run: |
          $journeys = $env:JOURNEY_SCOPE -split ',' | Where-Object { $_ -and $_.Trim() }
          foreach ($journey in $journeys) {
            ./tools/scripts/run-journey-gate.ps1 -Journey $journey.Trim()
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

  node_jrn040:
    name: Verify JRN-040 platform binding
    needs: [context]
    if: ${{ needs.context.outputs.jrn040 == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout immutable source history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify JRN-040 platform binding
        run: |
          pnpm --dir services/dsh exec tsc -p tsconfig.jrn-040.json --noEmit --pretty false
          pnpm --dir services/dsh exec openapi-typescript ../../core/platform-control/contracts/jrn-040-platform-change-sets.openapi.yaml -o /tmp/jrn-040-platform-change-sets-api.ts
          node tools/guards/jrn-040-platform-change-sets-gate.mjs

  node_hygiene:
    name: Verify immutable diff hygiene
    needs: [context]
    if: ${{ needs.context.outputs.node == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout immutable source history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify immutable diff hygiene
        run: git diff --check

  dsh:
    name: Verify DSH backend and database
    needs: [context]
    if: ${{ needs.context.outputs.dsh == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dsh_runtime
          POSTGRES_PASSWORD: dsh_runtime_password
          POSTGRES_DB: dsh_runtime
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dsh_runtime -d dsh_runtime"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgres://dsh_runtime:dsh_runtime_password@localhost:5432/dsh_runtime?sslmode=disable
      DSH_REQUIRE_DB_TESTS: "true"
      PGPASSWORD: dsh_runtime_password
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with: { persist-credentials: false, show-progress: false }
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client >/dev/null
      - name: Apply DSH migrations
        run: |
          set -euo pipefail
          for migration in services/dsh/database/migrations/*.sql; do psql "$DATABASE_URL" -q -v ON_ERROR_STOP=1 -f "$migration" >/dev/null; done
      - name: Test and build DSH
        working-directory: services/dsh/backend
        run: |
          set -uo pipefail
          log="${RUNNER_TEMP}/dsh-go-verification.log"
          if ! go test ./... -count=1 >"${log}" 2>&1; then
            echo "::error title=DSH Go verification failed::The complete log is stored as an artifact."
            grep -E '^--- FAIL:|^FAIL([[:space:]]|$)|panic:|undefined:|cannot use|build failed|Error Trace:' "${log}" | tail -n 80 || true
            echo "--- DSH final log lines ---"
            tail -n 160 "${log}"
            exit 1
          fi
          go build ./... >"${log}" 2>&1 || { tail -n 160 "${log}"; exit 1; }
      - name: Upload DSH verification log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dsh-go-verification-${{ github.run_id }}
          path: ${{ runner.temp }}/dsh-go-verification.log
          if-no-files-found: warn
          retention-days: 7

  wlt:
    name: Verify WLT backend and database
    needs: [context]
    if: ${{ needs.context.outputs.wlt == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wlt_runtime
          POSTGRES_PASSWORD: wlt_runtime_password
          POSTGRES_DB: wlt_runtime
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U wlt_runtime -d wlt_runtime"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgres://wlt_runtime:wlt_runtime_password@localhost:5432/wlt_runtime?sslmode=disable
      WLT_REQUIRE_DB_TESTS: "true"
      PGPASSWORD: wlt_runtime_password
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with: { persist-credentials: false, show-progress: false }
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache-dependency-path: services/wlt/backend/go.sum
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client >/dev/null
      - name: Apply WLT migrations
        run: |
          set -euo pipefail
          for migration in services/wlt/database/migrations/*.sql; do psql "$DATABASE_URL" -q -v ON_ERROR_STOP=1 -f "$migration" >/dev/null; done
      - name: Test and build WLT
        working-directory: services/wlt/backend
        run: |
          set -uo pipefail
          log="${RUNNER_TEMP}/wlt-go-verification.log"
          if ! go test ./... -count=1 >"${log}" 2>&1; then
            echo "::error title=WLT Go verification failed::The complete log is stored as an artifact."
            grep -E '^--- FAIL:|^FAIL([[:space:]]|$)|panic:|undefined:|cannot use|build failed|Error Trace:' "${log}" | tail -n 80 || true
            echo "--- WLT final log lines ---"
            tail -n 160 "${log}"
            exit 1
          fi
          go build ./... >"${log}" 2>&1 || { tail -n 160 "${log}"; exit 1; }
      - name: Upload WLT verification log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wlt-go-verification-${{ github.run_id }}
          path: ${{ runner.temp }}/wlt-go-verification.log
          if-no-files-found: warn
          retention-days: 7

  identity:
    name: Verify Identity backend and database
    needs: [context]
    if: ${{ needs.context.outputs.identity == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: identity_runtime
          POSTGRES_PASSWORD: identity_runtime_password
          POSTGRES_DB: identity_runtime
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U identity_runtime -d identity_runtime"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgres://identity_runtime:identity_runtime_password@localhost:5432/identity_runtime?sslmode=disable
      PGPASSWORD: identity_runtime_password
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with: { persist-credentials: false }
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/identity/backend/go.mod
          cache-dependency-path: core/identity/backend/go.sum
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply Identity migrations
        run: |
          set -euo pipefail
          for migration in core/identity/database/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"; done
      - name: Test and build Identity
        working-directory: core/identity/backend
        run: go test ./... -count=1 && go build ./...

  workforce:
    name: Verify Workforce backend and database
    needs: [context]
    if: ${{ needs.context.outputs.workforce == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workforce_runtime
          POSTGRES_PASSWORD: workforce_runtime_password
          POSTGRES_DB: workforce_runtime
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U workforce_runtime -d workforce_runtime"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgres://workforce_runtime:workforce_runtime_password@localhost:5432/workforce_runtime?sslmode=disable
      PGPASSWORD: workforce_runtime_password
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with: { persist-credentials: false }
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/workforce/backend/go.mod
          cache-dependency-path: core/workforce/backend/go.sum
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply Workforce migrations
        run: |
          set -euo pipefail
          for migration in core/workforce/database/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"; done
      - name: Test and build Workforce
        working-directory: core/workforce/backend
        run: go test ./... -count=1 && go build ./...

  platform:
    name: Verify Platform Control backend and database
    needs: [context]
    if: ${{ needs.context.outputs.platform == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U platform -d platform"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgres://platform:platform@localhost:5432/platform?sslmode=disable
      PGPASSWORD: platform
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with: { persist-credentials: false }
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/platform-control/backend/go.mod
          cache-dependency-path: core/platform-control/backend/go.sum
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply Platform Control migrations
        run: |
          set -euo pipefail
          for migration in core/platform-control/database/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"; done
      - name: Test and build Platform Control
        working-directory: core/platform-control/backend
        run: go test ./... -count=1 && go build ./...

  providers:
    name: Verify Providers backend and database
    needs: [context]
    if: ${{ needs.context.outputs.providers == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: providers_runtime
          POSTGRES_PASSWORD: providers_runtime_password
          POSTGRES_DB: providers_runtime
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U providers_runtime -d providers_runtime"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgres://providers_runtime:providers_runtime_password@localhost:5432/providers_runtime?sslmode=disable
      PGPASSWORD: providers_runtime_password
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with: { persist-credentials: false }
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/providers/backend/go.mod
          cache-dependency-path: core/providers/backend/go.sum
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply Providers migrations
        run: |
          set -euo pipefail
          for migration in core/providers/database/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"; done
      - name: Test and build Providers
        working-directory: core/providers/backend
        run: go test ./... -count=1 && go build ./...

  runtime_proof:
    name: Execute required runtime proof
    needs: [context]
    if: ${{ needs.context.outputs.full_verification == 'true' || (github.event_name == 'workflow_dispatch' && inputs.runtime_proof) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with: { persist-credentials: false }
      - uses: ./.github/actions/setup-node-workspace
      - name: Start and verify full runtime
        shell: pwsh
        run: |
          pnpm run runtime:full:up
          pnpm run runtime:full:bootstrap-dev
          pnpm run runtime:full:smoke
      - name: Stop runtime
        if: always()
        shell: pwsh
        run: pnpm run runtime:full:down

  result:
    name: BThwani CI result
    needs: [context, policy, node_contracts, node_typecheck, node_lint, node_test, node_build, node_journeys, node_jrn040, node_hygiene, dsh, wlt, identity, workforce, platform, providers, runtime_proof]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Enforce result and publish immutable commit status
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.context.outputs.head_sha }}
          FULL_VERIFICATION: ${{ needs.context.outputs.full_verification }}
          PUBLISH_STATUS: ${{ github.event_name != 'pull_request' }}
          CONTEXT_RESULT: ${{ needs.context.result }}
          POLICY_RESULT: ${{ needs.policy.result }}
          NODE_CONTRACTS_RESULT: ${{ needs.node_contracts.result }}
          NODE_TYPECHECK_RESULT: ${{ needs.node_typecheck.result }}
          NODE_LINT_RESULT: ${{ needs.node_lint.result }}
          NODE_TEST_RESULT: ${{ needs.node_test.result }}
          NODE_BUILD_RESULT: ${{ needs.node_build.result }}
          NODE_JOURNEYS_RESULT: ${{ needs.node_journeys.result }}
          NODE_JRN040_RESULT: ${{ needs.node_jrn040.result }}
          NODE_HYGIENE_RESULT: ${{ needs.node_hygiene.result }}
          DSH_RESULT: ${{ needs.dsh.result }}
          WLT_RESULT: ${{ needs.wlt.result }}
          IDENTITY_RESULT: ${{ needs.identity.result }}
          WORKFORCE_RESULT: ${{ needs.workforce.result }}
          PLATFORM_RESULT: ${{ needs.platform.result }}
          PROVIDERS_RESULT: ${{ needs.providers.result }}
          RUNTIME_RESULT: ${{ needs.runtime_proof.result }}
          EXPECTED_POLICY: ${{ needs.context.outputs.policy }}
          EXPECTED_NODE_CONTRACTS: ${{ needs.context.outputs.contracts }}
          EXPECTED_NODE_TYPECHECK: ${{ needs.context.outputs.full_verification == 'true' || needs.context.outputs.frontend == 'true' }}
          EXPECTED_NODE_LINT: ${{ needs.context.outputs.full_verification == 'true' || needs.context.outputs.frontend == 'true' }}
          EXPECTED_NODE_TEST: ${{ needs.context.outputs.full_verification == 'true' || needs.context.outputs.frontend == 'true' }}
          EXPECTED_NODE_BUILD: ${{ needs.context.outputs.full_verification == 'true' || (needs.context.outputs.frontend == 'true' && needs.context.outputs.heavy == 'true') }}
          EXPECTED_NODE_JOURNEYS: ${{ needs.context.outputs.journey == 'true' && needs.context.outputs.journey_scope != '' }}
          EXPECTED_NODE_JRN040: ${{ needs.context.outputs.jrn040 }}
          EXPECTED_NODE_HYGIENE: ${{ needs.context.outputs.node }}
          EXPECTED_DSH: ${{ needs.context.outputs.dsh }}
          EXPECTED_WLT: ${{ needs.context.outputs.wlt }}
          EXPECTED_IDENTITY: ${{ needs.context.outputs.identity }}
          EXPECTED_WORKFORCE: ${{ needs.context.outputs.workforce }}
          EXPECTED_PLATFORM: ${{ needs.context.outputs.platform }}
          EXPECTED_PROVIDERS: ${{ needs.context.outputs.providers }}
          EXPECTED_RUNTIME: ${{ needs.context.outputs.full_verification == 'true' || (github.event_name == 'workflow_dispatch' && inputs.runtime_proof) }}
        run: |
          set -euo pipefail
          failed=0
          failures=()
          check_result() {
            local name="$1" expected="$2" result="$3"
            if [[ "${expected}" == "true" ]]; then
              if [[ "${result}" != "success" ]]; then failures+=("${name}:${result}"); failed=1; fi
            elif [[ "${result}" != "success" && "${result}" != "skipped" ]]; then
              failures+=("${name}:${result}"); failed=1
            fi
          }
          check_result context true "${CONTEXT_RESULT}"
          check_result policy "${EXPECTED_POLICY}" "${POLICY_RESULT}"
          check_result node_contracts "${EXPECTED_NODE_CONTRACTS}" "${NODE_CONTRACTS_RESULT}"
          check_result node_typecheck "${EXPECTED_NODE_TYPECHECK}" "${NODE_TYPECHECK_RESULT}"
          check_result node_lint "${EXPECTED_NODE_LINT}" "${NODE_LINT_RESULT}"
          check_result node_test "${EXPECTED_NODE_TEST}" "${NODE_TEST_RESULT}"
          check_result node_build "${EXPECTED_NODE_BUILD}" "${NODE_BUILD_RESULT}"
          check_result node_journeys "${EXPECTED_NODE_JOURNEYS}" "${NODE_JOURNEYS_RESULT}"
          check_result node_jrn040 "${EXPECTED_NODE_JRN040}" "${NODE_JRN040_RESULT}"
          check_result node_hygiene "${EXPECTED_NODE_HYGIENE}" "${NODE_HYGIENE_RESULT}"
          check_result dsh "${EXPECTED_DSH}" "${DSH_RESULT}"
          check_result wlt "${EXPECTED_WLT}" "${WLT_RESULT}"
          check_result identity "${EXPECTED_IDENTITY}" "${IDENTITY_RESULT}"
          check_result workforce "${EXPECTED_WORKFORCE}" "${WORKFORCE_RESULT}"
          check_result platform "${EXPECTED_PLATFORM}" "${PLATFORM_RESULT}"
          check_result providers "${EXPECTED_PROVIDERS}" "${PROVIDERS_RESULT}"
          check_result runtime "${EXPECTED_RUNTIME}" "${RUNTIME_RESULT}"

          state=success
          description="all required scopes passed"
          if [[ "${failed}" -ne 0 ]]; then
            state=failure
            description="failed: $(IFS=,; echo "${failures[*]}")"
          fi
          description="${description:0:140}"
          context="bthwani/contextual-verification"
          if [[ "${FULL_VERIFICATION}" == "true" ]]; then context="bthwani/full-verification"; fi

          if [[ "${PUBLISH_STATUS}" == "true" ]]; then
            jq -n \
              --arg state "${state}" \
              --arg context "${context}" \
              --arg description "${description}" \
              --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
            curl --fail-with-body --retry 3 \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
              --data-binary @/tmp/status.json
          fi
          printf '%s\n' "${description}"
          exit "${failed}"
