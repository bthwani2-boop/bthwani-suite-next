name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-gates:
    name: Node / PNPM gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Contracts lint
        run: pnpm run contracts:lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

  dsh-go:
    name: DSH Go backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod

      - name: Go test
        working-directory: services/dsh/backend
        run: go test ./...

      - name: Go build
        working-directory: services/dsh/backend
        run: go build ./...

  identity-go:
    name: Identity Go backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/identity/backend/go.mod

      - name: Go test
        working-directory: core/identity/backend
        run: go test ./...

      - name: Go build
        working-directory: core/identity/backend
        run: go build ./...
