name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - bassam
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Governance agents guards and SDLC
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Governance schema and semantics
        run: pnpm run guard:governance-schema
      - name: Agent and skill governance
        run: pnpm run guard:agent-governance
      - name: Guard registry and workflow policy
        run: pnpm run guard:guard-registry
      - name: SDLC and Product Truth integration
        run: pnpm run guard:sdlc

  node-foundation:
    name: Node foundation and repository gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify Nx workspace
        run: pnpm run nx:projects
      - name: Lint
        run: pnpm run lint
      - name: Contract lint
        run: pnpm run contracts:lint
      - name: Foundation guards
        run: |
          pnpm run guard:no-broken-imports
          pnpm run guard:runtime-config
          pnpm run guard:cleanup-policy
          pnpm run guard:repo-size
          pnpm run guard:heavy-imports
          pnpm run guard:performance-budget
      - name: Mobile workspace contracts
        run: |
          pnpm run mobile:apps:check
          pnpm run mobile:expo:verify

  binding-and-logic:
    name: Contract binding logic and UI gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: API and full-stack binding gates
        run: |
          pnpm run guard:api-binding
          pnpm run guard:backend-api-binding
          pnpm run guard:service-manifest-drift
          pnpm run guard:frontend-feature-binding
          pnpm run guard:fullstack-boundary
          pnpm run guard:wlt-financial-boundary
          pnpm run guard:runtime-real-bindings
          pnpm run guard:live-cross-journey-integrity
      - name: Logic architecture and accessibility gates
        run: |
          pnpm run guard:go-routes-ci
          pnpm run guard:logic-coverage
          pnpm run guard:a11y
          pnpm run guard:dependency-graph
          pnpm run guard:ast-grep-rules
      - name: UI contract gates
        run: |
          pnpm run guard:ui-provider
          pnpm run guard:ui-kit-boundary
          pnpm run guard:icon-contract

  generated-clients:
    name: Generated OpenAPI client drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate clients to temporary files and compare
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/bthwani-generated
          pnpm exec openapi-typescript services/dsh/contracts/dsh.openapi.yaml -o /tmp/bthwani-generated/dsh-api.ts
          pnpm exec openapi-typescript services/wlt/contracts/wlt.openapi.yaml -o /tmp/bthwani-generated/wlt-api.ts
          pnpm exec openapi-typescript core/identity/contracts/auth.openapi.yaml -o /tmp/bthwani-generated/identity-api.ts
          pnpm exec openapi-typescript core/workforce/contracts/workforce.openapi.yaml -o /tmp/bthwani-generated/workforce-api.ts
          pnpm exec openapi-typescript core/platform-control/contracts/platform-control.openapi.yaml -o /tmp/bthwani-generated/platform-control-api.ts
          pnpm exec openapi-typescript core/providers/contracts/providers.openapi.yaml -o /tmp/bthwani-generated/providers-api.ts
          cmp /tmp/bthwani-generated/dsh-api.ts services/dsh/clients/generated/dsh-api.ts
          cmp /tmp/bthwani-generated/wlt-api.ts services/wlt/clients/generated/wlt-api.ts
          cmp /tmp/bthwani-generated/identity-api.ts core/identity/clients/generated/identity-api.ts
          cmp /tmp/bthwani-generated/workforce-api.ts core/workforce/clients/generated/workforce-api.ts
          cmp /tmp/bthwani-generated/platform-control-api.ts core/platform-control/clients/generated/platform-control-api.ts
          cmp /tmp/bthwani-generated/providers-api.ts core/providers/clients/generated/providers-api.ts

  node-verification:
    name: Typecheck build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Build
        run: pnpm run build
      - name: Test
        run: pnpm run test

  go-services:
    name: Go test and build — ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: DSH
            directory: services/dsh/backend
            go_mod: services/dsh/backend/go.mod
            go_sum: services/dsh/backend/go.sum
          - name: WLT
            directory: services/wlt/backend
            go_mod: services/wlt/backend/go.mod
            go_sum: services/wlt/backend/go.sum
          - name: Identity
            directory: core/identity/backend
            go_mod: core/identity/backend/go.mod
            go_sum: core/identity/backend/go.sum
          - name: Workforce
            directory: core/workforce/backend
            go_mod: core/workforce/backend/go.mod
            go_sum: core/workforce/backend/go.sum
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.go_mod }}
          cache: true
          cache-dependency-path: ${{ matrix.go_sum }}
      - name: Verify formatting without modifying source
        working-directory: ${{ matrix.directory }}
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Unformatted files:\n%s\n' "$files"; exit 1; }
      - name: Vet
        working-directory: ${{ matrix.directory }}
        run: go vet ./...
      - name: Test
        working-directory: ${{ matrix.directory }}
        run: go test ./... -count=1
      - name: Build
        working-directory: ${{ matrix.directory }}
        run: go build ./...

  ci-result:
    name: CI result
    if: always()
    needs:
      - governance
      - node-foundation
      - binding-and-logic
      - generated-clients
      - node-verification
      - go-services
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require every CI job to pass
        env:
          GOVERNANCE: ${{ needs.governance.result }}
          FOUNDATION: ${{ needs.node-foundation.result }}
          BINDING: ${{ needs.binding-and-logic.result }}
          GENERATED: ${{ needs.generated-clients.result }}
          NODE_VERIFY: ${{ needs.node-verification.result }}
          GO_SERVICES: ${{ needs.go-services.result }}
        shell: bash
        run: |
          set -euo pipefail
          test "$GOVERNANCE" = success
          test "$FOUNDATION" = success
          test "$BINDING" = success
          test "$GENERATED" = success
          test "$NODE_VERIFY" = success
          test "$GO_SERVICES" = success
