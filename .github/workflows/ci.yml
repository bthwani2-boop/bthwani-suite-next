name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - implementing
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'manual master baseline verification'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-gates:
    name: Node / PNPM gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Contracts lint
        run: pnpm run contracts:lint

      - name: Guard — no broken imports
        run: pnpm run guard:no-broken-imports

      - name: Guard — runtime config
        run: pnpm run guard:runtime-config

      - name: Guard — UI kit boundary
        run: pnpm run guard:ui-kit-boundary

      - name: Guard — fullstack boundary
        run: pnpm run guard:fullstack-boundary

      - name: Guard — WLT financial boundary
        run: pnpm run guard:wlt-financial-boundary

      - name: Guard — cleanup policy
        run: pnpm run guard:cleanup-policy

      - name: Guard — API binding
        run: pnpm run guard:api-binding

      - name: Guard — Backend API binding
        run: pnpm run guard:backend-api-binding

      - name: Guard — Service manifest drift
        run: pnpm run guard:service-manifest-drift

      - name: Guard — Go route AST
        run: pnpm run guard:go-routes-ci

      - name: Guard — logic coverage
        run: pnpm run guard:logic-coverage

      - name: Guard — a11y
        run: pnpm run guard:a11y

      - name: Guard — dependency graph
        run: pnpm run guard:dependency-graph

      - name: Guard — ast-grep rules
        run: pnpm run guard:ast-grep-rules

      - name: OpenAPI client drift check
        run: |
          pnpm run openapi:generate
          git diff --exit-code services/dsh/clients/generated/ services/wlt/clients/generated/ core/identity/clients/generated/ || \
            (echo "ERROR: Generated API clients have drifted from OpenAPI specs. Run 'pnpm run openapi:generate' and commit." && exit 1)

      - name: Foundation gate
        run: pnpm run foundation:gate

      - name: Journey gate
        run: pnpm run journey:gate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  wlt-go:
    name: WLT Go backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache: true

      - name: Go test
        working-directory: services/wlt/backend
        run: go test ./...

      - name: Go build
        working-directory: services/wlt/backend
        run: go build ./...

  wlt-go-db:
    name: WLT Go DB integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
          POSTGRES_PASSWORD: bthwani_runtime_password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache: true

      - name: Install postgresql-client
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql --version

      - name: Initialize Databases
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: bthwani_runtime_password
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
        run: |
          sh infra/data-plane/postgres/init/001_create_runtime_databases.sh

      - name: Run WLT migrations
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: bthwani_runtime_password
        run: |
          for f in services/wlt/database/migrations/*.sql; do
            echo "Applying $f"
            psql -h localhost -U wlt_runtime -d wlt_runtime -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run WLT tests with DB required
        working-directory: services/wlt/backend
        env:
          DATABASE_URL: postgres://wlt_runtime:wlt_runtime_password@localhost:5432/wlt_runtime?sslmode=disable
          WLT_REQUIRE_DB_TESTS: "true"
        run: go test -v ./...

  dsh-go:
    name: DSH Go backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true

      - name: Go test
        working-directory: services/dsh/backend
        run: go test ./...

      - name: Go build
        working-directory: services/dsh/backend
        run: go build ./...

  dsh-go-db:
    name: DSH Go DB integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
          POSTGRES_PASSWORD: bthwani_runtime_password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true

      - name: Install postgresql-client
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql --version

      - name: Initialize Databases
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: bthwani_runtime_password
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
        run: |
          sh infra/data-plane/postgres/init/001_create_runtime_databases.sh

      - name: Run DSH migrations
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: bthwani_runtime_password
        run: |
          for f in services/dsh/database/migrations/*.sql; do
            echo "Applying $f"
            psql -h localhost -U dsh_runtime -d dsh_runtime -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run DSH local seeds
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: bthwani_runtime_password
        run: |
          for f in services/dsh/database/seeds/local/*.sql; do
            echo "Applying $f"
            psql -h localhost -U dsh_runtime -d dsh_runtime -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run DSH tests with DB required
        working-directory: services/dsh/backend
        env:
          DATABASE_URL: postgres://dsh_runtime:dsh_runtime_password@localhost:5432/dsh_runtime?sslmode=disable
          DSH_REQUIRE_DB_TESTS: "true"
        run: go test -v ./...

  identity-go:
    name: Identity Go backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/identity/backend/go.mod
          cache: true

      - name: Go test
        working-directory: core/identity/backend
        run: go test ./...

      - name: Go build
        working-directory: core/identity/backend
        run: go build ./...

  docker-runtime-smoke:
    name: Docker runtime smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full runtime reset and smoke
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 -Action reset -Profiles identity,dsh,wlt,financial-simulators,mail,media

      - name: WireMock financial provider smoke
        run: pnpm run runtime:wiremock:financial:smoke

      - name: Docker compose ps
        if: always()
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.financial-simulators.yml ps

      - name: Docker compose logs on failure
        if: failure()
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.financial-simulators.yml logs --tail=200 | tee /tmp/docker-logs.txt

      - name: Upload docker logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-${{ github.run_id }}
          path: /tmp/docker-logs.txt
          retention-days: 7

      - name: Docker compose down
        if: always()
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.financial-simulators.yml down -v --remove-orphans

  # Not run on pull_request/push: it requires WLT_MUTATIONS_ENABLED=true, which
  # is not an approved default (see services/wlt/service.manifest.ts
  # mutationRuntimeReady/mutationJourneysApproved). Trigger manually only when
  # the WLT payment-session mutation journey itself needs verification.
  wlt-mutation-lab-smoke:
    name: WLT mutation lab smoke (manual, unapproved mutations)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full runtime reset and smoke (mutations enabled)
        shell: pwsh
        env:
          WLT_MUTATIONS_ENABLED: "true"
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 -Action reset -Profiles identity,dsh,wlt,financial-simulators,mail,media

      - name: WireMock financial provider smoke
        run: pnpm run runtime:wiremock:financial:smoke

      - name: WLT provider-through-WLT smoke
        run: pnpm run runtime:wlt:provider:smoke

      - name: Docker compose ps
        if: always()
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.financial-simulators.yml ps

      - name: Docker compose logs on failure
        if: failure()
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.financial-simulators.yml logs --tail=200 | tee /tmp/docker-logs.txt

      - name: Docker compose down
        if: always()
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.financial-simulators.yml down -v --remove-orphans
