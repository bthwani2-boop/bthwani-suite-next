name: CI

on:
  push:
    branches: [lian, bassam, master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Governance agents authorities SaaS guards and SDLC
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Run governance checks and report every failure
        shell: bash
        run: |
          set +e
          failures=0
          run_check() {
            local name="$1"
            shift
            echo "::group::$name"
            "$@"
            local result=$?
            echo "::endgroup::"
            if [ "$result" -ne 0 ]; then
              echo "::error title=$name failed::exit=$result"
              failures=$((failures + 1))
            fi
          }
          run_check governance-schema pnpm run guard:governance-schema
          run_check agent-governance pnpm run guard:agent-governance
          run_check authority-separation pnpm run guard:authority-separation
          run_check saas-governance pnpm run guard:saas-governance
          run_check guard-registry pnpm run guard:guard-registry
          run_check sdlc pnpm run guard:sdlc
          run_check required-command-integrity pnpm run guard:required-command-integrity
          run_check cleanup-policy pnpm run guard:cleanup-policy
          test "$failures" -eq 0

  node-foundation:
    name: Node foundation and repository checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify workspace foundation
        shell: bash
        run: |
          set +e
          failures=0
          run_check() {
            local name="$1"
            shift
            echo "::group::$name"
            "$@"
            local result=$?
            echo "::endgroup::"
            if [ "$result" -ne 0 ]; then failures=$((failures + 1)); fi
          }
          run_check nx-projects pnpm run nx:projects
          run_check lint pnpm run lint
          run_check contracts pnpm run contracts:lint
          run_check repository-size pnpm run guard:repo-size
          run_check no-broken-imports pnpm run guard:no-broken-imports
          run_check runtime-config pnpm run guard:runtime-config
          run_check mobile-app-contracts pnpm run mobile:apps:check
          run_check mobile-expo-contracts pnpm run mobile:expo:verify
          test "$failures" -eq 0

  binding-and-logic:
    name: Static binding logic UI and architecture checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Run static binding and regression checks
        shell: bash
        run: |
          set +e
          failures=0
          run_check() {
            local name="$1"
            shift
            echo "::group::$name"
            "$@"
            local result=$?
            echo "::endgroup::"
            if [ "$result" -ne 0 ]; then failures=$((failures + 1)); fi
          }
          run_check api-binding pnpm run guard:api-binding
          run_check backend-api-binding pnpm run guard:backend-api-binding
          run_check service-manifest-drift pnpm run guard:service-manifest-drift
          run_check frontend-static-binding pnpm run guard:frontend-feature-binding
          run_check fullstack-boundary pnpm run guard:fullstack-boundary
          run_check wlt-financial-boundary pnpm run guard:wlt-financial-boundary
          run_check runtime-anti-stub pnpm run guard:runtime-real-bindings
          run_check cross-journey-regressions pnpm run guard:live-cross-journey-integrity
          run_check go-route-map pnpm run guard:go-routes-ci
          run_check static-ui-logic pnpm run guard:logic-coverage
          run_check accessibility-static pnpm run guard:a11y
          run_check dependency-graph pnpm run guard:dependency-graph
          run_check ast-rules pnpm run guard:ast-grep-rules
          run_check ui-provider pnpm run guard:ui-provider
          run_check ui-kit-boundary pnpm run guard:ui-kit-boundary
          run_check icon-contract pnpm run guard:icon-contract
          test "$failures" -eq 0

  generated-clients:
    name: Generated OpenAPI client drift
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Generate clients outside the source tree and compare
        shell: bash
        run: |
          set -euo pipefail
          output="$(mktemp -d)"
          trap 'rm -rf "$output"' EXIT
          pnpm exec openapi-typescript services/dsh/contracts/dsh.openapi.yaml -o "$output/dsh-api.ts"
          pnpm exec openapi-typescript services/wlt/contracts/wlt.openapi.yaml -o "$output/wlt-api.ts"
          pnpm exec openapi-typescript core/identity/contracts/auth.openapi.yaml -o "$output/identity-api.ts"
          pnpm exec openapi-typescript core/workforce/contracts/workforce.openapi.yaml -o "$output/workforce-api.ts"
          pnpm exec openapi-typescript core/platform-control/contracts/platform-control.openapi.yaml -o "$output/platform-control-api.ts"
          pnpm exec openapi-typescript core/providers/contracts/providers.openapi.yaml -o "$output/providers-api.ts"
          cmp "$output/dsh-api.ts" services/dsh/clients/generated/dsh-api.ts
          cmp "$output/wlt-api.ts" services/wlt/clients/generated/wlt-api.ts
          cmp "$output/identity-api.ts" core/identity/clients/generated/identity-api.ts
          cmp "$output/workforce-api.ts" core/workforce/clients/generated/workforce-api.ts
          cmp "$output/platform-control-api.ts" core/platform-control/clients/generated/platform-control-api.ts
          cmp "$output/providers-api.ts" core/providers/clients/generated/providers-api.ts
          node tools/scripts/generate-dsh-catalog-client.mjs --check

  node-verification:
    name: Typecheck build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Typecheck
        run: pnpm run typecheck
      - name: Build
        run: pnpm run build
      - name: Test
        run: pnpm run test

  go-services:
    name: Go static verification — ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: DSH
            directory: services/dsh/backend
            go_mod: services/dsh/backend/go.mod
            go_sum: services/dsh/backend/go.sum
          - name: WLT
            directory: services/wlt/backend
            go_mod: services/wlt/backend/go.mod
            go_sum: services/wlt/backend/go.sum
          - name: Identity
            directory: core/identity/backend
            go_mod: core/identity/backend/go.mod
            go_sum: core/identity/backend/go.sum
          - name: Workforce
            directory: core/workforce/backend
            go_mod: core/workforce/backend/go.mod
            go_sum: core/workforce/backend/go.sum
          - name: Platform Control
            directory: core/platform-control/backend
            go_mod: core/platform-control/backend/go.mod
            go_sum: core/platform-control/backend/go.sum
          - name: Providers
            directory: core/providers/backend
            go_mod: core/providers/backend/go.mod
            go_sum: core/providers/backend/go.sum
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: ${{ matrix.go_mod }}
          cache: true
          cache-dependency-path: ${{ matrix.go_sum }}
      - name: Verify formatting without modifying source
        working-directory: ${{ matrix.directory }}
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Unformatted files:\n%s\n' "$files"; exit 1; }
      - name: Vet
        working-directory: ${{ matrix.directory }}
        run: go vet ./...
      - name: Test
        working-directory: ${{ matrix.directory }}
        run: go test ./... -count=1
      - name: Build
        working-directory: ${{ matrix.directory }}
        run: go build ./...

  ci-result:
    name: CI result
    if: always()
    needs: [governance, node-foundation, binding-and-logic, generated-clients, node-verification, go-services]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require every CI job to pass
        env:
          GOVERNANCE: ${{ needs.governance.result }}
          FOUNDATION: ${{ needs.node-foundation.result }}
          BINDING: ${{ needs.binding-and-logic.result }}
          GENERATED: ${{ needs.generated-clients.result }}
          NODE_VERIFY: ${{ needs.node-verification.result }}
          GO_SERVICES: ${{ needs.go-services.result }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'governance=%s\nfoundation=%s\nbinding=%s\ngenerated=%s\nnode=%s\ngo=%s\n' \
            "$GOVERNANCE" "$FOUNDATION" "$BINDING" "$GENERATED" "$NODE_VERIFY" "$GO_SERVICES"
          test "$GOVERNANCE" = success
          test "$FOUNDATION" = success
          test "$BINDING" = success
          test "$GENERATED" = success
          test "$NODE_VERIFY" = success
          test "$GO_SERVICES" = success
