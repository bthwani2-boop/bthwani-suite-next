name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - brach-validation

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-gates:
    name: Node / PNPM gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Contracts lint
        run: pnpm run contracts:lint

      - name: Guard — matrix v3 (live topology)
        run: pnpm run guard:matrix:v3

      - name: Guard — unified fullstack brain
        run: pnpm run guard:unified-fullstack-brain

      - name: Guard — DSH frontend shared ownership
        run: pnpm run guard:dsh-frontend-shared-ownership

      - name: Guard — WLT-DSH frontend shared ownership
        run: pnpm run guard:wlt-dsh-frontend-shared-ownership

      - name: Guard — DSH frontend shared boundary imports
        run: pnpm run guard:dsh-frontend-shared-boundary-imports

      - name: Guard — no financial mutation outside WLT
        run: pnpm run guard:no-financial-mutation-outside-wlt

      - name: Guard — no direct financial provider access outside WLT
        run: pnpm run guard:no-direct-financial-provider-access-outside-wlt

      - name: Guard — no direct fetch in screen
        run: pnpm run guard:no-direct-fetch-in-screen

      - name: Guard — no preview demo mock runtime
        run: pnpm run guard:no-preview-demo-mock-runtime

      - name: Guard — no broken imports
        run: pnpm run guard:no-broken-imports

      - name: Guard — canonical host ports
        run: pnpm run guard:canonical-host-ports

      - name: Guard — canonical currency Yemen
        run: pnpm run guard:canonical-currency-yemen

      - name: Foundation gate
        run: pnpm run foundation:gate

      - name: Slice gate
        run: pnpm run slice:gate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

  wlt-go:
    name: WLT Go backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/wlt/backend/go.mod

      - name: Go test
        working-directory: services/wlt/backend
        run: go test ./...

      - name: Go build
        working-directory: services/wlt/backend
        run: go build ./...

  wlt-go-db:
    name: WLT Go DB integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
          POSTGRES_PASSWORD: bthwani_runtime_password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/wlt/backend/go.mod

      - name: Initialize Databases
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: bthwani_runtime_password
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
        run: |
          sh infra/data-plane/postgres/init/001_create_runtime_databases.sh

      - name: Run WLT migrations
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: wlt_runtime_password
        run: |
          for f in services/wlt/database/migrations/*.sql; do
            echo "Applying $f"
            psql -h localhost -U wlt_runtime -d wlt_runtime -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run WLT tests with DB required
        working-directory: services/wlt/backend
        env:
          DATABASE_URL: postgres://wlt_runtime:wlt_runtime_password@localhost:5432/wlt_runtime?sslmode=disable
          WLT_REQUIRE_DB_TESTS: "true"
        run: go test -v ./...

  dsh-go:
    name: DSH Go backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod

      - name: Go test
        working-directory: services/dsh/backend
        run: go test ./...

      - name: Go build
        working-directory: services/dsh/backend
        run: go build ./...

  identity-go:
    name: Identity Go backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/identity/backend/go.mod

      - name: Go test
        working-directory: core/identity/backend
        run: go test ./...

      - name: Go build
        working-directory: core/identity/backend
        run: go build ./...

  docker-runtime-smoke:
    name: Docker runtime smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Docker compose up
        run: |
          docker compose \
            --env-file infra/docker/env/runtime.env.example \
            -f infra/docker/compose.runtime.yml \
            -f infra/docker/compose.financial-simulators.yml \
            --profile wlt \
            --profile financial-simulators \
            --profile mail \
            up -d --build

      - name: Runtime health checks
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Wait-ForUrl($Url) {
            for ($i = 1; $i -le 30; $i++) {
              try {
                Invoke-RestMethod $Url -TimeoutSec 5 | Out-Null
                return
              } catch {
                Start-Sleep -Seconds 3
              }
            }
            throw "Timed out waiting for $Url"
          }
          docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.financial-simulators.yml exec -T postgres pg_isready -U bthwani_runtime -d bthwani_runtime
          Wait-ForUrl "http://localhost:58083/wlt/health"
          Wait-ForUrl "http://localhost:58090/__admin/mappings"
          Wait-ForUrl "http://localhost:8025/api/v1/info"

      - name: WLT migrations and seeds
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 -Action migrate -Profiles wlt
          pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 -Action seed -Profiles wlt

      - name: Wait for WLT readiness
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Wait-ForUrl($Url) {
            for ($i = 1; $i -le 30; $i++) {
              try {
                Invoke-RestMethod $Url -TimeoutSec 5 | Out-Null
                return
              } catch {
                Start-Sleep -Seconds 3
              }
            }
            throw "Timed out waiting for $Url"
          }
          Wait-ForUrl "http://localhost:58083/wlt/readiness"

      - name: WireMock financial provider smoke
        run: pnpm run runtime:wiremock:financial:smoke

      - name: WLT provider-through-WLT smoke
        run: pnpm run runtime:wlt:provider:smoke

      - name: Docker compose ps
        if: always()
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.financial-simulators.yml ps

      - name: Docker compose logs on failure
        if: failure()
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.financial-simulators.yml logs --tail=200

      - name: Docker compose down
        if: always()
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml -f infra/docker/compose.financial-simulators.yml down -v --remove-orphans
