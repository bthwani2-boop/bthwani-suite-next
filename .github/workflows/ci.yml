name: BThwani Repository CI

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [sambassam, master]
    paths:
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

concurrency:
  group: repository-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Verify canonical governance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify canonical governance
        run: |
          pnpm run guard:governance-schema
          pnpm run guard:agent-governance
          pnpm run guard:authority-separation
          pnpm run guard:saas-governance
          pnpm run guard:guard-registry
          pnpm run guard:sdlc
          pnpm run guard:cleanup-policy

  integrity:
    name: Verify repository action integrity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify repository action integrity
        run: |
          pnpm run guard:actions-pin
          pnpm run guard:workflow-lint

  whitespace:
    name: Verify repository whitespace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Verify repository whitespace
        run: git diff --check

  result:
    name: BThwani Repository CI result
    needs: [governance, integrity, whitespace]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce CI result
        env:
          GOVERNANCE_RESULT: ${{ needs.governance.result }}
          INTEGRITY_RESULT: ${{ needs.integrity.result }}
          WHITESPACE_RESULT: ${{ needs.whitespace.result }}
        run: |
          if [ "${GOVERNANCE_RESULT}" != "success" ] || [ "${INTEGRITY_RESULT}" != "success" ] || [ "${WHITESPACE_RESULT}" != "success" ]; then
            echo "CI checks failed. Governance: ${GOVERNANCE_RESULT}, Integrity: ${INTEGRITY_RESULT}, Whitespace: ${WHITESPACE_RESULT}"
            exit 1
          fi
          echo "All parallel CI checks passed successfully."
