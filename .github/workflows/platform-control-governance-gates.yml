name: Platform Control Governance Gates

on:
  push:
    branches:
      - bassam
      - master
      - "bassam-platform-*-verify-*"
      - "bassam-platform-verification-*-*"
    paths:
      - "core/platform-control/**"
      - "core/identity/backend/**"
      - "governance/product/contracts/platform-executive-read-model.product-truth.json"
      - "services/dsh/frontend/shared/platform/**"
      - "services/dsh/frontend/shared/session/control-panel-permissions.ts"
      - "services/dsh/frontend/control-panel/platform/**"
      - "apps/control-panel/runtime/src/shell/useDshNavigation.ts"
      - "tools/scripts/platform-control-runtime.ps1"
      - ".github/workflows/platform-control-governance-gates.yml"
  pull_request:
    branches:
      - master
      - bassam
      - "bassam-platform-verification-base-*"
    paths:
      - "core/platform-control/**"
      - "core/identity/backend/**"
      - "governance/product/contracts/platform-executive-read-model.product-truth.json"
      - "services/dsh/frontend/shared/platform/**"
      - "services/dsh/frontend/shared/session/control-panel-permissions.ts"
      - "services/dsh/frontend/control-panel/platform/**"
      - "apps/control-panel/runtime/src/shell/useDshNavigation.ts"
      - "tools/scripts/platform-control-runtime.ps1"
      - ".github/workflows/platform-control-governance-gates.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: platform-control-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: Mandatory platform governance and full-stack gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Validate Product Truth and contracts
        run: pnpm run contracts:lint
      - name: Foundation gate
        run: pnpm run foundation:gate
      - name: Journey gate
        run: pnpm run journey:gate
      - name: Full-stack boundary
        run: pnpm run guard:fullstack-boundary
      - name: API binding
        run: pnpm run guard:api-binding
      - name: Backend API binding
        run: pnpm run guard:backend-api-binding
      - name: Frontend feature binding
        run: pnpm run guard:frontend-feature-binding
      - name: Service manifest drift
        run: pnpm run guard:service-manifest-drift
      - name: Runtime configuration
        run: pnpm run guard:runtime-config
      - name: UI kit boundary
        run: pnpm run guard:ui-kit-boundary
      - name: Broken imports
        run: pnpm run guard:no-broken-imports
