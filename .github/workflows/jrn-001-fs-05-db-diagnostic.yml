name: JRN-001 FS-05 DB diagnostic

on:
  push:
    branches: [sambassam]
    paths:
      - .github/workflows/jrn-001-fs-05-db-diagnostic.yml

permissions:
  contents: read
  statuses: write

jobs:
  diagnose-dsh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dsh_jrn001
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U postgres -d dsh_jrn001"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dsh_jrn001?sslmode=disable
      DSH_REQUIRE_DB_TESTS: "true"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.26.5'
          cache: false
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - shell: bash
        run: |
          while IFS= read -r migration; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration" >/dev/null; done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Diagnose DSH tests
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        working-directory: services/dsh/backend
        run: |
          set +e
          go test ./internal/partner -count=1 -run 'TestLinkPartnerStoreGovernedRejectsReassignmentDBIntegration|TestGovernedSubmissionRequiresWltPayoutReferenceDBIntegration|TestGovernedTransitionReplaysSameEventDBIntegration|TestUpdatePartnerGovernedPersistsOnlyWltReferenceDBIntegration|TestCreateFieldVisitGovernedBindsFirstStoreDBIntegration' 2>&1 | tee /tmp/dsh-db.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -eq 0 ]; then
            STATE=success
            TOKEN=pass
            DESCRIPTION='FS-05 DSH DB diagnostic passed'
          else
            FIRST="$(grep -m1 -E -- 'onboarding_integrity_db_test\.go:[0-9]+:' /tmp/dsh-db.log || grep -m1 -E -- '(pq:|undefined:|cannot use)' /tmp/dsh-db.log || true)"
            TOKEN="$(printf '%s' "$FIRST" | tr '[:upper:]' '[:lower:]' | tr -cs '[:alnum:]_.-' '-' | sed 's/^-//;s/-$//' | cut -c1-52)"
            DESCRIPTION="$(printf '%s' "$FIRST" | sed 's/^[[:space:]]*//' | cut -c1-120)"
            STATE=failure
          fi
          CONTEXT="journeys/jrn-001/fs-05-dsh/${TOKEN:-unknown}"
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json

  diagnose-wlt:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wlt_jrn001
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U postgres -d wlt_jrn001"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/wlt_jrn001?sslmode=disable
      WLT_REQUIRE_DB_TESTS: "true"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.26.5'
          cache: false
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - shell: bash
        run: |
          while IFS= read -r migration; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration" >/dev/null; done < <(find services/wlt/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Diagnose WLT tests
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        working-directory: services/wlt/backend
        run: |
          set +e
          go test ./internal/payout -count=1 -run TestGovernedPayoutDestinationIdempotencyAndSingleActiveDBIntegration 2>&1 | tee /tmp/wlt-db.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -eq 0 ]; then
            STATE=success
            TOKEN=pass
            DESCRIPTION='FS-05 WLT DB diagnostic passed'
          else
            FIRST="$(grep -m1 -E -- 'upsert_governed_db_test\.go:[0-9]+:' /tmp/wlt-db.log || grep -m1 -E -- '(pq:|undefined:|cannot use)' /tmp/wlt-db.log || true)"
            TOKEN="$(printf '%s' "$FIRST" | tr '[:upper:]' '[:lower:]' | tr -cs '[:alnum:]_.-' '-' | sed 's/^-//;s/-$//' | cut -c1-52)"
            DESCRIPTION="$(printf '%s' "$FIRST" | sed 's/^[[:space:]]*//' | cut -c1-120)"
            STATE=failure
          fi
          CONTEXT="journeys/jrn-001/fs-05-wlt/${TOKEN:-unknown}"
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
