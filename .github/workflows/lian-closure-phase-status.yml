name: Lian Closure Phase Status

on:
  push:
    branches: [lian]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: lian-closure-phase-status-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false, fetch-depth: 0 }
      - uses: ./.github/actions/setup-node-workspace
      - id: probe
        name: Probe governance phases
        shell: bash
        run: |
          set +e
          failures=()
          probe() { name="$1"; shift; echo "=== $name ==="; "$@"; code=$?; if [ $code -ne 0 ]; then failures+=("$name"); fi; }
          probe governance pnpm run guard:governance-all
          probe foundation pnpm run foundation:gate
          probe api-binding pnpm run guard:api-binding
          probe backend-binding pnpm run guard:backend-api-binding
          probe manifest pnpm run guard:service-manifest-drift
          probe frontend-binding pnpm run guard:frontend-feature-binding
          probe fullstack pnpm run guard:fullstack-boundary
          probe wlt-boundary pnpm run guard:wlt-financial-boundary
          probe runtime-bindings pnpm run guard:runtime-real-bindings
          probe journeys pnpm run guard:live-cross-journey-integrity
          probe imports pnpm run guard:no-broken-imports
          joined="$(IFS=,; echo "${failures[*]}")"
          echo "failures=$joined" >> "$GITHUB_OUTPUT"
          [ ${#failures[@]} -eq 0 ]
      - name: Publish governance phase status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURES: ${{ steps.probe.outputs.failures }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success; description='all governance phases passed'
          if [ -n "$FAILURES" ]; then state=failure; description="failed: $FAILURES"; fi
          description="${description:0:140}"
          jq -n --arg state "$state" --arg context 'Lian Probe / Governance' --arg description "$description" --arg target_url "$RUN_URL" '{state,context,description,target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json

  surfaces:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - uses: ./.github/actions/setup-node-workspace
      - id: probe
        name: Probe surface phases
        shell: bash
        run: |
          set +e
          failures=()
          probe() { name="$1"; shift; echo "=== $name ==="; "$@"; code=$?; if [ $code -ne 0 ]; then failures+=("$name"); fi; }
          probe client-commerce node tools/guards/client-commerce/client-commerce-truth-gate.mjs
          probe partner node tools/guards/partner/partner-surface-truth-gate.mjs
          probe maps node tools/guards/maps/map-platform-truth-gate.mjs
          probe policy-ui node tools/guards/platform/operational-policy-ui-truth-gate.mjs
          probe privacy node tools/guards/privacy/client-address-privacy-truth-gate.mjs
          probe privacy-integration node tools/guards/privacy/client-address-privacy-integration-gate.mjs
          probe ui-actions node tools/guards/ui-actions/ui-action-binding-gate.mjs
          probe ui-kit pnpm run guard:ui-kit-boundary
          probe ui-provider pnpm run guard:ui-provider
          probe icons pnpm run guard:icon-contract
          probe tokens pnpm run guard:design-tokens
          probe a11y pnpm run guard:a11y
          probe typecheck pnpm run typecheck
          probe build pnpm run build
          joined="$(IFS=,; echo "${failures[*]}")"
          echo "failures=$joined" >> "$GITHUB_OUTPUT"
          [ ${#failures[@]} -eq 0 ]
      - name: Publish surface phase status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURES: ${{ steps.probe.outputs.failures }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success; description='all surface phases passed'
          if [ -n "$FAILURES" ]; then state=failure; description="failed: $FAILURES"; fi
          description="${description:0:140}"
          jq -n --arg state "$state" --arg context 'Lian Probe / Surfaces' --arg description "$description" --arg target_url "$RUN_URL" '{state,context,description,target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json

  go-services:
    name: Go phase status — ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: DSH, directory: services/dsh/backend, go_mod: services/dsh/backend/go.mod, go_sum: services/dsh/backend/go.sum }
          - { name: WLT, directory: services/wlt/backend, go_mod: services/wlt/backend/go.mod, go_sum: services/wlt/backend/go.sum }
          - { name: Identity, directory: core/identity/backend, go_mod: core/identity/backend/go.mod, go_sum: core/identity/backend/go.sum }
          - { name: Workforce, directory: core/workforce/backend, go_mod: core/workforce/backend/go.mod, go_sum: core/workforce/backend/go.sum }
          - { name: Platform-Control, directory: core/platform-control/backend, go_mod: core/platform-control/backend/go.mod, go_sum: core/platform-control/backend/go.sum }
          - { name: Providers, directory: core/providers/backend, go_mod: core/providers/backend/go.mod, go_sum: core/providers/backend/go.sum }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: ${{ matrix.go_mod }}
          cache: true
          cache-dependency-path: ${{ matrix.go_sum }}
      - id: probe
        working-directory: ${{ matrix.directory }}
        shell: bash
        run: |
          set +e
          failures=()
          files="$(gofmt -l .)"; if [ -n "$files" ]; then echo "$files"; failures+=(gofmt); fi
          go vet ./... || failures+=(vet)
          go test ./... -count=1 || failures+=(test)
          go build ./... || failures+=(build)
          joined="$(IFS=,; echo "${failures[*]}")"
          echo "failures=$joined" >> "$GITHUB_OUTPUT"
          [ ${#failures[@]} -eq 0 ]
      - name: Publish Go phase status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURES: ${{ steps.probe.outputs.failures }}
          SERVICE: ${{ matrix.name }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success; description='gofmt, vet, test and build passed'
          if [ -n "$FAILURES" ]; then state=failure; description="failed: $FAILURES"; fi
          jq -n --arg state "$state" --arg context "Lian Probe / Go / $SERVICE" --arg description "$description" --arg target_url "$RUN_URL" '{state,context,description,target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json

  powershell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - id: probe
        shell: pwsh
        run: |
          $files = @(
            "tools/scripts/run-lian-full-runtime-closure.ps1",
            "tools/scripts/run-lian-full-runtime-closure-v2.ps1",
            "tools/scripts/test-wlt-runtime-failure-matrix.ps1",
            "tools/scripts/test-runtime-backup-restore.ps1",
            "tools/scripts/test-dsh-multisurface-runtime-matrix.ps1",
            "tools/scripts/test-dsh-multisurface-runtime-matrix-v2.ps1",
            "tools/scripts/test-dsh-support-notifications-runtime-matrix.ps1",
            "infra/docker/scripts/backup-runtime.ps1",
            "infra/docker/scripts/restore-runtime.ps1",
            "infra/docker/scripts/restore-verify-runtime.ps1"
          )
          $failed = @()
          foreach ($file in $files) {
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) { $failed += (Split-Path $file -Leaf); $errors | ForEach-Object { Write-Error $_.Message } }
          }
          "failures=$($failed -join ',')" >> $env:GITHUB_OUTPUT
          if ($failed.Count -gt 0) { exit 1 }
      - name: Publish PowerShell phase status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURES: ${{ steps.probe.outputs.failures }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success; description='all governed PowerShell scripts parsed'
          if [ -n "$FAILURES" ]; then state=failure; description="parse failed: $FAILURES"; fi
          description="${description:0:140}"
          jq -n --arg state "$state" --arg context 'Lian Probe / PowerShell' --arg description "$description" --arg target_url "$RUN_URL" '{state,context,description,target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json

  dsh-database:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: dsh_probe, POSTGRES_PASSWORD: dsh_probe_password, POSTGRES_DB: dsh_probe }
        ports: ["55432:5432"]
        options: >-
          --health-cmd="pg_isready -U dsh_probe -d dsh_probe" --health-interval=5s --health-timeout=5s --health-retries=20
    env:
      DATABASE_URL: postgres://dsh_probe:dsh_probe_password@localhost:55432/dsh_probe?sslmode=disable
      PGPASSWORD: dsh_probe_password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - id: probe
        shell: bash
        run: |
          set +e
          failures=()
          for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name 'dsh-*.sql' | sort); do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" || { failures+=("apply:$(basename "$file")"); break; }; done
          if [ ${#failures[@]} -eq 0 ]; then for file in $(find services/dsh/database/tests -maxdepth 1 -type f -name '*.sql' | sort); do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" || { failures+=("test:$(basename "$file")"); break; }; done; fi
          if [ ${#failures[@]} -eq 0 ]; then for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name 'dsh-*.sql' | sort); do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" || { failures+=("replay:$(basename "$file")"); break; }; done; fi
          joined="$(IFS=,; echo "${failures[*]}")"; echo "failures=$joined" >> "$GITHUB_OUTPUT"; [ ${#failures[@]} -eq 0 ]
      - name: Publish DSH database phase status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURES: ${{ steps.probe.outputs.failures }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success; description='apply, invariants and replay passed'
          if [ -n "$FAILURES" ]; then state=failure; description="$FAILURES"; fi
          description="${description:0:140}"
          jq -n --arg state "$state" --arg context 'Lian Probe / Database / DSH' --arg description "$description" --arg target_url "$RUN_URL" '{state,context,description,target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json

  wlt-database:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: wlt_probe, POSTGRES_PASSWORD: wlt_probe_password, POSTGRES_DB: wlt_probe }
        ports: ["55433:5432"]
        options: >-
          --health-cmd="pg_isready -U wlt_probe -d wlt_probe" --health-interval=5s --health-timeout=5s --health-retries=20
    env:
      DATABASE_URL: postgres://wlt_probe:wlt_probe_password@localhost:55433/wlt_probe?sslmode=disable
      PGPASSWORD: wlt_probe_password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - id: probe
        shell: bash
        run: |
          set +e
          failures=()
          for file in $(find services/wlt/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" || { failures+=("apply:$(basename "$file")"); break; }; done
          if [ ${#failures[@]} -eq 0 ] && [ -d services/wlt/database/tests ]; then for file in $(find services/wlt/database/tests -maxdepth 1 -type f -name '*.sql' | sort); do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" || { failures+=("test:$(basename "$file")"); break; }; done; fi
          if [ ${#failures[@]} -eq 0 ]; then for file in $(find services/wlt/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" || { failures+=("replay:$(basename "$file")"); break; }; done; fi
          joined="$(IFS=,; echo "${failures[*]}")"; echo "failures=$joined" >> "$GITHUB_OUTPUT"; [ ${#failures[@]} -eq 0 ]
      - name: Publish WLT database phase status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURES: ${{ steps.probe.outputs.failures }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success; description='apply, invariants and replay passed'
          if [ -n "$FAILURES" ]; then state=failure; description="$FAILURES"; fi
          description="${description:0:140}"
          jq -n --arg state "$state" --arg context 'Lian Probe / Database / WLT' --arg description "$description" --arg target_url "$RUN_URL" '{state,context,description,target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json
