name: CI — Full Baseline Gate

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'manual full baseline verification'

permissions:
  contents: read

concurrency:
  group: ci-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-full-gate:
    name: Node / PNPM full gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Contracts lint
        run: pnpm run contracts:lint

      - name: Guard — no broken imports
        run: pnpm run guard:no-broken-imports

      - name: Guard — runtime config
        run: pnpm run guard:runtime-config

      - name: Guard — UI kit boundary
        run: pnpm run guard:ui-kit-boundary

      - name: Guard — fullstack boundary
        run: pnpm run guard:fullstack-boundary

      - name: Guard — WLT financial boundary
        run: pnpm run guard:wlt-financial-boundary

      - name: Guard — cleanup policy
        run: pnpm run guard:cleanup-policy

      - name: Guard — API binding
        run: pnpm run guard:api-binding

      - name: OpenAPI client drift check
        run: |
          pnpm run openapi:generate
          git diff --exit-code services/dsh/clients/generated/ services/wlt/clients/generated/ core/identity/clients/generated/ || \
            (echo "ERROR: Generated API clients have drifted from OpenAPI specs. Run 'pnpm run openapi:generate' and commit." && exit 1)

      - name: Foundation gate
        run: pnpm run foundation:gate

      - name: Journey gate
        run: pnpm run journey:gate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  wlt-go:
    name: WLT Go backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache: true

      - name: Go test
        working-directory: services/wlt/backend
        run: go test ./...

      - name: Go build
        working-directory: services/wlt/backend
        run: go build ./...

  wlt-go-db:
    name: WLT Go DB integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
          POSTGRES_PASSWORD: bthwani_runtime_password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache: true

      - name: Install postgresql-client
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql --version

      - name: Initialize Databases
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: bthwani_runtime_password
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
        run: |
          sh infra/data-plane/postgres/init/001_create_runtime_databases.sh

      - name: Run WLT migrations
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: bthwani_runtime_password
        run: |
          for f in services/wlt/database/migrations/*.sql; do
            echo "Applying $f"
            psql -h localhost -U wlt_runtime -d wlt_runtime -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run WLT tests with DB required
        working-directory: services/wlt/backend
        env:
          DATABASE_URL: postgres://wlt_runtime:wlt_runtime_password@localhost:5432/wlt_runtime?sslmode=disable
          WLT_REQUIRE_DB_TESTS: "true"
        run: go test -v ./...

  dsh-go:
    name: DSH Go backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true

      - name: Go test
        working-directory: services/dsh/backend
        run: go test ./...

      - name: Go build
        working-directory: services/dsh/backend
        run: go build ./...

  dsh-go-db:
    name: DSH Go DB integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
          POSTGRES_PASSWORD: bthwani_runtime_password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true

      - name: Install postgresql-client
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql --version

      - name: Initialize Databases
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: bthwani_runtime_password
          POSTGRES_USER: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
        run: |
          sh infra/data-plane/postgres/init/001_create_runtime_databases.sh

      - name: Run DSH migrations
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: bthwani_runtime_password
        run: |
          for f in services/dsh/database/migrations/*.sql; do
            echo "Applying $f"
            psql -h localhost -U dsh_runtime -d dsh_runtime -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run DSH local seeds
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: bthwani_runtime_password
        run: |
          for f in services/dsh/database/seeds/local/*.sql; do
            echo "Applying $f"
            psql -h localhost -U dsh_runtime -d dsh_runtime -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run DSH tests with DB required
        working-directory: services/dsh/backend
        env:
          DATABASE_URL: postgres://dsh_runtime:dsh_runtime_password@localhost:5432/dsh_runtime?sslmode=disable
          DSH_REQUIRE_DB_TESTS: "true"
        run: go test -v ./...

  identity-go:
    name: Identity Go backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/identity/backend/go.mod
          cache: true

      - name: Go test
        working-directory: core/identity/backend
        run: go test ./...

      - name: Go build
        working-directory: core/identity/backend
        run: go build ./...

  report-failure:
    name: Upload failure artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: failure()
    needs: [node-full-gate, wlt-go, wlt-go-db, dsh-go, dsh-go-db, identity-go]

    steps:
      - name: Collect failure summary
        run: |
          echo "# CI Full Gate Failure Report" > failure-report.md
          echo "" >> failure-report.md
          echo "- Run: ${{ github.run_id }}" >> failure-report.md
          echo "- SHA: ${{ github.sha }}" >> failure-report.md
          echo "- Branch: ${{ github.ref_name }}" >> failure-report.md
          echo "- Triggered by: ${{ github.event_name }}" >> failure-report.md
          echo "- Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> failure-report.md

      - name: Upload failure report
        uses: actions/upload-artifact@v4
        with:
          name: ci-full-failure-${{ github.run_id }}
          path: failure-report.md
          retention-days: 14
