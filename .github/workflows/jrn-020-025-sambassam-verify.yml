name: JRN 020-025 sambassam verification
# Permanent closure verification for unified journeys 020 through 025 and global ownership boundaries.

on:
  push:
    branches:
      - sambassam

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-020-025-sambassam-${{ github.sha }}
  cancel-in-progress: false

jobs:
  targeted-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout pinned source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup locked Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0

      - name: Activate locked pnpm
        run: |
          echo "activate-pnpm" > /tmp/jrn-verification-stage
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          node --version
          pnpm --version

      - name: Install locked workspace
        run: |
          echo "install-workspace" > /tmp/jrn-verification-stage
          pnpm install --frozen-lockfile

      - name: Create journey-scoped TypeScript project
        run: |
          mkdir -p .tmp
          cat > .tmp/jrn-020-025.tsconfig.json <<'JSON'
          {
            "extends": "../tsconfig.base.json",
            "compilerOptions": { "noEmit": true },
            "files": [
              "../services/dsh/frontend/css-modules.d.ts",
              "../services/dsh/frontend/shared/dispatch/index.ts",
              "../services/dsh/frontend/shared/support/index.ts",
              "../services/dsh/frontend/shared/orders/index.ts",
              "../services/dsh/frontend/shared/operations/index.ts",
              "../services/dsh/frontend/shared/workforce/index.ts",
              "../services/dsh/frontend/shared/partner/index.ts",
              "../services/dsh/frontend/shared/special-requests/index.ts",
              "../services/dsh/frontend/shared/notifications/index.ts",
              "../services/dsh/frontend/shared/field-readiness/index.ts",
              "../services/dsh/frontend/shared/marketing/index.ts",
              "../services/dsh/frontend/shared/support/support-mutation-attempt.ts",
              "../services/dsh/frontend/shared/delivery/delivery.policy.ts",
              "../services/dsh/frontend/shared/delivery/captain-navigation.model.ts",
              "../services/dsh/frontend/app-client/orders/useClientOrderJourneyController.ts",
              "../services/dsh/frontend/app-client/orders/OrderTrackingScreen.tsx",
              "../services/dsh/frontend/app-partner/account/PartnerHubScreen.tsx",
              "../services/dsh/frontend/app-partner/account/PartnerAnalyticsInsightsPanel.tsx",
              "../services/dsh/frontend/app-partner/orders/PartnerFulfillmentActionsPanel.tsx",
              "../services/dsh/frontend/app-partner/orders/PreparationEstimateRevisionPanel.tsx",
              "../services/dsh/frontend/app-partner/orders/usePartnerOrderCommands.ts",
              "../services/dsh/frontend/app-partner/orders/usePartnerOrdersRuntime.ts",
              "../services/dsh/frontend/app-captain/DshCaptainRouteRenderer.tsx",
              "../services/dsh/frontend/app-captain/orders/DshCaptainPoDSubmissionScreen.tsx",
              "../services/dsh/frontend/app-captain/orders/CaptainOrderSupportConversationScreen.tsx",
              "../services/dsh/frontend/app-captain/orders/OrderChatSection.tsx",
              "../services/dsh/frontend/app-captain/account/CaptainSupportScreenRouter.tsx",
              "../services/dsh/frontend/app-field/account/DshFieldProfileHomeScreen.tsx",
              "../services/dsh/frontend/app-field/account/DshFieldProfileScreen.tsx",
              "../services/dsh/frontend/control-panel/operations/ExceptionsEscalationsScreen.tsx",
              "../services/dsh/frontend/control-panel/operations/OrderJourneyDispatchAssignmentScreen.tsx",
              "../services/dsh/frontend/control-panel/operations/OrderJourneyLiveOrdersScreen.tsx",
              "../services/dsh/frontend/control-panel/operations/OrderJourneyOperatorIntervention.tsx"
            ]
          }
          JSON

      - name: Typecheck journey files and multisurface consumers
        shell: bash
        run: |
          echo "typecheck-journey-files" > /tmp/jrn-verification-stage
          set +e
          pnpm exec tsc --noEmit -p .tmp/jrn-020-025.tsconfig.json 2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"

      - name: Run journey binding tests
        shell: bash
        run: |
          echo "journey-binding-tests" > /tmp/jrn-verification-stage
          set +e
          node --test services/dsh/tests/journeys-020-025-binding.test.mjs 2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"

      - name: Setup locked Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Run journey backend domain tests
        shell: bash
        working-directory: services/dsh/backend
        run: |
          echo "journey-backend-domain-tests" > /tmp/jrn-verification-stage
          set +e
          go test \
            ./internal/dispatch \
            ./internal/support \
            ./internal/notifications \
            ./internal/specialrequests \
            ./internal/fieldreadiness \
            ./internal/marketing \
            2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"

      - name: Run journey HTTP route matrix
        shell: bash
        working-directory: services/dsh/backend
        run: |
          echo "journey-http-route-matrix" > /tmp/jrn-verification-stage
          set +e
          go test ./internal/http -run '^TestJourneys020To025ExposeGovernedRoutes$' -count=1 \
            2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"

      - name: Compile DSH API entrypoint
        shell: bash
        working-directory: services/dsh/backend
        run: |
          echo "compile-dsh-api" > /tmp/jrn-verification-stage
          set +e
          go test ./cmd/dsh-api -run '^$' -count=1 2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"

      - name: Full-stack ownership boundary
        shell: bash
        run: |
          echo "guard-fullstack-boundary" > /tmp/jrn-verification-stage
          set +e
          pnpm run guard:fullstack-boundary 2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"

      - name: WLT financial boundary
        shell: bash
        run: |
          echo "guard-wlt-financial-boundary" > /tmp/jrn-verification-stage
          set +e
          pnpm run guard:wlt-financial-boundary 2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"

      - name: Publish targeted commit status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          STAGE="$(cat /tmp/jrn-verification-stage 2>/dev/null || echo workflow-bootstrap)"
          if [ "$JOB_STATUS" = "success" ]; then
            STATE="success"
            STATUS_CONTEXT="journeys/jrn-020-025-targeted"
            DESCRIPTION="JRN-020..025 targeted checks passed"
          else
            STATE="failure"
            RAW_ERROR="$(grep -m1 -E 'error TS[0-9]+|not ok|Error:|ERR_|FAIL|panic:' /tmp/jrn-verification.log 2>/dev/null || true)"
            ERROR_CODE="$(printf '%s' "$RAW_ERROR" | grep -o -m1 -E 'TS[0-9]+|ERR_[A-Z0-9_]+' || true)"
            ERROR_FILE="$(printf '%s' "$RAW_ERROR" | sed -E 's/^.*\/(.*\.(ts|tsx|go|mjs))[:(].*/\1/' | cut -c1-38)"
            [ -n "$ERROR_CODE" ] || ERROR_CODE="check-failed"
            [ -n "$ERROR_FILE" ] || ERROR_FILE="unknown-file"
            STATUS_CONTEXT="journeys/jrn-020-025/$STAGE/$ERROR_FILE-$ERROR_CODE"
            STATUS_CONTEXT="$(printf '%s' "$STATUS_CONTEXT" | tr -cd '[:alnum:]_./:-' | cut -c1-100)"
            DESCRIPTION="JRN-020..025 failed at $STAGE"
          fi
          PAYLOAD="$(jq -n \
            --arg state "$STATE" \
            --arg context "$STATUS_CONTEXT" \
            --arg description "$DESCRIPTION" \
            --arg target_url "$TARGET_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d "$PAYLOAD"
