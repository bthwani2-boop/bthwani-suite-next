name: JRN-001 FS-15 Observability

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/contracts/jrn-001-observability-slo.json
      - governance/runbooks/JRN-001_PARTNER_ONBOARDING_SUPPORT.md
      - services/dsh/backend/internal/partner/**
      - services/dsh/backend/internal/partnerwltoutbox/**
      - services/dsh/frontend/shared/partner/partner-onboarding.visible-state.ts
      - tools/guards/partner/jrn-001-observability-gate.mjs
      - .github/workflows/jrn-001-fs-15-observability.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Verify SLO alerts diagnostics and runbook
        run: node tools/guards/partner/jrn-001-observability-gate.mjs
      - name: Publish FS-15 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ "$RESULT" = success ] && STATE=success || STATE=failure
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-15-observability' --arg description "FS-15 observability: $RESULT" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
