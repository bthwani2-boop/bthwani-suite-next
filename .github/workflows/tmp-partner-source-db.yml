name: Temporary Partner Source DB Closure
run-name: Partner Source DB · ${{ github.sha }}

on:
  push:
    branches: ["tmp/partner-closure-run"]
    paths:
      - ".github/partner-source-db-trigger"
      - ".github/workflows/tmp-partner-source-db.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: tmp-partner-source-db-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source-db:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dsh_ci
          POSTGRES_PASSWORD: dsh_ci_password
          POSTGRES_DB: dsh_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dsh_ci -d dsh_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://dsh_ci:dsh_ci_password@localhost:5432/dsh_ci?sslmode=disable
      DSH_REQUIRE_DB_TESTS: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify partner formatting
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l internal/partner internal/http/partner_team_audit.go internal/http/partner_fleet.go internal/http/partner_support.go)"
          test -z "$files" || { printf 'Unformatted files:\n%s\n' "$files"; exit 1; }
      - name: Vet partner package
        working-directory: services/dsh/backend
        shell: bash
        run: go vet ./internal/partner
      - name: Compile HTTP package
        working-directory: services/dsh/backend
        shell: bash
        run: go test ./internal/http -run '^$' -count=1
      - name: Apply DSH migration chain
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Prove partner audit migration and invariants
        shell: bash
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-088_partner_team_action_runtime_audit.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/tests/dsh-088_partner_team_action_runtime_audit.sql
      - name: Run partner unit tests
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../../../artifacts/partner-source-db
          go test ./internal/partner -count=1 -json | tee ../../../artifacts/partner-source-db/go-test.json
      - name: Upload partner test diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: partner-source-db-${{ github.sha }}
          path: artifacts/partner-source-db
          if-no-files-found: warn
          retention-days: 7

  publish:
    if: always()
    needs: [source-db]
    runs-on: ubuntu-latest
    steps:
      - name: Publish source DB status
        env:
          RESULT: ${{ needs.source-db.result }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          state=failure; [ "$RESULT" = success ] && state=success
          jq -n --arg state "$state" --arg context "Partner Source DB" --arg description "result=$RESULT run=${GITHUB_RUN_ID}" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > payload.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @payload.json
          test "$state" = success