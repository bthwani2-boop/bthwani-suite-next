name: Temporary Partner Final Closure
run-name: Partner Final Closure · ${{ github.sha }}

on:
  push:
    branches: ["tmp/partner-closure-run"]
    paths:
      - ".github/partner-source-db-trigger"
      - ".github/workflows/tmp-partner-source-db.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: tmp-partner-final-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source-db:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dsh_ci
          POSTGRES_PASSWORD: dsh_ci_password
          POSTGRES_DB: dsh_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dsh_ci -d dsh_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://dsh_ci:dsh_ci_password@localhost:5432/dsh_ci?sslmode=disable
      DSH_REQUIRE_DB_TESTS: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify partner source
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l internal/partner internal/http/partner_team_audit.go internal/http/partner_fleet.go internal/http/partner_support.go)"
          test -z "$files" || { printf 'Unformatted files:\n%s\n' "$files"; exit 1; }
          go vet ./internal/partner
          go test ./internal/http -run '^$' -count=1
      - name: Apply DSH migrations and invariants
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-088_partner_team_action_runtime_audit.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/tests/dsh-088_partner_team_action_runtime_audit.sql
      - name: Run partner unit tests
        working-directory: services/dsh/backend
        shell: bash
        run: go test ./internal/partner -count=1 -v

  contracts-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - name: Validate partner contracts and bindings
        shell: bash
        run: |
          set -euo pipefail
          pnpm run contracts:lint
          pnpm run guard:partner-surface-truth
          pnpm run guard:partner-support-truth
          pnpm run guard:wlt-financial-boundary

  runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Verify PowerShell
        shell: bash
        run: pwsh --version
      - name: Build Identity
        shell: bash
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml --profile identity build identity-api
      - name: Run focused partner runtime
        shell: pwsh
        run: ./tools/scripts/invoke-partner-multisurface-runtime-closure.ps1
      - name: Diagnostics
        if: failure()
        shell: bash
        run: |
          docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml --profile identity --profile workforce --profile dsh --profile media --profile wlt ps -a || true
          docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml --profile identity --profile workforce --profile dsh --profile media --profile wlt logs --tail=400 identity-api workforce-api dsh-api wlt-api postgres minio || true
          find artifacts/partner-journey-closure -maxdepth 1 -type f -print -exec tail -n 300 {} \; || true
      - name: Stop runtime
        if: always()
        shell: pwsh
        run: ./infra/docker/scripts/runtime.ps1 -Action down -Profiles identity,workforce,dsh,media,wlt
      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: partner-runtime-evidence-${{ github.sha }}
          path: artifacts/partner-journey-closure
          if-no-files-found: warn
          retention-days: 14

  publish:
    if: always()
    needs: [source-db, contracts-guards, runtime]
    runs-on: ubuntu-latest
    steps:
      - name: Publish final partner closure statuses
        env:
          SOURCE: ${{ needs.source-db.result }}
          CONTRACTS: ${{ needs.contracts-guards.result }}
          RUNTIME: ${{ needs.runtime.result }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          publish_status() {
            local context="$1" result="$2"
            local state=failure
            [ "$result" = success ] && state=success
            jq -n --arg state "$state" --arg context "$context" --arg description "result=$result run=${GITHUB_RUN_ID}" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > payload.json
            curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @payload.json
          }
          publish_status "Partner Source DB" "$SOURCE"
          publish_status "Partner Contracts Guards" "$CONTRACTS"
          publish_status "Partner Runtime" "$RUNTIME"
          test "$SOURCE" = success
          test "$CONTRACTS" = success
          test "$RUNTIME" = success
