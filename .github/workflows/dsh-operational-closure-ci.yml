name: DSH Operational Closure CI

on:
  push:
    branches:
      - bassam
      - master
    paths:
      - "services/dsh/**"
      - "services/wlt/**"
      - "core/workforce/**"
      - "shared/ui-kit/**"
      - "apps/app-client/**"
      - "apps/app-partner/**"
      - "apps/app-captain/**"
      - "apps/app-field/**"
      - "apps/control-panel/**"
      - "governance/product/**"
      - "governance/operational_journey_protocol_package/sdlc/**"
      - "tools/guards/**"
      - "package.json"
      - ".github/workflows/dsh-operational-closure-ci.yml"
  pull_request:
    branches:
      - master
    paths:
      - "services/dsh/**"
      - "services/wlt/**"
      - "core/workforce/**"
      - "shared/ui-kit/**"
      - "apps/app-client/**"
      - "apps/app-partner/**"
      - "apps/app-captain/**"
      - "apps/app-field/**"
      - "apps/control-panel/**"
      - "governance/product/**"
      - "governance/operational_journey_protocol_package/sdlc/**"
      - "tools/guards/**"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dsh-operational-closure-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dsh-backend:
    name: DSH backend contract database and tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dsh_ci
          POSTGRES_PASSWORD: dsh_ci_password
          POSTGRES_DB: dsh_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dsh_ci -d dsh_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://dsh_ci:dsh_ci_password@localhost:5432/dsh_ci?sslmode=disable
      DSH_REQUIRE_DB_TESTS: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify Go formatting without modifying source
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Unformatted files:\n%s\n' "$files"; exit 1; }
      - name: Vet
        working-directory: services/dsh/backend
        run: go vet ./...
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply DSH migrations to clean PostgreSQL
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Unit and database integration tests
        working-directory: services/dsh/backend
        run: go test ./... -count=1

  wlt-backend:
    name: WLT backend format vet and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache: true
          cache-dependency-path: services/wlt/backend/go.sum
      - name: Verify Go formatting without modifying source
        working-directory: services/wlt/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Unformatted files:\n%s\n' "$files"; exit 1; }
      - name: Vet
        working-directory: services/wlt/backend
        run: go vet ./...
      - name: Unit tests
        working-directory: services/wlt/backend
        run: go test ./... -count=1

  workforce-backend:
    name: Workforce backend database and tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workforce_ci
          POSTGRES_PASSWORD: workforce_ci_password
          POSTGRES_DB: workforce_ci
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U workforce_ci -d workforce_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://workforce_ci:workforce_ci_password@localhost:5433/workforce_ci?sslmode=disable
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/workforce/backend/go.mod
          cache: true
          cache-dependency-path: core/workforce/backend/go.sum
      - name: Verify Go formatting without modifying source
        working-directory: core/workforce/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Unformatted files:\n%s\n' "$files"; exit 1; }
      - name: Vet
        working-directory: core/workforce/backend
        run: go vet ./...
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply Workforce migrations to clean PostgreSQL
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done < <(find core/workforce/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Unit and database integration tests
        working-directory: core/workforce/backend
        run: go test ./... -count=1

  fullstack-binding:
    name: Full-stack contract and binding gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate contracts
        run: pnpm run contracts:lint
      - name: Verify generated clients are current
        shell: bash
        run: |
          set -euo pipefail
          pnpm run openapi:generate:dsh
          pnpm run openapi:generate:wlt
          pnpm run openapi:generate:workforce
          git diff --exit-code -- \
            services/dsh/clients/generated/dsh-api.ts \
            services/wlt/clients/generated/wlt-api.ts \
            core/workforce/clients/generated/workforce-api.ts
      - name: Binding and boundary gates
        run: |
          pnpm run guard:backend-api-binding
          pnpm run guard:api-binding
          pnpm run guard:frontend-feature-binding
          pnpm run guard:fullstack-boundary
          pnpm run guard:wlt-financial-boundary
          pnpm run guard:runtime-real-bindings
      - name: Typecheck
        run: pnpm run typecheck

  governance-and-sdlc:
    name: Governance Product Truth and SDLC support
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Governance contracts and workflow policy
        run: |
          pnpm run guard:governance-schema
          pnpm run guard:agent-governance
          pnpm run guard:guard-registry
      - name: SDLC structural and Product Truth integration
        run: pnpm run guard:sdlc

  migration-static:
    name: Migration transaction invariants
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Verify required migrations are transactional
        shell: bash
        run: |
          set -euo pipefail
          migrations=(
            services/dsh/database/migrations/dsh-056_special_requests_tenancy.sql
            services/dsh/database/migrations/dsh-059_special_request_dispatch_stage_sync.sql
            services/wlt/database/migrations/wlt-024_payment_session_tenancy.sql
            core/workforce/database/migrations/workforce-004_captain_license_evidence_gate.sql
          )
          for migration in "${migrations[@]}"; do
            test -f "$migration"
            grep -q '^BEGIN;' "$migration"
            grep -q '^COMMIT;' "$migration"
          done
          grep -q 'trg_dsh_sync_special_request_dispatch_stage' services/dsh/database/migrations/dsh-059_special_request_dispatch_stage_sync.sql
          grep -q 'workforce_captain_license_evidence_trg' core/workforce/database/migrations/workforce-004_captain_license_evidence_gate.sql

  closure-result:
    name: DSH operational closure result
    if: always()
    needs:
      - dsh-backend
      - wlt-backend
      - workforce-backend
      - fullstack-binding
      - governance-and-sdlc
      - migration-static
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require every closure job to pass
        env:
          DSH: ${{ needs.dsh-backend.result }}
          WLT: ${{ needs.wlt-backend.result }}
          WORKFORCE: ${{ needs.workforce-backend.result }}
          FULLSTACK: ${{ needs.fullstack-binding.result }}
          GOVERNANCE: ${{ needs.governance-and-sdlc.result }}
          MIGRATIONS: ${{ needs.migration-static.result }}
        shell: bash
        run: |
          set -euo pipefail
          test "$DSH" = success
          test "$WLT" = success
          test "$WORKFORCE" = success
          test "$FULLSTACK" = success
          test "$GOVERNANCE" = success
          test "$MIGRATIONS" = success
