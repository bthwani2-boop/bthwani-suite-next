name: DSH Operational Verification

on:
  push:
    branches: [bassam, master]
    paths:
      - "services/dsh/**"
      - "services/wlt/**"
      - "core/workforce/**"
      - "shared/ui-kit/**"
      - "apps/app-client/**"
      - "apps/app-partner/**"
      - "apps/app-captain/**"
      - "apps/app-field/**"
      - "apps/control-panel/**"
      - "governance/guards/frontend-binding-registry*.json"
      - "tools/guards/frontend-feature-binding-gate.mjs"
      - "tools/guards/runtime-real-bindings-gate.mjs"
      - "tools/guards/live-cross-journey-integrity-gate.mjs"
      - ".github/workflows/dsh-operational-closure-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "services/dsh/**"
      - "services/wlt/**"
      - "core/workforce/**"
      - "shared/ui-kit/**"
      - "apps/app-client/**"
      - "apps/app-partner/**"
      - "apps/app-captain/**"
      - "apps/app-field/**"
      - "apps/control-panel/**"
      - "governance/guards/frontend-binding-registry*.json"
      - "tools/guards/frontend-feature-binding-gate.mjs"
      - "tools/guards/runtime-real-bindings-gate.mjs"
      - "tools/guards/live-cross-journey-integrity-gate.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dsh-operational-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dsh-backend-database:
    name: DSH backend database and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dsh_ci
          POSTGRES_PASSWORD: dsh_ci_password
          POSTGRES_DB: dsh_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dsh_ci -d dsh_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://dsh_ci:dsh_ci_password@localhost:5432/dsh_ci?sslmode=disable
      DSH_REQUIRE_DB_TESTS: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify format vet and tests
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Unformatted DSH files:\n%s\n' "$files"; exit 1; }
          go vet ./...
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply all DSH migrations
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "Applying $migration"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Unit and database integration tests
        working-directory: services/dsh/backend
        run: go test ./... -count=1

  wlt-backend:
    name: WLT backend format vet and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache: true
          cache-dependency-path: services/wlt/backend/go.sum
      - name: Verify format vet and tests
        working-directory: services/wlt/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Unformatted WLT files:\n%s\n' "$files"; exit 1; }
          go vet ./...
          go test ./... -count=1

  workforce-backend-database:
    name: Workforce backend database and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workforce_ci
          POSTGRES_PASSWORD: workforce_ci_password
          POSTGRES_DB: workforce_ci
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U workforce_ci -d workforce_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://workforce_ci:workforce_ci_password@localhost:5433/workforce_ci?sslmode=disable
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: core/workforce/backend/go.mod
          cache: true
          cache-dependency-path: core/workforce/backend/go.sum
      - name: Verify format and vet
        working-directory: core/workforce/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Unformatted Workforce files:\n%s\n' "$files"; exit 1; }
          go vet ./...
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply all Workforce migrations
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "Applying $migration"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done < <(find core/workforce/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Unit and database integration tests
        working-directory: core/workforce/backend
        run: go test ./... -count=1

  dsh-static-fullstack:
    name: DSH static contract and cross-surface binding
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify DSH static full-stack chain and regressions
        shell: bash
        run: |
          set +e
          failures=0
          run_check() {
            local name="$1"
            shift
            echo "::group::$name"
            "$@"
            local result=$?
            echo "::endgroup::"
            if [ "$result" -ne 0 ]; then failures=$((failures + 1)); fi
          }
          run_check contracts pnpm run contracts:lint
          run_check backend-api pnpm run guard:backend-api-binding
          run_check api-binding pnpm run guard:api-binding
          run_check frontend-static-binding pnpm run guard:frontend-feature-binding
          run_check fullstack-boundary pnpm run guard:fullstack-boundary
          run_check wlt-boundary pnpm run guard:wlt-financial-boundary
          run_check runtime-anti-stub pnpm run guard:runtime-real-bindings
          run_check cross-journey-regression pnpm run guard:live-cross-journey-integrity
          test "$failures" -eq 0

  migration-invariants:
    name: DSH WLT and Workforce migration invariants
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Verify every migration is transaction-bounded
        shell: bash
        run: |
          set -euo pipefail
          failures=0
          while IFS= read -r migration; do
            grep -q '^BEGIN;' "$migration" || { echo "$migration: missing BEGIN"; failures=$((failures + 1)); }
            grep -q '^COMMIT;' "$migration" || { echo "$migration: missing COMMIT"; failures=$((failures + 1)); }
          done < <(find services/dsh/database/migrations services/wlt/database/migrations core/workforce/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
          test "$failures" -eq 0

  operational-result:
    name: DSH operational verification result
    if: always()
    needs: [dsh-backend-database, wlt-backend, workforce-backend-database, dsh-static-fullstack, migration-invariants]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require every operational job to pass
        env:
          DSH: ${{ needs.dsh-backend-database.result }}
          WLT: ${{ needs.wlt-backend.result }}
          WORKFORCE: ${{ needs.workforce-backend-database.result }}
          STATIC_FULLSTACK: ${{ needs.dsh-static-fullstack.result }}
          MIGRATIONS: ${{ needs.migration-invariants.result }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'dsh=%s\nwlt=%s\nworkforce=%s\nstatic-fullstack=%s\nmigrations=%s\n' \
            "$DSH" "$WLT" "$WORKFORCE" "$STATIC_FULLSTACK" "$MIGRATIONS"
          test "$DSH" = success
          test "$WLT" = success
          test "$WORKFORCE" = success
          test "$STATIC_FULLSTACK" = success
          test "$MIGRATIONS" = success
