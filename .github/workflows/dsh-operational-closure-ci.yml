name: DSH Operational Closure CI

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "core/**"
      - "services/dsh/**"
      - "services/wlt/**"
      - "apps/**"
      - "shared/**"
      - "infra/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [sambassam, master]
    paths:
      - "core/**"
      - "services/dsh/**"
      - "services/wlt/**"
      - "apps/**"
      - "shared/**"
      - "infra/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

concurrency:
  group: dsh-operational-closure-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-journey:
    name: Verify canonical journey integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Run registered journey gates
        shell: pwsh
        run: ./tools/scripts/run-journey-gate.ps1 -Journey PROJECT-WIDE

  result:
    name: DSH operational closure result
    needs: [static-journey]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Enforce operational closure result
        env:
          JOURNEY_RESULT: ${{ needs.static-journey.result }}
        run: |
          if [ "${JOURNEY_RESULT}" != "success" ]; then
            echo "Operational journey verification failed: ${JOURNEY_RESULT}"
            exit 1
          fi
          echo "Operational journey verification passed."
