name: DSH Operational Closure CI

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "core/**"
      - "services/dsh/**"
      - "services/wlt/**"
      - "apps/**"
      - "shared/**"
      - "infra/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [sambassam, master]
    paths:
      - "core/**"
      - "services/dsh/**"
      - "services/wlt/**"
      - "apps/**"
      - "shared/**"
      - "infra/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

concurrency:
  group: dsh-operational-closure-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-journey:
    name: Verify canonical journey integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Run registered journey gates
        shell: pwsh
        run: |
          $failed = $false
          try {
            ./tools/scripts/run-journey-gate.ps1 -Journey PROJECT-WIDE *>&1 | Tee-Object -FilePath journey-gate.log
          }
          catch {
            $_ | Out-String | Tee-Object -FilePath journey-gate.log -Append
            $failed = $true
          }
          if ($failed -or $LASTEXITCODE -ne 0) { exit 1 }
      - name: Preserve journey gate failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: journey-gate-failure
          path: journey-gate.log
          if-no-files-found: error
          retention-days: 7

  result:
    name: DSH operational closure result
    needs: [static-journey]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Enforce operational closure result
        env:
          JOURNEY_RESULT: ${{ needs.static-journey.result }}
        run: |
          if [ "${JOURNEY_RESULT}" != "success" ]; then
            echo "Operational journey verification failed: ${JOURNEY_RESULT}"
            exit 1
          fi
          echo "Operational journey verification passed."
