name: DSH Operational Closure CI

on:
  push:
    branches: [reem]
    paths:
      - 'services/dsh/backend/**'
      - 'services/dsh/database/migrations/**'
      - 'services/dsh/contracts/**'
      - 'services/dsh/clients/generated/**'
      - 'services/dsh/frontend/app-client/**'
      - 'services/dsh/frontend/app-partner/**'
      - 'services/dsh/frontend/app-captain/**'
      - 'services/dsh/frontend/control-panel/operations/**'
      - 'services/dsh/frontend/shared/operations/**'
      - 'services/dsh/frontend/shared/platform/**'
      - 'services/dsh/frontend/shared/special-requests/**'
      - 'services/dsh/frontend/shared/awnak/**'
      - 'services/dsh/frontend/shared/shein/**'
      - 'services/dsh/frontend/shared/partner-delivery/**'
      - 'services/dsh/frontend/shared/pickup/**'
      - 'shared/ui-kit/**'
      - 'services/wlt/backend/**'
      - 'services/wlt/database/migrations/**'
      - 'services/wlt/contracts/**'
      - 'services/wlt/clients/generated/**'
      - 'governance/operational_journey_protocol_package/sdlc/evidence/**'
      - 'tools/guards/sdlc/**'
      - '.github/workflows/dsh-operational-closure-ci.yml'
  pull_request:
    paths:
      - 'services/dsh/backend/**'
      - 'services/dsh/database/migrations/**'
      - 'services/dsh/contracts/**'
      - 'services/dsh/clients/generated/**'
      - 'services/dsh/frontend/app-client/**'
      - 'services/dsh/frontend/app-partner/**'
      - 'services/dsh/frontend/app-captain/**'
      - 'services/dsh/frontend/control-panel/operations/**'
      - 'services/dsh/frontend/shared/operations/**'
      - 'services/dsh/frontend/shared/platform/**'
      - 'services/dsh/frontend/shared/special-requests/**'
      - 'services/dsh/frontend/shared/awnak/**'
      - 'services/dsh/frontend/shared/shein/**'
      - 'services/dsh/frontend/shared/partner-delivery/**'
      - 'services/dsh/frontend/shared/pickup/**'
      - 'shared/ui-kit/**'
      - 'services/wlt/backend/**'
      - 'services/wlt/database/migrations/**'
      - 'services/wlt/contracts/**'
      - 'services/wlt/clients/generated/**'
      - 'governance/operational_journey_protocol_package/sdlc/evidence/**'
      - 'tools/guards/sdlc/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dsh-operational-closure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-contract-and-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dsh_ci
          POSTGRES_PASSWORD: dsh_ci_password
          POSTGRES_DB: dsh_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dsh_ci -d dsh_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://dsh_ci:dsh_ci_password@localhost:5432/dsh_ci?sslmode=disable
      DSH_REQUIRE_DB_TESTS: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Format gate
        id: gofmt
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            printf '%s\n' "$files" | tee ../../../gofmt-files.txt
            gofmt -w $files
            git diff -- . > ../../../gofmt.patch
            tar -czf ../../../gofmt-formatted.tar.gz $files
            exit 1
          fi
      - name: Upload gofmt diagnostics
        if: failure() && steps.gofmt.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dsh-gofmt-diagnostics
          path: |
            gofmt-files.txt
            gofmt.patch
            gofmt-formatted.tar.gz
          if-no-files-found: error
          retention-days: 3
      - name: Vet
        id: dsh-vet
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee ../../../dsh-vet.log
      - name: Upload DSH vet diagnostics
        if: failure() && steps.dsh-vet.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dsh-vet-diagnostics
          path: dsh-vet.log
          if-no-files-found: error
          retention-days: 3
      - name: Install PostgreSQL client
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Apply all DSH migrations to clean PostgreSQL
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "Applying ${migration}"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Unit and database integration tests
        id: dsh-tests
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -o pipefail
          go test ./... -count=1 2>&1 | tee ../../../dsh-tests.log
      - name: Upload DSH test diagnostics
        if: failure() && steps.dsh-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dsh-test-diagnostics
          path: dsh-tests.log
          if-no-files-found: error
          retention-days: 3

  wlt-backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache-dependency-path: services/wlt/backend/go.sum
      - name: Format gate
        id: wlt-gofmt
        working-directory: services/wlt/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            printf '%s\n' "$files" | tee ../../../wlt-gofmt-files.txt
            gofmt -w $files
            git diff -- . > ../../../wlt-gofmt.patch
            tar -czf ../../../wlt-gofmt-formatted.tar.gz $files
            exit 1
          fi
      - name: Upload WLT gofmt diagnostics
        if: failure() && steps.wlt-gofmt.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: wlt-gofmt-diagnostics
          path: |
            wlt-gofmt-files.txt
            wlt-gofmt.patch
            wlt-gofmt-formatted.tar.gz
          if-no-files-found: error
          retention-days: 3
      - name: Vet
        id: wlt-vet
        working-directory: services/wlt/backend
        shell: bash
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee ../../../wlt-vet.log
      - name: Upload WLT vet diagnostics
        if: failure() && steps.wlt-vet.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: wlt-vet-diagnostics
          path: wlt-vet.log
          if-no-files-found: error
          retention-days: 3
      - name: Unit tests
        working-directory: services/wlt/backend
        run: go test ./... -count=1

  fullstack-binding-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: DSH and WLT contract generation is clean
        run: |
          pnpm run contracts:lint
          pnpm run openapi:generate:dsh
          pnpm run openapi:generate:wlt
          git diff --exit-code -- \
            services/dsh/contracts/dsh.openapi.yaml \
            services/dsh/clients/generated/dsh-api.ts \
            services/wlt/contracts/wlt.openapi.yaml \
            services/wlt/clients/generated/wlt-api.ts
      - name: Binding and boundary gates
        run: |
          pnpm run guard:backend-api-binding
          pnpm run guard:api-binding
          pnpm run guard:frontend-feature-binding
          pnpm run guard:fullstack-boundary
          pnpm run guard:wlt-financial-boundary
          pnpm run guard:runtime-real-bindings
      - name: Typecheck affected surfaces
        id: typecheck
        shell: bash
        run: |
          set -o pipefail
          pnpm run typecheck 2>&1 | tee typecheck.log
      - name: Upload TypeScript diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dsh-typescript-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3

  sdlc-evidence-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate special-request SDLC evidence and no-skip transition
        id: sdlc
        shell: bash
        run: |
          set -o pipefail
          pnpm run guard:sdlc -- \
            --capability DSH-SPECIAL-REQUESTS-001 \
            --stage G4_IMPLEMENTATION_VERIFIED \
            --artifact governance/operational_journey_protocol_package/sdlc/evidence/dsh-special-requests-001.artifact.json \
            --impact governance/operational_journey_protocol_package/sdlc/evidence/dsh-special-requests-001.change-impact.json \
            --affected 2>&1 | tee sdlc.log
      - name: Upload SDLC diagnostics
        if: failure() && steps.sdlc.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dsh-sdlc-diagnostics
          path: sdlc.log
          if-no-files-found: error
          retention-days: 3

  migration-static-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Migration sequence and transaction checks
        shell: bash
        run: |
          set -euo pipefail
          for migration in \
            services/dsh/database/migrations/dsh-056_special_requests_tenancy.sql \
            services/dsh/database/migrations/dsh-059_special_request_dispatch_stage_sync.sql \
            services/wlt/database/migrations/wlt-024_payment_session_tenancy.sql; do
            test -f "$migration"
            grep -q '^BEGIN;' "$migration"
            grep -q '^COMMIT;' "$migration"
          done
          grep -q 'trg_dsh_sync_special_request_dispatch_stage' services/dsh/database/migrations/dsh-059_special_request_dispatch_stage_sync.sql
