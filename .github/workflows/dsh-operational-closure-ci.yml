name: DSH Operational Closure CI

on:
  workflow_dispatch:
  push:
    branches: [sambassam, bassam]
    paths:
      - "services/dsh/**"
      - "services/wlt/**"
      - "core/**"
      - "infra/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - "package.json"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [master]
    paths:
      - "services/dsh/**"
      - "services/wlt/**"
      - "core/**"
      - "infra/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/**"
      - ".github/actions/**"
      - ".github/workflows/**"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

concurrency:
  group: dsh-operational-closure-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Targeted operational ownership and contract integrity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify governed repository foundations
        run: |
          pnpm run guard:governance-schema
          pnpm run guard:agent-governance
          pnpm run guard:authority-separation
          pnpm run guard:saas-governance
          pnpm run guard:guard-registry
          pnpm run guard:sdlc
          pnpm run guard:cleanup-policy
      - name: Verify DSH and WLT ownership boundaries
        run: |
          pnpm run guard:api-binding
          pnpm run guard:backend-api-binding
          pnpm run guard:frontend-feature-binding
          pnpm run guard:fullstack-boundary
          pnpm run guard:wlt-financial-boundary
      - name: Verify immutable workflow dependencies
        run: pnpm run guard:actions-pin
      - name: Verify repository whitespace
        run: git diff --check

  result:
    name: DSH Operational Closure CI result
    needs: [verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce operational closure result
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: test "${VERIFY_RESULT}" = "success"
