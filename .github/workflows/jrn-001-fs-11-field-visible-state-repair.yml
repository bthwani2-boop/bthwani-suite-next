name: JRN-001 FS-11 field visible state repair

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-11-field-visible-state-repair.yml]

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Bind typed visible failure state
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          types_path = Path('services/dsh/frontend/shared/field-onboarding/field-onboarding.types.ts')
          types = types_path.read_text()
          if 'PartnerOnboardingFailure' not in types:
              types = types.replace(
                  'import { DOCUMENT_TYPE_LABELS, REQUIRED_DOCUMENT_TYPES, type DshPartnerDocumentType } from "../partner";',
                  'import { DOCUMENT_TYPE_LABELS, REQUIRED_DOCUMENT_TYPES, type DshPartnerDocumentType, type PartnerOnboardingFailure } from "../partner";',
                  1,
              )
          if 'failure: PartnerOnboardingFailure | null;' not in types:
              types = types.replace(
                  '  submitError: string | null;\n',
                  '  submitError: string | null;\n  failure: PartnerOnboardingFailure | null;\n',
                  1,
              )
          if 'failure: null,' not in types:
              types = types.replace(
                  '    submitError: null,\n',
                  '    submitError: null,\n    failure: null,\n',
                  1,
              )
          required_types = ['failure: PartnerOnboardingFailure | null;', 'failure: null,']
          if any(marker not in types for marker in required_types):
              raise SystemExit('field onboarding typed failure markers missing')
          types_path.write_text(types)

          controller_path = Path('services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx')
          controller = controller_path.read_text()
          controller = controller.replace(
              'setState((s) => ({ ...s, form: { ...s.form, ...patch }, isDirty: true }));',
              'setState((s) => ({ ...s, form: { ...s.form, ...patch }, isDirty: true, failure: null }));',
              1,
          )
          controller = controller.replace(
              'setState((s) => ({ ...s, visitNotes: notes, isDirty: true }));',
              'setState((s) => ({ ...s, visitNotes: notes, isDirty: true, failure: null }));',
              1,
          )
          controller = controller.replace(
              'setState((s) => ({ ...s, locationLatitude: lat, locationLongitude: lon, isDirty: true }));',
              'setState((s) => ({ ...s, locationLatitude: lat, locationLongitude: lon, isDirty: true, failure: null }));',
              1,
          )
          controller = controller.replace(
              'setState((s) => ({ ...s, evidenceMediaRefs: [...s.evidenceMediaRefs, ref], isDirty: true }));',
              'setState((s) => ({ ...s, evidenceMediaRefs: [...s.evidenceMediaRefs, ref], isDirty: true, failure: null }));',
              1,
          )
          controller = controller.replace(
              '        submitError: null,\n      }));',
              '        submitError: null,\n        failure: null,\n      }));',
              1,
          )
          controller = controller.replace(
              'setState((s) => ({ ...s, submitError: failure.message }));',
              'setState((s) => ({ ...s, submitError: failure.message, failure }));',
          )
          old_load_catch = '''    } catch (err) {
      const status = err && typeof err === "object" && "status" in err ? (err as { status?: number }).status : undefined;
      const msg = status === 403
        ? "لا تملك صلاحية الوصول إلى ملف هذا الشريك"
        : status === 404
          ? "تعذر العثور على ملف الشريك"
          : "تعذر تحميل بيانات ملف الشريك";
      setState((s) => ({ ...s, loadStatus: "error", loadError: msg }));
      return false;
    }
'''
          new_load_catch = '''    } catch (err) {
      const failure = mapPartnerOnboardingFailure(err);
      setState((s) => ({
        ...s,
        loadStatus: "error",
        loadError: failure.message,
        failure,
      }));
      return false;
    }
'''
          if old_load_catch in controller:
              controller = controller.replace(old_load_catch, new_load_catch, 1)
          controller = controller.replace(
              'setState((s) => ({ ...s, isSaving: true, submitError: null }));',
              'setState((s) => ({ ...s, isSaving: true, submitError: null, failure: null }));',
              1,
          )
          controller = controller.replace(
              '        submitError: null,\n        lastSavedAt:',
              '        submitError: null,\n        failure: null,\n        lastSavedAt:',
              1,
          )
          controller = controller.replace(
              '        submitError: failure.message,\n      }));',
              '        submitError: failure.message,\n        failure,\n      }));',
          )
          controller = controller.replace(
              'setState((s) => ({ ...s, submitError: "يجب إنشاء ملف الشريك أولًا قبل رفع المستندات" }));',
              '''const failure = {
        state: "readiness_blocked",
        code: "PARTNER_DRAFT_REQUIRED",
        message: "يجب إنشاء ملف الشريك أولًا قبل رفع المستندات",
        retryable: false,
        reloadRequired: false,
      } as const;
      setState((s) => ({ ...s, submitError: failure.message, failure }));''',
              1,
          )
          controller = controller.replace(
              '        submitError: null,\n      }));\n      return true;',
              '        submitError: null,\n        failure: null,\n      }));\n      return true;',
              1,
          )
          controller = controller.replace(
              'setState((s) => ({ ...s, isSubmitting: true, submitError: null }));',
              'setState((s) => ({ ...s, isSubmitting: true, submitError: null, failure: null }));',
              1,
          )
          controller = controller.replace(
              '        partnerVersion: readback.version,\n      }));',
              '        partnerVersion: readback.version,\n        failure: null,\n      }));',
              1,
          )
          required_controller = [
              'loadError: failure.message',
              'failure,',
              'state: "readiness_blocked"',
              'isSaving: true, submitError: null, failure: null',
              'isSubmitting: true, submitError: null, failure: null',
          ]
          missing = [marker for marker in required_controller if marker not in controller]
          if missing:
              raise SystemExit(f'controller visible failure markers missing: {missing}')
          controller_path.write_text(controller)

          screen_path = Path('services/dsh/frontend/app-field/onboarding/DshFieldOnboardingScreen.tsx')
          screen = screen_path.read_text()
          if 'StateView,' not in screen:
              screen = screen.replace('  Icon,\n', '  Icon,\n  StateView,\n', 1)
          if 'resolvePartnerOnboardingFailureState' not in screen:
              screen = screen.replace(
                  '  type FieldOnboardingController,\n} from \'../../shared/field-onboarding\';',
                  '  type FieldOnboardingController,\n} from \'../../shared/field-onboarding\';\nimport { resolvePartnerOnboardingFailureState } from \'../../shared/partner\';',
                  1,
              )
          anchor = '''  const groupMissingCounts: Record<GroupId, number> = {
    basics_profile: getBasicsProfileMissingCount(form),
    location_media: getLocationMediaMissingCount(form),
    evidence: getDocumentsMissingCount(state.uploadedDocumentTypes, form),
    bank_account: getBankAccountMissingCount(form),
    agreement_review: getAgreementReviewMissingCount(form, state.uploadedDocumentTypes),
  };
'''
          visible_block = anchor + '''  const visibleFailure = state.failure
    ? resolvePartnerOnboardingFailureState(state.failure)
    : null;
  const firstIncompleteGroup = GROUP_ORDER.find((groupId) => groupMissingCounts[groupId] > 0)
    ?? "agreement_review";
  const recoverVisibleFailure = () => {
    if (!visibleFailure) return;
    if (visibleFailure.action === "reload" && state.partnerId) {
      void controller.loadDraft(state.partnerId);
      return;
    }
    if (visibleFailure.action === "retry") {
      if (state.partnerId) void controller.save();
      else void controller.ensureDraftCreated();
      return;
    }
    if (visibleFailure.action === "complete_requirements") {
      setActiveGroup(firstIncompleteGroup);
      return;
    }
    if (visibleFailure.action === "sign_in") onBack?.();
  };
'''
          if 'const visibleFailure = state.failure' not in screen:
              if anchor not in screen:
                  raise SystemExit('screen group count anchor missing')
              screen = screen.replace(anchor, visible_block, 1)
          old_load_error = '''  if (state.loadStatus === 'error') {
    return (
      <View style={{ flex: 1, backgroundColor: colorRoles.surfaceBase }}>
        <Header title="تعذر التحميل" />
        <View style={{ flex: 1, justifyContent: 'center', alignItems: 'center', padding: 24, gap: spacing[3] }}>
          <Text role="bodyMd" tone="danger" style={{ textAlign: 'center' }}>
            {state.loadError ?? 'تعذر تحميل بيانات ملف الشريك'}
          </Text>
          {partnerId && (
            <Button label="إعادة المحاولة" tone="primary" onPress={() => void controller.loadDraft(partnerId)} />
          )}
          {onBack ? <Button label="رجوع" tone="ghost" onPress={onBack} /> : null}
        </View>
      </View>
    );
  }
'''
          new_load_error = '''  if (state.loadStatus === 'error') {
    const loadVisible = visibleFailure;
    return (
      <View style={{ flex: 1, backgroundColor: colorRoles.surfaceBase }}>
        <Header title={loadVisible?.title ?? "تعذر التحميل"} />
        <StateView
          tone={loadVisible?.tone ?? "danger"}
          title={loadVisible?.title ?? "تعذر تحميل ملف الشريك"}
          description={loadVisible?.description ?? state.loadError ?? "تعذر تحميل بيانات ملف الشريك"}
          {...(loadVisible && loadVisible.action !== "none"
            ? { actionLabel: loadVisible.actionLabel, onActionPress: recoverVisibleFailure }
            : onBack
              ? { actionLabel: "رجوع", onActionPress: onBack }
              : {})}
        />
      </View>
    );
  }
'''
          if old_load_error in screen:
              screen = screen.replace(old_load_error, new_load_error, 1)
          old_inline = '''        {state.submitError ? (
          <Text role="bodySm" tone="danger" style={{ textAlign: 'right' }}>{state.submitError}</Text>
        ) : null}
'''
          new_inline = '''        {visibleFailure ? (
          <StateView
            tone={visibleFailure.tone}
            title={visibleFailure.title}
            description={visibleFailure.description}
            {...(visibleFailure.action !== "none"
              ? { actionLabel: visibleFailure.actionLabel, onActionPress: recoverVisibleFailure }
              : {})}
          />
        ) : isLastGroup && !isReadyToSubmit ? (
          <StateView
            tone="warning"
            title="متطلبات التأهيل غير مكتملة"
            description={`العناصر الناقصة: ${missingItems.join('، ')}`}
            actionLabel="فتح أول قسم ناقص"
            onActionPress={() => setActiveGroup(firstIncompleteGroup)}
          />
        ) : null}
'''
          if old_inline in screen:
              screen = screen.replace(old_inline, new_inline, 1)
          required_screen = [
              'resolvePartnerOnboardingFailureState',
              'const visibleFailure = state.failure',
              'recoverVisibleFailure',
              'متطلبات التأهيل غير مكتملة',
              'فتح أول قسم ناقص',
          ]
          missing = [marker for marker in required_screen if marker not in screen]
          if missing:
              raise SystemExit(f'screen visible state markers missing: {missing}')
          screen_path.write_text(screen)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add services/dsh/frontend/shared/field-onboarding/field-onboarding.types.ts \
                  services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx \
                  services/dsh/frontend/app-field/onboarding/DshFieldOnboardingScreen.tsx
          git diff --cached --quiet && { echo 'No field visible-state changes produced'; exit 1; }
          git commit -m 'fix(jrn-001-fs-11): expose typed field recovery states'
          git push origin HEAD:sambassam
      - name: Publish repair status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = success ]; then STATE=success; else STATE=failure; fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-11-repair-field-visible-state' --arg description 'Typed app-field visible failure recovery repair' --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
