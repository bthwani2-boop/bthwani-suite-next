name: JRN-001 FS-11 field state type repair

on:
  push:
    branches: [sambassam]
    paths:
      - .github/workflows/jrn-001-fs-11-field-visible-state-repair.yml

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Add typed failure to field draft state
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('services/dsh/frontend/shared/field-onboarding/field-onboarding.types.ts')
          text = path.read_text()
          old_import = 'import { DOCUMENT_TYPE_LABELS, REQUIRED_DOCUMENT_TYPES, type DshPartnerDocumentType } from "../partner";'
          new_import = 'import { DOCUMENT_TYPE_LABELS, REQUIRED_DOCUMENT_TYPES, type DshPartnerDocumentType, type PartnerOnboardingFailure } from "../partner";'
          if old_import in text:
              text = text.replace(old_import, new_import, 1)
          if 'failure: PartnerOnboardingFailure | null;' not in text:
              text = text.replace('  submitError: string | null;\n', '  submitError: string | null;\n  failure: PartnerOnboardingFailure | null;\n', 1)
          if '    failure: null,' not in text:
              text = text.replace('    submitError: null,\n', '    submitError: null,\n    failure: null,\n', 1)
          for marker in [new_import, 'failure: PartnerOnboardingFailure | null;', '    failure: null,']:
              if marker not in text:
                  raise SystemExit(f'missing marker: {marker}')
          path.write_text(text)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add services/dsh/frontend/shared/field-onboarding/field-onboarding.types.ts
          git diff --cached --quiet && { echo 'No type change produced'; exit 1; }
          git commit -m 'fix(jrn-001-fs-11): type field onboarding failures'
          pushed=0
          for attempt in 1 2 3 4 5; do
            git fetch origin sambassam
            git rebase origin/sambassam
            if git push origin HEAD:sambassam; then pushed=1; break; fi
            git rebase --abort 2>/dev/null || true
            sleep 2
          done
          test "$pushed" -eq 1
      - name: Publish repair status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = success ]; then STATE=success; else STATE=failure; fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-11-repair-field-state-type' --arg description 'Typed field onboarding failure state repair with rebased push' --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
