name: JRN-001 FS-11 field controller repair

on:
  push:
    branches: [sambassam]
    paths:
      - .github/workflows/jrn-001-fs-11-field-visible-state-repair.yml

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Preserve classified onboarding failures
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx')
          text = path.read_text()

          replacements = {
            'setState((s) => ({ ...s, form: { ...s.form, ...patch }, isDirty: true }));':
              'setState((s) => ({ ...s, form: { ...s.form, ...patch }, isDirty: true, failure: null }));',
            'setState((s) => ({ ...s, visitNotes: notes, isDirty: true }));':
              'setState((s) => ({ ...s, visitNotes: notes, isDirty: true, failure: null }));',
            'setState((s) => ({ ...s, locationLatitude: lat, locationLongitude: lon, isDirty: true }));':
              'setState((s) => ({ ...s, locationLatitude: lat, locationLongitude: lon, isDirty: true, failure: null }));',
            'setState((s) => ({ ...s, evidenceMediaRefs: [...s.evidenceMediaRefs, ref], isDirty: true }));':
              'setState((s) => ({ ...s, evidenceMediaRefs: [...s.evidenceMediaRefs, ref], isDirty: true, failure: null }));',
            'setState((s) => ({ ...s, submitError: failure.message }));':
              'setState((s) => ({ ...s, submitError: failure.message, failure }));',
            'setState((s) => ({ ...s, isSaving: true, submitError: null }));':
              'setState((s) => ({ ...s, isSaving: true, submitError: null, failure: null }));',
            'setState((s) => ({ ...s, isSubmitting: true, submitError: null }));':
              'setState((s) => ({ ...s, isSubmitting: true, submitError: null, failure: null }));',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)

          old_load = '''    } catch (err) {
      const status = err && typeof err === "object" && "status" in err ? (err as { status?: number }).status : undefined;
      const msg = status === 403
        ? "لا تملك صلاحية الوصول إلى ملف هذا الشريك"
        : status === 404
          ? "تعذر العثور على ملف الشريك"
          : "تعذر تحميل بيانات ملف الشريك";
      setState((s) => ({ ...s, loadStatus: "error", loadError: msg }));
      return false;
    }
'''
          new_load = '''    } catch (err) {
      const failure = mapPartnerOnboardingFailure(err);
      setState((s) => ({
        ...s,
        loadStatus: "error",
        loadError: failure.message,
        failure,
      }));
      return false;
    }
'''
          if old_load in text:
              text = text.replace(old_load, new_load, 1)

          text = text.replace(
              '        submitError: null,\n      }));',
              '        submitError: null,\n        failure: null,\n      }));',
          )
          text = text.replace(
              '        submitError: failure.message,\n      }));',
              '        submitError: failure.message,\n        failure,\n      }));',
          )

          old_missing = '      setState((s) => ({ ...s, submitError: "يجب إنشاء ملف الشريك أولًا قبل رفع المستندات" }));'
          new_missing = '''      const failure = {
        state: "readiness_blocked",
        code: "PARTNER_DRAFT_REQUIRED",
        message: "يجب إنشاء ملف الشريك أولًا قبل رفع المستندات",
        retryable: false,
        reloadRequired: false,
      } as const;
      setState((s) => ({ ...s, submitError: failure.message, failure }));'''
          if old_missing in text:
              text = text.replace(old_missing, new_missing, 1)

          markers = [
            'loadError: failure.message',
            'submitError: failure.message, failure',
            'state: "readiness_blocked"',
            'isSaving: true, submitError: null, failure: null',
            'isSubmitting: true, submitError: null, failure: null',
            'failure: null',
          ]
          missing = [marker for marker in markers if marker not in text]
          if missing:
              raise SystemExit(f'missing controller markers: {missing}')
          path.write_text(text)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx
          git diff --cached --quiet && { echo 'No controller change produced'; exit 1; }
          git commit -m 'fix(jrn-001-fs-11): preserve field failure classification'
          pushed=0
          for attempt in 1 2 3 4 5; do
            git fetch origin sambassam
            git rebase origin/sambassam
            if git push origin HEAD:sambassam; then pushed=1; break; fi
            git rebase --abort 2>/dev/null || true
            sleep 2
          done
          test "$pushed" -eq 1
      - name: Publish repair status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = success ]; then STATE=success; else STATE=failure; fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-11-repair-field-controller' --arg description 'Field onboarding classified failure controller repair' --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
