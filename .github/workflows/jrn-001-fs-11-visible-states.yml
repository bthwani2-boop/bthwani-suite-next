name: JRN-001 FS-11 Visible States

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/contracts/jrn-001-visible-state-registry.json
      - services/dsh/frontend/shared/partner/partner-onboarding.visible-state.ts
      - services/dsh/frontend/shared/partner/partner-onboarding.runtime.ts
      - services/dsh/frontend/shared/partner/index.ts
      - services/dsh/tests/jrn-001-fs-11-visible-states.test.mjs
      - .github/workflows/jrn-001-fs-11-visible-states.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Install locked workspace
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Verify shared visible-state contract
        run: node --test services/dsh/tests/jrn-001-fs-11-visible-states.test.mjs
      - name: Typecheck required onboarding surfaces
        run: |
          pnpm --dir apps/app-field/runtime typecheck
          pnpm --dir apps/app-partner/runtime typecheck
          pnpm --dir apps/control-panel/runtime typecheck
      - name: Publish FS-11 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ "$RESULT" = success ] && STATE=success || STATE=failure
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-11-visible-states' --arg description "FS-11 visible states: $RESULT" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
