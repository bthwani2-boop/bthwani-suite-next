name: JRN-001 FS-11 visible states closure

on:
  push:
    branches: [journey/jrn-001-sequential-closure]
    paths:
      - .github/workflows/jrn-001-fs-11-visible-states.yml

permissions:
  contents: write

jobs:
  close-fs-11:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: journey/jrn-001-sequential-closure
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Implement governed visible failures
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          function replace(file, from, to) {
            const before = fs.readFileSync(file, 'utf8');
            if (!before.includes(from)) throw new Error(`${file}: expected block not found`);
            fs.writeFileSync(file, before.replace(from, to));
          }

          const types = 'services/dsh/frontend/shared/field-onboarding/field-onboarding.types.ts';
          replace(types,
            'import { DOCUMENT_TYPE_LABELS, REQUIRED_DOCUMENT_TYPES, type DshPartnerDocumentType } from "../partner";',
            'import { DOCUMENT_TYPE_LABELS, REQUIRED_DOCUMENT_TYPES, type DshPartnerDocumentType, type PartnerOnboardingFailure } from "../partner";');
          replace(types,
            '  submitError: string | null;\n  isSubmitted: boolean;',
            '  submitError: string | null;\n  runtimeFailure: PartnerOnboardingFailure | null;\n  isSubmitted: boolean;');
          replace(types,
            '    submitError: null,\n    isSubmitted: false,',
            '    submitError: null,\n    runtimeFailure: null,\n    isSubmitted: false,');

          const runtime = 'services/dsh/frontend/shared/partner/partner-onboarding.runtime.ts';
          replace(runtime,
            '  if (value.kind === "network" || status === 0) {',
            '  if (value.kind === "integrity" || status === 206) {\n    return {\n      state: "partial",\n      code,\n      message: serverMessage || "اكتملت العملية جزئيًا لكن قراءة الحقيقة اللاحقة لم تتطابق. أعد التحميل قبل أي إجراء آخر.",\n      retryable: true,\n      reloadRequired: true,\n    };\n  }\n  if (value.kind === "network" || status === 0) {');

          const controller = 'services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx';
          let source = fs.readFileSync(controller, 'utf8');
          source = source.replaceAll('submitError: failure.message }));', 'submitError: failure.message, runtimeFailure: failure }));');
          source = source.replaceAll('submitError: null,\n      }));', 'submitError: null,\n        runtimeFailure: null,\n      }));');
          source = source.replaceAll('submitError: null }));', 'submitError: null, runtimeFailure: null }));');
          source = source.replace('setState((s) => ({ ...s, loadStatus: "hydrating", loadError: null }));', 'setState((s) => ({ ...s, loadStatus: "hydrating", loadError: null, runtimeFailure: null }));');
          source = source.replace(
            '      const status = err && typeof err === "object" && "status" in err ? (err as { status?: number }).status : undefined;\n      const msg = status === 403\n        ? "لا تملك صلاحية الوصول إلى ملف هذا الشريك"\n        : status === 404\n          ? "تعذر العثور على ملف الشريك"\n          : "تعذر تحميل بيانات ملف الشريك";\n      setState((s) => ({ ...s, loadStatus: "error", loadError: msg }));',
            '      const failure = mapPartnerOnboardingFailure(err);\n      setState((s) => ({ ...s, loadStatus: "error", loadError: failure.message, runtimeFailure: failure }));');
          source = source.replace('setState((s) => ({ ...s, isSaving: true, submitError: null }));', 'setState((s) => ({ ...s, isSaving: true, submitError: null, runtimeFailure: null }));');
          source = source.replace('setState((s) => ({ ...s, isSubmitting: true, submitError: null }));', 'setState((s) => ({ ...s, isSubmitting: true, submitError: null, runtimeFailure: null }));');
          source = source.replace('        submitError: failure.message,\n      }));', '        submitError: failure.message,\n        runtimeFailure: failure,\n      }));');
          source = source.replace('        partnerVersion: readback.version,\n      }));', '        partnerVersion: readback.version,\n        runtimeFailure: null,\n      }));');
          fs.writeFileSync(controller, source);

          const screen = 'services/dsh/frontend/app-field/onboarding/DshFieldOnboardingScreen.tsx';
          replace(screen,
            '        {state.submitError ? (\n          <Text role="bodySm" tone="danger" style={{ textAlign: \'right\' }}>{state.submitError}</Text>\n        ) : null}',
            `        {state.runtimeFailure ? (\n          <View accessibilityRole="alert" style={{ padding: spacing[3], borderRadius: radius.md, borderWidth: borders.hairline, borderColor: state.runtimeFailure.state === 'forbidden' ? colorRoles.danger : colorRoles.warning, gap: spacing[2] }}>\n            <Text role="bodyStrong" tone={state.runtimeFailure.state === 'forbidden' ? 'danger' : 'warning'} style={{ textAlign: 'right' }}>\n              {state.runtimeFailure.state === 'offline' ? 'لا يوجد اتصال' : state.runtimeFailure.state === 'conflict' ? 'تعارض في النسخة' : state.runtimeFailure.state === 'forbidden' ? 'الإجراء غير مسموح' : state.runtimeFailure.state === 'readiness_blocked' ? 'متطلبات الجاهزية غير مكتملة' : state.runtimeFailure.state === 'wlt_unavailable' ? 'خدمة WLT غير متاحة' : state.runtimeFailure.state === 'partial' ? 'نتيجة جزئية تحتاج إعادة قراءة' : 'تعذر إكمال العملية'}\n            </Text>\n            <Text role="bodySm" tone="secondary" style={{ textAlign: 'right' }}>{state.runtimeFailure.message}</Text>\n            {state.runtimeFailure.retryable ? (\n              <Button label={state.runtimeFailure.reloadRequired ? 'إعادة تحميل الحقيقة' : 'إعادة المحاولة'} tone="secondary" onPress={() => void (state.partnerId ? controller.loadDraft(state.partnerId) : controller.save())} />\n            ) : null}\n          </View>\n        ) : state.submitError ? (\n          <Text role="bodySm" tone="danger" style={{ textAlign: 'right' }}>{state.submitError}</Text>\n        ) : null}`);

          const test = `import assert from "node:assert/strict";\nimport fs from "node:fs";\nconst runtime = fs.readFileSync("services/dsh/frontend/shared/partner/partner-onboarding.runtime.ts", "utf8");\nconst types = fs.readFileSync("services/dsh/frontend/shared/field-onboarding/field-onboarding.types.ts", "utf8");\nconst controller = fs.readFileSync("services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx", "utf8");\nconst screen = fs.readFileSync("services/dsh/frontend/app-field/onboarding/DshFieldOnboardingScreen.tsx", "utf8");\nfor (const state of ["offline", "forbidden", "conflict", "readiness_blocked", "wlt_unavailable", "partial", "error"]) assert.match(runtime, new RegExp('state: "' + state + '"'));\nassert.match(types, /runtimeFailure: PartnerOnboardingFailure \| null/);\nassert.match(controller, /runtimeFailure: failure/);\nassert.match(screen, /إعادة تحميل الحقيقة/);\nassert.match(screen, /accessibilityRole="alert"/);\nconsole.log("JRN-001 FS-11 governed visible states verified");\n`;
          fs.writeFileSync('services/dsh/tests/jrn-001-fs-11-visible-states.test.mjs', test);
          NODE
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
          node --test services/dsh/tests/jrn-001-fs-11-visible-states.test.mjs
          pnpm --dir apps/app-field/runtime typecheck
          git diff --check
          git config user.name 'bthwani-journey-closure'
          git config user.email 'actions@users.noreply.github.com'
          git add services/dsh/frontend services/dsh/tests/jrn-001-fs-11-visible-states.test.mjs
          git commit -m 'feat(jrn-001-fs-11): expose governed onboarding failure states'
          git push origin HEAD:journey/jrn-001-sequential-closure
