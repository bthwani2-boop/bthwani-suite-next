name: JRN-001 FS-11 Visible States
# Verification generation 4: publish compact assertion location.

on:
  push:
    branches: [sambassam]
    paths:
      - governance/product/contracts/jrn-001-partner-onboarding-store-publication.product-truth.json
      - services/dsh/contracts/jrn-001-visible-state-registry.json
      - services/dsh/frontend/shared/partner/partner-onboarding.visible-state.ts
      - services/dsh/frontend/shared/partner/partner-onboarding.runtime.ts
      - services/dsh/frontend/shared/partner/partner.states.ts
      - services/dsh/frontend/shared/partner/use-partner-self-controller.tsx
      - services/dsh/frontend/shared/partner/use-partner-admin-controller.tsx
      - services/dsh/frontend/shared/partner/index.ts
      - services/dsh/frontend/shared/field-onboarding/field-onboarding.types.ts
      - services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx
      - services/dsh/frontend/shared/home-discovery/**
      - services/dsh/frontend/shared/order-truth/**
      - services/dsh/frontend/app-client/home-discovery/**
      - services/dsh/frontend/app-client/store/**
      - services/dsh/frontend/app-field/onboarding/**
      - services/dsh/frontend/app-partner/account/PartnerHubScreen.tsx
      - services/dsh/frontend/app-partner/account/PartnerOnboardingStatusView.tsx
      - services/dsh/frontend/control-panel/partners/PartnersReviewQueueScreen.tsx
      - services/dsh/frontend/control-panel/partners/PartnerDetailOperationalScreen.tsx
      - services/dsh/tests/jrn-001-fs-11-visible-states.test.mjs
      - .github/workflows/jrn-001-fs-11-visible-states.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Install locked workspace
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Typecheck app-client
        shell: bash
        run: |
          set +e
          pnpm --dir apps/app-client/runtime typecheck 2>&1 | tee /tmp/fs11.log
          exit ${PIPESTATUS[0]}
      - name: Typecheck app-field
        shell: bash
        run: |
          set +e
          pnpm --dir apps/app-field/runtime typecheck 2>&1 | tee /tmp/fs11.log
          exit ${PIPESTATUS[0]}
      - name: Typecheck app-partner
        shell: bash
        run: |
          set +e
          pnpm --dir apps/app-partner/runtime typecheck 2>&1 | tee /tmp/fs11.log
          exit ${PIPESTATUS[0]}
      - name: Typecheck control-panel
        shell: bash
        run: |
          set +e
          pnpm --dir apps/control-panel/runtime typecheck 2>&1 | tee /tmp/fs11.log
          exit ${PIPESTATUS[0]}
      - name: Verify visible states and recovery
        shell: bash
        run: |
          set +e
          node --test services/dsh/tests/jrn-001-fs-11-visible-states.test.mjs 2>&1 | tee /tmp/fs11.log
          exit ${PIPESTATUS[0]}
      - name: Publish FS-11 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = success ]; then
            STATE=success
            CONTEXT='journeys/jrn-001/fs-11-visible-states'
            DESCRIPTION='FS-11 visible states and recovery verified on all required surfaces'
          else
            STATE=failure
            RAW_ERROR="$(grep -m1 -E 'error TS[0-9]+|AssertionError|ERR_ASSERTION|not ok|missing|failed' /tmp/fs11.log 2>/dev/null || true)"
            ERROR_CODE="$(printf '%s' "$RAW_ERROR" | grep -o -m1 -E 'TS[0-9]+|ERR_[A-Z0-9_]+' || true)"
            ERROR_FILE="$(printf '%s' "$RAW_ERROR" | sed -E 's#^([^(:]+).*#\1#' | sed -E 's#^.*[/\\]##' | cut -c1-48)"
            ASSERT_LOCATION="$(grep -o -m1 -E 'jrn-001-fs-11-visible-states\.test\.mjs:[0-9]+:[0-9]+' /tmp/fs11.log 2>/dev/null || true)"
            [ -n "$ERROR_CODE" ] || ERROR_CODE='visible-state-check-failed'
            [ -n "$ERROR_FILE" ] || ERROR_FILE='unknown-file'
            if [ -n "$ASSERT_LOCATION" ]; then
              LOCATION_TOKEN="$(printf '%s' "$ASSERT_LOCATION" | sed -E 's#^.*\.mjs:##' | tr ':' '-')"
              CONTEXT="j1/fs11/assert/${LOCATION_TOKEN}"
            else
              CONTEXT="j1/fs11/${ERROR_FILE}-${ERROR_CODE}"
            fi
            CONTEXT="$(printf '%s' "$CONTEXT" | tr -cd '[:alnum:]_./:-' | cut -c1-100)"
            DESCRIPTION="$(printf '%s' "${ASSERT_LOCATION:-} ${RAW_ERROR:-FS-11 verification failed}" | cut -c1-120)"
          fi
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
