name: JRN 020-025 WLT guard scope repair

on:
  push:
    branches: [sambassam]
    paths:
      - .github/workflows/jrn-020-025-wlt-guard-scope-repair.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: sambassam
          fetch-depth: 0
      - name: Exclude governance guards from runtime provider scanning
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const file = 'tools/guards/wlt-financial-boundary-gate.mjs';
          const before = fs.readFileSync(file, 'utf8');
          const oldBlock = [
            '  "tools/guards/wlt-financial-boundary-gate.mjs",',
            '  "tools/guards/live-cross-journey-integrity-gate.mjs",',
          ].join('\n');
          if (!before.includes(oldBlock)) {
            throw new Error('expected WLT guard allowlist block was not found');
          }
          const after = before.replace(oldBlock, '  "tools/guards/",');
          fs.writeFileSync(file, after);
          NODE
          git diff --check
          git config user.name "bthwani-journey-closure"
          git config user.email "actions@users.noreply.github.com"
          git add tools/guards/wlt-financial-boundary-gate.mjs
          git commit -m "fix(wlt): exclude governance guards from provider runtime scan"
          git push origin HEAD:sambassam
