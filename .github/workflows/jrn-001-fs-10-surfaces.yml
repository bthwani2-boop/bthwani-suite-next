name: JRN-001 FS-10 Required Surfaces

on:
  push:
    branches: [sambassam]
    paths:
      - governance/product/contracts/jrn-001-partner-onboarding-store-publication.product-truth.json
      - services/dsh/contracts/jrn-001-surface-registry.json
      - services/dsh/frontend/app-client/home-discovery/**
      - services/dsh/frontend/app-client/store/**
      - services/dsh/frontend/app-field/**
      - services/dsh/frontend/app-partner/**
      - services/dsh/frontend/control-panel/partners/**
      - apps/control-panel/runtime/src/app/dsh/partners/**
      - services/dsh/tests/jrn-001-fs-10-surfaces.test.mjs
      - tools/guards/partner/partner-surface-truth-gate.mjs
      - .github/workflows/jrn-001-fs-10-surfaces.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Install locked workspace
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Typecheck app-client
        shell: bash
        run: |
          set +e
          pnpm --dir apps/app-client/runtime typecheck 2>&1 | tee /tmp/fs10.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Typecheck app-field
        shell: bash
        run: |
          set +e
          pnpm --dir apps/app-field/runtime typecheck 2>&1 | tee /tmp/fs10.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Typecheck app-partner
        shell: bash
        run: |
          set +e
          pnpm --dir apps/app-partner/runtime typecheck 2>&1 | tee /tmp/fs10.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Typecheck control-panel
        shell: bash
        run: |
          set +e
          pnpm --dir apps/control-panel/runtime typecheck 2>&1 | tee /tmp/fs10.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Verify JRN-001 surface registry and deep navigation
        shell: bash
        run: |
          set +e
          node --test services/dsh/tests/jrn-001-fs-10-surfaces.test.mjs 2>&1 | tee /tmp/fs10.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Verify partner surface truth guard
        shell: bash
        run: |
          set +e
          node tools/guards/partner/partner-surface-truth-gate.mjs 2>&1 | tee /tmp/fs10.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Publish FS-10 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then
            STATE=success
            CONTEXT='journeys/jrn-001/fs-10-surfaces'
            DESCRIPTION='FS-10 required surfaces and deep navigation verified'
          else
            STATE=failure
            RAW_ERROR="$(grep -m1 -E 'error TS[0-9]+|AssertionError|not ok|ERR_|missing|failed' /tmp/fs10.log 2>/dev/null || true)"
            ERROR_CODE="$(printf '%s' "$RAW_ERROR" | grep -o -m1 -E 'TS[0-9]+|ERR_[A-Z0-9_]+' || true)"
            [ -n "$ERROR_CODE" ] || ERROR_CODE='surface-check-failed'
            CONTEXT="journeys/jrn-001/fs-10/${ERROR_CODE}"
            DESCRIPTION="$(printf '%s' "${RAW_ERROR:-FS-10 verification failed}" | cut -c1-120)"
          fi
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json