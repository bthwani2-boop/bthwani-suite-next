name: Delivery Exception Slice One
run-name: Delivery Exception Slice One · ${{ github.sha }}

on:
  push:
    branches: ["journey/delivery-exception-redelivery-closure"]
    paths:
      - ".github/workflows/delivery-exception-slice1.yml"
      - "tools/scripts/patch-delivery-exception-slice1.py"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: delivery-exception-slice1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  implement-verify-clean:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsh_delivery_exception
          POSTGRES_USER: dsh_delivery_exception
          POSTGRES_PASSWORD: dsh_delivery_exception
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U dsh_delivery_exception -d dsh_delivery_exception"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DSH_DATABASE_URL: postgres://dsh_delivery_exception:dsh_delivery_exception@localhost:55432/dsh_delivery_exception?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-workspace

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Apply delivery-exception slice one
        shell: bash
        run: |
          set -euo pipefail
          python tools/scripts/patch-delivery-exception-slice1.py

      - name: Format targeted Go files
        shell: bash
        run: |
          set -euo pipefail
          gofmt -w \
            services/dsh/backend/internal/dispatch/dispatch.go \
            services/dsh/backend/internal/dispatch/delivery_exceptions.go \
            services/dsh/backend/internal/dispatch/delivery_exceptions_db_test.go \
            services/dsh/backend/internal/http/dispatch.go \
            services/dsh/backend/internal/http/server.go

      - name: Generate DSH client and prove contract
        shell: bash
        run: |
          set -euo pipefail
          pnpm run openapi:generate:dsh
          grep -F '/dsh/captain/dispatch/assignments/{assignmentId}/exceptions:' services/dsh/contracts/dsh.openapi.yaml
          grep -F '/dsh/operator/delivery-exceptions:' services/dsh/contracts/dsh.openapi.yaml
          grep -F 'DshReportDeliveryExceptionRequest' services/dsh/clients/generated/dsh-api.ts
          grep -F 'reportDshCaptainDeliveryException' services/dsh/clients/generated/dsh-api.ts

      - name: Compile focused backend boundaries
        shell: bash
        run: |
          set -euo pipefail
          cd services/dsh/backend
          go test ./internal/dispatch ./internal/http ./cmd/dsh-api -run '^$' -count=1

      - name: Typecheck captain delivery surface
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec tsc -p apps/app-captain/runtime/tsconfig.order-journey.json --noEmit --pretty false

      - name: Apply all DSH migrations from clean database
        shell: bash
        run: |
          set -euo pipefail
          for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" >/dev/null
          done
          psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-092_delivery_exception_lifecycle.sql >/dev/null

      - name: Prove exception idempotency and progression freeze
        shell: bash
        run: |
          set -euo pipefail
          cd services/dsh/backend
          DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" \
            go test ./internal/dispatch -run '^TestDeliveryExceptionBlocksProgressButAllowsLocationDBIntegration$' -count=1 -v

      - name: Remove temporary execution files and commit verified slice
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/delivery-exception-slice1.yml \
            tools/scripts/patch-delivery-exception-slice1.py
          git add -A
          git commit -m "feat(delivery-exception): add governed captain reporting slice [skip ci]"
          git pull --rebase origin journey/delivery-exception-redelivery-closure
          git push origin HEAD:journey/delivery-exception-redelivery-closure
          final_sha="$(git rev-parse HEAD)"
          jq -n --arg state success --arg context "Delivery Exception Slice One" --arg description "captain report, operator queue, contract and DB proof passed" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$final_sha" \
            -d @status.json

      - name: Publish focused failure status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state failure --arg context "Delivery Exception Slice One" --arg description "focused delivery-exception slice failed" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/${{ github.sha }}" \
            -d @status.json
