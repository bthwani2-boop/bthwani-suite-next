name: JRN-033 Representative Wallets Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths: &jrn033_paths
      - "governance/evidence/jrn-033-final-verification-trigger.txt"
      - "services/wlt/backend/internal/wallet/**"
      - "services/wlt/backend/internal/ledger/**"
      - "services/wlt/database/migrations/wlt-038_jrn_033_representative_finance_tenancy.sql"
      - "services/wlt/database/seeds/local/wlt-033_representative_wallets.local.sql"
      - "infra/docker/scripts/wlt-migration-probes.ps1"
      - "services/dsh/backend/internal/wlt/finance_proxy.go"
      - "services/dsh/backend/internal/wlt/client_test.go"
      - "services/dsh/backend/internal/wlt/representative_wallet_test.go"
      - "services/dsh/backend/internal/http/representative_finance_routes.go"
      - "services/dsh/backend/internal/http/representative_finance_routes_test.go"
      - "services/dsh/backend/internal/http/field_finance.go"
      - "services/dsh/backend/internal/http/field_finance_test.go"
      - "services/dsh/backend/internal/http/actor_finance_handlers.go"
      - "services/dsh/backend/internal/http/financeproxy.go"
      - "services/dsh/frontend/shared/finance-wlt-link/**"
      - "services/dsh/frontend/app-client/account/MySpaceScreen.tsx"
      - "services/dsh/frontend/app-captain/account/DshCaptainFinanceScreen.tsx"
      - "services/dsh/frontend/app-field/finance/DshFieldFinanceScreen.tsx"
      - "services/dsh/frontend/control-panel/finance/**"
      - "apps/control-panel/runtime/src/app/dsh/layout.tsx"
      - "apps/control-panel/runtime/src/app/dsh/finance/page.tsx"
      - "apps/control-panel/runtime/src/app/dsh/finance/jrn-033-visual-evidence/page.tsx"
      - "services/dsh/contracts/jrn-033-representative-finance.openapi.yaml"
      - "services/dsh/contracts/jrn-033-representative-finance-tenancy.contract.json"
      - "services/dsh/tests/jrn-033-representative-wallets-governance.test.mjs"
      - "services/dsh/tests/jrn-033-visual-evidence-governance.test.mjs"
      - "services/dsh/tsconfig.jrn-033.json"
      - "tools/scripts/test-jrn-033-representative-wallets-runtime.ps1"
      - "governance/product/contracts/jrn-033-representative-wallets.product-truth.json"
      - ".github/workflows/jrn-033-representative-wallets-verification.yml"
      - ".github/workflows/jrn-033-runtime-verification.yml"
      - ".github/workflows/jrn-033-visual-evidence.yml"
  pull_request:
    branches: [master]
    paths: *jrn033_paths

permissions:
  contents: read

concurrency:
  group: jrn-033-representative-wallets-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-033 WLT ownership, tenant scope, surfaces, and contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Go from DSH module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Test WLT tenant wallet and ledger boundary
        working-directory: services/wlt/backend
        run: |
          go test ./internal/wallet -count=1
          go test ./internal/ledger -count=1
          go build ./internal/wallet ./internal/ledger ./internal/http
      - name: Test DSH WLT wallet boundary and actor tenant scoping
        working-directory: services/dsh/backend
        run: |
          go test ./internal/wlt -run 'TestFinanceReadWallet' -count=1
          go test ./internal/http -run '^TestRepresentativeOwnWalletRoutesResolveAuthenticatedActor$' -count=1 -v
          go test ./internal/http -run '^TestRepresentativeOwnLedgerRoutesOverrideActorQuery$' -count=1 -v
          go test ./internal/http -run '^TestControlPanelRepresentativeWalletValidatesTypeAndUsesPermissionFallback$' -count=1 -v
          go test ./internal/http -run '^TestControlPanelRepresentativeLedgerPinsActorAndNoStore$' -count=1 -v
          go test ./internal/http -run 'TestHandle(FieldMe|SubmitFieldMe)' -count=1 -v
          go build ./internal/wlt ./internal/http
      - name: Run JRN-033 ownership tenancy route and visual guards
        run: >-
          node --test
          services/dsh/tests/jrn-033-representative-wallets-governance.test.mjs
          services/dsh/tests/jrn-033-visual-evidence-governance.test.mjs
      - name: Typecheck JRN-033 and control-panel evidence graph
        run: |
          pnpm --dir services/dsh exec tsc -p tsconfig.jrn-033.json --noEmit --pretty false
          pnpm --dir apps/control-panel/runtime typecheck
      - name: Parse focused OpenAPI through the repository generator
        run: pnpm --dir services/dsh exec openapi-typescript contracts/jrn-033-representative-finance.openapi.yaml -o /tmp/jrn-033-representative-finance-api.ts
      - name: Validate tenancy and product truth contracts
        run: >-
          node --input-type=module -e
          "import fs from 'node:fs'; import Ajv from 'ajv';
          const schema=JSON.parse(fs.readFileSync('governance/product/product-truth.schema.json','utf8'));
          const truth=JSON.parse(fs.readFileSync('governance/product/contracts/jrn-033-representative-wallets.product-truth.json','utf8'));
          const tenancy=JSON.parse(fs.readFileSync('services/dsh/contracts/jrn-033-representative-finance-tenancy.contract.json','utf8'));
          const validate=new Ajv({allErrors:true,strict:false}).compile(schema);
          if(!validate(truth)){console.error(validate.errors);process.exit(1)}
          if(truth.capabilityId!=='JRN_033_REPRESENTATIVE_WALLETS_REFERENCE_FINANCE'||truth.state!=='DISCOVERY')process.exit(1);
          if(tenancy.tenantBoundary.source!=='core.identity.session.tenantId'||tenancy.tenantBoundary.clientSuppliedTenantAccepted!==false)process.exit(1);"
      - name: Verify repository whitespace
        run: git diff --check
