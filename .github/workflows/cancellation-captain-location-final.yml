name: Cancellation Captain Location Final
run-name: Captain Location Final · ${{ github.sha }}

on:
  push:
    branches: ["journey/cancellation-refund-reconciliation-closure"]
    paths:
      - ".github/workflows/cancellation-captain-location-final.yml"
      - "tools/scripts/patch-cancellation-captain-location-route.py"
      - "services/dsh/frontend/shared/delivery/use-captain-order-runtime.ts"
      - "services/dsh/frontend/app-captain/DshCaptainRouteRenderer.tsx"
      - "services/dsh/frontend/app-captain/orders/DshCaptainMapScreen.tsx"
      - "services/dsh/frontend/app-captain/orders/OperationalCaptainExecutionScreen.tsx"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: cancellation-captain-location-final-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-clean:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-workspace

      - name: Apply captain route closure
        shell: bash
        run: |
          set -euo pipefail
          python tools/scripts/patch-cancellation-captain-location-route.py

      - name: Prove captain location contract and screens
        shell: bash
        run: |
          set -euo pipefail
          runtime="services/dsh/frontend/shared/delivery/use-captain-order-runtime.ts"
          execution="services/dsh/frontend/app-captain/orders/OperationalCaptainExecutionScreen.tsx"
          map="services/dsh/frontend/app-captain/orders/DshCaptainMapScreen.tsx"
          renderer="services/dsh/frontend/app-captain/DshCaptainRouteRenderer.tsx"
          package="apps/app-captain/runtime/package.json"

          grep -F 'readonly assignmentId: string;' "$runtime"
          grep -F 'updateForegroundDispatchLocation(push.assignmentId' "$runtime"
          grep -F 'readCaptainForegroundLocation' "$runtime"
          grep -F "await import('expo-location')" "$runtime"
          grep -F '"expo-location"' "$package"
          grep -F 'const point = await readCaptainForegroundLocation();' "$execution"
          grep -F 'assignmentId={activeAssignmentId}' "$renderer"
          grep -F 'currentStageLabel={activeSummary?.currentStageLabel' "$renderer"
          grep -F 'readonly assignmentId: string;' "$map"
          grep -F 'const point = await readCaptainForegroundLocation();' "$map"
          grep -F 'GPS فعلي' "$map"

          ! grep -F 'Kept as orderId temporarily' "$runtime"
          ! grep -F 'updateForegroundDispatchLocation(push.orderId' "$runtime"
          ! grep -F 'orderId: activeAssignmentId' "$runtime"
          ! grep -F 'navigator.geolocation' "$execution"
          ! grep -F 'STAGE_COORDINATES' "$map"
          ! grep -F 'CAPTAIN_POSITIONS' "$map"
          ! grep -F "captainId = 'captain-1'" "$map"
          ! grep -F 'DshCaptainLifecycleStatus' "$map"
          ! grep -F 'handleStageSelect' "$map"
          ! grep -Ei '(mock|fixture|demo)[A-Za-z0-9_]*[[:space:]]*=' "$execution" "$map"

      - name: Typecheck captain journey surface
        id: captain_typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/captain-location-typecheck
          pnpm exec tsc -p apps/app-captain/runtime/tsconfig.order-journey.json --noEmit --pretty false 2>&1 \
            | tee artifacts/captain-location-typecheck/typecheck.log
          exit ${PIPESTATUS[0]}

      - name: Upload captain location typecheck diagnostic
        if: steps.captain_typecheck.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cancellation-captain-location-typecheck-${{ github.sha }}
          path: artifacts/captain-location-typecheck/typecheck.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on captain location typecheck failure
        if: steps.captain_typecheck.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Remove temporary workflow and publish final head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/cancellation-captain-location-final.yml \
            tools/scripts/patch-cancellation-captain-location-route.py
          git add -A
          git commit -m "fix(cancellation-journey): close real captain location surface [skip ci]"
          git pull --rebase origin journey/cancellation-refund-reconciliation-closure
          git push origin HEAD:journey/cancellation-refund-reconciliation-closure

          final_sha="$(git rev-parse HEAD)"
          jq -n \
            --arg state success \
            --arg context "Cancellation Captain Location Final" \
            --arg description "real captain GPS contract and fixture-free map verified" \
            --arg target_url "$RUN_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$final_sha" \
            -d @status.json

      - name: Publish focused failure status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          jq -n \
            --arg state failure \
            --arg context "Cancellation Captain Location Final" \
            --arg description "captain location closure failed" \
            --arg target_url "$RUN_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/${{ github.sha }}" \
            -d @status.json
