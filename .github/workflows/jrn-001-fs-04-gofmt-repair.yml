name: JRN-001 FS-04 gofmt repair

on:
  push:
    branches: [sambassam]
    paths:
      - .github/workflows/jrn-001-fs-04-gofmt-repair.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.24.5'
          cache: false
      - name: Apply gofmt to FS-04 ownership boundary
        shell: bash
        run: |
          gofmt -w \
            services/dsh/backend/internal/wlt/payout_destination.go \
            services/dsh/backend/internal/partner/onboarding_integrity_handlers.go \
            services/dsh/backend/internal/partner/onboarding_integrity_repository.go \
            services/wlt/backend/internal/payout/upsert_governed.go \
            services/wlt/backend/internal/payout/upsert_governed_test.go \
            services/wlt/backend/internal/http/server.go
          if git diff --quiet; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git config user.name 'bthwani-governance-bot'
          git config user.email 'noreply@bthwani.local'
          git add \
            services/dsh/backend/internal/wlt/payout_destination.go \
            services/dsh/backend/internal/partner/onboarding_integrity_handlers.go \
            services/dsh/backend/internal/partner/onboarding_integrity_repository.go \
            services/wlt/backend/internal/payout/upsert_governed.go \
            services/wlt/backend/internal/payout/upsert_governed_test.go \
            services/wlt/backend/internal/http/server.go
          git commit -m 'style(jrn-001): gofmt FS-04 ownership boundary'
          git push origin HEAD:sambassam
