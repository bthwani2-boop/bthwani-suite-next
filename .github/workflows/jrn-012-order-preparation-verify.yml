name: JRN-012 Order Preparation Verification

on:
  workflow_dispatch:
  push:
    branches:
      - sambassam
    paths:
      - ".github/workflows/jrn-012-order-preparation-verify.yml"
      - "governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md"
      - "governance/product/contracts/jrn-012-order-preparation-readiness.product-truth.json"
      - "services/dsh/contracts/fragments/order-preparation-handoff.fragment.yaml"
      - "services/dsh/contracts/jrn-012-slice-closure.json"
      - "services/dsh/database/migrations/dsh-095_order_preparation_timing.sql"
      - "services/dsh/database/migrations/dsh-095_store_captain_outbound_handoff.sql"
      - "services/dsh/database/migrations/dsh-126_order_preparation_issues.sql"
      - "services/dsh/database/migrations/dsh-127_preparation_issue_item_binding.sql"
      - "services/dsh/database/migrations/dsh-128_preparation_issue_customer_decision.sql"
      - "services/dsh/database/migrations/dsh-129_order_preparation_alerts.sql"
      - "services/dsh/database/tests/dsh-912_jrn012_order_preparation_invariants.sql"
      - "services/dsh/backend/internal/orders/lifecycle.go"
      - "services/dsh/backend/internal/orders/preparation*.go"
      - "services/dsh/backend/internal/http/order_preparation*.go"
      - "services/dsh/backend/internal/http/order_journey_routes.go"
      - "services/dsh/backend/internal/http/partner_order_workboard*.go"
      - "services/dsh/frontend/shared/orders/**"
      - "services/dsh/frontend/shared/partner/partner.adapters.ts"
      - "services/dsh/frontend/shared/dispatch/dispatch.controller-core.ts"
      - "services/dsh/frontend/app-client/orders/ClientPreparationDecisionPanel.tsx"
      - "services/dsh/frontend/app-client/orders/OrderTrackingScreen.tsx"
      - "services/dsh/frontend/app-captain/orders/OperationalCaptainExecutionScreen.tsx"
      - "services/dsh/frontend/app-partner/orders/**"
      - "services/dsh/frontend/control-panel/operations/OrderPreparationAlertsPanel.tsx"
      - "services/dsh/frontend/control-panel/operations/OrderJourneyLiveOrdersScreen.tsx"
      - "services/dsh/tests/jrn-012-*.test.mjs"
      - "services/dsh/tsconfig.jrn-012.json"

permissions:
  contents: write
  statuses: write

concurrency:
  group: jrn-012-order-preparation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-slice-closure:
    name: FS-01..FS-18 executable source closure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
      - name: Execute registered slice and cross-layer assertions
        shell: bash
        run: |
          set -o pipefail
          node --test services/dsh/tests/jrn-012-*.test.mjs 2>&1 | tee jrn012-static-tests.log
      - name: Preserve static failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jrn012-static-tests-log
          path: jrn012-static-tests.log
          retention-days: 3
          if-no-files-found: error

  go-lifecycle:
    name: FS-03/07/08/13/15 Go lifecycle and permissions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Produce canonical Go formatting evidence
        shell: bash
        run: |
          set -euo pipefail
          files=(
            services/dsh/backend/internal/orders/lifecycle.go
            services/dsh/backend/internal/orders/preparation.go
            services/dsh/backend/internal/orders/preparation_sla.go
            services/dsh/backend/internal/orders/preparation_issues.go
            services/dsh/backend/internal/orders/preparation_alerts.go
            services/dsh/backend/internal/orders/preparation_ready_guard.go
            services/dsh/backend/internal/http/order_preparation.go
            services/dsh/backend/internal/http/order_preparation_access.go
            services/dsh/backend/internal/http/order_preparation_issues.go
            services/dsh/backend/internal/http/order_preparation_alerts.go
            services/dsh/backend/internal/http/order_journey_routes.go
            services/dsh/backend/internal/http/partner_order_workboard.go
            services/dsh/backend/internal/http/partner_order_workboard_test.go
          )
          gofmt -w "${files[@]}"
          git diff -- "${files[@]}" > jrn012-gofmt.patch
          printf '%s\n' "${files[@]}" > jrn012-gofmt-files.txt
      - name: Preserve canonical formatted Go files
        uses: actions/upload-artifact@v4
        with:
          name: jrn012-gofmt-output
          path: |
            jrn012-gofmt.patch
            jrn012-gofmt-files.txt
            services/dsh/backend/internal/orders/lifecycle.go
            services/dsh/backend/internal/orders/preparation.go
            services/dsh/backend/internal/orders/preparation_sla.go
            services/dsh/backend/internal/orders/preparation_issues.go
            services/dsh/backend/internal/orders/preparation_alerts.go
            services/dsh/backend/internal/orders/preparation_ready_guard.go
            services/dsh/backend/internal/http/order_preparation.go
            services/dsh/backend/internal/http/order_preparation_access.go
            services/dsh/backend/internal/http/order_preparation_issues.go
            services/dsh/backend/internal/http/order_preparation_alerts.go
            services/dsh/backend/internal/http/order_journey_routes.go
            services/dsh/backend/internal/http/partner_order_workboard.go
            services/dsh/backend/internal/http/partner_order_workboard_test.go
          retention-days: 3
          if-no-files-found: error
      - name: Reject Go formatting drift
        run: test ! -s jrn012-gofmt.patch
      - name: Verify preparation lifecycle and HTTP contracts
        working-directory: services/dsh/backend
        run: go test ./internal/orders ./internal/http -count=1

  database-invariants:
    name: FS-05/08/13/15 PostgreSQL invariants
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jrn012
          POSTGRES_PASSWORD: jrn012
          POSTGRES_DB: jrn012
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jrn012 -d jrn012"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: jrn012
      PGPASSWORD: jrn012
      PGDATABASE: jrn012
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply DSH migrations in lexical order
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "Applying ${migration}"
            psql -v ON_ERROR_STOP=1 -f "${migration}"
          done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Verify preparation persistence decisions alerts and WLT boundary
        shell: bash
        run: |
          set -o pipefail
          psql -v ON_ERROR_STOP=1 -f services/dsh/database/tests/dsh-912_jrn012_order_preparation_invariants.sql \
            2>&1 | tee jrn012-database-tests.log
      - name: Preserve database failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jrn012-database-tests-log
          path: jrn012-database-tests.log
          retention-days: 3
          if-no-files-found: error

  contract-typescript-binding:
    name: FS-06/09/10/11/12/14 contract and TypeScript binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --reporter=silent
      - name: Compose OpenAPI and prove client generation
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir services/dsh openapi:compose
          pnpm --dir services/dsh exec openapi-typescript contracts/generated/dsh.openapi.yaml -o /tmp/jrn012-dsh-api.ts
          grep -q 'createDshPartnerOrderPreparationIssue' /tmp/jrn012-dsh-api.ts
          grep -q 'decideDshClientOrderPreparationIssue' /tmp/jrn012-dsh-api.ts
          grep -q 'resolveDshPartnerOrderPreparationIssue' /tmp/jrn012-dsh-api.ts
          grep -q 'refreshDshOperatorOrderPreparationAlerts' /tmp/jrn012-dsh-api.ts
          grep -q 'acknowledgeDshOperatorOrderPreparationAlert' /tmp/jrn012-dsh-api.ts
          grep -q 'DshPreparationIssueCustomerDecision' /tmp/jrn012-dsh-api.ts
          grep -q 'DshPreparationAlert' /tmp/jrn012-dsh-api.ts
      - name: Typecheck JRN-012 shared brain and all required surfaces
        shell: bash
        run: |
          set -o pipefail
          pnpm --dir services/dsh exec tsc -p tsconfig.jrn-012.json --noEmit 2>&1 | tee jrn012-typecheck.log
      - name: Verify WLT financial ownership boundary
        run: pnpm run guard:wlt-financial-boundary
      - name: Preserve TypeScript failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jrn012-typecheck-log
          path: jrn012-typecheck.log
          retention-days: 3
          if-no-files-found: warn

  sync-canonical-registry:
    name: Synchronize JRN-012 canonical registry state
    if: success() && github.actor != 'github-actions[bot]'
    needs:
      - static-slice-closure
      - go-lifecycle
      - database-invariants
      - contract-typescript-binding
    runs-on: ubuntu-latest
    env:
      VERIFIED_COMMIT: ${{ github.sha }}
      VERIFIED_RUN_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sambassam
          fetch-depth: 0
      - name: Apply verified registry projection
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path('governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '| JRN-012 | قبول الطلب وتحضيره وجاهزيته | DSH | NEEDS_EVIDENCE |',
              '| JRN-012 | قبول الطلب وتحضيره وجاهزيته | DSH | READY_FOR_REVIEW |',
          )
          verified_commit = os.environ['VERIFIED_COMMIT']
          verified_run_id = os.environ['VERIFIED_RUN_ID']
          block = f'''### JRN-012 — قبول الطلب وتحضيره وجاهزيته

tracking_status: READY_FOR_REVIEW
decision: READY_FOR_REVIEW
last_verified_commit: `{verified_commit}`
workflow_run_id: `{verified_run_id}`
status_context: `jrn-012/order-preparation`
technical_slices: `FS-01..FS-18 COMPLETE`
owner_services: `DSH`
required_surfaces: `app-partner`, `app-client`, `app-captain`, `control-panel`, `dsh-backend`, `dsh-postgresql`, `wlt-boundary`
excluded_surfaces: `app-field`, `webapp`, `website` — لا تملك خطوة تشغيلية في قبول الطلب أو تحضيره.
applicable_evidence_scopes: `product`, `static`, `database`, `backend`, `contract`, `frontend`, `security`, `finance-boundary`, `accessibility`, `governance`, `ci`, `release`
open_code_gaps: `[]`
approval_tracking_issue: `#103`
independent_review_pending: Product Owner؛ QA/device/accessibility؛ Security؛ Finance boundary؛ Release/Production.

الأسطح المرشحة: `app-partner`, `app-client`, `app-captain`, `control-panel`.

- سجل عمل الطلبات المملوك للخادم وallowedActions السيادية.
- قبول الطلب أو رفضه مع السبب والصلاحية.
- بدء التحضير وتثبيت وقت التجهيز المتوقع.
- تعديل تقدير التجهيز مع السبب وسجل النسخ.
- العناصر الناقصة والاستبدالات وقرار العميل ومشاكل الطلب.
- مخاطر SLA والتنبيه الدائم والإقرار والتصعيد التشغيلي.
- إعلان الجاهزية ومنع الإعلان في حالة غير صالحة أو مع مشكلة مفتوحة.
- إظهار الجاهزية والمشكلات للشريك والكابتن والعميل والمشغل من حقيقة DSH واحدة.
- التدقيق وoutbox وحدود WLT دون حساب مالي في DSH.
- سجل الشرائح: `services/dsh/contracts/jrn-012-slice-closure.json`.
- Product Truth: `governance/product/contracts/jrn-012-order-preparation-readiness.product-truth.json`.
- دليل الإغلاق التقني: `governance/evidence/JRN-012_FINAL_TECHNICAL_CLOSURE.md`.
- بوابة نفس الالتزام: `jrn-012/order-preparation`.
- جميع الشرائح الوظيفية و`FS-01..FS-18` مغلقة تقنيًا؛ الموافقات البشرية المستقلة فقط متبقية قبل `CLOSED_WITH_EVIDENCE`.
'''
          pattern = re.compile(r'### JRN-012 — قبول الطلب وتحضيره وجاهزيته\n.*?(?=\n### JRN-013 —)', re.S)
          text, count = pattern.subn(block.rstrip(), text)
          if count != 1:
              raise SystemExit(f'expected one JRN-012 block, replaced {count}')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit registry projection
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md; then
            echo "Registry already synchronized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md
          git commit -m "governance(jrn-012): synchronize verified registry state"
          git pull --rebase origin sambassam
          git push origin HEAD:sambassam

  publish-verification-status:
    name: FS-17/18 publish governed closure
    if: always()
    needs:
      - static-slice-closure
      - go-lifecycle
      - database-invariants
      - contract-typescript-binding
    runs-on: ubuntu-latest
    steps:
      - name: Publish result on the exact verified commit
        env:
          GH_TOKEN: ${{ github.token }}
          STATIC_RESULT: ${{ needs.static-slice-closure.result }}
          GO_RESULT: ${{ needs.go-lifecycle.result }}
          DATABASE_RESULT: ${{ needs.database-invariants.result }}
          TYPESCRIPT_RESULT: ${{ needs.contract-typescript-binding.result }}
        shell: bash
        run: |
          set -euo pipefail
          state=success
          description="JRN-012 FS-01..FS-18 automated closure passed"
          for result in "$STATIC_RESULT" "$GO_RESULT" "$DATABASE_RESULT" "$TYPESCRIPT_RESULT"; do
            if [[ "$result" != "success" ]]; then
              state=failure
              description="JRN-012 slice closure failed; inspect the workflow run"
              break
            fi
          done
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="jrn-012/order-preparation" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          [[ "$state" == "success" ]]
