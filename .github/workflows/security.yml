name: BThwani Workflow Security

on:
  workflow_dispatch:
  push:
    branches: [sambassam, bassam]
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/dependabot.yml"
      - ".github/CODEOWNERS"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/run-*.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [master]
    paths:
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/dependabot.yml"
      - ".github/CODEOWNERS"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/run-*.mjs"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

concurrency:
  group: workflow-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Pinned actions and workflow security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Reject mutable action references
        run: pnpm run guard:actions-pin
      - name: Verify workflow policy and permissions
        run: pnpm run guard:guard-registry
      - name: Lint workflow syntax
        run: pnpm run guard:workflow-lint
      - name: Analyze workflow security
        run: pnpm run guard:workflow-security

  result:
    name: BThwani Workflow Security result
    needs: [verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce security result
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: test "${VERIFY_RESULT}" = "success"
