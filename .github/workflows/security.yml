name: Security Gate

on:
  pull_request:
    branches: [master]
  push:
    branches: [bassam, master]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, AGPL-3.0

  govulncheck:
    name: Govulncheck — ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: DSH
            directory: services/dsh/backend
            go_mod: services/dsh/backend/go.mod
            go_sum: services/dsh/backend/go.sum
          - name: WLT
            directory: services/wlt/backend
            go_mod: services/wlt/backend/go.mod
            go_sum: services/wlt/backend/go.sum
          - name: Identity
            directory: core/identity/backend
            go_mod: core/identity/backend/go.mod
            go_sum: core/identity/backend/go.sum
          - name: Workforce
            directory: core/workforce/backend
            go_mod: core/workforce/backend/go.mod
            go_sum: core/workforce/backend/go.sum
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: ${{ matrix.go_mod }}
          cache: true
          cache-dependency-path: ${{ matrix.go_sum }}
      - name: Install version-locked govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
      - name: Run govulncheck
        working-directory: ${{ matrix.directory }}
        run: govulncheck ./...

  node-security:
    name: Node dependency security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Audit high severity dependencies
        run: pnpm audit --audit-level=high

  oss-security-scans:
    name: OSS filesystem dependency and secrets scans
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Install version-locked security tools
        run: bash tools/scripts/install-oss-toolchain-binaries.sh security
      - name: Run all security scanners without suppressing failures
        shell: bash
        run: |
          set +e
          failures=0
          run_scan() {
            local name="$1"
            shift
            echo "::group::$name"
            "$@"
            local result=$?
            echo "::endgroup::"
            if [ "$result" -ne 0 ]; then
              echo "::error title=$name failed::exit=$result"
              failures=$((failures + 1))
            fi
          }
          run_scan trivy pnpm run security:trivy
          run_scan osv pnpm run security:osv
          run_scan gitleaks pnpm run guard:secrets
          test "$failures" -eq 0

  workflow-policy:
    name: Workflow permissions mutation and registration policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify workflow policy
        run: pnpm run guard:guard-registry

  security-result:
    name: Security result
    if: always()
    needs: [dependency-review, govulncheck, node-security, oss-security-scans, workflow-policy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require every applicable security job to pass
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPENDENCY_REVIEW: ${{ needs.dependency-review.result }}
          GOVULNCHECK: ${{ needs.govulncheck.result }}
          NODE_SECURITY: ${{ needs.node-security.result }}
          OSS_SCANS: ${{ needs.oss-security-scans.result }}
          WORKFLOW_POLICY: ${{ needs.workflow-policy.result }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = pull_request ]; then
            test "$DEPENDENCY_REVIEW" = success
          else
            test "$DEPENDENCY_REVIEW" = skipped
          fi
          test "$GOVULNCHECK" = success
          test "$NODE_SECURITY" = success
          test "$OSS_SCANS" = success
          test "$WORKFLOW_POLICY" = success
