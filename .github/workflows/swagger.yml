name: Swagger API Docs

on:
  push:
    branches: [implementing, master, onebyone]
    paths:
      - "contracts/**"
      - "core/**/contracts/**"
      - "services/**/contracts/**"
      - "tools/scripts/build-swagger-static.mjs"
      - ".github/workflows/swagger.yml"
  pull_request:
    branches: [implementing, master, onebyone]
    paths:
      - "contracts/**"
      - "core/**/contracts/**"
      - "services/**/contracts/**"
      - "tools/scripts/build-swagger-static.mjs"
      - ".github/workflows/swagger.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    name: Build Swagger UI Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Swagger static files
        run: pnpm run swagger:build

      - name: Upload Swagger UI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swagger-api-docs
          path: dist-swagger
          retention-days: 30
