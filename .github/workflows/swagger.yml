name: Swagger API Docs

on:
  push:
    branches:
      - bassam
      - master
      - "fix/lian-sovereign-final-closure"
    paths:
      - "contracts/**"
      - "core/**/contracts/**"
      - "services/**/contracts/**"
      - "tools/scripts/build-swagger-static.mjs"
      - ".github/workflows/swagger.yml"
  pull_request:
    branches: [master]
    paths:
      - "contracts/**"
      - "core/**/contracts/**"
      - "services/**/contracts/**"
      - "tools/scripts/build-swagger-static.mjs"
      - ".github/workflows/swagger.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swagger-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build Swagger UI documentation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Build Swagger static files
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          pnpm run swagger:build 2>&1 | tee artifacts/swagger-build.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Upload Swagger diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: swagger-build-${{ github.sha }}
          path: |
            artifacts/swagger-build.log
            dist-swagger
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce Swagger build
        if: steps.build.outcome != 'success'
        shell: bash
        run: exit 1
