name: Swagger API Docs

on:
  push:
    branches: [bassam, master]
    paths:
      - "contracts/**"
      - "core/**/contracts/**"
      - "services/**/contracts/**"
      - "tools/scripts/build-swagger-static.mjs"
      - ".github/workflows/swagger.yml"
  pull_request:
    branches: [master]
    paths:
      - "contracts/**"
      - "core/**/contracts/**"
      - "services/**/contracts/**"
      - "tools/scripts/build-swagger-static.mjs"
      - ".github/workflows/swagger.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swagger-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build Swagger UI documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Build Swagger static files
        run: pnpm run swagger:build
      - name: Upload Swagger UI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: swagger-api-docs
          path: dist-swagger
          if-no-files-found: error
          retention-days: 7
