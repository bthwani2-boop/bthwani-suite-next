name: One-time finance final validation v2

on:
  push:
    branches: [bassam]
    paths:
      - .github/workflows/one-time-finance-final-validation-v2.yml

permissions:
  contents: write

concurrency:
  group: one-time-finance-final-validation-v2-bassam
  cancel-in-progress: false

jobs:
  validate-report-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout bassam
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: bassam
          fetch-depth: 0

      - name: Setup repository Node workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.26.5'
          cache-dependency-path: |
            services/wlt/backend/go.sum
            services/dsh/backend/go.sum

      - name: Execute closure gates and write report
        id: gates
        shell: bash
        run: |
          set +e
          mkdir -p .finance-validation-logs
          report="governance/evidence/FINANCE_FINAL_REMOTE_VALIDATION.md"
          mkdir -p "$(dirname "$report")"
          : > "$report"
          printf '# Finance Final Remote Validation\n\n' >> "$report"
          printf -- '- Branch: `bassam`\n' >> "$report"
          printf -- '- Source SHA: `%s`\n' "$(git rev-parse HEAD)" >> "$report"
          printf -- '- Executed at: `%s`\n\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$report"

          failed=0
          run_gate() {
            name="$1"
            shift
            slug="$(printf '%s' "$name" | tr '[:upper:] ' '[:lower:]-' | tr -cd 'a-z0-9_-')"
            log=".finance-validation-logs/${slug}.log"
            printf '## %s\n\n' "$name" >> "$report"
            "$@" >"$log" 2>&1
            code=$?
            if [ "$code" -eq 0 ]; then
              printf -- '- Result: **PASS**\n\n' >> "$report"
            else
              failed=1
              printf -- '- Result: **FAIL** (exit `%s`)\n\n' "$code" >> "$report"
            fi
            printf '```text\n' >> "$report"
            tail -n 200 "$log" >> "$report"
            printf '\n```\n\n' >> "$report"
          }

          run_gate "Finance source drift patcher" node tools/scripts/close-finance-source-drift.mjs
          run_gate "Finance contract patcher" node tools/scripts/close-finance-contracts.mjs
          run_gate "Generate DSH OpenAPI client" pnpm run openapi:generate:dsh
          run_gate "Generate WLT OpenAPI client" pnpm run openapi:generate:wlt

          run_gate "Go formatting" bash -lc 'gofmt -w \
            services/wlt/backend/internal/commercial/commercial_governed.go \
            services/wlt/backend/internal/commercial/string_value.go \
            services/wlt/backend/internal/payment/payment.go \
            services/wlt/backend/internal/payment/sovereign_capture.go \
            services/wlt/backend/internal/cod/sovereign_cod.go \
            services/wlt/backend/internal/refund/sovereign_refund.go \
            services/wlt/backend/internal/payout/sovereign_payout.go \
            services/wlt/backend/internal/payout/read_provider_proof.go \
            services/wlt/backend/internal/reference/payment_session.go \
            services/wlt/backend/internal/reference/trusted_tenant_handler.go \
            services/wlt/backend/internal/settlement/governed_source.go \
            services/wlt/backend/internal/http/server.go \
            services/dsh/backend/internal/wlt/client.go \
            services/dsh/backend/internal/wlt/settlement_client.go \
            services/dsh/backend/internal/wlt/subscription_payment_generic.go \
            services/dsh/backend/internal/marketing/audit.go \
            services/dsh/backend/internal/partnerfleet/courier_codes.go \
            services/dsh/backend/internal/http/financeproxy_payout_transitions.go \
            services/dsh/backend/internal/http/finance_settlement_sources.go \
            services/dsh/backend/internal/http/server.go'

          run_gate "Git whitespace validation" git diff --check
          run_gate "WLT migration prefix uniqueness" bash -lc 'duplicates=$(find services/wlt/database/migrations -maxdepth 1 -type f -printf "%f\n" | sed -n "s/^\(wlt-[0-9][0-9][0-9]\)_.*/\1/p" | sort | uniq -d); test -z "$duplicates" || { echo "duplicate WLT migration prefixes:"; echo "$duplicates"; exit 1; }'
          run_gate "WLT Go tests" bash -lc 'cd services/wlt/backend && go test ./...'
          run_gate "WLT Go build" bash -lc 'cd services/wlt/backend && go build ./...'
          run_gate "DSH Go tests" bash -lc 'cd services/dsh/backend && go test ./...'
          run_gate "DSH Go build" bash -lc 'cd services/dsh/backend && go build ./...'
          run_gate "OpenAPI contracts lint" pnpm run contracts:lint
          run_gate "WLT TypeScript typecheck" pnpm --dir services/wlt typecheck
          run_gate "Control-panel TypeScript typecheck" pnpm --dir apps/control-panel/runtime typecheck
          run_gate "WLT financial boundary guard" pnpm run guard:wlt-financial-boundary
          run_gate "Runtime config guard" pnpm run guard:runtime-config
          run_gate "API binding guard" pnpm run guard:api-binding
          run_gate "Backend API binding guard" pnpm run guard:backend-api-binding
          run_gate "Frontend feature binding guard" pnpm run guard:frontend-feature-binding
          run_gate "Go route extraction guard" pnpm run guard:go-routes-ci
          run_gate "Broken imports guard" pnpm run guard:no-broken-imports
          run_gate "Finance Docker reset and smoke" pwsh -NoProfile -ExecutionPolicy Bypass -File tools/scripts/financial-simulator-local.ps1 -Action reset

          printf '## Final verdict\n\n' >> "$report"
          if [ "$failed" -eq 0 ]; then
            printf '**PASS — all finance closure gates passed, including Docker provider journeys.**\n' >> "$report"
          else
            printf '**FAIL — one or more finance closure gates failed; see sections above.**\n' >> "$report"
          fi
          echo "failed=$failed" >> "$GITHUB_OUTPUT"

      - name: Commit generated fixes and validation evidence
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/one-time-finance-final-validation-v2.yml
          rm -f governance/evidence/FINANCE_STRUCT_DIAGNOSTIC.md
          rm -rf .finance-validation-logs
          git config user.name "bthwani-finance-validation-bot"
          git config user.email "finance-validation-bot@users.noreply.github.com"
          git add -A
          git commit -m "test(finance): record complete remote closure validation" || true
          git fetch origin bassam
          git rebase origin/bassam
          git push origin HEAD:bassam

      - name: Fail workflow when a gate failed
        if: steps.gates.outputs.failed == '1'
        shell: bash
        run: exit 1
