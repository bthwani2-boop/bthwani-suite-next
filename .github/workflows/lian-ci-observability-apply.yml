name: Render Canonical CI Observability

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-ci-observability-apply.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: lian-ci-observability-render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Publish render run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          jq -n \
            --arg state pending \
            --arg context bthwani/lian-ci-observability-render \
            --arg description "canonical CI files are being rendered and validated" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/render-status.json
          curl --fail-with-body --retry 3 -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/render-status.json

      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Render canonical files
        run: python3 tools/scripts/render-lian-ci-observability.py

      - name: Validate rendered workflow and DSH alignment
        shell: bash
        run: |
          set -euo pipefail
          pnpm run guard:workflow-lint
          grep -Fq 'name: Publish contextual CI run locator' .github/workflows/ci.yml
          grep -Fq 'name: Verify complete Node tests' .github/workflows/ci.yml
          grep -Fq 'operationId: patchPartnerProductProposal' services/dsh/backend/internal/http/catalog_contract_alignment_test.go
          if grep -Eq 'GH_TOKEN: (ghp_|github_pat_)' .github/workflows/ci.yml; then
            echo 'refusing to export an expanded GitHub token' >&2
            exit 1
          fi
          git diff --check
          git diff -- .github/workflows/ci.yml services/dsh/backend/internal/http/catalog_contract_alignment_test.go governance/github/lianbassam-full-verification.trigger.json > /tmp/lian-ci-observability.patch

      - name: Create immutable Git blobs and tree manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          create_blob() {
            local file="$1"
            local payload response
            payload="$(base64 -w0 "${file}")"
            response="$(jq -n --arg content "${payload}" '{content:$content,encoding:"base64"}' | \
              curl --fail-with-body --retry 3 -sS -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/blobs" \
                --data-binary @-)"
            jq -er '.sha' <<<"${response}"
          }

          base_commit="$(git rev-parse HEAD)"
          base_tree="$(git rev-parse 'HEAD^{tree}')"
          ci_blob="$(create_blob .github/workflows/ci.yml)"
          dsh_test_blob="$(create_blob services/dsh/backend/internal/http/catalog_contract_alignment_test.go)"
          trigger_blob="$(create_blob governance/github/lianbassam-full-verification.trigger.json)"

          jq -n \
            --arg baseCommit "${base_commit}" \
            --arg baseTree "${base_tree}" \
            --arg ciBlob "${ci_blob}" \
            --arg dshTestBlob "${dsh_test_blob}" \
            --arg triggerBlob "${trigger_blob}" \
            '{
              baseCommit:$baseCommit,
              baseTree:$baseTree,
              entries:[
                {path:".github/workflows/ci.yml",mode:"100644",type:"blob",sha:$ciBlob},
                {path:"services/dsh/backend/internal/http/catalog_contract_alignment_test.go",mode:"100644",type:"blob",sha:$dshTestBlob},
                {path:"governance/github/lianbassam-full-verification.trigger.json",mode:"100644",type:"blob",sha:$triggerBlob},
                {path:".github/workflows/lian-ci-observability-apply.yml",mode:"100644",type:"blob",sha:null},
                {path:"tools/scripts/render-lian-ci-observability.py",mode:"100644",type:"blob",sha:null}
              ]
            }' > /tmp/lian-git-object-manifest.json
          cat /tmp/lian-git-object-manifest.json

      - name: Upload validated canonical files and Git manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lian-ci-observability-render-${{ github.run_id }}
          path: |
            .github/workflows/ci.yml
            services/dsh/backend/internal/http/catalog_contract_alignment_test.go
            governance/github/lianbassam-full-verification.trigger.json
            /tmp/lian-ci-observability.patch
            /tmp/lian-git-object-manifest.json
          if-no-files-found: error
          retention-days: 2

      - name: Publish render success
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          jq -n \
            --arg state success \
            --arg context bthwani/lian-ci-observability-render \
            --arg description "canonical files validated and immutable Git blobs created" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/render-status.json
          curl --fail-with-body --retry 3 -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/render-status.json
