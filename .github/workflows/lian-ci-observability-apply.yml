name: Apply Canonical CI Observability

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-ci-observability-apply.yml"

permissions:
  contents: write

concurrency:
  group: lian-ci-observability-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout branch with push credentials
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Patch canonical CI and self-delete
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          ci = Path('.github/workflows/ci.yml')
          text = ci.read_text(encoding='utf-8')

          checkout_anchor = '''      - name: Set up locked Node runtime
          uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
          with:
            node-version: "24.17.0"
'''
          locator = checkout_anchor + '''      - name: Publish contextual CI run locator
          shell: bash
          env:
            GH_TOKEN: ${{ github.token }}
          run: |
            set -euo pipefail
            jq -n \\
              --arg state pending \\
              --arg context bthwani/contextual-ci \\
              --arg description "contextual CI routing and verification are running" \\
              --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \\
              '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/contextual-ci-status.json
            curl --fail-with-body --retry 3 \\
              -X POST \\
              -H "Accept: application/vnd.github+json" \\
              -H "Authorization: Bearer ${GH_TOKEN}" \\
              -H "X-GitHub-Api-Version: 2022-11-28" \\
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \\
              --data-binary @/tmp/contextual-ci-status.json
'''
          if 'name: Publish contextual CI run locator' not in text:
              if checkout_anchor not in text:
                  raise RuntimeError('context setup anchor not found')
              text = text.replace(checkout_anchor, locator, 1)

          policy_old = '''      - name: Verify canonical governance and commands
          run: |
            pnpm run guard:governance-schema
            pnpm run guard:agent-governance
            pnpm run guard:authority-separation
            pnpm run guard:saas-governance
            pnpm run guard:guard-registry
            pnpm run guard:sdlc
            pnpm run guard:cleanup-policy
            pnpm run guard:required-command-integrity
'''
          policy_new = '''      - name: Verify governance schema
          run: pnpm run guard:governance-schema
      - name: Verify agent governance
          run: pnpm run guard:agent-governance
      - name: Verify authority separation
          run: pnpm run guard:authority-separation
      - name: Verify SaaS governance
          run: pnpm run guard:saas-governance
      - name: Verify guard registry
          run: pnpm run guard:guard-registry
      - name: Verify SDLC governance
          run: pnpm run guard:sdlc
      - name: Verify cleanup policy
          run: pnpm run guard:cleanup-policy
      - name: Verify required command integrity
          run: pnpm run guard:required-command-integrity
'''
          if policy_old not in text:
              raise RuntimeError('policy aggregate anchor not found')
          text = text.replace(policy_old, policy_new, 1)

          node_old = '''      - name: Verify imports, contracts, and bindings
          if: ${{ needs.context.outputs.contracts == 'true' }}
          run: |
            pnpm run guard:no-broken-imports
            pnpm run contracts:lint
            pnpm run guard:api-binding
            pnpm run guard:backend-api-binding
            pnpm run guard:service-manifest-drift
            pnpm run guard:frontend-feature-binding
            pnpm run guard:runtime-real-bindings
            pnpm run guard:live-cross-journey-integrity
'''
          node_new = '''      - name: Verify imports resolve
          if: ${{ needs.context.outputs.contracts == 'true' }}
          run: pnpm run guard:no-broken-imports
      - name: Verify contract foundation
          if: ${{ needs.context.outputs.contracts == 'true' }}
          run: pnpm run contracts:lint
      - name: Verify frontend API binding
          if: ${{ needs.context.outputs.contracts == 'true' }}
          run: pnpm run guard:api-binding
      - name: Verify backend API binding
          if: ${{ needs.context.outputs.contracts == 'true' }}
          run: pnpm run guard:backend-api-binding
      - name: Verify service manifest drift
          if: ${{ needs.context.outputs.contracts == 'true' }}
          run: pnpm run guard:service-manifest-drift
      - name: Verify frontend feature binding
          if: ${{ needs.context.outputs.contracts == 'true' }}
          run: pnpm run guard:frontend-feature-binding
      - name: Verify runtime-facing bindings
          if: ${{ needs.context.outputs.contracts == 'true' }}
          run: pnpm run guard:runtime-real-bindings
      - name: Verify cross-journey integrity
          if: ${{ needs.context.outputs.contracts == 'true' }}
          run: pnpm run guard:live-cross-journey-integrity
'''
          if node_old not in text:
              raise RuntimeError('node aggregate anchor not found')
          text = text.replace(node_old, node_new, 1)
          ci.write_text(text, encoding='utf-8')

          trigger = Path('governance/github/lianbassam-full-verification.trigger.json')
          doc = json.loads(trigger.read_text(encoding='utf-8'))
          doc['attempt'] = 11
          doc['previousRunId'] = 29978166359
          remediation = doc.setdefault('remediation', [])
          marker = 'VERIFY_PER_GUARD_CANONICAL_CI_OBSERVABILITY'
          if marker not in remediation:
              remediation.append(marker)
          trigger.write_text(json.dumps(doc, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')

          Path('.github/workflows/lian-ci-observability-apply.yml').unlink(missing_ok=True)
          PY

      - name: Validate canonical workflow syntax surface
        shell: bash
        run: |
          set -euo pipefail
          grep -Fq 'name: Publish contextual CI run locator' .github/workflows/ci.yml
          grep -Fq 'name: Verify backend API binding' .github/workflows/ci.yml
          grep -Fq 'name: Verify required command integrity' .github/workflows/ci.yml

      - name: Commit canonical CI observability
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bthwani-ci-observability-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "ci: expose per-guard verification failures"
          git push origin HEAD:lianbassam
