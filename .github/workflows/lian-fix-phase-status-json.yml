name: Lian Fix Phase Status JSON

on:
  push:
    branches: [lian]
    paths:
      - ".github/workflows/lian-fix-phase-status-json.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: lian
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Repair status payloads and self-remove
        shell: python
        run: |
          from pathlib import Path
          target = Path('.github/workflows/lian-closure-phase-status.yml')
          text = target.read_text(encoding='utf-8')
          old = "'{state,context,description,target_url}'"
          new = "'{state:$state,context:$context,description:$description,target_url:$target_url}'"
          count = text.count(old)
          if count != 6:
              raise SystemExit(f'expected 6 status payloads, found {count}')
          target.write_text(text.replace(old, new), encoding='utf-8')
          Path('.github/workflows/lian-fix-phase-status-json.yml').unlink()
      - name: Commit repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bthwani-governance-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(ci): publish valid granular phase statuses"
          git push origin HEAD:lian
