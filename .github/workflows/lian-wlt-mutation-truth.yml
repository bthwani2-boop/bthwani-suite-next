name: Lian WLT Mutation Truth

on:
  push:
    branches: [lian]
    paths:
      - "services/dsh/backend/internal/wlt/**"
      - "services/wlt/**"
      - "tools/guards/finance/**"
      - ".github/workflows/lian-wlt-mutation-truth.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lian-wlt-mutation-truth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wlt-mutation-truth:
    name: DSH to WLT mutation idempotency
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Verify mutation source invariants
        run: node tools/guards/finance/dsh-wlt-mutation-idempotency-gate.mjs

      - name: Test DSH WLT client package
        working-directory: services/dsh/backend
        run: go test ./internal/wlt -count=1

      - name: Verify DSH WLT boundary
        run: pnpm run guard:wlt-financial-boundary

  result:
    name: Lian WLT Mutation Truth result
    if: always()
    needs: [wlt-mutation-truth]
    runs-on: ubuntu-latest
    steps:
      - name: Require WLT mutation truth to pass
        env:
          RESULT: ${{ needs.wlt-mutation-truth.result }}
        shell: bash
        run: |
          set -euo pipefail
          test "$RESULT" = success
