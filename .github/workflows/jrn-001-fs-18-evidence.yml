name: JRN-001 FS-18 Evidence

on:
  push:
    branches: [sambassam]
    paths:
      - governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md
      - governance/evidence/JRN-001_PARTNER_ONBOARDING_EVIDENCE.json
      - governance/evidence/JRN-001_PARTNER_ONBOARDING_STORE_PUBLICATION.md
      - governance/runbooks/JRN-001_PARTNER_ONBOARDING_SUPPORT.md
      - services/dsh/contracts/jrn-001-*.json
      - services/dsh/contracts/dsh.partner-onboarding.openapi.yaml
      - services/dsh/backend/internal/http/partner_lifecycle_routes.go
      - services/dsh/backend/internal/partner/**
      - services/dsh/backend/internal/partnerwltoutbox/**
      - services/dsh/backend/internal/store/**
      - services/dsh/database/migrations/dsh-015_partner_lifecycle.sql
      - services/dsh/database/migrations/dsh-098_partner_onboarding_integrity.sql
      - services/dsh/frontend/shared/partner/**
      - services/dsh/frontend/shared/field-onboarding/**
      - services/dsh/frontend/shared/store/**
      - services/dsh/frontend/app-field/onboarding/**
      - services/dsh/frontend/app-partner/account/**
      - services/dsh/frontend/app-partner/team/**
      - services/dsh/frontend/control-panel/partners/**
      - services/dsh/frontend/app-client/home-discovery/**
      - services/dsh/frontend/app-client/store/**
      - services/dsh/tests/jrn-001-*.test.mjs
      - tools/guards/partner/jrn-001-*.mjs
      - .github/workflows/jrn-001-fs-18-evidence.yml

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-001-fs-18-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Install locked workspace
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Verify repository hygiene
        run: git diff --check
      - name: Verify JRN-001 contract tests individually
        shell: bash
        run: |
          rm -f /tmp/jrn001-failure
          for test_file in services/dsh/tests/jrn-001-*.test.mjs; do
            echo "==> $test_file"
            if ! node --test "$test_file"; then
              printf 'test-%s' "$(basename "$test_file" .test.mjs)" >/tmp/jrn001-failure
              exit 1
            fi
          done
      - name: Verify JRN-001 guards individually
        shell: bash
        run: |
          for guard in tools/guards/partner/jrn-001-*.mjs; do
            echo "==> $guard"
            if ! node "$guard"; then
              printf 'guard-%s' "$(basename "$guard" .mjs)" >/tmp/jrn001-failure
              exit 1
            fi
          done
      - name: Verify partner and store backend packages
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set +e
          go test ./internal/partner ./internal/store -count=1 2>&1 | tee /tmp/jrn001-go-domain.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            RAW="$(grep -m1 -E -- '--- FAIL:|undefined:|cannot use|not enough arguments|too many arguments|panic:|FAIL[[:space:]]' /tmp/jrn001-go-domain.log || true)"
            DETAIL="$(printf '%s' "${RAW:-package-failed}" | tr -cs '[:alnum:]' '-' | sed -E 's/^-+|-+$//g' | cut -c1-58)"
            printf 'go-domain-%s' "$DETAIL" >/tmp/jrn001-failure
            exit "$EXIT_CODE"
          fi
      - name: Verify partner WLT outbox package
        working-directory: services/dsh/backend
        shell: bash
        run: |
          if ! go test ./internal/partnerwltoutbox -count=1; then
            printf 'go-partnerwltoutbox' >/tmp/jrn001-failure
            exit 1
          fi
      - name: Verify governed route registration
        working-directory: services/dsh/backend
        shell: bash
        run: |
          if ! go test ./internal/http -run 'TestFirstFiveJourneysExposeGovernedDSHRoutes|TestPartnerSelfRoutesRegisterOnceOnApplicationRouter' -count=1; then
            printf 'go-http-routes' >/tmp/jrn001-failure
            exit 1
          fi
      - name: Typecheck current JRN-001 field surface
        shell: bash
        run: |
          if ! pnpm --dir apps/app-field/runtime typecheck; then
            printf 'typecheck-app-field' >/tmp/jrn001-failure
            exit 1
          fi
      - name: Verify WLT financial boundary
        shell: bash
        run: |
          if ! node tools/guards/wlt-financial-boundary-gate.mjs; then
            printf 'wlt-financial-boundary' >/tmp/jrn001-failure
            exit 1
          fi
      - name: Publish same-commit FS-17 and FS-18 statuses
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          [ "$RESULT" = success ] && STATE=success || STATE=failure
          FAILURE_DETAIL="$(cat /tmp/jrn001-failure 2>/dev/null || true)"
          DESCRIPTION="JRN-001 same-commit evidence: $RESULT"
          [ -z "$FAILURE_DETAIL" ] || DESCRIPTION="$DESCRIPTION ($FAILURE_DETAIL)"
          for CONTEXT in 'journeys/jrn-001/fs-17-comprehensive' 'journeys/jrn-001/fs-18-evidence'; do
            jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
            curl --fail-with-body --silent --show-error -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
              -d @/tmp/status.json
          done
          if [ "$STATE" = failure ] && [ -n "$FAILURE_DETAIL" ]; then
            FAILURE_CONTEXT="journeys/jrn-001/failure/$FAILURE_DETAIL"
            FAILURE_CONTEXT="$(printf '%s' "$FAILURE_CONTEXT" | cut -c1-100)"
            jq -n --arg state failure --arg context "$FAILURE_CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
            curl --fail-with-body --silent --show-error -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
              -d @/tmp/status.json
          fi
