name: JRN-001 FS-18 Evidence

on:
  push:
    branches: [sambassam]
    paths:
      - governance/evidence/JRN-001_PARTNER_ONBOARDING_EVIDENCE.json
      - governance/evidence/JRN-001_PARTNER_ONBOARDING_STORE_PUBLICATION.md
      - governance/runbooks/JRN-001_PARTNER_ONBOARDING_SUPPORT.md
      - services/dsh/contracts/jrn-001-*.json
      - services/dsh/contracts/dsh.partner-activation.openapi.yaml
      - services/dsh/backend/internal/http/partner_lifecycle_routes.go
      - services/dsh/backend/internal/partner/**
      - services/dsh/backend/internal/partnerwltoutbox/**
      - services/dsh/database/migrations/dsh-015_partner_lifecycle.sql
      - services/dsh/database/migrations/dsh-098_partner_onboarding_integrity.sql
      - services/dsh/frontend/shared/partner/**
      - services/dsh/frontend/shared/field-onboarding/**
      - services/dsh/frontend/app-field/onboarding/**
      - services/dsh/tests/jrn-001-*.test.mjs
      - tools/guards/partner/jrn-001-*.mjs
      - .github/workflows/jrn-001-fs-18-evidence.yml

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-001-fs-18-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Install locked workspace
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Verify repository hygiene
        run: git diff --check
      - name: Verify all JRN-001 contracts tests and guards
        run: |
          node --test services/dsh/tests/jrn-001-*.test.mjs
          for guard in tools/guards/partner/jrn-001-*.mjs; do node "$guard"; done
      - name: Verify JRN-001 backend and outbox
        working-directory: services/dsh/backend
        run: |
          go test ./internal/partner ./internal/partnerwltoutbox -count=1
          go test ./internal/http -run 'TestFirstFiveJourneysExposeGovernedDSHRoutes|TestPartnerSelfRoutesRegisterOnceOnApplicationRouter' -count=1
      - name: Typecheck current JRN-001 field surface
        run: pnpm --dir apps/app-field/runtime typecheck
      - name: Verify WLT financial boundary
        run: node tools/guards/wlt-financial-boundary-gate.mjs
      - name: Publish same-commit FS-17 and FS-18 statuses
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          [ "$RESULT" = success ] && STATE=success || STATE=failure
          for CONTEXT in 'journeys/jrn-001/fs-17-comprehensive' 'journeys/jrn-001/fs-18-evidence'; do
            jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "JRN-001 same-commit evidence: $RESULT" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
            curl --fail-with-body --silent --show-error -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
              -d @/tmp/status.json
          done
