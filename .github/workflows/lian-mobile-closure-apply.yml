name: Apply Mobile Remote Readiness Closure

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-mobile-closure-apply.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: lian-mobile-closure-apply
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Publish closure run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          jq -n \
            --arg state pending \
            --arg context bthwani/mobile-closure-apply \
            --arg description "mobile remote-readiness closure is running" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/mobile-closure-status.json
          curl --fail-with-body --retry 3 -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/mobile-closure-status.json

      - name: Checkout moving branch with write credentials
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up locked Node and pnpm
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
      - shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.34.0 --activate
          pnpm --version

      - name: Apply support media and native closure
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, gzip
          payload = ""
          open('/tmp/finalize.py', 'wb').write(gzip.decompress(base64.b64decode(payload)))
          PY
          python3 /tmp/finalize.py
          gofmt -w \
            services/dsh/backend/internal/support/support.go \
            services/dsh/backend/internal/support/governed.go \
            services/dsh/backend/internal/support/actor.go \
            services/dsh/backend/internal/support/rich_message_media.go \
            services/dsh/backend/internal/http/support.go \
            services/dsh/backend/internal/http/support_compat.go \
            services/dsh/backend/internal/http/governed_support.go \
            services/dsh/backend/internal/http/partner_support.go \
            services/dsh/backend/internal/http/support_media_request.go

      - name: Regenerate lockfile and install immutable workspace
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --lockfile-only --no-frozen-lockfile
          pnpm install --frozen-lockfile
          pnpm mobile:apps:sync

      - name: Verify mobile and support closure
        shell: bash
        run: |
          set -euo pipefail
          pnpm mobile:apps:check
          pnpm mobile:expo:verify
          pnpm --dir shared/data-runtime typecheck
          pnpm --dir shared/data-runtime test
          pnpm --dir shared/media-runtime typecheck
          pnpm --dir shared/media-runtime test
          pnpm --dir apps/app-client/runtime typecheck
          pnpm --dir apps/app-partner/runtime typecheck
          pnpm --dir apps/app-captain/runtime typecheck
          pnpm --dir apps/app-field/runtime typecheck
          pnpm contracts:lint
          (
            cd services/dsh/backend
            go test ./internal/support ./internal/http -count=1
            go build ./...
          )
          pnpm mobile:prebuild:verify

      - name: Commit verified closure and self-delete
        shell: bash
        run: |
          set -euo pipefail
          test ! -e .github/workflows/lian-mobile-closure-apply.yml
          test ! -e .github/workflows/lian-ci-observability-apply.yml
          git config user.name "bthwani-mobile-closure-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(mobile): close remote build and media runtime gaps"
          git fetch origin lianbassam
          git rebase origin/lianbassam
          git push origin HEAD:lianbassam
