name: Lian Partner Support Truth

on:
  push:
    branches: [lian]
    paths:
      - "services/dsh/contracts/dsh.partner-support.openapi.yaml"
      - "services/dsh/contracts/contract-registry.ts"
      - "services/dsh/capability-map.extensions.ts"
      - "contracts/master.openapi.yaml"
      - "services/dsh/database/migrations/dsh-059_partner_support_integrity.sql"
      - "services/dsh/database/tests/dsh-059_partner_support_invariants.sql"
      - "services/dsh/backend/internal/support/**"
      - "services/dsh/backend/internal/http/partner_support.go"
      - "services/dsh/backend/internal/http/server.go"
      - "services/dsh/frontend/shared/support/**"
      - "services/dsh/frontend/app-partner/account/PartnerSupportScreen.tsx"
      - "tools/guards/backend-api-binding-gate.mjs"
      - "tools/guards/partner/partner-support-truth-gate.mjs"
      - ".github/workflows/lian-partner-support-truth.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lian-partner-support-truth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  partner-support:
    name: Partner support contract, database, backend, and surface
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dsh_test
          POSTGRES_PASSWORD: dsh_test_password
          POSTGRES_DB: dsh_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd="pg_isready -U dsh_test -d dsh_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgres://dsh_test:dsh_test_password@localhost:55432/dsh_test?sslmode=disable
      PGPASSWORD: dsh_test_password
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed Node workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Verify partner support truth guard
        run: node tools/guards/partner/partner-support-truth-gate.mjs

      - name: Verify API and full-stack boundaries
        shell: bash
        run: |
          set -euo pipefail
          pnpm run guard:api-binding
          pnpm run guard:backend-api-binding
          pnpm run guard:frontend-feature-binding
          pnpm run guard:fullstack-boundary
          pnpm run guard:no-broken-imports

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Verify DSH Go source
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Unformatted files:\n%s\n' "$files"; exit 1; }
          go vet ./...
          go test ./... -count=1
          go build ./...

      - name: Apply DSH migrations to a fresh PostgreSQL database
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t migrations < <(find services/dsh/database/migrations -maxdepth 1 -type f -name 'dsh-*.sql' | sort)
          test "${#migrations[@]}" -gt 0
          for migration in "${migrations[@]}"; do
            echo "Applying $migration"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done

      - name: Verify partner support database invariants
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/tests/dsh-059_partner_support_invariants.sql

  result:
    name: Lian Partner Support Truth result
    if: always()
    needs: [partner-support]
    runs-on: ubuntu-latest
    steps:
      - name: Require partner support truth to pass
        env:
          RESULT: ${{ needs.partner-support.result }}
        shell: bash
        run: |
          set -euo pipefail
          test "$RESULT" = success
