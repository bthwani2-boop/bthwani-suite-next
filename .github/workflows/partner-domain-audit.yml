name: Partner Domain Deep Audit

on:
  push:
    branches: [bassam]
    paths:
      - '.github/workflows/partner-domain-audit.yml'
      - 'apps/**'
      - 'services/**'
      - 'core/**'
      - 'tools/**'
      - 'governance/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: partner-domain-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Prepare report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          REPORT=artifacts/partner-domain-audit.md
          {
            echo '# Partner Domain Unified Multi-Surface Audit'
            echo
            echo "- Commit: $GITHUB_SHA"
            echo "- Branch: $GITHUB_REF_NAME"
            echo "- Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo '## Relevant files'
            echo '```text'
            find apps services core tools governance -type f 2>/dev/null \
              | grep -Eiv '/(node_modules|dist|build|coverage|\.expo|vendor)/' \
              | grep -Ei '(partner|partners|merchant|merchants|vendor|vendors|store|stores|marketing|campaign|promotion|promo|discount|coupon|voucher|loyalty|points|subscription|plan|pickup|self.?pickup|delivery.?mode|courier|captain|driver|field|approval|moderation|catalog)' \
              | sort || true
            echo '```'
            echo
            echo '## Relevant symbol and route matches'
            echo '```text'
            rg -n --hidden --glob '!**/node_modules/**' --glob '!**/dist/**' --glob '!**/build/**' --glob '!**/coverage/**' \
              -i '(partner|merchant|vendor|marketing|campaign|promotion|promo|discount|coupon|voucher|loyalty|points|subscription|self.?pickup|pickup|store.?delivery|courier|captain|driver|approval|moderation)' \
              apps services core tools governance 2>/dev/null | head -n 12000 || true
            echo '```'
            echo
            echo '## Suspicious implementation markers'
            echo '```text'
            rg -n --hidden --glob '!**/node_modules/**' --glob '!**/dist/**' --glob '!**/build/**' --glob '!**/coverage/**' \
              -i '(TODO|FIXME|not implemented|coming soon|placeholder|mock data|mockData|hardcoded|stub|noop|no-op|throw new Error\(|return null|return \[\]|return \{\})' \
              apps services core 2>/dev/null \
              | grep -Ei '(partner|merchant|vendor|store|marketing|campaign|promotion|discount|coupon|loyalty|subscription|pickup|delivery|courier|captain|field|approval|catalog)' \
              | head -n 6000 || true
            echo '```'
            echo
            echo '## API and persistence files'
            echo '```text'
            find services core -type f 2>/dev/null \
              | grep -Eiv '/(node_modules|dist|build|coverage|vendor)/' \
              | grep -Ei '(openapi|swagger|migration|schema|repository|handler|route|router|service|contract)' \
              | grep -Ei '(dsh|partner|merchant|vendor|store|marketing|promotion|discount|coupon|loyalty|subscription|pickup|delivery|captain|workforce|identity)' \
              | sort || true
            echo '```'
          } > "$REPORT"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Run architecture and binding guards
        shell: bash
        run: |
          set +e
          REPORT=artifacts/partner-domain-audit.md
          run_gate() {
            local title="$1"; shift
            {
              echo
              echo "## $title"
              echo '```text'
              "$@"
              status=$?
              echo "EXIT_CODE=$status"
              echo '```'
            } >> "$REPORT" 2>&1
            return 0
          }
          run_gate 'Full-stack boundary guard' pnpm run guard:fullstack-boundary
          run_gate 'API binding guard' pnpm run guard:api-binding
          run_gate 'Backend API binding guard' pnpm run guard:backend-api-binding
          run_gate 'Frontend feature binding guard' pnpm run guard:frontend-feature-binding
          run_gate 'Service manifest drift guard' pnpm run guard:service-manifest-drift
          run_gate 'Broken import guard' pnpm run guard:no-broken-imports
          run_gate 'Runtime config guard' pnpm run guard:runtime-config
          run_gate 'Contracts lint' pnpm run contracts:lint
          run_gate 'Workspace typecheck' pnpm run typecheck
          run_gate 'Workspace tests' pnpm run test

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: partner-domain-audit-${{ github.sha }}
          path: artifacts/partner-domain-audit.md
          if-no-files-found: error
          retention-days: 14
