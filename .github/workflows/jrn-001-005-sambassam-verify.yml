name: JRN 001-005 sambassam verification

on:
  push:
    branches:
      - sambassam
    paths:
      - .github/workflows/jrn-001-005-sambassam-verify.yml
      - core/identity/backend/**
      - core/workforce/backend/**
      - services/dsh/backend/internal/http/**
      - services/dsh/backend/internal/partner/**
      - services/dsh/backend/internal/store/**
      - services/dsh/backend/internal/clientaddress/**
      - services/dsh/database/migrations/**

permissions:
  contents: read

concurrency:
  group: jrn-001-005-sambassam-${{ github.ref }}
  cancel-in-progress: true

jobs:
  focused-go-journeys:
    runs-on: ubuntu-latest
    container: golang:1.26.5-bookworm
    timeout-minutes: 20
    steps:
      - name: Checkout pinned source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Verify Identity browser session boundary
        working-directory: core/identity/backend
        run: go test ./internal/http -run 'TestBrowserCorsMiddleware|TestAllowedCorsOrigins' -count=1
      - name: Verify Workforce lifecycle bindings
        working-directory: core/workforce/backend
        run: go test ./internal/http -run 'TestWorkforceJourneyRoutesAreMounted|TestWorkforceCorsAllowsGovernedMutations' -count=1
      - name: Verify partner, discovery, and address bindings
        working-directory: services/dsh/backend
        run: go test ./internal/http -run 'TestFirstFiveJourneysExposeGovernedDSHRoutes|TestPartnerSelfRoutesRegisterOnceOnApplicationRouter' -count=1
