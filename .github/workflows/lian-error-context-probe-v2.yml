name: Lian Bounded Error Context Probe

on:
  push:
    branches: [lian]
    paths:
      - ".github/workflows/lian-error-context-probe-v2.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  command:
    name: Bounded error — ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: gov-schema, command: "pnpm run guard:governance-schema" }
          - { name: agent-gov, command: "pnpm run guard:agent-governance" }
          - { name: client, command: "node tools/guards/client-commerce/client-commerce-truth-gate.mjs" }
          - { name: partner, command: "node tools/guards/partner/partner-surface-truth-gate.mjs" }
          - { name: maps, command: "node tools/guards/maps/map-platform-truth-gate.mjs" }
          - { name: policy-ui, command: "node tools/guards/platform/operational-policy-ui-truth-gate.mjs" }
          - { name: privacy-int, command: "node tools/guards/privacy/client-address-privacy-integration-gate.mjs" }
          - { name: ui-actions, command: "node tools/guards/ui-actions/ui-action-binding-gate.mjs" }
          - { name: frontend, command: "pnpm run guard:frontend-feature-binding" }
          - { name: backend, command: "pnpm run guard:backend-api-binding" }
          - { name: manifest, command: "pnpm run guard:service-manifest-drift" }
          - { name: typecheck, command: "pnpm run typecheck" }
          - { name: build, command: "pnpm run build" }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/setup-node-workspace
      - name: Run and publish bounded context
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMAND: ${{ matrix.command }}
          PHASE: ${{ matrix.name }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          bash -o pipefail -c "$COMMAND" >/tmp/out.log 2>&1
          code=$?
          cat /tmp/out.log
          state=success
          snippet=PASS
          if [ $code -ne 0 ]; then
            state=failure
            snippet="$(grep -Eai 'error|failed|failure|missing|drift|forbidden|invalid|expected|mismatch' /tmp/out.log | tail -n1)"
            [ -n "$snippet" ] || snippet="$(tail -n1 /tmp/out.log)"
            snippet="$(printf '%s' "$snippet" | tr '\n\r/' '   ' | sed -E 's/[[:space:]]+/ /g' | cut -c1-45)"
          fi
          context="Err $PHASE $snippet"
          context="$(printf '%s' "$context" | cut -c1-90)"
          jq -n --arg state "$state" --arg context "$context" --arg description "$snippet" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json
          exit $code

  dsh-go:
    name: Bounded DSH Go — ${{ matrix.phase }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { phase: vet, command: "go vet ./..." }
          - { phase: test, command: "go test ./... -count=1" }
          - { phase: build, command: "go build ./..." }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Run and publish DSH Go context
        working-directory: services/dsh/backend
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMAND: ${{ matrix.command }}
          PHASE: ${{ matrix.phase }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          bash -o pipefail -c "$COMMAND" >/tmp/out.log 2>&1
          code=$?
          cat /tmp/out.log
          state=success
          snippet=PASS
          if [ $code -ne 0 ]; then
            state=failure
            snippet="$(grep -Eai 'undefined|cannot use|not enough|too many|FAIL|error' /tmp/out.log | head -n1)"
            [ -n "$snippet" ] || snippet="$(tail -n1 /tmp/out.log)"
            snippet="$(printf '%s' "$snippet" | tr '\n\r/' '   ' | sed -E 's/[[:space:]]+/ /g' | cut -c1-48)"
          fi
          context="Err DSH-$PHASE $snippet"
          context="$(printf '%s' "$context" | cut -c1-90)"
          jq -n --arg state "$state" --arg context "$context" --arg description "$snippet" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json
          exit $code

  database:
    name: Bounded DB error — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: DSH
            port: 55432
            user: dsh_bounded
            password: dsh_bounded_password
            database: dsh_bounded
            directory: services/dsh/database/migrations
            pattern: dsh-*.sql
          - service: WLT
            port: 55433
            user: wlt_bounded
            password: wlt_bounded_password
            database: wlt_bounded
            directory: services/wlt/database/migrations
            pattern: '*.sql'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ matrix.user }}
          POSTGRES_PASSWORD: ${{ matrix.password }}
          POSTGRES_DB: ${{ matrix.database }}
        ports:
          - ${{ matrix.port }}:5432
        options: >-
          --health-cmd="pg_isready -U ${{ matrix.user }} -d ${{ matrix.database }}"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - name: Apply and publish exact migration
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVICE: ${{ matrix.service }}
          PORT: ${{ matrix.port }}
          USER: ${{ matrix.user }}
          PASSWORD: ${{ matrix.password }}
          DATABASE: ${{ matrix.database }}
          DIRECTORY: ${{ matrix.directory }}
          PATTERN: ${{ matrix.pattern }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          export PGPASSWORD="$PASSWORD"
          url="postgres://$USER:$PASSWORD@localhost:$PORT/$DATABASE?sslmode=disable"
          state=success
          current=PASS
          err=PASS
          while IFS= read -r file; do
            current="$(basename "$file")"
            psql "$url" -v ON_ERROR_STOP=1 -f "$file" >/tmp/db.log 2>&1
            code=$?
            if [ $code -ne 0 ]; then
              state=failure
              err="$(grep -Eai 'ERROR|FATAL' /tmp/db.log | tail -n1 | sed -E 's/[[:space:]]+/ /g' | cut -c1-35)"
              break
            fi
          done < <(find "$DIRECTORY" -maxdepth 1 -type f -name "$PATTERN" | sort)
          context="Err $SERVICE-DB $current $err"
          context="$(printf '%s' "$context" | cut -c1-90)"
          jq -n --arg state "$state" --arg context "$context" --arg description "$current $err" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json
          [ "$state" = success ]
