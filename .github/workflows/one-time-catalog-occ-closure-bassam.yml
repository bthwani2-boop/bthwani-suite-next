name: One-time Catalog OCC Closure Bassam

on:
  push:
    branches: [bassam]
    paths:
      - '.github/workflows/one-time-catalog-occ-closure-bassam.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-catalog-occ-closure-bassam
  cancel-in-progress: false

jobs:
  patch-verify-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0

      - name: Apply guarded catalog OCC closure
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one match, found {count}")
              return text.replace(old, new, 1)

          http_path = Path('services/dsh/backend/internal/http/centralcatalog.go')
          http_text = http_path.read_text(encoding='utf-8')
          old_handler = '''func (s *protectedStoreServer) writeCentralCatalogError(w http.ResponseWriter, err error) {
\tswitch {
\tcase errors.Is(err, centralcatalog.ErrNotFound):
\t\tstore.SendError(w, http.StatusNotFound, "NOT_FOUND", "central catalog entity not found")
\tcase errors.Is(err, centralcatalog.ErrInvalid):
\t\tstore.SendError(w, http.StatusBadRequest, "INVALID_REQUEST", "invalid central catalog input")
\tcase errors.Is(err, centralcatalog.ErrForbidden):
\t\tstore.SendError(w, http.StatusForbidden, "FORBIDDEN", "action not permitted by platform policy")

\t\tvar conflictErr *centralcatalog.ConflictError
\t\tif errors.As(err, &conflictErr) {
\t\t\tstore.SendJSON(w, http.StatusConflict, map[string]any{
\t\t\t\t"code":            "CONFLICT",
\t\t\t\t"message":         conflictErr.Message,
\t\t\t\t"entityId":        conflictErr.EntityID,
\t\t\t\t"expectedVersion": conflictErr.ExpectedVersion,
\t\t\t\t"currentVersion":  conflictErr.CurrentVersion,
\t\t\t})
\t\t\treturn
\t\t}

\tdefault:
\t\tstore.SendError(w, http.StatusInternalServerError, "INTERNAL_ERROR", "central catalog operation failed")
\t}
}'''
          new_handler = '''func (s *protectedStoreServer) writeCentralCatalogError(w http.ResponseWriter, err error) {
\tvar conflictErr *centralcatalog.ConflictError
\tswitch {
\tcase errors.As(err, &conflictErr):
\t\tstore.SendJSON(w, http.StatusConflict, map[string]any{
\t\t\t"code":            "CONFLICT",
\t\t\t"message":         conflictErr.Message,
\t\t\t"entityId":        conflictErr.EntityID,
\t\t\t"expectedVersion": conflictErr.ExpectedVersion,
\t\t\t"currentVersion":  conflictErr.CurrentVersion,
\t\t})
\tcase errors.Is(err, centralcatalog.ErrConflict):
\t\tstore.SendError(w, http.StatusConflict, "CONFLICT", "central catalog entity was modified by another actor")
\tcase errors.Is(err, centralcatalog.ErrNotFound):
\t\tstore.SendError(w, http.StatusNotFound, "NOT_FOUND", "central catalog entity not found")
\tcase errors.Is(err, centralcatalog.ErrInvalid):
\t\tstore.SendError(w, http.StatusBadRequest, "INVALID_REQUEST", "invalid central catalog input")
\tcase errors.Is(err, centralcatalog.ErrForbidden):
\t\tstore.SendError(w, http.StatusForbidden, "FORBIDDEN", "action not permitted by platform policy")
\tdefault:
\t\tstore.SendError(w, http.StatusInternalServerError, "INTERNAL_ERROR", "central catalog operation failed")
\t}
}'''
          http_text = replace_once(http_text, old_handler, new_handler, 'http conflict mapping')
          http_path.write_text(http_text, encoding='utf-8')

          cc_path = Path('services/dsh/backend/internal/centralcatalog/centralcatalog.go')
          cc = cc_path.read_text(encoding='utf-8')

          cc = replace_once(cc, '''\tif input.ExpectedVersion != nil {
\t\tcurrent, err := GetDomain(ctx, db, id)
\t\tif err != nil {
\t\t\treturn Domain{}, err
\t\t}
\t\tif current.Version != *input.ExpectedVersion {
\t\t\treturn Domain{}, ErrConflict
\t\t}
\t}
''', '', 'remove domain TOCTOU precheck')
          cc = replace_once(cc, '''\t\tWHERE id=$9`,
\t\tnameAr, input.NameEn, input.Icon, input.SortOrder, input.IsActive,
\t\tinput.IsClientVisible, input.RequiresProductCatalog, input.IsManualRequest, id)''', '''\t\tWHERE id=$9 AND ($10::int IS NULL OR version=$10)`,
\t\tnameAr, input.NameEn, input.Icon, input.SortOrder, input.IsActive,
\t\tinput.IsClientVisible, input.RequiresProductCatalog, input.IsManualRequest, id, input.ExpectedVersion)''', 'atomic domain update')
          cc = replace_once(cc, '''\tif n, _ := result.RowsAffected(); n != 1 {
\t\treturn Domain{}, NewConflictError(db, ctx, "dsh_catalog_domains", id, input.ExpectedVersion)
\t}''', '''\tif n, _ := result.RowsAffected(); n == 0 {
\t\treturn Domain{}, NewConflictError(db, ctx, "dsh_catalog_domains", id, input.ExpectedVersion)
\t}''', 'domain structured conflict')

          cc = replace_once(cc, '''\tif input.ExpectedVersion != nil {
\t\tcurrent, err := GetNode(ctx, db, id)
\t\tif err != nil {
\t\t\treturn Node{}, err
\t\t}
\t\tif current.Version != *input.ExpectedVersion {
\t\t\treturn Node{}, ErrConflict
\t\t}
\t}
''', '', 'remove node redundant precheck')
          cc = replace_once(cc, '''\tif n, _ := result.RowsAffected(); n == 0 {
\t\treturn Node{}, ErrConflict
\t}''', '''\tif n, _ := result.RowsAffected(); n == 0 {
\t\treturn Node{}, NewConflictError(db, ctx, "dsh_catalog_nodes", id, input.ExpectedVersion)
\t}''', 'node structured conflict')

          cc = replace_once(cc, '''\tif input.ExpectedVersion != nil && current.Version != *input.ExpectedVersion {
\t\treturn MasterProduct{}, ErrConflict
\t}
''', '', 'remove master product redundant precheck')
          cc = replace_once(cc, '''\tif n, _ := result.RowsAffected(); n == 0 {
\t\treturn MasterProduct{}, ErrConflict // Assuming id exists because we just fetched it
\t}''', '''\tif n, _ := result.RowsAffected(); n == 0 {
\t\treturn MasterProduct{}, NewConflictError(db, ctx, "dsh_master_products", id, input.ExpectedVersion)
\t}''', 'master product structured conflict')

          cc = replace_once(cc, '''type CatalogPolicyInput struct {
\tPlatformCommissionRate                   *float64 `json:"platformCommissionRate"`''', '''type CatalogPolicyInput struct {
\tExpectedVersion                          *int     `json:"expectedVersion"`
\tPlatformCommissionRate                   *float64 `json:"platformCommissionRate"`''', 'policy expected version')
          cc = replace_once(cc, '''\t\tupdated_at=now(), version = version + 1
\t\tWHERE id=$21`,''', '''\t\tupdated_at=now(), version = version + 1
\t\tWHERE id=$21 AND ($22::int IS NULL OR version=$22)`,''', 'atomic policy update')
          cc = replace_once(cc, '''\t\tinput.ProductDataQualityMinimumScore, input.MaxGalleryImages, input.ManualRequestMode,
\t\tinput.IsActive, input.Notes, id)''', '''\t\tinput.ProductDataQualityMinimumScore, input.MaxGalleryImages, input.ManualRequestMode,
\t\tinput.IsActive, input.Notes, id, input.ExpectedVersion)''', 'policy expected version arg')
          cc = replace_once(cc, '''\tif n, _ := result.RowsAffected(); n != 1 {
\t\treturn CatalogPolicy{}, ErrNotFound
\t}''', '''\tif n, _ := result.RowsAffected(); n == 0 {
\t\treturn CatalogPolicy{}, NewConflictError(db, ctx, "dsh_catalog_platform_policies", id, input.ExpectedVersion)
\t}''', 'policy structured conflict')
          cc_path.write_text(cc, encoding='utf-8')

          types_path = Path('services/dsh/frontend/shared/catalog/central-catalog.types.ts')
          types_text = types_path.read_text(encoding='utf-8')
          types_text = replace_once(types_text, '''  readonly allowsStoreProductCustomImage?: boolean;
}''', '''  readonly allowsStoreProductCustomImage?: boolean;
  readonly platformCommissionRate?: number;
  readonly fieldPartnerOnboardingCommissionAmount?: number;
  readonly fieldPartnerOnboardingCommissionCurrency?: string;
  readonly storeOnboardingFeeAmount?: number;
  readonly storeOnboardingFeeCurrency?: string;
  readonly allowsProductProposal?: boolean;
  readonly requiresBarcode?: boolean;
  readonly requiresCatalogReview?: boolean;
  readonly notes?: string;
  readonly expectedVersion?: number;
}''', 'policy frontend contract')
          types_path.write_text(types_text, encoding='utf-8')

          api_path = Path('services/dsh/frontend/shared/catalog/central-catalog.api.ts')
          api_text = api_path.read_text(encoding='utf-8')
          api_text = replace_once(api_text, '''    readonly isManualRequest?: boolean;
  },''', '''    readonly isManualRequest?: boolean;
    readonly expectedVersion?: number;
  },''', 'domain api expected version')
          api_text = replace_once(api_text, '''    readonly requiresProductCatalog?: boolean;
  },''', '''    readonly requiresProductCatalog?: boolean;
    readonly expectedVersion?: number;
  },''', 'node api expected version')
          api_text = replace_once(api_text, '''    readonly isActive?: boolean;
  },
): Promise<MasterProduct> {''', '''    readonly isActive?: boolean;
    readonly expectedVersion?: number;
  },
): Promise<MasterProduct> {''', 'master product api expected version')
          old_policy_api = '''  input: {
    readonly platformCommissionRate: number;
    readonly fieldPartnerOnboardingCommissionAmount: number;
    readonly fieldPartnerOnboardingCommissionCurrency: string;
    readonly storeOnboardingFeeAmount: number;
    readonly storeOnboardingFeeCurrency: string;
    readonly allowsStoreProductCustomImage: boolean;
    readonly allowsProductProposal: boolean;
    readonly requiresBarcode: boolean;
    readonly requiresCatalogReview: boolean;
    readonly isActive: boolean;
    readonly effectiveFrom: string;
    readonly notes: string;
  },'''
          new_policy_api = '''  input: {
    readonly platformCommissionRate?: number;
    readonly fieldPartnerOnboardingCommissionAmount?: number;
    readonly fieldPartnerOnboardingCommissionCurrency?: string;
    readonly storeOnboardingFeeAmount?: number;
    readonly storeOnboardingFeeCurrency?: string;
    readonly allowsStoreProductCustomImage?: boolean;
    readonly allowsProductProposal?: boolean;
    readonly requiresBarcode?: boolean;
    readonly requiresCatalogReview?: boolean;
    readonly requiresMarketingReview?: boolean;
    readonly requiresProductImage?: boolean;
    readonly requiresCategoryImage?: boolean;
    readonly requiresDescription?: boolean;
    readonly requiresBrand?: boolean;
    readonly requiresUnit?: boolean;
    readonly productDataQualityMinimumScore?: number;
    readonly maxGalleryImages?: number;
    readonly manualRequestMode?: boolean;
    readonly isActive?: boolean;
    readonly notes?: string;
    readonly expectedVersion?: number;
  },'''
          api_text = replace_once(api_text, old_policy_api, new_policy_api, 'policy api contract')
          api_path.write_text(api_text, encoding='utf-8')

          controller_path = Path('services/dsh/frontend/shared/catalog/use-central-catalog-controller.tsx')
          controller = controller_path.read_text(encoding='utf-8')
          controller = replace_once(controller, '''  entityKind: "domain" | "node" | "master_product",''', '''  entityKind: "domain" | "node" | "master_product" | "policy",''', 'controller policy entity kind')
          controller = replace_once(controller, '''    updatePolicy: async (policyId: string, input: Parameters<typeof api.updateCatalogPlatformPolicy>[1]) =>
      runMutationWithReadback(() => api.updateCatalogPlatformPolicy(policyId, input), loadPolicies),''', '''    updatePolicy: async (policyId: string, input: Parameters<typeof api.updateCatalogPlatformPolicy>[1]) => {
      const expectedVersion = requireCatalogVersion(state.policies.items, policyId, "policy");
      return runMutationWithReadback(
        () => api.updateCatalogPlatformPolicy(policyId, { ...input, expectedVersion }),
        loadPolicies,
      );
    },''', 'controller policy OCC')
          controller_path.write_text(controller, encoding='utf-8')

          test_path = Path('services/dsh/tests/central-catalog-closure.test.mjs')
          test_text = test_path.read_text(encoding='utf-8')
          test_text += '''

test("catalog OCC is atomic and conflicts map to HTTP 409", () => {
  const repository = read("backend/internal/centralcatalog/centralcatalog.go");
  const handlers = read("backend/internal/http/centralcatalog.go");
  const controller = read("frontend/shared/catalog/use-central-catalog-controller.tsx");

  assert.match(repository, /WHERE id=\$9 AND \(\$10::int IS NULL OR version=\$10\)/);
  assert.match(repository, /dsh_catalog_domains", id, input\.ExpectedVersion/);
  assert.match(repository, /dsh_catalog_nodes", id, input\.ExpectedVersion/);
  assert.match(repository, /dsh_master_products", id, input\.ExpectedVersion/);
  assert.match(repository, /dsh_catalog_platform_policies", id, input\.ExpectedVersion/);
  assert.match(repository, /WHERE id=\$21 AND \(\$22::int IS NULL OR version=\$22\)/);
  assert.match(handlers, /case errors\.As\(err, &conflictErr\):/);
  assert.match(handlers, /case errors\.Is\(err, centralcatalog\.ErrConflict\):/);
  assert.match(controller, /requireCatalogVersion\(state\.policies\.items, policyId, "policy"\)/);
});
'''
          test_path.write_text(test_text, encoding='utf-8')

          go_test_path = Path('services/dsh/backend/internal/http/centralcatalog_error_test.go')
          go_test_path.write_text('''package http

import (
    "errors"
    nethttp "net/http"
    "net/http/httptest"
    "strings"
    "testing"

    "dsh-api/internal/centralcatalog"
)

func TestWriteCentralCatalogErrorConflictDetails(t *testing.T) {
    expected := 4
    recorder := httptest.NewRecorder()
    server := &protectedStoreServer{}
    server.writeCentralCatalogError(recorder, &centralcatalog.ConflictError{
        EntityID: "domain-1",
        ExpectedVersion: &expected,
        CurrentVersion: 5,
        Message: "version mismatch",
    })
    if recorder.Code != nethttp.StatusConflict {
        t.Fatalf("expected 409, got %d", recorder.Code)
    }
    body := recorder.Body.String()
    for _, fragment := range []string{"CONFLICT", "domain-1", "expectedVersion", "currentVersion"} {
        if !strings.Contains(body, fragment) {
            t.Fatalf("response missing %q: %s", fragment, body)
        }
    }
}

func TestWriteCentralCatalogErrorGenericConflict(t *testing.T) {
    recorder := httptest.NewRecorder()
    server := &protectedStoreServer{}
    server.writeCentralCatalogError(recorder, errors.Join(centralcatalog.ErrConflict, errors.New("stale write")))
    if recorder.Code != nethttp.StatusConflict {
        t.Fatalf("expected 409, got %d", recorder.Code)
    }
}
''', encoding='utf-8')
          PY

          gofmt -w services/dsh/backend/internal/http/centralcatalog.go services/dsh/backend/internal/centralcatalog/centralcatalog.go services/dsh/backend/internal/http/centralcatalog_error_test.go
          git diff --check

      - name: Verify backend and catalog contracts
        shell: bash
        run: |
          set -euo pipefail
          (cd services/dsh/backend && go test ./internal/centralcatalog ./internal/http)
          node --test services/dsh/tests/central-catalog-closure.test.mjs
          corepack enable
          pnpm install --frozen-lockfile
          pnpm run contracts:lint
          pnpm run guard:api-binding
          pnpm run guard:backend-api-binding
          pnpm run guard:frontend-feature-binding
          pnpm run typecheck

      - name: Commit and push verified closure
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            services/dsh/backend/internal/http/centralcatalog.go \
            services/dsh/backend/internal/centralcatalog/centralcatalog.go \
            services/dsh/backend/internal/http/centralcatalog_error_test.go \
            services/dsh/frontend/shared/catalog/central-catalog.types.ts \
            services/dsh/frontend/shared/catalog/central-catalog.api.ts \
            services/dsh/frontend/shared/catalog/use-central-catalog-controller.tsx \
            services/dsh/tests/central-catalog-closure.test.mjs
          git commit -m 'fix(catalog): enforce atomic OCC across sovereign writes'
          git pull --rebase origin bassam
          git push origin HEAD:bassam
