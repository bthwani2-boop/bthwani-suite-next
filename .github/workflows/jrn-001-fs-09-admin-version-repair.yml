name: JRN-001 FS-09 admin version repair

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-09-admin-version-repair.yml]

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Enforce positive optimistic version in admin controllers
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('services/dsh/frontend/shared/partner/use-partner-admin-controller.tsx')
          text = path.read_text(encoding='utf-8')

          old = '''  const transition = useCallback(async (partnerId: string, input: DshPartnerTransitionInput, version?: number) => {
    setMutationState({ kind: "loading" });
    try {
      const res = await transitionPartner(partnerId, input, version);'''
          new = '''  const transition = useCallback(async (partnerId: string, input: DshPartnerTransitionInput, version?: number) => {
    const expectedVersion = version ?? (
      detailState.kind === "success" && detailState.partner.id === partnerId
        ? detailState.partner.version
        : 0
    );
    if (expectedVersion < 1) {
      setMutationState({ kind: "version_conflict" });
      return null;
    }
    setMutationState({ kind: "loading" });
    try {
      const res = await transitionPartner(partnerId, input, expectedVersion);'''
          if old not in text:
              raise SystemExit('admin transition block not found')
          text = text.replace(old, new, 1)
          old = '  }, [filters, page, loadList]);'
          new = '  }, [filters, page, loadList, detailState]);'
          if old not in text:
              raise SystemExit('admin transition dependency block not found')
          text = text.replace(old, new, 1)

          old = '''  const transition = useCallback(async (input: DshPartnerTransitionInput, version?: number): Promise<boolean> => {
    setMutationState({ kind: "loading" });
    try {
      await transitionPartner(partnerId, input, version);'''
          new = '''  const transition = useCallback(async (input: DshPartnerTransitionInput, version?: number): Promise<boolean> => {
    const expectedVersion = version ?? (detailState.kind === "success" ? detailState.partner.version : 0);
    if (expectedVersion < 1) {
      setMutationState({ kind: "error", message: "version_required" });
      return false;
    }
    setMutationState({ kind: "loading" });
    try {
      await transitionPartner(partnerId, input, expectedVersion);'''
          if old not in text:
              raise SystemExit('detail transition block not found')
          text = text.replace(old, new, 1)
          old = '  }, [partnerId, load]);'
          new = '  }, [partnerId, load, detailState]);'
          index = text.find(old, text.find('export function usePartnerDetailController'))
          if index < 0:
              raise SystemExit('detail transition dependency block not found')
          text = text[:index] + text[index:].replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY
          git config user.name 'bthwani-governance-bot'
          git config user.email 'noreply@bthwani.local'
          git add services/dsh/frontend/shared/partner/use-partner-admin-controller.tsx
          git commit -m 'fix(jrn-001): require optimistic version in admin transitions'
          git push origin HEAD:sambassam
      - name: Publish repair status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then STATE=success; DESCRIPTION='FS-09 admin version repaired'; else STATE=failure; DESCRIPTION='FS-09 admin version repair failed'; fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-09-repair-admin-version' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json