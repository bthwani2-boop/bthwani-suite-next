name: JRN-001 sequential verification

on:
  push:
    branches: [journey/jrn-001-sequential-closure]
  pull_request:
    branches: [sambassam]

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-001-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Install locked workspace
        run: |
          echo install > /tmp/jrn001-stage
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: JRN-001 source and contract tests
        shell: bash
        run: |
          echo source-tests > /tmp/jrn001-stage
          set +e
          node --test services/dsh/tests/jrn-001-*.test.mjs 2>&1 | tee /tmp/jrn001.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Typecheck app-field
        run: |
          echo typecheck-app-field > /tmp/jrn001-stage
          pnpm --dir apps/app-field/runtime typecheck 2>&1 | tee /tmp/jrn001.log
      - name: Typecheck app-partner
        run: |
          echo typecheck-app-partner > /tmp/jrn001-stage
          pnpm --dir apps/app-partner/runtime typecheck 2>&1 | tee /tmp/jrn001.log
      - name: Typecheck control-panel
        run: |
          echo typecheck-control-panel > /tmp/jrn001-stage
          pnpm --dir apps/control-panel/runtime typecheck 2>&1 | tee /tmp/jrn001.log
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Partner security unit tests
        working-directory: services/dsh/backend
        run: |
          echo partner-security-tests > /tmp/jrn001-stage
          go test ./internal/partner -run 'Test(SanitizePartnerForSurfaceNeverReturnsRawPayoutIdentifiers|TransitionRequestHashBindsActorStatusAndVersion|NormalizeDshPayoutPreferenceMapsSurfaceVocabulary|UnmaskedPayoutValueRejectsCompatibilityMasks)$' -count=1 2>&1 | tee /tmp/jrn001.log
      - name: Compile partner HTTP and DSH API
        working-directory: services/dsh/backend
        run: |
          echo compile-partner-http-api > /tmp/jrn001-stage
          go test ./internal/http -run '^$' -count=1 2>&1 | tee /tmp/jrn001.log
          go test ./cmd/dsh-api -run '^$' -count=1 2>&1 | tee /tmp/jrn001.log
      - name: Full-stack ownership boundary
        run: |
          echo fullstack-boundary > /tmp/jrn001-stage
          pnpm run guard:fullstack-boundary 2>&1 | tee /tmp/jrn001.log
      - name: WLT financial boundary
        run: |
          echo wlt-boundary > /tmp/jrn001-stage
          pnpm run guard:wlt-financial-boundary 2>&1 | tee /tmp/jrn001.log
      - name: Publish result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STAGE="$(cat /tmp/jrn001-stage 2>/dev/null || echo bootstrap)"
          if [ "$RESULT" = success ]; then
            STATE=success
            CONTEXT='journeys/jrn-001-sequential'
            DESCRIPTION='JRN-001 FS-01..FS-18 verification passed'
          else
            STATE=failure
            RAW="$(grep -m1 -E '^not ok|AssertionError|ERR_ASSERTION|error TS[0-9]+|FAIL|panic:' /tmp/jrn001.log 2>/dev/null || true)"
            DETAIL="$(printf '%s' "${RAW:-check-failed}" | sed -E 's/[^[:alnum:]_.:/-]+/-/g' | cut -c1-58)"
            CONTEXT="journeys/jrn-001/$STAGE/$DETAIL"
            CONTEXT="$(printf '%s' "$CONTEXT" | cut -c1-100)"
            DESCRIPTION="JRN-001 failed at $STAGE"
          fi
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$SHA" \
            -d @/tmp/status.json
