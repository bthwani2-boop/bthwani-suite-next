name: JRN-001 FS-11 field controller repair isolated

on:
  push:
    branches: [sambassam]
    paths:
      - .github/workflows/jrn-001-fs-11-field-controller-repair.yml

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Preserve classified field failures
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx")
          text = path.read_text()

          pairs = [
            ("setState((s) => ({ ...s, form: { ...s.form, ...patch }, isDirty: true }));", "setState((s) => ({ ...s, form: { ...s.form, ...patch }, isDirty: true, failure: null }));"),
            ("setState((s) => ({ ...s, visitNotes: notes, isDirty: true }));", "setState((s) => ({ ...s, visitNotes: notes, isDirty: true, failure: null }));"),
            ("setState((s) => ({ ...s, locationLatitude: lat, locationLongitude: lon, isDirty: true }));", "setState((s) => ({ ...s, locationLatitude: lat, locationLongitude: lon, isDirty: true, failure: null }));"),
            ("setState((s) => ({ ...s, evidenceMediaRefs: [...s.evidenceMediaRefs, ref], isDirty: true }));", "setState((s) => ({ ...s, evidenceMediaRefs: [...s.evidenceMediaRefs, ref], isDirty: true, failure: null }));"),
            ("setState((s) => ({ ...s, submitError: failure.message }));", "setState((s) => ({ ...s, submitError: failure.message, failure }));"),
            ("setState((s) => ({ ...s, isSaving: true, submitError: null }));", "setState((s) => ({ ...s, isSaving: true, submitError: null, failure: null }));"),
            ("setState((s) => ({ ...s, isSubmitting: true, submitError: null }));", "setState((s) => ({ ...s, isSubmitting: true, submitError: null, failure: null }));"),
          ]
          for old, new in pairs:
              text = text.replace(old, new)

          start = text.find('    } catch (err) {\n      const status = err && typeof err === "object"')
          if start >= 0:
              end_marker = '      return false;\n    }\n'
              end = text.find(end_marker, start)
              if end < 0:
                  raise SystemExit("loadDraft catch end not found")
              end += len(end_marker)
              text = text[:start] + '''    } catch (err) {
      const failure = mapPartnerOnboardingFailure(err);
      setState((s) => ({
        ...s,
        loadStatus: "error",
        loadError: failure.message,
        failure,
      }));
      return false;
    }
''' + text[end:]

          text = text.replace('        submitError: null,\n      }));', '        submitError: null,\n        failure: null,\n      }));')
          text = text.replace('        submitError: failure.message,\n      }));', '        submitError: failure.message,\n        failure,\n      }));')

          missing_old = '      setState((s) => ({ ...s, submitError: "يجب إنشاء ملف الشريك أولًا قبل رفع المستندات" }));'
          if missing_old in text:
              text = text.replace(missing_old, '''      const failure = {
        state: "readiness_blocked",
        code: "PARTNER_DRAFT_REQUIRED",
        message: "يجب إنشاء ملف الشريك أولًا قبل رفع المستندات",
        retryable: false,
        reloadRequired: false,
      } as const;
      setState((s) => ({ ...s, submitError: failure.message, failure }));''', 1)

          required = [
            'loadError: failure.message',
            'submitError: failure.message, failure',
            'state: "readiness_blocked"',
            'isSaving: true, submitError: null, failure: null',
            'isSubmitting: true, submitError: null, failure: null',
          ]
          absent = [item for item in required if item not in text]
          if absent:
              raise SystemExit(f"missing markers: {absent}")
          path.write_text(text)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx
          git diff --cached --quiet && { echo "No controller diff"; exit 1; }
          git commit -m "fix(jrn-001-fs-11): preserve field failure classification"
          for attempt in 1 2 3 4 5; do
            git fetch origin sambassam
            if git rebase origin/sambassam && git push origin HEAD:sambassam; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            sleep 2
          done
          exit 1
      - name: Publish status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          [ "$RESULT" = success ] && STATE=success || STATE=failure
          jq -n --arg state "$STATE" --arg context "journeys/jrn-001/fs-11-repair-field-controller" --arg description "Isolated field controller visible-state repair" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
