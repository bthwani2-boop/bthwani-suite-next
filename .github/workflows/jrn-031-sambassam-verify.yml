name: JRN-031 Administration Maker-Checker Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "services/dsh/tsconfig.jrn-031.json"
      - "services/dsh/database/migrations/dsh-076_admin_role_assignment_approvals.sql"
      - "services/dsh/database/migrations/dsh-077_admin_role_permissions.sql"
      - "services/dsh/database/migrations/dsh-078_admin_role_definition_approvals.sql"
      - "services/dsh/database/migrations/dsh-079_admin_role_assignment_revocations.sql"
      - "services/dsh/backend/internal/administration/**"
      - "services/dsh/backend/internal/http/administration*.go"
      - "services/dsh/backend/internal/http/journey_031_routes_test.go"
      - "services/dsh/backend/cmd/dsh-api/main.go"
      - "services/dsh/contracts/dsh.administration.openapi.yaml"
      - "services/dsh/frontend/shared/administration/**"
      - "services/dsh/frontend/control-panel/administration/**"
      - "apps/control-panel/runtime/src/app/dsh/administration/page.tsx"
      - "services/dsh/tests/jrn-031-administration-maker-checker.test.mjs"
      - ".github/actions/setup-node-workspace/action.yml"
      - ".github/workflows/jrn-031-sambassam-verify.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-031-${{ github.ref }}
  cancel-in-progress: true

jobs:
  administration-bindings:
    name: Administration contract and surface bindings
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node and PNPM workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify repository hygiene
        run: git diff --check
      - name: Verify JRN-031 bindings
        run: node --test services/dsh/tests/jrn-031-administration-maker-checker.test.mjs
      - name: Typecheck JRN-031 shared brain and administration surface
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-031.json --noEmit --pretty false

  administration-go:
    name: Administration domain and governed routes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/dsh/backend
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Go from module
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Compile administration domain
        run: go test ./internal/administration -count=1
      - name: Verify governed route registration
        run: go test ./internal/http -run TestJourney031ExposesGovernedAdministrationRoutes -count=1

  publish-result:
    name: Publish JRN-031 same-commit status
    if: always()
    needs: [administration-bindings, administration-go]
    runs-on: ubuntu-latest
    steps:
      - name: Publish aggregate status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          BINDINGS_RESULT: ${{ needs.administration-bindings.result }}
          GO_RESULT: ${{ needs.administration-go.result }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=failure
          DESCRIPTION="JRN-031 maker-checker verification failed"
          if [ "$BINDINGS_RESULT" = success ] && [ "$GO_RESULT" = success ]; then
            STATE=success
            DESCRIPTION="JRN-031 maker-checker verification passed"
          fi
          jq -n \
            --arg state "$STATE" \
            --arg context "journeys/jrn-031/maker-checker" \
            --arg description "$DESCRIPTION" \
            --arg target_url "$TARGET_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
