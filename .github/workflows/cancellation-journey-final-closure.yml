name: Cancellation Journey Final Closure
run-name: Cancellation Final Closure · ${{ github.sha }}

on:
  push:
    branches: ["journey/cancellation-refund-reconciliation-closure"]
    paths:
      - ".github/workflows/cancellation-journey-final-closure.yml"
      - ".github/cancellation-journey-final-trigger"
      - "tools/scripts/patch-cancellation-journey-final.py"
      - "tools/scripts/patch-cancellation-pickup-resume.py"
      - "tools/scripts/patch-cancellation-pickup-contract.py"
      - "tools/scripts/close-cancellation-refund-reconciliation.py"
      - "services/dsh/backend/internal/dispatch/**"
      - "services/dsh/backend/internal/pickup/**"
      - "services/dsh/backend/internal/http/pickup.go"
      - "services/dsh/backend/internal/http/server.go"
      - "services/dsh/backend/internal/orders/**"
      - "services/dsh/backend/internal/checkoutfinanceoutbox/**"
      - "services/dsh/backend/internal/wlt/cancel_for_order.go"
      - "services/dsh/backend/internal/http/order_cancellations.go"
      - "services/dsh/database/migrations/dsh-090_order_cancellation_refund_lifecycle.sql"
      - "services/dsh/database/migrations/dsh-091_pickup_cancellation_state.sql"
      - "services/dsh/contracts/dsh.openapi.yaml"
      - "services/dsh/clients/generated/dsh-api.ts"
      - "services/dsh/frontend/shared/dispatch/**"
      - "services/dsh/frontend/shared/delivery/captain-inbox.model.ts"
      - "services/dsh/frontend/shared/delivery/captain.surface-model.ts"
      - "services/dsh/frontend/shared/pickup/**"
      - "services/dsh/frontend/app-partner/orders/PartnerFulfillmentActionsPanel.tsx"
      - "services/dsh/frontend/control-panel/operations/PickupWorkbenchScreen.tsx"
      - "apps/app-partner/runtime/tsconfig.cancellation-journey.json"
      - "apps/control-panel/runtime/tsconfig.cancellation-journey.json"
      - "services/wlt/backend/internal/payment/**"
      - "services/wlt/backend/internal/refund/**"
      - "services/wlt/backend/internal/http/order_cancellation_routes.go"
      - "services/wlt/contracts/wlt.openapi.yaml"
      - "services/wlt/clients/generated/wlt-api.ts"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: cancellation-final-${{ github.ref }}
  cancel-in-progress: true

jobs:
  close-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    services:
      dsh-postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsh_journey
          POSTGRES_USER: dsh_journey
          POSTGRES_PASSWORD: dsh_journey
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U dsh_journey -d dsh_journey"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      wlt-postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wlt_journey
          POSTGRES_USER: wlt_journey
          POSTGRES_PASSWORD: wlt_journey
        ports: ["55433:5432"]
        options: >-
          --health-cmd "pg_isready -U wlt_journey -d wlt_journey"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DSH_DATABASE_URL: postgres://dsh_journey:dsh_journey@localhost:55432/dsh_journey?sslmode=disable
      WLT_DATABASE_URL: postgres://wlt_journey:wlt_journey@localhost:55433/wlt_journey?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-workspace

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum

      - name: Apply remaining journey fixes
        shell: bash
        run: |
          set -euo pipefail
          python tools/scripts/patch-cancellation-pickup-resume.py
          python tools/scripts/patch-cancellation-pickup-contract.py
          python tools/scripts/patch-cancellation-journey-final.py

      - name: Format affected Go sources
        shell: bash
        run: |
          set -euo pipefail
          gofmt -w \
            services/dsh/backend/internal/dispatch/dispatch.go \
            services/dsh/backend/internal/dispatch/dispatch_helpers.go \
            services/dsh/backend/internal/dispatch/cancellation_db_test.go \
            services/dsh/backend/internal/pickup/*.go \
            services/dsh/backend/internal/http/pickup.go \
            services/dsh/backend/internal/http/server.go \
            services/wlt/backend/internal/payment/order_cancellation.go \
            services/wlt/backend/internal/refund/refund_atomic.go

      - name: Generate governed clients
        shell: bash
        run: |
          set -euo pipefail
          pnpm run openapi:generate:dsh
          pnpm run openapi:generate:wlt

      - name: Validate governed contracts and routes
        shell: bash
        run: |
          set -euo pipefail
          grep -F '/wlt/order-cancellations:' services/wlt/contracts/wlt.openapi.yaml
          grep -F 'WltGovernedOrderCancellationResponse' services/wlt/contracts/wlt.openapi.yaml
          grep -F 'WltGovernedOrderCancellationResponse' services/wlt/clients/generated/wlt-api.ts
          grep -F 'cancellationReason' services/dsh/contracts/dsh.openapi.yaml
          grep -F '/dsh/partner/orders/{orderId}/pickup:' services/dsh/contracts/dsh.openapi.yaml
          grep -F 'enum: [not_ready, ready, notified, customer_arrived, verified, no_show, cancelled]' services/dsh/contracts/dsh.openapi.yaml
          grep -F 'getDshPartnerPickupState' services/dsh/clients/generated/dsh-api.ts
          grep -F 'GET /dsh/partner/orders/{orderId}/pickup' services/dsh/backend/internal/http/server.go
          grep -F 'handleGetPartnerPickupState' services/dsh/backend/internal/http/pickup.go
          grep -F 'PartnerStageCancelled' services/dsh/backend/internal/pickup/partner_state.go

      - name: Compile targeted source boundaries
        shell: bash
        run: |
          set -euo pipefail
          (
            cd services/dsh/backend
            go test ./internal/orders ./internal/checkoutfinanceoutbox ./internal/wlt ./internal/dispatch ./internal/pickup ./internal/http ./cmd/dsh-api -run '^$' -count=1
          )
          (
            cd services/wlt/backend
            go test ./internal/payment ./internal/refund ./internal/http ./cmd/wlt-api -run '^$' -count=1
          )

      - name: Typecheck affected multi-surface frontends
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec tsc -p apps/app-client/runtime/tsconfig.cancellation-journey.json --noEmit --pretty false
          pnpm exec tsc -p apps/app-partner/runtime/tsconfig.cancellation-journey.json --noEmit --pretty false
          pnpm exec tsc -p apps/app-captain/runtime/tsconfig.order-journey.json --noEmit --pretty false
          pnpm exec tsc -p apps/control-panel/runtime/tsconfig.cancellation-journey.json --noEmit --pretty false

      - name: Apply clean migrations and replay journey migrations
        shell: bash
        run: |
          set -euo pipefail
          for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" >/dev/null
          done
          for file in $(find services/wlt/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$WLT_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" >/dev/null
          done
          psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-090_order_cancellation_refund_lifecycle.sql >/dev/null
          psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-091_pickup_cancellation_state.sql >/dev/null
          psql "$WLT_DATABASE_URL" -v ON_ERROR_STOP=1 -f services/wlt/database/migrations/wlt-026_refund_reference_integrity.sql >/dev/null

      - name: DB proof — DSH orders cancellation
        id: db_orders
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/cancellation-db-orders
          cd services/dsh/backend
          DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" go test ./internal/orders -count=1 -v 2>&1 \
            | tee ../../../artifacts/cancellation-db-orders/orders.log
          exit ${PIPESTATUS[0]}

      - name: Upload DSH orders database diagnostic
        if: steps.db_orders.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cancellation-db-orders-${{ github.sha }}
          path: artifacts/cancellation-db-orders/orders.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on DSH orders database failure
        if: steps.db_orders.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: DB proof — DSH financial outbox
        shell: bash
        run: |
          cd services/dsh/backend
          DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" go test ./internal/checkoutfinanceoutbox -count=1 -v

      - name: DB proof — DSH dispatch cancellation
        shell: bash
        run: |
          cd services/dsh/backend
          DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" go test ./internal/dispatch -count=1 -v

      - name: DB proof — DSH pickup cancellation
        shell: bash
        run: |
          cd services/dsh/backend
          DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" go test ./internal/pickup -count=1 -v

      - name: DB proof — WLT payment cancellation
        shell: bash
        run: |
          cd services/wlt/backend
          WLT_REQUIRE_DB_TESTS=true DATABASE_URL="$WLT_DATABASE_URL" go test ./internal/payment -count=1 -v

      - name: DB proof — WLT refund integrity
        shell: bash
        run: |
          cd services/wlt/backend
          WLT_REQUIRE_DB_TESTS=true DATABASE_URL="$WLT_DATABASE_URL" go test ./internal/refund -count=1 -v

      - name: Prove journey terminal invariants
        shell: bash
        run: |
          set -euo pipefail
          psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_name='dsh_pickup_sessions' AND column_name='status'
            ) THEN
              RAISE EXCEPTION 'pickup status is missing';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM pg_constraint WHERE conname='dsh_pickup_sessions_cancellation_shape_check'
            ) THEN
              RAISE EXCEPTION 'pickup cancellation shape constraint is missing';
            END IF;
          END $$;
          SQL
          grep -F "a.status IN ('offered','accepted')" services/dsh/backend/internal/dispatch/dispatch.go
          grep -F 'ErrCancelled' services/dsh/backend/internal/pickup/service.go
          grep -F 'PICKUP_CANCELLED' services/dsh/backend/internal/http/pickup.go
          grep -F 'PICKUP_CANCELLED' services/dsh/frontend/shared/pickup/pickup.types.ts
          grep -F "stage === 'cancelled'" services/dsh/frontend/app-partner/orders/PartnerFulfillmentActionsPanel.tsx
          grep -F 'trackingCancelledState' services/dsh/frontend/shared/dispatch/dispatch.controller-core.ts
          grep -F 'isCaptainAssignmentActionable' services/dsh/frontend/shared/delivery/captain-inbox.model.ts

      - name: Remove temporary journey machinery
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import runpy
          namespace = runpy.run_path('tools/scripts/close-cancellation-refund-reconciliation.py')
          namespace['cleanup_temporary_files']()
          PY
          rm -f \
            .github/workflows/cancellation-client-typecheck-diagnostic.yml \
            .github/cancellation-client-typecheck-trigger \
            .github/workflows/cancellation-captain-typecheck-diagnostic.yml \
            .github/cancellation-captain-typecheck-trigger \
            .github/workflows/cancellation-captain-renderer-fix.yml \
            .github/cancellation-captain-renderer-trigger \
            .github/workflows/cancellation-wlt-contract-fix.yml \
            .github/cancellation-wlt-contract-fix-trigger \
            tools/scripts/fix-captain-route-renderer-types.py \
            tools/scripts/fix-wlt-invalid-response-refs.py \
            tools/scripts/patch-cancellation-pickup-resume.py \
            tools/scripts/patch-cancellation-pickup-contract.py

      - name: Commit verified closure changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo "No source drift remains."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(cancellation-journey): close and clean cancellation refund journey"
          git pull --rebase origin journey/cancellation-refund-reconciliation-closure
          git push origin HEAD:journey/cancellation-refund-reconciliation-closure

      - name: Publish focused final status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          state=failure
          [ "$JOB_STATUS" = success ] && state=success
          final_sha="$(git rev-parse HEAD)"
          jq -n \
            --arg state "$state" \
            --arg context "Cancellation Journey Final Closure" \
            --arg description "targeted cancellation/refund/pickup/captain closure: $JOB_STATUS" \
            --arg target_url "$RUN_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$final_sha" \
            -d @status.json
