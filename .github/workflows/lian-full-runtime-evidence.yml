name: Lian Full Runtime Evidence

on:
  push:
    branches: [lian]
    paths:
      - "core/**"
      - "services/dsh/**"
      - "services/wlt/**"
      - "infra/docker/**"
      - "infra/data-plane/**"
      - "tools/scripts/run-lian-full-runtime-closure.ps1"
      - "tools/scripts/run-lian-full-runtime-closure-v2.ps1"
      - "tools/scripts/test-wlt-runtime-failure-matrix.ps1"
      - "tools/scripts/test-runtime-backup-restore.ps1"
      - "tools/scripts/test-dsh-multisurface-runtime-matrix.ps1"
      - "tools/scripts/test-dsh-multisurface-runtime-matrix-v2.ps1"
      - "tools/scripts/test-dsh-support-notifications-runtime-matrix.ps1"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/lian-full-runtime-evidence.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: lian-full-runtime-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-runtime-smoke:
    name: Full service runtime bootstrap and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Verify Docker runtime
        shell: bash
        run: |
          set -euo pipefail
          docker version
          docker compose version

      - name: Run sovereign six-service runtime closure
        shell: pwsh
        run: ./tools/scripts/run-lian-full-runtime-closure.ps1

      - name: Verify immutable evidence belongs to this commit
        shell: pwsh
        run: |
          $evidence = Get-Content artifacts/lian-runtime-closure-evidence.json -Raw | ConvertFrom-Json
          if ($evidence.schemaVersion -lt 3) { throw "runtime evidence schema is stale" }
          if ($evidence.bootstrapMode -ne "CLEAN_UP_SEED_BOOTSTRAP_WITHOUT_LEGACY_SMOKE") {
            throw "runtime evidence used an ungoverned bootstrap mode"
          }
          if ($evidence.state -ne "PASS") { throw "runtime evidence did not pass" }
          if ($evidence.commitSha -ne $env:GITHUB_SHA) {
            throw "runtime evidence SHA $($evidence.commitSha) does not match $env:GITHUB_SHA"
          }
          foreach ($service in @("dsh", "identity", "wlt", "workforce", "providers", "platform-control", "platform-control-readiness")) {
            if ($evidence.services.$service.state -ne "PASS") { throw "missing service evidence: $service" }
          }
          foreach ($migration in @("providers", "platform-control")) {
            if ($evidence.migrations.$migration.state -ne "PASS") { throw "missing migration evidence: $migration" }
          }
          if ($evidence.financialMatrix.state -ne "PASS") {
            throw "WLT duplicate/replay/order/provider matrix did not pass"
          }
          if ($evidence.disasterRecovery.state -ne "PASS") {
            throw "six-database and MinIO disaster-recovery round trip did not pass"
          }
          if ($evidence.multiSurfaceJourney.state -ne "PASS") {
            throw "client/partner/captain/field/control-panel journey did not pass"
          }
          if ($evidence.multiSurfaceJourney.output -notmatch 'DSH five-surface governed runtime matrix v2: PASS') {
            throw "five-surface evidence output is incomplete"
          }
          if ($evidence.multiSurfaceJourney.output -notmatch 'DSH support ownership and notification runtime matrix: PASS') {
            throw "support and notification evidence output is incomplete"
          }
          if ($evidence.multiSurfaceJourney.output -notmatch 'DSH sovereign commerce, field, support, and notifications matrix: PASS') {
            throw "sovereign DSH matrix did not complete"
          }
          if ($evidence.protectedRoutes.PSObject.Properties.Count -lt 5) {
            throw "protected route evidence is incomplete"
          }

      - name: Print runtime diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set +e
          docker compose \
            --env-file infra/docker/env/runtime.env.example \
            -f infra/docker/compose.runtime.yml \
            -f infra/docker/compose.financial-simulators.yml \
            --profile identity --profile workforce --profile dsh --profile wlt \
            --profile media --profile providers --profile platform \
            --profile financial-simulators --profile mail ps
          docker compose \
            --env-file infra/docker/env/runtime.env.example \
            -f infra/docker/compose.runtime.yml \
            -f infra/docker/compose.financial-simulators.yml \
            --profile identity --profile workforce --profile dsh --profile wlt \
            --profile media --profile providers --profile platform \
            --profile financial-simulators --profile mail \
            logs --no-color --tail=500
          test -f artifacts/lian-runtime-closure-evidence.json && cat artifacts/lian-runtime-closure-evidence.json || true

      - name: Stop full runtime
        if: always()
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 `
            -Action down `
            -Profiles identity,workforce,dsh,wlt,financial-simulators,mail,media
          docker compose `
            --env-file infra/docker/env/runtime.env.example `
            -f infra/docker/compose.runtime.yml `
            --profile providers --profile platform `
            down --remove-orphans

      - name: Publish exact-SHA runtime status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          case "$JOB_STATUS" in
            success) state=success ;;
            cancelled) state=error ;;
            *) state=failure ;;
          esac
          payload="$(jq -n \
            --arg state "$state" \
            --arg context 'Lian Full Runtime Evidence / Full service runtime bootstrap and smoke' \
            --arg description "six-service runtime, finance, DR, and governed DSH journeys: $JOB_STATUS" \
            --arg target_url "$RUN_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
            -d "$payload"
