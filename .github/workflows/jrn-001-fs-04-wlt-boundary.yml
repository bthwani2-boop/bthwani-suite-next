name: JRN-001 FS-04 DSH WLT Boundary

on:
  push:
    branches: [sambassam]
    paths:
      - governance/product/contracts/jrn-001-partner-onboarding-store-publication.product-truth.json
      - services/dsh/backend/internal/http/partner_lifecycle_routes.go
      - services/dsh/backend/internal/partner/onboarding_integrity_handlers.go
      - services/dsh/backend/internal/partner/onboarding_integrity_repository.go
      - services/dsh/backend/internal/wlt/payout_destination.go
      - services/dsh/database/migrations/dsh-098_partner_onboarding_integrity.sql
      - services/wlt/backend/internal/http/server.go
      - services/wlt/backend/internal/payout/upsert_governed.go
      - services/wlt/backend/internal/payout/upsert_governed_test.go
      - services/wlt/database/migrations/wlt-034_payout_destination_idempotency.sql
      - services/dsh/tests/jrn-001-fs-04-wlt-boundary.test.mjs
      - tools/guards/wlt-financial-boundary-gate.mjs
      - .github/workflows/jrn-001-fs-04-wlt-boundary.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.24.5'
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Verify Go formatting at the ownership boundary
        shell: bash
        run: |
          test -z "$(gofmt -l \
            services/dsh/backend/internal/wlt/payout_destination.go \
            services/dsh/backend/internal/partner/onboarding_integrity_handlers.go \
            services/dsh/backend/internal/partner/onboarding_integrity_repository.go \
            services/wlt/backend/internal/payout/upsert_governed.go \
            services/wlt/backend/internal/payout/upsert_governed_test.go \
            services/wlt/backend/internal/http/server.go)"
      - name: Compile and test DSH WLT client
        working-directory: services/dsh/backend
        run: go test ./internal/wlt ./internal/partner -run 'TestSanitizePartnerForSurface|TestNormalizeDshPayoutPreference|TestUnmaskedPayoutValue'
      - name: Compile and test WLT payout owner
        working-directory: services/wlt/backend
        run: go test ./internal/payout -run 'TestValidatePayoutDestinationInput|TestPayoutDestinationRequestHash|TestNormalizePayoutDestinationInput'
      - name: Verify JRN-001 ownership markers
        run: node services/dsh/tests/jrn-001-fs-04-wlt-boundary.test.mjs
      - name: Run sovereign WLT financial boundary guard
        run: node tools/guards/wlt-financial-boundary-gate.mjs
      - name: Publish FS-04 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then
            STATE=success
            DESCRIPTION='FS-04 DSH/WLT boundary verified'
          else
            STATE=failure
            DESCRIPTION='FS-04 DSH/WLT boundary failed'
          fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-04-dsh-wlt-boundary' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
