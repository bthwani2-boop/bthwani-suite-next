name: Temporary Platform Audit Remediation

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/tmp-platform-audit-remediation.yml"
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-platform-audit-remediation.yml"

permissions:
  contents: write

concurrency:
  group: temporary-platform-audit-remediation-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout latest sambassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: true
      - name: Normalize empty platform audit roles
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("core/platform-control/backend/internal/platformcontrol/repository.go")
          text = path.read_text(encoding="utf-8")
          old = '''\tafterRaw, err := marshalNullable(after)
\tif err != nil {
\t\treturn err
\t}
\t_, err = tx.ExecContext(ctx, `'''
          new = '''\tafterRaw, err := marshalNullable(after)
\tif err != nil {
\t\treturn err
\t}
\tif actorRoles == nil {
\t\tactorRoles = []string{}
\t}
\t_, err = tx.ExecContext(ctx, `'''
          if old not in text:
              raise SystemExit("platform audit insertion no longer matches expected source")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Commit audit normalization
        shell: bash
        run: |
          git config user.name "bthwani-governance-bot"
          git config user.email "actions@users.noreply.github.com"
          git add core/platform-control/backend/internal/platformcontrol/repository.go
          git commit -m "fix(platform): normalize empty audit actor roles"
          for attempt in 1 2 3; do
            if git push origin HEAD:sambassam; then
              exit 0
            fi
            git pull --rebase origin sambassam
          done
          exit 1
