name: BThwani Mobile Runtime CI

on:
  push:
    branches: [master, lianbassam]
    paths:
      - ".github/workflows/mobile-runtime-ci.yml"
      - "apps/app-client/runtime/**"
      - "apps/app-partner/runtime/**"
      - "apps/app-captain/runtime/**"
      - "apps/app-field/runtime/**"
      - "services/dsh/frontend/shared/notifications/**"
      - "tools/mobile/**"
      - "tools/scripts/start-mobile-runtime.ps1"
      - "tools/scripts/mobile-adb.ps1"
      - "tools/scripts/eas-build-mobile.mjs"
      - "infra/local/mobile.env.example"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/mobile-runtime-ci.yml"
      - "apps/app-client/runtime/**"
      - "apps/app-partner/runtime/**"
      - "apps/app-captain/runtime/**"
      - "apps/app-field/runtime/**"
      - "services/dsh/frontend/shared/notifications/**"
      - "tools/mobile/**"
      - "tools/scripts/start-mobile-runtime.ps1"
      - "tools/scripts/mobile-adb.ps1"
      - "tools/scripts/eas-build-mobile.mjs"
      - "infra/local/mobile.env.example"

permissions:
  contents: read

concurrency:
  group: mobile-runtime-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  runtime-contracts:
    name: Mobile runtime contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - name: Verify generated Expo application contracts
        run: pnpm run mobile:apps:check
      - name: Verify Expo and native capability contracts
        run: pnpm run mobile:expo:verify
      - name: Verify app-client runtime tests
        run: pnpm --dir apps/app-client/runtime test

  application-typecheck:
    name: Typecheck ${{ matrix.app }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app: [app-client, app-partner, app-captain, app-field]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - name: Typecheck application runtime
        run: pnpm --dir apps/${{ matrix.app }}/runtime typecheck

  shared-mobile-typecheck:
    name: Typecheck shared DSH mobile frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - name: Typecheck DSH shared and application surfaces
        run: pnpm --dir services/dsh typecheck
