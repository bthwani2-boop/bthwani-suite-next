name: One-time Partner Detail Closure Bassam

on:
  push:
    branches: [bassam]
    paths:
      - '.github/workflows/one-time-partner-detail-closure-bassam.yml'

permissions:
  contents: write

concurrency:
  group: one-time-partner-detail-closure-bassam
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0

      - name: Apply guarded partner detail patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              return text.replace(old, new, 1)

          controller_path = Path('services/dsh/frontend/shared/partner/use-partner-admin-controller.tsx')
          controller = controller_path.read_text(encoding='utf-8')
          controller = replace_once(controller, '''  const review = useCallback(async (docId: string, input: DshReviewDocumentInput) => {
    setActionState({ kind: "loading" });
    try {
      await reviewPartnerDocument(partnerId, docId, input);
      setActionState({ kind: "idle" });
      void load();
    } catch (err) {
      setActionState({ kind: "error", message: resolveErrorMessage(err) });
    }
  }, [partnerId, load]);''', '''  const review = useCallback(async (docId: string, input: DshReviewDocumentInput): Promise<boolean> => {
    setActionState({ kind: "loading" });
    try {
      await reviewPartnerDocument(partnerId, docId, input);
      await load();
      setActionState({ kind: "idle" });
      return true;
    } catch (err) {
      setActionState({ kind: "error", message: resolveErrorMessage(err) });
      return false;
    }
  }, [partnerId, load]);''', 'document review controller')
          controller = replace_once(controller, '''  const transition = useCallback(async (input: DshPartnerTransitionInput, version?: number) => {
    setMutationState({ kind: "loading" });
    try {
      await transitionPartner(partnerId, input, version);
      setMutationState({ kind: "idle" });
      void load();
    } catch (err) {
      const e = err as { status?: number };
      if (e?.status === 422) {
        setMutationState({ kind: "error", message: "invalid_transition" });
      } else if (e?.status === 409) {
        setMutationState({ kind: "error", message: "version_conflict" });
      } else {
        setMutationState({ kind: "error", message: resolveErrorMessage(err) });
      }
    }
  }, [partnerId, load]);''', '''  const transition = useCallback(async (input: DshPartnerTransitionInput, version?: number): Promise<boolean> => {
    setMutationState({ kind: "loading" });
    try {
      await transitionPartner(partnerId, input, version);
      await load();
      setMutationState({ kind: "idle" });
      return true;
    } catch (err) {
      const e = err as { status?: number };
      if (e?.status === 422) {
        setMutationState({ kind: "error", message: "invalid_transition" });
      } else if (e?.status === 409) {
        setMutationState({ kind: "error", message: "version_conflict" });
      } else {
        setMutationState({ kind: "error", message: resolveErrorMessage(err) });
      }
      return false;
    }
  }, [partnerId, load]);''', 'partner transition controller')
          controller_path.write_text(controller, encoding='utf-8')

          screen_path = Path('services/dsh/frontend/control-panel/partners/PartnerDetailScreen.tsx')
          screen = screen_path.read_text(encoding='utf-8')
          screen = replace_once(screen,
              'const TABS: Tab[] = ["overview", "documents", "visits", "stores", "readiness", "audit"];',
              '''const TABS: Tab[] = ["overview", "documents", "visits", "stores", "readiness", "audit"];

          const TRANSITIONS_REQUIRING_REASON = new Set([
            "ops_rejected",
            "partner_deactivated",
            "client_hidden",
          ]);'''.replace('          const', 'const').replace('\n            ', '\n  ').replace('\n          ]', '\n]'),
              'reason-required statuses')
          screen = replace_once(screen, '''  const [transitionReason, setTransitionReason] = useState("");
  const [showTransitionInput, setShowTransitionInput] = useState<string | null>(null);''', '''  const [transitionReason, setTransitionReason] = useState("");
  const [showTransitionInput, setShowTransitionInput] = useState<string | null>(null);
  const [documentReviewTarget, setDocumentReviewTarget] = useState<{
    readonly id: string;
    readonly decision: "rejected" | "needs_resubmit";
  } | null>(null);
  const [documentReviewReason, setDocumentReviewReason] = useState("");''', 'partner detail local state')
          screen = replace_once(screen, '''  const handleTransition = async (toStatus: string) => {
    await detail.transition({
      toStatus: toStatus as import("../../shared/partner").DshPartnerActivationStatus,
      ...(transitionReason ? { reason: transitionReason } : {}),
    });
    setShowTransitionInput(null);
    setTransitionReason("");
  };''', '''  const handleTransition = async (toStatus: string) => {
    const reason = transitionReason.trim();
    if (TRANSITIONS_REQUIRING_REASON.has(toStatus) && !reason) return;

    const succeeded = await detail.transition({
      toStatus: toStatus as import("../../shared/partner").DshPartnerActivationStatus,
      ...(reason ? { reason } : {}),
    }, partner.version);

    if (succeeded) {
      setShowTransitionInput(null);
      setTransitionReason("");
    }
  };

  const handleDocumentDecision = async (
    documentId: string,
    decision: "approved" | "rejected" | "needs_resubmit",
  ) => {
    const reason = documentReviewReason.trim();
    if (decision !== "approved" && !reason) return;
    const succeeded = await docs.review(documentId, {
      decision,
      ...(reason ? { reason } : {}),
    });
    if (succeeded) {
      setDocumentReviewTarget(null);
      setDocumentReviewReason("");
    }
  };''', 'transition and document handlers')
          screen = replace_once(screen, 'disabled={detail.mutationState.kind === "loading"}', '''disabled={
                        detail.mutationState.kind === "loading"
                        || (TRANSITIONS_REQUIRING_REASON.has(showTransitionInput) && transitionReason.trim().length === 0)
                      }''', 'transition confirm guard')

          docs_start = screen.index('        {/* Documents */}')
          visits_start = screen.index('        {/* Field Visits */}', docs_start)
          docs_block = '''        {/* Documents */}
        {tab === "documents" && (
          docs.state.kind === "loading" ? (
            <CpStatePanel role="status" title="جاري تحميل الوثائق…" />
          ) : docs.state.kind === "empty" ? (
            <CpStatePanel role="status" title="لا توجد وثائق مرفوعة بعد.">
              <CpRetryButton onClick={docs.load}>تحديث</CpRetryButton>
            </CpStatePanel>
          ) : docs.state.kind === "error" ? (
            <CpStatePanel role="alert" title="تعذر تحميل الوثائق" code={docs.state.message}>
              <CpRetryButton onClick={docs.load}>إعادة المحاولة</CpRetryButton>
            </CpStatePanel>
          ) : docs.state.kind === "success" ? (
            <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
              <CpTable aria-label="وثائق الشريك">
                <thead>
                  <tr>
                    <CpTableHeaderCell>نوع الوثيقة</CpTableHeaderCell>
                    <CpTableHeaderCell>الحالة</CpTableHeaderCell>
                    <CpTableHeaderCell>الإجراءات</CpTableHeaderCell>
                  </tr>
                </thead>
                <tbody>
                  {docs.state.documents.map((doc) => (
                    <tr key={doc.id}>
                      <CpTableCell>{doc.documentType}</CpTableCell>
                      <CpTableCell>{doc.documentStatus}</CpTableCell>
                      <CpTableCell>
                        <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap" }}>
                          <CpButton onClick={() => void handleDocumentDecision(doc.id, "approved")} disabled={doc.documentStatus === "approved" || docs.actionState.kind === "loading"}>اعتماد</CpButton>
                          <CpButton onClick={() => { setDocumentReviewTarget({ id: doc.id, decision: "rejected" }); setDocumentReviewReason(""); }} disabled={doc.documentStatus === "rejected" || docs.actionState.kind === "loading"}>رفض</CpButton>
                          <CpButton onClick={() => { setDocumentReviewTarget({ id: doc.id, decision: "needs_resubmit" }); setDocumentReviewReason(""); }} disabled={doc.documentStatus === "needs_resubmit" || docs.actionState.kind === "loading"}>طلب إعادة الرفع</CpButton>
                        </div>
                      </CpTableCell>
                    </tr>
                  ))}
                </tbody>
              </CpTable>

              {documentReviewTarget ? (
                <div style={{ display: "flex", gap: "0.5rem", alignItems: "flex-start", flexWrap: "wrap" }}>
                  <div style={{ flex: 1, minWidth: "16rem" }}>
                    <CpTextInput value={documentReviewReason} onChange={setDocumentReviewReason} placeholder="سبب الرفض أو متطلبات إعادة الرفع" aria-label="سبب قرار مراجعة الوثيقة" />
                  </div>
                  <CpButton onClick={() => void handleDocumentDecision(documentReviewTarget.id, documentReviewTarget.decision)} disabled={documentReviewReason.trim().length === 0 || docs.actionState.kind === "loading"}>
                    {docs.actionState.kind === "loading" ? "جاري الحفظ…" : "تأكيد القرار"}
                  </CpButton>
                  <CpButton onClick={() => { setDocumentReviewTarget(null); setDocumentReviewReason(""); }}>إلغاء</CpButton>
                </div>
              ) : null}

              {docs.actionState.kind === "error" ? (
                <p role="alert" style={{ color: statusScale.danger, margin: 0, fontSize: "0.85rem" }}>{docs.actionState.message}</p>
              ) : null}
            </div>
          ) : null
        )}

'''
          screen = screen[:docs_start] + docs_block + screen[visits_start:]
          replacements = [
              ('<CpStatePanel role="alert" title="تعذر تحميل الزيارات الميدانية" code={visits.state.message} />', '<CpStatePanel role="alert" title="تعذر تحميل الزيارات الميدانية" code={visits.state.message}><CpRetryButton onClick={visits.reload}>إعادة المحاولة</CpRetryButton></CpStatePanel>', 'visits retry'),
              ('<CpStatePanel role="alert" title="تعذر تحميل المتاجر" code={stores.state.message} />', '<CpStatePanel role="alert" title="تعذر تحميل المتاجر" code={stores.state.message}><CpRetryButton onClick={stores.reload}>إعادة المحاولة</CpRetryButton></CpStatePanel>', 'stores retry'),
              ('<CpStatePanel role="alert" title="تعذر تحميل الجاهزية" code={readiness.state.message} />', '<CpStatePanel role="alert" title="تعذر تحميل الجاهزية" code={readiness.state.message}><CpRetryButton onClick={readiness.reload}>إعادة المحاولة</CpRetryButton></CpStatePanel>', 'readiness retry'),
              ('<CpStatePanel role="alert" title="تعذر تحميل سجل التدقيق" code={audit.state.message} />', '<CpStatePanel role="alert" title="تعذر تحميل سجل التدقيق" code={audit.state.message}><CpRetryButton onClick={audit.reload}>إعادة المحاولة</CpRetryButton></CpStatePanel>', 'audit retry'),
          ]
          for old, new, label in replacements:
              screen = replace_once(screen, old, new, label)
          screen_path.write_text(screen, encoding='utf-8')
          PY
          git diff --check

      - name: Verify partner frontend
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile
          pnpm run guard:no-broken-imports
          pnpm run guard:frontend-feature-binding
          pnpm run typecheck

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add services/dsh/frontend/shared/partner/use-partner-admin-controller.tsx services/dsh/frontend/control-panel/partners/PartnerDetailScreen.tsx
          git commit -m 'fix(partners): close lifecycle and document review actions'
          git push origin HEAD:bassam
