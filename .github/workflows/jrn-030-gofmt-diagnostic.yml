name: JRN-030 Canonical Go Format

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    types: [synchronize]

permissions:
  contents: read

concurrency:
  group: jrn-030-gofmt-${{ github.sha }}
  cancel-in-progress: false

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Apply canonical gofmt
        run: |
          gofmt -w services/dsh/backend/internal/partnerfleet/audit.go
          gofmt -w services/dsh/backend/internal/partnerfleet/courier_codes.go
          gofmt -w services/dsh/backend/internal/partnerfleet/redeem.go
          gofmt -w services/dsh/backend/internal/partnerfleet/list.go
          gofmt -w services/dsh/backend/internal/partnerfleet/membership_disconnect.go
          mkdir -p /tmp/jrn030-gofmt/services/dsh/backend/internal/partnerfleet
          cp services/dsh/backend/internal/partnerfleet/{audit.go,courier_codes.go,redeem.go,list.go,membership_disconnect.go} /tmp/jrn030-gofmt/services/dsh/backend/internal/partnerfleet/
          git diff -- services/dsh/backend/internal/partnerfleet || true
      - name: Upload canonical files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jrn-030-gofmt-${{ github.sha }}
          path: /tmp/jrn030-gofmt
          if-no-files-found: error
          retention-days: 3
