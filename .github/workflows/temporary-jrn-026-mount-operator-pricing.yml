name: Temporary JRN-026 Mount Operator Pricing

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/temporary-jrn-026-mount-operator-pricing.yml"

permissions:
  contents: write

concurrency:
  group: temporary-jrn-026-mount-operator-pricing
  cancel-in-progress: false

jobs:
  mount:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sambassam
        uses: actions/checkout@v4
        with:
          ref: sambassam
          fetch-depth: 0

      - name: Mount operator pricing in partner stores tab
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin sambassam
          python3 - <<'PY'
          from pathlib import Path

          path = Path("services/dsh/frontend/control-panel/partners/PartnerDetailOperationalScreen.tsx")
          text = path.read_text(encoding="utf-8")

          type_import = 'import type { DshPartnerActivationStatus } from "../../shared/partner";\n'
          pricing_import = 'import { OperatorDeliveryPricingPanel } from "./stores/OperatorDeliveryPricingPanel";\n'
          if pricing_import not in text:
              if text.count(type_import) != 1:
                  raise SystemExit("partner detail import anchor mismatch")
              text = text.replace(type_import, type_import + pricing_import, 1)

          state_anchor = '  const [storeIdToLink, setStoreIdToLink] = useState("");\n'
          pricing_state = '  const [selectedPricingStoreId, setSelectedPricingStoreId] = useState<string | null>(null);\n'
          if pricing_state not in text:
              if text.count(state_anchor) != 1:
                  raise SystemExit("partner detail state anchor mismatch")
              text = text.replace(state_anchor, state_anchor + pricing_state, 1)

          old = '''                  : (
                    <CpTable aria-label="متاجر الشريك"><thead><tr><CpTableHeaderCell>المتجر</CpTableHeaderCell><CpTableHeaderCell>المدينة</CpTableHeaderCell><CpTableHeaderCell>الحالة</CpTableHeaderCell><CpTableHeaderCell>ظهور العميل</CpTableHeaderCell></tr></thead><tbody>
                      {stores.state.stores.map((store) => <tr key={store.id}><CpTableCell>{store.displayName}</CpTableCell><CpTableCell>{store.cityCode}</CpTableCell><CpTableCell>{store.status}</CpTableCell><CpTableCell>{store.isVisible ? "ظاهر" : "مخفي"}</CpTableCell></tr>)}
                    </tbody></CpTable>
                  )}'''
          new = '''                  : (
                    <div style={{ display: "grid", gap: 16 }}>
                      <CpTable aria-label="متاجر الشريك"><thead><tr><CpTableHeaderCell>المتجر</CpTableHeaderCell><CpTableHeaderCell>المدينة</CpTableHeaderCell><CpTableHeaderCell>الحالة</CpTableHeaderCell><CpTableHeaderCell>ظهور العميل</CpTableHeaderCell><CpTableHeaderCell>التسعير</CpTableHeaderCell></tr></thead><tbody>
                        {stores.state.stores.map((store) => (
                          <tr key={store.id}>
                            <CpTableCell>{store.displayName}</CpTableCell>
                            <CpTableCell>{store.cityCode}</CpTableCell>
                            <CpTableCell>{store.status}</CpTableCell>
                            <CpTableCell>{store.isVisible ? "ظاهر" : "مخفي"}</CpTableCell>
                            <CpTableCell>
                              <CpButton onClick={() => setSelectedPricingStoreId((current) => current === store.id ? null : store.id)}>
                                {selectedPricingStoreId === store.id ? "إغلاق التسعير" : "إدارة التسعير"}
                              </CpButton>
                            </CpTableCell>
                          </tr>
                        ))}
                      </tbody></CpTable>
                      {selectedPricingStoreId ? <OperatorDeliveryPricingPanel storeId={selectedPricingStoreId} /> : null}
                    </div>
                  )}'''
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit("partner stores table anchor mismatch")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY
          git diff --check

      - name: Commit mounted operator pricing
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/dsh/frontend/control-panel/partners/PartnerDetailOperationalScreen.tsx
          if git diff --cached --quiet; then
            echo "Operator pricing already mounted."
            exit 0
          fi
          git commit -m "fix(jrn-026): mount operator pricing in partner stores tab"
          git pull --rebase origin sambassam
          git push origin HEAD:sambassam
