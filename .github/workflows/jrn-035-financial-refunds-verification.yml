name: JRN-035 Financial Refunds Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths: &jrn035_paths
      - "governance/product/contracts/jrn-035-financial-refunds.product-truth.json"
      - "services/wlt/contracts/jrn-035-refund-governance.json"
      - "services/wlt/contracts/jrn-035-refunds.openapi.yaml"
      - "services/dsh/contracts/jrn-035-refunds.openapi.yaml"
      - "services/wlt/backend/internal/refund/**"
      - "services/wlt/backend/internal/dshoutbox/**"
      - "services/wlt/backend/internal/dshnotify/**"
      - "services/wlt/backend/internal/http/server.go"
      - "services/wlt/database/migrations/wlt-037_jrn_035_refund_governance.sql"
      - "services/wlt/database/migrations/wlt-092_jrn_035_refund_operation_idempotency.sql"
      - "services/wlt/database/tests/jrn-035-refund-invariants.sql"
      - "infra/docker/scripts/wlt-migration-probes.ps1"
      - "services/dsh/backend/internal/http/refund_finance_*"
      - "services/dsh/backend/internal/http/financeproxy.go"
      - "services/dsh/backend/internal/wlt/finance_proxy.go"
      - "services/dsh/backend/internal/wlt/refund_proxy.go"
      - "services/dsh/frontend/**/wlt-refund/**"
      - "services/dsh/frontend/control-panel/finance/**"
      - "services/dsh/frontend/app-client/orders/OrdersListScreen.tsx"
      - "services/dsh/frontend/app-partner/orders/GovernedPartnerOrdersScreen.tsx"
      - "tools/verification/jrn-035-financial-refunds.test.mjs"
      - "tools/verification/jrn-035-openapi-contracts.test.mjs"
      - "governance/evidence/.jrn-035-final-validation-trigger"
      - ".github/workflows/jrn-035-financial-refunds-verification.yml"
  pull_request:
    branches: [sambassam]
    paths: *jrn035_paths

permissions:
  contents: read

concurrency:
  group: jrn-035-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: JRN-035 sovereign refund runtime and multi-surface proof
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wlt_ci
          POSTGRES_PASSWORD: wlt_ci_password
          POSTGRES_DB: wlt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wlt_ci -d wlt_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: wlt_ci
      PGPASSWORD: wlt_ci_password
      PGDATABASE: wlt_ci
      DATABASE_URL: postgres://wlt_ci:wlt_ci_password@localhost:5432/wlt_ci?sslmode=disable
      WLT_REQUIRE_DB_TESTS: "true"
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: services/wlt/backend/go.mod
          cache-dependency-path: |
            services/wlt/backend/go.sum
            services/dsh/backend/go.sum
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install locked workspace
        run: pnpm install --frozen-lockfile
      - name: Verify JRN-035 cross-surface ownership privacy and accessibility invariants
        run: |
          node --test tools/verification/jrn-035-financial-refunds.test.mjs
          node --test tools/verification/jrn-035-openapi-contracts.test.mjs
          node tools/guards/wlt-financial-boundary-gate.mjs
      - name: Generate typed WLT and DSH refund contracts
        run: |
          pnpm dlx openapi-typescript@7.10.1 services/wlt/contracts/jrn-035-refunds.openapi.yaml --output /tmp/jrn-035-wlt-refunds.generated.ts
          pnpm dlx openapi-typescript@7.10.1 services/dsh/contracts/jrn-035-refunds.openapi.yaml --output /tmp/jrn-035-dsh-refunds.generated.ts
          test -s /tmp/jrn-035-wlt-refunds.generated.ts
          test -s /tmp/jrn-035-dsh-refunds.generated.ts
          grep -q "createWltRefund" /tmp/jrn-035-wlt-refunds.generated.ts
          grep -q "reconcileWltRefund" /tmp/jrn-035-wlt-refunds.generated.ts
          grep -q "createDshFinanceRefund" /tmp/jrn-035-dsh-refunds.generated.ts
          grep -q "getDshClientOrderRefundStatus" /tmp/jrn-035-dsh-refunds.generated.ts
          grep -q "getDshPartnerOrderRefundStatus" /tmp/jrn-035-dsh-refunds.generated.ts
      - name: Verify migration numbering and probe coverage
        shell: pwsh
        run: |
          . ./infra/docker/scripts/wlt-migration-probes.ps1
          $files = Get-ChildItem ./services/wlt/database/migrations -Filter '*.sql' | Sort-Object Name
          Test-WltMigrationProbeCoverage -MigrationFiles $files
      - name: Apply WLT migrations in lexical order
        shell: bash
        run: |
          set -euo pipefail
          for migration in services/wlt/database/migrations/*.sql; do
            psql -v ON_ERROR_STOP=1 -f "${migration}"
          done
      - name: Assert JRN-035 database invariants
        run: psql -v ON_ERROR_STOP=1 -f services/wlt/database/tests/jrn-035-refund-invariants.sql
      - name: Verify Go formatting without rewriting source
        shell: bash
        run: |
          wlt_files=$(find services/wlt/backend/internal/refund services/wlt/backend/internal/dshoutbox services/wlt/backend/internal/dshnotify -type f -name '*.go' -print)
          test -z "$(gofmt -l ${wlt_files} services/wlt/backend/internal/http/server.go)"
          test -z "$(gofmt -l services/dsh/backend/internal/http/refund_finance_handlers.go services/dsh/backend/internal/http/refund_finance_routes.go services/dsh/backend/internal/http/financeproxy.go services/dsh/backend/internal/wlt/finance_proxy.go services/dsh/backend/internal/wlt/refund_proxy.go)"
      - name: Execute WLT provider ledger reconciliation and outbox proof
        working-directory: services/wlt/backend
        run: |
          go test ./internal/refund -run '^TestGovernedRefundRuntime' -count=1 -v
          go test ./internal/refund ./internal/dshoutbox ./internal/dshnotify ./internal/http -count=1
      - name: Compile and test DSH refund proxy boundary
        working-directory: services/dsh/backend
        run: go test ./internal/http ./internal/wlt -count=1
      - name: Typecheck DSH multi-surface refund bindings
        run: pnpm --dir services/dsh typecheck
      - name: Verify backend and frontend API bindings
        run: |
          pnpm run guard:backend-api-binding
          pnpm run guard:frontend-feature-binding
      - name: Verify repository whitespace
        run: git diff --check
