name: Temporary JRN-020..030 Fullstack Boundary Diagnostic

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-jrn-020-030-fullstack-boundary-diagnostic.yml"

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node and PNPM workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Capture full-stack boundary output
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p diagnostics
          set -o pipefail
          node tools/guards/fullstack-boundary-gate.mjs 2>&1 | tee diagnostics/fullstack-boundary.log
      - name: Upload diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: jrn-020-030-fullstack-boundary-diagnostic
          path: diagnostics/fullstack-boundary.log
          if-no-files-found: error
          retention-days: 3
      - name: Publish diagnostic link
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n \
            --arg state "success" \
            --arg context "journeys/jrn-020-030/fullstack-boundary-diagnostic" \
            --arg description "Fullstack boundary diagnostics captured" \
            --arg target_url "$TARGET_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
