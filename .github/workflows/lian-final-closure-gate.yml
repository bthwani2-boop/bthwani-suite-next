name: Lian Final Same-Commit Closure Gate

on:
  push:
    branches:
      - lian
      - "fix/lian-sovereign-final-closure"
  pull_request:
    branches:
      - master
      - lian
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: lian-final-closure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-truth:
    name: Governance, contracts, surfaces, security, build, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Verify governance, authority, and foundation
        shell: bash
        run: |
          set -euo pipefail
          pnpm run guard:governance-all
          pnpm run foundation:gate

      - name: Verify boundaries, bindings, contracts, and journeys
        shell: bash
        run: |
          set -euo pipefail
          pnpm run guard:api-binding
          pnpm run guard:backend-api-binding
          pnpm run guard:service-manifest-drift
          pnpm run guard:frontend-feature-binding
          pnpm run guard:fullstack-boundary
          pnpm run guard:wlt-financial-boundary
          pnpm run guard:runtime-real-bindings
          pnpm run guard:live-cross-journey-integrity
          pnpm run guard:no-broken-imports
          node tools/guards/client-commerce/client-commerce-truth-gate.mjs
          node tools/guards/partner/partner-surface-truth-gate.mjs
          node tools/guards/maps/map-platform-truth-gate.mjs
          node tools/guards/platform/operational-policy-ui-truth-gate.mjs
          node tools/guards/privacy/client-address-privacy-truth-gate.mjs
          node tools/guards/privacy/client-address-privacy-integration-gate.mjs
          node tools/guards/ui-actions/ui-action-binding-gate.mjs

      - name: Verify UI, accessibility, mobile, and workflow integrity
        shell: bash
        run: |
          set -euo pipefail
          pnpm run guard:ui-kit-boundary
          pnpm run guard:ui-provider
          pnpm run guard:icon-contract
          pnpm run guard:design-tokens
          pnpm run guard:a11y
          pnpm run mobile:apps:check
          pnpm run mobile:expo:verify
          pnpm run guard:workflow-lint
          pnpm run guard:workflow-security
          pnpm run guard:actions-pin

      - name: Verify generated clients are exact
        shell: bash
        run: |
          set -euo pipefail
          output="$(mktemp -d)"
          trap 'rm -rf "$output"' EXIT
          pnpm exec openapi-typescript services/dsh/contracts/dsh.openapi.yaml -o "$output/dsh-api.ts"
          pnpm exec openapi-typescript services/wlt/contracts/wlt.openapi.yaml -o "$output/wlt-api.ts"
          pnpm exec openapi-typescript core/identity/contracts/auth.openapi.yaml -o "$output/identity-api.ts"
          pnpm exec openapi-typescript core/workforce/contracts/workforce.openapi.yaml -o "$output/workforce-api.ts"
          pnpm exec openapi-typescript core/platform-control/contracts/platform-control.openapi.yaml -o "$output/platform-control-api.ts"
          pnpm exec openapi-typescript core/providers/contracts/providers.openapi.yaml -o "$output/providers-api.ts"
          cmp "$output/dsh-api.ts" services/dsh/clients/generated/dsh-api.ts
          cmp "$output/wlt-api.ts" services/wlt/clients/generated/wlt-api.ts
          cmp "$output/identity-api.ts" core/identity/clients/generated/identity-api.ts
          cmp "$output/workforce-api.ts" core/workforce/clients/generated/workforce-api.ts
          cmp "$output/platform-control-api.ts" core/platform-control/clients/generated/platform-control-api.ts
          cmp "$output/providers-api.ts" core/providers/clients/generated/providers-api.ts
          node tools/scripts/generate-dsh-catalog-client.mjs --check

      - name: Typecheck, build, and test repository
        shell: bash
        run: |
          set -euo pipefail
          pnpm run typecheck
          pnpm run build
          pnpm run test

  surface-integration:
    name: Every surface action and full-stack integration
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Enforce all interactive and full-stack bindings
        shell: bash
        run: |
          set -euo pipefail
          node tools/guards/ui-actions/ui-action-binding-gate.mjs
          node tools/guards/privacy/client-address-privacy-integration-gate.mjs
          node tools/guards/maps/map-platform-truth-gate.mjs
          node tools/guards/platform/operational-policy-ui-truth-gate.mjs
          node tools/guards/privacy/client-address-privacy-truth-gate.mjs
          pnpm run guard:frontend-feature-binding
          pnpm run guard:backend-api-binding
          pnpm run guard:service-manifest-drift
          pnpm run typecheck
          pnpm run build

  go-services:
    name: Go verification — ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: DSH
            directory: services/dsh/backend
            go_mod: services/dsh/backend/go.mod
            go_sum: services/dsh/backend/go.sum
          - name: WLT
            directory: services/wlt/backend
            go_mod: services/wlt/backend/go.mod
            go_sum: services/wlt/backend/go.sum
          - name: Identity
            directory: core/identity/backend
            go_mod: core/identity/backend/go.mod
            go_sum: core/identity/backend/go.sum
          - name: Workforce
            directory: core/workforce/backend
            go_mod: core/workforce/backend/go.mod
            go_sum: core/workforce/backend/go.sum
          - name: Platform Control
            directory: core/platform-control/backend
            go_mod: core/platform-control/backend/go.mod
            go_sum: core/platform-control/backend/go.sum
          - name: Providers
            directory: core/providers/backend
            go_mod: core/providers/backend/go.mod
            go_sum: core/providers/backend/go.sum
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: ${{ matrix.go_mod }}
          cache: true
          cache-dependency-path: ${{ matrix.go_sum }}

      - name: Format, vet, test, race, and build
        working-directory: ${{ matrix.directory }}
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Unformatted files:\n%s\n' "$files"; exit 1; }
          go vet ./...
          go test ./... -count=1
          go test -race ./... -count=1
          go build ./...

  database-truth:
    name: Governed database truth — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: dsh
            migrations: services/dsh/database/migrations
            tests: services/dsh/database/tests
          - service: wlt
            migrations: services/wlt/database/migrations
            tests: services/wlt/database/tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: closure
          POSTGRES_PASSWORD: closure_password
          POSTGRES_DB: closure
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U closure -d closure"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgres://closure:closure_password@localhost:5432/closure?sslmode=disable
      PGPASSWORD: closure_password
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Apply clean install, invariants, ledger, checksum, and idempotency truth
        shell: pwsh
        run: |
          ./tools/scripts/invoke-database-upgrade-truth.ps1 `
            -ServiceName "${{ matrix.service }}" `
            -MigrationDirectory "${{ matrix.migrations }}" `
            -TestsDirectory "${{ matrix.tests }}" `
            -DatabaseUrl $env:DATABASE_URL `
            -SourceCommitSha $env:GITHUB_SHA

  full-runtime:
    name: Sovereign six-service runtime and journeys
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Run immutable runtime closure
        shell: pwsh
        run: ./tools/scripts/run-lian-full-runtime-closure.ps1

      - name: Require complete evidence for this exact ref and commit
        shell: pwsh
        run: |
          $evidence = Get-Content artifacts/lian-runtime-closure-evidence.json -Raw | ConvertFrom-Json
          if ($evidence.schemaVersion -lt 4) { throw "runtime evidence schema is stale" }
          if ($evidence.bootstrapMode -ne "CLEAN_UP_SEED_BOOTSTRAP_WITHOUT_LEGACY_SMOKE") { throw "ungoverned runtime bootstrap" }
          if ($evidence.migrationMode -ne "GOVERNED_LEDGER_CHECKSUM_IDEMPOTENT") { throw "ungoverned runtime migrations" }
          if ($evidence.state -ne "PASS") { throw "runtime evidence failed" }
          if ($evidence.commitSha -ne $env:GITHUB_SHA) { throw "runtime evidence belongs to another commit" }
          $expectedBranch = if ($env:GITHUB_EVENT_NAME -eq "pull_request") { $env:GITHUB_HEAD_REF } else { $env:GITHUB_REF_NAME }
          if ($evidence.branch -ne $expectedBranch) { throw "runtime evidence belongs to another ref" }
          if ($evidence.services.PSObject.Properties.Count -lt 7) { throw "runtime evidence is incomplete" }
          foreach ($migration in @("providers", "platform-control")) {
            $entry = $evidence.migrations.$migration
            if ($entry.state -ne "PASS" -or $entry.dirtyRows -ne 0 -or $entry.sourceCommitSha -ne $env:GITHUB_SHA) {
              throw "governed runtime migration evidence failed: $migration"
            }
          }
          if ($evidence.financialMatrix.state -ne "PASS") { throw "financial matrix failed" }
          if ($evidence.disasterRecovery.state -ne "PASS") { throw "disaster recovery failed" }
          if ($evidence.multiSurfaceJourney.state -ne "PASS") { throw "multi-surface journeys failed" }
          if ($evidence.multiSurfaceJourney.output -notmatch "DSH five-surface governed runtime matrix v2: PASS") { throw "five-surface journey output missing" }
          if ($evidence.multiSurfaceJourney.output -notmatch "DSH support ownership and notification runtime matrix: PASS") { throw "support journey output missing" }
          if ($evidence.multiSurfaceJourney.output -notmatch "DSH sovereign commerce, field, support, and notifications matrix: PASS") { throw "sovereign journey output missing" }
          if ($evidence.protectedRoutes.PSObject.Properties.Count -lt 5) { throw "protected route evidence is incomplete" }

      - name: Runtime diagnostics on failure
        if: failure()
        shell: bash
        run: |
          set +e
          docker ps -a
          docker compose \
            --env-file infra/docker/env/runtime.env.example \
            -f infra/docker/compose.runtime.yml \
            -f infra/docker/compose.financial-simulators.yml \
            --profile identity --profile workforce --profile dsh --profile wlt \
            --profile media --profile providers --profile platform \
            --profile financial-simulators --profile mail \
            logs --no-color --tail=500
          test -f artifacts/lian-runtime-closure-evidence.json && cat artifacts/lian-runtime-closure-evidence.json || true

      - name: Stop runtime
        if: always()
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 `
            -Action down `
            -Profiles identity,workforce,dsh,wlt,financial-simulators,mail,media
          docker compose `
            --env-file infra/docker/env/runtime.env.example `
            -f infra/docker/compose.runtime.yml `
            --profile providers --profile platform `
            down --remove-orphans

  result:
    name: Lian Final Same-Commit Closure result
    if: always()
    needs: [repository-truth, surface-integration, go-services, database-truth, full-runtime]
    runs-on: ubuntu-latest
    steps:
      - name: Require every closure domain to pass
        env:
          REPOSITORY_RESULT: ${{ needs.repository-truth.result }}
          SURFACE_RESULT: ${{ needs.surface-integration.result }}
          GO_RESULT: ${{ needs.go-services.result }}
          DATABASE_RESULT: ${{ needs.database-truth.result }}
          RUNTIME_RESULT: ${{ needs.full-runtime.result }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'repository=%s\nsurfaces=%s\ngo=%s\ndatabase=%s\nruntime=%s\n' \
            "$REPOSITORY_RESULT" "$SURFACE_RESULT" "$GO_RESULT" \
            "$DATABASE_RESULT" "$RUNTIME_RESULT"
          test "$REPOSITORY_RESULT" = success
          test "$SURFACE_RESULT" = success
          test "$GO_RESULT" = success
          test "$DATABASE_RESULT" = success
          test "$RUNTIME_RESULT" = success

      - name: Publish exact-SHA final closure status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          case "$JOB_STATUS" in
            success) state=success ;;
            cancelled) state=error ;;
            *) state=failure ;;
          esac
          payload="$(jq -n \
            --arg state "$state" \
            --arg context 'Lian Final Same-Commit Closure result' \
            --arg description "repository, surfaces, Go, governed databases, runtime, finance, DR and journeys: $JOB_STATUS" \
            --arg target_url "$RUN_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
            -d "$payload"
