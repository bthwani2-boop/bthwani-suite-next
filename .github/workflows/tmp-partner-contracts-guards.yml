name: Temporary Partner Contracts Guards Closure
run-name: Partner Contracts Guards · ${{ github.sha }}

on:
  push:
    branches: ["tmp/partner-closure-run"]
    paths:
      - ".github/partner-contracts-guards-trigger"
      - ".github/workflows/tmp-partner-contracts-guards.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: tmp-partner-contracts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  contracts-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - name: Contracts foundation
        run: pnpm run contracts:lint
      - name: Partner app typecheck
        run: pnpm --dir apps/app-partner/runtime typecheck
      - name: Field app partner-surface typecheck
        run: pnpm --dir apps/app-field/runtime typecheck
      - name: Control panel partner-surface typecheck
        run: pnpm --dir apps/control-panel/runtime typecheck
      - name: WLT financial boundary
        run: pnpm run guard:wlt-financial-boundary

  publish:
    if: always()
    needs: [contracts-guards]
    runs-on: ubuntu-latest
    steps:
      - name: Publish contracts guards status
        env:
          RESULT: ${{ needs.contracts-guards.result }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure; [ "$RESULT" = success ] && state=success
          jq -n --arg state "$state" --arg context "Partner Contracts Guards" --arg description "result=$RESULT run=${GITHUB_RUN_ID}" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > payload.json
          for attempt in 1 2 3 4 5 6 7 8; do
            if curl --fail-with-body --silent --show-error -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
              -d @payload.json; then break; fi
            sleep $((attempt * 3))
          done
          test "$state" = success
