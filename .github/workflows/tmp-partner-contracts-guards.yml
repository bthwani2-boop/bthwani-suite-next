name: Temporary Partner Contracts Guards Closure
run-name: Partner Contracts Guards · ${{ github.sha }}

on:
  push:
    branches: ["tmp/partner-closure-run"]
    paths:
      - ".github/partner-contracts-guards-trigger"
      - ".github/workflows/tmp-partner-contracts-guards.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: tmp-partner-contracts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  contracts-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - name: Contracts foundation
        run: pnpm run contracts:lint

  app-partner:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - name: Partner app typecheck
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/partner-contracts
          pnpm --dir apps/app-partner/runtime typecheck 2>&1 | tee artifacts/partner-contracts/app-partner-typecheck.log
      - name: Upload app-partner diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: partner-contracts-app-partner-${{ github.sha }}
          path: artifacts/partner-contracts/app-partner-typecheck.log
          if-no-files-found: warn
          retention-days: 7

  app-field:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - name: Field app partner-surface typecheck
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/partner-contracts
          pnpm --dir apps/app-field/runtime typecheck 2>&1 | tee artifacts/partner-contracts/app-field-typecheck.log
      - name: Upload app-field diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: partner-contracts-app-field-${{ github.sha }}
          path: artifacts/partner-contracts/app-field-typecheck.log
          if-no-files-found: warn
          retention-days: 7

  control-panel:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - name: Control panel partner-surface typecheck
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/partner-contracts
          pnpm --dir apps/control-panel/runtime typecheck 2>&1 | tee artifacts/partner-contracts/control-panel-typecheck.log
      - name: Upload control-panel diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: partner-contracts-control-panel-${{ github.sha }}
          path: artifacts/partner-contracts/control-panel-typecheck.log
          if-no-files-found: warn
          retention-days: 7

  wlt-boundary:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - name: WLT financial boundary
        run: pnpm run guard:wlt-financial-boundary

  publish:
    if: always()
    needs: [contracts-foundation, app-partner, app-field, control-panel, wlt-boundary]
    runs-on: ubuntu-latest
    steps:
      - name: Publish contracts guards status
        env:
          CONTRACTS_RESULT: ${{ needs.contracts-foundation.result }}
          PARTNER_RESULT: ${{ needs.app-partner.result }}
          FIELD_RESULT: ${{ needs.app-field.result }}
          CONTROL_PANEL_RESULT: ${{ needs.control-panel.result }}
          WLT_RESULT: ${{ needs.wlt-boundary.result }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          if [ "$CONTRACTS_RESULT" = success ] && [ "$PARTNER_RESULT" = success ] && [ "$FIELD_RESULT" = success ] && [ "$CONTROL_PANEL_RESULT" = success ] && [ "$WLT_RESULT" = success ]; then
            state=success
          fi
          description="contracts=$CONTRACTS_RESULT partner=$PARTNER_RESULT field=$FIELD_RESULT cp=$CONTROL_PANEL_RESULT wlt=$WLT_RESULT"
          jq -n --arg state "$state" --arg context "Partner Contracts Guards" --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > payload.json
          for attempt in 1 2 3 4 5 6 7 8; do
            if curl --fail-with-body --silent --show-error -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
              -d @payload.json; then break; fi
            sleep $((attempt * 3))
          done
          test "$state" = success
