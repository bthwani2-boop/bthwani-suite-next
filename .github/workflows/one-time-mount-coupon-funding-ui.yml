name: One-time Mount Coupon Funding UI

on:
  push:
    branches: [bassam]
    paths:
      - '.github/workflows/one-time-mount-coupon-funding-ui.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mount:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0

      - name: Write contracts and patch command deck
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin bassam
          cat > services/dsh/frontend/shared/marketing/coupons.types.ts <<'TS'
          export type CouponStatus = "draft" | "active" | "paused" | "archived";
          export type CouponDiscountType = "percent" | "fixed";
          export type CouponFundingSource = "platform" | "partner" | "shared";

          export type CouponRecord = {
            readonly id: string;
            readonly nameAr: string;
            readonly description: string;
            readonly codeLast4: string;
            readonly storeId?: string;
            readonly discountType: CouponDiscountType;
            readonly discountPercent: number;
            readonly fixedDiscountMinorUnits: number;
            readonly maxDiscountMinorUnits: number;
            readonly minSubtotalMinorUnits: number;
            readonly globalUsageLimit: number;
            readonly perClientUsageLimit: number;
            readonly eligibleFulfillmentModes: readonly ("bthwani_delivery" | "partner_delivery" | "pickup")[];
            readonly fundingSource: CouponFundingSource;
            readonly platformShareBps: number;
            readonly partnerShareBps: number;
            readonly sponsorId?: string;
            readonly startsAt?: string;
            readonly endsAt?: string;
            readonly status: CouponStatus;
            readonly createdByActorId: string;
            readonly approvedByActorId?: string;
            readonly approvedAt?: string;
            readonly version: number;
            readonly createdAt: string;
            readonly updatedAt: string;
          };

          export type IssuedCoupon = {
            readonly coupon: CouponRecord;
            readonly code: string;
          };

          export type CouponCreatePayload = {
            readonly nameAr: string;
            readonly description?: string;
            readonly code: string;
            readonly storeId?: string;
            readonly discountType: CouponDiscountType;
            readonly discountPercent: number;
            readonly fixedDiscountMinorUnits: number;
            readonly maxDiscountMinorUnits: number;
            readonly minSubtotalMinorUnits: number;
            readonly globalUsageLimit: number;
            readonly perClientUsageLimit: number;
            readonly eligibleFulfillmentModes: readonly ("bthwani_delivery" | "partner_delivery" | "pickup")[];
            readonly fundingSource: CouponFundingSource;
            readonly platformShareBps: number;
            readonly partnerShareBps: number;
            readonly sponsorId?: string;
            readonly startsAt?: string;
            readonly endsAt?: string;
          };

          export type CouponUpdatePayload = Partial<Omit<CouponCreatePayload, "code">> & {
            readonly status?: CouponStatus;
            readonly expectedVersion: number;
          };
          TS

          python3 - <<'PY'
          from pathlib import Path
          path=Path('services/dsh/frontend/control-panel/marketing/components/CouponsCommandDeck.tsx')
          text=path.read_text(encoding='utf-8')
          text=text.replace(
            '  type CouponDiscountType,\n  type CouponRecord,',
            '  type CouponDiscountType,\n  type CouponFundingSource,\n  type CouponRecord,',
          )
          state_anchor='  const [clientLimit, setClientLimit] = useState("1");'
          states='''  const [clientLimit, setClientLimit] = useState("1");
  const [fundingSource, setFundingSource] = useState<CouponFundingSource>("platform");
  const [platformSharePercent, setPlatformSharePercent] = useState("100");
  const [sponsorId, setSponsorId] = useState("");'''
          if 'platformSharePercent' not in text:
            if text.count(state_anchor)!=1: raise SystemExit('coupon state anchor mismatch')
            text=text.replace(state_anchor,states,1)
          parse_anchor='    const perClient = Number(clientLimit);'
          parse_add='''    const perClient = Number(clientLimit);
    const platformPercent = Number(platformSharePercent);
    const platformShareBps = Math.round(platformPercent * 100);
    const partnerShareBps = 10000 - platformShareBps;'''
          if 'const platformShareBps' not in text:
            if text.count(parse_anchor)!=1: raise SystemExit('coupon parse anchor mismatch')
            text=text.replace(parse_anchor,parse_add,1)
          validation_old='''        !Number.isInteger(totalLimit) || totalLimit < 0 || !Number.isInteger(perClient) || perClient <= 0) return;'''
          validation_new='''        !Number.isInteger(totalLimit) || totalLimit < 0 || !Number.isInteger(perClient) || perClient <= 0 ||
        !Number.isFinite(platformPercent) || platformPercent < 0 || platformPercent > 100 ||
        ((fundingSource === "partner" || fundingSource === "shared") && !storeId.trim())) return;'''
          if validation_new not in text:
            if text.count(validation_old)!=1: raise SystemExit('coupon validation anchor mismatch')
            text=text.replace(validation_old,validation_new,1)
          payload_anchor='''      eligibleFulfillmentModes: ["bthwani_delivery", "partner_delivery", "pickup"],'''
          payload_new='''      eligibleFulfillmentModes: ["bthwani_delivery", "partner_delivery", "pickup"],
      fundingSource,
      platformShareBps: fundingSource === "platform" ? 10000 : fundingSource === "partner" ? 0 : platformShareBps,
      partnerShareBps: fundingSource === "platform" ? 0 : fundingSource === "partner" ? 10000 : partnerShareBps,
      ...(sponsorId.trim() ? { sponsorId: sponsorId.trim() } : {}),'''
          if 'fundingSource,' not in text[text.find('const createDraft'):text.find('const setStatus')]:
            if text.count(payload_anchor)!=1: raise SystemExit('coupon payload anchor mismatch')
            text=text.replace(payload_anchor,payload_new,1)
          form_anchor='''        <input value={clientLimit} onChange={(event) => setClientLimit(event.target.value)} inputMode="numeric" placeholder="حد العميل" style={styles.input} />'''
          form_new=form_anchor+'''
        <select value={fundingSource} onChange={(event) => setFundingSource(event.target.value as CouponFundingSource)} style={styles.input}>
          <option value="platform">تمويل المنصة 100%</option>
          <option value="partner">تمويل الشريك 100%</option>
          <option value="shared">تمويل مشترك</option>
        </select>
        {fundingSource === "shared" ? <input value={platformSharePercent} onChange={(event) => setPlatformSharePercent(event.target.value)} inputMode="decimal" placeholder="نسبة المنصة %" style={styles.input} /> : null}
        <input value={sponsorId} onChange={(event) => setSponsorId(event.target.value)} placeholder="معرف الراعي — اختياري" style={styles.input} />'''
          if 'تمويل المنصة 100%' not in text:
            if text.count(form_anchor)!=1: raise SystemExit('coupon form anchor mismatch')
            text=text.replace(form_anchor,form_new,1)
          display_anchor='''              <p style={styles.muted}>حد العميل: {coupon.perClientUsageLimit} · الحد الإجمالي: {coupon.globalUsageLimit || "غير محدود"}</p>'''
          display_new=display_anchor+'''
              <p style={styles.muted}>التمويل: {coupon.fundingSource} · المنصة {(coupon.platformShareBps / 100).toLocaleString("ar")}% · الشريك {(coupon.partnerShareBps / 100).toLocaleString("ar")}%</p>'''
          if 'coupon.platformShareBps' not in text:
            if text.count(display_anchor)!=1: raise SystemExit('coupon display anchor mismatch')
            text=text.replace(display_anchor,display_new,1)
          path.write_text(text,encoding='utf-8')
          PY
          git diff --check

      - name: Commit funding UI
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add services/dsh/frontend/shared/marketing/coupons.types.ts services/dsh/frontend/control-panel/marketing/components/CouponsCommandDeck.tsx
          if git diff --cached --quiet;then exit 0;fi
          git commit -m 'fix(coupons): expose promotion funding split'
          git pull --rebase origin bassam
          git push origin HEAD:bassam
