name: Temporary JRN-022 Frontend Contract Closure

on:
  pull_request:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-jrn-022-frontend-contract-closure.yml"
      - "tools/scripts/close-jrn-022-frontend-contract.py"
      - "services/dsh/frontend/shared/special-requests/**"
      - "services/dsh/frontend/shared/shein/**"
      - "services/dsh/frontend/shared/awnak/**"
      - "services/dsh/contracts/**"
      - "governance/product/contracts/jrn-022-special-requests.product-truth.json"
      - "services/dsh/tests/jrn-022-special-requests.test.mjs"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tmp-jrn-022-frontend-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout closure branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply financial readback contract
        run: python3 tools/scripts/close-jrn-022-frontend-contract.py

      - name: Regenerate governed manifest and client
        run: |
          node -e "import('./tools/scripts/dsh-openapi-modular-lib.mjs').then((m) => m.migrateDshOpenApi())"
          pnpm --dir services/dsh openapi:generate
          pnpm --dir services/dsh openapi:test

      - name: Verify JRN-022 static and TypeScript gates
        run: |
          node --test services/dsh/tests/jrn-022-special-requests.test.mjs
          pnpm --dir services/dsh exec tsc -p tsconfig.jrn-020-030.json --noEmit --pretty false
          git diff --check

      - name: Commit verified frontend closure
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "bthwani-journey-closure"
          git config user.email "actions@users.noreply.github.com"
          git checkout HEAD -- .github/workflows/tmp-jrn-022-frontend-contract-closure.yml
          git add -A
          git commit -m "feat(jrn-022): close information evidence and financial surfaces [skip ci]"
          git pull --rebase origin "$HEAD_REF"
          git push origin "HEAD:$HEAD_REF"
