name: Finance closure executor v2

on:
  push:
    branches: [bassam]
    paths:
      - .github/workflows/finance-closure-executor-v2.yml

permissions:
  contents: write

concurrency:
  group: finance-closure-executor-v2-bassam
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - name: Checkout current bassam
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: bassam
          fetch-depth: 0

      - name: Setup Node workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.26.5'
          cache-dependency-path: |
            services/wlt/backend/go.sum
            services/dsh/backend/go.sum

      - name: Apply closure and execute evidence gates
        id: gates
        shell: bash
        run: |
          set +e
          logs=/tmp/finance-closure-v2
          report=/tmp/FINANCE_FINAL_REMOTE_VALIDATION.md
          rm -rf "$logs"
          mkdir -p "$logs"
          : > "$report"
          printf '# Finance Final Remote Validation\n\n' >> "$report"
          printf -- '- Branch: `bassam`\n' >> "$report"
          printf -- '- Source SHA: `%s`\n' "$(git rev-parse HEAD)" >> "$report"
          printf -- '- Executed at: `%s`\n\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$report"
          failed=0

          gate() {
            name="$1"
            shift
            slug="$(printf '%s' "$name" | tr '[:upper:] ' '[:lower:]-' | tr -cd 'a-z0-9_-')"
            log="$logs/$slug.log"
            printf '## %s\n\n' "$name" >> "$report"
            "$@" >"$log" 2>&1
            code=$?
            if [ "$code" -eq 0 ]; then
              printf -- '- Result: **PASS**\n\n' >> "$report"
            else
              failed=1
              printf -- '- Result: **FAIL** (exit `%s`)\n\n' "$code" >> "$report"
            fi
            printf '```text\n' >> "$report"
            tail -n 260 "$log" >> "$report"
            printf '\n```\n\n' >> "$report"
          }

          gate "Finance source drift patcher" node tools/scripts/close-finance-source-drift.mjs
          gate "Finance contract patcher" node tools/scripts/close-finance-contracts.mjs
          gate "Finance final drift patcher" node tools/scripts/close-finance-final-drifts.mjs
          gate "Generate DSH OpenAPI client" pnpm run openapi:generate:dsh
          gate "Generate WLT OpenAPI client" pnpm run openapi:generate:wlt

          gate "Go formatting" bash -lc 'find services/wlt/backend services/dsh/backend -name "*.go" -type f -print0 | xargs -0 gofmt -w'
          gate "Git whitespace validation" git diff --check
          gate "WLT migration prefix uniqueness" bash -lc 'duplicates=$(find services/wlt/database/migrations -maxdepth 1 -type f -printf "%f\n" | sed -n "s/^\(wlt-[0-9][0-9][0-9]\)_.*/\1/p" | sort | uniq -d); test -z "$duplicates" || { echo "duplicate WLT migration prefixes:"; echo "$duplicates"; exit 1; }'
          gate "WLT Go tests" bash -lc 'cd services/wlt/backend && go test ./...'
          gate "WLT Go build" bash -lc 'cd services/wlt/backend && go build ./...'
          gate "DSH Go tests" bash -lc 'cd services/dsh/backend && go test ./...'
          gate "DSH Go build" bash -lc 'cd services/dsh/backend && go build ./...'
          gate "Contracts lint" pnpm run contracts:lint
          gate "WLT TypeScript" pnpm --dir services/wlt typecheck
          gate "Control-panel TypeScript" pnpm --dir apps/control-panel/runtime typecheck
          gate "WLT financial boundary" pnpm run guard:wlt-financial-boundary
          gate "Go route extraction" pnpm run guard:go-routes-ci
          gate "Broken imports" pnpm run guard:no-broken-imports

          gate "Finance route-contract matrix" bash -lc '
            set -euo pipefail
            server=services/dsh/backend/internal/http/server.go
            dsh=services/dsh/contracts/dsh.openapi.yaml
            wlt=services/wlt/contracts/wlt.openapi.yaml
            routes=(
              "GET /dsh/control-panel/finance/settlements"
              "POST /dsh/control-panel/finance/settlements/from-delivered-orders"
              "PUT /dsh/control-panel/finance/settlement-policies/{partnerId}"
              "GET /dsh/control-panel/finance/refunds"
              "GET /dsh/control-panel/finance/ledger/entries"
              "GET /dsh/control-panel/finance/financial-summary"
              "GET /dsh/control-panel/finance/cod-records"
              "GET /dsh/control-panel/finance/commissions"
              "GET /dsh/control-panel/finance/payout-requests"
              "POST /dsh/control-panel/finance/payout-requests/{payoutId}/approve"
              "POST /dsh/control-panel/finance/payout-requests/{payoutId}/process"
              "POST /dsh/control-panel/finance/payout-requests/{payoutId}/complete"
              "GET /dsh/captain/finance/cod-records"
              "POST /dsh/captain/finance/cod-records/{recordId}/collect"
              "POST /dsh/captain/finance/cod-records/{recordId}/remit"
              "GET /dsh/captain/finance/commissions"
              "GET /dsh/captain/finance/payouts"
              "POST /dsh/captain/finance/payouts"
              "GET /dsh/field/finance/commissions"
              "GET /dsh/field/finance/wallet"
              "GET /dsh/field/finance/payouts"
              "POST /dsh/field/finance/payouts"
              "GET /dsh/field/finance/payout-destinations"
              "POST /dsh/field/finance/payout-destinations"
              "PATCH /dsh/field/finance/payout-destinations/{destinationId}"
              "DELETE /dsh/field/finance/payout-destinations/{destinationId}"
              "GET /dsh/partner/me/finance/settlements"
              "GET /dsh/partner/me/finance/settlements/summary"
            )
            for route in "${routes[@]}"; do
              grep -Fq "$route" "$server" || { echo "missing DSH router route: $route"; exit 1; }
              path="${route#* }"
              grep -Fq "  ${path}:" "$dsh" || { echo "missing DSH contract path: $path"; exit 1; }
            done
            for path in /wlt/payment-sessions /wlt/refunds /wlt/settlements '/wlt/settlement-policies/{partnerId}' /wlt/cod-records /wlt/commissions /wlt/ledger/financial-summary /wlt/payout-requests /wlt/reconciliation-cases; do
              grep -Fq "  ${path}:" "$wlt" || { echo "missing WLT contract path: $path"; exit 1; }
            done
            echo "finance route-contract matrix: PASS"
          '

          gate "Finance Docker reset and comprehensive smoke" pwsh -NoProfile -ExecutionPolicy Bypass -File tools/scripts/financial-simulator-local.ps1 -Action reset

          printf '## Final verdict\n\n' >> "$report"
          if [ "$failed" -eq 0 ]; then
            printf '**PASS — every finance closure gate passed, including card/refund, COD, governed settlement and payout Docker journeys.**\n' >> "$report"
          else
            printf '**FAIL — one or more finance closure gates failed; see exact evidence above.**\n' >> "$report"
          fi
          perl -0pi -e 's/\n+\z/\n/' "$report"
          mkdir -p governance/evidence
          cp "$report" governance/evidence/FINANCE_FINAL_REMOTE_VALIDATION.md
          echo "failed=$failed" >> "$GITHUB_OUTPUT"

      - name: Commit current closure result and remove executor
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/finance-closure-executor-v2.yml
          git config user.name bthwani-finance-closure-bot
          git config user.email finance-closure-bot@users.noreply.github.com
          git add -A
          git commit -m "test(finance): execute comprehensive remote closure proof" || true
          git fetch origin bassam
          git rebase origin/bassam
          git push origin HEAD:bassam

      - name: Fail workflow if any gate failed
        if: steps.gates.outputs.failed == '1'
        run: exit 1
