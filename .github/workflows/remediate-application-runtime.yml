name: Temporary final TypeScript remediation

on:
  push:
    branches: [lianbassam]
    paths:
      - .github/workflows/remediate-application-runtime.yml

permissions:
  contents: write
  statuses: write

concurrency:
  group: temporary-final-typescript-remediation
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout current branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: lianbassam
          fetch-depth: 0
          persist-credentials: true

      - name: Apply remaining targeted corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          catalog = Path("services/dsh/frontend/control-panel/catalogs/CatalogDashboardScreen.tsx")
          text = catalog.read_text(encoding="utf-8")
          old = "}) || group.subTabs[0];\n      setActiveTab(firstTab);"
          new = "}) ?? group.subTabs[0];\n      if (firstTab) setActiveTab(firstTab);"
          if old not in text:
              raise SystemExit("catalog tab fallback fragment not found")
          catalog.write_text(text.replace(old, new, 1), encoding="utf-8")

          policy = Path("services/dsh/frontend/control-panel/platform/Jrn029OperationalPolicySection.tsx")
          text = policy.read_text(encoding="utf-8")
          old = "        serviceAreaCode: selectedZone?.cityCode,"
          new = "        ...(selectedZone?.cityCode ? { serviceAreaCode: selectedZone.cityCode } : {}),"
          if old not in text:
              raise SystemExit("operational policy optional field fragment not found")
          policy.write_text(text.replace(old, new, 1), encoding="utf-8")

          phase = Path("tools/scripts/invoke-runtime-phase.ps1")
          text = phase.read_text(encoding="utf-8")
          old = '''  $subject = if ($message -match "([A-Za-z][A-Za-z0-9_-]+(?: API| migration| smoke| health| readiness| bootstrap| start)?)") {
            $Matches[1]
          } else {
            "phase-failed"
          }'''
          new = '''  $subject = ConvertTo-StatusText -Value $message -Limit 72'''
          if old in text:
              phase.write_text(text.replace(old, new, 1), encoding="utf-8")

          Path(".github/workflows/remediate-application-runtime.yml").unlink()
          PY

      - name: Set up locked workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Run concise DSH typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pnpm --dir services/dsh typecheck > /tmp/dsh-typecheck.log 2>&1
          code=$?
          grep -E 'error TS[0-9]+' /tmp/dsh-typecheck.log | head -n 30 || true
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Commit corrections
        if: always()
        shell: bash
        run: |
          git config user.name "bthwani-runtime-remediator"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(dsh): close remaining application type contracts"
          git push origin HEAD:lianbassam

      - name: Publish concise diagnostic status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          head_sha="$(git rev-parse HEAD)"
          state=success
          context="bthwani/remediation/dsh-typecheck-passed"
          description="DSH typecheck passed"
          if [[ "${{ steps.typecheck.outputs.exit_code }}" != "0" ]]; then
            state=failure
            first_error="$(grep -E 'error TS[0-9]+' /tmp/dsh-typecheck.log | head -n 1 | sed -E 's/[[:space:]]+/ /g')"
            slug="$(printf '%s' "$first_error" | sed -E 's/[^A-Za-z0-9_.@:-]+/-/g' | cut -c1-65)"
            context="bthwani/remediation/${slug:-dsh-typecheck-failed}"
            description="$(printf '%s' "${first_error:-DSH typecheck failed}" | cut -c1-135)"
          fi
          jq -n --arg state "$state" --arg context "$context" --arg description "$description" --arg target_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GH_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28" "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$head_sha" --data-binary @/tmp/status.json
