name: JRN-030 Invariant Diagnostic

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    types: [synchronize]

permissions:
  contents: read

concurrency:
  group: jrn-030-node-${{ github.sha }}
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
      - name: Capture invariant result
        id: invariants
        shell: bash
        run: |
          set +e
          node --test services/dsh/tests/jrn-030-partner-fleet.test.mjs > /tmp/jrn030-node.log 2>&1
          status=$?
          cat /tmp/jrn030-node.log
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0
      - name: Upload invariant diagnostic
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jrn-030-node-${{ github.sha }}
          path: /tmp/jrn030-node.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail on invariant errors
        if: steps.invariants.outputs.status != '0'
        run: exit 1
