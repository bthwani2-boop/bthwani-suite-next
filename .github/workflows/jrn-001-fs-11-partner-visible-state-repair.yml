name: JRN-001 FS-11 partner visible-state repair

on:
  push:
    branches: [sambassam]
    paths:
      - .github/workflows/jrn-001-fs-11-partner-visible-state-repair.yml

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Add explicit self-status boundaries
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("services/dsh/frontend/app-partner/account/PartnerHubScreen.tsx")
          text = path.read_text()
          old = '''  if (selfStatusState.kind !== "success") {
    return (
      <StateView
        tone="danger"
        title="حالة شريك غير قابلة للعرض"
        description="لم يعد DSH حالة نجاح أو خطأ صريحة."
      />
    );
  }
'''
          new = '''  if (selfStatusState.kind === "not_found") {
    return (
      <StateView
        tone="warning"
        title="ملف الشريك غير موجود"
        description="الجلسة الحالية غير مرتبطة بملف شريك صالح في DSH."
        actionLabel="إعادة التحقق"
        onActionPress={reloadSelfStatus}
      />
    );
  }

  if (selfStatusState.kind === "forbidden") {
    return (
      <StateView
        tone="danger"
        title="غير مصرح بعرض ملف الشريك"
        description="تحقق من هوية الشريك ونطاق المتجر المرتبط بهذه الجلسة."
        actionLabel="إعادة التحقق"
        onActionPress={reloadSelfStatus}
      />
    );
  }

  if (selfStatusState.kind !== "success") {
    return (
      <StateView
        tone="danger"
        title="حالة شريك غير قابلة للعرض"
        description="لم يعد DSH حالة صريحة قابلة للعرض."
        actionLabel="إعادة التحقق"
        onActionPress={reloadSelfStatus}
      />
    );
  }
'''
          if old not in text:
              raise SystemExit("PartnerHub generic status block not found")
          text = text.replace(old, new, 1)
          for marker in [
              'selfStatusState.kind === "not_found"',
              'selfStatusState.kind === "forbidden"',
              'ملف الشريك غير موجود',
              'غير مصرح بعرض ملف الشريك',
              'onActionPress={reloadSelfStatus}',
          ]:
              if marker not in text:
                  raise SystemExit(f"missing marker: {marker}")
          path.write_text(text)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add services/dsh/frontend/app-partner/account/PartnerHubScreen.tsx
          git diff --cached --quiet && { echo "No PartnerHub diff"; exit 1; }
          git commit -m "fix(jrn-001-fs-11): expose partner not-found and forbidden states"
          for attempt in 1 2 3 4 5; do
            git fetch origin sambassam
            if git rebase origin/sambassam && git push origin HEAD:sambassam; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            sleep 2
          done
          exit 1
      - name: Publish status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          [ "$RESULT" = success ] && STATE=success || STATE=failure
          jq -n --arg state "$STATE" --arg context "journeys/jrn-001/fs-11-repair-partner-visible-state" --arg description "Partner not-found and forbidden visible-state repair" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
