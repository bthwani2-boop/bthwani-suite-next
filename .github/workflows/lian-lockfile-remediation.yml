name: Generate Lockfile Remediation Commit Inputs

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-lockfile-remediation.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: lian-lockfile-remediation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Publish run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          jq -n --arg state pending --arg context bthwani/lian-lockfile-remediation --arg description "pnpm lockfile remediation is running" --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --retry 3 -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28" "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" --data-binary @/tmp/status.json

      - name: Checkout branch history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup PNPM
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.34.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"

      - name: Synchronize latest branch head
        run: |
          set -euo pipefail
          git fetch origin lianbassam
          git reset --hard origin/lianbassam
          git clean -fd

      - name: Regenerate and verify frozen lockfile
        id: lockfile
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          : >/tmp/lockfile-remediation.log
          pnpm install --lockfile-only --no-frozen-lockfile --reporter=append-only 2>&1 | tee -a /tmp/lockfile-remediation.log
          regenerate_rc=${PIPESTATUS[0]}
          {
            echo "regenerate_exit=${regenerate_rc}"
            echo "--- pnpm-lock diff ---"
            git diff -- pnpm-lock.yaml
            echo "--- shared/data-runtime importer ---"
            python3 - <<'PY'
          from pathlib import Path
          text = Path('pnpm-lock.yaml').read_text(encoding='utf-8')
          start = text.index('  shared/data-runtime:\n')
          end = text.index('\n  shared/ui-kit:', start)
          block = text[start:end]
          print(block)
          if "'@react-native-async-storage/async-storage':" not in block:
              raise SystemExit('async-storage importer entry is missing')
          PY
          } 2>&1 | tee -a /tmp/lockfile-remediation.log
          importer_rc=${PIPESTATUS[0]}
          git diff --check -- pnpm-lock.yaml 2>&1 | tee -a /tmp/lockfile-remediation.log
          diff_rc=${PIPESTATUS[0]}
          pnpm install --lockfile-only --frozen-lockfile --reporter=append-only 2>&1 | tee -a /tmp/lockfile-remediation.log
          frozen_rc=${PIPESTATUS[0]}
          echo "importer_exit=${importer_rc} diff_exit=${diff_rc} frozen_exit=${frozen_rc}" | tee -a /tmp/lockfile-remediation.log
          if [[ ${regenerate_rc} -ne 0 || ${importer_rc} -ne 0 || ${diff_rc} -ne 0 || ${frozen_rc} -ne 0 ]]; then
            exit 1
          fi

      - name: Upload lockfile generation diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lian-lockfile-generation-${{ github.run_id }}
          path: |
            pnpm-lock.yaml
            /tmp/lockfile-remediation.log
          if-no-files-found: warn
          retention-days: 2

      - name: Fail closed on lockfile generation error
        if: ${{ steps.lockfile.outcome == 'failure' }}
        shell: bash
        run: |
          tail -n 200 /tmp/lockfile-remediation.log
          exit 1

      - name: Advance full verification trigger
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path('governance/github/lianbassam-full-verification.trigger.json')
          doc = json.loads(path.read_text(encoding='utf-8'))
          doc['attempt'] = 13
          doc['previousRunId'] = 29982429604
          remediation = doc.setdefault('remediation', [])
          marker = 'SYNC_SHARED_DATA_RUNTIME_LOCKFILE'
          if marker not in remediation:
              remediation.append(marker)
          path.write_text(json.dumps(doc, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY

      - name: Create immutable blobs and manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          create_blob() {
            local file="$1" payload response
            payload="$(base64 -w0 "${file}")"
            jq -n --arg content "${payload}" '{content:$content,encoding:"base64"}' >/tmp/blob-request.json
            response="$(curl --fail-with-body --retry 3 -sS -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28" "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/blobs" --data-binary @/tmp/blob-request.json)"
            jq -er '.sha' <<<"${response}"
          }
          parent_sha="$(git rev-parse HEAD)"
          base_tree="$(git rev-parse 'HEAD^{tree}')"
          lock_blob="$(create_blob pnpm-lock.yaml)"
          trigger_blob="$(create_blob governance/github/lianbassam-full-verification.trigger.json)"
          jq -n --arg parent_sha "${parent_sha}" --arg base_tree "${base_tree}" --arg lock_blob "${lock_blob}" --arg trigger_blob "${trigger_blob}" '{parent_sha:$parent_sha,base_tree:$base_tree,lock_blob:$lock_blob,trigger_blob:$trigger_blob}' >/tmp/lockfile-remediation-manifest.json
          cat /tmp/lockfile-remediation-manifest.json

      - name: Upload lockfile remediation evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lian-lockfile-remediation-${{ github.run_id }}
          path: |
            pnpm-lock.yaml
            governance/github/lianbassam-full-verification.trigger.json
            /tmp/lockfile-remediation-manifest.json
          if-no-files-found: error
          retention-days: 2

      - name: Publish generation success
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jq -n --arg state success --arg context bthwani/lian-lockfile-remediation --arg description "lockfile regenerated and frozen verification passed" --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --retry 3 -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28" "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" --data-binary @/tmp/status.json
