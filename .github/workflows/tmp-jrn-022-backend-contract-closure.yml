name: Temporary JRN-022 Backend Contract Closure

# Armed on the review branch; successful execution removes this workflow.
on:
  pull_request:
    branches: [sambassam]
    paths:
      - "tools/scripts/close-jrn-022-backend-contract-slices.py"
      - ".github/workflows/tmp-jrn-022-backend-contract-closure.yml"
      - "services/dsh/backend/internal/http/subscription_lifecycle_governed.go"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tmp-jrn-022-backend-contract-closure-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  close:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout closure branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply atomic backend and contract closure
        run: |
          python3 tools/scripts/close-jrn-022-backend-contract-slices.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path("services/dsh/backend/internal/http/subscription_lifecycle_governed.go")
          content = path.read_text(encoding="utf-8")
          old = "\treturn plan, product, nil\n"
          if content.count(old) != 1:
              raise SystemExit("subscription plan pointer anchor is missing or duplicated")
          path.write_text(content.replace(old, "\treturn &plan, product, nil\n", 1), encoding="utf-8")
          PY

      - name: Format and verify backend
        id: backend_verify
        shell: bash
        run: |
          set -o pipefail
          {
            gofmt -w services/dsh/backend/internal/specialrequests services/dsh/backend/internal/http services/dsh/backend/internal/dispatch
            cd services/dsh/backend
            go test ./internal/specialrequests ./internal/http ./internal/dispatch -run 'Test(JRN022SpecialRequestRoutes|CanonicalSpecialRequestStagesAreKnownToService|DefaultWorkflowStageMatchesCustomerAndDeliveryReadback|InformationExchangeValidationAndCanonicalStage)$' -count=1
            go build ./internal/http ./internal/dispatch ./internal/specialrequests
          } 2>&1 | tee "$RUNNER_TEMP/jrn-022-backend.log"

      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jrn-022-backend-diagnostics
          path: ${{ runner.temp }}/jrn-022-backend.log
          if-no-files-found: error

      - name: Regenerate and verify modular OpenAPI
        id: contract_verify
        shell: bash
        run: |
          set -o pipefail
          {
            pnpm --dir services/dsh openapi:generate
            pnpm --dir services/dsh openapi:test
            git diff --check
          } 2>&1 | tee "$RUNNER_TEMP/jrn-022-openapi.log"

      - name: Upload OpenAPI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jrn-022-openapi-diagnostics
          path: ${{ runner.temp }}/jrn-022-openapi.log
          if-no-files-found: error

      - name: Commit verified closure to PR branch
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "bthwani-journey-closure"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(jrn-022): close information evidence and exception backend slices [skip ci]"
          git pull --rebase origin "$HEAD_REF"
          git push origin "HEAD:$HEAD_REF"
