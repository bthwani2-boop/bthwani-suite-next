name: Temporary Contract Correctness Remediation

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-contract-correctness-remediation.yml"
      - "tools/scripts/tmp-contract-correctness-remediation.py"
      - "tools/scripts/tmp-contract-parser-fs-fix.py"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/tmp-contract-correctness-remediation.yml"
      - "tools/scripts/tmp-contract-correctness-remediation.py"
      - "tools/scripts/tmp-contract-parser-fs-fix.py"

permissions:
  contents: read

concurrency:
  group: temporary-contract-correctness-remediation
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout latest sambassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: false
      - name: Apply safe contract corrections in diagnostic workspace
        run: |
          python tools/scripts/tmp-contract-correctness-remediation.py
          python tools/scripts/tmp-contract-parser-fs-fix.py
      - name: Capture parser verification
        shell: bash
        run: |
          set +e
          mkdir -p contract-correctness-diagnostic
          node tools/guards/_openapi-utils.test.mjs > contract-correctness-diagnostic/parser-test.log 2>&1
          printf '\nexit=%s\n' "$?" >> contract-correctness-diagnostic/parser-test.log
          cp tools/guards/_openapi-utils.mjs contract-correctness-diagnostic/openapi-utils.mjs
          cp tools/guards/_openapi-utils.test.mjs contract-correctness-diagnostic/openapi-utils.test.mjs
          cp services/dsh/contracts/dsh.jrn-010-checkout.openapi.yaml contract-correctness-diagnostic/dsh.jrn-010-checkout.openapi.yaml
          cp services/wlt/contracts/jrn-036-settlements-commissions.openapi.yaml contract-correctness-diagnostic/jrn-036-settlements-commissions.openapi.yaml
          exit 0
      - name: Upload transformed diagnostic
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: contract-correctness-diagnostic
          path: contract-correctness-diagnostic
          if-no-files-found: error
          retention-days: 1