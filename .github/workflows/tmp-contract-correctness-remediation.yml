name: Temporary Contract Correctness Remediation

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-contract-correctness-remediation.yml"
      - "tools/scripts/tmp-contract-correctness-remediation.py"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/tmp-contract-correctness-remediation.yml"
      - "tools/scripts/tmp-contract-correctness-remediation.py"

permissions:
  contents: write

concurrency:
  group: temporary-contract-correctness-remediation
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout latest sambassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: true
      - name: Apply safe contract corrections
        run: python tools/scripts/tmp-contract-correctness-remediation.py
      - name: Verify parser repair
        run: node tools/guards/_openapi-utils.test.mjs
      - name: Commit repaired contracts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bthwani-governance-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tools/guards/_openapi-utils.mjs tools/guards/_openapi-utils.test.mjs services/dsh/contracts/dsh.jrn-010-checkout.openapi.yaml services/wlt/contracts/jrn-036-settlements-commissions.openapi.yaml
          if git diff --cached --quiet; then
            echo "No correctness changes required."
            exit 0
          fi
          git commit -m "fix(contracts): resolve modular parameters and financial gates"
          for attempt in 1 2 3; do
            if git push origin HEAD:sambassam; then exit 0; fi
            git pull --rebase origin sambassam
          done
          exit 1