name: JRN 020-025 boundary diagnostic
# Rerun after routing captain PoD exception actions through the shared dispatch facade.

on:
  push:
    branches: [sambassam]
    paths:
      - .github/workflows/jrn-020-025-boundary-diagnostic.yml

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Run and expose first boundary violation
        id: guard
        shell: bash
        run: |
          set +e
          node tools/guards/fullstack-boundary-gate.mjs 2>&1 | tee /tmp/fullstack-boundary.log
          EXIT_CODE=${PIPESTATUS[0]}
          FIRST_VIOLATION="$(grep -m1 -E '^- ' /tmp/fullstack-boundary.log || true)"
          [ -n "$FIRST_VIOLATION" ] || FIRST_VIOLATION="fullstack boundary failed without a violation line"
          CONTEXT_PART="$(printf '%s' "$FIRST_VIOLATION" | sed -E 's/^- //; s/[^[:alnum:]_.:\/-]+/-/g' | cut -c1-70)"
          printf 'first=%s\n' "$(printf '%s' "$FIRST_VIOLATION" | cut -c1-120)" >> "$GITHUB_OUTPUT"
          printf 'context_part=%s\n' "$CONTEXT_PART" >> "$GITHUB_OUTPUT"
          exit "$EXIT_CODE"
      - name: Publish diagnostic status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GUARD_OUTCOME: ${{ steps.guard.outcome }}
          FIRST_VIOLATION: ${{ steps.guard.outputs.first }}
          CONTEXT_PART: ${{ steps.guard.outputs.context_part }}
        shell: bash
        run: |
          if [ "$GUARD_OUTCOME" = "success" ]; then
            STATE=success
            DESCRIPTION="fullstack boundary passed"
            CONTEXT="journeys/jrn-020-025-boundary-diagnostic"
          else
            STATE=failure
            DESCRIPTION="${FIRST_VIOLATION:-fullstack boundary failed}"
            CONTEXT="journeys/jrn-020-025-boundary/${CONTEXT_PART:-unknown-violation}"
          fi
          CONTEXT="$(printf '%s' "$CONTEXT" | cut -c1-100)"
          PAYLOAD="$(jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d "$PAYLOAD"
