name: Governance As Code Audit

on:
  push:
    branches: [implementing, main]
    paths:
      - "governance/**"
      - ".github/workflows/**"
      - "tools/guards/*-gate.mjs"
      - "tools/guards/governance-schema-gate.mjs"
      - "tools/guards/agent-governance-gate.mjs"
      - "tools/guards/guard-registry-gate.mjs"
  pull_request:
    branches: [implementing, main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  governance-audit:
    name: Governance Compliance Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for gitleaks history checks

      # ── 1. Setup Node & Run Custom Schema / Coherence Gates ────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install non-npm toolchain binaries
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck yamllint
          
          # Hadolint
          sudo wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
          
          # OSV-Scanner, pinact, actionlint
          go install github.com/google/osv-scanner/cmd/osv-scanner@v1.9.0
          go install github.com/suzuki-shunsuke/pinact/cmd/pinact@v0.1.2
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
          
          # Regal
          curl -L -o regal https://github.com/StyraInc/regal/releases/download/v0.25.0/regal_Linux_x86_64
          chmod +x regal
          sudo mv regal /usr/local/bin/
          
          # Zizmor
          pip install zizmor
          
          # Conftest
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz
          tar -zxvf conftest_0.55.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          
          # Gitleaks
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.23.0/gitleaks_8.23.0_linux_x64.tar.gz
          tar -zxvf gitleaks_8.23.0_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Guard — Tool catalog coverage (FAIL)
        run: pnpm run guard:tool-catalog-coverage

      - name: Guard — Toolchain activation (FAIL)
        run: pnpm run guard:toolchain-activation

      - name: Guard — OSS toolchain policy (FAIL)
        run: pnpm run guard:oss-toolchain-policy

      - name: Guard — Governance registry schema validation (Ajv)
        run: pnpm run guard:governance-schema

      - name: Guard — Agent and skills consistency
        run: pnpm run guard:agent-governance

      - name: Guard — Guard registry alignment
        run: pnpm run guard:guard-registry

      # ── 2. GitHub Actions Workflows Static Analysis ────────────────────────
      - name: actionlint (FAIL on invalid Actions syntax)
        uses: reviewdog/action-actionlint@v1
        with:
          fail_on_error: true

      - name: zizmor (FAIL on Actions security vulnerabilities)
        uses: woodruffw/zizmor-action@v1
        with:
          scan-ref: ".github/workflows"

      # ── 3. OPA/Conftest Validation (FAIL on policy violations) ─────────────
      - name: Conftest — Validate Agent Registry
        uses: open-policy-agent/conftest-action@v1
        with:
          policy: governance/policies
          file: governance/agents/agent-registry.json

      - name: Conftest — Validate Skills Registry
        uses: open-policy-agent/conftest-action@v1
        with:
          policy: governance/policies
          file: governance/skills/skills-registry.json

      - name: Conftest — Validate Guard Registry
        uses: open-policy-agent/conftest-action@v1
        with:
          policy: governance/policies
          file: governance/guards/guard-registry.json

      - name: Guard — Rego policy lint (FAIL)
        run: pnpm run guard:rego-lint

      - name: Guard — Actions version pinning check
        run: pnpm run guard:actions-pin

      - name: Guard — Shell scripts lint check
        run: pnpm run guard:shellcheck

      - name: Guard — Dockerfile security lint check
        run: pnpm run guard:hadolint

      - name: Guard — YAML formatting structure check
        run: pnpm run guard:yaml-lint

      - name: Guard — Repository naming structure (ls-lint)
        run: pnpm run guard:ls-lint

      - name: Guard — Markdown governance formatting (WARN)
        run: pnpm run guard:markdown-governance

      # ── 4. Gitleaks Secrets Scanning ────────────────────────────────────────
      - name: Gitleaks scan
        run: gitleaks detect --source . --no-banner --redact --verbose
        continue-on-error: true
