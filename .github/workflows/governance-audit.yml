name: BThwani Governance Audit

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/CODEOWNERS"
  pull_request:
    branches: [sambassam, master]
    paths:
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/CODEOWNERS"

permissions:
  contents: read

concurrency:
  group: governance-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Verify governed repository contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify governance schemas
        run: pnpm run guard:governance-schema
      - name: Verify agent governance
        run: pnpm run guard:agent-governance
      - name: Verify authority separation
        run: pnpm run guard:authority-separation
      - name: Verify SaaS governance boundary
        run: pnpm run guard:saas-governance
      - name: Verify guard registry and CI policy
        run: pnpm run guard:guard-registry
      - name: Verify SDLC contracts
        run: pnpm run guard:sdlc
      - name: Verify cleanup policy
        run: pnpm run guard:cleanup-policy

  workflow-policy:
    name: Verify workflow policy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify workflow syntax
        run: pnpm run guard:workflow-lint
      - name: Verify workflow security
        run: pnpm run guard:workflow-security
      - name: Verify immutable action pins
        run: pnpm run guard:actions-pin

  result:
    name: Governance audit result
    needs: [governance, workflow-policy]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Enforce governance audit result
        env:
          GOVERNANCE_RESULT: ${{ needs.governance.result }}
          WORKFLOW_POLICY_RESULT: ${{ needs.workflow-policy.result }}
        run: |
          if [ "${GOVERNANCE_RESULT}" != "success" ] || [ "${WORKFLOW_POLICY_RESULT}" != "success" ]; then
            echo "Governance audit failed. Governance: ${GOVERNANCE_RESULT}; workflow policy: ${WORKFLOW_POLICY_RESULT}"
            exit 1
          fi
          echo "Governance audit passed."
