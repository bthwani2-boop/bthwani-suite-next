name: BThwani Governance Audit

on:
  workflow_dispatch:
  push:
    branches: [sambassam, bassam]
    paths:
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - "governance/**"
      - "tools/guards/**"
      - "package.json"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/CODEOWNERS"
  pull_request:
    branches: [master]
    paths:
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - "governance/**"
      - "tools/guards/**"
      - "package.json"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/CODEOWNERS"

permissions:
  contents: read

concurrency:
  group: governance-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Governance contracts and authority separation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify governance contracts
        run: |
          pnpm run guard:governance-schema
          pnpm run guard:agent-governance
          pnpm run guard:authority-separation
          pnpm run guard:saas-governance
          pnpm run guard:guard-registry
          pnpm run guard:sdlc
          pnpm run guard:cleanup-policy
      - name: Verify workflow governance
        run: |
          pnpm run guard:workflow-lint
          pnpm run guard:workflow-security
          pnpm run guard:actions-pin
      - name: Verify repository whitespace
        run: git diff --check

  result:
    name: BThwani Governance Audit result
    needs: [verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce governance result
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: test "${VERIFY_RESULT}" = "success"
