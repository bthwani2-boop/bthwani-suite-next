name: Governance As Code Audit

on:
  push:
    branches:
      - bassam
      - master
    paths:
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/run-*.mjs"
      - "tools/scripts/install-oss-toolchain-binaries.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"
  pull_request:
    branches:
      - master
    paths:
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/run-*.mjs"
      - "tools/scripts/install-oss-toolchain-binaries.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: governance-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance-contracts:
    name: Governance contracts and semantics
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Governance schema and semantic gate
        run: pnpm run guard:governance-schema
      - name: Agent and skill governance gate
        run: pnpm run guard:agent-governance
      - name: Guard registry and workflow policy gate
        run: pnpm run guard:guard-registry
      - name: SDLC support and Product Truth gate
        run: pnpm run guard:sdlc

  workflow-static-analysis:
    name: Workflow syntax security and policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install governance toolchain
        run: bash tools/scripts/install-oss-toolchain-binaries.sh governance
      - name: Actionlint
        run: pnpm run guard:workflow-lint
      - name: Zizmor workflow security
        run: pnpm run guard:workflow-security
      - name: OPA policy validation
        run: pnpm run guard:opa-policies
      - name: Tool catalog coverage
        run: pnpm run guard:tool-catalog-coverage
      - name: Toolchain activation
        run: pnpm run guard:toolchain-activation
      - name: OSS toolchain policy
        run: pnpm run guard:oss-toolchain-policy

  repository-hygiene:
    name: Governance repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Repository size gate
        run: pnpm run guard:repo-size
      - name: Cleanup policy gate
        run: pnpm run guard:cleanup-policy
      - name: No tracked diagnostics or execution logs
        shell: bash
        run: |
          set -euo pipefail
          forbidden="$(git ls-files '.diagnostics/**' 'tools/registry/runs/**')"
          if [ -n "$forbidden" ]; then
            printf 'Tracked transient outputs are forbidden:\n%s\n' "$forbidden"
            exit 1
          fi

  governance-result:
    name: Governance audit result
    if: always()
    needs:
      - governance-contracts
      - workflow-static-analysis
      - repository-hygiene
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require every governance job to pass
        env:
          CONTRACTS_RESULT: ${{ needs.governance-contracts.result }}
          WORKFLOW_RESULT: ${{ needs.workflow-static-analysis.result }}
          HYGIENE_RESULT: ${{ needs.repository-hygiene.result }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'governance-contracts=%s\n' "$CONTRACTS_RESULT"
          printf 'workflow-static-analysis=%s\n' "$WORKFLOW_RESULT"
          printf 'repository-hygiene=%s\n' "$HYGIENE_RESULT"
          test "$CONTRACTS_RESULT" = success
          test "$WORKFLOW_RESULT" = success
          test "$HYGIENE_RESULT" = success
