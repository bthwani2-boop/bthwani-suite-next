name: Governance As Code Audit

on:
  push:
    branches: [bassam, master]
    paths:
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/run-*.mjs"
      - "tools/scripts/run-*.ps1"
      - "tools/scripts/install-oss-toolchain-binaries.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/CODEOWNERS"
  pull_request:
    branches: [master]
    paths:
      - "AGENTS.md"
      - "GEMINI.md"
      - ".agents/**"
      - "governance/**"
      - "tools/guards/**"
      - "tools/scripts/run-*.mjs"
      - "tools/scripts/run-*.ps1"
      - "tools/scripts/install-oss-toolchain-binaries.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/actions/**"
      - ".github/workflows/**"
      - ".github/CODEOWNERS"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: governance-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance-contracts:
    name: Governance contracts authorities SaaS and semantics
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Validate all governance contracts
        shell: bash
        run: |
          set +e
          failures=0
          run_check() {
            local name="$1"
            shift
            echo "::group::$name"
            "$@"
            local result=$?
            echo "::endgroup::"
            if [ "$result" -ne 0 ]; then
              echo "::error title=$name failed::exit=$result"
              failures=$((failures + 1))
            fi
          }
          run_check governance-schema pnpm run guard:governance-schema
          run_check agent-governance pnpm run guard:agent-governance
          run_check authority-separation pnpm run guard:authority-separation
          run_check saas-governance pnpm run guard:saas-governance
          run_check guard-registry pnpm run guard:guard-registry
          run_check sdlc pnpm run guard:sdlc
          run_check cleanup-policy pnpm run guard:cleanup-policy
          test "$failures" -eq 0

  workflow-static-analysis:
    name: Workflow syntax security and policy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Install locked governance toolchain
        run: bash tools/scripts/install-oss-toolchain-binaries.sh governance
      - name: Run every workflow and policy analyzer
        shell: bash
        run: |
          set +e
          failures=0
          run_check() {
            local name="$1"
            shift
            echo "::group::$name"
            "$@"
            local result=$?
            echo "::endgroup::"
            if [ "$result" -ne 0 ]; then
              echo "::error title=$name failed::exit=$result"
              failures=$((failures + 1))
            fi
          }
          run_check actionlint pnpm run guard:workflow-lint
          run_check zizmor pnpm run guard:workflow-security
          run_check pinact pnpm run guard:actions-pin
          run_check opa-policy pnpm run guard:opa-policies
          run_check tool-catalog pnpm run guard:tool-catalog-coverage
          run_check toolchain-activation pnpm run guard:toolchain-activation
          run_check oss-toolchain-policy pnpm run guard:oss-toolchain-policy
          test "$failures" -eq 0

  repository-hygiene:
    name: Governance repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify repository hygiene
        shell: bash
        run: |
          set +e
          failures=0
          pnpm run guard:repo-size || failures=$((failures + 1))
          pnpm run guard:cleanup-policy || failures=$((failures + 1))
          forbidden="$(git ls-files '.diagnostics/**' 'tools/registry/runs/**')"
          if [ -n "$forbidden" ]; then
            printf 'Tracked transient outputs are forbidden:\n%s\n' "$forbidden"
            failures=$((failures + 1))
          fi
          test "$failures" -eq 0

  governance-result:
    name: Governance audit result
    if: always()
    needs: [governance-contracts, workflow-static-analysis, repository-hygiene]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require every governance job to pass
        env:
          CONTRACTS_RESULT: ${{ needs.governance-contracts.result }}
          WORKFLOW_RESULT: ${{ needs.workflow-static-analysis.result }}
          HYGIENE_RESULT: ${{ needs.repository-hygiene.result }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'governance-contracts=%s\nworkflow-static-analysis=%s\nrepository-hygiene=%s\n' \
            "$CONTRACTS_RESULT" "$WORKFLOW_RESULT" "$HYGIENE_RESULT"
          test "$CONTRACTS_RESULT" = success
          test "$WORKFLOW_RESULT" = success
          test "$HYGIENE_RESULT" = success
