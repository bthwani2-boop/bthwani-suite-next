name: Temporary WLT Diagnostic

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-wlt-diagnostic.yml"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/tmp-wlt-diagnostic.yml"

permissions:
  contents: read

concurrency:
  group: temporary-wlt-diagnostic-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  diagnose:
    name: Capture WLT test and build output
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Go from WLT module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache-dependency-path: services/wlt/backend/go.sum
      - name: Capture WLT diagnostics
        shell: bash
        working-directory: services/wlt/backend
        run: |
          set +e
          go test ./... -count=1 > "${GITHUB_WORKSPACE}/wlt-diagnostic.log" 2>&1
          test_exit=$?
          go build ./... >> "${GITHUB_WORKSPACE}/wlt-diagnostic.log" 2>&1
          build_exit=$?
          {
            echo
            echo "go_test_exit=${test_exit}"
            echo "go_build_exit=${build_exit}"
          } >> "${GITHUB_WORKSPACE}/wlt-diagnostic.log"
          exit 0
      - name: Upload WLT diagnostic
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wlt-diagnostic
          path: wlt-diagnostic.log
          if-no-files-found: error
          retention-days: 1
