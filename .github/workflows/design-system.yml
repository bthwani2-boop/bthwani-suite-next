name: Design System Governance

on:
  push:
    branches: [bassam, master, "fix/lian-sovereign-final-closure"]
    paths:
      - "shared/ui-kit/**"
      - "apps/**/src/**"
      - "services/**/frontend/**"
      - "tools/guards/design-tokens-gate.mjs"
      - "tools/guards/ui-provider-required-gate.mjs"
      - "tools/guards/icon-contract-gate.mjs"
      - "tools/guards/brand-identity-report.mjs"
      - "tools/guards/ui-kit-boundary-gate.mjs"
      - ".github/workflows/design-system.yml"
  pull_request:
    branches: [master]
    paths:
      - "shared/ui-kit/**"
      - "apps/**/src/**"
      - "services/**/frontend/**"
      - "tools/guards/design-tokens-gate.mjs"
      - "tools/guards/ui-provider-required-gate.mjs"
      - "tools/guards/icon-contract-gate.mjs"
      - "tools/guards/brand-identity-report.mjs"
      - "tools/guards/ui-kit-boundary-gate.mjs"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  statuses: write

concurrency:
  group: design-system-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-kit-governance:
    name: UI Kit governance and report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Require UI provider
        run: pnpm run guard:ui-provider
      - name: Require icon contract
        run: pnpm run guard:icon-contract
      - name: Evaluate UI kit boundary
        id: ui_boundary
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pnpm run guard:ui-kit-boundary 2>&1 | tee /tmp/ui-kit-boundary.log
          code=${PIPESTATUS[0]}
          detail="$(grep -E '^- ' /tmp/ui-kit-boundary.log | head -n1)"
          [ -n "$detail" ] || detail="$(tail -n1 /tmp/ui-kit-boundary.log)"
          detail="$(printf '%s' "$detail" | tr '\n\r/' '   ' | sed -E 's/[[:space:]]+/ /g' | cut -c1-135)"
          printf 'detail=%s\n' "$detail" >> "$GITHUB_OUTPUT"
          exit $code
      - name: Publish UI boundary status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          OUTCOME: ${{ steps.ui_boundary.outcome }}
          DETAIL: ${{ steps.ui_boundary.outputs.detail }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success
          [ "$OUTCOME" = success ] || state=failure
          description="${DETAIL:-ui-kit-boundary:$OUTCOME}"
          payload="$(jq -n --arg state "$state" --arg context 'Design System Governance / UI Kit Boundary' --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
            -d "$payload"
      - name: Enforce UI kit boundary
        if: steps.ui_boundary.outcome != 'success'
        shell: bash
        run: exit 1
      - name: Report design-token warnings
        run: pnpm run guard:design-tokens
        continue-on-error: true
      - name: Generate brand identity report
        if: always()
        run: pnpm run guard:brand-identity
      - name: Upload brand identity report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: brand-identity-report
          path: .diagnostics/tools/brand-identity-report.md
          if-no-files-found: error
          retention-days: 7
