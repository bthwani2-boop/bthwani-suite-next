name: Design System Governance

on:
  push:
    branches: [bassam, master]
    paths:
      - "shared/ui-kit/**"
      - "apps/**/src/**"
      - "services/**/frontend/**"
      - "tools/guards/design-tokens-gate.mjs"
      - "tools/guards/ui-provider-required-gate.mjs"
      - "tools/guards/icon-contract-gate.mjs"
      - "tools/guards/brand-identity-report.mjs"
      - "tools/guards/ui-kit-boundary-gate.mjs"
      - ".github/workflows/design-system.yml"
  pull_request:
    branches: [master]
    paths:
      - "shared/ui-kit/**"
      - "apps/**/src/**"
      - "services/**/frontend/**"
      - "tools/guards/design-tokens-gate.mjs"
      - "tools/guards/ui-provider-required-gate.mjs"
      - "tools/guards/icon-contract-gate.mjs"
      - "tools/guards/brand-identity-report.mjs"
      - "tools/guards/ui-kit-boundary-gate.mjs"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: design-system-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-kit-governance:
    name: UI Kit governance and report
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Require UI provider
        run: pnpm run guard:ui-provider
      - name: Require icon contract
        run: pnpm run guard:icon-contract
      - name: Require UI kit boundary
        run: pnpm run guard:ui-kit-boundary
      - name: Report design-token warnings
        run: pnpm run guard:design-tokens
        continue-on-error: true
      - name: Generate brand identity report
        if: always()
        run: pnpm run guard:brand-identity
      - name: Upload brand identity report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: brand-identity-report
          path: .diagnostics/tools/brand-identity-report.md
          if-no-files-found: error
          retention-days: 7
