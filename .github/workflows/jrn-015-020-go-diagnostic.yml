name: JRN 015-020 Go route diagnostic

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-015-020-go-diagnostic.yml]

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Run failing route test
        id: route_test
        continue-on-error: true
        working-directory: services/dsh/backend
        shell: bash
        run: |
          go test ./internal/http -run TestFirstFiveJourneysExposeGovernedDSHRoutes -count=1 -v 2>&1 | tee /tmp/route-test.log
          exit ${PIPESTATUS[0]}
      - name: Publish route assertion
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          ASSERTION="$(grep -m1 'expected route' /tmp/route-test.log 2>/dev/null || true)"
          TOKEN="$(printf '%s' "$ASSERTION" | tr '[:upper:]' '[:lower:]' | tr -cs '[:alnum:]_.-' '-' | sed 's/^-//;s/-$//' | cut -c1-72)"
          if [ "${{ steps.route_test.outcome }}" = "success" ]; then STATE=success; CONTEXT='journeys/jrn-015-020/route-diagnostic/pass'; else STATE=failure; CONTEXT="journeys/jrn-015-020/route-diagnostic/${TOKEN:-no-assertion}"; fi
          CONTEXT="$(printf '%s' "$CONTEXT" | cut -c1-100)"
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description 'Route diagnostic' --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
