name: JRN-031 Administration One-Shot macOS Verification

on:
  pull_request:
    paths:
      - "governance/evidence/.jrn-031-macos-verify-trigger"

permissions:
  contents: read

concurrency:
  group: jrn-031-macos-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: PostgreSQL Go frontend contract and governance
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Go from DSH module
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install and start isolated PostgreSQL 16
        shell: bash
        run: |
          brew install postgresql@16
          PG_BIN="$(brew --prefix postgresql@16)/bin"
          echo "$PG_BIN" >> "$GITHUB_PATH"
          echo "PG_BIN=$PG_BIN" >> "$GITHUB_ENV"
          echo "PGDATA=$RUNNER_TEMP/jrn031-pgdata" >> "$GITHUB_ENV"
          "$PG_BIN/initdb" -D "$RUNNER_TEMP/jrn031-pgdata" -A trust --no-locale
          "$PG_BIN/pg_ctl" -D "$RUNNER_TEMP/jrn031-pgdata" -o "-p 55431" -w start
          "$PG_BIN/createdb" -p 55431 jrn031

      - id: database
        name: Apply administration migrations and PostgreSQL invariants
        continue-on-error: true
        shell: bash
        env:
          DATABASE_URL: postgresql://localhost:55431/jrn031?sslmode=disable
        run: |
          "$PG_BIN/psql" "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-014_administration.sql
          "$PG_BIN/psql" "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-076_admin_role_assignment_approvals.sql
          "$PG_BIN/psql" "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-077_admin_role_permissions.sql
          "$PG_BIN/psql" "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-078_admin_role_definition_approvals.sql
          "$PG_BIN/psql" "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-079_admin_role_assignment_revocations.sql
          "$PG_BIN/psql" "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-131_jrn031_governed_administration_closure.sql
          "$PG_BIN/psql" "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/tests/jrn-031-administration-governance.sql

      - id: go_tests
        name: Run targeted Go tests
        continue-on-error: true
        working-directory: services/dsh/backend
        run: go test ./internal/administration ./internal/http -run 'Test(Journey031ExposesGovernedAdministrationRoutes|RequestStaffRoleAssignmentRejectsInvalidInput|RequestStaffRoleAssignmentRejectsSelfAssignment|ReviewStaffRoleAssignmentRejectsInvalidDecision|ReviewStaffRoleAssignmentRequiresVersion|RejectedRoleAssignmentRequiresReviewNote|NormalizeRoleDefinitionRequiresControlPanelAndNormalizesScope|AdministrationPermissionCandidatesPreserveLegacyFallback|InverseRoleAction|AuditRedactionDropsSensitiveValues)$' -count=1

      - id: go_build
        name: Build affected Go owners
        continue-on-error: true
        working-directory: services/dsh/backend
        run: go build ./internal/administration ./internal/http

      - id: governance
        name: Run JRN-031 governance guards
        continue-on-error: true
        run: node --test services/dsh/tests/jrn-031-administration-maker-checker.test.mjs services/dsh/tests/jrn-031-administration-governance.test.mjs

      - id: typecheck
        name: Typecheck the focused ownership graph
        continue-on-error: true
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-031.json --noEmit --pretty false

      - id: contract
        name: Parse the canonical administration contract
        continue-on-error: true
        run: pnpm --dir services/dsh exec openapi-typescript contracts/dsh.administration.openapi.yaml -o "$RUNNER_TEMP/jrn-031-administration-api.ts"

      - id: product_truth
        name: Validate JRN-031 product truth
        continue-on-error: true
        run: node -e "const fs=require('fs'); const p='governance/product/contracts/jrn-031-administration-roles-approvals-audit.product-truth.json'; const x=JSON.parse(fs.readFileSync(p,'utf8')); if(x.journeyId!=='JRN-031'||x.status!=='PENDING_INDEPENDENT_APPROVAL'||x.scopeBoundary!=='platform-control-plane') process.exit(1)"

      - name: Stop isolated PostgreSQL
        if: always()
        shell: bash
        run: |
          if [[ -n "${PG_BIN:-}" && -d "${PGDATA:-}" ]]; then
            "$PG_BIN/pg_ctl" -D "$PGDATA" -m fast -w stop || true
          fi

      - name: Require every JRN-031 full-stack gate
        if: always()
        shell: bash
        run: |
          [[ "${{ steps.database.outcome }}" == "success" ]]
          [[ "${{ steps.go_tests.outcome }}" == "success" ]]
          [[ "${{ steps.go_build.outcome }}" == "success" ]]
          [[ "${{ steps.governance.outcome }}" == "success" ]]
          [[ "${{ steps.typecheck.outcome }}" == "success" ]]
          [[ "${{ steps.contract.outcome }}" == "success" ]]
          [[ "${{ steps.product_truth.outcome }}" == "success" ]]
