name: Lian Route Inventory

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-route-inventory.yml"
      - "governance/github/lian-route-inventory.trigger.json"

permissions:
  contents: read
  statuses: write

jobs:
  inventory:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Publish run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          jq -n \
            --arg state pending \
            --arg context bthwani/lian-route-inventory \
            --arg description "route and migration inventory running" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json
      - name: Capture route and migration inventory
        shell: bash
        run: |
          set -euo pipefail
          log="${RUNNER_TEMP}/lian-route-inventory.log"
          {
            echo '===== TARGET ROUTES IN GO ====='
            grep -RInE 'notifications/preferences|operator/admin/support-sessions|operator/admin/support/snapshot|operator/analytics/operations|operator/catalog/stores/.*/images|partner/catalog/product-proposals|partner/catalog/proposals|field/partners/.*/catalog/product-proposals' services/dsh/backend/internal/http || true
            echo
            echo '===== TARGET ROUTES IN CONTRACTS ====='
            grep -RInE 'notifications/preferences|operator/admin/support-sessions|operator/admin/support/snapshot|operator/analytics/operations|operator/catalog/stores/.*/images|partner/catalog/product-proposals|partner/catalog/proposals|field/partners/.*/catalog/product-proposals' services/dsh/contracts || true
            echo
            echo '===== WLT MIGRATIONS ====='
            find services/wlt/database/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort
            echo
            echo '===== WLT PROBE KEYS ====='
            grep -oE '"wlt-[0-9]{3}_[a-z0-9_]+\.sql"' infra/docker/scripts/wlt-migration-probes.ps1 | tr -d '"' | sort
          } | tee "${log}"
      - name: Upload inventory
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lian-route-inventory-${{ github.run_id }}
          path: ${{ runner.temp }}/lian-route-inventory.log
          if-no-files-found: error
          retention-days: 2
      - name: Publish success status
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jq -n \
            --arg state success \
            --arg context bthwani/lian-route-inventory \
            --arg description "route and migration inventory captured" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json
