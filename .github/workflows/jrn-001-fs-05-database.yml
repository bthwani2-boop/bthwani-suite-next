name: JRN-001 FS-05 Database

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/database/migrations/**
      - services/wlt/database/migrations/**
      - services/dsh/backend/internal/partner/onboarding_integrity_db_test.go
      - services/wlt/backend/internal/payout/upsert_governed_db_test.go
      - services/wlt/backend/internal/payout/upsert_governed.go
      - .github/workflows/jrn-001-fs-05-database.yml

permissions:
  contents: read
  statuses: write

jobs:
  dsh-database:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dsh_jrn001
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dsh_jrn001"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dsh_jrn001?sslmode=disable
      DSH_REQUIRE_DB_TESTS: "true"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.26.5'
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply DSH migrations in canonical order
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "Applying ${migration}"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Verify DSH constraints, indexes, and retention
        shell: bash
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF to_regclass('public.dsh_partner_activation_event_retry_idx') IS NULL THEN
              RAISE EXCEPTION 'missing partner transition retry index';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM pg_trigger
              WHERE tgname = 'dsh_stores_partner_reassignment_guard'
                AND NOT tgisinternal
            ) THEN
              RAISE EXCEPTION 'missing store ownership reassignment guard';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM pg_constraint
              WHERE conname = 'dsh_partner_wlt_reference_excludes_raw_payout'
            ) THEN
              RAISE EXCEPTION 'missing DSH raw payout exclusion constraint';
            END IF;
            IF EXISTS (
              SELECT 1
              FROM pg_constraint c
              JOIN pg_class r ON r.oid = c.conrelid
              WHERE r.relname IN (
                'dsh_partner_activation_events',
                'dsh_partner_store_visibility_events',
                'dsh_partner_document_reviews',
                'dsh_partner_field_visits'
              )
                AND c.contype = 'f'
                AND c.confdeltype = 'c'
            ) THEN
              RAISE EXCEPTION 'JRN-001 audit/evidence still has cascade-delete retention';
            END IF;
          END $$;
          SQL
      - name: Run DSH onboarding DB integration tests
        working-directory: services/dsh/backend
        run: >-
          go test ./internal/partner -count=1
          -run 'TestLinkPartnerStoreGovernedRejectsReassignmentDBIntegration|TestGovernedSubmissionRequiresWltPayoutReferenceDBIntegration|TestGovernedTransitionReplaysSameEventDBIntegration|TestUpdatePartnerGovernedPersistsOnlyWltReferenceDBIntegration|TestCreateFieldVisitGovernedBindsFirstStoreDBIntegration'

  wlt-database:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wlt_jrn001
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wlt_jrn001"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/wlt_jrn001?sslmode=disable
      WLT_REQUIRE_DB_TESTS: "true"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.26.5'
          cache-dependency-path: services/wlt/backend/go.sum
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Verify WLT DB test formatting
        shell: bash
        run: test -z "$(gofmt -l services/wlt/backend/internal/payout/upsert_governed_db_test.go)"
      - name: Apply WLT migrations in canonical order
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "Applying ${migration}"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done < <(find services/wlt/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Verify WLT constraints and encrypted ownership
        shell: bash
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF to_regclass('public.wlt_payout_destination_requests') IS NULL THEN
              RAISE EXCEPTION 'missing payout idempotency request table';
            END IF;
            IF to_regclass('public.wlt_payout_destinations_one_active_partner_idx') IS NULL THEN
              RAISE EXCEPTION 'missing single-active payout destination index';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM information_schema.columns
              WHERE table_name = 'wlt_payout_destinations'
                AND column_name = 'account_number_encrypted'
            ) THEN
              RAISE EXCEPTION 'missing encrypted payout account storage';
            END IF;
          END $$;
          SQL
      - name: Run WLT payout DB integration test
        working-directory: services/wlt/backend
        run: go test ./internal/payout -count=1 -run TestGovernedPayoutDestinationIdempotencyAndSingleActiveDBIntegration

  publish:
    runs-on: ubuntu-latest
    needs: [dsh-database, wlt-database]
    if: always()
    steps:
      - name: Publish FS-05 status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          DSH_RESULT: ${{ needs.dsh-database.result }}
          WLT_RESULT: ${{ needs.wlt-database.result }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$DSH_RESULT" = "success" ] && [ "$WLT_RESULT" = "success" ]; then
            STATE=success
            DESCRIPTION='FS-05 PostgreSQL invariants verified'
          else
            STATE=failure
            DESCRIPTION="FS-05 database failed: DSH=$DSH_RESULT WLT=$WLT_RESULT"
          fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-05-database' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
