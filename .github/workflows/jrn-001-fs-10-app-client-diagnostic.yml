name: JRN-001 FS-10 CartScreen props repair

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-10-app-client-diagnostic.yml]

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Type optional CartScreen props explicitly
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('services/dsh/frontend/app-client/cart/CartScreen.tsx')
          text = path.read_text(encoding='utf-8')
          old = '''type Props = {
            readonly storeId: string;
            readonly selectedAddress: DshClientAddress | null;
            readonly authKind?: "authenticated" | "unauthenticated";
            readonly onProceedToCheckout?: (
              cart: DshCart,
              deliveryAddressId: string,
              note: string,
              paymentMethod: DshPaymentMethod,
              couponCode: string,
            ) => void;
            readonly onManageAddresses?: () => void;
            readonly onBrowseCatalog?: () => void;
            readonly onBack?: () => void;
          };'''.replace('          ', '')
          new = '''type Props = {
            readonly storeId: string;
            readonly selectedAddress: DshClientAddress | null;
            readonly authKind?: "authenticated" | "unauthenticated" | undefined;
            readonly onProceedToCheckout?: ((
              cart: DshCart,
              deliveryAddressId: string,
              note: string,
              paymentMethod: DshPaymentMethod,
              couponCode: string,
            ) => void) | undefined;
            readonly onManageAddresses?: (() => void) | undefined;
            readonly onBrowseCatalog?: (() => void) | undefined;
            readonly onBack?: (() => void) | undefined;
          };'''.replace('          ', '')
          if old not in text:
              raise SystemExit('CartScreen Props block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name 'bthwani-governance-bot'
          git config user.email 'noreply@bthwani.local'
          git add services/dsh/frontend/app-client/cart/CartScreen.tsx
          git commit -m 'fix(app-client): type optional CartScreen props explicitly'
          git push origin HEAD:sambassam
      - name: Publish repair status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then STATE=success; DESCRIPTION='CartScreen optional props repaired'; else STATE=failure; DESCRIPTION='CartScreen optional props repair failed'; fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-10-repair-cart-props' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json