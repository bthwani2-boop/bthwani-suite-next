name: JRN-001 FS-10 surface assertion diagnostic

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-10-app-client-diagnostic.yml]

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Publish exact surface assertion
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          node --test services/dsh/tests/jrn-001-fs-10-surfaces.test.mjs 2>&1 | tee /tmp/surface.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -eq 0 ]; then
            STATE=success
            CONTEXT='j1/fs10/surface-assert/pass'
            DESCRIPTION='surface assertions passed'
          else
            STATE=failure
            LOCATION="$(grep -o -m1 -E 'jrn-001-fs-10-surfaces\.test\.mjs:[0-9]+:[0-9]+' /tmp/surface.log || true)"
            OPERATOR="$(grep -m1 -E 'operator:' /tmp/surface.log | sed 's/^[[:space:]]*//' || true)"
            MESSAGE="$(grep -m1 -E 'AssertionError|Expected|input did not match' /tmp/surface.log | sed 's/^[[:space:]]*//' || true)"
            TOKEN="$(printf '%s' "${LOCATION:-unknown}" | tr ':.' '--' | cut -c1-70)"
            CONTEXT="j1/fs10/surface-assert/${TOKEN}"
            DESCRIPTION="${LOCATION:-unknown} ${OPERATOR:-} ${MESSAGE:-assertion failed}"
          fi
          CONTEXT="$(printf '%s' "$CONTEXT" | cut -c1-100)"
          DESCRIPTION="$(printf '%s' "$DESCRIPTION" | cut -c1-120)"
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
          exit 0
