name: JRN-001 FS-10 test diagnostic

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-10-app-client-diagnostic.yml]

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Run FS-10 tests individually
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          FAILURES=0
          for TEST_FILE in services/dsh/tests/jrn-001-fs-10-*.test.mjs; do
            BASENAME="$(basename "$TEST_FILE" .test.mjs)"
            LOG="/tmp/${BASENAME}.log"
            node --test "$TEST_FILE" >"$LOG" 2>&1
            EXIT_CODE=$?
            if [ "$EXIT_CODE" -eq 0 ]; then
              STATE=success
              DESCRIPTION="${BASENAME} passed"
            else
              STATE=failure
              FAILURES=$((FAILURES + 1))
              ERROR_LINE="$(grep -m1 -E 'AssertionError|ERR_ASSERTION|not ok|Error:' "$LOG" || true)"
              DESCRIPTION="${BASENAME}: ${ERROR_LINE:-failed}"
            fi
            CONTEXT="j1/fs10/test/${BASENAME}"
            CONTEXT="$(printf '%s' "$CONTEXT" | cut -c1-100)"
            DESCRIPTION="$(printf '%s' "$DESCRIPTION" | cut -c1-120)"
            jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
            curl --fail-with-body --silent --show-error -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
              -d @/tmp/status.json
          done
          exit 0
