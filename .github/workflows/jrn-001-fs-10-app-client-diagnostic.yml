name: JRN-001 FS-10 app-client diagnostic

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-10-app-client-diagnostic.yml]

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Publish exact app-client error
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          pnpm --dir apps/app-client/runtime typecheck 2>&1 | tee /tmp/diagnostic.log
          EXIT_CODE=${PIPESTATUS[0]}
          FIRST="$(grep -m1 -E 'error TS[0-9]+' /tmp/diagnostic.log || true)"
          if [ "$EXIT_CODE" -eq 0 ]; then STATE=success; TOKEN=pass; DESCRIPTION='app-client typecheck passed'; else STATE=failure; TOKEN="$(printf '%s' "$FIRST" | tr '[:upper:]' '[:lower:]' | tr -cs '[:alnum:]_.-' '-' | sed 's/^-//;s/-$//' | cut -c1-82)"; DESCRIPTION="$(printf '%s' "$FIRST" | cut -c1-120)"; fi
          CONTEXT="j1/fs10/app-client/${TOKEN:-unknown}"
          CONTEXT="$(printf '%s' "$CONTEXT" | cut -c1-100)"
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json