name: JRN-001 FS-10 app-field onboarding repair

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-10-app-client-diagnostic.yml]

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Align fee and color contracts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('services/dsh/frontend/app-field/onboarding/DshFieldOnboardingScreen.tsx')
          text = path.read_text()
          replacements = {
              "{feeRefState.data.amountMinor} {feeRefState.data.currency}": "{feeRefState.data.amount.toLocaleString('ar-YE')} {feeRefState.data.currency}",
              "colorRoles.brandPrimary": "colorRoles.brandAction",
              "colorRoles.surfaceRaised": "colorRoles.brandActionSoft",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'marker not found: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add services/dsh/frontend/app-field/onboarding/DshFieldOnboardingScreen.tsx
          git commit -m 'fix(jrn-001-fs-10): align field onboarding fee and color contracts'
          git push origin HEAD:sambassam
      - name: Publish repair status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = success ]; then STATE=success; else STATE=failure; fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-10-repair-field-onboarding-contracts' --arg description 'Field onboarding fee and color contracts repair' --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
