name: SonarQube

on:
  push:
    branches: [bassam, master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonarqube-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: SonarQube analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Detect SonarQube configuration
        id: sonar-config
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: |
          set -euo pipefail
          if [ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "SonarQube configuration is available."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=SonarQube not configured::Static SonarQube analysis was skipped because SONAR_TOKEN or SONAR_HOST_URL is absent. Required CI, security, governance, and CodeQL checks remain independent."
          fi
      - name: Run SonarQube scan
        if: steps.sonar-config.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      - name: Report SonarQube scope
        if: always()
        shell: bash
        env:
          CONFIGURED: ${{ steps.sonar-config.outputs.configured }}
        run: |
          set -euo pipefail
          if [ "$CONFIGURED" = "true" ]; then
            echo "SonarQube analysis was required and executed for this run."
          else
            echo "SonarQube is an optional external diagnostic until repository configuration is provided."
          fi
