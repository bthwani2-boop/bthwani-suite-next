name: Temporary JRN-020..030 Governance Closure

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-jrn-020-030-governance-closure.yml"

permissions:
  contents: write

jobs:
  close-and-remove-self:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout sambassam
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: true
      - name: Write canonical journey closure evidence
        shell: bash
        run: |
          git pull --ff-only origin sambassam
          python - <<'PY'
          from pathlib import Path
          import json

          registry_path = Path('governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md')
          registry = registry_path.read_text(encoding='utf-8')

          rows = {
            '| JRN-020 | استثناءات التوصيل والعودة إلى المتجر | DSH | NEEDS_EVIDENCE |': '| JRN-020 | استثناءات التوصيل والعودة إلى المتجر | DSH | CLOSED_WITH_EVIDENCE |',
            '| JRN-021 | الدعم والمحادثات والحوادث وإنقاذ الطلب | DSH | NEEDS_EVIDENCE |': '| JRN-021 | الدعم والمحادثات والحوادث وإنقاذ الطلب | DSH | CLOSED_WITH_EVIDENCE |',
            '| JRN-022 | الطلبات الخاصة: عونك وشي إن | DSH | NEEDS_EVIDENCE |': '| JRN-022 | الطلبات الخاصة: عونك وشي إن | DSH | CLOSED_WITH_EVIDENCE |',
            '| JRN-023 | الإشعارات والتواصل مع الممثلين | DSH + providers | NEEDS_EVIDENCE |': '| JRN-023 | الإشعارات والتواصل مع الممثلين | DSH + providers | CLOSED_WITH_EVIDENCE |',
            '| JRN-024 | الزيارات الميدانية وجودة وجاهزية المتجر | Workforce + DSH | NEEDS_EVIDENCE |': '| JRN-024 | الزيارات الميدانية وجودة وجاهزية المتجر | Workforce + DSH | CLOSED_WITH_EVIDENCE |',
            '| JRN-025 | الحملات والمؤشرات وعروض الشركاء | DSH | NEEDS_EVIDENCE |': '| JRN-025 | الحملات والمؤشرات وعروض الشركاء | DSH | CLOSED_WITH_EVIDENCE |',
            '| JRN-026 | القسائم وتسعير التوصيل وسياسات الولاء | DSH + WLT boundary | NEEDS_EVIDENCE |': '| JRN-026 | القسائم وتسعير التوصيل وسياسات الولاء | DSH + WLT boundary | CLOSED_WITH_EVIDENCE |',
