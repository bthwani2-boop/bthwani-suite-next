name: Partner Domain Verification

on:
  push:
    branches:
      - bassam
      - "fix/lian-sovereign-final-closure"
    paths:
      - '.github/workflows/partner-domain-verification.yml'
      - 'services/dsh/backend/**'
      - 'services/dsh/database/**'
      - 'services/dsh/contracts/**'
      - 'services/dsh/frontend/**partner**'
      - 'services/dsh/frontend/app-client/account/BenefitsHubScreen.tsx'
      - 'services/dsh/frontend/app-captain/account/**'
      - 'services/dsh/frontend/control-panel/partners/**'
      - 'tools/guards/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches:
      - master
    paths:
      - 'services/dsh/backend/**'
      - 'services/dsh/database/**'
      - 'services/dsh/contracts/**'
      - 'services/dsh/frontend/**partner**'
      - 'services/dsh/frontend/app-client/account/BenefitsHubScreen.tsx'
      - 'services/dsh/frontend/app-captain/account/**'
      - 'services/dsh/frontend/control-panel/partners/**'
      - 'tools/guards/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/partner-domain-verification.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: partner-domain-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.34.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Go format check
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l services/dsh/backend/internal/marketing services/dsh/backend/internal/partnerfleet services/dsh/backend/internal/http)"
          if [ -n "$files" ]; then
            printf 'Unformatted Go files:\n%s\n' "$files"
            exit 1
          fi

      - name: DSH backend tests
        working-directory: services/dsh/backend
        run: go test ./...

      - name: Contract lint
        run: pnpm run contracts:lint

      - name: Backend route binding
        run: pnpm run guard:backend-api-binding

      - name: Frontend API binding
        run: pnpm run guard:api-binding

      - name: Frontend feature binding
        run: pnpm run guard:frontend-feature-binding

      - name: Broken import guard
        run: pnpm run guard:no-broken-imports

      - name: Workspace typecheck
        run: pnpm run typecheck