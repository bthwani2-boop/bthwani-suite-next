name: Temporary JRN-002 Diagnostics

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-jrn-002-diagnostics.yml"
      - "core/identity/**"
      - "core/workforce/backend/internal/identityclient/**"
      - "services/dsh/frontend/shared/session/**"
      - "services/dsh/frontend/app-client/account/**"

permissions:
  contents: read
  statuses: write

concurrency:
  group: tmp-jrn-002-${{ github.sha }}
  cancel-in-progress: false

jobs:
  announce:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Publish pending diagnostic status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state "pending" --arg context "journeys/jrn-002/diagnostics" --arg description "JRN-002 diagnostics are running" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json

  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: core/identity/backend/go.mod
          cache-dependency-path: |
            core/identity/backend/go.sum
            core/workforce/backend/go.sum
      - name: Run JRN-002 diagnostics
        id: diagnose
        continue-on-error: true
        shell: bash
        run: |
          set +e
          : >/tmp/jrn-002-diagnostics.log
          run_check() {
            local label="$1"
            shift
            echo "===== $label =====" | tee -a /tmp/jrn-002-diagnostics.log
            "$@" 2>&1 | tee -a /tmp/jrn-002-diagnostics.log
            local result=${PIPESTATUS[0]}
            echo "RESULT $label=$result" | tee -a /tmp/jrn-002-diagnostics.log
            return $result
          }
          FAILED=0
          run_check static node --test core/identity/tests/jrn-002-*.test.mjs || FAILED=1
          run_check identity-ts pnpm --dir core/identity exec tsc --noEmit -p tsconfig.json || FAILED=1
          run_check app-client pnpm --dir apps/app-client/runtime typecheck || FAILED=1
          run_check app-partner pnpm --dir apps/app-partner/runtime typecheck || FAILED=1
          run_check app-captain pnpm --dir apps/app-captain/runtime typecheck || FAILED=1
          run_check app-field pnpm --dir apps/app-field/runtime typecheck || FAILED=1
          run_check control-panel pnpm --dir apps/control-panel/runtime typecheck || FAILED=1
          run_check identity-go bash -lc 'cd core/identity/backend && go test ./... -count=1 && go build ./...' || FAILED=1
          run_check workforce-client-go bash -lc 'cd core/workforce/backend && go test ./internal/identityclient -count=1' || FAILED=1
          exit "$FAILED"
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-002-diagnostics
          path: /tmp/jrn-002-diagnostics.log
          retention-days: 3
          if-no-files-found: error
      - name: Publish diagnostic status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.diagnose.outcome }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=success
          DESCRIPTION="JRN-002 diagnostics passed"
          if [ "$OUTCOME" != success ]; then
            STATE=failure
            DESCRIPTION="JRN-002 diagnostics found actionable failures"
          fi
          jq -n --arg state "$STATE" --arg context "journeys/jrn-002/diagnostics" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
      - name: Enforce diagnostic result
        if: always()
        env:
          OUTCOME: ${{ steps.diagnose.outcome }}
        run: test "$OUTCOME" = success
