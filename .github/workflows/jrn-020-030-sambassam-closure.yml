name: JRN-020..030 Same-Commit Fullstack Closure

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "services/dsh/tsconfig.jrn-020-030.json"
      - "services/dsh/backend/internal/dispatch/**"
      - "services/dsh/backend/internal/support/**"
      - "services/dsh/backend/internal/specialrequests/**"
      - "services/dsh/backend/internal/fieldreadiness/**"
      - "services/dsh/backend/internal/marketing/**"
      - "services/dsh/backend/internal/coupons/**"
      - "services/dsh/backend/internal/partnerfleet/**"
      - "services/dsh/backend/internal/platformpolicies/**"
      - "services/dsh/backend/internal/promotionfundingoutbox/**"
      - "services/dsh/backend/internal/http/**"
      - "services/dsh/backend/cmd/dsh-api/main.go"
      - "services/dsh/database/migrations/**"
      - "services/dsh/database/tests/**"
      - "services/dsh/contracts/**"
      - "services/dsh/frontend/shared/dispatch/**"
      - "services/dsh/frontend/shared/support/**"
      - "services/dsh/frontend/shared/special-requests/**"
      - "services/dsh/frontend/shared/notifications/**"
      - "services/dsh/frontend/shared/field-readiness/**"
      - "services/dsh/frontend/shared/marketing/**"
      - "services/dsh/frontend/shared/partner/**"
      - "services/dsh/frontend/shared/platform/**"
      - "services/dsh/frontend/shared/home-discovery/**"
      - "services/dsh/frontend/app-client/**"
      - "services/dsh/frontend/app-partner/**"
      - "services/dsh/frontend/app-captain/**"
      - "services/dsh/frontend/app-field/**"
      - "services/dsh/frontend/control-panel/**"
      - "services/dsh/tests/journeys-020-025-binding.test.mjs"
      - "services/dsh/tests/journeys-026-030-binding.test.mjs"
      - "services/dsh/tests/jrn-030-partner-fleet-surface-binding.test.mjs"
      - "services/wlt/backend/internal/promotionfunding/**"
      - "services/wlt/contracts/wlt.promotion-funding.openapi.yaml"
      - "tools/guards/**"
      - "governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md"
      - ".github/actions/setup-node-workspace/action.yml"
      - ".github/workflows/jrn-020-030-sambassam-closure.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-020-030-closure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-integrity:
    name: Static contracts, surfaces, and sovereign boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node and PNPM workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Prepare diagnostics
        run: mkdir -p journey-diagnostics
      - name: Verify repository hygiene
        id: hygiene
        continue-on-error: true
        shell: bash
        run: set -o pipefail; git diff --check 2>&1 | tee journey-diagnostics/repository-hygiene.log
      - name: Verify JRN-020..025 bindings
        id: jrn020025
        continue-on-error: true
        shell: bash
        run: set -o pipefail; node --test services/dsh/tests/journeys-020-025-binding.test.mjs 2>&1 | tee journey-diagnostics/jrn-020-025.log
      - name: Verify JRN-026..030 bindings
        id: jrn026030
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node --test \
            services/dsh/tests/journeys-026-030-binding.test.mjs \
            services/dsh/tests/jrn-030-partner-fleet-surface-binding.test.mjs \
            2>&1 | tee journey-diagnostics/jrn-026-030.log
      - name: Verify sovereign boundaries
        id: boundaries
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            pnpm guard:fullstack-boundary
            pnpm guard:wlt-financial-boundary
            pnpm guard:no-broken-imports
          } 2>&1 | tee journey-diagnostics/sovereign-boundaries.log
      - name: Record static outcomes
        if: always()
        env:
          HYGIENE: ${{ steps.hygiene.outcome }}
          JRN020025: ${{ steps.jrn020025.outcome }}
          JRN026030: ${{ steps.jrn026030.outcome }}
          BOUNDARIES: ${{ steps.boundaries.outcome }}
        shell: bash
        run: |
          printf 'hygiene=%s\njrn020025=%s\njrn026030=%s\nboundaries=%s\n' \
            "$HYGIENE" "$JRN020025" "$JRN026030" "$BOUNDARIES" \
            | tee journey-diagnostics/outcomes.txt
      - name: Upload static diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: jrn-020-030-static-diagnostics
          path: journey-diagnostics
          if-no-files-found: error
          retention-days: 7
      - name: Enforce static outcomes
        if: always()
        env:
          HYGIENE: ${{ steps.hygiene.outcome }}
          JRN020025: ${{ steps.jrn020025.outcome }}
          JRN026030: ${{ steps.jrn026030.outcome }}
          BOUNDARIES: ${{ steps.boundaries.outcome }}
        run: test "$HYGIENE" = success && test "$JRN020025" = success && test "$JRN026030" = success && test "$BOUNDARIES" = success

  dsh-typecheck:
    name: JRN-020..030 shared brain and surface typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node and PNPM workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Typecheck authorized journey scope
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p journey-diagnostics
          set -o pipefail
          pnpm --dir services/dsh exec tsc -p tsconfig.jrn-020-030.json --noEmit --pretty false 2>&1 | tee journey-diagnostics/typecheck.log
      - name: Record typecheck outcome
        if: always()
        env:
          TYPECHECK: ${{ steps.typecheck.outcome }}
        run: printf 'typecheck=%s\n' "$TYPECHECK" | tee journey-diagnostics/outcomes.txt
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: jrn-020-030-typecheck-diagnostics
          path: journey-diagnostics
          if-no-files-found: error
          retention-days: 7
      - name: Enforce typecheck outcome
        if: always()
        env:
          TYPECHECK: ${{ steps.typecheck.outcome }}
        run: test "$TYPECHECK" = success

  go-integration:
    name: JRN-020..030 Go domains, routes, and runtime compile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: services/dsh/backend
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Go from module
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify journey domains and governed routes
        run: >-
          go test
          ./cmd/dsh-api
          ./internal/dispatch
          ./internal/support
          ./internal/specialrequests
          ./internal/fieldreadiness
          ./internal/marketing
          ./internal/coupons
          ./internal/partnerfleet
          ./internal/platformpolicies
          ./internal/promotionfundingoutbox
          ./internal/http
          -count=1

  publish-result:
    name: Publish same-commit JRN-020..030 closure status
    if: always()
    needs: [static-integrity, dsh-typecheck, go-integration]
    runs-on: ubuntu-latest
    steps:
      - name: Publish aggregate status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          STATIC_RESULT: ${{ needs.static-integrity.result }}
          TYPECHECK_RESULT: ${{ needs.dsh-typecheck.result }}
          GO_RESULT: ${{ needs.go-integration.result }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=failure
          DESCRIPTION="JRN-020..030 fullstack closure failed"
          if [ "$STATIC_RESULT" = success ] && [ "$TYPECHECK_RESULT" = success ] && [ "$GO_RESULT" = success ]; then
            STATE=success
            DESCRIPTION="JRN-020..030 fullstack closure passed"
          fi
          jq -n \
            --arg state "$STATE" \
            --arg context "journeys/jrn-020-030/fullstack-closure" \
            --arg description "$DESCRIPTION" \
            --arg target_url "$TARGET_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
