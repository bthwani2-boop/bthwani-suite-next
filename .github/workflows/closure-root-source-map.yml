name: Closure Root Source Map

on:
  push:
    branches:
      - "fix/lian-sovereign-final-closure"
    paths:
      - ".github/workflows/closure-root-source-map.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-workspace
      - name: Publish exact branch-only roots
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $ErrorActionPreference = "Stop"
          . ./infra/docker/scripts/schema-migration-runner.ps1

          function Publish([string]$Context, [string]$State = "success") {
            $safe = (($Context -replace '[\r\n/]', ' ') -replace '\s+', ' ')
            if ($safe.Length -gt 95) { $safe = $safe.Substring(0, 95) }
            $payload = @{ state = $State; context = $safe; description = $safe; target_url = $env:RUN_URL } | ConvertTo-Json -Compress
            Invoke-RestMethod -Method Post -Uri "https://api.github.com/repos/$env:REPOSITORY/statuses/$env:SHA" -Headers @{
              Authorization = "Bearer $env:GH_TOKEN"
              Accept = "application/vnd.github+json"
              "X-GitHub-Api-Version" = "2022-11-28"
            } -ContentType "application/json" -Body $payload | Out-Null
          }

          $governanceOutput = @(node tools/guards/governance-schema-gate.mjs 2>&1)
          $governanceExit = $LASTEXITCODE
          $governanceLines = @($governanceOutput | ForEach-Object { $_.ToString().Trim() } | Where-Object { $_ -ne "" })
          $firstViolation = @($governanceLines | Where-Object { $_ -like '- *' } | Select-Object -First 1)
          if ($firstViolation.Count -eq 0) { $firstViolation = @($governanceLines | Select-Object -Last 1) }
          if ($governanceExit -eq 0) { Publish "Root governance-schema PASS" }
          else { Publish "Root governance-schema $($firstViolation[0])" "failure" }

          $catalogTest = Get-ChildItem services/dsh/backend -Recurse -Filter '*_test.go' |
            Select-String -SimpleMatch 'TestCatalogGenerationUsesSovereignOverlay' |
            Select-Object -First 1
          if ($catalogTest) {
            $relative = $catalogTest.Path.Replace((Get-Location).Path + [IO.Path]::DirectorySeparatorChar, '')
            Publish "Root catalog overlay test ${relative}:$($catalogTest.LineNumber)"
          } else {
            Publish "Root catalog overlay test NONE" "failure"
          }

          $overlayRefs = @(Get-ChildItem services/dsh/backend -Recurse -Filter '*.go' |
            Select-String -Pattern 'sovereign|overlay' -CaseSensitive:$false |
            Select-Object -First 6)
          foreach ($ref in $overlayRefs) {
            $relative = $ref.Path.Replace((Get-Location).Path + [IO.Path]::DirectorySeparatorChar, '')
            Publish "Root overlay ref ${relative}:$($ref.LineNumber) $($ref.Line.Trim())"
          }

          $invariantFiles = @(Get-ChildItem services/dsh/database/tests -Filter '*.sql' -File | Where-Object {
            $_.Name -like '*056*057*' -or $_.Name -like '*client*addr*'
          } | Sort-Object Name)
          foreach ($invariant in $invariantFiles) {
            Publish "Root DSH invariant $($invariant.Name)"
          }

          $pgx = Get-ChildItem services/dsh/backend -Recurse -Filter '*.go' | Select-String -SimpleMatch 'github.com/jackc/pgx/v5/stdlib' | Select-Object -First 1
          if ($pgx) {
            $relative = $pgx.Path.Replace((Get-Location).Path + [IO.Path]::DirectorySeparatorChar, '')
            Publish "Root DSH pgx ${relative}:$($pgx.LineNumber)"
          } else {
            Publish "Root DSH pgx NONE"
          }

          $policyDirectory = 'services/dsh/backend/internal/platformpolicies'
          $policyFiles = @(Get-ChildItem -LiteralPath $policyDirectory -Filter '*.go' -File | Sort-Object Name)
          Publish "Root platformpolicies files $((@($policyFiles.Name) -join ','))"
          foreach ($symbol in @('type MutationContext', 'func validMutation', 'func withIdempotency', 'func insertEvent', 'ErrVersionConflict')) {
            $match = $policyFiles | Select-String -SimpleMatch $symbol | Select-Object -First 1
            if ($match) { Publish "Root policy symbol $symbol $($match.Path | Split-Path -Leaf):$($match.LineNumber)" }
            else { Publish "Root policy symbol $symbol NONE" }
          }

          foreach ($item in @(
            @{ Service = 'dsh'; Directory = 'services/dsh/database/migrations' },
            @{ Service = 'wlt'; Directory = 'services/wlt/database/migrations' },
            @{ Service = 'workforce'; Directory = 'core/workforce/database/migrations' }
          )) {
            try {
              $files = @(Get-ChildItem -LiteralPath $item.Directory -Filter '*.sql' -File | Sort-Object Name)
              New-BthwaniGovernedMigrationBatch -ServiceName $item.Service -MigrationFiles $files -SourceCommitSha $env:SHA | Out-Null
              Publish "Root DB $($item.Service) validation PASS files=$($files.Count)"
            } catch {
              Publish "Root DB $($item.Service) $($_.Exception.Message)" "failure"
            }
          }
