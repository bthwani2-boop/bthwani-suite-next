name: One-time finance tenant lock

on:
  push:
    branches: [bassam]
    paths:
      - .github/workflows/one-time-finance-tenant-lock.yml

permissions:
  contents: write

concurrency:
  group: one-time-finance-tenant-lock-bassam
  cancel-in-progress: false

jobs:
  patch-test-push:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout bassam
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: bassam
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.26.5'
          cache-dependency-path: |
            services/wlt/backend/go.sum
            services/dsh/backend/go.sum

      - name: Apply tenant lock
        run: node tools/scripts/close-finance-tenant.mjs

      - name: Format and verify Go
        run: |
          gofmt -w \
            services/dsh/backend/internal/wlt/client.go \
            services/wlt/backend/internal/payment/payment.go \
            services/wlt/backend/internal/payment/sovereign_capture.go \
            services/wlt/backend/internal/reference/payment_session_test.go
          git diff --check
          (cd services/wlt/backend && go test ./... && go build ./...)
          (cd services/dsh/backend && go test ./... && go build ./...)

      - name: Commit tenant lock
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/one-time-finance-tenant-lock.yml
          git config user.name "bthwani-finance-tenant-bot"
          git config user.email "finance-tenant-bot@users.noreply.github.com"
          git add \
            .github/workflows/one-time-finance-tenant-lock.yml \
            services/dsh/backend/internal/wlt/client.go \
            services/wlt/backend/internal/payment/payment.go \
            services/wlt/backend/internal/payment/sovereign_capture.go \
            services/wlt/backend/internal/reference/payment_session_test.go
          git commit -m "fix(finance-tenant): require trusted DSH tenant and remove runtime fallback"
          git fetch origin bassam
          git rebase origin/bassam
          git push origin HEAD:bassam
