name: JRN-022 Special Requests Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths: &jrn022_paths
      - "services/dsh/backend/internal/specialrequests/**"
      - "services/dsh/backend/internal/http/specialrequests*.go"
      - "services/dsh/backend/internal/http/jrn_022_special_requests_routes_test.go"
      - "services/dsh/backend/internal/http/dispatch.go"
      - "services/dsh/backend/internal/dispatch/delivery_exceptions*.go"
      - "services/dsh/database/migrations/dsh-096_special_request_information_exchange.sql"
      - "services/dsh/database/migrations/dsh-097_special_request_delivery_exceptions.sql"
      - "services/dsh/frontend/shared/special-requests/**"
      - "services/dsh/frontend/shared/shein/**"
      - "services/dsh/frontend/shared/awnak/**"
      - "services/dsh/frontend/shared/delivery/**"
      - "services/dsh/frontend/app-client/DshClientSurface.tsx"
      - "services/dsh/frontend/control-panel/operations/SpecialOpsWorkbenchScreen.tsx"
      - "services/dsh/tests/jrn-022-special-requests.test.mjs"
      - "governance/product/contracts/jrn-022-special-requests.product-truth.json"
      - "services/dsh/contracts/**"
      - "services/dsh/clients/generated/dsh-api.ts"
      - "services/dsh/tsconfig.jrn-022.json"
      - ".github/workflows/jrn-022-special-requests-verification.yml"
  pull_request:
    branches: [master]
    paths: *jrn022_paths

permissions:
  contents: read

concurrency:
  group: jrn-022-special-requests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: JRN-022 state, surfaces, and contract proof
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Go from DSH module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify JRN-022 state routes and dispatch exception ownership
        working-directory: services/dsh/backend
        run: >-
          go test ./internal/specialrequests ./internal/http ./internal/dispatch
          -run 'Test(JRN022SpecialRequestRoutes|CanonicalSpecialRequestStagesAreKnownToService|DefaultWorkflowStageMatchesCustomerAndDeliveryReadback|InformationExchangeValidationAndCanonicalStage)$'
          -count=1
      - name: Build affected backend owners
        working-directory: services/dsh/backend
        run: go build ./internal/specialrequests ./internal/http ./internal/dispatch
      - name: Run JRN-022 full-stack static gate
        run: node --test services/dsh/tests/jrn-022-special-requests.test.mjs
      - name: Typecheck only the JRN-022 ownership graph
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-022.json --noEmit --pretty false
      - name: Verify modular OpenAPI and generated client
        run: |
          pnpm --dir services/dsh openapi:verify
          git diff --exit-code -- services/dsh/contracts/generated/dsh.bundle.openapi.yaml services/dsh/clients/generated/dsh-api.ts
      - name: Verify repository whitespace
        run: git diff --check
