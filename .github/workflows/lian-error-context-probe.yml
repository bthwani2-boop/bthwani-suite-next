name: Lian Error Context Probe

on:
  push:
    branches: [lian]
    paths:
      - ".github/workflows/lian-error-context-probe.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  node-command:
    name: Context error — ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: governance-schema, command: "pnpm run guard:governance-schema" }
          - { name: agent-governance, command: "pnpm run guard:agent-governance" }
          - { name: client-commerce, command: "node tools/guards/client-commerce/client-commerce-truth-gate.mjs" }
          - { name: partner-surface, command: "node tools/guards/partner/partner-surface-truth-gate.mjs" }
          - { name: maps, command: "node tools/guards/maps/map-platform-truth-gate.mjs" }
          - { name: operational-policy-ui, command: "node tools/guards/platform/operational-policy-ui-truth-gate.mjs" }
          - { name: privacy-integration, command: "node tools/guards/privacy/client-address-privacy-integration-gate.mjs" }
          - { name: ui-actions, command: "node tools/guards/ui-actions/ui-action-binding-gate.mjs" }
          - { name: frontend-binding, command: "pnpm run guard:frontend-feature-binding" }
          - { name: backend-binding, command: "pnpm run guard:backend-api-binding" }
          - { name: manifest, command: "pnpm run guard:service-manifest-drift" }
          - { name: typecheck, command: "pnpm run typecheck" }
          - { name: build, command: "pnpm run build" }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false, fetch-depth: 0 }
      - uses: ./.github/actions/setup-node-workspace
      - name: Run command and publish exact error context
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMAND: ${{ matrix.command }}
          PHASE: ${{ matrix.name }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          bash -o pipefail -c "$COMMAND" > /tmp/probe.log 2>&1
          code=$?
          cat /tmp/probe.log
          state=success
          snippet=PASS
          if [ $code -ne 0 ]; then
            state=failure
            snippet="$(grep -Eai 'error|failed|failure|missing|drift|forbidden|invalid|expected|mismatch' /tmp/probe.log | tail -n 1)"
            [ -n "$snippet" ] || snippet="$(tail -n 1 /tmp/probe.log)"
            snippet="$(printf '%s' "$snippet" | tr '\n\r/' '   ' | sed -E 's/[[:space:]]+/ /g' | cut -c1-70)"
          fi
          context="Lian Error / $PHASE / $snippet"
          context="$(printf '%s' "$context" | cut -c1-130)"
          jq -n --arg state "$state" --arg context "$context" --arg description "$snippet" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json
          exit $code

  dsh-go:
    name: Context DSH Go — ${{ matrix.phase }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { phase: vet, command: "go vet ./..." }
          - { phase: test, command: "go test ./... -count=1" }
          - { phase: build, command: "go build ./..." }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Run DSH Go phase and publish exact error context
        working-directory: services/dsh/backend
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMAND: ${{ matrix.command }}
          PHASE: ${{ matrix.phase }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          bash -o pipefail -c "$COMMAND" > /tmp/probe.log 2>&1
          code=$?
          cat /tmp/probe.log
          state=success
          snippet=PASS
          if [ $code -ne 0 ]; then
            state=failure
            snippet="$(grep -Eai 'undefined|cannot use|too many|not enough|error|FAIL' /tmp/probe.log | head -n 1)"
            [ -n "$snippet" ] || snippet="$(tail -n 1 /tmp/probe.log)"
            snippet="$(printf '%s' "$snippet" | tr '\n\r/' '   ' | sed -E 's/[[:space:]]+/ /g' | cut -c1-70)"
          fi
          context="Lian Error / DSH-Go-$PHASE / $snippet"
          context="$(printf '%s' "$context" | cut -c1-130)"
          jq -n --arg state "$state" --arg context "$context" --arg description "$snippet" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json
          exit $code

  dsh-database:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: dsh_context, POSTGRES_PASSWORD: dsh_context_password, POSTGRES_DB: dsh_context }
        ports: ["55432:5432"]
        options: >-
          --health-cmd="pg_isready -U dsh_context -d dsh_context" --health-interval=5s --health-timeout=5s --health-retries=20
    env:
      DATABASE_URL: postgres://dsh_context:dsh_context_password@localhost:55432/dsh_context?sslmode=disable
      PGPASSWORD: dsh_context_password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - name: Publish exact DSH migration filename
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          state=success
          current=PASS
          error=PASS
          while IFS= read -r file; do
            current="$(basename "$file")"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" > /tmp/db.log 2>&1
            code=$?
            if [ $code -ne 0 ]; then
              state=failure
              error="$(grep -Eai 'ERROR|FATAL' /tmp/db.log | tail -n1 | sed -E 's/[[:space:]]+/ /g' | cut -c1-45)"
              break
            fi
          done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name 'dsh-*.sql' | sort)
          context="Lian Error / DSH-DB-apply / $current / $error"
          context="$(printf '%s' "$context" | cut -c1-130)"
          jq -n --arg state "$state" --arg context "$context" --arg description "$current $error" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json
          [ "$state" = success ]

  wlt-database:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: wlt_context, POSTGRES_PASSWORD: wlt_context_password, POSTGRES_DB: wlt_context }
        ports: ["55433:5432"]
        options: >-
          --health-cmd="pg_isready -U wlt_context -d wlt_context" --health-interval=5s --health-timeout=5s --health-retries=20
    env:
      DATABASE_URL: postgres://wlt_context:wlt_context_password@localhost:55433/wlt_context?sslmode=disable
      PGPASSWORD: wlt_context_password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with: { persist-credentials: false }
      - name: Publish exact WLT migration filename
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          state=success
          current=PASS
          error=PASS
          while IFS= read -r file; do
            current="$(basename "$file")"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" > /tmp/db.log 2>&1
            code=$?
            if [ $code -ne 0 ]; then
              state=failure
              error="$(grep -Eai 'ERROR|FATAL' /tmp/db.log | tail -n1 | sed -E 's/[[:space:]]+/ /g' | cut -c1-45)"
              break
            fi
          done < <(find services/wlt/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
          context="Lian Error / WLT-DB-apply / $current / $error"
          context="$(printf '%s' "$context" | cut -c1-130)"
          jq -n --arg state "$state" --arg context "$context" --arg description "$current $error" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d @/tmp/status.json
          [ "$state" = success ]
