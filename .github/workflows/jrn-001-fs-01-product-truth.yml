name: JRN-001 FS-01 Product Truth

on:
  push:
    branches: [sambassam]
    paths:
      - governance/product/contracts/jrn-001-partner-onboarding-store-publication.product-truth.json
      - governance/product/product-truth.schema.json
      - tools/guards/sdlc/validate-product-truth.mjs
      - .github/workflows/jrn-001-fs-01-product-truth.yml

permissions:
  contents: read
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Install locked dependencies
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Validate FS-01 contract
        run: |
          cat > .jrn-001-fs-01-impact.json <<'JSON'
          {
            "branch": "sambassam",
            "affectedPaths": [
              "services/dsh/frontend/shared/partner",
              "services/dsh/frontend/shared/field-onboarding",
              "services/dsh/contracts",
              "services/wlt/contracts"
            ],
            "productImpact": "CHANGED",
            "productTruthContract": "governance/product/contracts/jrn-001-partner-onboarding-store-publication.product-truth.json"
          }
          JSON
          node tools/guards/sdlc/validate-product-truth.mjs \
            --impact=.jrn-001-fs-01-impact.json \
            --stage=G3_READY_FOR_IMPLEMENTATION
          rm .jrn-001-fs-01-impact.json
      - name: Publish FS-01 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then
            STATE=success
            DESCRIPTION='FS-01 Product Truth validated'
          else
            STATE=failure
            DESCRIPTION='FS-01 Product Truth validation failed'
          fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-01-product-truth' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
