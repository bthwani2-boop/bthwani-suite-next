name: JRN-013 Evidence Assertion Sync

on:
  push:
    branches:
      - verification/jrn-013-final-closure-20260722
    paths:
      - ".github/workflows/jrn-013-evidence-assertion-sync.yml"

permissions:
  contents: write

concurrency:
  group: jrn-013-evidence-assertion-sync
  cancel-in-progress: false

jobs:
  synchronize:
    if: contains(github.event.head_commit.message, '[jrn013-evidence-sync]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: verification/jrn-013-final-closure-20260722
          fetch-depth: 0
      - name: Synchronize Product Truth assertions
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'services/dsh/tests/store-captain-handoff-closure.test.mjs';
          let source = fs.readFileSync(path, 'utf8');
          const replacements = [
            ["assert.equal(truth.internalZeroGate, 'SOURCE_CODE_CLOSED');", "assert.equal(truth.internalZeroGate, 'AUTOMATED_CLOSURE_PASSED');"],
            ["assert.equal(truth.decision, 'READY_FOR_REVIEW');", "assert.equal(truth.decision, 'READY_FOR_INDEPENDENT_REVIEW');"],
            ["assert.equal(truth.evidenceState.ciExecution, 'NOT_OBSERVED_FROM_CONNECTOR');", "assert.equal(truth.evidenceState.ciExecution, 'PASSED');"],
          ];
          for (const [before, after] of replacements) {
            if (source.includes(before)) source = source.replace(before, after);
            if (!source.includes(after)) throw new Error(`closure assertion missing: ${after}`);
          }
          if (!source.includes("assert.equal(truth.evidenceState.targetedTests, 'PASSED');")) {
            source = source.replace(
              "  assert.equal(truth.evidenceState.ciExecution, 'PASSED');",
              "  assert.equal(truth.evidenceState.targetedTests, 'PASSED');\n  assert.equal(truth.evidenceState.ciExecution, 'PASSED');",
            );
          }
          if (!source.includes('assert.equal(truth.automatedEvidence.runId, 29882102801);')) {
            source = source.replace(
              "  assert.equal(truth.evidenceState.targetedTests, 'PASSED');",
              "  assert.equal(truth.automatedEvidence.runId, 29882102801);\n  assert.equal(truth.evidenceState.targetedTests, 'PASSED');",
            );
          }
          fs.writeFileSync(path, source, 'utf8');
          NODE
      - name: Commit synchronized assertions
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "JRN-013 evidence assertions already synchronized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/dsh/tests/store-captain-handoff-closure.test.mjs
          git commit -m "test(jrn-013): assert passing automated closure evidence"
          git pull --rebase origin verification/jrn-013-final-closure-20260722
          git push origin HEAD:verification/jrn-013-final-closure-20260722
