name: Closure Source Export

on:
  push:
    branches:
      - "fix/lian-sovereign-final-closure"
    paths:
      - ".github/workflows/closure-source-export.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  export:
    name: Export immutable closure sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Stage exact sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p closure-source
          while IFS= read -r file; do
            mkdir -p "closure-source/$(dirname "$file")"
            cp "$file" "closure-source/$file"
          done <<'FILES'
          package.json
          governance/guards/guard-registry.json
          services/wlt/contracts/wlt.openapi.yaml
          services/dsh/contracts/dsh.openapi.yaml
          services/dsh/backend/internal/http/server.go
          services/dsh/frontend/app-partner/orders/usePartnerOrdersRuntime.ts
          tools/guards/partner/partner-surface-truth-gate.mjs
          tools/guards/backend-api-binding-gate.mjs
          tools/guards/extract_routes.go
          .github/workflows/dsh-database-diagnostic-evidence.yml
          .github/workflows/closure-atomic-repair.yml
          .github/workflows/closure-atomic-repair-v2.yml
          .github/workflows/closure-atomic-repair-v3.yml
          FILES

      - name: Upload immutable sources
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: closure-source-${{ github.sha }}
          path: closure-source
          if-no-files-found: error
          retention-days: 1

      - name: Publish source export run
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          state=success
          [ "$JOB_STATUS" = success ] || state=failure
          payload="$(jq -n --arg state "$state" --arg context 'Closure Source Export' --arg description "immutable source export: $JOB_STATUS" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" -d "$payload"
