name: JRN-001 FS-10 store link repair

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-10-store-link-repair.yml]

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Add control-panel store link action
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('services/dsh/frontend/control-panel/partners/PartnerDetailOperationalScreen.tsx')
          text = path.read_text(encoding='utf-8')

          state_anchor = '  const [documentReason, setDocumentReason] = useState("");'
          if 'storeIdToLink' not in text:
              if state_anchor not in text:
                  raise SystemExit('partner detail state anchor missing')
              text = text.replace(
                  state_anchor,
                  state_anchor + '\n  const [storeIdToLink, setStoreIdToLink] = useState("");',
                  1,
              )

          function_anchor = '  return (\n    <DetailPageFrame'
          if 'const confirmStoreLink' not in text:
              if function_anchor not in text:
                  raise SystemExit('partner detail return anchor missing')
              function_block = '''  const confirmStoreLink = async () => {
            const storeId = storeIdToLink.trim();
            if (!storeId) return;
            const succeeded = await stores.linkStore(storeId);
            if (succeeded) setStoreIdToLink("");
          };

          '''.replace('          ', '')
              text = text.replace(function_anchor, function_block + function_anchor, 1)

          start_marker = '        {tab === "stores" ? ('
          end_marker = '        {tab === "readiness" ? ('
          start = text.find(start_marker)
          end = text.find(end_marker, start + 1)
          if start < 0 or end < 0:
              raise SystemExit(f'stores tab boundaries missing: start={start} end={end}')

          stores_block = '''        {tab === "stores" ? (
            <div style={{ display: "grid", gap: 12 }}>
              <section style={{ display: "grid", gap: 8, border: `1px solid ${neutralScale[200]}`, borderRadius: 12, padding: 16 }}>
                <h3 style={{ margin: 0, fontSize: 14 }}>ربط متجر غير مملوك</h3>
                <CpTextInput
                  value={storeIdToLink}
                  onChange={setStoreIdToLink}
                  placeholder="معرف المتجر"
                  aria-label="معرف المتجر المراد ربطه"
                />
                <CpButton
                  disabled={!storeIdToLink.trim() || stores.actionState.kind === "loading"}
                  onClick={() => void confirmStoreLink()}
                >
                  {stores.actionState.kind === "loading" ? "جارٍ الربط…" : "ربط المتجر بالشريك"}
                </CpButton>
                {stores.actionState.kind === "error" ? (
                  <p role="alert" style={{ color: statusScale.danger, margin: 0 }}>{stores.actionState.message}</p>
                ) : null}
              </section>
              {stores.state.kind === "loading" || stores.state.kind === "idle" ? <CpStatePanel role="status" title="جاري تحميل المتاجر…" />
                : stores.state.kind === "empty" ? <CpStatePanel role="status" title="لا توجد متاجر مرتبطة بهذا الشريك بعد." />
                  : stores.state.kind === "error" ? <CpStatePanel role="alert" title="تعذر تحميل المتاجر" code={stores.state.message}><CpRetryButton onClick={() => void stores.reload()}>إعادة المحاولة</CpRetryButton></CpStatePanel>
                    : (
                      <CpTable aria-label="متاجر الشريك"><thead><tr><CpTableHeaderCell>المتجر</CpTableHeaderCell><CpTableHeaderCell>المدينة</CpTableHeaderCell><CpTableHeaderCell>الحالة</CpTableHeaderCell><CpTableHeaderCell>ظهور العميل</CpTableHeaderCell></tr></thead><tbody>
                        {stores.state.stores.map((store) => <tr key={store.id}><CpTableCell>{store.displayName}</CpTableCell><CpTableCell>{store.cityCode}</CpTableCell><CpTableCell>{store.status}</CpTableCell><CpTableCell>{store.isVisible ? "ظاهر" : "مخفي"}</CpTableCell></tr>)}
                      </tbody></CpTable>
                    )}
            </div>
          ) : null}

'''
          text = text[:start] + stores_block + text[end:]
          path.write_text(text, encoding='utf-8')
          PY
          git config user.name 'bthwani-governance-bot'
          git config user.email 'noreply@bthwani.local'
          git add services/dsh/frontend/control-panel/partners/PartnerDetailOperationalScreen.tsx
          git commit -m 'fix(jrn-001): expose governed unowned-store link action'
          git push origin HEAD:sambassam
      - name: Publish repair status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then STATE=success; DESCRIPTION='FS-10 store link action added'; else STATE=failure; DESCRIPTION='FS-10 store link repair failed'; fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-10-repair-store-link' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json