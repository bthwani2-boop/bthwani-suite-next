name: Cancellation Journey Go Format
run-name: Cancellation Go Format · ${{ github.sha }}

on:
  push:
    branches: ["journey/cancellation-refund-reconciliation-closure"]
    paths:
      - ".github/cancellation-journey-format-trigger"
      - ".github/workflows/cancellation-journey-format.yml"

permissions:
  contents: write

concurrency:
  group: cancellation-journey-format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: false
      - name: Format cancellation journey Go source
        shell: bash
        run: |
          set -euo pipefail
          files=(
            services/dsh/backend/internal/orders/runtime.go
            services/dsh/backend/internal/orders/lifecycle.go
            services/dsh/backend/internal/orders/cancellation_read.go
            services/dsh/backend/internal/checkoutfinanceoutbox/projection.go
            services/dsh/backend/internal/checkoutfinanceoutbox/worker.go
            services/dsh/backend/internal/wlt/cancel_for_order.go
            services/dsh/backend/internal/wlt/finance_proxy.go
            services/dsh/backend/internal/http/order_cancellations.go
            services/dsh/backend/internal/http/operator_order_workboard.go
            services/dsh/backend/cmd/dsh-api/main.go
          )
          gofmt -w "${files[@]}"
          if git diff --quiet; then
            echo "Cancellation journey Go source is already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "style(cancellation-journey): format governed Go source"
          git push origin HEAD:journey/cancellation-refund-reconciliation-closure
