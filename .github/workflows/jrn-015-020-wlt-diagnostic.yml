name: JRN 015-020 WLT boundary diagnostic

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-015-020-wlt-diagnostic.yml]

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Run WLT boundary
        id: wlt
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pnpm run guard:wlt-financial-boundary 2>&1 | tee /tmp/wlt-boundary.log
          exit ${PIPESTATUS[0]}
      - name: Publish first violation
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          VIOLATION="$(grep -m1 -E '^- |financial mutation belongs|direct financial provider|MISSING|DRIFT|FORBIDDEN|INVALID|REINTRODUCED' /tmp/wlt-boundary.log 2>/dev/null || true)"
          TOKEN="$(printf '%s' "$VIOLATION" | tr '[:upper:]' '[:lower:]' | tr -cs '[:alnum:]_.-/' '-' | sed 's/^-//;s/-$//' | cut -c1-72)"
          if [ "${{ steps.wlt.outcome }}" = "success" ]; then
            STATE=success
            CONTEXT='journeys/jrn-015-020/wlt-diagnostic/pass'
          else
            STATE=failure
            CONTEXT="journeys/jrn-015-020/wlt-diagnostic/${TOKEN:-no-violation-exposed}"
          fi
          CONTEXT="$(printf '%s' "$CONTEXT" | cut -c1-100)"
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description 'WLT boundary diagnostic' --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
