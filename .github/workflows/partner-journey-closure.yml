name: Partner Journey Closure
run-name: Partner Journey Closure · ${{ github.ref_name }} · ${{ github.sha }}

on:
  pull_request:
    branches:
      - "tmp/partner-closure-base"
    paths:
      - ".github/partner-closure-trigger"
      - ".github/workflows/partner-journey-closure.yml"
      - "core/identity/**"
      - "core/workforce/**"
      - "services/dsh/backend/**"
      - "services/dsh/database/**"
      - "services/dsh/contracts/**"
      - "services/dsh/frontend/app-partner/**"
      - "services/dsh/frontend/app-field/**"
      - "services/dsh/frontend/control-panel/**"
      - "services/wlt/**"
      - "infra/docker/**"
      - "tools/guards/partner/**"
      - "tools/scripts/invoke-partner-multisurface-runtime-closure.ps1"
      - "tools/scripts/test-dsh-multisurface-runtime-matrix.ps1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: partner-journey-${{ github.ref }}
  cancel-in-progress: true

jobs:
  partner-source-and-database:
    name: Partner source, migrations, and contracts
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dsh_ci
          POSTGRES_PASSWORD: dsh_ci_password
          POSTGRES_DB: dsh_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dsh_ci -d dsh_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://dsh_ci:dsh_ci_password@localhost:5432/dsh_ci?sslmode=disable
      DSH_REQUIRE_DB_TESTS: "true"
    steps:
      - name: Checkout exact SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify DSH format and vet
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l internal/partner internal/http)"
          test -z "$files" || { printf 'Unformatted partner files:\n%s\n' "$files"; exit 1; }
          go vet ./internal/partner ./internal/http
      - name: Apply complete DSH migration chain once
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "applying $migration"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Prove partner audit migration replay safety
        shell: bash
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-088_partner_team_action_runtime_audit.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/tests/dsh-088_partner_team_action_runtime_audit.sql
      - name: Run focused partner Go tests
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -euo pipefail
          go test ./internal/partner -count=1 -v
          go test ./internal/http -count=1 -run 'Partner|TeamMember|StoreTeam|Support|Fleet|Commercial' -v
      - name: Setup governed Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Partner contracts and surface guards
        shell: bash
        run: |
          set -euo pipefail
          pnpm run contracts:lint
          pnpm run guard:partner-surface-truth
          pnpm run guard:partner-support-truth
          pnpm run guard:wlt-financial-boundary

  partner-runtime:
    name: Partner live multi-service runtime
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Setup PowerShell
        shell: bash
        run: pwsh --version
      - name: Build Identity explicitly
        shell: bash
        run: |
          set -euo pipefail
          docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml --profile identity build identity-api
      - name: Run focused partner multi-surface runtime closure
        shell: pwsh
        run: ./tools/scripts/invoke-partner-multisurface-runtime-closure.ps1
      - name: Publish runtime diagnostics on failure
        if: failure()
        shell: bash
        run: |
          docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml --profile identity --profile workforce --profile dsh --profile media --profile wlt ps -a || true
          docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml --profile identity --profile workforce --profile dsh --profile media --profile wlt logs --tail=300 identity-api workforce-api dsh-api wlt-api postgres minio || true
          find artifacts/partner-journey-closure -maxdepth 1 -type f -print -exec tail -n 200 {} \; || true
      - name: Stop focused runtime
        if: always()
        shell: pwsh
        run: ./infra/docker/scripts/runtime.ps1 -Action down -Profiles identity,workforce,dsh,media,wlt
      - name: Upload partner runtime evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: partner-runtime-evidence-${{ github.sha }}
          path: artifacts/partner-journey-closure
          if-no-files-found: warn
          retention-days: 14

  partner-closure-result:
    name: Partner journey closure result
    if: always()
    needs:
      - partner-source-and-database
      - partner-runtime
    runs-on: ubuntu-latest
    steps:
      - name: Require all partner jobs to pass on one SHA
        env:
          SOURCE: ${{ needs.partner-source-and-database.result }}
          RUNTIME: ${{ needs.partner-runtime.result }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'source=%s\nruntime=%s\nsha=%s\n' "$SOURCE" "$RUNTIME" "$GITHUB_SHA"
          test "$SOURCE" = success
          test "$RUNTIME" = success
