name: One-time JRN-001 source repair

on:
  push:
    branches:
      - lianbassam
    paths:
      - .github/workflows/jrn001-source-repair.yml

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: lianbassam
          fetch-depth: 0
      - name: Status pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -f state=pending -f context=bthwani/jrn001-source-repair -f description='JRN-001 source repair running' -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: 1.26.5
          cache: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Install dependencies
        run: |
          corepack enable
          corepack prepare pnpm@10.34.0 --activate
          pnpm install --frozen-lockfile
      - name: Apply repairs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: replacement count {text.count(old)}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace('services/wlt/backend/internal/http/server.go', '''\t// The historical partner URL is retained only as a typed compatibility
\t// adapter. It reaches the same encryption, ownership, audit and one-active-
\t// destination invariants as the current multi-actor routes.
\tmux.HandleFunc("PUT /wlt/payout-destinations/{partnerId}", gate(serviceAuth(payout.HandleUpsertPartnerPayoutDestinationJRN037(db))))
\tmux.HandleFunc("GET /wlt/payout-destinations/{partnerId}", readGate(payout.HandleGetPartnerPayoutDestinationJRN037(db)))
\tmux.HandleFunc("POST /wlt/payout-destinations/{partnerId}/deactivate", gate(serviceAuth(payout.HandleDeactivatePartnerPayoutDestinationJRN037(db))))''', '''\t// JRN-001 keeps the canonical partner contract because DSH depends on its
\t// exact masked response plus durable Idempotency-Key replay. Typed JRN-037
\t// owner routes remain below for partner, captain, and field finance.
\tmux.HandleFunc("PUT /wlt/payout-destinations/{partnerId}", gate(serviceAuth(payout.HandleUpsertPayoutDestinationGoverned(db))))
\tmux.HandleFunc("GET /wlt/payout-destinations/{partnerId}", readGate(payout.HandleGetPayoutDestination(db)))
\tmux.HandleFunc("POST /wlt/payout-destinations/{partnerId}/deactivate", gate(serviceAuth(payout.HandleDeactivatePayoutDestination(db))))''')

          replace('tools/guards/jrn-037-payout-destination-gate.mjs', '''requireIncludes("services/wlt/backend/internal/http/server.go", [
  "HandleUpsertPartnerPayoutDestinationJRN037",
  "HandleGetPartnerPayoutDestinationJRN037",
  "HandleDeactivatePartnerPayoutDestinationJRN037",
  "/wlt/payout-destinations/{actorType}/{actorId}",''', '''requireIncludes("services/wlt/backend/internal/http/server.go", [
  "HandleUpsertPayoutDestinationGoverned",
  "HandleGetPayoutDestination",
  "HandleDeactivatePayoutDestination",
  "/wlt/payout-destinations/{actorType}/{actorId}",''')

          replace('services/dsh/frontend/shared/partner/use-partner-admin-controller.tsx', '''  const detailViewModel = detailState.kind === "success" ? buildPartnerDetailViewModel(detailState.partner) : null;
  return { detailState, detailViewModel, mutationState, reload: load, transition };
}''', '''  const detailViewModel = detailState.kind === "success" ? buildPartnerDetailViewModel(detailState.partner) : null;
  const resetMutation = useCallback(() => setMutationState({ kind: "idle" }), []);
  return { detailState, detailViewModel, mutationState, reload: load, transition, resetMutation };
}''')

          replace('services/dsh/frontend/control-panel/partners/PartnerDetailOperationalScreen.tsx', '''  const confirmStoreLink = async () => {
    const storeId = storeIdToLink.trim();
    if (!storeId) return;
    const succeeded = await stores.linkStore(storeId);
    if (succeeded) setStoreIdToLink("");
  };

  return (''', '''  const confirmStoreLink = async () => {
    const storeId = storeIdToLink.trim();
    if (!storeId) return;
    const succeeded = await stores.linkStore(storeId);
    if (succeeded) setStoreIdToLink("");
  };

  const reloadAfterConflict = async () => {
    const loaded = await detail.reload();
    if (loaded) detail.resetMutation();
  };

  return (''')
          replace('services/dsh/frontend/control-panel/partners/PartnerDetailOperationalScreen.tsx', '<CpRetryButton onClick={() => void detail.reload()}>تحميل أحدث نسخة</CpRetryButton>', '<CpRetryButton onClick={() => void reloadAfterConflict()}>تحميل أحدث نسخة</CpRetryButton>')

          replace('services/dsh/tests/jrn-001-fs-10-support-mutation.test.mjs', 'assert.match(controller, /addTicketMessage\\(ticketId, input, attempt\\.context\\)/);', 'assert.match(controller, /addTicketMessage\\(ticketId, normalizedInput, attempt\\.context\\)/);')
          PY
          gofmt -w services/wlt/backend/internal/http/server.go services/dsh/frontend/shared/partner/use-partner-admin-controller.tsx
      - name: Verify repaired source
        run: |
          node --test services/dsh/tests/jrn-001-fs-04-wlt-boundary.test.mjs services/dsh/tests/jrn-001-fs-06-contracts.test.mjs services/dsh/tests/jrn-001-fs-10-support-mutation.test.mjs services/dsh/tests/jrn-001-fs-11-visible-states.test.mjs
          node tools/guards/jrn-037-payout-destination-gate.mjs
          cd services/wlt/backend && go test ./internal/payout ./internal/http -count=1
      - name: Control-panel typecheck
        run: pnpm --dir apps/control-panel/runtime typecheck
      - name: Commit
        run: |
          rm -f .github/workflows/jrn001-source-repair.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'fix(dsh): repair JRN-001 source and WLT contract'
          git pull --rebase origin lianbassam
          git push origin HEAD:lianbassam
      - name: Status success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -f state=success -f context=bthwani/jrn001-source-repair -f description='JRN-001 source repair passed' -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
      - name: Status failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" -f state=failure -f context=bthwani/jrn001-source-repair -f description='JRN-001 source repair failed' -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
