name: JRN-030 macOS Full-Stack Proof

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    types: [synchronize]

permissions:
  contents: read

concurrency:
  group: jrn-030-macos-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-030 macOS PostgreSQL full-stack proof
    runs-on: macos-15
    timeout-minutes: 35
    env:
      PORT: "58080"
      DSH_AUTH_MODE: identity
    steps:
      - name: Checkout repository state
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify JRN-030 Go ownership and build API
        working-directory: services/dsh/backend
        run: |
          unformatted="$({ find internal/partnerfleet -type f -name '*.go' -print0 | xargs -0 gofmt -l; gofmt -l internal/http/partner_fleet.go internal/http/partner_fleet_membership_routes.go internal/http/partner_fleet_operator.go internal/http/jrn030_partner_fleet_routes_test.go; })"
          test -z "${unformatted}" || { printf 'Unformatted files:\n%s\n' "${unformatted}"; exit 1; }
          go test ./internal/partnerfleet -run '^$'
          go test ./internal/http -run '^TestJourney030ExposesGovernedPartnerFleetRoutes$' -count=1
          go test ./cmd/dsh-api -run '^$'
          go build -o /tmp/dsh-api ./cmd/dsh-api
      - name: Parse strict JRN-030 OpenAPI
        run: |
          ruby -e 'require "yaml"; d=YAML.load_file(ARGV.fetch(0)); abort "expected OpenAPI 3.1.0" unless d["openapi"]=="3.1.0"; expected=%w[ConnectionCode IssuedConnectionCode CaptainFleetMembership OperatorStoreFleetMember OperatorPartnerFleetSnapshot]; schemas=d.dig("components","schemas")||{}; missing=expected.reject{|n| schemas.key?(n)}; abort "missing schemas: #{missing.join(",")}" unless missing.empty?; abort "operator snapshot must be strict" unless schemas.dig("OperatorPartnerFleetSnapshot","additionalProperties")==false' services/dsh/contracts/dsh.partner-fleet.openapi.yaml
      - name: Start PostgreSQL 16
        id: postgres
        shell: bash
        run: |
          set -euo pipefail
          brew list postgresql@16 >/dev/null 2>&1 || brew install postgresql@16
          pg_bin="$(brew --prefix postgresql@16)/bin"
          echo "${pg_bin}" >> "${GITHUB_PATH}"
          rm -rf /tmp/jrn030-pgdata
          "${pg_bin}/initdb" -D /tmp/jrn030-pgdata --auth=trust --encoding=UTF8
          "${pg_bin}/pg_ctl" -D /tmp/jrn030-pgdata -o "-p 55432" -l /tmp/jrn030-postgres.log start
          "${pg_bin}/createdb" -h 127.0.0.1 -p 55432 dsh_jrn_030
          echo "database_url=postgres://$(whoami)@127.0.0.1:55432/dsh_jrn_030?sslmode=disable" >> "${GITHUB_OUTPUT}"
      - name: Apply all DSH migrations
        env:
          DATABASE_URL: ${{ steps.postgres.outputs.database_url }}
        run: |
          for migration in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            echo "Applying ${migration}"
            psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 -f "${migration}"
          done
      - name: Prove JRN-030 database indexes
        env:
          DATABASE_URL: ${{ steps.postgres.outputs.database_url }}
        run: |
          psql "${DATABASE_URL}" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE matched_indexes integer;
          BEGIN
            SELECT COUNT(*) INTO matched_indexes FROM pg_indexes WHERE schemaname='public' AND indexname IN ('uq_dsh_partner_courier_pending_code','uq_dsh_store_team_members_store_identity_actor');
            IF matched_indexes <> 2 THEN RAISE EXCEPTION 'JRN-030 required indexes missing: found % of 2', matched_indexes; END IF;
          END
          $$;
          SQL
      - name: Execute real PostgreSQL fleet lifecycle
        working-directory: services/dsh/backend
        env:
          DATABASE_URL: ${{ steps.postgres.outputs.database_url }}
        run: go test ./internal/partnerfleet -run '^TestPartnerFleetLifecyclePostgres$' -count=1 -v
      - name: Run DSH API and verify governed runtime route
        working-directory: services/dsh/backend
        env:
          DATABASE_URL: ${{ steps.postgres.outputs.database_url }}
        run: |
          /tmp/dsh-api > /tmp/dsh-jrn-030.log 2>&1 &
          api_pid=$!
          trap 'kill ${api_pid} || true; cat /tmp/dsh-jrn-030.log' EXIT
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:58080/dsh/health >/dev/null && break
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:58080/dsh/health
          status=$(curl --silent --output /tmp/operator-response.json --write-out '%{http_code}' http://127.0.0.1:58080/dsh/operator/stores/store-1/partner-fleet)
          test "${status}" = "401" || test "${status}" = "503"
          test "${status}" != "404"
          test -s /tmp/operator-response.json
      - name: Verify shared brain and required TypeScript surfaces
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-030.json --noEmit --pretty false
      - name: Verify full-stack and negative invariants
        run: node --test services/dsh/tests/jrn-030-partner-fleet.test.mjs
      - name: Verify Product Truth schema
        run: node tools/guards/product-truth-gate.mjs
      - name: Build evidence manifest
        run: |
          mkdir -p /tmp/jrn-030-evidence
          printf '{"journey":"JRN-030","commitSha":"%s","runId":"%s","runner":"macos-15","database":"PostgreSQL 16","result":"all-gates-passed"}\n' "${GITHUB_SHA}" "${GITHUB_RUN_ID}" > /tmp/jrn-030-evidence/manifest.json
      - name: Upload evidence manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jrn-030-macos-evidence-${{ github.sha }}
          path: /tmp/jrn-030-evidence/manifest.json
          if-no-files-found: error
          retention-days: 30
      - name: Stop PostgreSQL
        if: always()
        run: |
          pg_bin="$(brew --prefix postgresql@16)/bin"
          "${pg_bin}/pg_ctl" -D /tmp/jrn030-pgdata stop -m fast || true
          cat /tmp/jrn030-postgres.log || true
