name: Export Rich Support Contract Artifacts

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-mobile-contract-export.yml"

permissions:
  contents: read
  statuses: write

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Publish contract export run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          jq -n \
            --arg state pending \
            --arg context bthwani/rich-support-contract-export \
            --arg description "generating indexed DSH support media contracts" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --retry 3 -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Index rich support schemas
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          target = Path('services/dsh/contracts/dsh.openapi.yaml')
          source = target.read_text(encoding='utf-8')
          marker = '''    DshSupportMessage:\n      $ref: "./components/schemas/support.schemas.yaml#/DshSupportMessage"\n'''
          insertion = '''    DshSupportMediaKind:\n      $ref: "./components/schemas/support.schemas.yaml#/DshSupportMediaKind"\n    DshSupportMediaUploadStatus:\n      $ref: "./components/schemas/support.schemas.yaml#/DshSupportMediaUploadStatus"\n    DshSupportMessageAttachmentInput:\n      $ref: "./components/schemas/support.schemas.yaml#/DshSupportMessageAttachmentInput"\n    DshSupportMessageAttachment:\n      $ref: "./components/schemas/support.schemas.yaml#/DshSupportMessageAttachment"\n    DshRichMessageRequest:\n      $ref: "./components/schemas/support.schemas.yaml#/DshRichMessageRequest"\n'''
          if insertion not in source:
              if marker not in source:
                  raise SystemExit('DshSupportMessage registry marker not found')
              source = source.replace(marker, insertion + marker, 1)
          target.write_text(source, encoding='utf-8')
          PY
      - name: Compose DSH OpenAPI
        id: compose
        continue-on-error: true
        shell: bash
        run: pnpm openapi:compose:dsh > /tmp/compose.log 2>&1
      - name: Generate DSH client
        id: generate
        continue-on-error: true
        shell: bash
        run: pnpm openapi:generate:dsh > /tmp/generate.log 2>&1
      - name: Generate DSH catalog client
        id: catalog
        continue-on-error: true
        shell: bash
        run: pnpm openapi:generate:dsh-catalog > /tmp/catalog.log 2>&1
      - name: Lint contract foundation
        id: lint
        continue-on-error: true
        shell: bash
        run: pnpm contracts:lint > /tmp/lint.log 2>&1
      - name: Verify modular DSH contract
        id: verify
        continue-on-error: true
        shell: bash
        run: pnpm openapi:verify:dsh > /tmp/verify.log 2>&1
      - name: Stage generated artifacts and diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/rich-support-contract/services/dsh/contracts/generated
          mkdir -p artifacts/rich-support-contract/services/dsh/clients/generated
          mkdir -p artifacts/rich-support-contract/diagnostics
          cp services/dsh/contracts/dsh.openapi.yaml artifacts/rich-support-contract/services/dsh/contracts/dsh.openapi.yaml
          test ! -f services/dsh/contracts/generated/dsh.bundle.openapi.yaml || cp services/dsh/contracts/generated/dsh.bundle.openapi.yaml artifacts/rich-support-contract/services/dsh/contracts/generated/dsh.bundle.openapi.yaml
          test ! -f services/dsh/clients/generated/dsh-api.ts || cp services/dsh/clients/generated/dsh-api.ts artifacts/rich-support-contract/services/dsh/clients/generated/dsh-api.ts
          test ! -f services/dsh/clients/generated/dsh-catalog-api.ts || cp services/dsh/clients/generated/dsh-catalog-api.ts artifacts/rich-support-contract/services/dsh/clients/generated/dsh-catalog-api.ts
          cp /tmp/compose.log /tmp/generate.log /tmp/catalog.log /tmp/lint.log /tmp/verify.log artifacts/rich-support-contract/diagnostics/
          printf '%s\n' \
            "compose=${{ steps.compose.outcome }}" \
            "generate=${{ steps.generate.outcome }}" \
            "catalog=${{ steps.catalog.outcome }}" \
            "lint=${{ steps.lint.outcome }}" \
            "verify=${{ steps.verify.outcome }}" \
            > artifacts/rich-support-contract/diagnostics/outcomes.txt
      - name: Upload generated contract artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rich-support-contract-${{ github.sha }}
          path: artifacts/rich-support-contract
          if-no-files-found: error
          retention-days: 1
      - name: Fail if any contract step failed
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.compose.outcome }}" = success
          test "${{ steps.generate.outcome }}" = success
          test "${{ steps.catalog.outcome }}" = success
          test "${{ steps.lint.outcome }}" = success
          test "${{ steps.verify.outcome }}" = success
