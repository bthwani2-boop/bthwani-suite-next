name: Export Rich Support Contract Artifacts

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-mobile-contract-export.yml"

permissions:
  contents: write
  statuses: write

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Publish contract export run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          jq -n \
            --arg state pending \
            --arg context bthwani/rich-support-contract-export \
            --arg description "generating indexed DSH support media contracts" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --retry 3 -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json
      - name: Checkout isolated generation branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: automation/rich-support-contract-generation
          fetch-depth: 0
          persist-credentials: true
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Index schemas and update modular authority
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          target = Path('services/dsh/contracts/dsh.openapi.yaml')
          source = target.read_text(encoding='utf-8')
          marker = '''    DshSupportMessage:\n      $ref: "./components/schemas/support.schemas.yaml#/DshSupportMessage"\n'''
          insertion = '''    DshSupportMediaKind:\n      $ref: "./components/schemas/support.schemas.yaml#/DshSupportMediaKind"\n    DshSupportMediaUploadStatus:\n      $ref: "./components/schemas/support.schemas.yaml#/DshSupportMediaUploadStatus"\n    DshSupportMessageAttachmentInput:\n      $ref: "./components/schemas/support.schemas.yaml#/DshSupportMessageAttachmentInput"\n    DshSupportMessageAttachment:\n      $ref: "./components/schemas/support.schemas.yaml#/DshSupportMessageAttachment"\n    DshRichMessageRequest:\n      $ref: "./components/schemas/support.schemas.yaml#/DshRichMessageRequest"\n'''
          if insertion not in source:
              if marker not in source:
                  raise SystemExit('DshSupportMessage registry marker not found')
              source = source.replace(marker, insertion + marker, 1)
          target.write_text(source, encoding='utf-8')

          manifest_path = Path('services/dsh/contracts/dsh.modular.manifest.json')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          manifest['operationIdCount'] = 317
          manifest['componentCounts']['schemas'] = 297
          manifest['schemaDomains']['support'] = 14
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          PY
      - name: Generate and verify DSH contract deliverables
        shell: bash
        run: |
          set -euo pipefail
          pnpm openapi:compose:dsh
          pnpm openapi:generate:dsh
          pnpm openapi:generate:dsh-catalog
          pnpm contracts:lint
          pnpm openapi:verify:dsh
      - name: Commit generated deliverables
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bthwani-contract-generation-bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            services/dsh/contracts/dsh.openapi.yaml \
            services/dsh/contracts/dsh.modular.manifest.json \
            services/dsh/contracts/generated/dsh.bundle.openapi.yaml \
            services/dsh/clients/generated/dsh-api.ts \
            services/dsh/clients/generated/dsh-catalog-api.ts
          if git diff --cached --quiet; then
            echo "Generated DSH contracts already synchronized"
          else
            git commit -m "build(contracts): generate rich support media bindings"
            git push origin HEAD:automation/rich-support-contract-generation
          fi
      - name: Stage generated contract evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/rich-support-contract/services/dsh/contracts/generated
          mkdir -p artifacts/rich-support-contract/services/dsh/clients/generated
          cp services/dsh/contracts/dsh.openapi.yaml artifacts/rich-support-contract/services/dsh/contracts/dsh.openapi.yaml
          cp services/dsh/contracts/dsh.modular.manifest.json artifacts/rich-support-contract/services/dsh/contracts/dsh.modular.manifest.json
          cp services/dsh/contracts/generated/dsh.bundle.openapi.yaml artifacts/rich-support-contract/services/dsh/contracts/generated/dsh.bundle.openapi.yaml
          cp services/dsh/clients/generated/dsh-api.ts artifacts/rich-support-contract/services/dsh/clients/generated/dsh-api.ts
          cp services/dsh/clients/generated/dsh-catalog-api.ts artifacts/rich-support-contract/services/dsh/clients/generated/dsh-catalog-api.ts
      - name: Upload generated contract evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rich-support-contract-${{ github.sha }}
          path: artifacts/rich-support-contract
          if-no-files-found: error
          retention-days: 1
