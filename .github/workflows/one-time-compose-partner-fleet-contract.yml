name: One-time Compose Partner Fleet Contract

on:
  push:
    branches: [bassam]
    paths:
      - '.github/workflows/one-time-compose-partner-fleet-contract.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-compose-partner-fleet-contract
  cancel-in-progress: false

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0

      - name: Add active contract shard to both binding guards
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin bassam
          python3 - <<'PY'
          from pathlib import Path

          backend = Path('tools/guards/backend-api-binding-gate.mjs')
          text = backend.read_text(encoding='utf-8')
          old = 'additionalOpenapi: ["services/dsh/contracts/dsh.marketing-commercial.openapi.yaml"],'
          new = 'additionalOpenapi: [\n      "services/dsh/contracts/dsh.marketing-commercial.openapi.yaml",\n      "services/dsh/contracts/dsh.partner-fleet.openapi.yaml",\n    ],'
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit('backend binding guard anchor mismatch')
              text = text.replace(old, new, 1)
          backend.write_text(text, encoding='utf-8')

          frontend = Path('tools/guards/api-binding-gate.mjs')
          text = frontend.read_text(encoding='utf-8')
          old_decl = 'const dshCommercialPaths = loadOpenApiPaths("services/dsh/contracts/dsh.marketing-commercial.openapi.yaml");'
          new_decl = old_decl + '\nconst dshPartnerFleetPaths = loadOpenApiPaths("services/dsh/contracts/dsh.partner-fleet.openapi.yaml");'
          if new_decl not in text:
              if text.count(old_decl) != 1:
                  raise SystemExit('frontend binding declaration anchor mismatch')
              text = text.replace(old_decl, new_decl, 1)
          old_spread = '  ...dshCommercialPaths,\n  ...wltPaths,'
          new_spread = '  ...dshCommercialPaths,\n  ...dshPartnerFleetPaths,\n  ...wltPaths,'
          if new_spread not in text:
              if text.count(old_spread) != 1:
                  raise SystemExit('frontend binding spread anchor mismatch')
              text = text.replace(old_spread, new_spread, 1)
          frontend.write_text(text, encoding='utf-8')
          PY
          git diff --check

      - name: Commit contract composition
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/guards/backend-api-binding-gate.mjs tools/guards/api-binding-gate.mjs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'fix(contracts): compose partner fleet OpenAPI shard'
          git pull --rebase origin bassam
          git push origin HEAD:bassam
