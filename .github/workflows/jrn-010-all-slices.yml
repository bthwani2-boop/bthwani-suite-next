name: JRN-010 Checkout WLT All Slices

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "contracts/master.openapi.yaml"
      - "governance/product/contracts/jrn-010-checkout-wlt-handoff.product-truth.json"
      - "governance/evidence/JRN-010_CHECKOUT_WLT_ALL_SLICES_CLOSURE.json"
      - "governance/runbooks/JRN-010_CHECKOUT_WLT_OPERATIONS.md"
      - "governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md"
      - "infra/docker/scripts/wlt-migration-probes.ps1"
      - "services/dsh/backend/internal/checkout/**"
      - "services/dsh/backend/internal/coupons/**"
      - "services/dsh/backend/internal/http/checkout.go"
      - "services/dsh/backend/internal/http/wlt_events.go"
      - "services/dsh/backend/internal/wlt/**"
      - "services/dsh/contracts/dsh.jrn-010-checkout.openapi.yaml"
      - "services/dsh/contracts/jrn-010-slice-verification-registry.json"
      - "services/dsh/database/migrations/dsh-910_jrn_010_wlt_event_receipts.sql"
      - "services/dsh/database/tests/dsh-910_jrn_010_wlt_event_receipts.sql"
      - "services/dsh/frontend/shared/checkout/**"
      - "services/dsh/frontend/app-client/checkout/**"
      - "services/dsh/frontend/control-panel/operations/CheckoutActivityScreen.tsx"
      - "services/dsh/tests/jrn-010-all-slices.test.mjs"
      - "services/dsh/tsconfig.jrn-010-020.json"
      - "services/wlt/backend/**"
      - "services/wlt/database/**"
      - "services/wlt/frontend/shared/dsh/**"
      - "tools/guards/checkout/jrn-010-checkout-truth-gate.mjs"
      - ".github/workflows/jrn-010-all-slices.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-010-all-slices-${{ github.sha }}
  cancel-in-progress: false

jobs:
  announce:
    name: Announce JRN-010 all-slices verification
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Publish pending same-commit status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state pending --arg context "journeys/jrn-010/all-slices" --arg description "JRN-010 all-slices verification is running" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json

  static-contracts:
    name: FS-01..18 static contracts and boundaries
    needs: announce
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@10.34.2 --activate
      - name: Verify repository hygiene
        run: git diff --check
      - name: Verify every JRN-010 slice
        run: node --test services/dsh/tests/jrn-010-all-slices.test.mjs
      - name: Verify checkout truth guard
        run: node tools/guards/checkout/jrn-010-checkout-truth-gate.mjs
      - name: Verify sovereign financial boundaries
        run: |
          pnpm guard:fullstack-boundary
          pnpm guard:wlt-financial-boundary
          pnpm guard:no-broken-imports

  dsh-go:
    name: DSH checkout, coupon, WLT and HTTP behavior
    needs: announce
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Check formatting of affected Go files
        id: format
        continue-on-error: true
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -o pipefail
          gofmt -l \
            internal/checkout/wlt_event_atomic.go \
            internal/checkout/wlt_event_atomic_test.go \
            internal/coupons/payment_lifecycle_tx.go \
            internal/http/wlt_events.go | tee /tmp/jrn-010-gofmt.log
          test ! -s /tmp/jrn-010-gofmt.log
      - name: Test DSH checkout boundary
        id: test
        if: always()
        continue-on-error: true
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -o pipefail
          go test ./internal/checkout ./internal/coupons ./internal/wlt ./internal/http -count=1 2>&1 | tee /tmp/jrn-010-dsh-go.log
      - name: Upload DSH Go diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: jrn-010-dsh-go-diagnostics
          path: /tmp/jrn-010-*.log
          retention-days: 7
          if-no-files-found: error
      - name: Enforce DSH Go results
        if: always()
        env:
          FORMAT_RESULT: ${{ steps.format.outcome }}
          TEST_RESULT: ${{ steps.test.outcome }}
        run: test "$FORMAT_RESULT" = success && test "$TEST_RESULT" = success

  wlt-go:
    name: WLT payment-session authority behavior
    needs: announce
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/wlt/backend/go.mod
          cache-dependency-path: services/wlt/backend/go.sum
      - name: Test WLT payment and DSH delivery boundary
        working-directory: services/wlt/backend
        run: go test ./internal/payment ./internal/reference ./internal/dshoutbox -count=1

  frontend-typecheck:
    name: Shared checkout brain and required surfaces
    needs: announce
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Typecheck JRN-010 authorized scope
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm --dir services/dsh exec tsc -p tsconfig.jrn-010-020.json --noEmit --pretty false 2>&1 | tee /tmp/jrn-010-typecheck.log
      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: jrn-010-frontend-typecheck-diagnostics
          path: /tmp/jrn-010-typecheck.log
          retention-days: 7
          if-no-files-found: error
      - name: Enforce frontend result
        if: always()
        env:
          TYPECHECK_RESULT: ${{ steps.typecheck.outcome }}
        run: test "$TYPECHECK_RESULT" = success

  runtime-postgresql:
    name: PostgreSQL migrations, invariants and DSH/WLT health
    needs: announce
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Start governed DSH and WLT runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          pwsh -NoProfile -File infra/docker/scripts/runtime.ps1 -Action up -Profiles dsh,wlt 2>&1 | Tee-Object -FilePath /tmp/jrn-010-runtime.log
      - name: Apply governed DSH and WLT seeds
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          pwsh -NoProfile -File infra/docker/scripts/runtime.ps1 -Action seed -Profiles dsh,wlt 2>&1 | Tee-Object -FilePath /tmp/jrn-010-seed.log
      - name: Verify JRN-010 database invariants
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-Content services/dsh/database/tests/dsh-910_jrn_010_wlt_event_receipts.sql -Raw |
            docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml exec -T postgres psql -U dsh_runtime -d dsh_runtime -v ON_ERROR_STOP=1 2>&1 |
            Tee-Object -FilePath /tmp/jrn-010-database.log
          if ($LASTEXITCODE -ne 0) { throw "JRN-010 PostgreSQL invariant test failed" }
      - name: Verify DSH and WLT health/readiness
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dshHealth = Invoke-RestMethod http://localhost:58080/dsh/health -TimeoutSec 10
          $dshReady = Invoke-RestMethod http://localhost:58080/dsh/readiness -TimeoutSec 10
          $wltHealth = Invoke-RestMethod http://localhost:58083/wlt/health -TimeoutSec 10
          $wltReady = Invoke-RestMethod http://localhost:58083/wlt/readiness -TimeoutSec 10
          if ($dshHealth.status -ne "healthy" -or $dshReady.status -ne "ready") { throw "DSH runtime is not ready" }
          if ($wltHealth.status -ne "healthy" -or $wltReady.status -ne "ready") { throw "WLT runtime is not ready" }
      - name: Capture runtime diagnostics on failure
        if: failure()
        shell: pwsh
        run: pwsh -NoProfile -File infra/docker/scripts/runtime.ps1 -Action doctor -Profiles dsh,wlt 2>&1 | Tee-Object -FilePath /tmp/jrn-010-doctor.log
      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: jrn-010-runtime-postgresql-evidence
          path: /tmp/jrn-010-*.log
          retention-days: 7
          if-no-files-found: warn
      - name: Stop governed runtime
        if: always()
        shell: pwsh
        run: pwsh -NoProfile -File infra/docker/scripts/runtime.ps1 -Action down -Profiles dsh,wlt

  publish-result:
    name: Publish JRN-010 same-commit result
    if: always()
    needs: [announce, static-contracts, dsh-go, wlt-go, frontend-typecheck, runtime-postgresql]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Publish final same-commit status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          STATIC_RESULT: ${{ needs.static-contracts.result }}
          DSH_GO_RESULT: ${{ needs.dsh-go.result }}
          WLT_GO_RESULT: ${{ needs.wlt-go.result }}
          FRONTEND_RESULT: ${{ needs.frontend-typecheck.result }}
          RUNTIME_RESULT: ${{ needs.runtime-postgresql.result }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          state=failure
          description="JRN-010 all-slices verification failed"
          if [ "$STATIC_RESULT" = success ] && [ "$DSH_GO_RESULT" = success ] && [ "$WLT_GO_RESULT" = success ] && [ "$FRONTEND_RESULT" = success ] && [ "$RUNTIME_RESULT" = success ]; then
            state=success
            description="JRN-010 FS-01..FS-18 technical verification passed"
          fi
          jq -n --arg state "$state" --arg context "journeys/jrn-010/all-slices" --arg description "$description" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
