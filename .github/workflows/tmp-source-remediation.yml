name: Temporary Source Remediation

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-source-remediation.yml"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/tmp-source-remediation.yml"

permissions:
  contents: write

concurrency:
  group: temporary-source-remediation-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout latest sambassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: true
      - name: Add governed contract state
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          contracts = [
              Path("services/dsh/contracts/dsh.jrn-029.openapi.yaml"),
              Path("services/dsh/contracts/jrn-033-representative-finance.openapi.yaml"),
              Path("services/dsh/contracts/jrn-035-refunds.openapi.yaml"),
              Path("services/wlt/contracts/jrn-035-refunds.openapi.yaml"),
              Path("services/wlt/contracts/jrn-036-settlements-commissions.openapi.yaml"),
              Path("services/wlt/contracts/jrn-037-payouts-destinations.openapi.yaml"),
              Path("services/wlt/contracts/jrn-038-cod-custody.openapi.yaml"),
          ]
          for path in contracts:
              text = path.read_text(encoding="utf-8")
              if "x-bthwani-contract-state:" in text:
                  continue
              lines = text.splitlines(keepends=True)
              if not lines or not lines[0].startswith("openapi:"):
                  raise SystemExit(f"unexpected OpenAPI header: {path}")
              lines.insert(1, "x-bthwani-contract-state: CONTRACT_ACTIVE\n")
              path.write_text("".join(lines), encoding="utf-8")
          PY
      - name: Commit deterministic metadata fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No source changes required."
            exit 0
          fi
          git config user.name "bthwani-governance-bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            services/dsh/contracts/dsh.jrn-029.openapi.yaml \
            services/dsh/contracts/jrn-033-representative-finance.openapi.yaml \
            services/dsh/contracts/jrn-035-refunds.openapi.yaml \
            services/wlt/contracts/jrn-035-refunds.openapi.yaml \
            services/wlt/contracts/jrn-036-settlements-commissions.openapi.yaml \
            services/wlt/contracts/jrn-037-payouts-destinations.openapi.yaml \
            services/wlt/contracts/jrn-038-cod-custody.openapi.yaml
          git commit -m "fix(contracts): declare active journey contracts"
          for attempt in 1 2 3; do
            if git push origin HEAD:sambassam; then
              exit 0
            fi
            git pull --rebase origin sambassam
          done
          exit 1
