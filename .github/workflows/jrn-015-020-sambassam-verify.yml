name: JRN 015-020 sambassam verification

on:
  push:
    branches:
      - sambassam
    paths:
      - .github/workflows/jrn-015-020-sambassam-verify.yml
      - services/dsh/backend/internal/http/delivery_proof_upload.go
      - services/dsh/backend/internal/http/dispatch_location_integrity.go
      - services/dsh/backend/internal/http/journeys_015_020_test.go
      - services/dsh/backend/internal/http/server.go
      - services/dsh/database/migrations/dsh-096_delivery_proof_media_integrity.sql
      - services/dsh/database/migrations/dsh-097_dispatch_location_integrity.sql
      - services/dsh/contracts/dsh.delivery-proof-media.openapi.yaml
      - services/dsh/frontend/shared/media/pod/delivery-proof-media.api.ts
      - services/dsh/frontend/shared/delivery/delivery.actions.ts
      - services/dsh/frontend/shared/delivery/use-captain-order-runtime.ts
      - services/dsh/frontend/shared/partner-delivery/use-partner-delivery-controller.tsx
      - services/dsh/frontend/app-partner/orders/PartnerFulfillmentActionsPanel.tsx
      - tools/scripts/build-swagger-static.mjs

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-015-020-sambassam-${{ github.sha }}
  cancel-in-progress: false

jobs:
  targeted-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout pinned source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Run governed backend tests
        working-directory: services/dsh/backend
        run: go test ./internal/http ./internal/dispatch ./internal/partnerdelivery

      - name: Verify migration integrity guards
        shell: bash
        run: |
          set -euo pipefail
          grep -q "dsh_validate_captain_delivery_proof_reference" services/dsh/database/migrations/dsh-096_delivery_proof_media_integrity.sql
          grep -q "dsh_validate_partner_delivery_proof_reference" services/dsh/database/migrations/dsh-096_delivery_proof_media_integrity.sql
          grep -q "dsh_validate_dispatch_location_timestamp" services/dsh/database/migrations/dsh-097_dispatch_location_integrity.sql
          ! grep -R "captain-confirmed-delivery" services/dsh/frontend/shared/delivery

      - name: Setup locked Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0

      - name: Activate locked pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm --version

      - name: Install locked workspace
        run: pnpm install --frozen-lockfile

      - name: Validate delivery proof OpenAPI
        run: pnpm exec openapi-typescript services/dsh/contracts/dsh.delivery-proof-media.openapi.yaml --output /tmp/dsh-delivery-proof-media.d.ts

      - name: Create journey-scoped TypeScript project
        run: |
          mkdir -p .tmp
          cat > .tmp/jrn-015-020.tsconfig.json <<'JSON'
          {
            "extends": "../tsconfig.base.json",
            "compilerOptions": { "noEmit": true },
            "files": [
              "../services/dsh/frontend/css-modules.d.ts",
              "../services/dsh/frontend/shared/media/pod/delivery-proof-media.api.ts",
              "../services/dsh/frontend/shared/delivery/delivery.actions.ts",
              "../services/dsh/frontend/shared/delivery/use-captain-order-runtime.ts",
              "../services/dsh/frontend/shared/partner-delivery/use-partner-delivery-controller.tsx",
              "../services/dsh/frontend/app-partner/orders/PartnerFulfillmentActionsPanel.tsx",
              "../services/dsh/frontend/shared/pickup/use-pickup-controller.tsx",
              "../services/dsh/frontend/control-panel/operations/PickupWorkbenchScreen.tsx",
              "../services/dsh/frontend/app-client/orders/OrderTrackingScreen.tsx",
              "../services/dsh/frontend/app-captain/orders/DshCaptainPoDSubmissionScreen.tsx"
            ]
          }
          JSON

      - name: Typecheck journey files and consumers
        run: pnpm exec tsc --noEmit -p .tmp/jrn-015-020.tsconfig.json

      - name: Full-stack ownership boundary
        run: pnpm run guard:fullstack-boundary

      - name: WLT financial boundary
        run: pnpm run guard:wlt-financial-boundary

      - name: Publish targeted commit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATE="success"
            DESCRIPTION="JRN-015..020 targeted checks passed"
          else
            STATE="failure"
            DESCRIPTION="JRN-015..020 targeted checks failed"
          fi
          jq -n \
            --arg state "$STATE" \
            --arg context "journeys/jrn-015-020-targeted" \
            --arg description "$DESCRIPTION" \
            --arg target_url "$TARGET_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' \
            > /tmp/status.json
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
