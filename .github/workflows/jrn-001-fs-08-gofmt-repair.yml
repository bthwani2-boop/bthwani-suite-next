name: JRN-001 FS-08 gofmt repair

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-08-gofmt-repair.yml]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.26.5'
          cache: false
      - name: Apply gofmt to FS-08 files
        shell: bash
        run: |
          gofmt -w \
            services/dsh/backend/internal/partnerwltoutbox/outbox.go \
            services/dsh/backend/internal/partnerwltoutbox/outbox_db_test.go \
            services/dsh/backend/internal/wlt/payout_destination.go \
            services/dsh/backend/cmd/dsh-api/main.go
          if git diff --quiet; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git config user.name 'bthwani-governance-bot'
          git config user.email 'noreply@bthwani.local'
          git add \
            services/dsh/backend/internal/partnerwltoutbox/outbox.go \
            services/dsh/backend/internal/partnerwltoutbox/outbox_db_test.go \
            services/dsh/backend/internal/wlt/payout_destination.go \
            services/dsh/backend/cmd/dsh-api/main.go
          git commit -m 'style(jrn-001): gofmt FS-08 event boundary'
          git push origin HEAD:sambassam
