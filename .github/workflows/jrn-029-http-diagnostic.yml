name: JRN-029 HTTP Test Diagnostic

on:
  pull_request:
    branches: [sambassam]
    paths:
      - "governance/evidence/JRN-029_HTTP_DIAGNOSTIC_TRIGGER.txt"

permissions:
  contents: read

concurrency:
  group: jrn-029-http-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: Isolate JRN-029 HTTP tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact repository state
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Capture operational route test
        id: route-test
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set +e
          go test ./internal/http -run '^TestJRN029OperationalPolicyRoutes/get_operational_profile$' -count=1 -v > /tmp/jrn029-route-test.log 2>&1
          status=$?
          cat /tmp/jrn029-route-test.log
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0
      - name: Upload route diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jrn-029-route-diagnostic-${{ github.sha }}
          path: /tmp/jrn029-route-test.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail when route test failed
        if: steps.route-test.outputs.status != '0'
        run: exit 1
