name: Cancellation Journey Final Patch
run-name: Cancellation Final Patch · ${{ github.sha }}

on:
  push:
    branches: ["journey/cancellation-refund-reconciliation-closure"]
    paths:
      - ".github/cancellation-journey-final-patch-trigger"
      - ".github/workflows/cancellation-journey-final-patch.yml"
      - "tools/scripts/patch-cancellation-journey-final.py"

permissions:
  contents: write

concurrency:
  group: cancellation-final-patch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
      - uses: ./.github/actions/setup-node-workspace
      - name: Apply deterministic cancellation closure patch
        shell: bash
        run: python tools/scripts/patch-cancellation-journey-final.py
      - name: Format affected Go packages
        shell: bash
        run: |
          gofmt -w \
            services/dsh/backend/internal/dispatch/dispatch.go \
            services/dsh/backend/internal/dispatch/dispatch_helpers.go \
            services/dsh/backend/internal/pickup/pickup.go \
            services/dsh/backend/internal/pickup/service.go \
            services/dsh/backend/internal/http/pickup.go
      - name: Generate governed clients
        shell: bash
        run: |
          pnpm run openapi:generate:dsh
          pnpm run openapi:generate:wlt
      - name: Verify final patch contents
        shell: bash
        run: |
          set -euo pipefail
          grep -F '/wlt/order-cancellations:' services/wlt/contracts/wlt.openapi.yaml
          grep -F 'WltGovernedOrderCancellationResponse' services/wlt/clients/generated/wlt-api.ts
          grep -F 'cancellationReason' services/dsh/contracts/dsh.openapi.yaml
          grep -F 'PICKUP_CANCELLED' services/dsh/backend/internal/http/pickup.go
          grep -F "status = 'cancelled'" services/dsh/database/migrations/dsh-091_pickup_cancellation_state.sql
      - name: Commit generated closure
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            services/dsh/backend/internal/dispatch/dispatch.go \
            services/dsh/backend/internal/dispatch/dispatch_helpers.go \
            services/dsh/backend/internal/pickup/pickup.go \
            services/dsh/backend/internal/pickup/service.go \
            services/dsh/backend/internal/http/pickup.go \
            services/dsh/contracts/dsh.openapi.yaml \
            services/dsh/clients/generated/dsh-api.ts \
            services/wlt/contracts/wlt.openapi.yaml \
            services/wlt/clients/generated/wlt-api.ts
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "fix(cancellation-journey): close WLT contract captain and pickup states"
          git push origin HEAD:journey/cancellation-refund-reconciliation-closure
