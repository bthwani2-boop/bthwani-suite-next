name: JRN-001 FS-03 State Policy

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/backend/internal/partner/model.go
      - services/dsh/backend/internal/partner/state_policy.go
      - services/dsh/backend/internal/partner/state_policy_handlers.go
      - services/dsh/backend/internal/partner/state_policy_test.go
      - services/dsh/backend/internal/http/partner_onboarding_integrity.go
      - services/dsh/backend/internal/http/partner_self_routes.go
      - .github/workflows/jrn-001-fs-03-state-policy.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.24.5'
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify Go formatting
        shell: bash
        run: |
          test -z "$(gofmt -l \
            services/dsh/backend/internal/partner/state_policy.go \
            services/dsh/backend/internal/partner/state_policy_handlers.go \
            services/dsh/backend/internal/partner/state_policy_test.go \
            services/dsh/backend/internal/http/partner_onboarding_integrity.go \
            services/dsh/backend/internal/http/partner_self_routes.go)"
      - name: Test FS-03 state policy and negative invariants
        working-directory: services/dsh/backend
        run: go test ./internal/partner -run 'TestPartnerActivationStateMachine|TestFieldSurface|TestPartnerSurface|TestClientActions|TestOperatorAllowedActions|TestPartnerStateView'
      - name: Publish FS-03 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then
            STATE=success
            DESCRIPTION='FS-03 state policy verified'
          else
            STATE=failure
            DESCRIPTION='FS-03 state policy failed'
          fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-03-state-policy' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
