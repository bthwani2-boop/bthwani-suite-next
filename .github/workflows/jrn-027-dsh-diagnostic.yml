name: JRN-027 DSH Compiler Diagnostic

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/jrn-027-dsh-diagnostic.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jrn-027-dsh-diagnostic-${{ github.sha }}
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sambassam
          fetch-depth: 0
          show-progress: false
      - run: git pull --rebase origin sambassam
      - run: python3 tools/scripts/run-jrn-027-closure.py
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
      - name: Capture DSH compiler result
        shell: bash
        run: |
          set +e
          gofmt -w services/dsh/backend/internal/http services/dsh/backend/internal/marketing services/dsh/backend/internal/wlt
          (
            cd services/dsh/backend
            go test ./internal/http ./internal/marketing ./internal/wlt -count=1
            status=$?
            if [ "$status" -eq 0 ]; then
              go build ./internal/http ./internal/marketing ./internal/wlt
              status=$?
            fi
            exit "$status"
          ) > /tmp/jrn027-dsh.log 2>&1
          status=$?
          cat /tmp/jrn027-dsh.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/jrn027-dsh.log /tmp/jrn027-dsh.saved.log
            git fetch origin sambassam
            git reset --hard origin/sambassam
            mkdir -p governance/evidence
            cp /tmp/jrn027-dsh.saved.log governance/evidence/JRN-027_DSH_BUILD_FAILURE.log
            git config user.name "bthwani-journey-closure"
            git config user.email "actions@users.noreply.github.com"
            git add governance/evidence/JRN-027_DSH_BUILD_FAILURE.log
            git commit -m "chore(jrn-027): persist DSH compiler diagnostic [skip ci]"
            git push origin HEAD:sambassam
            exit "$status"
          fi
