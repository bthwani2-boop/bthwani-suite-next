name: One-time query security scanner run

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/query-security-scanner-run.yml"

permissions:
  actions: read
  contents: write

jobs:
  query:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout lianbassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: lianbassam
          fetch-depth: 0
          show-progress: false

      - name: Query runs for scanner trigger commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TARGET_SHA: 1e44100b16706701719855ff4c54adc41c9aa700
        run: |
          set -euo pipefail
          mkdir -p governance/evidence/security
          gh api "repos/${REPOSITORY}/actions/runs?head_sha=${TARGET_SHA}&per_page=100" \
            --jq '{total_count: .total_count, runs: [.workflow_runs[] | {id, name, path, status, conclusion, event, head_sha, html_url}]}' \
            > governance/evidence/security/security-scanner-run-state.json

      - name: Commit query result
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/query-security-scanner-run.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(ci): record security scanner run state"
          git pull --rebase origin lianbassam
          git push origin HEAD:lianbassam
