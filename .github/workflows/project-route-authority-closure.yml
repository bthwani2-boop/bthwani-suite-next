name: Project Route Authority Closure

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/project-route-authority-closure.yml"
      - "tools/scripts/project-route-authority-closure.py"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/project-route-authority-closure.yml"
      - "tools/scripts/project-route-authority-closure.py"

permissions:
  contents: write

concurrency:
  group: project-route-authority-closure
  cancel-in-progress: false

jobs:
  close:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout latest sambassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: true
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Set up Go from DSH module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Apply route authority closure
        run: python tools/scripts/project-route-authority-closure.py
      - name: Verify DSH
        shell: bash
        run: |
          gofmt -w services/dsh/backend/internal/http/server.go services/dsh/backend/internal/http/governed_incidents.go services/dsh/backend/cmd/dsh-api/main.go
          cd services/dsh/backend
          go test ./... -count=1
          go build ./...
      - name: Verify contracts and bindings
        shell: bash
        run: |
          node tools/guards/_openapi-utils.test.mjs
          pnpm run contracts:lint
          pnpm run guard:api-binding
          pnpm run guard:backend-api-binding
          pnpm run guard:service-manifest-drift
          pnpm run guard:frontend-feature-binding
      - name: Commit verified authority closure
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bthwani-governance-bot"
          git config user.email "actions@users.noreply.github.com"
          git add services/dsh/backend/internal/http/server.go services/dsh/backend/internal/http/governed_incidents.go services/dsh/backend/cmd/dsh-api/main.go services/dsh/contracts/paths/support.paths.yaml services/dsh/contracts/dsh.openapi.yaml services/dsh/contracts/paths/catalog.paths.yaml services/dsh/contracts/dsh.catalog.openapi.yaml services/dsh/contracts/contract-registry.ts services/wlt/contracts/jrn-038-cod-custody.openapi.yaml tools/guards/backend-api-binding-gate.mjs
          if git diff --cached --quiet; then
            echo "No route authority changes required."
            exit 0
          fi
          git commit -m "fix(routes): align runtime and contract authority"
          for attempt in 1 2 3; do
            if git push origin HEAD:sambassam; then exit 0; fi
            git pull --rebase origin sambassam
          done
          exit 1