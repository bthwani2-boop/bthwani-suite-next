name: JRN-001 FS-09 shared brain repair

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-09-shared-brain-repair.yml]

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Repair shared runtime and adapter
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          runtime = Path('services/dsh/frontend/shared/partner/partner-onboarding.runtime.ts')
          text = runtime.read_text(encoding='utf-8')
          pattern = re.compile(r'''  const payoutDisplay =\n(?:    .*\n)+?    "";''')
          replacement = '''  const payoutDisplay =
            partner.maskedAccountNumber ||
            partner.maskedIban ||
            partner.maskedMobileNumber ||
            "";'''.replace('            ', '    ')
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'expected one payoutDisplay block, found {count}')
          runtime.write_text(text, encoding='utf-8')

          api = Path('services/dsh/frontend/shared/partner/partner.api.ts')
          text = api.read_text(encoding='utf-8')
          old_import = 'import type { DshGovernedPartner, PartnerMutationContext } from "./partner-onboarding.runtime";'
          new_import = 'import { createPartnerMutationContext, type DshGovernedPartner, type PartnerMutationContext } from "./partner-onboarding.runtime";'
          if old_import not in text:
              raise SystemExit('partner runtime import not found')
          text = text.replace(old_import, new_import, 1)
          pattern = re.compile(r'''function request<T>\(path: string, options: PartnerRequestOptions = \{\}\): Promise<T> \{.*?\n\}''', re.S)
          replacement = '''function request<T>(path: string, options: PartnerRequestOptions = {}): Promise<T> {
            const mutation = options.method && options.method !== "GET"
              ? {
                  ...createPartnerMutationContext(options.method.toLowerCase(), path, options.mutation?.expectedVersion),
                  ...options.mutation,
                }
              : options.mutation;
            return httpClient.request<T>(path, {
              method: options.method,
              body: options.body,
              idempotencyKey: mutation?.idempotencyKey,
              correlationId: mutation?.correlationId,
              expectedVersion: mutation?.expectedVersion,
            });
          }'''.replace('          ', '')
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'expected one request helper, found {count}')
          api.write_text(text, encoding='utf-8')

          barrel = Path('services/dsh/frontend/shared/partner/index.ts')
          text = barrel.read_text(encoding='utf-8')
          marker = 'export * from "./partner.workflow";'
          export_block = '''export * from "./partner.workflow";
          export type {
            DshPartnerAllowedAction,
            DshGovernedPartner,
            PartnerMutationContext,
            PartnerOnboardingRuntimeState,
            PartnerOnboardingFailure,
            PartnerOnboardingViewModel,
          } from "./partner-onboarding.runtime";
          export {
            createPartnerMutationContext,
            derivePartnerOnboardingViewModel,
            mapPartnerOnboardingFailure,
            assertPartnerReadback,
          } from "./partner-onboarding.runtime";'''.replace('          ', '')
          if 'assertPartnerReadback' not in text:
              if marker not in text:
                  raise SystemExit('partner barrel marker not found')
              text = text.replace(marker, export_block, 1)
          barrel.write_text(text, encoding='utf-8')
          PY
          git config user.name 'bthwani-governance-bot'
          git config user.email 'noreply@bthwani.local'
          git add \
            services/dsh/frontend/shared/partner/partner-onboarding.runtime.ts \
            services/dsh/frontend/shared/partner/partner.api.ts \
            services/dsh/frontend/shared/partner/index.ts
          git commit -m 'fix(jrn-001): govern shared onboarding adapter'
          git push origin HEAD:sambassam
      - name: Publish repair status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then STATE=success; DESCRIPTION='FS-09 shared adapter repaired'; else STATE=failure; DESCRIPTION='FS-09 shared adapter repair failed'; fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-09-repair-shared' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json