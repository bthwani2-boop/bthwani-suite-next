name: JRN-032 Operational Analytics Verification

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/jrn-032-pr-verification.yml"
      - "governance/evidence/JRN-032_VERIFICATION_TRIGGER.md"
      - "governance/product-truth/JRN-032_OPERATIONAL_ANALYTICS.md"
      - "governance/evidence/JRN-032_SLICE_VERIFICATION.json"
      - "services/dsh/backend/internal/analytics/**"
      - "services/dsh/backend/internal/http/analytics.go"
      - "services/dsh/backend/internal/http/jrn032_*"
      - "services/dsh/backend/internal/http/delivery_proof_routes.go"
      - "services/dsh/backend/internal/wlt/analytics_read*"
      - "services/dsh/contracts/**"
      - "services/dsh/frontend/shared/analytics/**"
      - "services/dsh/frontend/control-panel/analytics/**"
      - "services/dsh/frontend/app-partner/account/PartnerAnalyticsInsightsPanel.tsx"
      - "apps/control-panel/runtime/src/app/dsh/analytics/**"

permissions:
  contents: read

concurrency:
  group: jrn-032-pr-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: Immutable PR analytics proof
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout immutable verification head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
          run_install: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify governed Go formatting without rewriting source
        run: |
          files=$(gofmt -l services/dsh/backend/internal/analytics services/dsh/backend/internal/http/analytics.go services/dsh/backend/internal/http/jrn032_analytics.go services/dsh/backend/internal/http/jrn032_routes.go services/dsh/backend/internal/http/jrn032_routes_test.go services/dsh/backend/internal/http/delivery_proof_routes.go services/dsh/backend/internal/wlt/analytics_read.go services/dsh/backend/internal/wlt/analytics_read_test.go)
          test -z "$files" || { printf '%s\n' "$files"; exit 1; }
      - name: Verify canonical OpenAPI and generated client
        run: |
          pnpm --dir services/dsh openapi:verify
          git diff --exit-code -- services/dsh/contracts services/dsh/clients/generated/dsh-api.ts
      - name: Test analytics backend
        working-directory: services/dsh/backend
        run: go test ./internal/analytics ./internal/wlt ./internal/http
      - name: Typecheck affected surfaces
        run: |
          pnpm --dir services/dsh typecheck
          pnpm --dir apps/control-panel/runtime typecheck
          pnpm --dir apps/app-partner/runtime typecheck
      - name: Verify full-stack, financial, and repository contracts
        run: |
          pnpm run guard:fullstack-boundary
          pnpm run guard:wlt-financial-boundary
          pnpm run contracts:lint
      - name: Verify workflow did not rewrite repository source
        run: git diff --exit-code
