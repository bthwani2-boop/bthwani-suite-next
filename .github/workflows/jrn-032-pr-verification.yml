name: JRN-032 Final Operational Analytics Verification

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout immutable verification branch
        uses: actions/checkout@v4
        with:
          ref: verify/jrn-032-final-8f2d3e7
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Compose canonical JRN-032 contract
        run: node tools/scripts/patch-jrn032-openapi.mjs

      - name: Format governed Go files
        working-directory: services/dsh/backend
        run: |
          gofmt -w \
            internal/analytics/analytics.go \
            internal/analytics/jrn032_window.go \
            internal/analytics/jrn032_preparation.go \
            internal/analytics/jrn032_people.go \
            internal/analytics/jrn032_drilldown.go \
            internal/analytics/jrn032_window_test.go \
            internal/analytics/jrn032_drilldown_test.go \
            internal/http/analytics.go \
            internal/http/jrn032_analytics.go \
            internal/http/jrn032_routes.go \
            internal/http/jrn032_routes_test.go \
            internal/http/delivery_proof_routes.go \
            internal/wlt/analytics_read.go \
            internal/wlt/analytics_read_test.go

      - name: Verify and generate DSH OpenAPI
        run: pnpm --dir services/dsh openapi:verify

      - name: Materialize contract and formatting on snapshot
        run: |
          if git diff --quiet; then
            echo "No materialized changes required."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(jrn-032): materialize final contract and formatting [skip ci]"
            git pull --rebase origin verify/jrn-032-final-8f2d3e7
            git push origin HEAD:verify/jrn-032-final-8f2d3e7
          fi

      - name: Test analytics backend
        working-directory: services/dsh/backend
        run: go test ./internal/analytics ./internal/wlt ./internal/http

      - name: Typecheck DSH surfaces
        run: pnpm --dir services/dsh typecheck

      - name: Typecheck control panel
        run: pnpm --dir apps/control-panel/runtime typecheck

      - name: Typecheck partner app
        run: pnpm --dir apps/app-partner/runtime typecheck

      - name: Verify full-stack and financial boundaries
        run: |
          pnpm run guard:fullstack-boundary
          pnpm run guard:wlt-financial-boundary

      - name: Verify repository contracts
        run: pnpm run contracts:lint

      - name: Record passed remote verification
        env:
          VERIFIED_SOURCE_SHA: 8f2d3e7179388749f26979652af8f1727e7036e0
          VERIFIED_RUN_ID: ${{ github.run_id }}
          VERIFIED_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          verified_at = datetime.now(timezone.utc).isoformat()
          registry_path = Path("governance/evidence/JRN-032_SLICE_VERIFICATION.json")
          registry = json.loads(registry_path.read_text(encoding="utf-8"))
          for item in registry["slices"]:
              if item["id"] in {"JRN-032-S16", "JRN-032-S18"}:
                  item["status"] = "verified_remote"
          registry["formalDecision"] = "READY_FOR_INDEPENDENT_ACCEPTANCE"
          registry["remoteVerification"] = {
              "sourceSha": os.environ["VERIFIED_SOURCE_SHA"],
              "workflowRunId": int(os.environ["VERIFIED_RUN_ID"]),
              "runAttempt": int(os.environ["VERIFIED_RUN_ATTEMPT"]),
              "verifiedAt": verified_at,
              "checks": [
                  "canonical OpenAPI composition and generated client",
                  "Go analytics, WLT, and HTTP tests",
                  "DSH surface TypeScript typecheck",
                  "control-panel runtime typecheck",
                  "partner runtime typecheck",
                  "full-stack ownership boundary guard",
                  "WLT financial ownership boundary guard",
                  "repository contract lint"
              ]
          }
          registry_path.write_text(json.dumps(registry, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          Path("governance/evidence/JRN-032_FINAL_REMOTE_VERIFICATION.md").write_text(f"""# JRN-032 Final Remote Verification

- repository_mode: REMOTE_ONLY
- source_branch: sambassam
- immutable_verification_branch: verify/jrn-032-final-8f2d3e7
- verified_source_sha: {os.environ['VERIFIED_SOURCE_SHA']}
- workflow_run_id: {os.environ['VERIFIED_RUN_ID']}
- run_attempt: {os.environ['VERIFIED_RUN_ATTEMPT']}
- verified_at: {verified_at}
- technical_decision: READY_FOR_INDEPENDENT_ACCEPTANCE

## Passed checks

- Canonical DSH OpenAPI composition and generated TypeScript client.
- Go tests for analytics windows, canonical drill-down, route registration, fail-closed periods, and WLT read-only boundary.
- DSH shared and sovereign surface typecheck.
- Control-panel runtime typecheck.
- Partner runtime typecheck.
- Full-stack ownership boundary guard.
- WLT financial ownership boundary guard.
- Repository contract lint.

## Independent gates not self-approved

- Product Manager approval.
- Product Owner acceptance.
- Financial-control approval for the WLT read-only exposure.
- Deployment and live-environment runtime evidence.
""", encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/evidence/JRN-032_SLICE_VERIFICATION.json governance/evidence/JRN-032_FINAL_REMOTE_VERIFICATION.md
          git commit -m "docs(jrn-032): record final remote verification [skip ci]"
          git pull --rebase origin verify/jrn-032-final-8f2d3e7
          git push origin HEAD:verify/jrn-032-final-8f2d3e7
