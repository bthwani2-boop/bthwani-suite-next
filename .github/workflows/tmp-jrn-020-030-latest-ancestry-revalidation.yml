name: Temporary JRN-020..030 Latest Ancestry Revalidation

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-jrn-020-030-latest-ancestry-revalidation.yml"

permissions:
  contents: write
  statuses: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout sambassam
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: true
      - name: Include support-session ancestry in final compile
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin sambassam
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/jrn-020-030-final-closure.yml')
          content = path.read_text(encoding='utf-8')
          replacements = [
              (
                  '      - "services/dsh/backend/internal/support/**"\n',
                  '      - "services/dsh/backend/internal/support/**"\n      - "services/dsh/backend/internal/supportsession/**"\n',
              ),
              (
                  '      - "services/dsh/backend/internal/http/support*.go"\n',
                  '      - "services/dsh/backend/internal/http/support*.go"\n      - "services/dsh/backend/internal/http/administration_support_sessions.go"\n',
              ),
              (
                  '          ./internal/support\n',
                  '          ./internal/support\n          ./internal/supportsession\n',
              ),
          ]
          for before, after in replacements:
              if after in content:
                  continue
              if content.count(before) != 1:
                  raise SystemExit(f'expected one workflow patch target: {before!r}')
              content = content.replace(before, after, 1)
          path.write_text(content, encoding='utf-8')
          PY
          git diff --check
      - name: Commit and push latest ancestry validation
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Final gate already includes support-session ancestry."
            exit 0
          fi
          git config user.name "bthwani-journey-automation"
          git config user.email "actions@users.noreply.github.com"
          git add .github/workflows/jrn-020-030-final-closure.yml
          git commit -m "ci(jrn-020-030): validate support-session ancestry in final gate"
          for attempt in $(seq 1 10); do
            git fetch origin sambassam
            git rebase origin/sambassam
            if git push origin HEAD:sambassam; then
              exit 0
            fi
            git rebase --abort || true
            sleep 2
          done
          exit 1
      - name: Publish patcher result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          state=failure
          description="Latest ancestry patch failed"
          if [ "$JOB_STATUS" = success ]; then
            state=success
            description="Latest ancestry patch applied"
          fi
          jq -n --arg state "$state" --arg context "journeys/jrn-020-030/latest-ancestry-patcher" --arg description "$description" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
