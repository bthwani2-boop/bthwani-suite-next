name: JRN-001 tenant isolation verification

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/jrn001-tenant-isolation-verify.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: jrn001-tenant-isolation-lianbassam
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout lianbassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: lianbassam
          fetch-depth: 0

      - name: Publish running status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=pending \
            -f context='bthwani/jrn001-tenant-isolation' \
            -f description='Full tenant isolation verification is running' \
            -f target_url="${RUN_URL}"

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"

      - name: Format and validate source contracts
        shell: bash
        run: |
          set -euo pipefail
          gofmt -w \
            services/dsh/backend/internal/partner/tenant_context.go \
            services/dsh/backend/internal/partner/tenant_repository.go \
            services/dsh/backend/internal/partner/tenant_scopes.go \
            services/dsh/backend/internal/partner/tenant_handler.go \
            services/dsh/backend/internal/partner/tenant_isolation_db_test.go \
            services/dsh/backend/internal/partner/repository_db_test.go \
            services/dsh/backend/internal/partner/repository_authz_test.go \
            services/dsh/backend/internal/partner/handler_test.go \
            services/dsh/backend/internal/partner/handler.go \
            services/dsh/backend/internal/http/partner_tenant_boundary.go \
            services/dsh/backend/internal/http/partner_tenant_boundary_test.go \
            services/dsh/backend/internal/http/partner_lifecycle_routes.go \
            services/dsh/backend/internal/http/partner_self_routes.go \
            services/dsh/backend/internal/http/protected_store.go \
            services/dsh/backend/internal/store/tenant_repository.go \
            services/dsh/backend/internal/store/governance.go
          python -m json.tool governance/product/contracts/jrn-001-partner-onboarding-store-publication.product-truth.json >/dev/null
          grep -q 'TENANT_CONTEXT_REQUIRED' services/dsh/backend/internal/http/partner_tenant_boundary.go
          grep -q 'ListPartnersForTenant' services/dsh/backend/internal/partner/tenant_repository.go
          grep -q 'ListAllStoresForTenant' services/dsh/backend/internal/store/tenant_repository.go
          grep -q 'tenant_id = $3' services/dsh/backend/internal/store/governance.go
          grep -q 'uq_dsh_partners_tenant_legal_identity' services/dsh/database/migrations/dsh-103_jrn001_partner_tenant_isolation.sql

      - name: Run DSH Go tests
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -euo pipefail
          go test ./...

      - name: Start PostgreSQL runtime
        shell: bash
        run: |
          set -euo pipefail
          docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml up -d postgres
          for attempt in {1..60}; do
            if docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml exec -T postgres pg_isready -U bthwani_runtime -d bthwani_runtime; then
              exit 0
            fi
            sleep 2
          done
          docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml logs postgres
          exit 1

      - name: Apply governed DSH migrations
        shell: pwsh
        run: ./infra/docker/scripts/invoke-runtime-database-migrations.ps1 -Service dsh -SourceCommitSha $env:GITHUB_SHA

      - name: Run PostgreSQL tenant isolation tests
        working-directory: services/dsh/backend
        shell: bash
        env:
          DSH_REQUIRE_DB_TESTS: "true"
          DATABASE_URL: postgres://dsh_runtime:dsh_runtime_password@127.0.0.1:55432/dsh_runtime?sslmode=disable
        run: |
          set -euo pipefail
          go test ./internal/partner ./internal/http

      - name: Run JRN-001 contract gates
        shell: bash
        run: |
          set -euo pipefail
          node --test services/dsh/tests/jrn-001-*.test.mjs
          node tools/guards/partner/jrn-001-security-privacy-gate.mjs

      - name: Record verified evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p governance/evidence
          cat > governance/evidence/JRN-001_TENANT_ISOLATION_REMOTE_VERIFICATION.md <<EOF
          # JRN-001 tenant isolation remote verification

          - Source branch: \`lianbassam\`
          - Verification source SHA: \`${GITHUB_SHA}\`
          - Go unit/package tests: PASS
          - Governed DSH migration chain: PASS
          - PostgreSQL tenant-isolation integration tests: PASS
          - Partner and store scope isolation tests: PASS
          - JRN-001 contract tests: PASS
          - JRN-001 security/privacy gate: PASS
          - Product truth JSON validation: PASS
          - Runtime UI and visual evidence: NOT EXECUTED by this verification workflow
          - Merge, release, and production deployment: NOT PERFORMED
          EOF

      - name: Commit formatted source and evidence
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/jrn001-tenant-isolation-verify.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(dsh): verify JRN-001 tenant isolation"
          git pull --rebase origin lianbassam
          git push origin HEAD:lianbassam

      - name: Publish success
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=success \
            -f context='bthwani/jrn001-tenant-isolation' \
            -f description='Tenant isolation verification passed and evidence was committed' \
            -f target_url="${RUN_URL}"

      - name: PostgreSQL diagnostics
        if: failure()
        shell: bash
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml logs postgres || true

      - name: Publish failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=failure \
            -f context='bthwani/jrn001-tenant-isolation' \
            -f description='Tenant isolation verification failed' \
            -f target_url="${RUN_URL}"
