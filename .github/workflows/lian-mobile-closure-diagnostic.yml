name: Diagnose Mobile Closure Finalizer

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-mobile-closure-diagnostic.yml"

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Extract and execute finalizer
        id: finalizer
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          python3 - <<'PY'
          import base64, gzip, re
          from pathlib import Path
          workflow = Path('.github/workflows/lian-mobile-closure-apply.yml').read_text(encoding='utf-8')
          match = re.search(r'payload = "([A-Za-z0-9+/=]+)"', workflow)
          if not match:
              raise RuntimeError('FINALIZER_PAYLOAD_NOT_FOUND')
          Path('/tmp/finalize.py').write_bytes(gzip.decompress(base64.b64decode(match.group(1))))
          PY
          mkdir -p artifacts/mobile-closure-diagnostic
          if ! python3 /tmp/finalize.py >artifacts/mobile-closure-diagnostic/finalizer.out 2>artifacts/mobile-closure-diagnostic/finalizer.err; then
            tail -n 1 artifacts/mobile-closure-diagnostic/finalizer.err | tr '\n' ' ' | cut -c1-130 >/tmp/finalizer.status
            exit 1
          fi
          printf '%s\n' 'FINALIZER_SUCCEEDED' >artifacts/mobile-closure-diagnostic/finalizer.err
          printf '%s' 'FINALIZER_SUCCEEDED' >/tmp/finalizer.status
      - name: Upload transient diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mobile-closure-finalizer-${{ github.sha }}
          path: artifacts/mobile-closure-diagnostic
          if-no-files-found: error
          retention-days: 1
      - name: Publish diagnostic result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          description="$(cat /tmp/finalizer.status 2>/dev/null || printf 'FINALIZER_DIAGNOSTIC_FAILED')"
          state=success
          if [[ "${{ steps.finalizer.outcome }}" != "success" ]]; then state=failure; fi
          jq -n \
            --arg state "$state" \
            --arg context bthwani/mobile-closure-diagnostic \
            --arg description "$description" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --retry 3 -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json
