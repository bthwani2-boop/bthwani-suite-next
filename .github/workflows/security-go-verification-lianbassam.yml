name: One-time lianbassam Go security verification

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/security-go-verification-lianbassam.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: security-go-verification-lianbassam
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout current lianbassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: lianbassam
          fetch-depth: 0
          show-progress: false

      - name: Publish run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=pending \
            -f context='bthwani/go-security-verification' \
            -f description='Go module verification is running' \
            -f target_url="${RUN_URL}"

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache: false

      - name: Verify, test, and build every Go module
        id: verify_go
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p governance/evidence/security/go-modules
          summary="governance/evidence/security/go-security-verification.md"
          : > "${summary}"
          {
            echo "# Go security dependency verification"
            echo
            echo "- Branch: lianbassam"
            echo "- Go: $(go version)"
            echo "- Master merge: not performed"
            echo
            echo "| Module | mod verify | tests | build |"
            echo "|---|---:|---:|---:|"
          } >> "${summary}"

          overall=0
          while IFS= read -r module_file; do
            module_dir="$(dirname "${module_file}")"
            safe_name="$(echo "${module_dir}" | tr '/.' '__')"
            log_file="governance/evidence/security/go-modules/${safe_name}.log"
            : > "${log_file}"

            pushd "${module_dir}" >/dev/null

            go mod verify >> "${GITHUB_WORKSPACE}/${log_file}" 2>&1
            verify_code=$?

            go test ./... -count=1 >> "${GITHUB_WORKSPACE}/${log_file}" 2>&1
            test_code=$?

            go build ./... >> "${GITHUB_WORKSPACE}/${log_file}" 2>&1
            build_code=$?

            popd >/dev/null

            if [[ ${verify_code} -ne 0 || ${test_code} -ne 0 || ${build_code} -ne 0 ]]; then
              overall=1
            fi

            printf '| `%s` | %s | %s | %s |\n' \
              "${module_dir}" "${verify_code}" "${test_code}" "${build_code}" >> "${summary}"
          done < <(find core services -path '*/backend/go.mod' -type f | sort)

          echo >> "${summary}"
          if [[ ${overall} -eq 0 ]]; then
            echo "Result: PASS — every discovered Go module verified, tested, and built." >> "${summary}"
            echo "result=success" >> "${GITHUB_OUTPUT}"
          else
            echo "Result: FAIL — inspect per-module logs in governance/evidence/security/go-modules/." >> "${summary}"
            echo "result=failure" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit verification evidence
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/security-go-verification-lianbassam.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(security): record Go module verification"
          git pull --rebase origin lianbassam
          git push origin HEAD:lianbassam

      - name: Publish success
        if: steps.verify_go.outputs.result == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=success \
            -f context='bthwani/go-security-verification' \
            -f description='All Go modules verified, tested, and built' \
            -f target_url="${RUN_URL}"

      - name: Publish failure and fail job
        if: steps.verify_go.outputs.result != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=failure \
            -f context='bthwani/go-security-verification' \
            -f description='One or more Go modules failed verification' \
            -f target_url="${RUN_URL}"
          exit 1
