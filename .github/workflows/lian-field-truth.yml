name: Lian Field Truth

on:
  push:
    branches: [lian]
    paths:
      - "services/dsh/frontend/app-field/**"
      - "apps/app-field/runtime/**"
      - "services/dsh/frontend/shared/field/**"
      - "services/dsh/frontend/shared/catalog/**"
      - "services/dsh/frontend/shared/finance/**"
      - "tools/guards/field/**"
      - ".github/workflows/lian-field-truth.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lian-field-truth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  field-truth:
    name: Field static truth and type safety
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Verify field truth
        run: node tools/guards/field/field-surface-truth-gate.mjs

      - name: Verify DSH and WLT boundaries
        shell: bash
        run: |
          set -euo pipefail
          pnpm run guard:api-binding
          pnpm run guard:frontend-feature-binding
          pnpm run guard:fullstack-boundary
          pnpm run guard:wlt-financial-boundary
          pnpm run guard:no-broken-imports

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Test workspace
        run: pnpm run test

  result:
    name: Lian Field Truth result
    if: always()
    needs: [field-truth]
    runs-on: ubuntu-latest
    steps:
      - name: Require field truth to pass
        env:
          RESULT: ${{ needs.field-truth.result }}
        shell: bash
        run: |
          set -euo pipefail
          test "$RESULT" = success
