name: JRN-004 Store Context Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "services/dsh/backend/internal/store/**"
      - "services/dsh/backend/internal/http/server.go"
      - "services/dsh/backend/internal/http/protected_store.go"
      - "services/dsh/backend/internal/http/store_publication_diagnostics.go"
      - "services/dsh/contracts/dsh.openapi.yaml"
      - "services/dsh/clients/generated/dsh-api.ts"
      - "services/dsh/frontend/shared/store/**"
      - "services/dsh/frontend/shared/partner/**"
      - "services/dsh/frontend/app-client/store/**"
      - "services/dsh/frontend/app-partner/store/**"
      - "services/dsh/frontend/app-partner/account/PartnerHubScreen.tsx"
      - "services/dsh/frontend/control-panel/partners/stores/**"
      - "services/dsh/tests/jrn-004-store-context-governance.test.mjs"
      - "services/dsh/tsconfig.jrn-004.json"
      - ".github/workflows/jrn-004-store-context-verify.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-004-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-004 full-stack targeted checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup Node workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Verify JRN-004 static, TypeScript, and Go behavior
        id: targeted
        continue-on-error: true
        shell: bash
        run: |
          set +e
          : >/tmp/jrn-004-evidence.log

          node --test services/dsh/tests/jrn-004-store-context-governance.test.mjs 2>&1 | tee -a /tmp/jrn-004-evidence.log
          STATIC_EXIT=${PIPESTATUS[0]}

          pnpm --dir services/dsh exec tsc --project tsconfig.jrn-004.json 2>&1 | tee -a /tmp/jrn-004-evidence.log
          TS_EXIT=${PIPESTATUS[0]}

          (
            cd services/dsh/backend
            go test ./internal/store ./internal/http -count=1
          ) 2>&1 | tee -a /tmp/jrn-004-evidence.log
          GO_EXIT=${PIPESTATUS[0]}

          git diff --check 2>&1 | tee -a /tmp/jrn-004-evidence.log
          DIFF_EXIT=${PIPESTATUS[0]}

          printf 'static=%s typescript=%s go=%s diff=%s\n' "$STATIC_EXIT" "$TS_EXIT" "$GO_EXIT" "$DIFF_EXIT" | tee -a /tmp/jrn-004-evidence.log
          if [ "$STATIC_EXIT" -ne 0 ] || [ "$TS_EXIT" -ne 0 ] || [ "$GO_EXIT" -ne 0 ] || [ "$DIFF_EXIT" -ne 0 ]; then exit 1; fi

      - name: Upload JRN-004 evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-004-store-context-evidence
          path: /tmp/jrn-004-evidence.log
          retention-days: 3
          if-no-files-found: error

      - name: Publish same-commit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFY_OUTCOME: ${{ steps.targeted.outcome }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=success
          DESCRIPTION="JRN-004 store context checks passed"
          if [ "$VERIFY_OUTCOME" != success ]; then
            STATE=failure
            DESCRIPTION="JRN-004 static, TypeScript, or Go check failed"
          fi
          jq -n --arg state "$STATE" --arg context "journeys/jrn-004/store-context" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/jrn-004-status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/jrn-004-status.json

      - name: Enforce JRN-004 result
        if: always()
        env:
          VERIFY_OUTCOME: ${{ steps.targeted.outcome }}
        run: test "$VERIFY_OUTCOME" = success
