name: JRN-001 FS-14 Experience Quality

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/contracts/jrn-001-experience-quality-registry.json
      - services/dsh/frontend/app-field/onboarding/**
      - services/dsh/frontend/app-partner/account/**
      - services/dsh/frontend/control-panel/partners/**
      - services/dsh/frontend/shared/partner/**
      - tools/guards/partner/jrn-001-experience-quality-gate.mjs
      - .github/workflows/jrn-001-fs-14-experience-quality.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Verify accessibility RTL performance and weak network
        run: node tools/guards/partner/jrn-001-experience-quality-gate.mjs
      - name: Typecheck required surfaces
        run: |
          pnpm --dir apps/app-field/runtime typecheck
          pnpm --dir apps/app-partner/runtime typecheck
          pnpm --dir apps/control-panel/runtime typecheck
      - name: Publish FS-14 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ "$RESULT" = success ] && STATE=success || STATE=failure
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-14-experience-quality' --arg description "FS-14 experience quality: $RESULT" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
