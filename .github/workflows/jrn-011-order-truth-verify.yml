name: JRN-011 Order Truth Verification

on:
  workflow_dispatch:
  push:
    branches:
      - sambassam
    paths:
      - ".github/workflows/jrn-011-order-truth-verify.yml"
      - "governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md"
      - "governance/evidence/jrn-011-order-truth-evidence.json"
      - "governance/evidence/jrn-011-order-truth-evidence.md"
      - "governance/product/contracts/jrn-011-order-creation-truth.product-truth.json"
      - "services/dsh/backend/internal/http/order_truth*.go"
      - "services/dsh/backend/internal/orders/order_truth*.go"
      - "services/dsh/backend/internal/wlt/**"
      - "services/dsh/contracts/dsh.order-truth.openapi.yaml"
      - "services/dsh/contracts/jrn-011-*.json"
      - "services/dsh/database/migrations/dsh-90[2-5]_*.sql"
      - "services/dsh/database/tests/dsh-90[2-5]_*.sql"
      - "services/dsh/frontend/shared/order-truth/**"
      - "services/dsh/frontend/shared/checkout/use-checkout-to-order-flow.tsx"
      - "services/dsh/frontend/app-partner/orders/OperationalOrdersInboxScreen.tsx"
      - "services/dsh/frontend/control-panel/operations/OrderJourneyLiveOrdersScreen.tsx"
      - "services/dsh/tests/jrn-011-order-*.test.mjs"
      - "services/dsh/tsconfig.jrn-011.json"
      - "tools/guards/jrn-011-cross-surface-integrity-gate.mjs"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-011-order-truth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-integrity:
    name: FS-01..FS-18 executable closure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
      - name: Cross-surface binding gate
        run: node tools/guards/jrn-011-cross-surface-integrity-gate.mjs
      - name: Execute every registered JRN-011 slice assertion
        shell: bash
        run: |
          set -o pipefail
          node --test services/dsh/tests/jrn-011-order-*.test.mjs 2>&1 | tee jrn011-static-tests.log
      - name: Preserve static failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jrn011-static-tests-log
          path: jrn011-static-tests.log
          retention-days: 3
          if-no-files-found: error

  go-contracts:
    name: FS-03/04/07/08/13 Go contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Produce canonical gofmt output
        shell: bash
        run: |
          set -euo pipefail
          files=(
            services/dsh/backend/internal/http/order_truth.go
            services/dsh/backend/internal/http/order_truth_correlation.go
            services/dsh/backend/internal/http/order_truth_validation_test.go
            services/dsh/backend/internal/orders/order_truth.go
            services/dsh/backend/internal/orders/order_truth_queries.go
            services/dsh/backend/internal/orders/order_truth_test.go
            services/dsh/backend/internal/orders/order_truth_db_test.go
          )
          gofmt -w "${files[@]}"
          git diff -- "${files[@]}" > jrn011-gofmt.patch
      - name: Preserve canonical formatted files
        uses: actions/upload-artifact@v4
        with:
          name: jrn011-gofmt-output
          path: |
            jrn011-gofmt.patch
            services/dsh/backend/internal/orders/order_truth_queries.go
            services/dsh/backend/internal/orders/order_truth_db_test.go
          retention-days: 3
          if-no-files-found: error
      - name: Reject formatting drift
        run: test ! -s jrn011-gofmt.patch
      - name: Verify order truth and WLT read boundary
        working-directory: services/dsh/backend
        run: go test ./internal/orders ./internal/http ./internal/wlt -count=1

  database-invariants:
    name: FS-05/08/13 PostgreSQL lifecycle
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jrn011
          POSTGRES_PASSWORD: jrn011
          POSTGRES_DB: jrn011
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jrn011 -d jrn011"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: jrn011
      PGPASSWORD: jrn011
      PGDATABASE: jrn011
      DATABASE_URL: postgres://jrn011:jrn011@127.0.0.1:5432/jrn011?sslmode=disable
      DSH_REQUIRE_DB_TESTS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply DSH migrations in lexical order
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r migration; do
            echo "Applying ${migration}"
            psql -v ON_ERROR_STOP=1 -f "${migration}"
          done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
      - name: Verify immutable order and outbox SQL invariants
        run: psql -v ON_ERROR_STOP=1 -f services/dsh/database/tests/dsh-902_903_jrn011_order_truth_invariants.sql
      - name: Verify read-only WLT projection SQL invariants
        run: psql -v ON_ERROR_STOP=1 -f services/dsh/database/tests/dsh-905_jrn011_payment_projection_invariants.sql
      - name: Execute live create, replay, conflict, isolation, redaction and immutability proof
        working-directory: services/dsh/backend
        shell: bash
        run: |
          set -o pipefail
          go test ./internal/orders -run '^TestCreateOrderTruthLifecycleDBIntegration$' -count=1 -v 2>&1 | tee ../../../jrn011-db-lifecycle.log
      - name: Preserve database lifecycle failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jrn011-db-lifecycle-log
          path: jrn011-db-lifecycle.log
          retention-days: 3
          if-no-files-found: error

  typescript-binding:
    name: FS-09/10/11/14/16 TypeScript binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --reporter=silent
      - name: Typecheck JRN-011 shared brain and surfaces
        shell: bash
        run: |
          set -o pipefail
          pnpm --dir services/dsh exec tsc -p tsconfig.jrn-011.json --noEmit 2>&1 | tee jrn011-typecheck.log
      - name: Preserve TypeScript failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jrn011-typecheck-log
          path: jrn011-typecheck.log
          retention-days: 3
          if-no-files-found: error

  publish-verification-status:
    name: FS-17/18 publish governed closure
    if: always()
    needs:
      - static-integrity
      - go-contracts
      - database-invariants
      - typescript-binding
    runs-on: ubuntu-latest
    steps:
      - name: Publish result on the exact verified commit
        env:
          GH_TOKEN: ${{ github.token }}
          STATIC_RESULT: ${{ needs.static-integrity.result }}
          GO_RESULT: ${{ needs.go-contracts.result }}
          DATABASE_RESULT: ${{ needs.database-invariants.result }}
          TYPESCRIPT_RESULT: ${{ needs.typescript-binding.result }}
        shell: bash
        run: |
          set -euo pipefail
          state=success
          description="JRN-011 FS-01..FS-18 code and automated evidence passed"
          for result in "$STATIC_RESULT" "$GO_RESULT" "$DATABASE_RESULT" "$TYPESCRIPT_RESULT"; do
            if [[ "$result" != "success" ]]; then
              state=failure
              description="JRN-011 slice closure failed; inspect the workflow run"
              break
            fi
          done
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="jrn-011/order-truth" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          [[ "$state" == "success" ]]
