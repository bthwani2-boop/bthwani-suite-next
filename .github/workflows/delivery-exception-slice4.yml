name: Delivery Exception Slice Four
run-name: Delivery Exception Slice Four · ${{ github.sha }}

on:
  push:
    branches: ["journey/delivery-exception-redelivery-closure"]
    paths:
      - ".github/workflows/delivery-exception-slice4.yml"
      - "tools/scripts/patch-delivery-exception-slice4.py"
      - "tools/scripts/patch-delivery-exception-slice4-corrections.py"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: delivery-exception-slice4-${{ github.ref }}
  cancel-in-progress: true

jobs:
  implement-verify-clean:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsh_delivery_reassign
          POSTGRES_USER: dsh_delivery_reassign
          POSTGRES_PASSWORD: dsh_delivery_reassign
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U dsh_delivery_reassign -d dsh_delivery_reassign"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DSH_DATABASE_URL: postgres://dsh_delivery_reassign:dsh_delivery_reassign@localhost:55432/dsh_delivery_reassign?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-workspace

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Apply governed reassignment slice
        shell: bash
        run: |
          set -euo pipefail
          python tools/scripts/patch-delivery-exception-slice4.py
          python tools/scripts/patch-delivery-exception-slice4-corrections.py
          gofmt -w \
            services/dsh/backend/internal/dispatch/delivery_exceptions.go \
            services/dsh/backend/internal/dispatch/delivery_reassignment_db_test.go \
            services/dsh/backend/internal/http/dispatch.go

      - name: Generate and prove DSH contract
        shell: bash
        run: |
          set -euo pipefail
          pnpm run openapi:generate:dsh
          grep -F 'reassign_captain' services/dsh/contracts/dsh.openapi.yaml
          grep -F 'newCaptainId' services/dsh/clients/generated/dsh-api.ts
          grep -F 'replacementAssignmentId' services/dsh/clients/generated/dsh-api.ts
          grep -F 'replacementCaptainId' services/dsh/clients/generated/dsh-api.ts

      - name: Compile focused backend
        shell: bash
        run: |
          set -euo pipefail
          cd services/dsh/backend
          go test ./internal/dispatch ./internal/http ./cmd/dsh-api -run '^$' -count=1

      - name: Typecheck operations surface
        id: control_panel_typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/delivery-exception-slice4-typecheck
          pnpm exec tsc -p apps/control-panel/runtime/tsconfig.delivery-exception-journey.json --noEmit --pretty false 2>&1 \
            | tee artifacts/delivery-exception-slice4-typecheck/typecheck.log
          exit ${PIPESTATUS[0]}

      - name: Upload control-panel diagnostic
        if: steps.control_panel_typecheck.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: delivery-exception-slice4-typecheck-${{ github.sha }}
          path: artifacts/delivery-exception-slice4-typecheck/typecheck.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on control-panel typecheck failure
        if: steps.control_panel_typecheck.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Apply migrations and prove atomic reassignment
        shell: bash
        run: |
          set -euo pipefail
          for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" >/dev/null
          done
          psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-092_delivery_exception_lifecycle.sql >/dev/null
          (
            cd services/dsh/backend
            DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" \
              go test ./internal/dispatch -run '^TestDeliveryException(ReassignsBeforePickupAtomically|RejectsReassignmentAfterPickup)DBIntegration$' -count=1 -v
          )

      - name: Prove Workforce-backed fixture-free flow
        shell: bash
        run: |
          set -euo pipefail
          screen="services/dsh/frontend/control-panel/operations/ExceptionsEscalationsScreen.tsx"
          grep -F 'listCaptains' "$screen"
          grep -F 'isEligibleCaptain' "$screen"
          grep -F 'resolveDeliveryExceptionReassignCaptain' "$screen"
          grep -F 'replacement-captain-select' "$screen"
          ! grep -Ei '(mock|fixture|demo)[A-Za-z0-9_]*[[:space:]]*=' "$screen"

      - name: Remove temporary files and commit verified slice
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/delivery-exception-slice4.yml \
            tools/scripts/patch-delivery-exception-slice4.py \
            tools/scripts/patch-delivery-exception-slice4-corrections.py
          git add -A
          git commit -m "feat(delivery-exception): add atomic pre-pickup reassignment [skip ci]"
          git pull --rebase origin journey/delivery-exception-redelivery-closure
          git push origin HEAD:journey/delivery-exception-redelivery-closure
          final_sha="$(git rev-parse HEAD)"
          jq -n --arg state success --arg context "Delivery Exception Slice Four" --arg description "atomic Workforce-backed pre-pickup reassignment verified" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$final_sha" \
            -d @status.json

      - name: Publish focused failure status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state failure --arg context "Delivery Exception Slice Four" --arg description "governed reassignment slice failed" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/${{ github.sha }}" \
            -d @status.json
