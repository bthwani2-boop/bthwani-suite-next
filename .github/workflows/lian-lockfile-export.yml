name: Export Regenerated Mobile Lockfile

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-lockfile-export.yml"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
      - name: Regenerate lockfile
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.34.0 --activate
          pnpm install --lockfile-only --no-frozen-lockfile
      - name: Upload regenerated lockfile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lian-mobile-lockfile-${{ github.sha }}
          path: pnpm-lock.yaml
          if-no-files-found: error
          retention-days: 1
