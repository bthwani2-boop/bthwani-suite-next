name: Export Regenerated Mobile Lockfile

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-lockfile-export.yml"

permissions:
  contents: read
  statuses: write

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Publish lockfile export run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          jq -n \
            --arg state pending \
            --arg context bthwani/mobile-lockfile-export \
            --arg description "regenerating pnpm lockfile" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --retry 3 -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
      - name: Regenerate lockfile
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.34.0 --activate
          pnpm install --lockfile-only --no-frozen-lockfile
      - name: Upload regenerated lockfile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lian-mobile-lockfile-${{ github.sha }}
          path: pnpm-lock.yaml
          if-no-files-found: error
          retention-days: 1
