name: JRN-013 Primary Contract Sync

on:
  push:
    branches:
      - sambassam
    paths:
      - ".github/workflows/jrn-013-contract-enum-migration.yml"

permissions:
  contents: write

concurrency:
  group: jrn-013-primary-contract-sync
  cancel-in-progress: false

jobs:
  synchronize:
    if: contains(github.event.head_commit.message, '[jrn013-contract-sync]')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sambassam
          fetch-depth: 0

      - name: Synchronize primary contract artifacts
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin sambassam
          node tools/contracts/sync-jrn-013-handoff-reasons.mjs --write
          node tools/contracts/sync-jrn-013-handoff-reasons.mjs

      - name: Commit synchronized artifacts
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- \
            services/dsh/contracts/dsh.openapi.yaml \
            services/dsh/clients/generated/dsh-api.ts \
            services/dsh/tests/store-captain-handoff-closure.test.mjs; then
            echo "JRN-013 contract artifacts already synchronized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            services/dsh/contracts/dsh.openapi.yaml \
            services/dsh/clients/generated/dsh-api.ts \
            services/dsh/tests/store-captain-handoff-closure.test.mjs
          git commit -m "fix(jrn-013): synchronize primary handoff exception contract"
          git pull --rebase origin sambassam
          git push origin HEAD:sambassam
