name: Logic Coverage

on:
  push:
    branches: [ "master", "implementing" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: logic-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  logic-gates:
    name: Logic Coverage Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard — Go route AST
        run: pnpm run guard:go-routes-ci

      - name: Guard — logic coverage
        run: pnpm run guard:logic-coverage

      - name: Guard — a11y
        run: pnpm run guard:a11y

      - name: Guard — dependency graph
        run: pnpm run guard:dependency-graph

      - name: Guard — ast-grep rules
        run: pnpm run guard:ast-grep-rules
