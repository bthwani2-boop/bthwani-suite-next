name: JRN-020..030 One-Time Typecheck Autofix

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/jrn-020-030-typecheck-autofix.yml"

permissions:
  contents: write

concurrency:
  group: jrn-020-030-typecheck-autofix
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout sambassam
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: true
      - name: Apply exact TypeScript fixes
        shell: bash
        run: |
          git pull --ff-only origin sambassam
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path("services/dsh/frontend/control-panel/marketing/components/CouponsCommandDeck.tsx"): (
                  "readonly policy?: CouponFundingPolicy;",
                  "readonly policy?: CouponFundingPolicy | undefined;",
              ),
              Path("services/dsh/frontend/control-panel/marketing/components/SubscriptionsCommandDeck.tsx"): (
                  "wltProductReference: wltProductReference.trim() || undefined,",
                  "...(wltProductReference.trim() ? { wltProductReference: wltProductReference.trim() } : {}),",
              ),
          }

          for path, (before, after) in replacements.items():
              content = path.read_text(encoding="utf-8")
              if after in content:
                  continue
              count = content.count(before)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement target, found {count}")
              path.write_text(content.replace(before, after), encoding="utf-8")
          PY
          git diff --check
      - name: Commit and push fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Exact fixes already present."
            exit 0
          fi
          git config user.name "bthwani-journey-automation"
          git config user.email "actions@users.noreply.github.com"
          git add \
            services/dsh/frontend/control-panel/marketing/components/CouponsCommandDeck.tsx \
            services/dsh/frontend/control-panel/marketing/components/SubscriptionsCommandDeck.tsx
          git commit -m "fix(jrn-026-027): satisfy exact optional property contracts"
          for attempt in 1 2 3; do
            git fetch origin sambassam
            git rebase origin/sambassam
            if git push origin HEAD:sambassam; then
              exit 0
            fi
          done
          exit 1
