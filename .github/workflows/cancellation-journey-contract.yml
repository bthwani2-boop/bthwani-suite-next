name: Cancellation Journey Contract Patch
run-name: Cancellation Contract · ${{ github.sha }}

on:
  push:
    branches: ["journey/cancellation-refund-reconciliation-closure"]
    paths:
      - ".github/cancellation-journey-contract-trigger"
      - ".github/workflows/cancellation-journey-contract.yml"

permissions:
  contents: write

concurrency:
  group: cancellation-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
      - uses: ./.github/actions/setup-node-workspace
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - name: Patch cancellation contract
        shell: bash
        run: python tools/scripts/patch-cancellation-refund-openapi.py
      - name: Generate DSH client from patched contract
        shell: bash
        run: pnpm run openapi:generate:dsh
      - name: Verify generated cancellation paths and schemas
        shell: bash
        run: |
          set -euo pipefail
          grep -F '/dsh/client/orders/{orderId}/cancel' services/dsh/contracts/dsh.openapi.yaml
          grep -F '/dsh/partner/orders/{orderId}/cancel' services/dsh/contracts/dsh.openapi.yaml
          grep -F '/dsh/operator/orders/{orderId}/cancellation' services/dsh/contracts/dsh.openapi.yaml
          grep -F 'cancelled_by_client' services/dsh/clients/generated/dsh-api.ts
          grep -F 'DshOrderCancellation' services/dsh/clients/generated/dsh-api.ts
      - name: Commit contract and generated client
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/dsh/contracts/dsh.openapi.yaml services/dsh/clients/generated/dsh-api.ts
          git commit -m "feat(cancellation-journey): publish governed cancellation contract"
          git push origin HEAD:journey/cancellation-refund-reconciliation-closure
