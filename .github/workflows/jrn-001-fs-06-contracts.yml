name: JRN-001 FS-06 Contracts

on:
  push:
    branches: [sambassam]
    paths:
      - services/dsh/contracts/dsh.partner-onboarding.openapi.yaml
      - services/wlt/contracts/wlt.payout-destination.openapi.yaml
      - services/dsh/contracts/jrn-001-operation-registry.json
      - services/dsh/frontend/shared/partner/partner.api.ts
      - services/dsh/backend/internal/wlt/payout_destination.go
      - services/wlt/backend/internal/http/server.go
      - services/dsh/tests/jrn-001-fs-06-contracts.test.mjs
      - tools/scripts/build-swagger-static.mjs
      - .github/workflows/jrn-001-fs-06-contracts.yml

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Install locked dependencies
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          pnpm install --frozen-lockfile
      - name: Generate types from JRN-001 DSH contract
        run: pnpm exec openapi-typescript services/dsh/contracts/dsh.partner-onboarding.openapi.yaml --output /tmp/jrn-001-dsh.ts
      - name: Generate types from JRN-001 WLT contract
        run: pnpm exec openapi-typescript services/wlt/contracts/wlt.payout-destination.openapi.yaml --output /tmp/jrn-001-wlt.ts
      - name: Verify operation registry and approved adapters
        run: node services/dsh/tests/jrn-001-fs-06-contracts.test.mjs
      - name: Verify Swagger registration
        shell: bash
        run: |
          grep -q 'services/dsh/contracts/dsh.partner-onboarding.openapi.yaml' tools/scripts/build-swagger-static.mjs
          grep -q 'services/wlt/contracts/wlt.payout-destination.openapi.yaml' tools/scripts/build-swagger-static.mjs
      - name: Publish FS-06 status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then
            STATE=success
            DESCRIPTION='FS-06 contracts and adapters verified'
          else
            STATE=failure
            DESCRIPTION='FS-06 contracts or adapters failed'
          fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-06-contracts' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
