name: JRN 010-015 sambassam verification

on:
  push:
    branches:
      - sambassam
    paths:
      - .github/workflows/jrn-010-015-sambassam-verify.yml
      - services/dsh/frontend/shared/checkout/**
      - services/dsh/frontend/shared/dispatch/**
      - services/dsh/frontend/shared/pickup/**
      - services/dsh/frontend/app-partner/orders/**

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-010-015-sambassam-${{ github.ref }}
  cancel-in-progress: true

jobs:
  affected-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout pinned source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup locked Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Activate locked pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          node --version
          pnpm --version
      - name: Install locked workspace
        run: pnpm install --frozen-lockfile
      - name: Typecheck app-client runtime
        run: pnpm --dir apps/app-client/runtime typecheck
      - name: Typecheck app-partner runtime
        run: pnpm --dir apps/app-partner/runtime typecheck
      - name: Typecheck app-captain runtime
        run: pnpm --dir apps/app-captain/runtime typecheck
      - name: Typecheck control-panel runtime
        run: pnpm --dir apps/control-panel/runtime typecheck
      - name: Run affected full-stack boundaries
        run: |
          pnpm run guard:no-broken-imports
          pnpm run guard:fullstack-boundary
          pnpm run guard:wlt-financial-boundary
      - name: Publish targeted commit status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATE="success"
            DESCRIPTION="JRN-010..015 targeted checks passed"
          else
            STATE="failure"
            DESCRIPTION="JRN-010..015 targeted checks failed"
          fi
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d "{\"state\":\"$STATE\",\"context\":\"journeys/jrn-010-015-targeted\",\"description\":\"$DESCRIPTION\"}"
