name: JRN 010-015 sambassam verification

on:
  push:
    branches: [sambassam]
    paths:
      - .github/workflows/jrn-010-015-sambassam-verify.yml
      - tools/guards/jrn-010-015-affected-boundary.mjs
      - services/dsh/frontend/shared/checkout/**
      - services/dsh/frontend/shared/orders/**
      - services/dsh/frontend/shared/delivery/**
      - services/dsh/frontend/shared/dispatch/**
      - services/dsh/frontend/shared/pickup/**
      - services/dsh/frontend/app-client/checkout/**
      - services/dsh/frontend/app-client/orders/**
      - services/dsh/frontend/app-partner/orders/**
      - services/dsh/frontend/app-captain/dispatch/**
      - services/dsh/frontend/control-panel/operations/OrderJourneyDispatchAssignmentScreen.tsx
      - services/dsh/frontend/control-panel/operations/PickupWorkbenchScreen.tsx
      - services/dsh/tests/captain-inbox-exclusion.test.mjs

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-010-015-sambassam-${{ github.sha }}
  cancel-in-progress: false

jobs:
  targeted-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout pinned source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup locked Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Activate locked pnpm
        run: |
          echo activate-pnpm > /tmp/jrn-verification-stage
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
      - name: Install locked workspace
        run: |
          echo install-workspace > /tmp/jrn-verification-stage
          pnpm install --frozen-lockfile
      - name: Create journey-scoped TypeScript projects
        run: |
          mkdir -p .tmp services/dsh/.tmp
          cat > .tmp/jrn-010-015.tsconfig.json <<'JSON'
          {
            "extends": "../tsconfig.base.json",
            "compilerOptions": { "noEmit": true },
            "files": [
              "../services/dsh/frontend/css-modules.d.ts",
              "../services/dsh/frontend/shared/checkout/use-checkout-controller.tsx",
              "../services/dsh/frontend/shared/checkout/use-checkout-to-order-flow.tsx",
              "../services/dsh/frontend/shared/orders/use-client-order-journey-controller.ts",
              "../services/dsh/frontend/shared/orders/use-partner-order-commands.ts",
              "../services/dsh/frontend/app-client/checkout/GovernedCheckoutScreen.tsx",
              "../services/dsh/frontend/app-client/orders/useClientOrderJourneyController.ts",
              "../services/dsh/frontend/app-client/orders/OrderTrackingScreen.tsx",
              "../services/dsh/frontend/app-partner/orders/usePartnerOrderCommands.ts",
              "../services/dsh/frontend/app-partner/orders/OperationalOrderDecisionScreen.tsx",
              "../services/dsh/frontend/app-partner/orders/OperationalOrdersInboxScreen.tsx",
              "../services/dsh/frontend/shared/dispatch/use-dispatch-controller.ts",
              "../services/dsh/frontend/shared/delivery/captain-inbox.mapper.ts",
              "../services/dsh/frontend/shared/delivery/captain-inbox.model.ts",
              "../services/dsh/frontend/app-captain/dispatch/DshCaptainOrdersScreen.tsx",
              "../services/dsh/frontend/control-panel/operations/OrderJourneyDispatchAssignmentScreen.tsx",
              "../services/dsh/frontend/shared/pickup/use-pickup-controller.tsx",
              "../services/dsh/frontend/control-panel/operations/PickupWorkbenchScreen.tsx"
            ]
          }
          JSON
          cat > services/dsh/.tmp/jrn-010-015-test-build.tsconfig.json <<'JSON'
          {
            "extends": "../tsconfig.json",
            "include": [],
            "exclude": [],
            "files": [
              "../frontend/shared/checkout/checkout.controller-core.ts",
              "../frontend/shared/delivery/captain-inbox.mapper.ts"
            ]
          }
          JSON
      - name: Typecheck journey files and consumers
        shell: bash
        run: |
          echo typecheck-journey-files > /tmp/jrn-verification-stage
          set +e
          pnpm exec tsc --noEmit -p .tmp/jrn-010-015.tsconfig.json 2>&1 | tee /tmp/jrn-verification.log
          exit ${PIPESTATUS[0]}
      - name: Build modules required by journey tests
        shell: bash
        run: |
          echo build-journey-test-modules > /tmp/jrn-verification-stage
          rm -rf services/dsh/dist
          set +e
          pnpm exec tsc -p services/dsh/.tmp/jrn-010-015-test-build.tsconfig.json 2>&1 | tee /tmp/jrn-verification.log
          exit ${PIPESTATUS[0]}
      - name: Run journey contract tests
        shell: bash
        run: |
          echo journey-contract-tests > /tmp/jrn-verification-stage
          set +e
          node --test \
            services/dsh/tests/checkout-controller-core.test.mjs \
            services/dsh/tests/order-preparation-contract.test.mjs \
            services/dsh/tests/captain-inbox-exclusion.test.mjs \
            2>&1 | tee /tmp/jrn-verification.log
          exit ${PIPESTATUS[0]}
      - name: Run affected ownership and financial boundaries
        shell: bash
        run: |
          echo affected-boundaries > /tmp/jrn-verification-stage
          set +e
          node tools/guards/jrn-010-015-affected-boundary.mjs 2>&1 | tee /tmp/jrn-verification.log
          exit ${PIPESTATUS[0]}
      - name: Publish targeted commit status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          STAGE="$(cat /tmp/jrn-verification-stage 2>/dev/null || echo workflow-bootstrap)"
          if [ "$JOB_STATUS" = success ]; then
            STATE=success
            CONTEXT=journeys/jrn-010-015-targeted
            DESCRIPTION='JRN-010..015 targeted checks passed'
          else
            STATE=failure
            DETAIL="$(grep -m1 -E '^- |error TS[0-9]+|not ok|Error:|ERR_' /tmp/jrn-verification.log 2>/dev/null | sed -E 's/^- //' | tr '\n\r\t\" ' '-' | tr -cd '[:alnum:]_./:()-' | cut -c1-62)"
            [ -n "$DETAIL" ] || DETAIL=unknown
            CONTEXT="jrn-010-015/$STAGE/$DETAIL"
            DESCRIPTION="JRN-010..015 failed at $STAGE"
          fi
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state,context,description,target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
