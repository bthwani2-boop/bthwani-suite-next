name: JRN 010-015 sambassam verification

on:
  push:
    branches:
      - sambassam
    paths:
      - .github/workflows/jrn-010-015-sambassam-verify.yml
      - services/dsh/frontend/shared/checkout/**
      - services/dsh/frontend/shared/dispatch/**
      - services/dsh/frontend/shared/pickup/**
      - services/dsh/frontend/app-partner/orders/**

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-010-015-sambassam-${{ github.ref }}
  cancel-in-progress: true

jobs:
  affected-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout pinned source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup locked Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Activate locked pnpm
        run: |
          echo "activate-pnpm" > /tmp/jrn-verification-stage
          corepack enable
          corepack prepare pnpm@10.34.2 --activate
          node --version
          pnpm --version
      - name: Install locked workspace
        run: |
          echo "install-workspace" > /tmp/jrn-verification-stage
          pnpm install --frozen-lockfile
      - name: Typecheck app-client runtime
        shell: bash
        run: |
          echo "typecheck-app-client" > /tmp/jrn-verification-stage
          set +e
          pnpm --dir apps/app-client/runtime typecheck 2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Typecheck app-partner runtime
        shell: bash
        run: |
          echo "typecheck-app-partner" > /tmp/jrn-verification-stage
          set +e
          pnpm --dir apps/app-partner/runtime typecheck 2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Typecheck app-captain runtime
        shell: bash
        run: |
          echo "typecheck-app-captain" > /tmp/jrn-verification-stage
          set +e
          pnpm --dir apps/app-captain/runtime typecheck 2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Typecheck control-panel runtime
        shell: bash
        run: |
          echo "typecheck-control-panel" > /tmp/jrn-verification-stage
          set +e
          pnpm --dir apps/control-panel/runtime typecheck 2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: No broken imports
        shell: bash
        run: |
          echo "guard-no-broken-imports" > /tmp/jrn-verification-stage
          set +e
          pnpm run guard:no-broken-imports 2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Full-stack boundary
        shell: bash
        run: |
          echo "guard-fullstack-boundary" > /tmp/jrn-verification-stage
          set +e
          pnpm run guard:fullstack-boundary 2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: WLT financial boundary
        shell: bash
        run: |
          echo "guard-wlt-financial-boundary" > /tmp/jrn-verification-stage
          set +e
          pnpm run guard:wlt-financial-boundary 2>&1 | tee /tmp/jrn-verification.log
          EXIT_CODE=${PIPESTATUS[0]}
          exit "$EXIT_CODE"
      - name: Publish targeted commit status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          STAGE="$(cat /tmp/jrn-verification-stage 2>/dev/null || echo workflow-bootstrap)"
          if [ "$JOB_STATUS" = "success" ]; then
            STATE="success"
            STATUS_CONTEXT="journeys/jrn-010-015-targeted"
            DESCRIPTION="JRN-010..015 targeted checks passed"
          else
            STATE="failure"
            FIRST_ERROR="$(grep -m1 -E 'error TS[0-9]+|Error:|ERR_' /tmp/jrn-verification.log 2>/dev/null || true)"
            FIRST_ERROR="$(printf '%s' "$FIRST_ERROR" | tr '\n\r\t\"' '    ' | tr -cd '[:alnum:]_./:() -' | cut -c1-55)"
            [ -n "$FIRST_ERROR" ] || FIRST_ERROR="unknown-error"
            STATUS_CONTEXT="journeys/jrn-010-015/$STAGE/$FIRST_ERROR"
            STATUS_CONTEXT="$(printf '%s' "$STATUS_CONTEXT" | cut -c1-100)"
            DESCRIPTION="JRN-010..015 failed at $STAGE"
          fi
          PAYLOAD="$(jq -n \
            --arg state "$STATE" \
            --arg context "$STATUS_CONTEXT" \
            --arg description "$DESCRIPTION" \
            --arg target_url "$TARGET_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d "$PAYLOAD"
