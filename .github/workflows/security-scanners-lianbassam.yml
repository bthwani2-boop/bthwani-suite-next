name: One-time lianbassam OSV and Trivy verification

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/security-scanners-lianbassam.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: security-scanners-lianbassam
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout current lianbassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: lianbassam
          fetch-depth: 0
          show-progress: false

      - name: Publish run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=pending \
            -f context='bthwani/security-scanners' \
            -f description='OSV and Trivy scans are running' \
            -f target_url="${RUN_URL}"

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache: false

      - name: Install pinned OSV Scanner
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.8
          osv-scanner --version

      - name: Install pinned Trivy with checksum verification
        shell: bash
        run: |
          set -euo pipefail
          version="0.70.0"
          archive="trivy_${version}_Linux-64bit.tar.gz"
          base="https://github.com/aquasecurity/trivy/releases/download/v${version}"
          curl --fail --silent --show-error --location --output "/tmp/${archive}" "${base}/${archive}"
          curl --fail --silent --show-error --location --output /tmp/trivy-checksums.txt "${base}/trivy_${version}_checksums.txt"
          (cd /tmp && grep " ${archive}$" trivy-checksums.txt | sha256sum --check --strict -)
          tar -xzf "/tmp/${archive}" -C /tmp trivy
          sudo install -m 0755 /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Run scanners and create sanitized evidence
        id: scanners
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p governance/evidence/security

          osv-scanner scan source -r . --format json > /tmp/osv-report.json 2>/tmp/osv-stderr.log
          osv_code=$?

          trivy fs --config trivy.yaml --format json --output /tmp/trivy-report.json . > /tmp/trivy-stdout.log 2>/tmp/trivy-stderr.log
          trivy_code=$?

          OSV_CODE="${osv_code}" TRIVY_CODE="${trivy_code}" python - <<'PY'
          import json
          import os
          from pathlib import Path

          def load_json(path):
              p = Path(path)
              if not p.exists() or not p.stat().st_size:
                  return {}
              return json.loads(p.read_text(encoding='utf-8'))

          osv = load_json('/tmp/osv-report.json')
          trivy = load_json('/tmp/trivy-report.json')

          osv_findings = []
          for result in osv.get('results', []) or []:
              source = result.get('source', {}) or {}
              for package in result.get('packages', []) or []:
                  package_info = package.get('package', {}) or {}
                  for vulnerability in package.get('vulnerabilities', []) or []:
                      osv_findings.append({
                          'id': vulnerability.get('id'),
                          'aliases': vulnerability.get('aliases', []),
                          'package': package_info.get('name'),
                          'version': package_info.get('version'),
                          'ecosystem': package_info.get('ecosystem'),
                          'source_path': source.get('path'),
                      })

          trivy_vulnerabilities = []
          trivy_misconfigurations = []
          trivy_secrets = []
          for result in trivy.get('Results', []) or []:
              target = result.get('Target')
              for vulnerability in result.get('Vulnerabilities', []) or []:
                  trivy_vulnerabilities.append({
                      'target': target,
                      'id': vulnerability.get('VulnerabilityID'),
                      'package': vulnerability.get('PkgName'),
                      'installed': vulnerability.get('InstalledVersion'),
                      'fixed': vulnerability.get('FixedVersion'),
                      'severity': vulnerability.get('Severity'),
                      'title': vulnerability.get('Title'),
                  })
              for finding in result.get('Misconfigurations', []) or []:
                  trivy_misconfigurations.append({
                      'target': target,
                      'id': finding.get('ID'),
                      'title': finding.get('Title'),
                      'severity': finding.get('Severity'),
                      'status': finding.get('Status'),
                  })
              for secret in result.get('Secrets', []) or []:
                  trivy_secrets.append({
                      'target': target,
                      'rule_id': secret.get('RuleID'),
                      'category': secret.get('Category'),
                      'severity': secret.get('Severity'),
                      'start_line': secret.get('StartLine'),
                      'end_line': secret.get('EndLine'),
                  })

          summary = {
              'branch': 'lianbassam',
              'master_merge_performed': False,
              'osv_exit_code': int(os.environ['OSV_CODE']),
              'trivy_exit_code': int(os.environ['TRIVY_CODE']),
              'osv_findings': osv_findings,
              'trivy_vulnerabilities': trivy_vulnerabilities,
              'trivy_misconfigurations': trivy_misconfigurations,
              'trivy_secrets': trivy_secrets,
              'counts': {
                  'osv': len(osv_findings),
                  'trivy_vulnerabilities': len(trivy_vulnerabilities),
                  'trivy_misconfigurations': len(trivy_misconfigurations),
                  'trivy_secrets': len(trivy_secrets),
              },
          }
          evidence_dir = Path('governance/evidence/security')
          (evidence_dir / 'security-scanners-summary.json').write_text(
              json.dumps(summary, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )

          counts = summary['counts']
          total = sum(counts.values())
          lines = [
              '# OSV and Trivy verification',
              '',
              '- Branch: lianbassam',
              '- Master merge: not performed',
              f"- OSV findings: {counts['osv']}",
              f"- Trivy vulnerabilities: {counts['trivy_vulnerabilities']}",
              f"- Trivy misconfigurations: {counts['trivy_misconfigurations']}",
              f"- Trivy secret findings: {counts['trivy_secrets']}",
              '',
              'Result: ' + ('PASS' if total == 0 else 'FINDINGS_REMAIN'),
              '',
              'Raw secret matches were not committed; only sanitized metadata is recorded.',
          ]
          (evidence_dir / 'security-scanners-verification.md').write_text(
              '\n'.join(lines) + '\n', encoding='utf-8'
          )
          Path('/tmp/scanner-result').write_text('success' if total == 0 else 'failure', encoding='utf-8')
          PY

          echo "result=$(cat /tmp/scanner-result)" >> "${GITHUB_OUTPUT}"
          {
            echo "# Scanner stderr tails"
            echo
            echo "## OSV"
            echo '```text'
            tail -n 40 /tmp/osv-stderr.log || true
            echo '```'
            echo
            echo "## Trivy"
            echo '```text'
            tail -n 40 /tmp/trivy-stderr.log || true
            echo '```'
          } > governance/evidence/security/security-scanners-diagnostics.md

      - name: Commit sanitized scanner evidence
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/security-scanners-lianbassam.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(security): record OSV and Trivy verification"
          git pull --rebase origin lianbassam
          git push origin HEAD:lianbassam

      - name: Publish scanner success
        if: steps.scanners.outputs.result == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=success \
            -f context='bthwani/security-scanners' \
            -f description='OSV and Trivy found no remaining issues' \
            -f target_url="${RUN_URL}"

      - name: Publish scanner findings and fail
        if: steps.scanners.outputs.result != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api --method POST "repos/${REPOSITORY}/statuses/${SHA}" \
            -f state=failure \
            -f context='bthwani/security-scanners' \
            -f description='OSV or Trivy findings remain; inspect sanitized evidence' \
            -f target_url="${RUN_URL}"
          exit 1
