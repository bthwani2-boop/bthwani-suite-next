name: DSH Contract And Binding Materialization

on:
  pull_request:
    branches:
      - "bassam-platform-verification-base-*"
    paths:
      - "services/dsh/**"
      - "services/wlt/contracts/**"
      - "apps/**"
      - "governance/guards/frontend-binding-registry.json"
      - ".github/workflows/dsh-contract-and-binding-materialization.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  materialize-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Materialize conservative DSH contract merge
        shell: bash
        run: |
          set -euo pipefail
          git show origin/master:services/dsh/contracts/dsh.openapi.yaml > /tmp/dsh-master.openapi.yaml
          cp services/dsh/contracts/dsh.openapi.yaml /tmp/dsh-bassam-before.openapi.yaml
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import YAML from "yaml";
          const currentPath = "services/dsh/contracts/dsh.openapi.yaml";
          const current = YAML.parse(fs.readFileSync(currentPath, "utf8"));
          const donor = YAML.parse(fs.readFileSync("/tmp/dsh-master.openapi.yaml", "utf8"));
          current.paths ??= {};
          donor.paths ??= {};
          const addedPaths = [];
          for (const [path, value] of Object.entries(donor.paths)) {
            if (!(path in current.paths)) {
              current.paths[path] = value;
              addedPaths.push(path);
            }
          }
          current.components ??= {};
          donor.components ??= {};
          for (const [section, values] of Object.entries(donor.components)) {
            if (!values || typeof values !== "object" || Array.isArray(values)) continue;
            current.components[section] = {
              ...values,
              ...(current.components[section] ?? {}),
            };
          }
          fs.writeFileSync(currentPath, YAML.stringify(current, { lineWidth: 120 }));
          fs.writeFileSync("/tmp/dsh-added-paths.txt", addedPaths.sort().join("\n") + "\n");
          NODE
          git diff -- services/dsh/contracts/dsh.openapi.yaml > /tmp/dsh-contract-merge.diff
      - name: Materialize WLT invalid response repair
        shell: bash
        run: |
          set -euo pipefail
          cp services/wlt/contracts/wlt.openapi.yaml /tmp/wlt-before.openapi.yaml
          python - <<'PY'
          from pathlib import Path
          path = Path("services/wlt/contracts/wlt.openapi.yaml")
          text = path.read_text()
          old = '$ref: "#/components/responses/InvalidRequest"'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f"expected exactly one InvalidRequest reference, got {count}")
          path.write_text(text.replace(old, '$ref: "#/components/responses/BadRequest"'))
          PY
          git diff -- services/wlt/contracts/wlt.openapi.yaml > /tmp/wlt-contract-repair.diff
      - name: Verify materialized contracts
        run: pnpm run contracts:lint
      - name: Upload materialized contracts and diffs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dsh-wlt-materialized-contracts
          path: |
            services/dsh/contracts/dsh.openapi.yaml
            services/wlt/contracts/wlt.openapi.yaml
            /tmp/dsh-added-paths.txt
            /tmp/dsh-contract-merge.diff
            /tmp/wlt-contract-repair.diff
          if-no-files-found: error
          retention-days: 3

  binding-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Report missing binding candidates
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import path from "node:path";
          const registry = JSON.parse(fs.readFileSync("governance/guards/frontend-binding-registry.json", "utf8"));
          const roots = ["apps", "services"];
          const files = [];
          function walk(root) {
            if (!fs.existsSync(root)) return;
            for (const entry of fs.readdirSync(root, { withFileTypes: true })) {
              const full = path.join(root, entry.name);
              if (entry.isDirectory()) walk(full);
              else files.push(full.replaceAll("\\", "/"));
            }
          }
          roots.forEach(walk);
          const out = [];
          for (const binding of registry.bindings) {
            const expected = [binding.screen, binding.controller, ...(binding.dependencies ?? [])];
            for (const value of expected) {
              if (fs.existsSync(value)) continue;
              const base = path.basename(value);
              const candidates = files.filter((file) => path.basename(file) === base);
              out.push(JSON.stringify({ binding: binding.id, field: value, basename: base, candidates }));
            }
          }
          fs.writeFileSync("/tmp/frontend-binding-candidates.jsonl", out.join("\n") + "\n");
          NODE
      - name: Upload binding diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-binding-candidates
          path: /tmp/frontend-binding-candidates.jsonl
          if-no-files-found: error
          retention-days: 3
