name: One-time lianbassam raw scanner diagnostics

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/security-scanners-lianbassam-v3.yml"

permissions:
  contents: write
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout current lianbassam
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: lianbassam
          fetch-depth: 0
          show-progress: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache: false

      - name: Install pinned scanners
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.8
          version="0.70.0"
          archive="trivy_${version}_Linux-64bit.tar.gz"
          base="https://github.com/aquasecurity/trivy/releases/download/v${version}"
          curl --fail --silent --show-error --location --output "/tmp/${archive}" "${base}/${archive}"
          curl --fail --silent --show-error --location --output /tmp/trivy-checksums.txt "${base}/trivy_${version}_checksums.txt"
          (cd /tmp && grep " ${archive}$" trivy-checksums.txt | sha256sum --check --strict -)
          tar -xzf "/tmp/${archive}" -C /tmp trivy
          sudo install -m 0755 /tmp/trivy /usr/local/bin/trivy

      - name: Capture raw scanner behavior
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p governance/evidence/security

          osv-scanner scan source --recursive --format=json . > /tmp/osv.out 2>/tmp/osv.err
          osv_code=$?
          trivy fs --config trivy.yaml --format json --output /tmp/trivy.out . > /tmp/trivy.stdout 2>/tmp/trivy.err
          trivy_code=$?

          {
            echo "# Raw scanner diagnostics"
            echo
            echo "- Branch: lianbassam"
            echo "- Master merge: not performed"
            echo "- OSV exit code: ${osv_code}"
            echo "- Trivy exit code: ${trivy_code}"
            echo "- OSV output bytes: $(wc -c < /tmp/osv.out)"
            echo "- Trivy output bytes: $(wc -c < /tmp/trivy.out 2>/dev/null || echo 0)"
            echo
            echo "## OSV stderr"
            echo '```text'
            sed -E 's/(token|password|secret|key)[=:][^[:space:]]+/@redacted/Ig' /tmp/osv.err | tail -n 100
            echo '```'
            echo
            echo "## OSV output prefix"
            echo '```text'
            head -c 1000 /tmp/osv.out | sed -E 's/(token|password|secret|key)[=:][^[:space:],\"]+/@redacted/Ig'
            echo
            echo '```'
            echo
            echo "## Trivy stderr"
            echo '```text'
            sed -E 's/(token|password|secret|key)[=:][^[:space:]]+/@redacted/Ig' /tmp/trivy.err | tail -n 100
            echo '```'
            echo
            echo "## Trivy stdout"
            echo '```text'
            sed -E 's/(token|password|secret|key)[=:][^[:space:]]+/@redacted/Ig' /tmp/trivy.stdout | tail -n 80
            echo '```'
            echo
            echo "## JSON probes"
            echo '```text'
            python -m json.tool /tmp/osv.out >/dev/null 2>&1 && echo "osv_json=valid" || echo "osv_json=invalid"
            python -m json.tool /tmp/trivy.out >/dev/null 2>&1 && echo "trivy_json=valid" || echo "trivy_json=invalid"
            echo '```'
          } > governance/evidence/security/security-scanners-raw-diagnostics.md

      - name: Commit diagnostics and remove temporary workflows
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/security-scanners-lianbassam.yml
          rm -f .github/workflows/security-scanners-lianbassam-v2.yml
          rm -f .github/workflows/security-scanners-lianbassam-v3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(security): record raw scanner diagnostics"
          git pull --rebase origin lianbassam
          git push origin HEAD:lianbassam
