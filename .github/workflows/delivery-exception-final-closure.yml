name: Delivery Exception Final Closure
run-name: Delivery Exception Final Closure · ${{ github.sha }}

on:
  push:
    branches: ["journey/delivery-exception-redelivery-closure"]
    paths:
      - ".github/workflows/delivery-exception-final-closure.yml"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

# Intentionally shares slice-seven's group so this final gate supersedes any
# still-running handshake attempt instead of creating an Actions queue.
concurrency:
  group: delivery-exception-slice7-${{ github.ref }}
  cancel-in-progress: true

jobs:
  close-verify-clean:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      dsh-postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsh_delivery_exception_final
          POSTGRES_USER: dsh_delivery_exception_final
          POSTGRES_PASSWORD: dsh_delivery_exception_final
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U dsh_delivery_exception_final -d dsh_delivery_exception_final"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      wlt-postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wlt_delivery_exception_final
          POSTGRES_USER: wlt_delivery_exception_final
          POSTGRES_PASSWORD: wlt_delivery_exception_final
        ports: ["55433:5432"]
        options: >-
          --health-cmd "pg_isready -U wlt_delivery_exception_final -d wlt_delivery_exception_final"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DSH_DATABASE_URL: postgres://dsh_delivery_exception_final:dsh_delivery_exception_final@localhost:55432/dsh_delivery_exception_final?sslmode=disable
      WLT_DATABASE_URL: postgres://wlt_delivery_exception_final:wlt_delivery_exception_final@localhost:55433/wlt_delivery_exception_final?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-workspace

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum

      - name: Apply any pending return-receipt handshake
        shell: bash
        run: |
          set -euo pipefail
          for script in \
            tools/scripts/patch-delivery-exception-slice7.py \
            tools/scripts/patch-delivery-exception-slice7-corrections.py
          do
            if [ -f "$script" ]; then python "$script"; fi
          done
          gofmt -w \
            services/dsh/backend/internal/orders/orders.go \
            services/dsh/backend/internal/orders/runtime.go \
            services/dsh/backend/internal/dispatch/dispatch.go \
            services/dsh/backend/internal/dispatch/delivery_exceptions.go \
            services/dsh/backend/internal/dispatch/delivery_exceptions_db_test.go \
            services/dsh/backend/internal/dispatch/delivery_reassignment_db_test.go \
            services/dsh/backend/internal/dispatch/delivery_return_db_test.go \
            services/dsh/backend/internal/http/dispatch.go \
            services/dsh/backend/internal/http/partner_delivery.go \
            services/dsh/backend/internal/http/server.go

      - name: Generate governed DSH and WLT clients
        shell: bash
        run: |
          set -euo pipefail
          pnpm run openapi:generate:dsh
          pnpm run openapi:generate:wlt

      - name: Prove contracts and remove superseded routes
        shell: bash
        run: |
          set -euo pipefail
          dsh="services/dsh/contracts/dsh.openapi.yaml"
          generated="services/dsh/clients/generated/dsh-api.ts"
          grep -F '/dsh/captain/dispatch/assignments/{assignmentId}/exceptions:' "$dsh"
          grep -F '/dsh/operator/delivery-exceptions/{exceptionId}/acknowledge:' "$dsh"
          grep -F '/dsh/operator/delivery-exceptions/{exceptionId}/resolve:' "$dsh"
          grep -F '/dsh/captain/dispatch/assignments/{assignmentId}/return-to-store/arrive:' "$dsh"
          grep -F '/dsh/partner/orders/{orderId}/return-to-store:' "$dsh"
          grep -F '/dsh/partner/orders/{orderId}/return-to-store/accept:' "$dsh"
          grep -F 'return_arrived_store' "$dsh"
          grep -F 'arriveDshCaptainReturnToStore' "$generated"
          grep -F 'acceptDshPartnerReturnToStore' "$generated"
          grep -F 'returnAcceptedByActorId' "$generated"
          grep -F '/wlt/order-cancellations:' services/wlt/contracts/wlt.openapi.yaml
          ! grep -F '/return-to-store/complete' "$dsh"

      - name: Compile all journey backend boundaries
        id: backend_compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/delivery-exception-final-backend
          {
            (
              cd services/dsh/backend
              go test \
                ./internal/orders \
                ./internal/dispatch \
                ./internal/checkoutfinanceoutbox \
                ./internal/wlt \
                ./internal/http \
                ./cmd/dsh-api \
                -run '^$' -count=1
            )
            (
              cd services/wlt/backend
              go test ./internal/payment ./internal/refund ./internal/http ./cmd/wlt-api -run '^$' -count=1
            )
          } 2>&1 | tee artifacts/delivery-exception-final-backend/compile.log
          exit ${PIPESTATUS[0]}

      - name: Upload backend compilation diagnostic
        if: steps.backend_compile.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: delivery-exception-final-backend-${{ github.sha }}
          path: artifacts/delivery-exception-final-backend/compile.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on backend compilation failure
        if: steps.backend_compile.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Typecheck all affected application surfaces
        id: surface_typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/delivery-exception-final-typecheck
          {
            status=0
            for config in \
              apps/app-client/runtime/tsconfig.cancellation-journey.json \
              apps/app-partner/runtime/tsconfig.cancellation-journey.json \
              apps/app-captain/runtime/tsconfig.order-journey.json \
              apps/control-panel/runtime/tsconfig.delivery-exception-journey.json
            do
              echo "=== TYPECHECK $config ==="
              pnpm exec tsc -p "$config" --noEmit --pretty false || status=1
            done
            exit "$status"
          } 2>&1 | tee artifacts/delivery-exception-final-typecheck/typecheck.log
          exit ${PIPESTATUS[0]}

      - name: Upload multi-surface TypeScript diagnostic
        if: steps.surface_typecheck.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: delivery-exception-final-typecheck-${{ github.sha }}
          path: artifacts/delivery-exception-final-typecheck/typecheck.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on multi-surface TypeScript failure
        if: steps.surface_typecheck.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Apply all DSH and WLT migrations from clean databases
        shell: bash
        run: |
          set -euo pipefail
          for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" >/dev/null
          done
          for file in $(find services/wlt/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$WLT_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" >/dev/null
          done
          psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-092_delivery_exception_lifecycle.sql >/dev/null
          psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-093_delivery_return_lifecycle.sql >/dev/null
          psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-094_delivery_return_partner_receipt.sql >/dev/null

      - name: Prove DSH delivery-exception database journey
        id: dsh_db
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/delivery-exception-final-dsh-db
          {
            cd services/dsh/backend
            DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" \
              go test ./internal/dispatch \
                -run '^TestDeliveryException(BlocksProgressButAllowsLocation|ReassignsBeforePickupAtomically|RejectsReassignmentAfterPickup|ReturnToStoreLifecycle)DBIntegration$' \
                -count=1 -v
            DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" \
              go test ./internal/orders \
                -run '^TestReturnedOrderCancellation(CreatesOneGovernedFinancialHandoff|RemainsForbiddenForClientAndPartner)DBIntegration$' \
                -count=1 -v
            DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" \
              go test ./internal/checkoutfinanceoutbox -count=1 -v
          } 2>&1 | tee artifacts/delivery-exception-final-dsh-db/dsh-db.log
          exit ${PIPESTATUS[0]}

      - name: Upload DSH database diagnostic
        if: steps.dsh_db.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: delivery-exception-final-dsh-db-${{ github.sha }}
          path: artifacts/delivery-exception-final-dsh-db/dsh-db.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on DSH database failure
        if: steps.dsh_db.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Prove WLT cancellation and refund boundaries
        id: wlt_db
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/delivery-exception-final-wlt-db
          {
            cd services/wlt/backend
            WLT_REQUIRE_DB_TESTS=true DATABASE_URL="$WLT_DATABASE_URL" go test ./internal/payment -count=1 -v
            WLT_REQUIRE_DB_TESTS=true DATABASE_URL="$WLT_DATABASE_URL" go test ./internal/refund -count=1 -v
          } 2>&1 | tee artifacts/delivery-exception-final-wlt-db/wlt-db.log
          exit ${PIPESTATUS[0]}

      - name: Upload WLT database diagnostic
        if: steps.wlt_db.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: delivery-exception-final-wlt-db-${{ github.sha }}
          path: artifacts/delivery-exception-final-wlt-db/wlt-db.log
          if-no-files-found: error
          retention-days: 2

      - name: Stop on WLT database failure
        if: steps.wlt_db.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Prove multi-surface runtime truth and fixture-free screens
        shell: bash
        run: |
          set -euo pipefail
          captain="services/dsh/frontend/app-captain/orders/DshCaptainPoDSubmissionScreen.tsx"
          partner="services/dsh/frontend/app-partner/orders/PartnerFulfillmentActionsPanel.tsx"
          client="services/dsh/frontend/app-client/orders/OrderTrackingScreen.tsx"
          operations="services/dsh/frontend/control-panel/operations/ExceptionsEscalationsScreen.tsx"
          dispatch_http="services/dsh/backend/internal/http/dispatch.go"
          partner_http="services/dsh/backend/internal/http/partner_delivery.go"
          grep -F 'fetchCaptainDeliveryException' "$captain"
          grep -F 'arriveCaptainReturnToStore' "$captain"
          grep -F 'بانتظار تأكيد استلام المتجر' "$captain"
          grep -F 'acceptPartnerReturnToStore' "$partner"
          grep -F 'تأكيد استلام المرتجع من الكابتن' "$partner"
          grep -F 'return_arrived_store' "$client"
          grep -F 'listCaptains' "$operations"
          grep -F 'resolveDeliveryExceptionReassignCaptain' "$operations"
          grep -F 'resolveDeliveryExceptionReturnToStore' "$operations"
          grep -F "cancelOrder('operator'" "$operations"
          grep -F 'FINANCIAL_CLOSURE_LABELS' "$operations"
          grep -F 'returnAcceptedByActorId' "$dispatch_http"
          grep -F 's.partnerOrder' "$partner_http"
          ! grep -F "orderId = 'ORD-9021'" "$captain"
          ! grep -F 'cancelledOrders' "$operations"
          ! grep -F 'fetchDshRuntimeOrders' "$operations"
          ! grep -F 'handleCompleteReturnToStore' services/dsh/backend/internal/http/*.go
          ! grep -Ei '(mock|fixture|demo)[A-Za-z0-9_]*[[:space:]]*=' "$captain" "$partner" "$client" "$operations"

      - name: Prove no generic cancellation or temporary journey residue
        shell: bash
        run: |
          set -euo pipefail
          ! grep -F "WHEN 'cancelled'" services/dsh/backend/internal/orders/orders.go
          test "$(find .github/workflows -maxdepth 1 -type f -name 'delivery-exception-slice*.yml' | wc -l)" -le 1
          test "$(find tools/scripts -maxdepth 1 -type f -name 'patch-delivery-exception-slice*.py' | wc -l)" -le 2

      - name: Remove all temporary journey machinery and publish final head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f \
            .github/workflows/delivery-exception-slice*.yml \
            tools/scripts/patch-delivery-exception-slice*.py \
            tools/scripts/inspect-governed-cancel-source.py \
            apps/control-panel/runtime/tsconfig.delivery-exception-journey.json
          git rm .github/workflows/delivery-exception-final-closure.yml
          git add -A
          git commit -m "feat(delivery-exception): close governed exception redelivery and return journey [skip ci]"
          git pull --rebase origin journey/delivery-exception-redelivery-closure
          git push origin HEAD:journey/delivery-exception-redelivery-closure
          final_sha="$(git rev-parse HEAD)"
          jq -n \
            --arg state success \
            --arg context "Delivery Exception Final Closure" \
            --arg description "full-stack multi-surface delivery exception, reassignment, return receipt and WLT handoff verified" \
            --arg target_url "$RUN_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$final_sha" \
            -d @status.json

      - name: Publish focused failure status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n \
            --arg state failure \
            --arg context "Delivery Exception Final Closure" \
            --arg description "focused delivery-exception final closure failed" \
            --arg target_url "$RUN_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/${{ github.sha }}" \
            -d @status.json
