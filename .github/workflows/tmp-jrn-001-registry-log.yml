name: Temporary JRN-001 registry log

on:
  push:
    branches: [sambassam]
    paths:
      - .github/workflows/tmp-jrn-001-registry-log.yml

permissions:
  contents: write

concurrency:
  group: tmp-jrn-001-registry-log
  cancel-in-progress: false

jobs:
  append:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: sambassam
          fetch-depth: 0
      - name: Append governed registry evidence and remove launcher
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          registry = Path('governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md')
          text = registry.read_text(encoding='utf-8')
          row = '| 2026-07-21 | JRN-001 | FS-01..FS-18 sequential execution | sambassam | `246d4e63d75fecaa64a982938885bb2bfd6249cb` | app-field, app-partner, control-panel, app-client public projection | READY_FOR_REVIEW | Product, QA, Security, Release, device runtime and production evidence pending |'
          if row not in text:
              marker = '\n## قالب إضافة رحلة أو تحديثها\n'
              if marker not in text:
                  raise SystemExit('registry execution-log insertion marker not found')
              text = text.replace(marker, '\n' + row + '\n' + marker, 1)
              registry.write_text(text, encoding='utf-8')

          evidence_path = Path('governance/evidence/JRN-001_PARTNER_ONBOARDING_EVIDENCE.json')
          evidence = json.loads(evidence_path.read_text(encoding='utf-8'))
          evidence['registryLog'] = {
              'path': str(registry),
              'evidenceCommit': '246d4e63d75fecaa64a982938885bb2bfd6249cb',
              'decision': 'READY_FOR_REVIEW'
          }
          evidence_path.write_text(json.dumps(evidence, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          Path('.github/workflows/tmp-jrn-001-registry-log.yml').unlink()
          PY
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md governance/evidence/JRN-001_PARTNER_ONBOARDING_EVIDENCE.json .github/workflows/tmp-jrn-001-registry-log.yml
          git commit -m 'docs(jrn-001-fs-18): record sequential journey decision'
          for attempt in 1 2 3 4 5; do
            git fetch origin sambassam
            if git rebase origin/sambassam && git push origin HEAD:sambassam; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            sleep 2
          done
          exit 1
