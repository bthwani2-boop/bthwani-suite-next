name: JRN-039 Platform Providers and Health Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths: &jrn039_paths
      - "core/platform-control/**"
      - "core/providers/**"
      - "services/dsh/frontend/shared/platform/**"
      - "services/dsh/frontend/control-panel/platform/**"
      - "infra/docker/compose.runtime.yml"
      - "infra/docker/env/runtime.env.example"
      - "governance/product-truth/JRN-039_PLATFORM_VARIABLES_PROVIDERS_HEALTH.md"
      - ".github/workflows/jrn-039-platform-providers-health.yml"
  pull_request:
    branches: [master]
    paths: *jrn039_paths

permissions:
  contents: read

concurrency:
  group: jrn-039-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: JRN-039 providers, platform control, PostgreSQL, and surface proof
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jrn039_ci
          POSTGRES_PASSWORD: jrn039_ci_password
          POSTGRES_DB: jrn039_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U jrn039_ci -d jrn039_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: jrn039_ci
      PGPASSWORD: jrn039_ci_password
      PGDATABASE: jrn039_ci
      DATABASE_URL: postgres://jrn039_ci:jrn039_ci_password@localhost:5432/jrn039_ci?sslmode=disable
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: core/providers/backend/go.mod
          cache-dependency-path: |
            core/providers/backend/go.sum
            core/platform-control/backend/go.sum
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install locked workspace
        run: pnpm install --frozen-lockfile
      - name: Verify JRN-039 Go formatting without rewriting source
        run: |
          test -z "$(gofmt -l core/providers/backend/internal/providers/model.go core/providers/backend/internal/providers/service.go core/providers/backend/internal/providers/jrn039_security_health_test.go)"
      - name: Compile and test Providers
        working-directory: core/providers/backend
        run: go test ./...
      - name: Compile and test Platform Control
        working-directory: core/platform-control/backend
        run: go test ./...
      - name: Validate canonical Docker runtime expansion
        run: docker compose --env-file infra/docker/env/runtime.env.example -f infra/docker/compose.runtime.yml config --quiet
      - name: Apply Providers and Platform Control migrations
        shell: bash
        run: |
          set -euo pipefail
          for migration in core/providers/database/migrations/*.sql; do psql -v ON_ERROR_STOP=1 -f "${migration}"; done
          for migration in core/platform-control/database/migrations/*.sql; do psql -v ON_ERROR_STOP=1 -f "${migration}"; done
      - name: Assert mock provider truth was retired
        shell: bash
        run: |
          set -euo pipefail
          active_mock_count="$(psql -tA -c "SELECT count(*) FROM external_providers WHERE active AND (credentials::text ILIKE '%mock%' OR code ILIKE '%mock%');")"
          provider_index_count="$(psql -tA -c "SELECT count(*) FROM pg_indexes WHERE indexname = 'external_providers_kind_active_idx';")"
          test "${active_mock_count}" = "0"
          test "${provider_index_count}" = "1"
      - name: Start Providers and Platform Control runtimes
        shell: bash
        run: |
          set -euo pipefail
          (cd core/providers/backend && PORT=58087 DATABASE_URL="${DATABASE_URL}" PROVIDERS_IDENTITY_BASE_URL="http://127.0.0.1:59999" PROVIDERS_HEALTH_PROBE_ALLOWED_HOSTS="" go run ./cmd/providers-api) > /tmp/jrn039-providers.log 2>&1 &
          (cd core/platform-control/backend && PORT=58088 DATABASE_URL="${DATABASE_URL}" PLATFORM_CONTROL_IDENTITY_BASE_URL="http://127.0.0.1:59999" PLATFORM_CONTROL_PROVIDERS_HEALTH_URL="http://127.0.0.1:58087/providers/health" PLATFORM_CONTROL_WLT_HEALTH_URL="http://127.0.0.1:59998/wlt/health" PLATFORM_CONTROL_DSH_HEALTH_URL="http://127.0.0.1:59997/dsh/health" go run ./cmd/platform-control-api) > /tmp/jrn039-platform.log 2>&1 &
      - name: Verify live health, readiness, and truthful provider posture
        shell: bash
        run: |
          set -euo pipefail
          ready=false
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:58087/providers/health > /tmp/providers-health.json && curl -fsS http://127.0.0.1:58087/providers/readiness > /tmp/providers-readiness.json && curl -fsS http://127.0.0.1:58088/platform/health > /tmp/platform-health.json && curl -fsS http://127.0.0.1:58088/platform/readiness > /tmp/platform-readiness.json; then ready=true; break; fi
            sleep 2
          done
          test "${ready}" = "true"
          grep -q '"status":"ready"' /tmp/providers-readiness.json
          grep -q '"service":"platform-control"' /tmp/platform-health.json
          grep -q '"status":"ready"' /tmp/platform-readiness.json
          grep -q '"providers"' /tmp/providers-health.json
          ! grep -q '"status":"healthy"' /tmp/providers-health.json
          ! grep -qi 'mock\|credentials\|healthUrl' /tmp/providers-health.json
      - name: Validate contracts and typecheck governed surfaces
        run: |
          pnpm run contracts:lint
          pnpm --filter @bthwani/core-providers typecheck
          pnpm --dir services/dsh typecheck
          pnpm run guard:backend-api-binding
          pnpm run guard:frontend-feature-binding
      - name: Upload targeted runtime logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jrn-039-runtime-${{ github.run_id }}
          path: |
            /tmp/jrn039-providers.log
            /tmp/jrn039-platform.log
            /tmp/providers-health.json
            /tmp/providers-readiness.json
            /tmp/platform-health.json
            /tmp/platform-readiness.json
          if-no-files-found: warn
          retention-days: 14
      - name: Verify repository whitespace
        run: git diff --check
