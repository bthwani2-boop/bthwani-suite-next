name: JRN-028 All Slices Closure

on:
  push:
    branches: [sambassam]
    paths: &jrn028_paths
      - "services/dsh/backend/internal/coupons/**"
      - "services/dsh/backend/internal/http/coupon_funding_lifecycle.go"
      - "services/dsh/backend/internal/http/coupons.go"
      - "services/dsh/backend/internal/wlt/**"
      - "services/dsh/backend/internal/promotionfundingoutbox/**"
      - "services/dsh/frontend/shared/marketing/**"
      - "services/dsh/frontend/control-panel/marketing/components/CouponFundingReconciliationPanel.tsx"
      - "services/dsh/frontend/control-panel/marketing/components/CouponsCommandDeck.tsx"
      - "services/wlt/backend/internal/promotionfunding/**"
      - "services/wlt/backend/internal/shared/serviceauth.go"
      - "services/wlt/database/migrations/wlt-032_promotion_funding_ledger.sql"
      - "services/wlt/database/migrations/wlt-034_jrn_028_promotion_funding_audit_integrity.sql"
      - "services/wlt/database/tests/jrn-028-promotion-funding-*.sh"
      - "services/wlt/contracts/wlt.promotion-funding.openapi.yaml"
      - "services/dsh/contracts/**"
      - "services/dsh/clients/generated/dsh-api.ts"
      - "services/dsh/tests/jrn-028-promotion-funding.test.mjs"
      - "services/dsh/tsconfig.jrn-028.json"
      - "governance/product/JRN-028_PROMOTION_FUNDING_PRODUCT_TRUTH.md"
      - "governance/evidence/JRN-028_ALL_SLICES_CLOSURE.json"
      - "tools/verification/jrn-028-all-slices.sh"
      - ".github/workflows/jrn-028-all-slices-closure.yml"
  pull_request:
    branches: [master]
    types: [synchronize]
    paths: *jrn028_paths

permissions:
  contents: read

concurrency:
  group: jrn-028-all-slices-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  normalize-contracts:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.normalize.outputs.changed }}
    steps:
      - name: Checkout exact remote branch snapshot
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: true
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Normalize canonical DSH contracts
        id: normalize
        shell: bash
        run: |
          set -Eeuo pipefail
          pnpm --dir services/dsh openapi:compose
          pnpm --dir services/dsh openapi:generate
          if git diff --quiet -- services/dsh/contracts/generated/dsh.bundle.openapi.yaml services/dsh/clients/generated/dsh-api.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/dsh/contracts/generated/dsh.bundle.openapi.yaml services/dsh/clients/generated/dsh-api.ts
          git commit -m "chore(jrn-028): regenerate canonical DSH contract outputs"
          git push origin HEAD:sambassam
          echo "changed=true" >> "$GITHUB_OUTPUT"

  verify:
    needs: normalize-contracts
    if: always() && (github.event_name == 'pull_request' || needs.normalize-contracts.outputs.changed == 'false')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wlt_jrn_028
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d wlt_jrn_028"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGUSER: postgres
      PGDATABASE: wlt_jrn_028
    steps:
      - name: Checkout exact remote branch snapshot
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: false
      - name: Record tested branch SHA
        run: echo "JRN-028 tested SHA $(git rev-parse HEAD)"
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install verification dependencies
        run: |
          pnpm install --frozen-lockfile
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Verify WLT sovereign promotion-funding domain and handlers
        run: cd services/wlt/backend && go test ./internal/promotionfunding ./internal/shared
      - name: Verify DSH projection, WLT adapter and durable outbox
        run: cd services/dsh/backend && go test ./internal/coupons ./internal/wlt ./internal/promotionfundingoutbox
      - name: Verify FS-01 through FS-18 routes, structure and ownership
        run: node --test services/dsh/tests/jrn-028-promotion-funding.test.mjs
      - name: Verify governed TypeScript surface
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-028.json --noEmit --pretty false
      - name: Apply WLT promotion-funding schema and audit controls
        run: |
          psql -X -q -v ON_ERROR_STOP=1 -f services/wlt/database/migrations/wlt-032_promotion_funding_ledger.sql
          psql -X -q -v ON_ERROR_STOP=1 -f services/wlt/database/migrations/wlt-034_jrn_028_promotion_funding_audit_integrity.sql
          psql -X -q -v ON_ERROR_STOP=1 -Atc "SELECT to_regclass('public.wlt_promotion_funding_reservations') IS NOT NULL" | grep -qx t
          psql -X -q -v ON_ERROR_STOP=1 -Atc "SELECT to_regclass('public.wlt_promotion_funding_events') IS NOT NULL" | grep -qx t
      - name: Verify reserve, commit, release, reverse and negative invariants
        run: bash services/wlt/database/tests/jrn-028-promotion-funding-integrity.sh
      - name: Verify concurrent transition serialization
        run: bash services/wlt/database/tests/jrn-028-promotion-funding-concurrency.sh
      - name: Verify Product Truth
        run: node tools/guards/product-truth-gate.mjs
      - name: Verify canonical DSH modular OpenAPI
        run: |
          pnpm --dir services/dsh openapi:compose
          pnpm --dir services/dsh openapi:generate
          node tools/guards/dsh-openapi-modular-gate.mjs
          git diff --exit-code -- services/dsh/contracts/generated/dsh.bundle.openapi.yaml services/dsh/clients/generated/dsh-api.ts
      - name: Verify repository whitespace
        run: git diff --check
