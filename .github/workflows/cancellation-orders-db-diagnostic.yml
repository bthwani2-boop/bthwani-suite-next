name: Cancellation Orders DB Diagnostic
run-name: Cancellation Orders DB · ${{ github.sha }}

on:
  push:
    branches: ["journey/cancellation-refund-reconciliation-closure"]
    paths:
      - ".github/cancellation-orders-db-trigger"
      - ".github/workflows/cancellation-orders-db-diagnostic.yml"

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsh_journey
          POSTGRES_USER: dsh_journey
          POSTGRES_PASSWORD: dsh_journey
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U dsh_journey -d dsh_journey"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://dsh_journey:dsh_journey@localhost:55432/dsh_journey?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Apply clean DSH migration chain
        shell: bash
        run: |
          set -euo pipefail
          for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" >/dev/null
          done
      - name: Run DSH orders cancellation DB tests
        id: test
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/cancellation-orders-db
          (
            cd services/dsh/backend
            DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DATABASE_URL" go test ./internal/orders -count=1 -v
          ) 2>&1 | tee artifacts/cancellation-orders-db/orders-db.log
          exit ${PIPESTATUS[0]}
      - name: Upload orders DB diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cancellation-orders-db-${{ github.sha }}
          path: artifacts/cancellation-orders-db/orders-db.log
          if-no-files-found: error
          retention-days: 3
      - name: Publish orders DB status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RESULT: ${{ steps.test.outcome }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          state=failure
          [ "$RESULT" = success ] && state=success
          jq -n --arg state "$state" --arg context "Cancellation Orders DB Diagnostic" --arg description "DSH orders DB cancellation proof: $RESULT" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
            -d @status.json
