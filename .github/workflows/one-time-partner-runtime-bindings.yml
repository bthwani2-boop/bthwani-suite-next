name: One-time Partner Runtime Bindings

on:
  push:
    branches: [bassam]
    paths:
      - '.github/workflows/one-time-partner-runtime-bindings.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: one-time-partner-runtime-bindings
  cancel-in-progress: false

jobs:
  bind:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0

      - name: Patch router, SQL alias and OpenAPI
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count == 0 and new in text:
                  return text
              if count != 1:
                  raise SystemExit(f"{label}: expected one anchor, found {count}")
              return text.replace(old, new, 1)

          commercial_path = Path("services/dsh/backend/internal/marketing/commercial_programs.go")
          commercial = commercial_path.read_text(encoding="utf-8")
          commercial = commercial.replace(
              "INSERT INTO dsh_subscription_plans\n\t\t\t(name_ar",
              "INSERT INTO dsh_subscription_plans AS p\n\t\t\t(name_ar",
              1,
          )
          commercial_path.write_text(commercial, encoding="utf-8")

          server_path = Path("services/dsh/backend/internal/http/server.go")
          server = server_path.read_text(encoding="utf-8")
          marketing_anchor = '''\tmux.HandleFunc("GET /dsh/partner/marketing/offers", protected.handleListOwnPartnerOffers)
\tmux.HandleFunc("POST /dsh/partner/marketing/offers", protected.handleSubmitPartnerOffer)'''
          marketing_replacement = marketing_anchor + '''
\tmux.HandleFunc("GET /dsh/operator/marketing/loyalty-tiers", protected.handleListLoyaltyTiers)
\tmux.HandleFunc("POST /dsh/operator/marketing/loyalty-tiers", protected.handleCreateLoyaltyTier)
\tmux.HandleFunc("PATCH /dsh/operator/marketing/loyalty-tiers/{tierId}", protected.handleUpdateLoyaltyTier)
\tmux.HandleFunc("GET /dsh/operator/marketing/subscription-plans", protected.handleListSubscriptionPlans)
\tmux.HandleFunc("POST /dsh/operator/marketing/subscription-plans", protected.handleCreateSubscriptionPlan)
\tmux.HandleFunc("PATCH /dsh/operator/marketing/subscription-plans/{planId}", protected.handleUpdateSubscriptionPlan)
\tmux.HandleFunc("GET /dsh/client/benefits", protected.handleGetClientBenefits)'''
          server = replace_once(server, marketing_anchor, marketing_replacement, "commercial routes")

          fleet_anchor = '''\tmux.HandleFunc("GET /dsh/partner/stores/{storeId}/coverage-zones", protected.handlePartnerCoverageZones)'''
          fleet_replacement = fleet_anchor + '''
\tmux.HandleFunc("POST /dsh/partner/stores/{storeId}/couriers/{memberId}/connection-code", protected.handleIssuePartnerCourierConnectionCode)
\tmux.HandleFunc("GET /dsh/partner/stores/{storeId}/courier-connections", protected.handleListPartnerCourierConnections)
\tmux.HandleFunc("POST /dsh/partner/stores/{storeId}/courier-connections/{connectionId}/revoke", protected.handleRevokePartnerCourierConnection)'''
          server = replace_once(server, fleet_anchor, fleet_replacement, "partner fleet routes")

          captain_anchor = '''\tmux.HandleFunc("POST /dsh/captain/stores/{storeId}/pickup-readiness", protected.handleCaptainReadiness)'''
          captain_replacement = captain_anchor + '''
\tmux.HandleFunc("POST /dsh/captain/partner-fleet/connect", protected.handleCaptainConnectPartnerFleet)
\tmux.HandleFunc("GET /dsh/captain/partner-fleet/memberships", protected.handleCaptainPartnerFleetMemberships)'''
          server = replace_once(server, captain_anchor, captain_replacement, "captain fleet routes")
          server_path.write_text(server, encoding="utf-8")

          openapi_path = Path("services/dsh/contracts/dsh.openapi.yaml")
          spec = openapi_path.read_text(encoding="utf-8")
          paths_marker = "components:\n"
          commercial_paths = r'''
  /dsh/operator/marketing/loyalty-tiers:
    get:
      operationId: listDshLoyaltyTiers
      summary: List governed loyalty tiers and persisted program summary.
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Loyalty tiers and summary.
          content:
            application/json:
              schema:
                type: object
                required: [tiers, summary]
                properties:
                  tiers: { type: array, items: { $ref: "#/components/schemas/DshLoyaltyTier" } }
                  summary: { $ref: "#/components/schemas/DshLoyaltyProgramSummary" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createDshLoyaltyTier
      summary: Create a draft loyalty tier.
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshLoyaltyTierCreateRequest" }
      responses:
        "201":
          description: Loyalty tier created.
          content:
            application/json:
              schema:
                type: object
                required: [tier]
                properties:
                  tier: { $ref: "#/components/schemas/DshLoyaltyTier" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /dsh/operator/marketing/loyalty-tiers/{tierId}:
    patch:
      operationId: updateDshLoyaltyTier
      summary: Update, approve, pause or archive a loyalty tier using OCC.
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: tierId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshLoyaltyTierUpdateRequest" }
      responses:
        "200":
          description: Loyalty tier updated.
          content:
            application/json:
              schema:
                type: object
                required: [tier]
                properties:
                  tier: { $ref: "#/components/schemas/DshLoyaltyTier" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/operator/marketing/subscription-plans:
    get:
      operationId: listDshSubscriptionPlans
      summary: List governed subscription plans and verified entitlement summary.
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Subscription plans and summary.
          content:
            application/json:
              schema:
                type: object
                required: [plans, summary]
                properties:
                  plans: { type: array, items: { $ref: "#/components/schemas/DshSubscriptionPlan" } }
                  summary: { $ref: "#/components/schemas/DshSubscriptionsSummary" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createDshSubscriptionPlan
      summary: Create a draft subscription plan definition. WLT remains payment authority.
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshSubscriptionPlanCreateRequest" }
      responses:
        "201":
          description: Subscription plan created.
          content:
            application/json:
              schema:
                type: object
                required: [plan]
                properties:
                  plan: { $ref: "#/components/schemas/DshSubscriptionPlan" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /dsh/operator/marketing/subscription-plans/{planId}:
    patch:
      operationId: updateDshSubscriptionPlan
      summary: Update, approve, pause or archive a subscription plan using OCC.
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: planId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DshSubscriptionPlanUpdateRequest" }
      responses:
        "200":
          description: Subscription plan updated.
          content:
            application/json:
              schema:
                type: object
                required: [plan]
                properties:
                  plan: { $ref: "#/components/schemas/DshSubscriptionPlan" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/client/benefits:
    get:
      operationId: getDshClientBenefits
      summary: Return only marketing-approved tiers, plans and currently published partner offers.
      tags: [DshMarketing]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Client benefits assembled from governed sources.
          content:
            application/json:
              schema:
                type: object
                required: [benefits]
                properties:
                  benefits: { $ref: "#/components/schemas/DshClientBenefits" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /dsh/partner/stores/{storeId}/couriers/{memberId}/connection-code:
    post:
      operationId: issueDshPartnerCourierConnectionCode
      summary: Issue a short-lived one-time code for an eligible courier team member.
      tags: [DshPartnerFleet]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: storeId, in: path, required: true, schema: { type: string } }
        - { name: memberId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                expiresInHours: { type: integer, minimum: 1, maximum: 48, default: 24 }
      responses:
        "201":
          description: Plaintext code is returned once and never persisted.
          content:
            application/json:
              schema:
                type: object
                required: [issued]
                properties:
                  issued: { $ref: "#/components/schemas/DshIssuedCourierConnection" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/partner/stores/{storeId}/courier-connections:
    get:
      operationId: listDshPartnerCourierConnections
      summary: List connection-code lifecycle records for the authenticated partner store.
      tags: [DshPartnerFleet]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: storeId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Connection records without plaintext codes.
          content:
            application/json:
              schema:
                type: object
                required: [connections]
                properties:
                  connections: { type: array, items: { $ref: "#/components/schemas/DshCourierConnection" } }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /dsh/partner/stores/{storeId}/courier-connections/{connectionId}/revoke:
    post:
      operationId: revokeDshPartnerCourierConnection
      summary: Revoke a pending courier connection code using OCC.
      tags: [DshPartnerFleet]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: storeId, in: path, required: true, schema: { type: string } }
        - { name: connectionId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expectedVersion]
              properties:
                expectedVersion: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Connection revoked.
          content:
            application/json:
              schema:
                type: object
                required: [connection]
                properties:
                  connection: { $ref: "#/components/schemas/DshCourierConnection" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/captain/partner-fleet/connect:
    post:
      operationId: connectDshCaptainToPartnerFleet
      summary: Redeem a one-time partner courier code as the authenticated captain.
      tags: [DshPartnerFleet]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 8, maxLength: 16 }
      responses:
        "200":
          description: Captain identity bound to the store courier team member.
          content:
            application/json:
              schema:
                type: object
                required: [membership]
                properties:
                  membership: { $ref: "#/components/schemas/DshCaptainFleetMembership" }
        "400": { $ref: "#/components/responses/InvalidRequest" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /dsh/captain/partner-fleet/memberships:
    get:
      operationId: listDshCaptainPartnerFleetMemberships
      summary: List partner-store courier memberships bound to the authenticated captain.
      tags: [DshPartnerFleet]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Captain fleet memberships.
          content:
            application/json:
              schema:
                type: object
                required: [memberships]
                properties:
                  memberships: { type: array, items: { $ref: "#/components/schemas/DshCaptainFleetMembership" } }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }

'''
          if "/dsh/operator/marketing/loyalty-tiers:" not in spec:
              spec = replace_once(spec, paths_marker, commercial_paths + paths_marker, "OpenAPI paths")

          schema_marker = "  schemas:\n"
          schemas = r'''    DshLoyaltyTier:
      type: object
      required: [id, nameAr, nameEn, minPoints, discountPercent, freeDeliveryThreshold, badge, status, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        nameAr: { type: string }
        nameEn: { type: string }
        minPoints: { type: integer, format: int64, minimum: 0 }
        discountPercent: { type: number, minimum: 0, maximum: 100 }
        freeDeliveryThreshold: { type: integer, format: int64, minimum: 0 }
        badge: { type: string }
        status: { type: string, enum: [draft, active, paused, archived] }
        version: { type: integer, minimum: 1 }
        createdByActorId: { type: string }
        approvedByActorId: { type: string }
        approvedAt: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }
    DshLoyaltyProgramSummary:
      type: object
      required: [activeTiers, totalEnrolledClients, pointsIssuedThisMonth, isBackedByApi]
      properties:
        activeTiers: { type: integer, format: int64 }
        totalEnrolledClients: { type: integer, format: int64 }
        pointsIssuedThisMonth: { type: integer, format: int64 }
        isBackedByApi: { type: boolean }
    DshLoyaltyTierCreateRequest:
      type: object
      required: [nameAr, minPoints, discountPercent, freeDeliveryThreshold]
      properties:
        nameAr: { type: string, minLength: 1 }
        nameEn: { type: string }
        minPoints: { type: integer, format: int64, minimum: 0 }
        discountPercent: { type: number, minimum: 0, maximum: 100 }
        freeDeliveryThreshold: { type: integer, format: int64, minimum: 0 }
        badge: { type: string }
    DshLoyaltyTierUpdateRequest:
      allOf:
        - { $ref: "#/components/schemas/DshLoyaltyTierCreateRequest" }
        - type: object
          required: [expectedVersion]
          properties:
            status: { type: string, enum: [draft, active, paused, archived] }
            expectedVersion: { type: integer, minimum: 1 }
    DshSubscriptionPlan:
      type: object
      required: [id, nameAr, nameEn, priceYer, billingCycle, includeFreeDelivery, pointsMultiplier, orderCap, badge, status, subscriberCount, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        nameAr: { type: string }
        nameEn: { type: string }
        priceYer: { type: integer, format: int64, minimum: 1 }
        billingCycle: { type: string, enum: [monthly, quarterly, annual] }
        includeFreeDelivery: { type: boolean }
        pointsMultiplier: { type: number, minimum: 1 }
        orderCap: { type: integer, minimum: 0 }
        badge: { type: string }
        status: { type: string, enum: [draft, active, paused, archived] }
        subscriberCount: { type: integer, format: int64 }
        wltProductReference: { type: string }
        version: { type: integer, minimum: 1 }
        createdByActorId: { type: string }
        approvedByActorId: { type: string }
        approvedAt: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }
    DshSubscriptionsSummary:
      type: object
      required: [activePlans, totalActiveSubscribers, mrr, isBackedByApi]
      properties:
        activePlans: { type: integer, format: int64 }
        totalActiveSubscribers: { type: integer, format: int64 }
        mrr: { type: integer, format: int64 }
        isBackedByApi: { type: boolean }
    DshSubscriptionPlanCreateRequest:
      type: object
      required: [nameAr, priceYer, billingCycle, includeFreeDelivery, pointsMultiplier, orderCap]
      properties:
        nameAr: { type: string, minLength: 1 }
        nameEn: { type: string }
        priceYer: { type: integer, format: int64, minimum: 1 }
        billingCycle: { type: string, enum: [monthly, quarterly, annual] }
        includeFreeDelivery: { type: boolean }
        pointsMultiplier: { type: number, minimum: 1 }
        orderCap: { type: integer, minimum: 0 }
        badge: { type: string }
        wltProductReference: { type: string }
    DshSubscriptionPlanUpdateRequest:
      allOf:
        - { $ref: "#/components/schemas/DshSubscriptionPlanCreateRequest" }
        - type: object
          required: [expectedVersion]
          properties:
            status: { type: string, enum: [draft, active, paused, archived] }
            expectedVersion: { type: integer, minimum: 1 }
    DshClientBenefits:
      type: object
      required: [availableTiers, availablePlans, offers]
      properties:
        loyaltyAccount:
          type: object
          properties:
            pointsBalance: { type: integer, format: int64 }
            lifetimePoints: { type: integer, format: int64 }
            tier: { $ref: "#/components/schemas/DshLoyaltyTier" }
        availableTiers: { type: array, items: { $ref: "#/components/schemas/DshLoyaltyTier" } }
        availablePlans: { type: array, items: { $ref: "#/components/schemas/DshSubscriptionPlan" } }
        activeSubscription:
          type: object
          properties:
            id: { type: string }
            status: { type: string }
            wltSubscriptionReference: { type: string }
            startsAt: { type: string }
            endsAt: { type: string }
            plan: { $ref: "#/components/schemas/DshSubscriptionPlan" }
        offers: { type: array, items: { type: object, additionalProperties: true } }
    DshCourierConnection:
      type: object
      required: [id, storeId, teamMemberId, codeLast4, status, expiresAt, version, createdAt, updatedAt]
      properties:
        id: { type: string }
        storeId: { type: string }
        teamMemberId: { type: string }
        codeLast4: { type: string }
        status: { type: string, enum: [pending, redeemed, revoked, expired] }
        expiresAt: { type: string }
        redeemedByCaptainActorId: { type: string }
        redeemedAt: { type: string }
        version: { type: integer, minimum: 1 }
        createdAt: { type: string }
        updatedAt: { type: string }
    DshIssuedCourierConnection:
      type: object
      required: [connection, code]
      properties:
        connection: { $ref: "#/components/schemas/DshCourierConnection" }
        code: { type: string, minLength: 8 }
    DshCaptainFleetMembership:
      type: object
      required: [teamMemberId, storeId, storeName, courierName, status, version]
      properties:
        teamMemberId: { type: string }
        storeId: { type: string }
        storeName: { type: string }
        courierName: { type: string }
        status: { type: string }
        branchAssignment: { type: string }
        deliveryAssignment: { type: string }
        version: { type: integer, minimum: 1 }
'''
          if "    DshLoyaltyTier:\n" not in spec:
              spec = replace_once(spec, schema_marker, schema_marker + schemas, "OpenAPI schemas")
          openapi_path.write_text(spec, encoding="utf-8")
          PY
          gofmt -w services/dsh/backend/internal/marketing/commercial_programs.go services/dsh/backend/internal/http/commercial_programs.go services/dsh/backend/internal/partnerfleet/courier_codes.go services/dsh/backend/internal/http/partner_fleet.go
          git diff --check

      - name: Generate DSH client
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile
          pnpm run openapi:generate:dsh

      - name: Commit runtime bindings
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add services/dsh/backend/internal/marketing/commercial_programs.go services/dsh/backend/internal/http/server.go services/dsh/backend/internal/http/commercial_programs.go services/dsh/backend/internal/partnerfleet/courier_codes.go services/dsh/backend/internal/http/partner_fleet.go services/dsh/contracts/dsh.openapi.yaml services/dsh/clients/generated/dsh-api.ts
          git commit -m 'feat(partners): bind commercial programs and courier fleet runtime'
          git pull --rebase origin bassam
          git push origin HEAD:bassam

      - name: Verify after commit
        shell: bash
        run: |
          set -euo pipefail
          (cd services/dsh/backend && go test ./...)
          pnpm run contracts:lint
          pnpm run guard:backend-api-binding
          pnpm run guard:api-binding
          pnpm run guard:no-broken-imports
          pnpm run typecheck
