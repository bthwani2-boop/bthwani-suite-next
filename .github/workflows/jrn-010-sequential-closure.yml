name: JRN-010 Sequential Checkout Closure

on:
  push:
    branches: [sambassam]
    paths:
      - .github/workflows/jrn-010-sequential-closure.yml

permissions:
  contents: write

concurrency:
  group: jrn-010-sequential-closure-sambassam
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sambassam
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Decode sequential executor
        shell: bash
        run: |
          mkdir -p tools/scripts
          printf '%s' '' | base64 -d | gzip -d > tools/scripts/jrn-010-sequential-closure.py

      - name: Execute JRN-010 slices sequentially
        run: python tools/scripts/jrn-010-sequential-closure.py
