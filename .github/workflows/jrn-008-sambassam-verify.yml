name: JRN-008 Catalog Slice Closure

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "services/dsh/backend/internal/centralcatalog/**"
      - "services/dsh/backend/internal/http/catalog_*"
      - "services/dsh/contracts/dsh.catalog*.openapi.yaml"
      - "services/dsh/contracts/contract-registry.ts"
      - "services/dsh/capability-map.extensions.ts"
      - "services/dsh/database/migrations/dsh-03*_catalog*.sql"
      - "services/dsh/database/migrations/dsh-046_field_visit_gps.sql"
      - "services/dsh/database/migrations/dsh-930_jrn_008_catalog_slice_closure.sql"
      - "services/dsh/database/migrations/dsh-931_jrn_008_assortment_pause_restore.sql"
      - "services/dsh/database/migrations/dsh-932_jrn_008_audit_trigger_safety.sql"
      - "services/dsh/frontend/shared/catalog/**"
      - "services/dsh/frontend/control-panel/catalogs/**"
      - "services/dsh/frontend/app-partner/catalog/**"
      - "services/dsh/frontend/app-field/components/DshField*Catalog*"
      - "services/dsh/frontend/app-field/components/DshField*Pause*"
      - "services/dsh/frontend/app-field/components/DshFieldRouteRenderer.tsx"
      - "apps/control-panel/runtime/src/app/dsh/catalogs/**"
      - "services/dsh/tests/jrn-008-all-slices.test.mjs"
      - "tools/scripts/test-jrn-008-catalog-migrations.ps1"
      - "tools/guards/catalog/jrn-008-*.mjs"
      - ".github/workflows/jrn-008-sambassam-verify.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-008-${{ github.sha }}
  cancel-in-progress: false

jobs:
  announce:
    name: Announce JRN-008 verification
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state "pending" --arg context "journeys/jrn-008/catalog-slice-closure" --arg description "JRN-008 catalog slice verification is running" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json

  static-contracts:
    name: JRN-008 slices, contracts and ownership
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Verify static slice truth
        shell: bash
        run: |
          set -o pipefail
          : >/tmp/jrn-008-static.log
          git diff --check 2>&1 | tee -a /tmp/jrn-008-static.log
          node --test services/dsh/tests/jrn-008-all-slices.test.mjs 2>&1 | tee -a /tmp/jrn-008-static.log
          node tools/guards/catalog/jrn-008-contract-ownership-gate.mjs 2>&1 | tee -a /tmp/jrn-008-static.log
      - name: Upload static evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-008-static-evidence
          path: /tmp/jrn-008-static.log
          retention-days: 5
          if-no-files-found: error

  go-runtime:
    name: JRN-008 Go runtime and route behavior
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify Go formatting and behavior
        shell: bash
        run: |
          set -o pipefail
          : >/tmp/jrn-008-go.log
          cd services/dsh/backend
          files=(
            internal/centralcatalog/catalog_governance.go
            internal/centralcatalog/catalog_pause_readback.go
            internal/centralcatalog/catalog_governance_test.go
            internal/http/catalog_governance_handlers.go
            internal/http/catalog_governance_routes_test.go
            internal/http/catalog_unified_routes.go
          )
          unformatted="$(gofmt -l "${files[@]}")"
          if [ -n "$unformatted" ]; then
            printf 'UNFORMATTED_GO_FILES\n%s\n' "$unformatted" | tee -a /tmp/jrn-008-go.log
            exit 1
          fi
          go test ./internal/centralcatalog ./internal/http -count=1 2>&1 | tee -a /tmp/jrn-008-go.log
      - name: Upload Go evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-008-go-evidence
          path: /tmp/jrn-008-go.log
          retention-days: 5
          if-no-files-found: error

  typescript-surfaces:
    name: JRN-008 control partner field TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Typecheck catalog surfaces
        shell: bash
        run: |
          set -o pipefail
          : >/tmp/jrn-008-typescript.log
          pnpm --dir apps/control-panel/runtime exec tsc --noEmit --pretty false 2>&1 | tee -a /tmp/jrn-008-typescript.log
          pnpm --dir apps/app-partner/runtime exec tsc --noEmit --pretty false 2>&1 | tee -a /tmp/jrn-008-typescript.log
          pnpm --dir apps/app-field/runtime exec tsc --noEmit --pretty false 2>&1 | tee -a /tmp/jrn-008-typescript.log
      - name: Upload TypeScript evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-008-typescript-evidence
          path: /tmp/jrn-008-typescript.log
          retention-days: 5
          if-no-files-found: error

  database:
    name: JRN-008 migration replay and central-catalog verification
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bthwani_runtime
          POSTGRES_PASSWORD: bthwani_runtime
          POSTGRES_DB: bthwani_runtime
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bthwani_runtime -d bthwani_runtime"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: bthwani_runtime
      PGPASSWORD: bthwani_runtime
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Build full schema once and replay JRN-008 migrations
        shell: pwsh
        run: ./tools/scripts/test-jrn-008-catalog-migrations.ps1 -PsqlMode native *> /tmp/jrn-008-database.log
      - name: Upload database evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-008-database-evidence
          path: /tmp/jrn-008-database.log
          retention-days: 5
          if-no-files-found: warn

  result:
    name: JRN-008 final verification result
    if: always()
    needs: [announce, static-contracts, go-runtime, typescript-surfaces, database]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Publish same-commit result
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATIC_RESULT: ${{ needs.static-contracts.result }}
          GO_RESULT: ${{ needs.go-runtime.result }}
          TS_RESULT: ${{ needs.typescript-surfaces.result }}
          DB_RESULT: ${{ needs.database.result }}
        shell: bash
        run: |
          state=success
          description="JRN-008 all catalog slices verified"
          for result in "$STATIC_RESULT" "$GO_RESULT" "$TS_RESULT" "$DB_RESULT"; do
            if [ "$result" != "success" ]; then
              state=failure
              description="JRN-008 verification failed: static=$STATIC_RESULT go=$GO_RESULT ts=$TS_RESULT db=$DB_RESULT"
              break
            fi
          done
          jq -n --arg state "$state" --arg context "journeys/jrn-008/catalog-slice-closure" --arg description "$description" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
          test "$state" = success
