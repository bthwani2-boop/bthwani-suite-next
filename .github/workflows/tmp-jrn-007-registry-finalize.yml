# Temporary one-shot finalizer; deletes itself after a successful registry commit.
name: Temporary JRN-007 Registry Finalizer

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-jrn-007-registry-finalize.yml"

permissions:
  contents: write

concurrency:
  group: jrn-007-registry-finalize
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout latest target branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: true

      - name: Rebase onto latest remote head
        run: git pull --rebase origin sambassam

      - name: Patch JRN-007 canonical registry
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          registry_path = Path("governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md")
          text = registry_path.read_text(encoding="utf-8")

          old_index = "| JRN-007 | الصفحة الرئيسية والاكتشاف التسويقي | DSH | NEEDS_EVIDENCE |"
          new_index = "| JRN-007 | الصفحة الرئيسية والاكتشاف التسويقي | DSH | READY_FOR_REVIEW |"
          if old_index in text:
              text = text.replace(old_index, new_index, 1)
          elif new_index not in text:
              raise SystemExit("JRN-007 index row was not found")

          marker = "<!-- JRN-007-CODE-CLOSURE-2026-07-21 -->"
          closure = f"""

          {marker}
          ## إغلاق الكود للرحلة JRN-007 — 2026-07-21

          - `repository_mode`: `REMOTE_ONLY`
          - `target_ref`: `sambassam`
          - `tracking_status`: `READY_FOR_REVIEW`
          - `decision`: `READY_FOR_REVIEW`
          - `code_closure`: `COMPLETE`
          - `verified_implementation_commit`: `7018be0d7de0abd6ce98311a7cb0ad245b93ac49`
          - `proof_run_id`: `29867162535`
          - `status_context`: `journeys/jrn-007/home-discovery`
          - `permanent_gate`: `.github/workflows/jrn-007-sambassam-verify.yml`
          - `product_truth`: `governance/product-truth/JRN-007_HOME_DISCOVERY_PRODUCT_TRUTH.md`
          - `evidence`: `governance/evidence/JRN-007_FULLSTACK_MULTI_SURFACE_CLOSURE.json`
          - أُغلقت الشرائح `JRN-007-S1..S8` في الكود الفعلي: المجموعات والفئات، البنرات والوسائط والإجراءات، الاستهداف الإقليمي والجماهيري، الجدولة والنشر، CRUD المحكوم، منع ازدواج الملكية، حالات تطبيق العميل، وقياس الظهور والنقر المحكوم بالسياق.
          - `open_code_gaps`: `[]`
          - لا تُستخدم `CLOSED_WITH_EVIDENCE` قبل الموافقات المستقلة وأدلة الجهاز الفعلي والإصدار المطلوبة في السجل الحاكم.
          - لم يُنشأ Pull Request ولم يُنفذ Merge أو Force Push ضمن هذا الإغلاق.
          """
          closure = "\n".join(line.strip() for line in closure.splitlines()).strip() + "\n"
          if marker not in text:
              text = text.rstrip() + "\n\n" + closure

          registry_path.write_text(text, encoding="utf-8")
          Path(".github/workflows/tmp-jrn-007-registry-finalize.yml").unlink()
          PY

      - name: Commit registry closure
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md .github/workflows/tmp-jrn-007-registry-finalize.yml
          git commit -m "governance(jrn-007): anchor verified eight-slice code closure"
          git push origin HEAD:sambassam
