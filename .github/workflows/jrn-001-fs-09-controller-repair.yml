name: JRN-001 FS-09 controller privacy repair

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-09-controller-repair.yml]

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Prevent masked payout values from becoming raw form input
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx')
          text = path.read_text(encoding='utf-8')
          old = '  fieldCreateVisit,\n  type DshPartnerDocumentType,'
          new = '  fieldCreateVisit,\n  createPartnerMutationContext,\n  assertPartnerReadback,\n  mapPartnerOnboardingFailure,\n  type DshPartnerDocumentType,'
          if old not in text:
              raise SystemExit('controller import anchor not found')
          text = text.replace(old, new, 1)
          replacements = {
              '          accountNumber: partner.accountNumber,': '          accountNumber: "",',
              '          iban: partner.iban,': '          iban: "",',
              '          payoutMobileNumber: partner.payoutMobileNumber,': '          payoutMobileNumber: "",',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'controller privacy line not found: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git config user.name 'bthwani-governance-bot'
          git config user.email 'noreply@bthwani.local'
          git add services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx
          git commit -m 'fix(jrn-001): keep masked payout values out of raw form state'
          git push origin HEAD:sambassam
      - name: Publish repair status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then STATE=success; DESCRIPTION='FS-09 controller privacy repaired'; else STATE=failure; DESCRIPTION='FS-09 controller privacy repair failed'; fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-09-repair-controller-privacy' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json