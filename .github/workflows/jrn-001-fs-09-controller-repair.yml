name: JRN-001 FS-09 controller readback repair

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-09-controller-repair.yml]

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Add mutation identity and read-after-write
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx')
          text = path.read_text(encoding='utf-8')

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              if old not in text:
                  raise SystemExit(f'{label} not found')
              text = text.replace(old, new, 1)

          replace_once(
              '    try:\n      const res = await fieldCreateDraft({',
              '    try:\n      const createMutation = createPartnerMutationContext("field-create-draft", "new-draft");\n      const res = await fieldCreateDraft({',
              'draft create context',
          )
          replace_once(
              '''        notes: form.notes ?? "",
      });
      await fieldUpdatePartnerStore(res.id, buildStoreDraftInput(form));
      setState((s) => ({
        ...s,
        partnerId: res.id,
        partnerVersion: res.version,''',
              '''        notes: form.notes ?? "",
      }, createMutation);
      await fieldUpdatePartnerStore(
        res.id,
        buildStoreDraftInput(form),
        createPartnerMutationContext("field-update-first-store", res.id),
      );
      const readback = assertPartnerReadback(res.id, res.version, await fieldGetPartner(res.id));
      setState((s) => ({
        ...s,
        partnerId: readback.id,
        partnerVersion: readback.version,''',
              'draft readback',
          )
          replace_once('      return res.id;', '      return readback.id;', 'draft return readback')
          replace_once(
              '''      const msg = err && typeof err === "object" && "status" in err
        ? `فشل إنشاء مسودة الشريك (رمز الخطأ: ${(err as any).status})`
        : "فشل إنشاء مسودة الشريك";
      setState((s) => ({ ...s, submitError: msg }));''',
              '''      const failure = mapPartnerOnboardingFailure(err);
      setState((s) => ({ ...s, submitError: failure.message }));''',
              'draft failure mapping',
          )

          replace_once(
              '''      const updatedPartner = await fieldUpdatePartner(
        state.partnerId,
        buildUpdatePartnerInput(state.form),
        state.partnerVersion ?? 0
      );
      await fieldUpdatePartnerStore(state.partnerId, buildStoreDraftInput(state.form));
      setState((s) => ({
        ...s,
        isSaving: false,
        isDirty: false,
        partnerVersion: updatedPartner.version,''',
              '''      const expectedVersion = state.partnerVersion ?? 0;
      const updatedPartner = await fieldUpdatePartner(
        state.partnerId,
        buildUpdatePartnerInput(state.form),
        expectedVersion,
        createPartnerMutationContext("field-save-partner", state.partnerId, expectedVersion),
      );
      await fieldUpdatePartnerStore(
        state.partnerId,
        buildStoreDraftInput(state.form),
        createPartnerMutationContext("field-save-store", state.partnerId),
      );
      const readback = assertPartnerReadback(
        state.partnerId,
        updatedPartner.version,
        await fieldGetPartner(state.partnerId),
      );
      setState((s) => ({
        ...s,
        isSaving: false,
        isDirty: false,
        partnerVersion: readback.version,''',
              'save readback',
          )
          replace_once(
              '''      const status = err && typeof err === "object" && "status" in err ? (err as any).status : undefined;
      if (status === 409) {
        setState((s) => ({
          ...s,
          isSaving: false,
          submitError: "تم تعديل بيانات هذا الملف من مكان آخر. أعد تحميل الملف قبل الحفظ مرة أخرى.",
        }));
        return false;
      }
      setState((s) => ({
        ...s,
        isSaving: false,
        submitError: "فشل حفظ التعديلات. تحقق من اتصال الشبكة وأعد المحاولة.",
      }));''',
              '''      const failure = mapPartnerOnboardingFailure(err);
      setState((s) => ({
        ...s,
        isSaving: false,
        submitError: failure.message,
      }));''',
              'save failure mapping',
          )

          replace_once(
              '''      const doc = await fieldUploadDocument(state.partnerId, {
        documentType: kind,
        mediaRef,
        notes: "مرفوع عبر تطبيق الميداني",
      });''',
              '''      const doc = await fieldUploadDocument(
        state.partnerId,
        {
          documentType: kind,
          mediaRef,
          notes: "مرفوع عبر تطبيق الميداني",
        },
        createPartnerMutationContext("field-upload-document", `${state.partnerId}:${kind}`),
      );''',
              'document mutation',
          )
          replace_once(
              '      setState((s) => ({ ...s, submitError: "تعذر رفع المستند. يرجى التحقق من اتصال الشبكة." }));',
              '      const failure = mapPartnerOnboardingFailure(err);\n      setState((s) => ({ ...s, submitError: failure.message }));',
              'document failure mapping',
          )

          replace_once(
              '''      const updatedPartner = await fieldUpdatePartner(
        state.partnerId,
        buildUpdatePartnerInput(state.form),
        state.partnerVersion ?? 0
      );
      await fieldUpdatePartnerStore(state.partnerId, buildStoreDraftInput(state.form));''',
              '''      const expectedVersion = state.partnerVersion ?? 0;
      const updatedPartner = await fieldUpdatePartner(
        state.partnerId,
        buildUpdatePartnerInput(state.form),
        expectedVersion,
        createPartnerMutationContext("field-submit-save", state.partnerId, expectedVersion),
      );
      await fieldUpdatePartnerStore(
        state.partnerId,
        buildStoreDraftInput(state.form),
        createPartnerMutationContext("field-submit-store", state.partnerId),
      );''',
              'submit mutation',
          )
          replace_once(
              '        await fieldCreateVisit(state.partnerId, visitPayload);',
              '''        await fieldCreateVisit(
          state.partnerId,
          visitPayload,
          createPartnerMutationContext("field-submit-visit", state.partnerId),
        );''',
              'visit mutation',
          )
          replace_once(
              '''      await fieldSubmitPartner(state.partnerId);
      setState((s) => ({ ...s, isSubmitting: false, isSubmitted: true, partnerVersion: updatedPartner.version }));''',
              '''      const submitted = await fieldSubmitPartner(
        state.partnerId,
        createPartnerMutationContext("field-submit-partner", state.partnerId, updatedPartner.version),
      );
      const readback = assertPartnerReadback(
        state.partnerId,
        submitted.partner.version,
        await fieldGetPartner(state.partnerId),
      );
      setState((s) => ({ ...s, isSubmitting: false, isSubmitted: true, partnerVersion: readback.version }));''',
              'submit readback',
          )
          replace_once(
              '''      const msg = err && typeof err === "object" && "status" in err && (err as any).status === 422
        ? "لا يمكن إرسال الملف في الحالة الحالية — تأكد من استكمال البيانات"
        : "فشل إرسال مسودة الشريك للمراجعة";
      setState((s) => ({
        ...s,
        isSubmitting: false,
        submitError: msg,
      }));''',
              '''      const failure = mapPartnerOnboardingFailure(err);
      setState((s) => ({
        ...s,
        isSubmitting: false,
        submitError: failure.message,
      }));''',
              'submit failure mapping',
          )

          path.write_text(text, encoding='utf-8')
          PY
          git config user.name 'bthwani-governance-bot'
          git config user.email 'noreply@bthwani.local'
          git add services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx
          git commit -m 'fix(jrn-001): enforce field onboarding mutation readback'
          git push origin HEAD:sambassam
      - name: Publish repair status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then STATE=success; DESCRIPTION='FS-09 controller readback repaired'; else STATE=failure; DESCRIPTION='FS-09 controller readback repair failed'; fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-09-repair-controller-readback' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json