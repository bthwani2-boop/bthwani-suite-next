name: JRN-001 FS-09 controller repair

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-09-controller-repair.yml]

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Repair field onboarding controller
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx')
          text = path.read_text(encoding='utf-8')

          old = '''  fieldCreateVisit,
            type DshPartnerDocumentType,
          } from "../partner";'''.replace('            ', '  ')
          new = '''  fieldCreateVisit,
            createPartnerMutationContext,
            assertPartnerReadback,
            mapPartnerOnboardingFailure,
            type DshPartnerDocumentType,
          } from "../partner";'''.replace('            ', '  ')
          if old not in text:
              raise SystemExit('controller import anchor not found')
          text = text.replace(old, new, 1)

          pattern = re.compile(r'''      const res = await fieldCreateDraft\((\{.*?\})\);\n      await fieldUpdatePartnerStore\(res\.id, buildStoreDraftInput\(form\)\);\n      setState\(\(s\) => \(\{\n        \.\.\.s,\n        partnerId: res\.id,\n        partnerVersion: res\.version,''', re.S)
          replacement = '''      const createMutation = createPartnerMutationContext("field-create-draft", "new-draft");
          const res = await fieldCreateDraft(\1, createMutation);
          await fieldUpdatePartnerStore(
            res.id,
            buildStoreDraftInput(form),
            createPartnerMutationContext("field-update-first-store", res.id),
          );
          const readback = assertPartnerReadback(res.id, res.version, await fieldGetPartner(res.id));
          setState((s) => ({
            ...s,
            partnerId: readback.id,
            partnerVersion: readback.version,'''.replace('          ', '')
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'create/readback block matches={count}')

          for old_line, new_line in [
              ('          accountNumber: partner.accountNumber,', '          accountNumber: "",'),
              ('          iban: partner.iban,', '          iban: "",'),
              ('          payoutMobileNumber: partner.payoutMobileNumber,', '          payoutMobileNumber: "",'),
          ]:
              if old_line not in text:
                  raise SystemExit(f'raw hydration line missing: {old_line}')
              text = text.replace(old_line, new_line, 1)

          save_start = text.index('  const saveDraft = useCallback')
          save_end = text.index('  const save = useCallback', save_start)
          save = text[save_start:save_end]
          pattern = re.compile(r'''      const updatedPartner = await fieldUpdatePartner\(\n        state\.partnerId,\n        buildUpdatePartnerInput\(state\.form\),\n        state\.partnerVersion \?\? 0\n      \);\n      await fieldUpdatePartnerStore\(state\.partnerId, buildStoreDraftInput\(state\.form\)\);\n      setState\(\(s\) => \(\{\n        \.\.\.s,\n        isSaving: false,\n        isDirty: false,\n        partnerVersion: updatedPartner\.version,''')
          replacement = '''      const expectedVersion = state.partnerVersion ?? 0;
          const updatedPartner = await fieldUpdatePartner(
            state.partnerId,
            buildUpdatePartnerInput(state.form),
            expectedVersion,
            createPartnerMutationContext("field-save-partner", state.partnerId, expectedVersion),
          );
          await fieldUpdatePartnerStore(
            state.partnerId,
            buildStoreDraftInput(state.form),
            createPartnerMutationContext("field-save-store", state.partnerId),
          );
          const readback = assertPartnerReadback(
            state.partnerId,
            updatedPartner.version,
            await fieldGetPartner(state.partnerId),
          );
          setState((s) => ({
            ...s,
            isSaving: false,
            isDirty: false,
            partnerVersion: readback.version,'''.replace('          ', '')
          save, count = pattern.subn(replacement, save, count=1)
          if count != 1:
              raise SystemExit(f'save/readback block matches={count}')
          pattern = re.compile(r'''    \} catch \(err\) \{\n      const status = .*?\n      if \(status === 409\) \{.*?\n        return false;\n      \}\n      setState\(\(s\) => \(\{\n        \.\.\.s,\n        isSaving: false,\n        submitError: "فشل حفظ التعديلات\. تحقق من اتصال الشبكة وأعد المحاولة\.",\n      \}\)\);\n      return false;\n    \}''', re.S)
          replacement = '''    } catch (err) {
            const failure = mapPartnerOnboardingFailure(err);
            setState((s) => ({
              ...s,
              isSaving: false,
              submitError: failure.message,
            }));
            return false;
          }'''.replace('          ', '')
          save, count = pattern.subn(replacement, save, count=1)
          if count != 1:
              raise SystemExit(f'save failure mapping matches={count}')
          text = text[:save_start] + save + text[save_end:]

          old = '''      const doc = await fieldUploadDocument(state.partnerId, {
            documentType: kind,
            mediaRef,
            notes: "مرفوع عبر تطبيق الميداني",
          });'''.replace('          ', '')
          new = '''      const doc = await fieldUploadDocument(
            state.partnerId,
            {
              documentType: kind,
              mediaRef,
              notes: "مرفوع عبر تطبيق الميداني",
            },
            createPartnerMutationContext("field-upload-document", `${state.partnerId}:${kind}`),
          );'''.replace('          ', '')
          if old not in text:
              raise SystemExit('document mutation block not found')
          text = text.replace(old, new, 1)

          submit_start = text.index('  const submitDraft = useCallback')
          submit_end = text.index('  const reset = useCallback', submit_start)
          submit = text[submit_start:submit_end]
          pattern = re.compile(r'''      const updatedPartner = await fieldUpdatePartner\(\n        state\.partnerId,\n        buildUpdatePartnerInput\(state\.form\),\n        state\.partnerVersion \?\? 0\n      \);\n      await fieldUpdatePartnerStore\(state\.partnerId, buildStoreDraftInput\(state\.form\)\);''')
          replacement = '''      const expectedVersion = state.partnerVersion ?? 0;
          const updatedPartner = await fieldUpdatePartner(
            state.partnerId,
            buildUpdatePartnerInput(state.form),
            expectedVersion,
            createPartnerMutationContext("field-submit-save", state.partnerId, expectedVersion),
          );
          await fieldUpdatePartnerStore(
            state.partnerId,
            buildStoreDraftInput(state.form),
            createPartnerMutationContext("field-submit-store", state.partnerId),
          );'''.replace('          ', '')
          submit, count = pattern.subn(replacement, submit, count=1)
          if count != 1:
              raise SystemExit(f'submit save block matches={count}')
          old = '        await fieldCreateVisit(state.partnerId, visitPayload);'
          new = '''        await fieldCreateVisit(
          state.partnerId,
          visitPayload,
          createPartnerMutationContext("field-submit-visit", state.partnerId),
        );'''
          if old not in submit:
              raise SystemExit('submit visit call not found')
          submit = submit.replace(old, new, 1)
          old = '''      await fieldSubmitPartner(state.partnerId);
          setState((s) => ({ ...s, isSubmitting: false, isSubmitted: true, partnerVersion: updatedPartner.version }));'''.replace('          ', '')
          new = '''      const submitted = await fieldSubmitPartner(
            state.partnerId,
            createPartnerMutationContext("field-submit-partner", state.partnerId, updatedPartner.version),
          );
          const readback = assertPartnerReadback(
            state.partnerId,
            submitted.partner.version,
            await fieldGetPartner(state.partnerId),
          );
          setState((s) => ({ ...s, isSubmitting: false, isSubmitted: true, partnerVersion: readback.version }));'''.replace('          ', '')
          if old not in submit:
              raise SystemExit('submit readback block not found')
          submit = submit.replace(old, new, 1)
          pattern = re.compile(r'''    \} catch \(err\) \{\n      const msg = .*?\n      setState\(\(s\) => \(\{\n        \.\.\.s,\n        isSubmitting: false,\n        submitError: msg,\n      \}\)\);\n    \}''', re.S)
          replacement = '''    } catch (err) {
            const failure = mapPartnerOnboardingFailure(err);
            setState((s) => ({
              ...s,
              isSubmitting: false,
              submitError: failure.message,
            }));
          }'''.replace('          ', '')
          submit, count = pattern.subn(replacement, submit, count=1)
          if count != 1:
              raise SystemExit(f'submit failure mapping matches={count}')
          text = text[:submit_start] + submit + text[submit_end:]

          path.write_text(text, encoding='utf-8')
          PY
          git config user.name 'bthwani-governance-bot'
          git config user.email 'noreply@bthwani.local'
          git add services/dsh/frontend/shared/field-onboarding/use-field-partner-onboarding-controller.tsx
          git commit -m 'fix(jrn-001): enforce onboarding readback in field controller'
          git push origin HEAD:sambassam
      - name: Publish repair status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT: ${{ job.status }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ "$RESULT" = "success" ]; then STATE=success; DESCRIPTION='FS-09 controller repaired'; else STATE=failure; DESCRIPTION='FS-09 controller repair failed'; fi
          jq -n --arg state "$STATE" --arg context 'journeys/jrn-001/fs-09-repair-controller' --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json