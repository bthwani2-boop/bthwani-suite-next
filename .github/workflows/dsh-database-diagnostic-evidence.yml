name: Partner Journey Closure Runner

on:
  pull_request:
    branches:
      - master
    types:
      - ready_for_review
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: partner-journey-closure-runner
  cancel-in-progress: true

jobs:
  repair:
    name: Apply verify and commit partner journey closure
    runs-on: ubuntu-latest
    timeout-minutes: 150
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: closure
          POSTGRES_PASSWORD: closure_password
          POSTGRES_DB: closure
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U closure -d closure"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      PGPASSWORD: closure_password
      DSH_DATABASE_URL: postgres://closure:closure_password@localhost:5432/dsh_partner_closure?sslmode=disable
      WLT_DATABASE_URL: postgres://closure:closure_password@localhost:5432/wlt_partner_closure?sslmode=disable
    steps:
      - name: Checkout exact closure branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: fix/lian-sovereign-final-closure
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tested branch source
        id: source
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Apply baseline deterministic repair
        run: python3 tools/scripts/apply-final-closure-repair.py

      - name: Apply workflow syntax closure
        run: python3 tools/scripts/apply-actionlint-closure.py

      - name: Apply partner multi-surface backend journey closure
        run: python3 tools/scripts/apply-partner-journey-closure.py

      - name: Converge partner catalog routes with sovereign contracts
        run: python3 tools/scripts/apply-partner-contract-convergence.py

      - name: Apply and log truthful partner surface repairs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/partner-journey-closure
          log="artifacts/partner-journey-closure/python-repairs.log"
          scripts=(
            tools/scripts/apply-partner-team-audit-closure.py
            tools/scripts/apply-partner-frontend-journey-closure.py
            tools/scripts/apply-partner-typescript-closure.py
            tools/scripts/apply-partner-binding-composition-closure.py
            tools/scripts/apply-partner-import-isolation-closure.py
            tools/scripts/apply-partner-control-panel-closure.py
            tools/scripts/apply-partner-settings-truth-closure.py
          )
          for script in "${scripts[@]}"; do
            echo "=== APPLY $script ===" | tee -a "$log"
            python3 "$script" 2>&1 | tee -a "$log"
          done
          rm -f tools/scripts/apply-partner-ui-binding-closure.py tools/scripts/sitecustomize.py

      - name: Format changed Go source
        run: |
          gofmt -w \
            tools/guards/extract_routes.go \
            services/dsh/backend/internal/http/server.go \
            services/dsh/backend/internal/http/catalog_unified_routes.go \
            services/dsh/backend/internal/http/notifications.go \
            services/dsh/backend/internal/notifications/notifications.go \
            services/dsh/backend/internal/notifications/notifications_test.go \
            services/dsh/backend/internal/wlt/subscription_payment_bound.go \
            services/dsh/backend/internal/partner/model.go \
            services/dsh/backend/internal/partner/handler.go \
            services/dsh/backend/internal/partner/repository.go \
            services/dsh/backend/internal/http/catalog_legacy_occ_routes_test.go \
            services/dsh/backend/internal/http/catalog_unified_routes_test.go

      - name: Regenerate governed clients
        run: |
          pnpm run openapi:generate:dsh
          pnpm run openapi:generate:wlt

      - name: Create isolated partner journey databases
        shell: bash
        run: |
          set -euo pipefail
          psql "postgres://closure:closure_password@localhost:5432/postgres?sslmode=disable" -v ON_ERROR_STOP=1 <<'SQL'
          SELECT 'CREATE DATABASE dsh_partner_closure'
          WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'dsh_partner_closure')\gexec
          SELECT 'CREATE DATABASE wlt_partner_closure'
          WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'wlt_partner_closure')\gexec
          SQL

      - name: Verify governed DSH database upgrade
        shell: pwsh
        env:
          TESTED_SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          $ErrorActionPreference = "Stop"
          $log = "artifacts/partner-journey-closure/database-dsh.log"
          New-Item -ItemType Directory -Path (Split-Path $log) -Force | Out-Null
          try {
            & ./tools/scripts/invoke-database-upgrade-truth.ps1 `
              -ServiceName dsh `
              -MigrationDirectory services/dsh/database/migrations `
              -TestsDirectory services/dsh/database/tests `
              -DatabaseUrl $env:DSH_DATABASE_URL `
              -SourceCommitSha $env:TESTED_SOURCE_SHA *>&1 |
              Tee-Object -FilePath $log
          } catch {
            ($_ | Format-List * -Force | Out-String) | Tee-Object -FilePath $log -Append
            throw
          }

      - name: Verify governed WLT database upgrade
        shell: pwsh
        env:
          TESTED_SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          $ErrorActionPreference = "Stop"
          $log = "artifacts/partner-journey-closure/database-wlt.log"
          try {
            & ./tools/scripts/invoke-database-upgrade-truth.ps1 `
              -ServiceName wlt `
              -MigrationDirectory services/wlt/database/migrations `
              -TestsDirectory services/wlt/database/tests `
              -DatabaseUrl $env:WLT_DATABASE_URL `
              -SourceCommitSha $env:TESTED_SOURCE_SHA *>&1 |
              Tee-Object -FilePath $log
          } catch {
            ($_ | Format-List * -Force | Out-String) | Tee-Object -FilePath $log -Append
            throw
          }

      - name: Verify partner journey backend against PostgreSQL
        shell: bash
        env:
          DATABASE_URL: ${{ env.DSH_DATABASE_URL }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/partner-journey-closure
          (
            cd services/dsh/backend
            go test ./...
          ) 2>&1 | tee artifacts/partner-journey-closure/backend-go-test.log

      - name: Verify partner journey contracts and surfaces
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/partner-journey-closure
          pnpm run guard:partner-surface-truth 2>&1 | tee artifacts/partner-journey-closure/partner-surface.log
          pnpm run guard:partner-support-truth 2>&1 | tee artifacts/partner-journey-closure/partner-support.log
          node tools/guards/frontend-feature-binding-gate.mjs --scope=partner-journey 2>&1 | tee artifacts/partner-journey-closure/frontend-feature-binding.log
          pnpm run guard:guard-registry 2>&1 | tee artifacts/partner-journey-closure/guard-registry.log
          pnpm run guard:wlt-financial-boundary 2>&1 | tee artifacts/partner-journey-closure/wlt-boundary.log
          pnpm run guard:api-binding 2>&1 | tee artifacts/partner-journey-closure/api-binding.log
          pnpm run guard:workflow-lint 2>&1 | tee artifacts/partner-journey-closure/workflow-lint.log
          pnpm run guard:actions-pin 2>&1 | tee artifacts/partner-journey-closure/actions-pin.log
          pnpm run swagger:build 2>&1 | tee artifacts/partner-journey-closure/swagger.log
          pnpm run guard:backend-api-binding 2>&1 | tee artifacts/partner-journey-closure/backend-api-binding.log
          pnpm --dir apps/app-partner/runtime typecheck 2>&1 | tee artifacts/partner-journey-closure/typecheck-app-partner.log
          pnpm --dir apps/app-field/runtime typecheck 2>&1 | tee artifacts/partner-journey-closure/typecheck-app-field.log
          pnpm --dir apps/control-panel/runtime exec tsc --noEmit -p tsconfig.partner-journey.json 2>&1 | tee artifacts/partner-journey-closure/typecheck-control-panel.log
          rm -rf dist-swagger

      - name: Verify live multi-surface partner runtime journey
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & ./tools/scripts/invoke-partner-multisurface-runtime-closure.ps1 `
            -Profiles "identity,workforce,dsh,wlt,media" `
            -ArtifactDirectory "artifacts/partner-journey-closure"

      - name: Capture partner runtime diagnostics
        if: failure()
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/partner-journey-closure
          docker ps -a > artifacts/partner-journey-closure/docker-ps.log 2>&1
          docker compose \
            --env-file infra/docker/env/runtime.env.example \
            -f infra/docker/compose.runtime.yml \
            --profile identity --profile workforce --profile dsh --profile wlt --profile media \
            logs --no-color --tail=1500 > artifacts/partner-journey-closure/runtime-compose.log 2>&1

      - name: Stop partner journey runtime
        if: always()
        shell: pwsh
        run: |
          try {
            & ./infra/docker/scripts/runtime.ps1 `
              -Action down `
              -Profiles "identity,workforce,dsh,wlt,media"
          } catch {
            Write-Warning "Runtime cleanup failed: $($_.Exception.Message)"
          }

      - name: Upload partner journey evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: partner-journey-closure-${{ steps.source.outputs.sha }}
          path: artifacts/partner-journey-closure
          if-no-files-found: warn
          retention-days: 14

      - name: Commit tested partner journey tree
        id: finalize
        shell: bash
        run: |
          set -euo pipefail
          branch="fix/lian-sovereign-final-closure"
          git config user.name "bthwani-closure-executor"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          if ! git diff --cached --quiet; then
            git commit -m "fix(partner): close multi-surface partner journey"
          fi
          for attempt in 1 2 3; do
            git fetch origin "$branch"
            remote_sha="$(git rev-parse "origin/$branch")"
            if ! git merge-base --is-ancestor "$remote_sha" HEAD; then
              git rebase "origin/$branch"
            fi
            if git push origin "HEAD:$branch"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "failed to push tested partner journey tree after three attempts" >&2
              exit 1
            fi
          done
          final_sha="$(git rev-parse HEAD)"
          echo "sha=$final_sha" >> "$GITHUB_OUTPUT"

      - name: Publish exact partner journey result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          REPOSITORY: ${{ github.repository }}
          TARGET_SHA: ${{ steps.finalize.outputs.sha || steps.source.outputs.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          case "$JOB_STATUS" in
            success) state=success ;;
            cancelled) state=error ;;
            *) state=failure ;;
          esac
          description="partner source, DSH/WLT DB, three surfaces, and live runtime: $JOB_STATUS"
          payload="$(jq -n \
            --arg state "$state" \
            --arg context 'Partner Journey Closure / Full-stack multi-surface' \
            --arg description "$description" \
            --arg target_url "$RUN_URL" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$TARGET_SHA" \
            -d "$payload"
