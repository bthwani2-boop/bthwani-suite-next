name: Final Closure Repair Runner

on:
  push:
    branches:
      - "fix/lian-sovereign-final-closure"
  pull_request:
    branches:
      - master
    types:
      - ready_for_review
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: final-closure-repair-runner
  cancel-in-progress: false

jobs:
  repair:
    name: Apply verify and commit deterministic repair
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout exact closure branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: fix/lian-sovereign-final-closure
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Apply deterministic repair
        run: python3 tools/scripts/apply-final-closure-repair.py

      - name: Format Go source
        run: gofmt -w tools/guards/extract_routes.go services/dsh/backend/internal/http/server.go services/dsh/backend/internal/wlt/subscription_payment_bound.go

      - name: Regenerate governed clients
        run: |
          pnpm run openapi:generate:dsh
          pnpm run openapi:generate:wlt

      - name: Verify repaired contracts and governance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/final-closure-repair
          pnpm run guard:partner-surface-truth 2>&1 | tee artifacts/final-closure-repair/partner-surface.log
          pnpm run guard:guard-registry 2>&1 | tee artifacts/final-closure-repair/guard-registry.log
          pnpm run guard:wlt-financial-boundary 2>&1 | tee artifacts/final-closure-repair/wlt-boundary.log
          pnpm run guard:api-binding 2>&1 | tee artifacts/final-closure-repair/api-binding.log
          pnpm run guard:workflow-lint 2>&1 | tee artifacts/final-closure-repair/workflow-lint.log
          pnpm run guard:actions-pin 2>&1 | tee artifacts/final-closure-repair/actions-pin.log
          pnpm run swagger:build 2>&1 | tee artifacts/final-closure-repair/swagger.log
          pnpm run guard:backend-api-binding 2>&1 | tee artifacts/final-closure-repair/backend-api-binding.log
          rm -rf dist-swagger

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: final-closure-repair-${{ github.sha }}
          path: artifacts/final-closure-repair
          if-no-files-found: warn
          retention-days: 3

      - name: Commit verified repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bthwani-closure-executor"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(closure): converge contracts routes and governance"
          git push origin HEAD:fix/lian-sovereign-final-closure