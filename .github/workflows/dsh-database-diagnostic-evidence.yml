name: DSH Closure Diagnostic Evidence

on:
  push:
    branches:
      - "fix/lian-sovereign-final-closure"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: dsh-closure-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dsh-database-diagnostic:
    name: DSH exact migration and invariant log
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: closure
          POSTGRES_PASSWORD: closure_password
          POSTGRES_DB: closure
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U closure -d closure"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgres://closure:closure_password@localhost:5432/closure?sslmode=disable
      PGPASSWORD: closure_password
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run exact governed DSH database truth
        id: database
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $output = @(
            ./tools/scripts/invoke-database-upgrade-truth.ps1 `
              -ServiceName dsh `
              -MigrationDirectory services/dsh/database/migrations `
              -TestsDirectory services/dsh/database/tests `
              -DatabaseUrl $env:DATABASE_URL `
              -SourceCommitSha $env:GITHUB_SHA 2>&1
          )
          $exitCode = $LASTEXITCODE
          $output | Tee-Object -FilePath artifacts/dsh-database-diagnostic.log
          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Upload exact database log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dsh-database-diagnostic-${{ github.sha }}
          path: artifacts/dsh-database-diagnostic.log
          if-no-files-found: error
          retention-days: 7

      - name: Publish exact database status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          OUTCOME: ${{ steps.database.outcome }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success
          description="DSH governed migrations and invariants: PASS"
          if [ "$OUTCOME" != success ]; then
            state=failure
            description="$(grep -Eai 'ERROR:|FATAL:|Database invariant failed|violation|mismatch|missing' artifacts/dsh-database-diagnostic.log | tail -n1 | tr '\n\r' '  ' | sed -E 's/[[:space:]]+/ /g' | cut -c1-135)"
            [ -n "$description" ] || description="DSH database diagnostic failed"
          fi
          payload="$(jq -n --arg state "$state" --arg context 'DSH Database Diagnostic Evidence' --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
            -d "$payload"

      - name: Enforce database diagnostic
        if: steps.database.outcome != 'success'
        shell: bash
        run: exit 1

  dsh-source-diagnostic:
    name: DSH exact partner and catalog source log
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Capture exact source truth
        id: source
        shell: bash
        continue-on-error: true
        run: |
          set +e
          mkdir -p artifacts
          final=0
          {
            echo '=== partner-surface-truth ==='
            node tools/guards/partner/partner-surface-truth-gate.mjs
            code=$?
            [ $code -eq 0 ] || final=$code
            echo '=== guard-registry ==='
            node tools/guards/guard-registry-gate.mjs
            code=$?
            [ $code -eq 0 ] || final=$code
            echo '=== partner proposal handler source ==='
            grep -R -n -E 'func .*handlePartnerCreateProductProposal|CreateProductProposal|CreateProposal' \
              services/dsh/backend/internal/http services/dsh/backend/internal/centralcatalog || true
            echo '=== partner proposal schema source ==='
            grep -R -n -E 'dsh_product_proposals|product_proposals' services/dsh/database/migrations | tail -n 80 || true
          } 2>&1 | tee artifacts/dsh-source-diagnostic.log
          echo "exit_code=$final" >> "$GITHUB_OUTPUT"
          exit $final

      - name: Upload exact source log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dsh-source-diagnostic-${{ github.sha }}
          path: artifacts/dsh-source-diagnostic.log
          if-no-files-found: error
          retention-days: 7

      - name: Publish exact source status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          OUTCOME: ${{ steps.source.outcome }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state=success
          description="DSH partner/catalog source diagnostics: PASS"
          if [ "$OUTCOME" != success ]; then
            state=failure
            description="$(grep -E '^-' artifacts/dsh-source-diagnostic.log | head -n1 | tr '\n\r/' '   ' | sed -E 's/[[:space:]]+/ /g' | cut -c1-135)"
            [ -n "$description" ] || description="DSH partner/catalog source diagnostic failed"
          fi
          payload="$(jq -n --arg state "$state" --arg context 'DSH Source Diagnostic Evidence' --arg description "$description" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$SHA" \
            -d "$payload"

      - name: Enforce source diagnostic
        if: steps.source.outcome != 'success'
        shell: bash
        run: exit 1
