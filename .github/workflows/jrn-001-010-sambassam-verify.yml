name: JRN-001..010 Targeted Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "core/identity/backend/**"
      - "core/identity/clients/**"
      - "core/identity/contracts/**"
      - "core/identity/tests/**"
      - "core/workforce/backend/**"
      - "core/workforce/contracts/**"
      - "services/dsh/backend/internal/cart/**"
      - "services/dsh/backend/internal/checkout/**"
      - "services/dsh/backend/internal/clientaddress/**"
      - "services/dsh/backend/internal/http/**"
      - "services/dsh/backend/internal/mapproviders/**"
      - "services/dsh/backend/internal/partner/**"
      - "services/dsh/backend/internal/servicearea/**"
      - "services/dsh/backend/internal/wlt/**"
      - "services/dsh/contracts/dsh.client-address.openapi.yaml"
      - "services/dsh/contracts/dsh.client-map.openapi.yaml"
      - "services/dsh/database/migrations/dsh-036_central_catalog_runtime_closure.sql"
      - "services/dsh/database/migrations/dsh-076_service_area_geofences.sql"
      - "services/dsh/database/migrations/dsh-078_client_address_pii_governance.sql"
      - "services/dsh/database/migrations/dsh-081_client_address_subject_anonymization.sql"
      - "services/dsh/database/migrations/dsh-082_client_address_privacy_reschedule.sql"
      - "services/dsh/database/migrations/dsh-083_privacy_policy_batch_default.sql"
      - "services/dsh/database/migrations/dsh-906_jrn_006_client_address_geofence_binding.sql"
      - "services/dsh/database/migrations/dsh-901_checkout_create_idempotency.sql"
      - "services/dsh/database/tests/dsh-906_jrn_006_client_address_geofence_binding.sql"
      - "services/dsh/frontend/app-client/account/**"
      - "services/dsh/frontend/app-client/home-discovery/**"
      - "services/dsh/frontend/control-panel/operations/CheckoutActivityScreen.tsx"
      - "services/dsh/frontend/shared/checkout/**"
      - "services/dsh/frontend/shared/client-address/**"
      - "services/dsh/frontend/shared/client-map/**"
      - "services/dsh/frontend/shared/home-discovery/**"
      - "services/dsh/frontend/shared/partner/**"
      - "services/dsh/frontend/shared/session/**"
      - "services/dsh/tests/jrn-001-*.test.mjs"
      - "services/dsh/tests/jrn-005-010-integrity.test.mjs"
      - "tools/guards/live-cross-journey-integrity-gate.mjs"
      - "tools/guards/partner/jrn-001-*.mjs"
      - ".github/workflows/jrn-001-010-sambassam-verify.yml"
      - ".github/workflows/tmp-jrn-001-010-diagnostics.yml"
      - ".github/workflows/tmp-jrn-003-workforce-http-diagnostics.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-001-010-${{ github.sha }}
  cancel-in-progress: false

jobs:
  announce:
    name: Announce targeted verification
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Publish pending same-commit status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state "pending" --arg context "journeys/jrn-001-010/targeted-verification" --arg description "JRN-001..010 targeted verification is running" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json

  static-integrity:
    name: Static cross-journey integrity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Verify repository hygiene
        run: git diff --check
      - name: Verify JRN-001..010 static evidence
        shell: bash
        run: |
          set +e
          : >/tmp/jrn-001-010-static.log
          node tools/guards/live-cross-journey-integrity-gate.mjs 2>&1 | tee -a /tmp/jrn-001-010-static.log
          GUARD_EXIT=${PIPESTATUS[0]}
          node --test core/identity/tests/jrn-002-*.test.mjs 2>&1 | tee -a /tmp/jrn-001-010-static.log
          IDENTITY_STATIC_EXIT=${PIPESTATUS[0]}
          node --test services/dsh/tests/jrn-001-*.test.mjs 2>&1 | tee -a /tmp/jrn-001-010-static.log
          PARTNER_TEST_EXIT=${PIPESTATUS[0]}
          PARTNER_GUARD_EXIT=0
          for guard in tools/guards/partner/jrn-001-*.mjs; do
            node "$guard" 2>&1 | tee -a /tmp/jrn-001-010-static.log
            CURRENT_EXIT=${PIPESTATUS[0]}
            if [ "$CURRENT_EXIT" -ne 0 ]; then PARTNER_GUARD_EXIT=$CURRENT_EXIT; fi
          done
          node --test services/dsh/tests/jrn-005-010-integrity.test.mjs 2>&1 | tee -a /tmp/jrn-001-010-static.log
          INTEGRITY_TEST_EXIT=${PIPESTATUS[0]}
          printf 'guard=%s identity_static=%s partner_tests=%s partner_guards=%s integration=%s\n' "$GUARD_EXIT" "$IDENTITY_STATIC_EXIT" "$PARTNER_TEST_EXIT" "$PARTNER_GUARD_EXIT" "$INTEGRITY_TEST_EXIT" | tee -a /tmp/jrn-001-010-static.log
          if [ "$GUARD_EXIT" -ne 0 ] || [ "$IDENTITY_STATIC_EXIT" -ne 0 ] || [ "$PARTNER_TEST_EXIT" -ne 0 ] || [ "$PARTNER_GUARD_EXIT" -ne 0 ] || [ "$INTEGRITY_TEST_EXIT" -ne 0 ]; then exit 1; fi
      - name: Upload static evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-001-010-static-evidence
          path: /tmp/jrn-001-010-static.log
          retention-days: 3
          if-no-files-found: error

  identity-client:
    name: Identity TypeScript client and surfaces
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Typecheck sovereign identity client
        run: pnpm --dir core/identity typecheck

  identity-workforce:
    name: Identity and workforce governed behavior
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: core/identity/backend/go.mod
          cache-dependency-path: |
            core/identity/backend/go.sum
            core/workforce/backend/go.sum
      - name: Verify identity and workforce packages
        shell: bash
        run: |
          set +e
          : >/tmp/jrn-001-010-identity-workforce.log
          (
            cd core/identity/backend
            go test ./internal/http ./internal/identity -count=1
          ) 2>&1 | tee -a /tmp/jrn-001-010-identity-workforce.log
          IDENTITY_EXIT=${PIPESTATUS[0]}
          (
            cd core/workforce/backend
            go test ./internal/http ./internal/workforce ./internal/identityclient -count=1
          ) 2>&1 | tee -a /tmp/jrn-001-010-identity-workforce.log
          WORKFORCE_EXIT=${PIPESTATUS[0]}
          printf 'identity=%s workforce=%s\n' "$IDENTITY_EXIT" "$WORKFORCE_EXIT" | tee -a /tmp/jrn-001-010-identity-workforce.log
          if [ "$IDENTITY_EXIT" -ne 0 ] || [ "$WORKFORCE_EXIT" -ne 0 ]; then exit 1; fi
      - name: Upload identity-workforce evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-001-010-identity-workforce-evidence
          path: /tmp/jrn-001-010-identity-workforce.log
          retention-days: 3
          if-no-files-found: error

  dsh-journeys:
    name: DSH partner store address map cart checkout
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify governed DSH packages
        shell: bash
        run: |
          set +e
          : >/tmp/jrn-001-010-dsh.log
          (
            cd services/dsh/backend
            go test ./internal/http ./internal/partner ./internal/cart ./internal/checkout ./internal/wlt -count=1
          ) 2>&1 | tee -a /tmp/jrn-001-010-dsh.log
          DSH_EXIT=${PIPESTATUS[0]}
          printf 'dsh=%s\n' "$DSH_EXIT" | tee -a /tmp/jrn-001-010-dsh.log
          exit "$DSH_EXIT"
      - name: Upload DSH evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-001-010-dsh-evidence
          path: /tmp/jrn-001-010-dsh.log
          retention-days: 3
          if-no-files-found: error

  jrn-006-governed-geofence:
    name: JRN-006 governed map and geofence closure
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jrn006
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jrn006"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify JRN-006 static, Go, and database behavior
        id: verify
        continue-on-error: true
        env:
          PGPASSWORD: postgres
        shell: bash
        run: |
          set +e
          : >/tmp/jrn-006-evidence.log
          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }

          node --test --test-name-pattern="JRN-006" services/dsh/tests/jrn-005-010-integrity.test.mjs 2>&1 | tee -a /tmp/jrn-006-evidence.log
          STATIC_EXIT=${PIPESTATUS[0]}

          (
            cd services/dsh/backend
            go test ./internal/clientaddress ./internal/servicearea ./internal/mapproviders -count=1
          ) 2>&1 | tee -a /tmp/jrn-006-evidence.log
          GO_EXIT=${PIPESTATUS[0]}

          DB_EXIT=0
          psql -h localhost -U postgres -d jrn006 -v ON_ERROR_STOP=1 -c 'CREATE EXTENSION IF NOT EXISTS pgcrypto;' 2>&1 | tee -a /tmp/jrn-006-evidence.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then DB_EXIT=1; fi

          if [ "$DB_EXIT" -eq 0 ]; then
            for migration in \
              services/dsh/database/migrations/dsh-056_client_addresses.sql \
              services/dsh/database/migrations/dsh-076_service_area_geofences.sql \
              services/dsh/database/migrations/dsh-078_client_address_pii_governance.sql \
              services/dsh/database/migrations/dsh-081_client_address_subject_anonymization.sql \
              services/dsh/database/migrations/dsh-082_client_address_privacy_reschedule.sql \
              services/dsh/database/migrations/dsh-083_privacy_policy_batch_default.sql \
              services/dsh/database/migrations/dsh-906_jrn_006_client_address_geofence_binding.sql; do
              psql -h localhost -U postgres -d jrn006 -v ON_ERROR_STOP=1 -f "$migration" 2>&1 | tee -a /tmp/jrn-006-evidence.log
              if [ "${PIPESTATUS[0]}" -ne 0 ]; then DB_EXIT=1; break; fi
            done
          fi

          if [ "$DB_EXIT" -eq 0 ]; then
            psql -h localhost -U postgres -d jrn006 -v ON_ERROR_STOP=1 -f services/dsh/database/tests/dsh-906_jrn_006_client_address_geofence_binding.sql 2>&1 | tee -a /tmp/jrn-006-evidence.log
            if [ "${PIPESTATUS[0]}" -ne 0 ]; then DB_EXIT=1; fi
          fi

          printf 'static=%s go=%s database=%s\n' "$STATIC_EXIT" "$GO_EXIT" "$DB_EXIT" | tee -a /tmp/jrn-006-evidence.log
          if [ "$STATIC_EXIT" -ne 0 ] || [ "$GO_EXIT" -ne 0 ] || [ "$DB_EXIT" -ne 0 ]; then exit 1; fi
      - name: Upload JRN-006 evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-006-governed-geofence-evidence
          path: /tmp/jrn-006-evidence.log
          retention-days: 3
          if-no-files-found: error
      - name: Publish JRN-006 same-commit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=success
          DESCRIPTION="JRN-006 static, Go, and PostgreSQL geofence checks passed"
          if [ "$VERIFY_OUTCOME" != success ]; then
            STATE=failure
            DESCRIPTION="JRN-006 static, Go, or PostgreSQL geofence check failed"
          fi
          jq -n --arg state "$STATE" --arg context "journeys/jrn-006/targeted-verification" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/jrn-006-status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/jrn-006-status.json
      - name: Enforce JRN-006 verification result
        if: always()
        env:
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: test "$VERIFY_OUTCOME" = success

  verification-result:
    name: JRN-001..010 verification result
    if: always()
    needs: [static-integrity, identity-client, identity-workforce, dsh-journeys]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish same-commit verification status
        env:
          GH_TOKEN: ${{ github.token }}
          STATIC_RESULT: ${{ needs.static-integrity.result }}
          IDENTITY_CLIENT_RESULT: ${{ needs.identity-client.result }}
          IDENTITY_WORKFORCE_RESULT: ${{ needs.identity-workforce.result }}
          DSH_RESULT: ${{ needs.dsh-journeys.result }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=success
          if [ "$STATIC_RESULT" != success ] || [ "$IDENTITY_CLIENT_RESULT" != success ] || [ "$IDENTITY_WORKFORCE_RESULT" != success ] || [ "$DSH_RESULT" != success ]; then
            STATE=failure
          fi
          DESCRIPTION="static=$STATIC_RESULT identity-client=$IDENTITY_CLIENT_RESULT identity-workforce=$IDENTITY_WORKFORCE_RESULT dsh=$DSH_RESULT"
          jq -n --arg state "$STATE" --arg context "journeys/jrn-001-010/targeted-verification" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
          [ "$STATE" = success ]
