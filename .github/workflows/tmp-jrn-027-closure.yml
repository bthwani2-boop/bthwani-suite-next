name: Temporary JRN-027 Full-Stack Closure

on:
  push:
    branches: [sambassam]
    paths:
      - "tools/scripts/close-jrn-027-remaining-slices.py"
      - ".github/workflows/tmp-jrn-027-closure.yml"
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
    paths:
      - "tools/scripts/close-jrn-027-remaining-slices.py"
      - ".github/workflows/tmp-jrn-027-closure.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tmp-jrn-027-${{ github.sha }}
  cancel-in-progress: false

jobs:
  close-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest remote branch
        uses: actions/checkout@v4
        with:
          ref: sambassam
          fetch-depth: 0
          show-progress: false

      - name: Synchronize before execution
        run: git pull --rebase origin sambassam

      - name: Apply JRN-027 atomic remaining slices
        shell: bash
        run: |
          set +e
          python3 tools/scripts/close-jrn-027-remaining-slices.py > /tmp/jrn027-patch.log 2>&1
          status=$?
          cat /tmp/jrn027-patch.log
          if [ "$status" -ne 0 ]; then
            mkdir -p governance/evidence
            cp /tmp/jrn027-patch.log governance/evidence/JRN-027_PATCH_FAILURE.log
            git config user.name "bthwani-journey-closure"
            git config user.email "actions@users.noreply.github.com"
            git add governance/evidence/JRN-027_PATCH_FAILURE.log
            git commit -m "chore(jrn-027): capture atomic patch diagnostic [skip ci]"
            git pull --rebase origin sambassam
            git push origin HEAD:sambassam
            exit "$status"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: |
            services/dsh/backend/go.sum
            services/wlt/backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.34.2"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.17.0"
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Format Go implementation
        run: |
          gofmt -w services/dsh/backend/internal/http services/dsh/backend/internal/marketing services/dsh/backend/internal/wlt
          gofmt -w services/wlt/backend/internal/commercial services/wlt/backend/internal/http

      - name: Run JRN-027 static closure gate
        run: python3 tools/guards/jrn027-closure-gate.py

      - name: Build and test WLT lifecycle
        working-directory: services/wlt/backend
        run: |
          go test ./internal/commercial ./internal/http -count=1
          go build ./internal/commercial ./internal/http

      - name: Build and test DSH orchestration
        working-directory: services/dsh/backend
        run: |
          go test ./internal/http ./internal/marketing ./internal/wlt -count=1
          go build ./internal/http ./internal/marketing ./internal/wlt

      - name: Verify DSH OpenAPI and shared frontend
        run: |
          pnpm --dir services/dsh openapi:test
          pnpm --dir services/dsh typecheck

      - name: Verify repository diff
        run: git diff --check

      - name: Commit verified JRN-027 closure
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "bthwani-journey-closure"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No remaining JRN-027 changes to commit"
            exit 0
          fi
          git commit -m "feat(jrn-027): close subscription commercial-benefit lifecycle [skip ci]"
          git pull --rebase origin sambassam
          git push origin HEAD:sambassam
