name: JRN-037 Payout Destination Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths: &jrn037_paths
      - "governance/product/contracts/jrn-037-payouts-destinations.product-truth.json"
      - "services/wlt/backend/internal/payout/**"
      - "services/wlt/backend/internal/http/server.go"
      - "services/wlt/database/migrations/wlt-091_jrn037_payout_destination_governance.sql"
      - "services/wlt/database/migrations/wlt-092_jrn037_request_hash_scope.sql"
      - "services/wlt/database/tests/jrn-037-payout-destination-invariants.sql"
      - "services/wlt/contracts/jrn-037-payouts-destinations.openapi.yaml"
      - "services/dsh/backend/internal/http/jrn037_payout_routes.go"
      - "services/dsh/backend/internal/http/representative_finance_routes.go"
      - "services/dsh/backend/internal/wlt/actor_finance_client.go"
      - "services/dsh/backend/internal/wlt/finance_proxy.go"
      - "services/dsh/frontend/shared/finance-wlt-link/jrn037/**"
      - "services/dsh/frontend/shared/finance-wlt-link/wlt/generated/WltDshPartnerBridge.tsx"
      - "services/dsh/frontend/app-captain/account/DshCaptainFinanceScreen.tsx"
      - "services/dsh/frontend/app-field/finance/DshFieldFinanceScreen.tsx"
      - "services/dsh/frontend/control-panel/finance/PayoutRequestsPanel.tsx"
      - "infra/docker/financial-simulators/wiremock/mappings/payout-status-success.json"
      - "tools/guards/jrn-037-payout-destination-gate.mjs"
      - "tools/verification/jrn-037-normalize-source.mjs"
      - "tools/verification/jrn-037-remote-verify.sh"
      - ".github/workflows/jrn-037-payout-destination-verification.yml"
  pull_request:
    branches: [master]
    paths: *jrn037_paths

permissions:
  contents: write

concurrency:
  group: jrn-037-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: JRN-037 database, backend, contract, and multi-surface proof
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wlt_ci
          POSTGRES_PASSWORD: wlt_ci_password
          POSTGRES_DB: wlt_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wlt_ci -d wlt_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: wlt_ci
      PGPASSWORD: wlt_ci_password
      PGDATABASE: wlt_ci
      DATABASE_URL: postgres://wlt_ci:wlt_ci_password@localhost:5432/wlt_ci?sslmode=disable
      EVIDENCE_DIR: governance/evidence/jrn037-ci
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: true
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: services/wlt/backend/go.mod
          cache-dependency-path: |
            services/wlt/backend/go.sum
            services/dsh/backend/go.sum
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install locked workspace
        id: install
        continue-on-error: true
        run: pnpm install --frozen-lockfile
      - name: Run deterministic JRN-037 verification
        id: verification
        continue-on-error: true
        shell: bash
        run: bash tools/verification/jrn-037-remote-verify.sh
      - name: Publish source-normalization and verification evidence
        id: publish
        if: always()
        continue-on-error: true
        shell: bash
        env:
          SOURCE_COMMIT: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          VERIFICATION_OUTCOME: ${{ steps.verification.outcome }}
        run: |
          mkdir -p "${EVIDENCE_DIR}"
          cat > "${EVIDENCE_DIR}/latest.md" <<EOF
          # JRN-037 Remote Verification

          - source_commit: ${SOURCE_COMMIT}
          - workflow_run_id: ${RUN_ID}
          - install: ${INSTALL_OUTCOME}
          - verification: ${VERIFICATION_OUTCOME}
          - detailed_log: governance/evidence/jrn037-ci/verification.log
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(jrn-037): publish remote verification evidence [skip ci]" || exit 0
          for attempt in 1 2 3; do
            if git pull --rebase origin sambassam && git push origin HEAD:sambassam; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 3))
          done
          exit 1
      - name: Enforce verification result
        if: always()
        shell: bash
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          VERIFICATION_OUTCOME: ${{ steps.verification.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        run: |
          printf 'install=%s\nverification=%s\npublish=%s\n' "${INSTALL_OUTCOME}" "${VERIFICATION_OUTCOME}" "${PUBLISH_OUTCOME}"
          test "${INSTALL_OUTCOME}" = success
          test "${VERIFICATION_OUTCOME}" = success
          test "${PUBLISH_OUTCOME}" = success
