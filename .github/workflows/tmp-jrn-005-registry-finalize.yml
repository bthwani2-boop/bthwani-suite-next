name: Temporary JRN-005 Registry Finalizer

on:
  push:
    branches: [sambassam]
    paths:
      - ".github/workflows/tmp-jrn-005-registry-finalize.yml"

permissions:
  contents: write

concurrency:
  group: jrn-005-registry-finalize
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: sambassam
          fetch-depth: 0
          persist-credentials: true

      - name: Update canonical registry and remove temporary workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md")
          text = path.read_text(encoding="utf-8")

          old = "| JRN-005 | دفتر عناوين العميل | DSH | NEEDS_EVIDENCE |"
          new = "| JRN-005 | دفتر عناوين العميل | DSH | READY_FOR_REVIEW |"
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit("JRN-005 index row not found")

          row = "| 2026-07-21 | JRN-005 | FS-01..FS-18 real code closure: durable exactly-once mutations, OCC, logical dedupe, governed geofence, owner isolation, privacy retention, aggregate telemetry, shared validation, accessible Arabic UX and same-commit PostgreSQL integration | sambassam | `bda5452525840cbe4b357713032747cfc500bfc4` / run `29866310744` | app-client, DSH backend, PostgreSQL, governed control-panel diagnostics | READY_FOR_REVIEW | zero open code gaps; independent Product/QA/Security/Privacy/Accessibility/Release and physical-device evidence remain for CLOSED_WITH_EVIDENCE |"
          if row not in text:
              anchor = "| 2026-07-21 | JRN-001 | FS-01..FS-18 sequential execution"
              position = text.find(anchor)
              if position < 0:
                  raise SystemExit("execution log anchor not found")
              line_end = text.find("\n", position)
              text = text[:line_end + 1] + row + "\n" + text[line_end + 1:]

          marker = "<!-- JRN-005-CODE-CLOSURE-2026-07-21 -->"
          if marker not in text:
              text += f"""

{marker}
## إغلاق الكود للرحلة JRN-005 — 2026-07-21

- `repository_mode`: `REMOTE_ONLY`
- `target_ref`: `sambassam`
- `decision`: `READY_FOR_REVIEW`
- `code_closure`: `COMPLETE`
- `verified_implementation_commit`: `bda5452525840cbe4b357713032747cfc500bfc4`
- `proof_run_id`: `29866310744`
- `status_context`: `journeys/jrn-005/all-slices`
- `artifact_digest`: `sha256:7be9a0a90c950a5619147c947999bbfd8cca529bd1fbbae01adb04d1bc438d23`
- `permanent_gate`: `.github/workflows/jrn-005-all-slices.yml`
- أغلقت الشرائح `FS-01..FS-18` في الكود الفعلي: قاعدة البيانات، العقود، الباك إند، العقل المشترك، شاشة العميل، العزل، الخصوصية، الوصولية، المراقبة، الحراس واختبارات PostgreSQL التكاملية.
- `open_code_gaps`: `[]`
- ملف الدليل: `governance/evidence/JRN-005_CLIENT_ADDRESS_BOOK_CLOSURE.json`.
- لا يُستخدم `CLOSED_WITH_EVIDENCE` قبل الموافقات المستقلة وأدلة الجهاز الفعلي المنصوص عليها في السجل الحاكم.
- لم يُنشأ Pull Request ولم يُنفذ Merge أو Force Push ضمن هذا الإغلاق.
"""

          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/tmp-jrn-005-registry-finalize.yml").unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/27_FULLSTACK_MULTI_SURFACE_JOURNEY_REGISTRY.md .github/workflows/tmp-jrn-005-registry-finalize.yml
          git commit -m "governance(jrn-005): anchor real code closure"
          git pull --rebase origin sambassam
          git push origin HEAD:sambassam
