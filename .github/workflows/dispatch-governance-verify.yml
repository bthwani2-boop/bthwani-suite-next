name: Dispatch governance verification

on:
  push:
    paths:
      - "services/dsh/backend/internal/dispatch/**"
      - "services/dsh/backend/internal/http/**dispatch**"
      - "services/dsh/database/migrations/**dispatch**"
      - "services/dsh/contracts/**dispatch**"
      - "services/dsh/contracts/jrn-014-**"
      - "services/dsh/frontend/shared/dispatch/**"
      - "services/dsh/frontend/shared/operations/**dispatch**"
      - "services/dsh/frontend/shared/delivery/**"
      - "services/dsh/frontend/app-captain/**"
      - "services/dsh/frontend/control-panel/operations/**Dispatch**"
      - "services/dsh/tests/jrn-014-**"
      - "services/dsh/tsconfig.dispatch-governance.json"
      - "tools/guards/*dispatch*"
      - "governance/**/jrn-014-**"
      - ".github/workflows/dispatch-governance-verify.yml"
  pull_request:
    paths:
      - "services/dsh/backend/internal/dispatch/**"
      - "services/dsh/backend/internal/http/**dispatch**"
      - "services/dsh/database/migrations/**dispatch**"
      - "services/dsh/contracts/**dispatch**"
      - "services/dsh/contracts/jrn-014-**"
      - "services/dsh/frontend/shared/dispatch/**"
      - "services/dsh/frontend/shared/operations/**dispatch**"
      - "services/dsh/frontend/shared/delivery/**"
      - "services/dsh/frontend/app-captain/**"
      - "services/dsh/frontend/control-panel/operations/**Dispatch**"
      - "services/dsh/tests/jrn-014-**"
      - "services/dsh/tsconfig.dispatch-governance.json"
      - "tools/guards/*dispatch*"
      - "governance/**/jrn-014-**"
      - ".github/workflows/dispatch-governance-verify.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dispatch-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jrn013-contract-migration:
    name: JRN-013 primary contract migration
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout live branch
        uses: actions/checkout@v4
        with:
          ref: sambassam
          fetch-depth: 0
      - name: Patch primary contract generated artifacts and closure assertion
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin sambassam
          node <<'NODE'
          const fs = require('node:fs');

          function patchYaml(path) {
            const source = fs.readFileSync(path, 'utf8');
            const start = source.indexOf('    DshDeliveryExceptionReasonCode:');
            const end = source.indexOf('    DshDeliveryExceptionStatus:', start);
            if (start < 0 || end < 0) throw new Error(`${path}: reason schema not found`);
            const section = source.slice(start, end);
            if (section.includes('      - handoff_shortage') && section.includes('      - handoff_mismatch')) return;
            const needle = '      - proof_unavailable\n      - other';
            if (!section.includes(needle)) throw new Error(`${path}: enum insertion point not found`);
            const patched = section.replace(needle, '      - proof_unavailable\n      - handoff_shortage\n      - handoff_mismatch\n      - other');
            fs.writeFileSync(path, source.slice(0, start) + patched + source.slice(end));
          }

          function patchClient(path) {
            const source = fs.readFileSync(path, 'utf8');
            if (source.includes('| "handoff_shortage" | "handoff_mismatch" | "other"')) return;
            const oldUnion = 'DshDeliveryExceptionReasonCode: "customer_unreachable" | "recipient_refused" | "wrong_address" | "unsafe_location" | "vehicle_breakdown" | "accident" | "damaged_order" | "cash_collection_issue" | "weather_or_road_block" | "proof_unavailable" | "other";';
            const newUnion = 'DshDeliveryExceptionReasonCode: "customer_unreachable" | "recipient_refused" | "wrong_address" | "unsafe_location" | "vehicle_breakdown" | "accident" | "damaged_order" | "cash_collection_issue" | "weather_or_road_block" | "proof_unavailable" | "handoff_shortage" | "handoff_mismatch" | "other";';
            if (source.split(oldUnion).length - 1 !== 1) throw new Error(`${path}: generated reason union drift`);
            fs.writeFileSync(path, source.replace(oldUnion, newUnion));
          }

          function patchAssertion(path) {
            const source = fs.readFileSync(path, 'utf8');
            const oldAssertion = "  assert.doesNotMatch(screen, /actionId === 'resolve_issue'.*openPreparationIssueCount/s);";
            const newAssertion = "  assert.doesNotMatch(screen, /\\|\\| \\(actionId === 'resolve_issue' && item\\.openPreparationIssueCount > 0\\)/);";
            if (source.includes(oldAssertion)) fs.writeFileSync(path, source.replace(oldAssertion, newAssertion));
          }

          patchYaml('services/dsh/contracts/dsh.openapi.yaml');
          patchYaml('services/dsh/contracts/generated/dsh.openapi.yaml');
          patchClient('services/dsh/clients/generated/dsh-api.ts');
          patchAssertion('services/dsh/tests/store-captain-handoff-closure.test.mjs');
          NODE

          grep -q -- '- handoff_shortage' services/dsh/contracts/dsh.openapi.yaml
          grep -q -- '- handoff_mismatch' services/dsh/contracts/generated/dsh.openapi.yaml
          grep -q '"handoff_shortage" | "handoff_mismatch"' services/dsh/clients/generated/dsh-api.ts

          if git diff --quiet; then
            echo "JRN-013 contract is already aligned."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            services/dsh/contracts/dsh.openapi.yaml \
            services/dsh/contracts/generated/dsh.openapi.yaml \
            services/dsh/clients/generated/dsh-api.ts \
            services/dsh/tests/store-captain-handoff-closure.test.mjs
          git commit -m "fix(jrn-013): align primary handoff exception contract"

          for attempt in 1 2 3 4 5; do
            git fetch origin sambassam
            git rebase origin/sambassam
            if git push origin HEAD:sambassam; then exit 0; fi
          done
          exit 1

  backend:
    name: DSH dispatch backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/dsh/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Test dispatch package
        run: go test ./internal/dispatch
      - name: Test protected HTTP package
        run: go test ./internal/http

  integrity:
    name: Dispatch full-stack integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
      - name: Run dispatch integrity gate
        id: integrity_gate
        shell: bash
        run: |
          set -o pipefail
          node tools/guards/jrn-014-dispatch-integrity-gate.mjs 2>&1 | tee dispatch-integrity.log
      - name: Upload integrity diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-integrity-${{ github.run_id }}
          path: dispatch-integrity.log
          if-no-files-found: error
          retention-days: 14
      - name: Run targeted DSH dispatch tests
        run: node --test services/dsh/tests/jrn-014-dispatch-integrity.test.mjs

  frontend:
    name: DSH frontend typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify dispatch contract registry
        shell: bash
        run: |
          set -o pipefail
          node tools/guards/dispatch-contract-registry-gate.mjs 2>&1 | tee dispatch-contracts.log
      - name: Upload contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-contracts-${{ github.run_id }}
          path: dispatch-contracts.log
          if-no-files-found: error
          retention-days: 14
      - name: Typecheck governed dispatch surfaces
        shell: bash
        run: |
          set -o pipefail
          pnpm --dir services/dsh exec tsc -p tsconfig.dispatch-governance.json --noEmit 2>&1 | tee dispatch-typecheck.log
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-typecheck-${{ github.run_id }}
          path: dispatch-typecheck.log
          if-no-files-found: error
          retention-days: 14
