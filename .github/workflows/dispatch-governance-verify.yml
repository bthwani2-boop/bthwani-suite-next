name: Dispatch governance verification

on:
  push:
    paths:
      - "services/dsh/backend/internal/dispatch/**"
      - "services/dsh/backend/internal/http/**dispatch**"
      - "services/dsh/database/migrations/**dispatch**"
      - "services/dsh/contracts/**dispatch**"
      - "services/dsh/contracts/jrn-014-**"
      - "services/dsh/frontend/shared/dispatch/**"
      - "services/dsh/frontend/shared/operations/**dispatch**"
      - "services/dsh/frontend/shared/delivery/**"
      - "services/dsh/frontend/app-captain/**"
      - "services/dsh/frontend/control-panel/operations/**Dispatch**"
      - "services/dsh/tests/jrn-014-**"
      - "services/dsh/tsconfig.dispatch-governance.json"
      - "tools/guards/*dispatch*"
      - "governance/**/jrn-014-**"
      - ".github/workflows/dispatch-governance-verify.yml"
  pull_request:
    paths:
      - "services/dsh/backend/internal/dispatch/**"
      - "services/dsh/backend/internal/http/**dispatch**"
      - "services/dsh/database/migrations/**dispatch**"
      - "services/dsh/contracts/**dispatch**"
      - "services/dsh/contracts/jrn-014-**"
      - "services/dsh/frontend/shared/dispatch/**"
      - "services/dsh/frontend/shared/operations/**dispatch**"
      - "services/dsh/frontend/shared/delivery/**"
      - "services/dsh/frontend/app-captain/**"
      - "services/dsh/frontend/control-panel/operations/**Dispatch**"
      - "services/dsh/tests/jrn-014-**"
      - "services/dsh/tsconfig.dispatch-governance.json"
      - "tools/guards/*dispatch*"
      - "governance/**/jrn-014-**"
      - ".github/workflows/dispatch-governance-verify.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dispatch-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jrn013-contract-migration:
    name: JRN-013 primary contract patch artifact
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout live branch
        uses: actions/checkout@v4
        with:
          ref: sambassam
      - name: Prepare complete patch copies
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p \
            jrn013-patched/services/dsh/contracts \
            jrn013-patched/services/dsh/clients/generated \
            jrn013-patched/services/dsh/tests
          cp services/dsh/contracts/dsh.openapi.yaml jrn013-patched/services/dsh/contracts/dsh.openapi.yaml
          cp services/dsh/clients/generated/dsh-api.ts jrn013-patched/services/dsh/clients/generated/dsh-api.ts
          cp services/dsh/tests/store-captain-handoff-closure.test.mjs jrn013-patched/services/dsh/tests/store-captain-handoff-closure.test.mjs
          : > jrn013-migration.log
      - name: Patch artifact copies
        shell: bash
        run: |
          set -o pipefail
          node <<'NODE' 2>&1 | tee -a jrn013-migration.log
          const fs = require('node:fs');
          const root = 'jrn013-patched/';
          const failures = [];

          function run(label, fn) {
            try {
              fn();
              console.log(`PASS ${label}`);
            } catch (error) {
              failures.push(`${label}: ${error.message}`);
              console.error(`FAIL ${label}: ${error.stack ?? error}`);
            }
          }

          function patchYaml(relativePath) {
            const path = root + relativePath;
            let source = fs.readFileSync(path, 'utf8');
            const start = source.indexOf('    DshDeliveryExceptionReasonCode:');
            const end = source.indexOf('    DshDeliveryExceptionStatus:', start);
            if (start < 0 || end < 0) throw new Error('reason schema not found');
            let section = source.slice(start, end);
            if (!section.includes('      - handoff_shortage')) {
              section = section.replace('      - proof_unavailable\n', '      - proof_unavailable\n      - handoff_shortage\n');
            }
            if (!section.includes('      - handoff_mismatch')) {
              section = section.replace('      - handoff_shortage\n', '      - handoff_shortage\n      - handoff_mismatch\n');
            }
            if (!section.includes('      - handoff_shortage') || !section.includes('      - handoff_mismatch')) {
              throw new Error('unable to insert handoff reasons');
            }
            source = source.slice(0, start) + section + source.slice(end);
            fs.writeFileSync(path, source);
          }

          function patchClient(relativePath) {
            const path = root + relativePath;
            let source = fs.readFileSync(path, 'utf8');
            if (!source.includes('| "handoff_shortage"')) {
              source = source.replace('| "proof_unavailable" | "other";', '| "proof_unavailable" | "handoff_shortage" | "handoff_mismatch" | "other";');
            }
            if (!source.includes('| "handoff_shortage" | "handoff_mismatch" | "other";')) {
              throw new Error('generated reason union was not aligned');
            }
            fs.writeFileSync(path, source);
          }

          function patchAssertion(relativePath) {
            const path = root + relativePath;
            let source = fs.readFileSync(path, 'utf8');
            source = source.replace(
              "  assert.doesNotMatch(screen, /actionId === 'resolve_issue'.*openPreparationIssueCount/s);",
              "  assert.doesNotMatch(screen, /\\|\\| \\(actionId === 'resolve_issue' && item\\.openPreparationIssueCount > 0\\)/);",
            );
            fs.writeFileSync(path, source);
          }

          run('primary OpenAPI', () => patchYaml('services/dsh/contracts/dsh.openapi.yaml'));
          run('generated TypeScript client', () => patchClient('services/dsh/clients/generated/dsh-api.ts'));
          run('closure assertion', () => patchAssertion('services/dsh/tests/store-captain-handoff-closure.test.mjs'));

          if (failures.length > 0) {
            console.error(JSON.stringify({ failures }, null, 2));
            process.exitCode = 1;
          }
          NODE
      - name: Upload JRN-013 patch artifact and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jrn013-contract-patch-${{ github.run_id }}
          path: |
            jrn013-patched
            jrn013-migration.log
          if-no-files-found: error
          retention-days: 2

  backend:
    name: DSH dispatch backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/dsh/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Test dispatch package
        run: go test ./internal/dispatch
      - name: Test protected HTTP package
        run: go test ./internal/http

  integrity:
    name: Dispatch full-stack integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
      - name: Run dispatch integrity gate
        id: integrity_gate
        shell: bash
        run: |
          set -o pipefail
          node tools/guards/jrn-014-dispatch-integrity-gate.mjs 2>&1 | tee dispatch-integrity.log
      - name: Upload integrity diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-integrity-${{ github.run_id }}
          path: dispatch-integrity.log
          if-no-files-found: error
          retention-days: 14
      - name: Run targeted DSH dispatch tests
        run: node --test services/dsh/tests/jrn-014-dispatch-integrity.test.mjs

  frontend:
    name: DSH frontend typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify dispatch contract registry
        shell: bash
        run: |
          set -o pipefail
          node tools/guards/dispatch-contract-registry-gate.mjs 2>&1 | tee dispatch-contracts.log
      - name: Upload contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-contracts-${{ github.run_id }}
          path: dispatch-contracts.log
          if-no-files-found: error
          retention-days: 14
      - name: Typecheck governed dispatch surfaces
        shell: bash
        run: |
          set -o pipefail
          pnpm --dir services/dsh exec tsc -p tsconfig.dispatch-governance.json --noEmit 2>&1 | tee dispatch-typecheck.log
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-typecheck-${{ github.run_id }}
          path: dispatch-typecheck.log
          if-no-files-found: error
          retention-days: 14
