name: Dispatch governance verification

on:
  push:
    paths:
      - "services/dsh/backend/internal/dispatch/**"
      - "services/dsh/backend/internal/http/**dispatch**"
      - "services/dsh/database/migrations/**dispatch**"
      - "services/dsh/frontend/shared/dispatch/**"
      - "services/dsh/frontend/shared/operations/**dispatch**"
      - "services/dsh/frontend/control-panel/operations/**Dispatch**"
      - ".github/workflows/dispatch-governance-verify.yml"
  pull_request:
    paths:
      - "services/dsh/backend/internal/dispatch/**"
      - "services/dsh/backend/internal/http/**dispatch**"
      - "services/dsh/database/migrations/**dispatch**"
      - "services/dsh/frontend/shared/dispatch/**"
      - "services/dsh/frontend/shared/operations/**dispatch**"
      - "services/dsh/frontend/control-panel/operations/**Dispatch**"
      - ".github/workflows/dispatch-governance-verify.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dispatch-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: DSH dispatch backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/dsh/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Test dispatch and HTTP packages
        run: go test ./internal/dispatch ./internal/http

  frontend:
    name: DSH frontend typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck DSH
        run: pnpm --dir services/dsh typecheck
