name: JRN-019 cancellation and refund guard

on:
  workflow_dispatch:
  push:
    branches:
      - sambassam
    paths:
      - '.github/workflows/jrn-019-cancellation-refund.yml'
      - 'governance/product/contracts/jrn-019-cancellation-refund.product-truth.json'
      - 'services/dsh/contracts/jrn-019-slice-closure.json'
      - 'services/dsh/tsconfig.jrn-019.json'
      - 'services/dsh/backend/internal/http/order_cancellations.go'
      - 'services/dsh/backend/internal/http/order_cancellations_compatibility_test.go'
      - 'services/dsh/backend/internal/orders/**'
      - 'services/dsh/backend/internal/checkoutfinanceoutbox/**'
      - 'services/dsh/backend/internal/wlt/**'
      - 'services/dsh/backend/internal/pickup/**'
      - 'services/dsh/backend/internal/partnerdelivery/**'
      - 'services/dsh/backend/cmd/dsh-api/main.go'
      - 'services/dsh/database/migrations/dsh-090_order_cancellation_refund_lifecycle.sql'
      - 'services/dsh/database/migrations/dsh-091_pickup_cancellation_state.sql'
      - 'services/dsh/frontend/shared/orders/**'
      - 'services/dsh/frontend/app-client/orders/OrderTrackingScreen.tsx'
      - 'services/dsh/frontend/app-partner/orders/OperationalOrderDecisionScreen.tsx'
      - 'services/dsh/frontend/app-partner/orders/DshPartnerOrderRejectionScreen.tsx'
      - 'services/dsh/frontend/control-panel/operations/OrderJourneyOperatorIntervention.tsx'
      - 'services/dsh/tests/jrn-019-*.test.mjs'
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/jrn-019-cancellation-refund.yml'
      - 'governance/product/contracts/jrn-019-cancellation-refund.product-truth.json'
      - 'services/dsh/contracts/jrn-019-slice-closure.json'
      - 'services/dsh/tsconfig.jrn-019.json'
      - 'services/dsh/backend/internal/http/order_cancellations.go'
      - 'services/dsh/backend/internal/http/order_cancellations_compatibility_test.go'
      - 'services/dsh/backend/internal/orders/**'
      - 'services/dsh/backend/internal/checkoutfinanceoutbox/**'
      - 'services/dsh/backend/internal/wlt/**'
      - 'services/dsh/backend/internal/pickup/**'
      - 'services/dsh/backend/internal/partnerdelivery/**'
      - 'services/dsh/backend/cmd/dsh-api/main.go'
      - 'services/dsh/database/migrations/dsh-090_order_cancellation_refund_lifecycle.sql'
      - 'services/dsh/database/migrations/dsh-091_pickup_cancellation_state.sql'
      - 'services/dsh/frontend/shared/orders/**'
      - 'services/dsh/frontend/app-client/orders/OrderTrackingScreen.tsx'
      - 'services/dsh/frontend/app-partner/orders/OperationalOrderDecisionScreen.tsx'
      - 'services/dsh/frontend/app-partner/orders/DshPartnerOrderRejectionScreen.tsx'
      - 'services/dsh/frontend/control-panel/operations/OrderJourneyOperatorIntervention.tsx'
      - 'services/dsh/tests/jrn-019-*.test.mjs'

permissions:
  contents: read

concurrency:
  group: jrn-019-${{ github.sha }}
  cancel-in-progress: false

jobs:
  cancellation-refund-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout pinned commit
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Verify JRN-019 Go packages
        working-directory: services/dsh/backend
        run: >-
          go test
          ./internal/http
          ./internal/orders
          ./internal/checkoutfinanceoutbox
          ./internal/wlt
          ./internal/pickup
          ./internal/partnerdelivery

      - name: Verify JRN-019 cross-surface closure
        run: node --test services/dsh/tests/jrn-019-*.test.mjs

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.34.2'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.17.0'
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify JRN-019 TypeScript scope
        run: pnpm exec tsc -p services/dsh/tsconfig.jrn-019.json --noEmit
