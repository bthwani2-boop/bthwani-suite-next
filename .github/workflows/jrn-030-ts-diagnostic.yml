name: JRN-030 TypeScript Diagnostic

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    types: [synchronize]

permissions:
  contents: read

concurrency:
  group: jrn-030-ts-${{ github.sha }}
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture targeted TypeScript result
        id: typescript
        shell: bash
        run: |
          set +e
          pnpm --dir services/dsh exec tsc -p tsconfig.jrn-030.json --noEmit --pretty false > /tmp/jrn030-ts.log 2>&1
          status=$?
          cat /tmp/jrn030-ts.log
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0
      - name: Upload TypeScript diagnostic
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jrn-030-ts-${{ github.sha }}
          path: /tmp/jrn030-ts.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail on TypeScript errors
        if: steps.typescript.outputs.status != '0'
        run: exit 1
