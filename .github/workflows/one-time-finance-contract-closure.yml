name: One-time finance contract closure

on:
  push:
    branches: [bassam]
    paths:
      - .github/workflows/one-time-finance-contract-closure.yml

permissions:
  contents: write

concurrency:
  group: one-time-finance-contract-closure-bassam
  cancel-in-progress: false

jobs:
  patch-generate-verify-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout bassam
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: bassam
          fetch-depth: 0

      - name: Setup repository Node workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Patch contracts and generate clients
        run: |
          node tools/scripts/close-finance-contracts.mjs
          pnpm run openapi:generate:dsh
          pnpm run openapi:generate:wlt

      - name: Verify finance contracts
        run: |
          pnpm run contracts:lint
          pnpm --dir services/wlt typecheck

      - name: Commit generated closure
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/one-time-finance-contract-closure.yml
          git config user.name "bthwani-finance-contract-bot"
          git config user.email "finance-contract-bot@users.noreply.github.com"
          git add \
            .github/workflows/one-time-finance-contract-closure.yml \
            services/dsh/contracts/dsh.openapi.yaml \
            services/dsh/clients/generated/dsh-api.ts \
            services/wlt/contracts/wlt.openapi.yaml \
            services/wlt/clients/generated/wlt-api.ts
          git commit -m "fix(finance-contracts): align payout lifecycle across DSH and WLT"
          git fetch origin bassam
          git rebase origin/bassam
          git push origin HEAD:bassam
