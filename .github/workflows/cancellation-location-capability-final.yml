name: Cancellation Location Capability Final
run-name: Cancellation Location Capability · ${{ github.sha }}

on:
  push:
    branches: ["journey/cancellation-refund-reconciliation-closure"]
    paths:
      - ".github/workflows/cancellation-location-capability-final.yml"
      - "services/dsh/frontend/shared/orders/dsh-order-lifecycle.policy.ts"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: cancellation-location-capability-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-clean:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-workspace

      - name: Verify enabled governed capability
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'locationPush: true' services/dsh/frontend/shared/orders/dsh-order-lifecycle.policy.ts
          grep -F 'POST /dsh/captain/dispatch/assignments/{assignmentId}/location' services/dsh/backend/internal/http/dispatch.go
          grep -F 'handlePushDispatchLocation' services/dsh/backend/internal/http/server.go
          grep -F 'updateForegroundDispatchLocation(push.assignmentId' services/dsh/frontend/shared/delivery/use-captain-order-runtime.ts
          pnpm exec tsc -p apps/app-captain/runtime/tsconfig.order-journey.json --noEmit --pretty false

      - name: Remove temporary gate and publish final head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/cancellation-location-capability-final.yml
          git commit -m "chore(cancellation-journey): remove temporary capability gate [skip ci]"
          git pull --rebase origin journey/cancellation-refund-reconciliation-closure
          git push origin HEAD:journey/cancellation-refund-reconciliation-closure
          final_sha="$(git rev-parse HEAD)"
          jq -n --arg state success --arg context "Cancellation Location Capability Final" --arg description "verified captain foreground location capability enabled" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$final_sha" \
            -d @status.json
