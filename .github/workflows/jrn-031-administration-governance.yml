name: JRN-031 Administration Governance Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths: &jrn031_paths
      - "services/dsh/backend/internal/administration/**"
      - "services/dsh/backend/internal/http/**administration*"
      - "services/dsh/database/migrations/dsh-014_administration.sql"
      - "services/dsh/database/migrations/dsh-076_admin_role_assignment_approvals.sql"
      - "services/dsh/database/migrations/dsh-077_admin_role_permissions.sql"
      - "services/dsh/database/migrations/dsh-078_admin_role_definition_approvals.sql"
      - "services/dsh/database/migrations/dsh-079_admin_role_assignment_revocations.sql"
      - "services/dsh/database/migrations/dsh-131_jrn031_governed_administration_closure.sql"
      - "services/dsh/database/tests/jrn-031-administration-governance.sql"
      - "services/dsh/frontend/shared/administration/**"
      - "services/dsh/frontend/control-panel/administration/**"
      - "services/dsh/contracts/dsh.administration.openapi.yaml"
      - "services/dsh/tests/jrn-031-administration-*.test.mjs"
      - "services/dsh/tsconfig.jrn-031.json"
      - "governance/product/contracts/jrn-031-administration-roles-approvals-audit.product-truth.json"
      - ".github/workflows/jrn-031-administration-governance.yml"
  pull_request:
    branches: [master]
    paths: *jrn031_paths

permissions:
  contents: read

concurrency:
  group: jrn-031-administration-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-031 database, backend, surface, and contract proof
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dsh
          POSTGRES_PASSWORD: dsh
          POSTGRES_DB: dsh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dsh -d dsh"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://dsh:dsh@localhost:5432/dsh?sslmode=disable
      PGPASSWORD: dsh
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up Go from DSH module
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.2"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24.17.0"
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply JRN-031 administration migrations in order
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-014_administration.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-076_admin_role_assignment_approvals.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-077_admin_role_permissions.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-078_admin_role_definition_approvals.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-079_admin_role_assignment_revocations.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-131_jrn031_governed_administration_closure.sql
      - name: Execute PostgreSQL invariants
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/tests/jrn-031-administration-governance.sql
      - name: Run JRN-031 targeted backend tests
        working-directory: services/dsh/backend
        run: >-
          go test ./internal/administration ./internal/http
          -run 'Test(Journey031ExposesGovernedAdministrationRoutes|RequestStaffRoleAssignmentRejectsInvalidInput|RequestStaffRoleAssignmentRejectsSelfAssignment|ReviewStaffRoleAssignmentRejectsInvalidDecision|ReviewStaffRoleAssignmentRequiresVersion|RejectedRoleAssignmentRequiresReviewNote|NormalizeRoleDefinitionRequiresControlPanelAndNormalizesScope|AdministrationPermissionCandidatesPreserveLegacyFallback|InverseRoleAction|AuditRedactionDropsSensitiveValues)$'
          -count=1
      - name: Build affected backend owners
        working-directory: services/dsh/backend
        run: go build ./internal/administration ./internal/http
      - name: Run JRN-031 governance guards
        run: node --test services/dsh/tests/jrn-031-administration-maker-checker.test.mjs services/dsh/tests/jrn-031-administration-governance.test.mjs
      - name: Typecheck the JRN-031 ownership graph
        run: pnpm --dir services/dsh exec tsc -p tsconfig.jrn-031.json --noEmit --pretty false
      - name: Parse canonical OpenAPI through the repository generator
        run: pnpm --dir services/dsh exec openapi-typescript contracts/dsh.administration.openapi.yaml -o /tmp/jrn-031-administration-api.ts
      - name: Validate product truth and repository whitespace
        run: |
          node -e "const fs=require('fs'); const p='governance/product/contracts/jrn-031-administration-roles-approvals-audit.product-truth.json'; const x=JSON.parse(fs.readFileSync(p,'utf8')); if(x.journeyId!=='JRN-031'||x.status!=='PENDING_INDEPENDENT_APPROVAL') process.exit(1)"
          git diff --check
