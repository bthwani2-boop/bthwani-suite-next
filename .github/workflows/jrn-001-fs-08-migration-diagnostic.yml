name: JRN-001 FS-08 migration diagnostic

on:
  push:
    branches: [sambassam]
    paths: [.github/workflows/jrn-001-fs-08-migration-diagnostic.yml]

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dsh_jrn001
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U postgres -d dsh_jrn001"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dsh_jrn001?sslmode=disable
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with: { persist-credentials: false }
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply migrations and expose exact error
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set +e
          : > /tmp/migrations.log
          while IFS= read -r migration; do
            echo "APPLY $migration" | tee -a /tmp/migrations.log
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration" 2>&1 | tee -a /tmp/migrations.log
            if [ ${PIPESTATUS[0]} -ne 0 ]; then break; fi
          done < <(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort)
          FIRST="$(grep -m1 -E 'psql:.*ERROR:|ERROR:' /tmp/migrations.log || true)"
          MESSAGE="$(printf '%s' "$FIRST" | sed -E 's/^.*ERROR:[[:space:]]*//' )"
          if [ -z "$FIRST" ]; then STATE=success; TOKEN=pass; DESCRIPTION='FS-08 migration diagnostic passed'; else STATE=failure; TOKEN="$(printf '%s' "$MESSAGE" | tr '[:upper:]' '[:lower:]' | tr -cs '[:alnum:]_.-' '-' | sed 's/^-//;s/-$//' | cut -c1-76)"; DESCRIPTION="$(printf '%s' "$MESSAGE" | cut -c1-120)"; fi
          CONTEXT="j1/fs08/migration/${TOKEN:-unknown}"
          jq -n --arg state "$STATE" --arg context "$CONTEXT" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > /tmp/status.json
          curl --fail-with-body --silent --show-error -X POST -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" -d @/tmp/status.json
