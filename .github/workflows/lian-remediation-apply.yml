name: Apply Lian Remediation

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-remediation-apply.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: lian-remediation-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Publish run locator
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          jq -n \
            --arg state pending \
            --arg context bthwani/lian-remediation-apply \
            --arg description "self-cleaning remediation is running" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json

      - name: Checkout branch with push credentials
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Apply remediation and remove temporary surfaces
        shell: bash
        run: |
          set -euo pipefail
          {
            python3 - <<'PY'
          from pathlib import Path
          path = Path("tools/scripts/lian-remediation-finalize.py")
          text = path.read_text(encoding="utf-8")
          old = '''for entry in guard_registry["entries"]:
              if entry.get("id") == "a11y-runtime":
                  entry["source_file"] = "tools/guards/a11y-runtime-gate.mjs"
                  break
          else:
              raise RuntimeError("a11y-runtime registry entry is missing")
          '''
          new = '''a11y_entry = next((entry for entry in guard_registry["entries"] if entry.get("id") == "a11y-runtime"), None)
          if a11y_entry is None:
              guard_registry["entries"].append({
                  "id": "a11y-runtime",
                  "name": "Accessibility Runtime Gate",
                  "script": "guard:a11y-runtime",
                  "exit_level": "fail",
                  "description": "Runs Playwright and axe runtime accessibility checks and propagates missing-runtime or test failure.",
                  "source_file": "tools/guards/a11y-runtime-gate.mjs",
              })
          else:
              a11y_entry["source_file"] = "tools/guards/a11y-runtime-gate.mjs"
          '''
          if old not in text:
              raise RuntimeError("a11y registry bootstrap anchor missing")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
            python3 tools/scripts/lian-remediation-finalize.py
            python3 - <<'PY'
          from pathlib import Path
          path = Path("services/dsh/contracts/dsh.analytics-extensions.openapi.yaml")
          text = path.read_text(encoding="utf-8")
          if "\ncomponents:\n" not in text:
              text = text.rstrip() + """

          components:
            securitySchemes:
              bearerAuth:
                type: http
                scheme: bearer
                bearerFormat: JWT
          """
              path.write_text(text, encoding="utf-8")
          PY
          } 2>&1 | tee "${RUNNER_TEMP}/lian-remediation-apply.log"

      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lian-remediation-apply-${{ github.run_id }}
          path: ${{ runner.temp }}/lian-remediation-apply.log
          if-no-files-found: warn
          retention-days: 2

      - name: Lock accessibility runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm add -Dw '@playwright/test@^1.56.1' '@axe-core/playwright@^4.11.0' --lockfile-only
          pnpm install --no-frozen-lockfile

      - name: Regenerate primary DSH contract and client
        shell: bash
        run: pnpm run openapi:generate:dsh

      - name: Regenerate standalone DSH catalog client
        shell: bash
        run: |
          set -o pipefail
          pnpm run openapi:generate:dsh-catalog 2>&1 | tee "${RUNNER_TEMP}/lian-catalog-generation.log"

      - name: Upload catalog generation diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lian-catalog-generation-${{ github.run_id }}
          path: ${{ runner.temp }}/lian-catalog-generation.log
          if-no-files-found: warn
          retention-days: 2

      - name: Validate accessibility gate syntax
        shell: bash
        run: node --check tools/guards/a11y-runtime-gate.mjs

      - name: Validate WLT migration numbering and probes
        shell: pwsh
        run: |
          . ./infra/docker/scripts/wlt-migration-probes.ps1
          $files = Get-ChildItem -LiteralPath services/wlt/database/migrations -Filter "*.sql" | Sort-Object Name
          Test-WltMigrationProbeCoverage -MigrationFiles $files
          Write-Host "WLT migration numbering and probe coverage: PASS"

      - name: Commit self-cleaning remediation
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bthwani-remediation-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No remediation changes to commit."
          else
            git commit -m "fix: close remaining CI contract and runtime gaps"
            git push origin HEAD:lianbassam
          fi
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Run targeted closure guards
        id: guards
        shell: bash
        run: |
          set -euo pipefail
          pnpm run guard:no-broken-imports
          pnpm run contracts:lint
          pnpm run guard:api-binding
          pnpm run guard:backend-api-binding
          pnpm run guard:service-manifest-drift
          pnpm run guard:governance-schema
          pnpm run guard:guard-registry
          pnpm run guard:required-command-integrity
          pnpm run guard:sdlc

      - name: Publish remediation result
        if: always() && steps.commit.outputs.sha != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT_SHA: ${{ steps.commit.outputs.sha }}
          GUARD_OUTCOME: ${{ steps.guards.outcome }}
        run: |
          set -euo pipefail
          state=success
          description="remediation applied and targeted guards passed"
          if [[ "${GUARD_OUTCOME}" != "success" ]]; then
            state=failure
            description="remediation applied; targeted guards need follow-up"
          fi
          jq -n \
            --arg state "${state}" \
            --arg context bthwani/lian-remediation-apply \
            --arg description "${description}" \
            --arg target_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/result-status.json
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${RESULT_SHA}" \
            --data-binary @/tmp/result-status.json
