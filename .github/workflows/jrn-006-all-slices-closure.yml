name: JRN-006 All Slices Closure

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "services/dsh/backend/internal/mapproviders/**"
      - "services/dsh/backend/internal/servicearea/**"
      - "services/dsh/backend/internal/clientaddress/**"
      - "services/dsh/backend/internal/http/client_maps.go"
      - "services/dsh/backend/internal/http/client_addresses.go"
      - "services/dsh/backend/internal/http/client_address_privacy.go"
      - "services/dsh/backend/internal/http/platformpolicies_routes.go"
      - "services/dsh/contracts/dsh.client-map.openapi.yaml"
      - "services/dsh/contracts/dsh.client-address.openapi.yaml"
      - "services/dsh/contracts/dsh.client-address-privacy.openapi.yaml"
      - "services/dsh/contracts/jrn-006-slice-verification-registry.json"
      - "services/dsh/database/migrations/dsh-076_service_area_geofences.sql"
      - "services/dsh/database/migrations/dsh-078_client_address_pii_governance.sql"
      - "services/dsh/database/migrations/dsh-081_client_address_subject_anonymization.sql"
      - "services/dsh/database/migrations/dsh-082_client_address_privacy_reschedule.sql"
      - "services/dsh/database/migrations/dsh-083_privacy_policy_batch_default.sql"
      - "services/dsh/database/migrations/dsh-906_jrn_006_client_address_geofence_binding.sql"
      - "services/dsh/database/migrations/dsh-907_jrn_006_service_area_topology.sql"
      - "services/dsh/database/migrations/dsh-908_jrn_006_privacy_audit_projection.sql"
      - "services/dsh/database/tests/dsh-906_jrn_006_client_address_geofence_binding.sql"
      - "services/dsh/database/tests/dsh-907_jrn_006_service_area_topology.sql"
      - "services/dsh/database/tests/dsh-908_jrn_006_privacy_audit_projection.sql"
      - "services/dsh/frontend/shared/client-map/**"
      - "services/dsh/frontend/shared/privacy/**"
      - "services/dsh/frontend/control-panel/platform/**"
      - "services/dsh/tests/jrn-006-all-slices.test.mjs"
      - "apps/control-panel/runtime/tsconfig.jrn-006.json"
      - "governance/product/contracts/jrn-006-maps-service-area-address-privacy.product-truth.json"
      - "governance/evidence/JRN-006_ALL_SLICES_CLOSURE.json"
      - ".github/workflows/jrn-006-all-slices-closure.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-006-all-slices-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: JRN-006 eight-slice verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jrn006
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jrn006"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Publish pending same-commit status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state "pending" --arg context "journeys/jrn-006/all-slices" --arg description "JRN-006 all eight slices are being verified" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/jrn-006-pending.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/jrn-006-pending.json

      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup pinned Node workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Verify JRN-006 static frontend backend and PostgreSQL truth
        id: closure
        continue-on-error: true
        env:
          PGPASSWORD: postgres
        shell: bash
        run: |
          set +e
          : >/tmp/jrn-006-all-slices.log

          git diff --check 2>&1 | tee -a /tmp/jrn-006-all-slices.log
          HYGIENE_EXIT=${PIPESTATUS[0]}

          node --test services/dsh/tests/jrn-006-all-slices.test.mjs 2>&1 | tee -a /tmp/jrn-006-all-slices.log
          STATIC_EXIT=${PIPESTATUS[0]}

          pnpm --dir apps/control-panel/runtime exec tsc -p tsconfig.jrn-006.json 2>&1 | tee -a /tmp/jrn-006-all-slices.log
          FRONTEND_EXIT=${PIPESTATUS[0]}

          GOFMT_FILES=$(find \
            services/dsh/backend/internal/mapproviders \
            services/dsh/backend/internal/servicearea \
            services/dsh/backend/internal/clientaddress \
            -type f -name '*.go' -print0 | xargs -0 gofmt -l)
          GOFMT_FILES="$GOFMT_FILES
          $(gofmt -l \
            services/dsh/backend/internal/http/client_maps.go \
            services/dsh/backend/internal/http/client_address_privacy.go \
            services/dsh/backend/internal/http/platformpolicies_routes.go)"
          GOFMT_FILES=$(printf '%s\n' "$GOFMT_FILES" | sed '/^[[:space:]]*$/d')
          if [ -n "$GOFMT_FILES" ]; then
            printf 'gofmt_required:\n%s\n' "$GOFMT_FILES" | tee -a /tmp/jrn-006-all-slices.log
            GOFMT_EXIT=1
          else
            GOFMT_EXIT=0
          fi

          (
            cd services/dsh/backend
            go test ./internal/mapproviders ./internal/servicearea ./internal/clientaddress ./internal/http -count=1
          ) 2>&1 | tee -a /tmp/jrn-006-all-slices.log
          GO_EXIT=${PIPESTATUS[0]}

          DB_EXIT=0
          psql -h localhost -U postgres -d jrn006 -v ON_ERROR_STOP=1 -c 'CREATE EXTENSION IF NOT EXISTS pgcrypto;' 2>&1 | tee -a /tmp/jrn-006-all-slices.log
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then DB_EXIT=1; fi

          if [ "$DB_EXIT" -eq 0 ]; then
            for migration in \
              services/dsh/database/migrations/dsh-056_client_addresses.sql \
              services/dsh/database/migrations/dsh-076_service_area_geofences.sql \
              services/dsh/database/migrations/dsh-078_client_address_pii_governance.sql \
              services/dsh/database/migrations/dsh-081_client_address_subject_anonymization.sql \
              services/dsh/database/migrations/dsh-082_client_address_privacy_reschedule.sql \
              services/dsh/database/migrations/dsh-083_privacy_policy_batch_default.sql \
              services/dsh/database/migrations/dsh-906_jrn_006_client_address_geofence_binding.sql \
              services/dsh/database/migrations/dsh-907_jrn_006_service_area_topology.sql \
              services/dsh/database/migrations/dsh-908_jrn_006_privacy_audit_projection.sql; do
              psql -h localhost -U postgres -d jrn006 -v ON_ERROR_STOP=1 -f "$migration" 2>&1 | tee -a /tmp/jrn-006-all-slices.log
              if [ "${PIPESTATUS[0]}" -ne 0 ]; then DB_EXIT=1; break; fi
            done
          fi

          if [ "$DB_EXIT" -eq 0 ]; then
            for db_test in \
              services/dsh/database/tests/dsh-906_jrn_006_client_address_geofence_binding.sql \
              services/dsh/database/tests/dsh-907_jrn_006_service_area_topology.sql \
              services/dsh/database/tests/dsh-908_jrn_006_privacy_audit_projection.sql; do
              psql -h localhost -U postgres -d jrn006 -v ON_ERROR_STOP=1 -f "$db_test" 2>&1 | tee -a /tmp/jrn-006-all-slices.log
              if [ "${PIPESTATUS[0]}" -ne 0 ]; then DB_EXIT=1; break; fi
            done
          fi

          printf 'hygiene=%s static=%s frontend=%s gofmt=%s go=%s database=%s\n' \
            "$HYGIENE_EXIT" "$STATIC_EXIT" "$FRONTEND_EXIT" "$GOFMT_EXIT" "$GO_EXIT" "$DB_EXIT" \
            | tee -a /tmp/jrn-006-all-slices.log

          if [ "$HYGIENE_EXIT" -ne 0 ] || [ "$STATIC_EXIT" -ne 0 ] || [ "$FRONTEND_EXIT" -ne 0 ] || [ "$GOFMT_EXIT" -ne 0 ] || [ "$GO_EXIT" -ne 0 ] || [ "$DB_EXIT" -ne 0 ]; then
            exit 1
          fi

      - name: Upload JRN-006 all-slice evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-006-all-slices-evidence
          path: /tmp/jrn-006-all-slices.log
          retention-days: 7
          if-no-files-found: error

      - name: Publish JRN-006 all-slices status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.closure.outcome }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          STATE=success
          DESCRIPTION="JRN-006 all 8 slices passed static frontend Go and PostgreSQL checks"
          if [ "$OUTCOME" != success ]; then
            STATE=failure
            DESCRIPTION="JRN-006 all-slice verification failed"
          fi
          jq -n --arg state "$STATE" --arg context "journeys/jrn-006/all-slices" --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/jrn-006-status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/jrn-006-status.json

      - name: Enforce all-slice result
        if: always()
        env:
          OUTCOME: ${{ steps.closure.outcome }}
        run: test "$OUTCOME" = success
