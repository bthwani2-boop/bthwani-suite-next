name: One-time Catalog Backend OCC Apply Bassam

on:
  push:
    branches: [bassam]
    paths:
      - '.github/workflows/one-time-catalog-backend-occ-apply-bassam.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0
      - name: Apply and push guarded patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def one(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected 1 match, got {count}')
              return text.replace(old, new, 1)

          hp = Path('services/dsh/backend/internal/http/centralcatalog.go')
          h = hp.read_text(encoding='utf-8')
          start = h.index('func (s *protectedStoreServer) writeCentralCatalogError')
          end = h.index('\n}\n\n// ── Operator: domains', start) + 2
          h = h[:start] + '''func (s *protectedStoreServer) writeCentralCatalogError(w http.ResponseWriter, err error) {
\tvar conflictErr *centralcatalog.ConflictError
\tswitch {
\tcase errors.As(err, &conflictErr):
\t\tstore.SendJSON(w, http.StatusConflict, map[string]any{
\t\t\t"code":            "CONFLICT",
\t\t\t"message":         conflictErr.Message,
\t\t\t"entityId":        conflictErr.EntityID,
\t\t\t"expectedVersion": conflictErr.ExpectedVersion,
\t\t\t"currentVersion":  conflictErr.CurrentVersion,
\t\t})
\tcase errors.Is(err, centralcatalog.ErrConflict):
\t\tstore.SendError(w, http.StatusConflict, "CONFLICT", "central catalog entity was modified by another actor")
\tcase errors.Is(err, centralcatalog.ErrNotFound):
\t\tstore.SendError(w, http.StatusNotFound, "NOT_FOUND", "central catalog entity not found")
\tcase errors.Is(err, centralcatalog.ErrInvalid):
\t\tstore.SendError(w, http.StatusBadRequest, "INVALID_REQUEST", "invalid central catalog input")
\tcase errors.Is(err, centralcatalog.ErrForbidden):
\t\tstore.SendError(w, http.StatusForbidden, "FORBIDDEN", "action not permitted by platform policy")
\tdefault:
\t\tstore.SendError(w, http.StatusInternalServerError, "INTERNAL_ERROR", "central catalog operation failed")
\t}
}''' + h[end:]
          hp.write_text(h, encoding='utf-8')

          cp = Path('services/dsh/backend/internal/centralcatalog/centralcatalog.go')
          c = cp.read_text(encoding='utf-8')
          c = one(c, '''\tif input.ExpectedVersion != nil {
\t\tcurrent, err := GetDomain(ctx, db, id)
\t\tif err != nil {
\t\t\treturn Domain{}, err
\t\t}
\t\tif current.Version != *input.ExpectedVersion {
\t\t\treturn Domain{}, ErrConflict
\t\t}
\t}
''', '', 'domain precheck')
          c = one(c, '''\t\tWHERE id=$9`,
\t\tnameAr, input.NameEn, input.Icon, input.SortOrder, input.IsActive,
\t\tinput.IsClientVisible, input.RequiresProductCatalog, input.IsManualRequest, id)''', '''\t\tWHERE id=$9 AND ($10::int IS NULL OR version=$10)`,
\t\tnameAr, input.NameEn, input.Icon, input.SortOrder, input.IsActive,
\t\tinput.IsClientVisible, input.RequiresProductCatalog, input.IsManualRequest, id, input.ExpectedVersion)''', 'domain SQL')
          c = one(c, '''\tif input.ExpectedVersion != nil {
\t\tcurrent, err := GetNode(ctx, db, id)
\t\tif err != nil {
\t\t\treturn Node{}, err
\t\t}
\t\tif current.Version != *input.ExpectedVersion {
\t\t\treturn Node{}, ErrConflict
\t\t}
\t}
''', '', 'node precheck')
          c = one(c, '''\tif n, _ := result.RowsAffected(); n == 0 {
\t\treturn Node{}, ErrConflict
\t}''', '''\tif n, _ := result.RowsAffected(); n == 0 {
\t\treturn Node{}, NewConflictError(db, ctx, "dsh_catalog_nodes", id, input.ExpectedVersion)
\t}''', 'node conflict')
          c = one(c, '''\tif input.ExpectedVersion != nil && current.Version != *input.ExpectedVersion {
\t\treturn MasterProduct{}, ErrConflict
\t}
''', '', 'product precheck')
          c = one(c, '''\tif n, _ := result.RowsAffected(); n == 0 {
\t\treturn MasterProduct{}, ErrConflict // Assuming id exists because we just fetched it
\t}''', '''\tif n, _ := result.RowsAffected(); n == 0 {
\t\treturn MasterProduct{}, NewConflictError(db, ctx, "dsh_master_products", id, input.ExpectedVersion)
\t}''', 'product conflict')
          c = one(c, '''type CatalogPolicyInput struct {
\tPlatformCommissionRate''', '''type CatalogPolicyInput struct {
\tExpectedVersion                          *int     `json:"expectedVersion"`
\tPlatformCommissionRate''', 'policy version field')
          c = one(c, '''\t\tupdated_at=now(), version = version + 1
\t\tWHERE id=$21`,''', '''\t\tupdated_at=now(), version = version + 1
\t\tWHERE id=$21 AND ($22::int IS NULL OR version=$22)`,''', 'policy SQL')
          c = one(c, '''\t\tinput.ProductDataQualityMinimumScore, input.MaxGalleryImages, input.ManualRequestMode,
\t\tinput.IsActive, input.Notes, id)''', '''\t\tinput.ProductDataQualityMinimumScore, input.MaxGalleryImages, input.ManualRequestMode,
\t\tinput.IsActive, input.Notes, id, input.ExpectedVersion)''', 'policy arg')
          c = one(c, '''\tif n, _ := result.RowsAffected(); n != 1 {
\t\treturn CatalogPolicy{}, ErrNotFound
\t}''', '''\tif n, _ := result.RowsAffected(); n == 0 {
\t\treturn CatalogPolicy{}, NewConflictError(db, ctx, "dsh_catalog_platform_policies", id, input.ExpectedVersion)
\t}''', 'policy conflict')
          cp.write_text(c, encoding='utf-8')
          PY
          gofmt -w services/dsh/backend/internal/http/centralcatalog.go services/dsh/backend/internal/centralcatalog/centralcatalog.go
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add services/dsh/backend/internal/http/centralcatalog.go services/dsh/backend/internal/centralcatalog/centralcatalog.go
          git commit -m 'fix(catalog): enforce atomic backend OCC'
          git pull --rebase origin bassam
          git push origin HEAD:bassam
