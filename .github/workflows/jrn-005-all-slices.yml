name: JRN-005 All Slices Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "governance/product/contracts/jrn-005-client-address-book.product-truth.json"
      - "governance/evidence/JRN-005_*"
      - "governance/runbooks/JRN-005_CLIENT_ADDRESS_OPERATIONS.md"
      - "services/dsh/backend/internal/clientaddress/**"
      - "services/dsh/backend/internal/http/client_address*"
      - "services/dsh/backend/internal/http/client_addresses.go"
      - "services/dsh/backend/internal/http/unified_handler_aliases.go"
      - "services/dsh/contracts/dsh.client-address.openapi.yaml"
      - "services/dsh/contracts/jrn-005-*.json"
      - "services/dsh/database/migrations/dsh-056_client_addresses.sql"
      - "services/dsh/database/migrations/dsh-078_client_address_pii_governance.sql"
      - "services/dsh/database/migrations/dsh-081_client_address_subject_anonymization.sql"
      - "services/dsh/database/migrations/dsh-901_client_address_logical_deduplication.sql"
      - "services/dsh/database/migrations/dsh-907_jrn_005_address_mutation_receipts.sql"
      - "services/dsh/database/tests/dsh-901_client_address_logical_deduplication.sql"
      - "services/dsh/database/tests/dsh-907_jrn_005_address_mutation_receipts.sql"
      - "services/dsh/frontend/shared/client-address/**"
      - "services/dsh/frontend/app-client/account/AddressLocationScreen.tsx"
      - "services/dsh/frontend/app-client/cart/CartScreen.tsx"
      - "services/dsh/frontend/app-client/checkout/ClientCheckoutRoute.tsx"
      - "services/dsh/tests/jrn-005-all-slices.test.mjs"
      - "services/dsh/tests/jrn-005-runtime-observability.test.mjs"
      - "services/dsh/tests/jrn-005-replay-compatibility.test.mjs"
      - "services/dsh/tests/tsconfig.jrn-005-app-client.json"
      - "tools/guards/client-commerce/client-commerce-truth-gate.mjs"
      - ".github/workflows/jrn-005-all-slices.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-005-all-slices-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify FS-01 through FS-18
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jrn005
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jrn005"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Publish pending same-commit status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state pending --arg context journeys/jrn-005/all-slices --arg description "JRN-005 FS-01..FS-18 verification is running" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json

      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup pinned Node workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Verify all JRN-005 slices
        id: verify
        continue-on-error: true
        env:
          PGPASSWORD: postgres
        shell: bash
        run: |
          set +e
          : >/tmp/jrn-005-all-slices.log

          git diff --check 2>&1 | tee -a /tmp/jrn-005-all-slices.log
          HYGIENE_EXIT=${PIPESTATUS[0]}

          node --test \
            services/dsh/tests/jrn-005-all-slices.test.mjs \
            services/dsh/tests/jrn-005-runtime-observability.test.mjs \
            services/dsh/tests/jrn-005-replay-compatibility.test.mjs \
            2>&1 | tee -a /tmp/jrn-005-all-slices.log
          STATIC_EXIT=${PIPESTATUS[0]}

          node tools/guards/client-commerce/client-commerce-truth-gate.mjs 2>&1 | tee -a /tmp/jrn-005-all-slices.log
          GUARD_EXIT=${PIPESTATUS[0]}

          pnpm exec tsc --noEmit -p services/dsh/tests/tsconfig.jrn-005-app-client.json 2>&1 | tee -a /tmp/jrn-005-all-slices.log
          TYPECHECK_EXIT=${PIPESTATUS[0]}

          (
            cd services/dsh/backend
            go test ./internal/clientaddress ./internal/http -count=1
          ) 2>&1 | tee -a /tmp/jrn-005-all-slices.log
          GO_EXIT=${PIPESTATUS[0]}

          command -v psql >/dev/null || { sudo apt-get update && sudo apt-get install -y postgresql-client; }
          psql -h localhost -U postgres -d jrn005 -v ON_ERROR_STOP=1 -c 'CREATE EXTENSION IF NOT EXISTS pgcrypto;' 2>&1 | tee -a /tmp/jrn-005-all-slices.log
          DB_EXTENSION_EXIT=${PIPESTATUS[0]}
          psql -h localhost -U postgres -d jrn005 -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-056_client_addresses.sql 2>&1 | tee -a /tmp/jrn-005-all-slices.log
          DB_BASE_EXIT=${PIPESTATUS[0]}
          psql -h localhost -U postgres -d jrn005 -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-901_client_address_logical_deduplication.sql 2>&1 | tee -a /tmp/jrn-005-all-slices.log
          DB_DEDUPE_MIGRATION_EXIT=${PIPESTATUS[0]}
          psql -h localhost -U postgres -d jrn005 -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-907_jrn_005_address_mutation_receipts.sql 2>&1 | tee -a /tmp/jrn-005-all-slices.log
          DB_RECEIPT_MIGRATION_EXIT=${PIPESTATUS[0]}
          psql -h localhost -U postgres -d jrn005 -v ON_ERROR_STOP=1 -f services/dsh/database/tests/dsh-901_client_address_logical_deduplication.sql 2>&1 | tee -a /tmp/jrn-005-all-slices.log
          DB_DEDUPE_TEST_EXIT=${PIPESTATUS[0]}
          psql -h localhost -U postgres -d jrn005 -v ON_ERROR_STOP=1 -f services/dsh/database/tests/dsh-907_jrn_005_address_mutation_receipts.sql 2>&1 | tee -a /tmp/jrn-005-all-slices.log
          DB_RECEIPT_TEST_EXIT=${PIPESTATUS[0]}

          printf 'hygiene=%s static=%s guard=%s typecheck=%s go=%s db_extension=%s db_base=%s db_dedupe_migration=%s db_receipt_migration=%s db_dedupe_test=%s db_receipt_test=%s\n' \
            "$HYGIENE_EXIT" "$STATIC_EXIT" "$GUARD_EXIT" "$TYPECHECK_EXIT" "$GO_EXIT" "$DB_EXTENSION_EXIT" "$DB_BASE_EXIT" "$DB_DEDUPE_MIGRATION_EXIT" "$DB_RECEIPT_MIGRATION_EXIT" "$DB_DEDUPE_TEST_EXIT" "$DB_RECEIPT_TEST_EXIT" \
            | tee -a /tmp/jrn-005-all-slices.log

          if [ "$HYGIENE_EXIT" -ne 0 ] || [ "$STATIC_EXIT" -ne 0 ] || [ "$GUARD_EXIT" -ne 0 ] || [ "$TYPECHECK_EXIT" -ne 0 ] || [ "$GO_EXIT" -ne 0 ] || [ "$DB_EXTENSION_EXIT" -ne 0 ] || [ "$DB_BASE_EXIT" -ne 0 ] || [ "$DB_DEDUPE_MIGRATION_EXIT" -ne 0 ] || [ "$DB_RECEIPT_MIGRATION_EXIT" -ne 0 ] || [ "$DB_DEDUPE_TEST_EXIT" -ne 0 ] || [ "$DB_RECEIPT_TEST_EXIT" -ne 0 ]; then
            exit 1
          fi

      - name: Upload same-commit evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-005-all-slices-evidence
          path: /tmp/jrn-005-all-slices.log
          retention-days: 7
          if-no-files-found: error

      - name: Publish final same-commit status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        shell: bash
        run: |
          if [ "$VERIFY_OUTCOME" = "success" ]; then
            STATE=success
            DESCRIPTION="JRN-005 FS-01..FS-18 verified on this commit"
          else
            STATE=failure
            DESCRIPTION="JRN-005 verification failed; inspect same-commit evidence"
          fi
          jq -n --arg state "$STATE" --arg context journeys/jrn-005/all-slices --arg description "$DESCRIPTION" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
          test "$VERIFY_OUTCOME" = "success"
