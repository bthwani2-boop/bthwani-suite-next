name: Lian Remediation Diagnostics

on:
  push:
    branches: [lianbassam]
    paths:
      - ".github/workflows/lian-remediation-diagnostics.yml"
      - "governance/github/lian-remediation-diagnostics.trigger.json"

permissions:
  contents: read

concurrency:
  group: lian-remediation-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Diagnose governance policy
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Capture governance diagnostics
        shell: bash
        run: |
          set +e
          log="${RUNNER_TEMP}/lian-policy-diagnostics.log"
          : > "${log}"
          failed=0
          commands=(
            "pnpm run guard:governance-schema"
            "pnpm run guard:agent-governance"
            "pnpm run guard:authority-separation"
            "pnpm run guard:saas-governance"
            "pnpm run guard:guard-registry"
            "pnpm run guard:sdlc"
            "pnpm run guard:cleanup-policy"
            "pnpm run guard:required-command-integrity"
          )
          for command in "${commands[@]}"; do
            printf '\n===== %s =====\n' "${command}" >> "${log}"
            bash -lc "${command}" >> "${log}" 2>&1
            rc=$?
            printf 'EXIT_CODE=%s\n' "${rc}" >> "${log}"
            if [[ "${rc}" -ne 0 ]]; then failed=1; fi
          done
          cat "${log}"
          exit "${failed}"
      - name: Upload governance diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lian-policy-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/lian-policy-diagnostics.log
          if-no-files-found: error
          retention-days: 3

  node:
    name: Diagnose contracts and bindings
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Capture contract and binding diagnostics
        shell: bash
        run: |
          set +e
          log="${RUNNER_TEMP}/lian-node-diagnostics.log"
          : > "${log}"
          failed=0
          commands=(
            "pnpm run guard:no-broken-imports"
            "pnpm run contracts:lint"
            "pnpm run guard:api-binding"
            "pnpm run guard:backend-api-binding"
            "pnpm run guard:service-manifest-drift"
            "pnpm run guard:frontend-feature-binding"
            "pnpm run guard:runtime-real-bindings"
            "pnpm run guard:live-cross-journey-integrity"
          )
          for command in "${commands[@]}"; do
            printf '\n===== %s =====\n' "${command}" >> "${log}"
            bash -lc "${command}" >> "${log}" 2>&1
            rc=$?
            printf 'EXIT_CODE=%s\n' "${rc}" >> "${log}"
            if [[ "${rc}" -ne 0 ]]; then failed=1; fi
          done
          cat "${log}"
          exit "${failed}"
      - name: Upload contract diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lian-node-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/lian-node-diagnostics.log
          if-no-files-found: error
          retention-days: 3

  runtime:
    name: Diagnose full runtime proof
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Capture runtime diagnostics
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "lian-runtime-diagnostics.log"
          $failed = $false
          $commands = @(
            "pnpm run runtime:full:up",
            "pnpm run runtime:full:bootstrap-dev",
            "pnpm run runtime:full:smoke"
          )
          foreach ($command in $commands) {
            "`n===== $command =====" | Tee-Object -FilePath $log -Append
            Invoke-Expression $command 2>&1 | Tee-Object -FilePath $log -Append
            if ($LASTEXITCODE -ne 0) {
              "EXIT_CODE=$LASTEXITCODE" | Tee-Object -FilePath $log -Append
              $failed = $true
              break
            }
          }
          pnpm run runtime:full:down 2>&1 | Tee-Object -FilePath $log -Append
          if ($failed) { exit 1 }
      - name: Upload runtime diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lian-runtime-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/lian-runtime-diagnostics.log
          if-no-files-found: error
          retention-days: 3
