name: Store Captain Handoff Verification
run-name: Store captain handoff verification · ${{ github.sha }}

on:
  push:
    branches: ["sambassam"]
    paths:
      - ".github/workflows/*store-captain-handoff*"
      - "governance/product/contracts/jrn-013-store-captain-handoff.product-truth.json"
      - "services/dsh/backend/internal/dispatch/store_captain_handoff*.go"
      - "services/dsh/backend/internal/http/store_captain_handoff*.go"
      - "services/dsh/backend/internal/http/order_journey_routes.go"
      - "services/dsh/contracts/dsh.store-captain-handoff.openapi.yaml"
      - "services/dsh/contracts/contract-registry.ts"
      - "services/dsh/database/migrations/dsh-095_store_captain_outbound_handoff.sql"
      - "services/dsh/database/migrations/dsh-096_store_captain_handoff_reassignment.sql"
      - "services/dsh/database/migrations/dsh-097_store_captain_handoff_exceptions.sql"
      - "services/dsh/frontend/shared/dispatch/**"
      - "services/dsh/frontend/shared/orders/orders.api.ts"
      - "services/dsh/frontend/shared/orders/orders.types.ts"
      - "services/dsh/frontend/shared/delivery/captain.surface-model.ts"
      - "services/dsh/frontend/shared/delivery/captain.surface.types.ts"
      - "services/dsh/frontend/app-partner/orders/GovernedPartnerOrdersScreen.tsx"
      - "services/dsh/frontend/app-partner/orders/OperationalOrdersInboxScreen.tsx"
      - "services/dsh/frontend/app-captain/DshCaptainSurface.tsx"
      - "services/dsh/frontend/app-captain/DshCaptainOrderJourneyRenderer.tsx"
      - "services/dsh/frontend/app-captain/orders/OperationalCaptainExecutionScreen.tsx"
      - "services/dsh/tests/store-captain-handoff-closure.test.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: store-captain-handoff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-contract-and-surfaces:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Enable pinned pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10.34.2 --activate

      - name: Install workspace dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Verify full-stack custody bindings
        shell: bash
        run: node --test services/dsh/tests/store-captain-handoff-closure.test.mjs

      - name: Typecheck DSH shared brain and surfaces
        shell: bash
        run: pnpm --filter @bthwani/dsh typecheck

      - name: Verify UI and full-stack boundaries
        shell: bash
        run: |
          set -euo pipefail
          pnpm run guard:ui-kit-boundary
          pnpm run guard:fullstack-boundary

  custody-database-and-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsh_handoff
          POSTGRES_USER: dsh_handoff
          POSTGRES_PASSWORD: dsh_handoff
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U dsh_handoff -d dsh_handoff"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DSH_DATABASE_URL: postgres://dsh_handoff:dsh_handoff@localhost:55432/dsh_handoff?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Check focused Go formatting
        shell: bash
        run: |
          set -euo pipefail
          files=(
            services/dsh/backend/internal/dispatch/store_captain_handoff.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_idempotency.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_exceptions.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_db_test.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_idempotency_db_test.go
            services/dsh/backend/internal/dispatch/store_captain_handoff_exceptions_db_test.go
            services/dsh/backend/internal/http/store_captain_handoff.go
            services/dsh/backend/internal/http/store_captain_handoff_exceptions.go
            services/dsh/backend/internal/http/order_journey_routes.go
          )
          test -z "$(gofmt -l "${files[@]}")"

      - name: Compile custody boundaries
        shell: bash
        run: |
          set -euo pipefail
          cd services/dsh/backend
          go test ./internal/dispatch ./internal/http ./cmd/dsh-api -run '^$' -count=1

      - name: Apply DSH migrations from a clean database
        shell: bash
        run: |
          set -euo pipefail
          for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" >/dev/null
          done

      - name: Prove custody, replay, reassignment, and exception invariants
        shell: bash
        run: |
          set -euo pipefail
          cd services/dsh/backend
          DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" \
            go test ./internal/dispatch \
              -run '^(TestOutboundStoreCaptainHandoffDBIntegration|TestOutboundHandoffReassignmentSupersedesPriorAttemptDBIntegration|TestStoreCaptainHandoffConfirmationReplaysAfterPickupDBIntegration|TestReplacementAssignmentImmediatelySupersedesStoreCaptainHandoffDBIntegration|TestPartnerHandoffShortageOpensGovernedExceptionDBIntegration|TestCaptainHandoffMismatchAfterPartnerConfirmationBlocksPickupDBIntegration)$' \
              -count=1 -v
