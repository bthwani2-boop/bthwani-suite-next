name: Lian Control Panel Truth

on:
  push:
    branches: [lian]
    paths:
      - "services/dsh/frontend/control-panel/**"
      - "services/dsh/frontend/shared/platform/**"
      - "services/dsh/frontend/shared/store/**"
      - "services/wlt/frontend/shared/dsh/**"
      - "apps/control-panel/runtime/**"
      - "tools/guards/control-panel/**"
      - ".github/workflows/lian-control-panel-truth.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lian-control-panel-truth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  control-panel-truth:
    name: Control-panel runtime truth and type safety
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup governed workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Verify control-panel runtime truth
        run: node tools/guards/control-panel/control-panel-runtime-truth-gate.mjs

      - name: Verify boundaries and API contracts
        shell: bash
        run: |
          set -euo pipefail
          pnpm run guard:api-binding
          pnpm run guard:backend-api-binding
          pnpm run guard:frontend-feature-binding
          pnpm run guard:fullstack-boundary
          pnpm run guard:wlt-financial-boundary
          pnpm run guard:no-broken-imports

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build control panel
        run: pnpm run build:control-panel

      - name: Test workspace
        run: pnpm run test

  result:
    name: Lian Control Panel Truth result
    if: always()
    needs: [control-panel-truth]
    runs-on: ubuntu-latest
    steps:
      - name: Require control-panel truth to pass
        env:
          RESULT: ${{ needs.control-panel-truth.result }}
        shell: bash
        run: |
          set -euo pipefail
          test "$RESULT" = success
