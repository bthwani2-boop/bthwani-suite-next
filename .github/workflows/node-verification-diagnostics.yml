name: BThwani Node Verification Diagnostics

on:
  pull_request:
    branches: [master, lianbassam]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "services/**"
      - "apps/**"
      - "shared/**"
      - "tools/**"
      - "contracts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "nx.json"
      - ".github/actions/setup-node-workspace/**"
      - ".github/workflows/node-verification-diagnostics.yml"

permissions:
  contents: read

concurrency:
  group: node-verification-diagnostics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Diagnose Node typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout immutable source history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Run affected typecheck with durable diagnostics
        id: verify
        shell: bash
        env:
          NX_BASE: ${{ github.event.pull_request.base.sha }}
          NX_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          log="${RUNNER_TEMP}/node-typecheck.log"
          pnpm run affected:typecheck >"${log}" 2>&1
          status=$?
          if [[ ${status} -ne 0 ]]; then
            echo "::error title=Node typecheck failed::Complete compiler output is attached as an artifact."
            grep -E 'error TS[0-9]+:|NX   Running target typecheck|Failed tasks:' "${log}" | tail -n 160 || true
            echo "--- Node typecheck final log lines ---"
            tail -n 220 "${log}"
          fi
          exit ${status}
      - name: Upload Node typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: node-typecheck-${{ github.run_id }}
          path: ${{ runner.temp }}/node-typecheck.log
          if-no-files-found: error
          retention-days: 7

  tests:
    name: Diagnose Node tests
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout immutable source history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up locked Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Run affected tests with durable diagnostics
        id: verify
        shell: bash
        env:
          NX_BASE: ${{ github.event.pull_request.base.sha }}
          NX_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          log="${RUNNER_TEMP}/node-tests.log"
          pnpm run affected:test >"${log}" 2>&1
          status=$?
          if [[ ${status} -ne 0 ]]; then
            echo "::error title=Node tests failed::Complete test output is attached as an artifact."
            grep -E '^not ok|AssertionError|ERR_ASSERTION|Failed tasks:|NX   Running target test' "${log}" | tail -n 160 || true
            echo "--- Node tests final log lines ---"
            tail -n 260 "${log}"
          fi
          exit ${status}
      - name: Upload Node test diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: node-tests-${{ github.run_id }}
          path: ${{ runner.temp }}/node-tests.log
          if-no-files-found: error
          retention-days: 7
