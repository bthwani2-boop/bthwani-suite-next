name: JRN-009 Cart and Serviceability Verification

on:
  workflow_dispatch:
  push:
    branches: [sambassam]
    paths:
      - "core/identity/database/migrations/**"
      - "services/dsh/backend/internal/cart/**"
      - "services/dsh/backend/internal/http/cart.go"
      - "services/dsh/frontend/shared/cart/**"
      - "services/dsh/frontend/app-client/cart/**"
      - "services/dsh/frontend/control-panel/operations/CartActivityScreen.tsx"
      - "services/dsh/tests/jrn-005-010-integrity.test.mjs"
      - "services/dsh/tsconfig.jrn-009.json"
      - "tools/scripts/smoke-jrn-009-cart.ps1"
      - ".github/workflows/jrn-009-sambassam-verify.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: jrn-009-${{ github.sha }}
  cancel-in-progress: false

jobs:
  announce:
    name: Announce JRN-009 verification
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Publish pending same-commit status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state "pending" --arg context "journeys/jrn-009/targeted-verification" --arg description "JRN-009 targeted verification is running" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json

  static-integrity:
    name: JRN-009 static full-stack integrity
    needs: announce
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.17.0
      - name: Verify repository hygiene
        run: git diff --check
      - name: Verify cart ownership, pricing, and operator readback
        run: node --test services/dsh/tests/jrn-005-010-integrity.test.mjs

  frontend-typecheck:
    name: JRN-009 affected frontend typecheck
    needs: announce
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup pinned Node workspace
        uses: ./.github/actions/setup-node-workspace
      - name: Typecheck cart shared brain and affected surfaces
        shell: bash
        run: |
          set -o pipefail
          pnpm --dir services/dsh exec tsc -p tsconfig.jrn-009.json --noEmit --pretty false 2>&1 | tee /tmp/jrn-009-frontend-typecheck.log
      - name: Upload frontend typecheck evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-009-frontend-typecheck-evidence
          path: /tmp/jrn-009-frontend-typecheck.log
          retention-days: 3
          if-no-files-found: error

  backend-go:
    name: JRN-009 cart and HTTP behavior
    needs: announce
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: services/dsh/backend/go.mod
          cache-dependency-path: services/dsh/backend/go.sum
      - name: Verify cart domain and mounted HTTP routes
        working-directory: services/dsh/backend
        run: go test ./internal/cart ./internal/http -count=1

  runtime-postgres:
    name: JRN-009 PostgreSQL runtime journey
    needs: announce
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Start governed identity and DSH runtime
        shell: bash
        run: |
          set -o pipefail
          pwsh -NoProfile -File infra/docker/scripts/runtime.ps1 -Action up -Profiles dsh 2>&1 | tee /tmp/jrn-009-runtime.log
      - name: Apply governed DSH seeds
        shell: bash
        run: |
          set -o pipefail
          pwsh -NoProfile -File infra/docker/scripts/runtime.ps1 -Action seed -Profiles dsh 2>&1 | tee -a /tmp/jrn-009-runtime.log
      - name: Execute cart and serviceability journey
        shell: bash
        run: |
          set -o pipefail
          pwsh -NoProfile -File tools/scripts/smoke-jrn-009-cart.ps1 2>&1 | tee -a /tmp/jrn-009-runtime.log
      - name: Capture runtime diagnostics on failure
        if: failure()
        shell: bash
        run: pwsh -NoProfile -File infra/docker/scripts/runtime.ps1 -Action doctor -Profiles dsh 2>&1 | tee -a /tmp/jrn-009-runtime.log
      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jrn-009-postgres-runtime-evidence
          path: /tmp/jrn-009-runtime.log
          retention-days: 3
          if-no-files-found: error
      - name: Stop governed runtime
        if: always()
        shell: bash
        run: pwsh -NoProfile -File infra/docker/scripts/runtime.ps1 -Action down -Profiles dsh

  publish-result:
    name: Publish JRN-009 same-commit result
    if: always()
    needs: [announce, static-integrity, frontend-typecheck, backend-go, runtime-postgres]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Publish final same-commit status
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATIC_RESULT: ${{ needs.static-integrity.result }}
          FRONTEND_RESULT: ${{ needs.frontend-typecheck.result }}
          BACKEND_RESULT: ${{ needs.backend-go.result }}
          RUNTIME_RESULT: ${{ needs.runtime-postgres.result }}
        shell: bash
        run: |
          state=failure
          description="JRN-009 targeted verification failed"
          if [ "$STATIC_RESULT" = success ] && [ "$FRONTEND_RESULT" = success ] && [ "$BACKEND_RESULT" = success ] && [ "$RUNTIME_RESULT" = success ]; then
            state=success
            description="JRN-009 targeted verification passed"
          fi
          jq -n --arg state "$state" --arg context "journeys/jrn-009/targeted-verification" --arg description "$description" --arg target_url "$TARGET_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' >/tmp/status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$COMMIT_SHA" \
            -d @/tmp/status.json
