name: Delivery Exception Slice One Hardening
run-name: Delivery Exception Slice One Hardening · ${{ github.sha }}

on:
  push:
    branches: ["journey/delivery-exception-redelivery-closure"]
    paths:
      - ".github/workflows/delivery-exception-slice1-hardening.yml"
      - "tools/scripts/patch-delivery-exception-slice1-corrections.py"
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

concurrency:
  group: delivery-exception-slice1-hardening-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harden-verify-clean:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsh_delivery_exception
          POSTGRES_USER: dsh_delivery_exception
          POSTGRES_PASSWORD: dsh_delivery_exception
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U dsh_delivery_exception -d dsh_delivery_exception"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DSH_DATABASE_URL: postgres://dsh_delivery_exception:dsh_delivery_exception@localhost:55432/dsh_delivery_exception?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-workspace

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: services/dsh/backend/go.mod
          cache: true
          cache-dependency-path: services/dsh/backend/go.sum

      - name: Apply hardening corrections
        shell: bash
        run: |
          set -euo pipefail
          python tools/scripts/patch-delivery-exception-slice1-corrections.py
          gofmt -w services/dsh/backend/internal/dispatch/delivery_exceptions.go

      - name: Prove source and type boundaries
        shell: bash
        run: |
          set -euo pipefail
          grep -F '(reported_latitude IS NULL) = (reported_longitude IS NULL)' services/dsh/database/migrations/dsh-092_delivery_exception_lifecycle.sql
          grep -F 'Idempotency is evaluated before current-state eligibility' services/dsh/backend/internal/dispatch/delivery_exceptions.go
          grep -F 'failDelivery: true' services/dsh/frontend/shared/orders/dsh-order-lifecycle.policy.ts
          (
            cd services/dsh/backend
            go test ./internal/dispatch ./internal/http ./cmd/dsh-api -run '^$' -count=1
          )
          pnpm exec tsc -p apps/app-captain/runtime/tsconfig.order-journey.json --noEmit --pretty false

      - name: Apply migrations and rerun DB proof
        shell: bash
        run: |
          set -euo pipefail
          for file in $(find services/dsh/database/migrations -maxdepth 1 -type f -name '*.sql' | sort); do
            psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file" >/dev/null
          done
          psql "$DSH_DATABASE_URL" -v ON_ERROR_STOP=1 -f services/dsh/database/migrations/dsh-092_delivery_exception_lifecycle.sql >/dev/null
          (
            cd services/dsh/backend
            DSH_REQUIRE_DB_TESTS=true DATABASE_URL="$DSH_DATABASE_URL" \
              go test ./internal/dispatch -run '^TestDeliveryExceptionBlocksProgressButAllowsLocationDBIntegration$' -count=1 -v
          )

      - name: Remove temporary hardening files and commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/delivery-exception-slice1-hardening.yml \
            tools/scripts/patch-delivery-exception-slice1-corrections.py
          git add -A
          git commit -m "fix(delivery-exception): harden idempotency and location integrity [skip ci]"
          git pull --rebase origin journey/delivery-exception-redelivery-closure
          git push origin HEAD:journey/delivery-exception-redelivery-closure
          final_sha="$(git rev-parse HEAD)"
          jq -n --arg state success --arg context "Delivery Exception Slice One Hardening" --arg description "strict location pair and state-independent idempotency verified" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/$final_sha" \
            -d @status.json

      - name: Publish focused failure status
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          jq -n --arg state failure --arg context "Delivery Exception Slice One Hardening" --arg description "delivery-exception hardening failed" --arg target_url "$RUN_URL" '{state:$state,context:$context,description:$description,target_url:$target_url}' > status.json
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/statuses/${{ github.sha }}" \
            -d @status.json
