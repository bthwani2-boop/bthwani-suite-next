name: One-time finance accounting closure

on:
  push:
    branches: [bassam]
    paths:
      - .github/workflows/one-time-finance-accounting-closure.yml

permissions:
  contents: write

concurrency:
  group: one-time-finance-accounting-closure-bassam
  cancel-in-progress: false

jobs:
  implement-test-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout bassam
        uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.17'
          cache-dependency-path: services/wlt/backend/go.sum

      - name: Setup Node workspace
        uses: ./.github/actions/setup-node-workspace

      - name: Apply financial accounting closure patch
        shell: python
        run: |
          from pathlib import Path
          import re

          def replace_function(path_str: str, name: str, replacement: str) -> None:
              path = Path(path_str)
              text = path.read_text(encoding="utf-8")
              marker = f"func {name}("
              start = text.find(marker)
              if start < 0:
                  raise SystemExit(f"missing function {name} in {path}")
              brace = text.find("{", start)
              if brace < 0:
                  raise SystemExit(f"missing opening brace for {name} in {path}")
              depth = 0
              end = -1
              for index in range(brace, len(text)):
                  char = text[index]
                  if char == "{":
                      depth += 1
                  elif char == "}":
                      depth -= 1
                      if depth == 0:
                          end = index + 1
                          break
              if end < 0:
                  raise SystemExit(f"missing closing brace for {name} in {path}")
              path.write_text(text[:start] + replacement.strip() + text[end:], encoding="utf-8")

          def replace_once(path_str: str, old: str, new: str) -> None:
              path = Path(path_str)
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"expected text not found in {path}: {old[:100]!r}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          payment_path = "services/wlt/backend/internal/payment/payment.go"
          payment = Path(payment_path).read_text(encoding="utf-8")
          if '"wlt-api/internal/ledger"' not in payment:
              payment = payment.replace('"wlt-api/internal/dshoutbox"\n', '"wlt-api/internal/dshoutbox"\n\t"wlt-api/internal/ledger"\n', 1)
          error_anchor = 'var ErrSessionClaimConflict = errors.New("payment session could not be claimed for this operation")'
          if "ErrCodCollectionRequiresCodRecord" not in payment:
              payment = payment.replace(
                  error_anchor,
                  error_anchor + '\n\nvar ErrCodCollectionRequiresCodRecord = errors.New("COD collection must be recorded through the sovereign COD record flow")',
                  1,
              )
          Path(payment_path).write_text(payment, encoding="utf-8")

          replace_function(payment_path, "captureSessionAndNotify", r'''
          func captureSessionAndNotify(db *sql.DB, sessionID, providerReference string) (*PaymentSession, error) {
          	tx, err := db.Begin()
          	if err != nil {
          		return nil, err
          	}
          	defer tx.Rollback()
          	const q = `
          		UPDATE wlt_payment_sessions
          		SET status = 'captured', provider_reference = $2, captured_at = NOW(), updated_at = NOW()
          		WHERE id = $1 AND status = 'capture_pending'
          		RETURNING id, checkout_intent_id, special_request_id,
          		          COALESCE(to_jsonb(wlt_payment_sessions)->>'tenant_id', 'tenant-dev-001'),
          		          client_id, store_id, payment_method,
          		          status, provider_reference, amount_minor_units, currency,
          		          captured_at, created_at, updated_at`
          	row := tx.QueryRow(q, sessionID, providerReference)
          	s, err := scanSession(row)
          	if err == sql.ErrNoRows {
          		return nil, fmt.Errorf("session %s was no longer capture_pending when finalizing capture", sessionID)
          	}
          	if err != nil {
          		return nil, err
          	}
          	if s.AmountMinorUnits <= 0 || s.Currency == "" {
          		return nil, fmt.Errorf("captured session %s has invalid accounting amount/currency", s.ID)
          	}
          	lines := []ledger.LedgerLine{
          		{AccountType: "provider_clearing", DebitCredit: "debit", AmountMinorUnits: s.AmountMinorUnits, Currency: s.Currency},
          		{AccountType: "platform_payable", DebitCredit: "credit", AmountMinorUnits: s.AmountMinorUnits, Currency: s.Currency},
          	}
          	if _, err := ledger.PostLedgerTransaction(context.Background(), tx, "payment_captured", "payment_session", s.ID, lines, ledger.Actor{ID: "wlt", Type: "service"}); err != nil {
          		return nil, fmt.Errorf("post capture ledger transaction: %w", err)
          	}
          	if err := dshoutbox.Enqueue(tx, dshoutbox.EventTypeCaptured, s.ID, s.TenantID, s.CheckoutIntentID, s.SpecialRequestID); err != nil {
          		return nil, err
          	}
          	if err := tx.Commit(); err != nil {
          		return nil, err
          	}
          	return s, nil
          }
          ''')

          replace_function(payment_path, "MarkCodCollected", r'''
          func MarkCodCollected(db *sql.DB, sessionID string) (*PaymentSession, error) {
          	if sessionID == "" {
          		return nil, fmt.Errorf("paymentSessionId is required")
          	}
          	return nil, ErrCodCollectionRequiresCodRecord
          }
          ''')

          replace_function(payment_path, "HandleMarkCodCollected", r'''
          func HandleMarkCodCollected(db *sql.DB) http.HandlerFunc {
          	return func(w http.ResponseWriter, r *http.Request) {
          		session, err := MarkCodCollected(db, r.PathValue("paymentSessionId"))
          		if errors.Is(err, ErrCodCollectionRequiresCodRecord) {
          			shared.SendError(w, http.StatusConflict, "USE_COD_RECORD_FLOW", "COD collection must be posted through /wlt/cod-records/{codRecordId}/collect")
          			return
          		}
          		if err != nil {
          			shared.SendError(w, http.StatusBadRequest, "INVALID_REQUEST", err.Error())
          			return
          		}
          		if session == nil {
          			shared.SendError(w, http.StatusNotFound, "NOT_FOUND", "payment session not found")
          			return
          		}
          		shared.SendJSON(w, http.StatusOK, map[string]any{"paymentSession": session})
          	}
          }
          ''')

          cod_path = "services/wlt/backend/internal/cod/cod.go"
          replace_function(cod_path, "MarkCodCollected", r'''
          func MarkCodCollected(db *sql.DB, codRecordID string) (*CodRecord, error) {
          	if codRecordID == "" {
          		return nil, fmt.Errorf("codRecordId is required")
          	}
          	tx, err := db.Begin()
          	if err != nil {
          		return nil, err
          	}
          	defer tx.Rollback()
          	row := tx.QueryRow(`
          		UPDATE wlt_cod_records
          		SET status = 'collected', collected_at = NOW(), updated_at = NOW()
          		WHERE id = $1 AND status = 'pending_collection'
          		RETURNING `+codCols, codRecordID)
          	c, err := scanCodRecord(row)
          	if err == sql.ErrNoRows {
          		var exists bool
          		if getErr := tx.QueryRow(`SELECT EXISTS(SELECT 1 FROM wlt_cod_records WHERE id = $1)`, codRecordID).Scan(&exists); getErr != nil {
          			return nil, getErr
          		}
          		if !exists {
          			return nil, nil
          		}
          		return nil, ErrCodStateConflict
          	}
          	if err != nil {
          		return nil, err
          	}
          	lines := []ledger.LedgerLine{
          		{AccountType: "cash_in_transit", DebitCredit: "debit", AmountMinorUnits: c.AmountMinorUnits, Currency: c.Currency},
          		{AccountType: "platform_payable", DebitCredit: "credit", AmountMinorUnits: c.AmountMinorUnits, Currency: c.Currency},
          	}
          	if _, err := ledger.PostLedgerTransaction(context.Background(), tx, "cod_collected", "cod_record", c.ID, lines, ledger.Actor{ID: c.CaptainID, Type: "captain"}); err != nil {
          		return nil, fmt.Errorf("post COD collection ledger transaction: %w", err)
          	}
          	if err := tx.Commit(); err != nil {
          		return nil, err
          	}
          	return c, nil
          }
          ''')

          replace_function(cod_path, "MarkCodRemitted", r'''
          func MarkCodRemitted(db *sql.DB, codRecordID string) (*CodRecord, error) {
          	if codRecordID == "" {
          		return nil, fmt.Errorf("codRecordId is required")
          	}
          	tx, err := db.Begin()
          	if err != nil {
          		return nil, err
          	}
          	defer tx.Rollback()
          	row := tx.QueryRow(`
          		UPDATE wlt_cod_records
          		SET status = 'remitted', remitted_at = NOW(), updated_at = NOW()
          		WHERE id = $1 AND status = 'collected'
          		RETURNING `+codCols, codRecordID)
          	c, err := scanCodRecord(row)
          	if err == sql.ErrNoRows {
          		var exists bool
          		if getErr := tx.QueryRow(`SELECT EXISTS(SELECT 1 FROM wlt_cod_records WHERE id = $1)`, codRecordID).Scan(&exists); getErr != nil {
          			return nil, getErr
          		}
          		if !exists {
          			return nil, nil
          		}
          		return nil, ErrCodStateConflict
          	}
          	if err != nil {
          		return nil, err
          	}
          	lines := []ledger.LedgerLine{
          		{AccountType: "provider_clearing", DebitCredit: "debit", AmountMinorUnits: c.AmountMinorUnits, Currency: c.Currency},
          		{AccountType: "cash_in_transit", DebitCredit: "credit", AmountMinorUnits: c.AmountMinorUnits, Currency: c.Currency},
          	}
          	if _, err := ledger.PostLedgerTransaction(context.Background(), tx, "cod_remitted", "cod_record", c.ID, lines, ledger.Actor{ID: c.CaptainID, Type: "captain"}); err != nil {
          		return nil, fmt.Errorf("post COD remittance ledger transaction: %w", err)
          	}
          	if err := tx.Commit(); err != nil {
          		return nil, err
          	}
          	return c, nil
          }
          ''')

          settlement_path = "services/wlt/backend/internal/settlement/settlement.go"
          replace_function(settlement_path, "CreateSettlement", r'''
          func CreateSettlement(db *sql.DB, input CreateSettlementInput) (*Settlement, error) {
          	if input.PartnerID == "" || input.PeriodStart == "" || input.PeriodEnd == "" {
          		return nil, fmt.Errorf("partnerId, periodStart, and periodEnd are required")
          	}
          	if input.GrossAmount < 0 || input.PlatformFee < 0 || input.NetAmount < 0 {
          		return nil, ErrSettlementAmountsInconsistent
          	}
          	if input.NetAmount != input.GrossAmount-input.PlatformFee {
          		return nil, ErrSettlementAmountsInconsistent
          	}
          	currency := input.Currency
          	if currency == "" {
          		currency = "YER"
          	}
          	const q = `
          		INSERT INTO wlt_settlements
          			(partner_id, period_start, period_end, gross_amount, platform_fee, net_amount, currency, order_count)
          		VALUES ($1, $2, $3, $4, $5, $6, $7, $8)
          		RETURNING ` + settlementCols
          	return scanSettlement(db.QueryRow(q, input.PartnerID, input.PeriodStart, input.PeriodEnd,
          		input.GrossAmount, input.PlatformFee, input.NetAmount, currency, input.OrderCount))
          }
          ''')

          replace_function(settlement_path, "PostSettlement", r'''
          func PostSettlement(db *sql.DB, settlementID string) (*Settlement, error) {
          	if settlementID == "" {
          		return nil, fmt.Errorf("settlementId is required")
          	}
          	tx, err := db.Begin()
          	if err != nil {
          		return nil, err
          	}
          	defer tx.Rollback()
          	row := tx.QueryRow(`
          		UPDATE wlt_settlements
          		SET status = 'settled', settled_at = NOW(), updated_at = NOW()
          		WHERE id = $1 AND status != 'settled'
          		RETURNING `+settlementCols, settlementID)
          	s, err := scanSettlement(row)
          	if err == sql.ErrNoRows {
          		var status string
          		if getErr := tx.QueryRow(`SELECT status FROM wlt_settlements WHERE id = $1`, settlementID).Scan(&status); getErr == sql.ErrNoRows {
          			return nil, nil
          		} else if getErr != nil {
          			return nil, getErr
          		}
          		return nil, ErrAlreadySettled
          	}
          	if err != nil {
          		return nil, err
          	}
          	if s.GrossAmount > 0 {
          		lines := []ledger.LedgerLine{
          			{AccountType: "platform_payable", DebitCredit: "debit", AmountMinorUnits: s.GrossAmount, Currency: s.Currency},
          		}
          		if s.NetAmount > 0 {
          			lines = append(lines, ledger.LedgerLine{AccountType: "wallet", ActorType: "partner", ActorID: s.PartnerID, DebitCredit: "credit", AmountMinorUnits: s.NetAmount, Currency: s.Currency})
          		}
          		if s.PlatformFee > 0 {
          			lines = append(lines, ledger.LedgerLine{AccountType: "platform_revenue", DebitCredit: "credit", AmountMinorUnits: s.PlatformFee, Currency: s.Currency})
          		}
          		if _, err := ledger.PostLedgerTransaction(context.Background(), tx, "settlement_posted", "settlement", s.ID, lines, ledger.Actor{ID: "wlt", Type: "service"}); err != nil {
          			return nil, fmt.Errorf("post settlement ledger transaction: %w", err)
          		}
          	}
          	if err := tx.Commit(); err != nil {
          		return nil, err
          	}
          	return s, nil
          }
          ''')

          replace_once(
              "services/wlt/backend/internal/refund/refund.go",
              '{AccountType: "platform_revenue", DebitCredit: "debit", AmountMinorUnits: r.AmountMinorUnits, Currency: r.Currency}',
              '{AccountType: "platform_payable", DebitCredit: "debit", AmountMinorUnits: r.AmountMinorUnits, Currency: r.Currency}',
          )

          kernel_read_path = Path("services/wlt/backend/internal/ledger/kernel_read.go")
          kernel_read = kernel_read_path.read_text(encoding="utf-8")
          kernel_read = kernel_read.replace(
              '"provider_clearing":              {Category: "asset", NormalBalanceSide: "debit"},',
              '"provider_clearing":              {Category: "asset", NormalBalanceSide: "debit"},\n\t"cash_in_transit":                 {Category: "asset", NormalBalanceSide: "debit"},',
              1,
          )
          kernel_read = re.sub(r'var knownDataGaps = \[\]string\{.*?\n\}', 'var knownDataGaps = []string{}', kernel_read, count=1, flags=re.S)
          kernel_read_path.write_text(kernel_read, encoding="utf-8")

          types_path = Path("services/wlt/frontend/shared/dsh/wlt-dsh-finance-hub.types.ts")
          types = types_path.read_text(encoding="utf-8")
          types = types.replace("'wallet' | 'platform_revenue' | 'platform_payable' | 'provider_clearing' | 'platform_commission_receivable'", "'wallet' | 'platform_revenue' | 'platform_payable' | 'provider_clearing' | 'cash_in_transit' | 'platform_commission_receivable'", 1)
          types_path.write_text(types, encoding="utf-8")

          vm_path = Path("services/wlt/frontend/shared/dsh/wlt-dsh-finance-hub.view-model.ts")
          vm = vm_path.read_text(encoding="utf-8")
          vm = vm.replace("provider_clearing: 'مقاصة مزود الدفع',", "provider_clearing: 'مقاصة مزود الدفع',\n  cash_in_transit: 'نقدية قيد التحصيل من الكباتن',", 1)
          vm_path.write_text(vm, encoding="utf-8")

          migration = Path("services/wlt/database/migrations/wlt-023_cash_in_transit_account.sql")
          if migration.exists():
              raise SystemExit(f"migration already exists: {migration}")
          migration.write_text(r'''-- WLT-023: add the sovereign cash-in-transit account used by COD custody.
          ALTER TABLE wlt_ledger_accounts
            DROP CONSTRAINT IF EXISTS wlt_ledger_accounts_type_chk;

          ALTER TABLE wlt_ledger_accounts
            ADD CONSTRAINT wlt_ledger_accounts_type_chk CHECK (
              account_type IN (
                'wallet',
                'platform_revenue',
                'platform_payable',
                'provider_clearing',
                'cash_in_transit',
                'platform_commission_receivable'
              )
            );
          ''', encoding="utf-8")

          settlement_test_path = "services/wlt/backend/internal/settlement/settlement_db_test.go"
          replace_function(settlement_test_path, "TestCreateSettlement_PostsBalancedLedgerTransaction", r'''
          func TestPostSettlement_PostsBalancedMultiLineLedgerTransaction(t *testing.T) {
          	db := getTestDB(t)
          	if db == nil {
          		return
          	}
          	defer db.Close()

          	partnerID := fmt.Sprintf("partner-%d", time.Now().UnixNano())
          	s, err := CreateSettlement(db, CreateSettlementInput{
          		PartnerID:   partnerID,
          		PeriodStart: "2026-03-01",
          		PeriodEnd:   "2026-03-31",
          		GrossAmount: 2000,
          		PlatformFee: 200,
          		NetAmount:   1800,
          		Currency:    "YER",
          		OrderCount:  3,
          	})
          	if err != nil {
          		t.Fatalf("failed to create settlement: %v", err)
          	}
          	var beforeCount int
          	if err := db.QueryRow("SELECT COUNT(*) FROM wlt_ledger_transactions WHERE reference_type = 'settlement' AND reference_id = $1", s.ID).Scan(&beforeCount); err != nil {
          		t.Fatalf("count pre-post ledger transactions: %v", err)
          	}
          	if beforeCount != 0 {
          		t.Fatalf("settlement must not affect the ledger before PostSettlement, got %d transactions", beforeCount)
          	}
          	if _, err := PostSettlement(db, s.ID); err != nil {
          		t.Fatalf("PostSettlement failed: %v", err)
          	}
          	var txnID string
          	if err := db.QueryRow("SELECT id FROM wlt_ledger_transactions WHERE transaction_type = 'settlement_posted' AND reference_type = 'settlement' AND reference_id = $1", s.ID).Scan(&txnID); err != nil {
          		t.Fatalf("expected a ledger transaction referencing this settlement: %v", err)
          	}
          	var debitTotal, creditTotal int64
          	var lineCount int
          	if err := db.QueryRow("SELECT COALESCE(SUM(amount_minor_units) FILTER (WHERE debit_credit = 'debit'),0), COALESCE(SUM(amount_minor_units) FILTER (WHERE debit_credit = 'credit'),0), COUNT(*) FROM wlt_ledger_lines WHERE ledger_transaction_id = $1", txnID).Scan(&debitTotal, &creditTotal, &lineCount); err != nil {
          		t.Fatalf("failed to read settlement journal: %v", err)
          	}
          	if debitTotal != 2000 || creditTotal != 2000 || lineCount != 3 {
          		t.Fatalf("expected balanced 3-line 2000/2000 settlement journal, got debit=%d credit=%d lines=%d", debitTotal, creditTotal, lineCount)
          	}
          }
          ''')

          cod_test = Path("services/wlt/backend/internal/cod/cod_db_test.go")
          cod_text = cod_test.read_text(encoding="utf-8")
          if "TestCodCollectAndRemit_PostSovereignLedgerTransactions" not in cod_text:
              cod_text += r'''

          func TestCodCollectAndRemit_PostSovereignLedgerTransactions(t *testing.T) {
          	db := getTestDB(t)
          	if db == nil {
          		return
          	}
          	defer db.Close()
          	id := insertTestCodRecord(t, db)
          	if _, err := MarkCodCollected(db, id); err != nil {
          		t.Fatalf("collect failed: %v", err)
          	}
          	if _, err := MarkCodRemitted(db, id); err != nil {
          		t.Fatalf("remit failed: %v", err)
          	}
          	for _, transactionType := range []string{"cod_collected", "cod_remitted"} {
          		var debitTotal, creditTotal int64
          		if err := db.QueryRow(`
          			SELECT COALESCE(SUM(l.amount_minor_units) FILTER (WHERE l.debit_credit = 'debit'),0),
          			       COALESCE(SUM(l.amount_minor_units) FILTER (WHERE l.debit_credit = 'credit'),0)
          			FROM wlt_ledger_transactions t
          			JOIN wlt_ledger_lines l ON l.ledger_transaction_id = t.id
          			WHERE t.transaction_type = $1 AND t.reference_type = 'cod_record' AND t.reference_id = $2`, transactionType, id).Scan(&debitTotal, &creditTotal); err != nil {
          			t.Fatalf("read %s journal: %v", transactionType, err)
          		}
          		if debitTotal != 1000 || creditTotal != 1000 {
          			t.Fatalf("expected balanced %s journal 1000/1000, got debit=%d credit=%d", transactionType, debitTotal, creditTotal)
          		}
          	}
          }
          '''
              cod_test.write_text(cod_text, encoding="utf-8")

          payment_test = Path("services/wlt/backend/internal/payment/payment_provider_db_test.go")
          payment_test_text = payment_test.read_text(encoding="utf-8")
          capture_assertion = '''
          	if status != "captured" || providerRef != "card-capture-001" || !capturedAt.Valid {
          		t.Errorf("DB values do not match: status=%q, ref=%q, capturedAtValid=%t", status, providerRef, capturedAt.Valid)
          	}
          '''
          ledger_assertion = capture_assertion + '''

          	var debitTotal, creditTotal int64
          	err = db.QueryRowContext(ctx, `
          		SELECT COALESCE(SUM(l.amount_minor_units) FILTER (WHERE l.debit_credit = 'debit'),0),
          		       COALESCE(SUM(l.amount_minor_units) FILTER (WHERE l.debit_credit = 'credit'),0)
          		FROM wlt_ledger_transactions t
          		JOIN wlt_ledger_lines l ON l.ledger_transaction_id = t.id
          		WHERE t.transaction_type = 'payment_captured'
          		  AND t.reference_type = 'payment_session'
          		  AND t.reference_id = $1`, sessionID).Scan(&debitTotal, &creditTotal)
          	if err != nil {
          		t.Fatalf("failed to read capture journal: %v", err)
          	}
          	if debitTotal != 1000 || creditTotal != 1000 {
          		t.Fatalf("expected balanced capture journal 1000/1000, got debit=%d credit=%d", debitTotal, creditTotal)
          	}
          '''
          if "failed to read capture journal" not in payment_test_text:
              if capture_assertion not in payment_test_text:
                  raise SystemExit("capture assertion anchor not found")
              payment_test.write_text(payment_test_text.replace(capture_assertion, ledger_assertion, 1), encoding="utf-8")

          smoke_path = Path("tools/scripts/smoke-wlt-provider-through-wlt.ps1")
          smoke = smoke_path.read_text(encoding="utf-8")
          if 'tenantId = "tenant-dev-001"' not in smoke:
              smoke = smoke.replace('checkoutIntentId = "checkout-provider-smoke-$timestamp"\n', 'checkoutIntentId = "checkout-provider-smoke-$timestamp"\n  tenantId = "tenant-dev-001"\n', 1)
          smoke_path.write_text(smoke, encoding="utf-8")

      - name: Format Go code
        run: |
          gofmt -w \
            services/wlt/backend/internal/payment/payment.go \
            services/wlt/backend/internal/payment/payment_provider_db_test.go \
            services/wlt/backend/internal/cod/cod.go \
            services/wlt/backend/internal/cod/cod_db_test.go \
            services/wlt/backend/internal/refund/refund.go \
            services/wlt/backend/internal/settlement/settlement.go \
            services/wlt/backend/internal/settlement/settlement_db_test.go \
            services/wlt/backend/internal/ledger/kernel_read.go
          git diff --check

      - name: Start WLT database and financial simulator
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 -Action up -Profiles wlt,financial-simulators
          pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 -Action migrate -Profiles wlt
          pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 -Action seed -Profiles wlt

      - name: Run WLT database-required tests
        working-directory: services/wlt/backend
        env:
          DATABASE_URL: postgres://wlt_runtime:wlt_runtime_password@localhost:55432/wlt_runtime?sslmode=disable
          WLT_REQUIRE_DB_TESTS: 'true'
        run: go test ./...

      - name: Build WLT backend
        working-directory: services/wlt/backend
        run: go build ./...

      - name: Typecheck WLT shared finance boundary
        run: pnpm --dir services/wlt typecheck

      - name: Run provider simulator journeys
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tools/scripts/smoke-wiremock-financial-provider.ps1
          pwsh -NoProfile -ExecutionPolicy Bypass -File tools/scripts/smoke-wlt-provider-through-wlt.ps1

      - name: Commit and push verified accounting closure
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "bthwani-finance-closure-bot"
          git config user.email "finance-closure-bot@users.noreply.github.com"
          git add \
            services/wlt/backend/internal/payment/payment.go \
            services/wlt/backend/internal/payment/payment_provider_db_test.go \
            services/wlt/backend/internal/cod/cod.go \
            services/wlt/backend/internal/cod/cod_db_test.go \
            services/wlt/backend/internal/refund/refund.go \
            services/wlt/backend/internal/settlement/settlement.go \
            services/wlt/backend/internal/settlement/settlement_db_test.go \
            services/wlt/backend/internal/ledger/kernel_read.go \
            services/wlt/database/migrations/wlt-023_cash_in_transit_account.sql \
            services/wlt/frontend/shared/dsh/wlt-dsh-finance-hub.types.ts \
            services/wlt/frontend/shared/dsh/wlt-dsh-finance-hub.view-model.ts \
            tools/scripts/smoke-wlt-provider-through-wlt.ps1
          git commit -m "fix(finance): atomically post capture COD refund and settlement journals"
          git fetch origin bassam
          git rebase origin/bassam
          (cd services/wlt/backend && go test ./... && go build ./...)
          git push origin HEAD:bassam

      - name: Runtime diagnostics on failure
        if: failure()
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 -Action doctor -Profiles wlt,financial-simulators

      - name: Stop temporary runtime
        if: always()
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File infra/docker/scripts/runtime.ps1 -Action down -Profiles wlt,financial-simulators
