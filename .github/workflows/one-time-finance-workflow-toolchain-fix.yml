name: One-time finance workflow toolchain fix

on:
  push:
    branches: [bassam]
    paths:
      - .github/workflows/one-time-finance-workflow-toolchain-fix.yml

permissions:
  contents: write

jobs:
  align-toolchain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bassam
          fetch-depth: 0
      - name: Align finance closure Go version
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/one-time-finance-accounting-closure.yml')
          text = path.read_text(encoding='utf-8')
          old = "go-version: '1.24.17'"
          new = "go-version: '1.26.5'"
          if old not in text and new not in text:
              raise SystemExit('finance closure workflow Go version marker not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name "bthwani-finance-closure-bot"
          git config user.email "finance-closure-bot@users.noreply.github.com"
          git add .github/workflows/one-time-finance-accounting-closure.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "ci(finance): use repository Go toolchain in closure gate"
          git fetch origin bassam
          git rebase origin/bassam
          git push origin HEAD:bassam
