packages:
  - "apps/*/runtime"
  - "shared/app-shell"
  - "shared/data-runtime"
  - "shared/media-runtime"
  - "shared/ui-kit"
  - "services/*"
  - "core/identity"
  - "core/platform-control"
  - "core/providers"
  - "core/workforce"
  - "contracts"

allowBuilds:
  "@ast-grep/cli": false
  "@sentry/cli": true
  nx: true
  sharp: true
autoInstallPeers: false
engineStrict: true
nodeLinker: isolated

# BEGIN BTHWANI_RUNTIME_VERSION_POLICY
overrides:
  '@opentelemetry/core@<2.8.0': '>=2.8.0'
  "@opentelemetry/exporter-prometheus": "^0.217.0"
  "@opentelemetry/exporter-trace-otlp-http": "^0.217.0"
  '@opentelemetry/propagator-jaeger@<2.9.0': '>=2.9.0'
  "@opentelemetry/sdk-node": "^0.217.0"
  "@react-native/metro-config": 0.85.3
  brace-expansion@>=2.0.0 <2.1.2: '>=2.1.2'
  fast-uri@>=3.0.0 <3.1.3: '>=3.1.3'
  fast-uri@>=3.0.0 <=3.1.3: '>=3.1.4'
  js-yaml@<3.15.0: '>=3.15.0'
  js-yaml@>=3.0.0 <3.15.0: '>=3.15.0'
  js-yaml@4.2.0: 4.3.0
  js-yaml@5.2.0: 5.2.1
  minimatch: "^9.0.7"
  next: 16.2.11
  postcss@<8.5.10: '>=8.5.10'
  postcss@<=8.5.11: '>=8.5.12'
  protobufjs: "^8.4.1"
  react: 19.2.3
  react-dom: 19.2.3
  react-native: 0.85.3
  react-native-worklets: 0.8.3
  sharp@<0.35.0: '>=0.35.0'
  shell-quote@<=1.8.4: '>=1.9.0'
  uuid@<11.1.1: '>=11.1.1'
saveExact: true
sharedWorkspaceLockfile: true
strictPeerDependencies: false

verifyDepsBeforeRun: false

# END BTHWANI_RUNTIME_VERSION_POLICY
