
packages:
  - "apps/*/runtime"
  - "shared/app-shell"
  - "shared/ui-kit"
  - "services/*"
  - "core/identity"
  - "core/workforce"
  - "contracts"

verifyDepsBeforeRun: false
engineStrict: true
strictPeerDependencies: false
autoInstallPeers: false
sharedWorkspaceLockfile: true
saveExact: true
nodeLinker: isolated

# BEGIN BTHWANI_RUNTIME_VERSION_POLICY
overrides:
  react: 19.2.3
  react-dom: 19.2.3
  react-native: 0.85.3
  react-native-worklets: 0.8.3
  "@react-native/metro-config": 0.85.3
  next: "^16.2.6"
  minimatch: "^9.0.7"
  "@opentelemetry/sdk-node": "^0.217.0"
  "@opentelemetry/exporter-prometheus": "^0.217.0"
  "@opentelemetry/exporter-trace-otlp-http": "^0.217.0"
  protobufjs: "^8.4.1"

allowBuilds:
  nx: true
  sharp: true
  "@ast-grep/cli": false
# END BTHWANI_RUNTIME_VERSION_POLICY
