version: 2
authority: governance/26_SDLC_TEAM_AND_STAGE_GATES.md
decision_vocabulary: governance/contracts/decision-vocabulary.json
product_truth_authority: governance/product/PRODUCT_TRUTH_POLICY.md
authorities:
  sdlc_program_authority:
    owns:
      - stage_state
      - transition_legality
    may_block: true
  product_manager_authority:
    owns:
      - product_problem
      - actor_segments
      - product_outcome
      - product_priority
      - scope_and_exclusions
      - product_model_approval
    may_block: true
    must_not_be_implementation_executor: true
  product_owner_acceptance_authority:
    owns:
      - functional_behavior
      - permissions_and_states
      - business_rules
      - cross_surface_acceptance
      - implementation_readiness
      - product_acceptance
    may_block: true
    must_not_be_implementation_executor: true
  ux_journey_authority:
    owns:
      - journey_coherence
      - actor_state_clarity
      - accessibility_intent
    may_block_when_applicable: true
  architecture_authority:
    owns:
      - architecture_contracts
      - data_flow
      - dependency_direction
      - adr_decisions
    may_block: true
  engineering:
    owns:
      - implementation
      - developer_verification
    may_final_approve_own_high_risk_change: false
    may_approve_product_model: false
    may_approve_product_acceptance: false
  independent_quality_authority:
    owns:
      - qa_approval
      - negative_testing
      - cross_surface_quality
    block_decision: QA_BLOCK
    requires_product_acceptance: true
  application_security_authority:
    owns:
      - security_approval
      - vulnerability_decision
      - security_negative_testing
    block_decision: SECURITY_BLOCK
  release_authority:
    owns:
      - release_approval
      - deploy
      - rollback
      - production_verification
    block_decision: RELEASE_BLOCK
  risk_acceptance_authority:
    owns:
      - residual_risk_acceptance
    must_not_be_change_author: true
separation_of_duties_required_for:
  - product_model_approval
  - product_acceptance
  - auth_sessions_rbac
  - pii_secrets_security
  - wlt_finance
  - migrations_production_data
  - infrastructure_ci_release
  - critical_high_vulnerabilities
  - final_closure
