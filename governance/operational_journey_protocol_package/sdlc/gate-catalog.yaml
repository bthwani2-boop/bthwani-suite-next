version: 1
authority: governance/26_SDLC_TEAM_AND_STAGE_GATES.md
gates:
  G0_INTAKE:
    evidence:
      - capability_id
      - scope
      - exclusions
      - risk_class
      - owners
  G1_REQUIREMENTS_APPROVED:
    evidence:
      - requirements
      - acceptance_criteria
      - permissions
      - quality_profile
      - security_requirements
  G2_DESIGN_APPROVED:
    evidence:
      - architecture_decision
      - data_flow
      - api_contract_impact
      - database_impact
      - rollback_plan
  G3_READY_FOR_IMPLEMENTATION:
    evidence:
      - implementation_tasks
      - dependency_map
      - target_checks
      - ownership_confirmation
  G4_IMPLEMENTATION_VERIFIED:
    evidence:
      - code_review
      - targeted_checks
      - diff_scope
  G5_QA_APPROVED:
    evidence:
      - qa_result
      - negative_tests
      - cross_surface_consistency
  G6_SECURITY_APPROVED:
    evidence:
      - security_result
      - vulnerability_status
      - threat_model_when_applicable
      - tenant_isolation_when_applicable
  G7_RELEASE_APPROVED:
    evidence:
      - release_readiness
      - rollback_procedure
      - monitoring_owner
      - unresolved_blocker_review
  G8_DEPLOYED:
    evidence:
      - deployment_result
  G9_PRODUCTION_VERIFIED:
    evidence:
      - production_smoke
      - telemetry_review
decisions:
  - GATE_PASS
  - FIX_REQUIRED
  - QA_BLOCK
  - SECURITY_BLOCK
  - RELEASE_BLOCK
  - HARD_BLOCKED_EXTERNAL_ONLY
  - CLOSED_WITH_EVIDENCE
