name: bthwani-runtime

services:
  wiremock-financial-provider:
    profiles:
      - financial-simulators
    image: ${BTHWANI_WIREMOCK_IMAGE:-wiremock/wiremock:3.13.2}
    container_name: ${BTHWANI_WIREMOCK_FINANCIAL_CONTAINER:-bthwani-wiremock-financial-provider-runtime}
    restart: unless-stopped
    command:
      - "--global-response-templating"
      - "--verbose"
    ports:
      - "${BTHWANI_WIREMOCK_FINANCIAL_PORT:-58090}:8080"
    volumes:
      - ./financial-simulators/wiremock/mappings:/home/wiremock/mappings:ro
      - ./financial-simulators/wiremock/__files:/home/wiremock/__files:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/__admin/mappings || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - bthwani-runtime

  mailpit:
    profiles:
      - mail
    image: ${BTHWANI_MAILPIT_IMAGE:-axllent/mailpit:v1.27.8}
    container_name: ${BTHWANI_MAILPIT_CONTAINER:-bthwani-mailpit-runtime}
    restart: unless-stopped
    ports:
      - "${BTHWANI_MAILPIT_UI_PORT:-8025}:8025"
      - "${BTHWANI_MAILPIT_SMTP_PORT:-1025}:1025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8025/api/v1/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - bthwani-runtime

  valkey:
    profiles:
      - cache
    image: ${BTHWANI_VALKEY_IMAGE:-valkey/valkey:9.1.0-alpine}
    container_name: ${BTHWANI_VALKEY_CONTAINER:-bthwani-valkey-runtime}
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - bthwani-runtime

networks:
  bthwani-runtime:
    name: bthwani-runtime
