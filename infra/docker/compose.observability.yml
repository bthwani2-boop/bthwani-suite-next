services:
  jaeger:
    image: ${BTHWANI_JAEGER_IMAGE:-jaegertracing/all-in-one:1.62.0}
    container_name: ${BTHWANI_JAEGER_CONTAINER:-bthwani-jaeger-runtime}
    profiles:
      - observability
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:${BTHWANI_JAEGER_UI_PORT:-16686}:16686"
      - "127.0.0.1:${BTHWANI_OTLP_GRPC_PORT:-4317}:4317"
      - "127.0.0.1:${BTHWANI_OTLP_HTTP_PORT:-4318}:4318"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - bthwani-runtime
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
