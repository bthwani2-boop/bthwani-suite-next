services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: bthwani-jaeger-local
    profiles:
      - observability
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 10
