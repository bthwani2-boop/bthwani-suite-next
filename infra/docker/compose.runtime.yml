name: bthwani-runtime

x-bthwani-policy:
  compose_files:
    canonical: "infra/docker/compose.runtime.yml"
    forbidden:
      - "infra/docker/compose.local.yml"
      - "infra/docker/compose.full.yml"
      - "infra/docker/compose.slice.yml"
      - "per-journey compose files"
  postgres: "active by default through Docker"
  minio: "media and dsh profiles; bucket private by default"
  redis: "not active"
  mongo: "forbidden"

services:
  postgres:
    image: ${BTHWANI_POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${BTHWANI_POSTGRES_CONTAINER:-bthwani-postgres-runtime}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${BTHWANI_POSTGRES_USER:-bthwani_runtime}
      POSTGRES_PASSWORD: ${BTHWANI_POSTGRES_PASSWORD:-bthwani_runtime_password}
      POSTGRES_DB: ${BTHWANI_POSTGRES_DB:-bthwani_runtime}
    ports:
      - "127.0.0.1:${BTHWANI_POSTGRES_PORT:-55432}:5432"
    volumes:
      - bthwani-postgres-runtime-data:/var/lib/postgresql/data
      - ../data-plane/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - bthwani-runtime

  minio:
    profiles:
      - media
      - dsh
    image: ${BTHWANI_MINIO_IMAGE:-minio/minio:RELEASE.2024-11-07T00-52-20Z}
    container_name: ${BTHWANI_MINIO_CONTAINER:-bthwani-minio-runtime}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${BTHWANI_MINIO_ROOT_USER:-bthwani_minio}
      MINIO_ROOT_PASSWORD: ${BTHWANI_MINIO_ROOT_PASSWORD:-bthwani_minio_password}
    ports:
      - "127.0.0.1:${BTHWANI_MINIO_API_PORT:-59000}:9000"
      - "127.0.0.1:${BTHWANI_MINIO_CONSOLE_PORT:-59001}:9001"
    volumes:
      - bthwani-minio-runtime-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - bthwani-runtime

  identity-api:
    profiles:
      - identity
      - platform
    build:
      context: ../..
      dockerfile: core/identity/backend/Dockerfile
    container_name: ${BTHWANI_IDENTITY_API_CONTAINER:-bthwani-identity-api-runtime}
    restart: unless-stopped
    environment:
      PORT: "8082"
      DATABASE_URL: "postgres://${BTHWANI_IDENTITY_DB_USER:-identity_runtime}:${BTHWANI_IDENTITY_DB_PASSWORD:-identity_runtime_password}@postgres:5432/${BTHWANI_IDENTITY_DB_NAME:-identity_runtime}?sslmode=disable"
      IDENTITY_LOCAL_BOOTSTRAP: "${IDENTITY_LOCAL_BOOTSTRAP:-true}"
      IDENTITY_LOCAL_BOOTSTRAP_PASSWORD: "${IDENTITY_LOCAL_BOOTSTRAP_PASSWORD:-123456}"
      IDENTITY_ACTIVATION_HMAC_SECRET: "${IDENTITY_ACTIVATION_HMAC_SECRET:-LOCAL_ONLY_replace_with_32_plus_byte_activation_hmac_secret}"
      IDENTITY_WORKFORCE_SERVICE_TOKEN: "${IDENTITY_WORKFORCE_SERVICE_TOKEN:-LOCAL_ONLY_replace_with_workforce_internal_service_token}"
    ports:
      - "127.0.0.1:${BTHWANI_IDENTITY_API_HOST_PORT:-58082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/identity/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - bthwani-runtime

  workforce-api:
    profiles:
      - workforce
    build:
      context: ../..
      dockerfile: core/workforce/backend/Dockerfile
    container_name: ${BTHWANI_WORKFORCE_API_CONTAINER:-bthwani-workforce-api-runtime}
    restart: unless-stopped
    environment:
      PORT: "8086"
      DATABASE_URL: "postgres://${BTHWANI_WORKFORCE_DB_USER:-workforce_runtime}:${BTHWANI_WORKFORCE_DB_PASSWORD:-workforce_runtime_password}@postgres:5432/${BTHWANI_WORKFORCE_DB_NAME:-workforce_runtime}?sslmode=disable"
      WORKFORCE_IDENTITY_BASE_URL: "http://identity-api:8082"
      WORKFORCE_IDENTITY_SERVICE_TOKEN: "${IDENTITY_WORKFORCE_SERVICE_TOKEN:-LOCAL_ONLY_replace_with_workforce_internal_service_token}"
      WORKFORCE_DSH_BASE_URL: "${WORKFORCE_DSH_BASE_URL:-http://dsh-api:8080}"
      WORKFORCE_CORS_ALLOWED_ORIGINS: "${WORKFORCE_CORS_ALLOWED_ORIGINS:-}"
    ports:
      - "127.0.0.1:${BTHWANI_WORKFORCE_API_HOST_PORT:-58086}:8086"
    depends_on:
      postgres:
        condition: service_healthy
      identity-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8086/workforce/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - bthwani-runtime

  providers-api:
    profiles:
      - providers
    build:
      context: ../..
      dockerfile: core/providers/backend/Dockerfile
    container_name: ${BTHWANI_PROVIDERS_API_CONTAINER:-bthwani-providers-api-runtime}
    restart: unless-stopped
    environment:
      PORT: "8087"
      DATABASE_URL: "postgres://${BTHWANI_PROVIDERS_DB_USER:-providers_runtime}:${BTHWANI_PROVIDERS_DB_PASSWORD:-providers_runtime_password}@postgres:5432/${BTHWANI_PROVIDERS_DB_NAME:-providers_runtime}?sslmode=disable"
      PROVIDERS_IDENTITY_BASE_URL: "http://identity-api:8082"
      PROVIDERS_CORS_ALLOWED_ORIGINS: "${PROVIDERS_CORS_ALLOWED_ORIGINS:-}"
    ports:
      - "127.0.0.1:${BTHWANI_PROVIDERS_API_HOST_PORT:-58087}:8087"
    depends_on:
      postgres:
        condition: service_healthy
      identity-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8087/providers/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - bthwani-runtime

  platform-control-api:
    profiles:
      - platform
    build:
      context: ../..
      dockerfile: core/platform-control/backend/Dockerfile
    container_name: ${BTHWANI_PLATFORM_CONTROL_API_CONTAINER:-bthwani-platform-control-api-runtime}
    restart: unless-stopped
    environment:
      PORT: "8088"
      DATABASE_URL: "postgres://${BTHWANI_PLATFORM_CONTROL_DB_USER:-platform_control_runtime}:${BTHWANI_PLATFORM_CONTROL_DB_PASSWORD:-platform_control_runtime_password}@postgres:5432/${BTHWANI_PLATFORM_CONTROL_DB_NAME:-platform_control_runtime}?sslmode=disable"
      PLATFORM_CONTROL_IDENTITY_BASE_URL: "http://identity-api:8082"
      PLATFORM_CONTROL_CORS_ALLOWED_ORIGINS: "${PLATFORM_CONTROL_CORS_ALLOWED_ORIGINS:-http://localhost:13000}"
    ports:
      - "127.0.0.1:${BTHWANI_PLATFORM_CONTROL_API_HOST_PORT:-58088}:8088"
    depends_on:
      postgres:
        condition: service_healthy
      identity-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8088/platform/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    networks:
      - bthwani-runtime

  wlt-api:
    profiles:
      - wlt
    build:
      context: ../..
      dockerfile: services/wlt/backend/Dockerfile
    container_name: ${BTHWANI_WLT_API_CONTAINER:-bthwani-wlt-api-runtime}
    restart: unless-stopped
    environment:
      PORT: "8083"
      DATABASE_URL: "postgres://${BTHWANI_WLT_DB_USER:-wlt_runtime}:${BTHWANI_WLT_DB_PASSWORD:-wlt_runtime_password}@postgres:5432/${BTHWANI_WLT_DB_NAME:-wlt_runtime}?sslmode=disable"
      WLT_AUTH_MODE: "public-read-references"
      WLT_FINANCIAL_PROVIDER_MODE: "${WLT_FINANCIAL_PROVIDER_MODE:-mock}"
      WLT_FINANCIAL_PROVIDER_BASE_URL: "${WLT_FINANCIAL_PROVIDER_BASE_URL:-http://wiremock-financial-provider:8080}"
      WLT_ALLOW_PRODUCTION_PROVIDER: "${WLT_ALLOW_PRODUCTION_PROVIDER:-false}"
      WLT_DSH_SERVICE_TOKEN: "${WLT_DSH_SERVICE_TOKEN:-}"
      DSH_WLT_SERVICE_TOKEN: "${DSH_WLT_SERVICE_TOKEN:-}"
      WLT_DSH_BASE_URL: "${WLT_DSH_BASE_URL:-http://dsh-api:8080}"
      WLT_MUTATIONS_ENABLED: "${WLT_MUTATIONS_ENABLED:-false}"
      WLT_PAYOUT_ENCRYPTION_KEY: "${WLT_PAYOUT_ENCRYPTION_KEY:-dev-only-payout-destination-encryption-key}"
    ports:
      - "127.0.0.1:${BTHWANI_WLT_API_HOST_PORT:-58083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/wlt/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - bthwani-runtime

  dsh-api:
    profiles:
      - dsh
    build:
      context: ../..
      dockerfile: services/dsh/backend/Dockerfile
    container_name: ${BTHWANI_DSH_API_CONTAINER:-bthwani-dsh-api-runtime}
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://${BTHWANI_DSH_DB_USER:-dsh_runtime}:${BTHWANI_DSH_DB_PASSWORD:-dsh_runtime_password}@postgres:5432/${BTHWANI_DSH_DB_NAME:-dsh_runtime}?sslmode=disable"
      DSH_AUTH_MODE: "identity-required-for-protected-store-actions"
      DSH_IDENTITY_BASE_URL: "http://identity-api:8082"
      DSH_WLT_BASE_URL: "${DSH_WLT_BASE_URL:-http://wlt-api:8083}"
      WLT_DSH_SERVICE_TOKEN: "${WLT_DSH_SERVICE_TOKEN:-}"
      DSH_WLT_SERVICE_TOKEN: "${DSH_WLT_SERVICE_TOKEN:-}"
      DSH_MINIO_ENDPOINT: "minio:9000"
      DSH_MINIO_PUBLIC_ENDPOINT: "${BTHWANI_MINIO_PUBLIC_ENDPOINT:-localhost:59000}"
      DSH_MINIO_ACCESS_KEY: "${BTHWANI_MINIO_DSH_ACCESS_KEY:-dsh_media_local}"
      DSH_MINIO_SECRET_KEY: "${BTHWANI_MINIO_DSH_SECRET_KEY:-dsh_media_local_secret}"
      DSH_MINIO_BUCKET: "dsh-media"
      DSH_MINIO_USE_SSL: "false"
      DSH_MINIO_PUBLIC_USE_SSL: "false"
    ports:
      - "127.0.0.1:${BTHWANI_DSH_API_HOST_PORT:-58080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      identity-api:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/dsh/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - bthwani-runtime

networks:
  bthwani-runtime:
    name: bthwani-runtime

volumes:
  bthwani-postgres-runtime-data:
    name: bthwani-postgres-runtime-data
  bthwani-minio-runtime-data:
    name: bthwani-minio-runtime-data
