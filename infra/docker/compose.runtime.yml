name: bthwani-runtime

x-bthwani-policy:
  compose_files:
    canonical: "infra/docker/compose.runtime.yml"
    forbidden:
      - "infra/docker/compose.local.yml"
      - "infra/docker/compose.full.yml"
      - "infra/docker/compose.slice.yml"
      - "per-journey compose files"
  postgres: "active by default through Docker"
  minio: "media profile only"
  redis: "not active"
  mongo: "forbidden"

services:
  postgres:
    image: ${BTHWANI_POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${BTHWANI_POSTGRES_CONTAINER:-bthwani-postgres-runtime}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${BTHWANI_POSTGRES_USER:-bthwani_runtime}
      POSTGRES_PASSWORD: ${BTHWANI_POSTGRES_PASSWORD:-bthwani_runtime_password}
      POSTGRES_DB: ${BTHWANI_POSTGRES_DB:-bthwani_runtime}
    ports:
      - "${BTHWANI_POSTGRES_PORT:-55432}:5432"
    volumes:
      - bthwani-postgres-runtime-data:/var/lib/postgresql/data
      - ../data-plane/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - bthwani-runtime

  minio:
    profiles:
      - media
    image: ${BTHWANI_MINIO_IMAGE:-minio/minio:RELEASE.2024-11-07T00-52-20Z}
    container_name: ${BTHWANI_MINIO_CONTAINER:-bthwani-minio-runtime}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${BTHWANI_MINIO_ROOT_USER:-bthwani_minio}
      MINIO_ROOT_PASSWORD: ${BTHWANI_MINIO_ROOT_PASSWORD:-bthwani_minio_password}
    ports:
      - "${BTHWANI_MINIO_API_PORT:-59000}:9000"
      - "${BTHWANI_MINIO_CONSOLE_PORT:-59001}:9001"
    volumes:
      - bthwani-minio-runtime-data:/data
    networks:
      - bthwani-runtime

  identity-api:
    profiles:
      - identity
    build:
      context: ../..
      dockerfile: core/identity/backend/Dockerfile
    container_name: ${BTHWANI_IDENTITY_API_CONTAINER:-bthwani-identity-api-runtime}
    restart: unless-stopped
    environment:
      PORT: "8082"
      DATABASE_URL: "postgres://${BTHWANI_IDENTITY_DB_USER:-identity_runtime}:${BTHWANI_IDENTITY_DB_PASSWORD:-identity_runtime_password}@postgres:5432/${BTHWANI_IDENTITY_DB_NAME:-identity_runtime}?sslmode=disable"
      IDENTITY_LOCAL_BOOTSTRAP: "${IDENTITY_LOCAL_BOOTSTRAP:-true}"
      IDENTITY_LOCAL_BOOTSTRAP_PASSWORD: "${IDENTITY_LOCAL_BOOTSTRAP_PASSWORD:-123456}"
    ports:
      - "${BTHWANI_IDENTITY_API_HOST_PORT:-58082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/identity/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - bthwani-runtime

  wlt-api:
    profiles:
      - wlt
    build:
      context: ../..
      dockerfile: services/wlt/backend/Dockerfile
    container_name: ${BTHWANI_WLT_API_CONTAINER:-bthwani-wlt-api-runtime}
    restart: unless-stopped
    environment:
      PORT: "8083"
      DATABASE_URL: "postgres://${BTHWANI_WLT_DB_USER:-wlt_runtime}:${BTHWANI_WLT_DB_PASSWORD:-wlt_runtime_password}@postgres:5432/${BTHWANI_WLT_DB_NAME:-wlt_runtime}?sslmode=disable"
      WLT_AUTH_MODE: "public-read-references"
      WLT_FINANCIAL_PROVIDER_MODE: "${WLT_FINANCIAL_PROVIDER_MODE:-mock}"
      WLT_FINANCIAL_PROVIDER_BASE_URL: "${WLT_FINANCIAL_PROVIDER_BASE_URL:-http://wiremock-financial-provider:8080}"
      WLT_ALLOW_PRODUCTION_PROVIDER: "${WLT_ALLOW_PRODUCTION_PROVIDER:-false}"
      WLT_DSH_SERVICE_TOKEN: "${WLT_DSH_SERVICE_TOKEN:-}"
    ports:
      - "${BTHWANI_WLT_API_HOST_PORT:-58083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/wlt/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - bthwani-runtime

  dsh-api:
    profiles:
      - dsh
    build:
      context: ../..
      dockerfile: services/dsh/backend/Dockerfile
    container_name: ${BTHWANI_DSH_API_CONTAINER:-bthwani-dsh-api-runtime}
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://${BTHWANI_DSH_DB_USER:-dsh_runtime}:${BTHWANI_DSH_DB_PASSWORD:-dsh_runtime_password}@postgres:5432/${BTHWANI_DSH_DB_NAME:-dsh_runtime}?sslmode=disable"
      DSH_AUTH_MODE: "identity-required-for-protected-store-actions"
      DSH_IDENTITY_BASE_URL: "http://identity-api:8082"
      DSH_WLT_BASE_URL: "${DSH_WLT_BASE_URL:-http://wlt-api:8083}"
      WLT_DSH_SERVICE_TOKEN: "${WLT_DSH_SERVICE_TOKEN:-}"
      DSH_MINIO_ENDPOINT: "minio:9000"
      DSH_MINIO_ACCESS_KEY: "${BTHWANI_MINIO_ROOT_USER:-bthwani_minio}"
      DSH_MINIO_SECRET_KEY: "${BTHWANI_MINIO_ROOT_PASSWORD:-bthwani_minio_password}"
      DSH_MINIO_BUCKET: "dsh-partner-media"
      DSH_MINIO_USE_SSL: "false"
    ports:
      - "${BTHWANI_DSH_API_HOST_PORT:-58080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      identity-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/dsh/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - bthwani-runtime

networks:
  bthwani-runtime:
    name: bthwani-runtime

volumes:
  bthwani-postgres-runtime-data:
    name: bthwani-postgres-runtime-data
  bthwani-minio-runtime-data:
    name: bthwani-minio-runtime-data
